syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/424201
    title: 2025/2026 ALGORITHMS AND DATA STRUCTURES IN BIOLOGY — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente ha familiarità
        con il processo di ideazione e di analisi di algoritmi corretti ed efficienti
        e delle strutture-dati. Nello specifico lo studente possiede conoscenze di
        base sugli algoritmi e le strutture-dati. Lo studente sarà poi in grado di
        ideare algoritmi corretti ed efficienti per il loro impiego nei problemi computazionali
        applicati alla biologia e per analizzare le strutture-dati e gli algoritmi
        già esistenti.
      Contenuti: '- Concetti di algoritmo e di complessità computazionale: definizione
        di algoritmo, algoritmi ricorsivi ed iterativi, notazione asintotica.

        - Algoritmi di ricerca esaustiva: restriction mapping, motif finding.

        - Algoritmi greedy: sorting by reversals, algoritmi approssimati.

        - Programmazione dinamica: edit distance, Manhattan distance.

        - La tecnica Divide and Conquer.'
      Testi/Bibliografia: Neil C. Jones and Pavel A. Pevzner. An Introduction to Bioinformatics
        Algorithms. MIT Press, 2004.
      Metodi didattici: Lezioni frontali; Esercitazioni pratiche in laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        una prova scritta ed una prova orale opzionale. Queste attività mirano a verificare
        che lo studente abbia acquisito la necessaria dimestichezza nel progetto di
        algoritmi, oltre che le conoscenze teoriche di base.


        Uso dell''Intelligenza Artificiale, generativa e non, nelle prove d’esame:
        l''uso di strumenti di Intelligenza Artificiale, generativa e non, durante
        la prova d''esame è vietato in qualunque forma; qualunque utilizzo dell''Intelligenza
        Artificiale è considerato violazione del principio di onestà e correttezza,
        e costituisce violazione dell''integrità accademica.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’Ufficio di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it).
        Sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con almeno 15 giorni di anticipo,
        all’approvazione del/della docente, il/la quale ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell’insegnamento.'
      Orario di ricevimento: Consulta il sito web di Enrico Malizia (https://www.unibo.it/sitoweb/enrico.malizia)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/424201
    title: 2025/2026 Algorithms and Data Structures in Biology — University of Bologna
    contents:
      Learning outcomes: By the end of the course, the student his familiar with the
        design and analysis of correct and efficient algorithms and data structures.
        In particular, the student has basic knowledge of algorithms and data structures.
        The student is able to design correct and efficient algorithms for common
        computational tasks in biology and to analyse existing algorithms and data
        structures.
      Course contents: '- Concepts of algorithm and computational complexity: definition
        of algorithm, recursive algorithms and iterative algorithms, asymptotic notation.

        - Exhaustive Search: restriction mapping, motif finding.

        - Greedy algorithms: sorting by reversals, approximate algorithms.

        - Dynamic programming: edit distance, Manhattan distance.

        - Divide and Conquer.'
      Readings/Bibliography: Neil C. Jones and Pavel A. Pevzner. An Introduction to
        Bioinformatics Algorithms. MIT Press, 2004.
      Teaching methods: Class lectures; Practical exercises in the lab.
      Assessment methods: 'The exam consists in a written test, and an optional oral
        examination. These activities aim at assessing that the student has acquired
        the necessary skills in designing efficient algorithms besides the theoretical
        foundations.


        Use of Artificial Intelligence, generative and non-generative, during exams:
        the use of Artificial Intelligence tools, whether generative or not, during
        the exam is prohibited in any form; any use of Artificial Intelligence is
        considered a violation of the principles of honesty and fairness and constitutes
        a breach of academic integrity.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        as soon as possible so that they can propose acceptable adjustments. The request
        for adaptation must be submitted in advance (15 days before the exam date)
        to the lecturer, who will assess the appropriateness of the adjustments, taking
        into account the teaching objectives.'
      Office hours: See the website of Enrico Malizia (https://www.unibo.it/sitoweb/enrico.malizia/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
