syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517116
    title: 2025/2026 WEB AND MOBILE SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student knows
        the most important technologies used in the World Wide Web and in the mobile
        context. The student knows platforms and systems that can be used to design
        and develop Web sites and applications. The students is able to create web
        documents and simple distributed web and mobile applications, defining a friendly
        user interface on the basis of the human computer interaction methodologies.
      Contenuti: 'The course is composed of two modules, one related to the web technologies
        (such as HTML, CSS); the other focuses on the mobile ecosystem.


        Main contents of this class are the following ones:


        - Evolution of the web and mobile technologies

        - Introduction to the main mobile operating systems

        - Web and mobile architectures

        - Web standards and technologies: HTTP, URI, HTML5, CSS3

        - Frameworks, platforms and tool for Web and mobile development

        - User interface and interaction for the Web and for the mobile ecosystem.'
      Testi/Bibliografia: Due to the rapid evolution of the topics of the course,
        there is no textbook available to cover the whole discipline. Students therefore
        access the slides of the course and all the didactical materials on the on
        Virtuale, the official platform of the University of Bologna.
      Metodi didattici: 'Lectures and practical activities in lab.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode https://corsi.unibo.it/2cycle/DigitalTransformationManagement/health-and-safety-mandatory-training.'
      Modalità di verifica e valutazione dell'apprendimento: 'The final exam aims
        to evaluate if the goals of the class have been reached. The final score is
        defined through the evaluation of a project work designed and developed in
        a team (2 o 3 students each) and the evaluation of an oral exam. In particular,
        the grade corresponds to the following evaluations:


        - 18-23: the student has sufficient preparation and web and mobile programming
        skills, spread however, over just few topics taught in the course.

        - 24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate web and mobile programming
        skills.

        - 28-30: great knowledge about most of the topics taught in the course, good
        critical and web and mobile programming skills, good usage of the specific
        technologies and frameworks.

        - 30L: excellent and in-depth knowledge of all the topics in the course, excellent
        critical and web and mobile programming skills, excellent usage of the specific
        technologies and frameworks.


        During the exam, the use of didactic materials and additional tools is not
        allowed.


        The final grade for the integrated course Operating Systems, Networks and
        Web will be calculated as the average of the scores obtained in the two modules:
        Web and Mobile Systems and Operating Systems and Networks.'
      Strumenti a supporto della didattica: Slides and didactical materials will be
        delivered through Virtuale, the official e-learning platform.
      Orario di ricevimento: 'Consulta il sito web di Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri)


        Consulta il sito web di Catia Prandi (https://www.unibo.it/sitoweb/catia.prandi)'
      SDGs: 'Istruzione di qualità Ridurre le disuguaglianze


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
