  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/526530
    title: 2025/2026 HUMAN COMPUTER INTERACTION — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student:

        understands the principles and methodologies for designing interaction systems
        with a computer system;

        understands theories and methodologies for evaluating interface usability;

        understands the principles and methodologies of User Experience and Experience
        Design.'
      Course contents: 'The course will focus on three key areas:


        - Introduction to Human-Computer Interaction: Covering foundational models
        like Norman’s Model of Interaction and Abowd and Beale''s interaction framework,
        along with tools, techniques, and environments for HCI.

        - Human-Centered Interactive Application Development: Exploring tasks and
        methods for designing, developing, and evaluating interactive applications.
        Topics include needfinding strategies, prototyping (low- and high-fidelity),
        mental models, visual design, heuristic evaluation, and basics of user studies.
        This section emphasizes the design process, with students applying concepts
        to a specific application domain through a group project carried out during
        lab sessions.

        - "Beyond Traditional Interaction" Paradigms: Investigating advanced interaction
        paradigms, such as AI-driven systems, tangible interaction, voice user interfaces,
        and gesture-based interaction. These topics will be explored from multiple
        perspectives, including their rationale, vision, contemporary examples, and
        associated development tools.'
      Readings/Bibliography: '- Alan Dix, Janet Finlay, Gregory Abowd, Russell Beale:
        Human Computer Interaction, 3rd Edition, Prentice Hall, 2004, ISBN 0130461091

        - Shneiderman, Plaisant, Cohen, Jacobs, Elmqvist and Diakopoulos: Designing
        the User Interface: Strategies for Effective Human-Computer Interaction, 6th
        Edition, Pearson, 2016, ISBN 013438038X / 9780134380384'
      Teaching methods: 'Lectures and practical activities in lab.


        Given the type of activity and teaching methods adopted, attendance at this
        training activity requires all students to first participate in the e-learning
        training modules on workplace safety.'
      Assessment methods: 'I


        The exam requires students to develop and present their group project. Projects
        will be discussed and refined throughout the course laboratories.


        Submission and Presentation:

        • Groups must submit their project at least seven days before the exam date.
        The final project will be discussed in an oral session, during which all group
        members must be present.

        • Alongside the group project, students will answer a few individual oral
        questions.


        Submission Requirements:


        The materials to be submitted for the exam include:

        a) A detailed report describing the group project.

        b) A short presentation that will drive the group oral discussion.


        Assessment:

        Students will demonstrate their acquired skills and knowledge through the
        group project and oral discussion (including an individual part).


        Grades are based on a scale of 0 to 30, distributed as follows:

        • Project and oral discussion: Up to 24 points.

        • Individual oral part: Up to 6 points.


        Additional points (up to 2) may be awarded for:

        • Exceptional originality, complexity, or richness of the project.

        • Effort shown during labs and feedback sessions.

        • High-quality oral discussion.


        These extra points can raise the grade to 30L.


        Evaluation Criteria:

        • Effort invested in the project.

        • Originality, complexity, and depth of the work.

        • Methodological and technical accuracy.

        • Completeness and clarity of deliverables.

        • Quality of presentation and oral discussion.


        In particular, the final grade corresponds to the following evaluations:


        18–23:

        Basic understanding of HCI principles and design methods. Project and discussion
        show limited depth and partial application of usability and user experience
        concepts.


        24–27:

        Good preparation with generally correct application of HCI methodologies.
        Project and discussion demonstrate coherent design work, though with some
        gaps or uncertainties.


        28–30:

        Strong and comprehensive knowledge of course topics. Project is well-structured,
        original, and methodologically sound, showing effective application of user-centered
        design and evaluation methods.


        30L (with honors):

        Excellent mastery of all topics. Project distinguished by originality, complexity,
        and high-quality execution. Exceptional critical insight and professional-level
        discussion of design and interaction paradigms.'
      Teaching tools: Slides and didactic materials will be delivered through Virtuale,
        the official e-learning platform.
      Office hours: See the website of Catia Prandi (https://www.unibo.it/sitoweb/catia.prandi/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
