  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526530
    title: 2025/2026 HUMAN COMPUTER INTERACTION — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce principi e metodologie di progettazione dei sistemi di interazione
        con un sistema informatico;

        - conosce teorie e metodologie di valutazione dell''usabilità delle interfacce;

        - conosce principi e metodologie di User Experience e di Experience Design.'
      Contenuti: 'Il corso si concentrerà su tre aree chiave:


        - Introduzione all''interazione uomo-computer: verranno trattati modelli fondamentali
        come il Modello di Interazione di Norman e il framework di interazione di
        Abowd e Beale, insieme a strumenti, tecniche e ambienti per l''HCI.

        - Sviluppo di applicazioni interattive incentrate sull''uomo: verranno esplorate
        attività e metodi per la progettazione, lo sviluppo e la valutazione di applicazioni
        interattive. Gli argomenti includono strategie di individuazione dei bisogni,
        prototipazione (a bassa e alta fedeltà), modelli mentali, progettazione visiva,
        valutazione euristica e fondamenti degli studi utente. Questa sezione enfatizza
        il processo di progettazione, con gli studenti che applicano i concetti a
        uno specifico dominio applicativo attraverso un progetto di gruppo svolto
        durante le sessioni di laboratorio.

        - Paradigmi "Oltre l''interazione tradizionale": verranno analizzati paradigmi
        di interazione avanzati, come sistemi basati sull''intelligenza artificiale,
        interazione tangibile, interfacce utente vocali e interazione basata sui gesti.
        Questi argomenti saranno esplorati da diverse prospettive, tra cui la loro
        logica, la visione, gli esempi contemporanei e gli strumenti di sviluppo associati.'
      Testi/Bibliografia: '- Alan Dix, Janet Finlay, Gregory Abowd, Russell Beale:
        Human Computer Interaction, 3rd Edition, Prentice Hall, 2004, ISBN 0130461091

        - Shneiderman, Plaisant, Cohen, Jacobs, Elmqvist and Diakopoulos: Designing
        the User Interface: Strategies for Effective Human-Computer Interaction, 6th
        Edition, Pearson, 2016, ISBN 013438038X / 9780134380384'
      Metodi didattici: 'Lezioni frontali e attività pratiche in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli di formazione sulla sicurezza nei luoghi di
        studio, in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Metodi di valutazione
        L''esame richiede agli studenti di sviluppare e presentare il proprio progetto
        di gruppo. I progetti saranno discussi e perfezionati durante i laboratori
        del corso.


        Consegna e presentazione:


        • I gruppi devono consegnare il proprio progetto almeno sette giorni prima
        della data d''esame. Il progetto finale sarà discusso in una sessione orale,
        durante la quale tutti i membri del gruppo dovranno essere presenti.


        • Parallelamente al progetto di gruppo, gli studenti risponderanno ad alcune
        domande orali individuali.


        Requisiti per la consegna:


        Il materiale da presentare per l''esame include:


        a) Una relazione dettagliata che descriva il progetto di gruppo.


        b) Una breve presentazione che guiderà la discussione orale di gruppo.


        Valutazione:


        Gli studenti dimostreranno le competenze e le conoscenze acquisite attraverso
        il progetto di gruppo e la discussione orale (inclusa una parte individuale).
        I voti sono basati su una scala da 0 a 30, distribuiti come segue:


        • Progetto e discussione orale: fino a 24 punti.


        • Parte orale individuale: fino a 6 punti.


        Possono essere assegnati punti aggiuntivi (fino a 2) per:


        • Eccezionale originalità, complessità o ricchezza del progetto. • Impegno
        dimostrato durante le esercitazioni e le sessioni di feedback.


        • Discussione orale di alta qualità. Questi punti extra possono portare il
        voto a 30L.


        Criteri di valutazione:


        • Impegno investito nel progetto.


        • Originalità, complessità e profondità del lavoro.


        • Accuratezza metodologica e tecnica.


        • Completezza e chiarezza dei risultati.


        • Qualità della presentazione e della discussione orale.


        In particolare, il voto finale corrisponde alla seguente valutazione:


        18–23:

        Comprensione di base dei principi e dei metodi di progettazione dell’HCI.
        Il progetto e la discussione mostrano una limitata profondità e un’applicazione
        parziale dei concetti di usabilità e user experience.


        24–27:

        Buona preparazione con applicazione generalmente corretta delle metodologie
        di HCI. Il progetto e la discussione evidenziano un lavoro di design coerente,
        sebbene con alcune lacune o incertezze.


        28–30:

        Conoscenza solida e completa degli argomenti del corso. Il progetto è ben
        strutturato, originale e metodologicamente accurato, con un’applicazione efficace
        dei principi di progettazione e valutazione centrata sull’utente.


        30L (con lode):

        Eccellente padronanza di tutti gli argomenti del corso. Il progetto si distingue
        per originalità, complessità e qualità esecutiva. La discussione orale mostra
        un’eccellente capacità critica e un livello professionale di analisi dei paradigmi
        di design e interazione.'
