syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514342
    title: 2025/2026 HIGH FREQUENCY ELECTRONIC CIRCUITS M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The course deals with the analysis and design
        of high-frequency electronic circuits as those found in IoT, 5G and remote
        sensing applications. Students learn how high-frequency front-ends work, to
        state and evaluate the specifications of the main building blocks and to face
        the trade-offs involved in their design.
      Contenuti: 'The course 84442 - High Frequency Electronic Circuits is made of
        two parts. Module 1 is given by prof. Alberto Santarelli (30 hours), whereas
        Module 2 is given by prof. Alberto Maria Angelotti (30 hours).


        Module 1


        Basics: Review of radio transceiver architectures and their behavioural components.
        Implementing technologies. Modulation and demodulation schemes. Overview of
        high-frequency circuit applications. Electron Devices for microwave and millimetre-wave
        applications.


        Small-signal Amplifiers: Scattering parameter and Smith Chart theory. Power
        Gain, Return Loss and VSWR. Impedance Matching. Design of Transistor Bias
        Networks (Field Effect and Bipolar Transistors). Design of lumped and distributed
        matching networks. Stability analysis of microwave amplifiers. Single-ended
        and balanced amplifiers. High frequency narrow- and wide-band amplifiers.
        Low-Noise Amplifiers. Sensitivity and dynamic range in LNAs and Power Amplifiers.


        Module 2


        Power Amplifiers: Harmonic and Intermodulation Distortion Analysis. Gain compression,
        Third-Order Intercept point, energetic efficiency, Power Added Efficiency.
        Other figures of merit (ACPR, EVM, NPR,..). Power Amplifier behavioral models
        (AM/AM and AM/PM characteristics). Source and Load Pulling. Design of power
        amplifiers in A, B, C, F class of operation. Elements of Efficiency and Linearity
        Enhancement Techniques (Envelope Tracking, Doherty Amplifiers, Digital Pre-Distortion).


        Computer Aided Design: Introduction to using CAD tools, practical exercises
        on FET basing and S-parameter simulation, stability analysis and impedance
        matching, single-tone and multi-tone Harmonic Balance analysis.'
      Testi/Bibliografia: '- G. Gonzales, Microwave Transistor Amplifiers, Artech
        House

        - R. S. Carson, Radio communications concepts: Analog, J.Wiley&Sons

        - B. Razavi, RF Microelectronics, Prentice Hall

        - S. Cripps, RF Power Amplifiers for Wireless Communications, Artech House'
      Metodi didattici: Lecturers and Laboratory. Laboratory exercises will be carried
        out by using commercial CAD tools for the design of microwave and mm-wave
        circuits and they will be held either in the Laboratory of Electronic Design
        and Measurement for RF and Industrial Applications (EDM-Lab, http://www.dei.unibo.it/en/research/research-facilities/Labs/edm-lab)
        at DEI or on personal laptops after installing complimentary temporary licenses.
        The exercises will consist in circuit analysis and design examples with CAD
        tools.
      Modalità di verifica e valutazione dell'apprendimento: 'The exam consists in
        two parts: 1. Theory and 2. CAD. The theory part of the exam consists in an
        oral interview. This is aimed at evaluating: 1. student''s knowledge of subjects
        included in the course program; 2. how deep the student is able to develop
        the subjects; 3. their ability to plainly explain the subjects by using adequate
        technical language. Two subjects will be addressed during the interview. If
        requested, some time will be given before the interview for writing formulas,
        graphs, schemes, thought to be useful for subject exposition. The CAD part
        of the exam concerns the laboratory exercises. This is aimed at evaluating
        1. the student''s knowledge of the different tasks to be pursued with standard
        CAD tools for HF circuit analysis/design. 2. The abilities to autonomously
        carry out simple circuit simulation tasks and interpret the obtained results.'
      Strumenti a supporto della didattica: '- Slides written by the teacher

        - Notes on laboratory exercises'
      Link ad altre eventuali informazioni: https://dei.unibo.it/en/research/research-groups/edm
