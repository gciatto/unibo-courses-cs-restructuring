  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/491926
    title: 2025/2026 Big Data Analytics and Text Mining — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student understands how corpora
        and big data sets can be analyzed to derive strategic knowledge and data-driven
        decisions. The student is able to address the main data and text analytics
        tasks such as data selection, transformation, analysis and interpretation,
        moreover is able to leverage deep learning pipelines and advanced solutions
        for text mining and natural language understanding downstream goals.
      Course contents: "Module 1 - Text Mining and Large Language Models (Prof. Gianluca\
        \ Moro (https://disi-unibo-nlp.github.io))\n\nThe module focuses on the following\
        \ state-of-the-art deep learning advancements to cope with challenging and\
        \ highly business demanded natural language processing and understanding tasks\
        \ with core open source technologies\n\n(see the virtuale space of the course\
        \ (https://virtuale.unibo.it/course/view.php?id=70599) and our GitHub repo\
        \ (https://disi-unibo-nlp.github.io/))\n\n- Neural Language Modeling Foundations\n\
        \  Transformer Architecture, Pre-Training and Fine-Tuning Techniques, Decoding\
        \ Strategies, Evaluation (Natural Language Generation Metrics, LLM-as-a-judge).\n\
        - Large Language Models\n  Scaling Laws, Prompting vs Fine-Tuning, Instruction\
        \ Fine-Tuning, Preference Alignment, Efficient Attention Mechanisms (e.g.,\
        \ BigBird, Performer, Key-Value Caching, Multi-Query Attention)\n\nCompression\
        \ and Quantization Methods (GPTQ, AWQ, GGUF), Parameter-Efficient Fine-Tuning\
        \ (e.g., LoRA, QLoRA, GaLoRE, Prompt Tuning), Mixture-of-Experts, Vision-Language\
        \ Models.\n\n- Knowledge-Enhanced Natural Language Processing. Retrieval-Augmented\
        \ Generation (Chunking Strategies, Architectures) and VectorDBs, Agents and\
        \ Tool Calling (Large Action Models - LAM), Graph Neural Networks, Graph Injection\
        \ into Language Models for Trustworthiness.\n- Labs on real-world case studies\
        \ and in enterprise settings with core technologies Python, Pytorch, HuggingFace,\
        \ LlamaIndex:\n\n-- Prompting vs Full Fine-Tuning vs Parameter-Efficient Fine-Tuning\
        \ for Dialogue Summarization; Foundational Multimodal Large Language Models\
        \ for Visual Question Answering.\n-- Efficient, Retrieval-Augmented Conversational\
        \ Agents for Qustion-Answering in the Legal Domain.\n-- Graph Learning, Embedding\
        \ and Injection into Language Models for Semantics-Aware Lay Summarization;\
        \ GraphRAG and Structured Query Generation to Interact with DBMS and Knowledge\
        \ Graphs in Multi-Source Question Answering;\n-- Graph Verbalization into\
        \ Large Language Model Prompts for Medical Question Answering.\n\nThe module\
        \ introduces also new published SOTA results in top-tier AI conferences for\
        \ research and industrial projects, we also achieved on some of these topics\
        \ (https://disi-unibo-nlp.github.io/applications/).\n\nModule 2 - Big Data\
        \ Analytics (Prof. Stefano Lodi)\n\n- Data Mining in Big Data Environments\n\
        - Maps and reductions in parallel programming. The MapReduce programming model.\n\
        - The Hadoop implementation of MapReduce.\n- The Python API to the Spark system\
        \ and examples of parallel programs.\n- The Machine Learning\n  Library (MLlib)\
        \ of Spark."
      Readings/Bibliography: "Readings/Bibliography\n\nModule 1 - Text Mining and\
        \ Large Language Models (Prof. Gianluca Moro)\n\nReadings: Slides, lab notebooks,\
        \ datasets and recent papers will be supplied by the teacher, also from our\
        \ repo (https://disi-unibo-nlp.github.io/)\n\nSuggested readings: Natural\
        \ Language Processing Recipes (https://www.aitskadapa.ac.in/e-books/CSE/DEEP%20LEARNING/Natural%20Language%20Processing%20Recipes_%20Unlocking%20Text%20Data%20with%20Machine%20Learning%20and%20Deep%20Learning%20using%20Python%20(%20PDFDrive%20).pdf)\
        \ Unlocking Text Data with Machine Learning and Deep Learning using Python,\
        \ Akshay Kulkarni and Adarsha Shivananda, 2024\n\nModule 2 - Big Data Analytics\
        \ (Prof. Stefano Lodi)\n\n- White, T. (2009). Hadoop: The definitive guide\
        \ 4th Edition. Reilly\n  Media.\n- Chambers, B., & Zaharia, M. (2018). Spark:\
        \ The definitive guide: Big\n  data processing made simple. Reilly Media,\
        \ Inc."
      Teaching methods: 'Module 1 - Text Mining and Large Language Models (Prof. Gianluca
        Moro)


        Lessons and lab activities are held also online with Teams using slides, colab
        notebooks and our servers.


        Module 2 - Big Data Analytics (Prof. Stefano Lodi)


        The lessons of the course are held in a classroom. Examples are implemented
        in Python on Linux installed in a virtual machine (VM). The VMs will be installed
        in the students’ own laptops. Full instructions on how to install the VMs
        will be given in the first lesson.'
      Assessment methods: 'The exam of the course consists of an unique multiple-choice
        test for both modules and the (online) discussion of an individual or group
        small project, chosen with a teacher, on one module.


        The project can be joined with the 3 CFU project of B3157 - PROJECT WORK IN
        BIG DATA ANALYTICS AND TEXT MINING but also with master theses, internships
        and other courses


        Multiple-choice test sits: at the end of the lessons before Christmas, plus
        in Jan and Feb.


        If needed the student can receive the assistance of the tutor for the development
        of the project. The project''s scope should be approximately equivalent to
        that of a lab of the course and should take about a couple of weeks of work


        A non-exhaustive list of dataset and text sets for the project is available
        in the "virtuale" teaching resources, but the students can also propose to
        use a different data set.'
      Teaching tools: 'Module 1 - Text Mining and Large Language Models (Prof. Gianluca
        Moro)


        The laboratory activities - which are carried out with Python/R using Colab
        - regard the following case studies:


        - in the context of technical reports on air accidents, identification of
        the reasons that contribute to cause serious accidents

        - extractive and abstractive text summarisation based on state-of-the-art
        transformer models

        - deep metric learning for cross-modal information retrieval of texts and
        images

        - SOTA transformers for closed and open question answering, also in business
        and legal domains, for named entity recognition (NER), for relation extraction
        (RE) among biomedical entities for chemical-protein and disease-disease interactions
        respectively, for natural language inference (NLI) to determine the validity
        of a hypothesis (i.e., true or false), document classification (DC) to assign
        a text document to a set of categories


        Module 2 - Big Data Analytics (Prof. Stefano Lodi)


        Presentation of the course topics using a overhead

        projector. Exercises in Bring Your Own Device mode; directions on how to install
        the required software will be given during the course.


        Documents used in the presentations are distributed on the site

        [http://iol.unibo.it]. Access to the documents is allowed only to

        students of the course.


