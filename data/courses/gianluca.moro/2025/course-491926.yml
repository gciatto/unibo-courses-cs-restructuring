    title: 2025/2026 BIG DATA ANALYTICS AND TEXT MINING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente ha compreso
        come analizzare corpora e big data set per ricavare conoscenze strategiche
        e decisioni basate sui dati. Lo studente è in grado di affrontare i principali
        task di analisi di dati e di testo destrutturato come la selezione, la trasformazione,
        l'analisi e l'interpretazione, inoltre è in grado di sfruttare tecniche di
        deep learning e soluzioni avanzate per il text mining ed il natural language
        understanding.
      Contenuti: See the english version.
