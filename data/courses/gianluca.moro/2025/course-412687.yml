syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/412687
    title: 2025/2026 WEB SEMANTICO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i concetti, gli standard e i linguaggi che costituiscono larchitettura del
        Semantic Web, le tecnologie e i modelli per la rappresentazione di metadati
        e ontologie e le modalità con cui differenti risorse possono essere integrate
        e utilizzate (ad esempio secondo l'approccio dei Linked Data). Il corso esplora
        le nuove modalità di organizzazione, integrazione, gestione e reperimento
        di risorse che il Semantic Web e il Web of Data oggi mettono a disposizione.
      Contenuti: 'Tale corso è finalizzato a fornire sia un solido inquadramento concettuale
        sul tema della rappresentazione della conoscenza nel Web dei Dati, sia le
        basi per lo sviluppo e l''utilizzo di Knowledge Graphs (KGs) per mezzo degli
        strumenti più diffusi in informatica e degli standard condivisi, evidenziando
        problemi di interesse ed analizzando alcune specifiche tematiche. La crescita
        dei contenuti Web impone lo studio di teorie, metodologie e tecniche di concettualizzazione
        dei contenuti stessi. Questo insegnamento si propone di fornire agli studenti
        la comprensione dei presupposti formali, dei linguaggi e delle tecnologie
        che permettono di realizzare applicazioni oltre che delle competenze specifiche
        nell''utilizzo e nello sviluppo di sistemi informatici per la gestione semantica
        della conoscenza. In particolare, il modulo 1 (48 ore) affronta i seguenti
        argomenti:


        - KG nel Web of Data (Semantic Web, Linked Open Data)

        - Tecnologie semantiche (RDF, RDFS, inferenza logica, RDFa, microformati)

        - Interrogare RDF (DBPedia KG, SPARQL)

        - Rappresentazione della conoscenza tramite ontologie (OWL)

        - KG applications (ontologie, KG programming, visualisation and analytics)


        Mentre i contenuti affrontati nel modulo 2 (10 ore) sono:


        - KG embeddings, KG completion, KG mappings and alignment, semantic search

        - Graph machine learning'
      Testi/Bibliografia: 'Dispense distribuite dal docente durante il corso e pubblicate
        sul sito di riferimento.


        Testo di eventuale approfondimento:


        Semantic Web for the Working Ontologist: Effective Modeling for Linked Data,
        RDFS, and OWL, third edition, Dean Allemang, James Hendler, Fabien Gandon,'
      Metodi didattici: 'Lezioni frontali ed esercitazioni da svolgere in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Obiettivo della verifica
        dell''apprendimento è capire se i concetti, gli standard e i linguaggi studiati
        sono stati compresi e se lo studente ha sviluppato capacità pratiche di operare
        con essi. La modalità con cui essa viene svolta è tramite la realizzazione
        di 3 progetti. Nel primo si richiede che lo studente analizzi e descriva le
        funzionalità e le caratteristiche di un progetto che usa strumenti del Web
        Semantico fra i tanti introdotti a lezione e appartenenti al mondo dell''industria,
        delle aziende, delle PA o dell''accademia.


        Nel secondo e terzo progetto si richiede che lo studente, eventualmente anche
        in gruppo, sviluppi un proprio prototipo di progetto, utilizzando prima RDF
        e RDFS e collegando quanto più possibile i dati rappresentati a vocabolari
        esistenti e condivisi, poi modellando la conoscenza del dominio tramite OWL
        e operando su essa ragionamenti automatici. Il dominio di interesse viene
        scelto in accordo con il docente. Un orale in cui lo studente espone quanto
        realizzato conclude la verifica.


        Sarà valutata la padronanza dei concetti fondamentali e la capacità operativa
        nell’applicarli. Un punteggio più alto sarà assegnato a chi mostrerà una comprensione
        completa dei contenuti dell’insegnamento, sapendo impiegarli con proprietà
        di linguaggio e autonomia nella risoluzione di problemi, anche di natura nuova
        o non trattati durante le lezioni. Il mancato superamento dell’esame potrà
        invece derivare da una conoscenza parziale o inadeguata dei concetti di base,
        da un uso improprio del linguaggio tecnico, o da una scarsa capacità di astrazione
        e generalizzazione.'
      Strumenti a supporto della didattica: Tutto il materiale utilizzato viene reso
        disponibile anche in forma elettronica e reperibile tramite username e password
        presso AMS Campus - AlmaDL - Università di Bologna. Nello stesso sito vengono
        periodicamente aggiornati e pubblicati materiali didattici di supporto.
      Orario di ricevimento: 'Consulta il sito web di Antonella Carbonaro (https://www.unibo.it/sitoweb/antonella.carbonaro)


        Consulta il sito web di Gianluca Moro (https://www.unibo.it/sitoweb/gianluca.moro)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/412687
    title: 2025/2026 Semantic Web — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student is familiar with the
        concepts, standards and languages that constitute the architecture of the
        Semantic Web, the technologies and models for the representation of metadata
        and ontologies, and the ways in which different resources can be integrated
        and utilised (e.g. according to the Linked Data approach). The course explores
        the new ways of organising, integrating, managing and retrieving resources
        that the Semantic Web and the Web of Data make available today.
      Course contents: 'This course is aimed at providing both a solid conceptual
        framework on the subject of knowledge representation in the Web of Data, and
        the basis for the development and use of Knowledge Graphs (KGs) by means of
        the most widespread tools in computer science and shared standards, highlighting
        issues of interest and analysing some specific topics. The growth of Web contents
        requires the study of theories, methodologies and techniques for the conceptualisation
        of these contents. This course aims to provide students with an understanding
        of the formal assumptions, languages and technologies that allow applications
        to be realised, as well as specific skills in the use and development of computer
        systems for the semantic management of knowledge. In particular, Module 1
        (48 hours) covers the following topics:


        - KG in the Web of Data (Semantic Web, Linked Open Data)

        - Semantic technologies (RDF, RDFS, logical inference, RDFa, microformats)

        - Querying RDF (DBPedia KG, SPARQL)

        - Knowledge representation using ontologies (OWL)

        - KG applications (ontologies, KG programming, visualisation and analytics)


        The topics covered in Module 2 (10 hours) are:


        - KG embeddings, KG completion, KG mappings and alignment, semantic search

        - Graph machine learning'
      Readings/Bibliography: 'Lecture notes distributed by the lecturer during the
        course and published on the reference site.


        Text for further reading:


        Semantic Web for the Working Ontologist: Effective Modeling for Linked Data,
        RDFS, and OWL, third edition, Dean Allemang, James Hendler, Fabien Gandon.'
      Teaching methods: Lectures and workshop activities
      Assessment methods: 'The objective of the learning assessment is to find out
        whether the concepts, standards and languages studied have been understood
        and whether the student has developed practical skills in working with them.
        The way in which this is done is by carrying out 3 projects. In the first
        one, the student is required to analyse and describe the functionalities and
        characteristics of a project using Semantic Web tools from among the many
        introduced in the lesson and belonging to the world of industry, business,
        PA or academia.


        In the second and third projects, students are required to develop their own
        prototype project, first using RDF and RDFS and linking the represented data
        as far as possible to existing and shared vocabularies, then modelling the
        domain knowledge via OWL and operating automatic reasoning on it. The second
        and third projects can also be carried out in groups. The domain of interest
        is chosen in agreement with the lecturer.


        The evaluation will consider the student’s mastery of fundamental concepts
        and their ability to apply them effectively. Higher marks will be awarded
        to students who demonstrate a thorough understanding of all course topics,
        express ideas with technical precision, and solve problems autonomously, including
        those of a novel or more complex nature not explicitly covered in class. Failure
        to pass the exam may result from an insufficient or partial understanding
        of key concepts, improper use of technical language, or inadequate abstraction
        and generalization skills.'
      Teaching tools: All the teaching materials used are also made available in electronic
        form and can be accessed via username and password at AMS Campus - AlmaDL
        - University of Bologna. The same site periodically updates and publishes
        supporting teaching materials
