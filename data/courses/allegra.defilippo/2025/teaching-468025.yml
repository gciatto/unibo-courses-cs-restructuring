  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/468025
    title: 2025/2026 Intelligent Systems M — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the students are able to use the
        main AI techniques to develop tools for solving real life applications.

        The students are able to understand and apply a wide range of techniques such
        as constraint programming, symbolic and sub-symbolic machine learning techniques,
        planning and swarm intelligence.'
      Course contents: 'Module 1:


        PLANNING


        - Non-linear planning

        - Conditional planning

        - Graph-based planning

        - Planning for robotics


        OPTIMIZATION


        - Constraint Programming and Global constraints

        - Search strategies

        - Applications


        SWARM INTELLIGENCE


        - Ant colony

        - Bee Colony

        - Particle Swarm Optimization


        Module 2:


        MACHINE LEARNING


        (symbolic and sub-symbolic approaches)


        - Decision trees - random forests

        - Neural networks

        - Bayesian approaches

        - Inductive logic programming


        DEEP LEARNING'
      Readings/Bibliography: 'E. Rich, K. Knight: "Intelligenza Artificiale", McGraw
        Hill, Seconda Edizione 1992.


        E. Charniak, D. McDermott, "Introduzione all''Intelligenza Artificiale", Masson,
        1988.


        M.Ginsberg: "Essentials of Artificial Intelligence", Morgan Kaufman,1993.


        P. H. Winston: "Artificial Intelligence: Third Edition", Addison-Wesley, 1992.'
      Teaching methods: Lectures and laboratory exercises
      Assessment methods: Written exam
      Teaching tools: 'Slides


        lab exercises'
