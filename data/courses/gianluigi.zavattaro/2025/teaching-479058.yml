syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/479058
    title: 2025/2026 SCALABLE AND CLOUD PROGRAMMING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "SAlla fine del corso gli studenti conosceranno:\n\
        \n- le principali problematiche relative alla realizzazione di programmi altamente\
        \ paralleli e distribuiti;\n- uno stile di programmazione, basato su concetti\
        \ tipici della programmazione funzionale e object-oriented, adatto allo sviluppo\
        \ di applicazioni scalabili, ovvero che possano essere facilmente messe in\
        \ esecuzione su diverse architetture di calcolo, con differenti quantità di\
        \ risorse di calcolo a disposizione.\n  In particolare, gli studenti saranno\
        \ in grado di:\n- sviluppare una applicazione tramite il linguaggio di programmazione\
        \ Scala e la piattaforma Spark che possa essere messa in esecuzione su sistemi\
        \ cloud quali quelli forniti da Amazon Web Services (AWS) e Google Cloud Platform\
        \ (GCP)."
      Contenuti: 'Analisi delle problematiche relative alla realizzazione di applicazioni
        altamente concorrenti e distribuite.


        Tecniche di parallelizzazione e distribuzione scalabili di dati e programmi,
        quali il modello di programmazione MapReduce.


        Approccio funzionale alla realizzazione di sistemi scalabili tramite linguaggi
        e framework quali Scala e Spark.


        Piattaforme cloud per l’esecuzione di applicazioni scalabili quali Amazon
        Web Services (AWS) e Google Cloud Platform (GCP).'
      Testi/Bibliografia: 'Programming in Scala (3rd edition)

        Martin Odersky, Lex Spoon, Bill Venners

        Artima


        Learning Concurrent Programming in Scala (2nd edition)

        Aleksandar Prokopec

        Packt Publishing


        Learning Spark: Lightning-Fast Big Data Analysis

        Holden Karau, Andy Konwinski, Patrick Wendell, Matei Zaharia

        O’Reilly Modifica'
      Metodi didattici: Lezioni frontali ed esercitazioni.
      Modalità di verifica e valutazione dell'apprendimento: 'Le modalità di verifica
        prevedono un esame scritto composto da domande aperte relative al programma
        del corso ed un progetto che prevede lo consegna di un sistema da sviluppare
        utilizzando le tecniche e le piattaforme discusse a lezione.


        La valutazione finale combinerà le singole valutazioni dando peso 2/3 allo
        scritto e 1/3 al progetto.'
      Strumenti a supporto della didattica: PC e proiettore.
      Orario di ricevimento: Consulta il sito web di Gianluigi Zavattaro (https://www.unibo.it/sitoweb/gianluigi.zavattaro)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/479058
    title: 2025/2026 Scalable and Cloud Programming — University of Bologna
    contents:
      Learning outcomes: "At the end of the course the students will know:\n\n- the\
        \ main problems concerning the realization of highly parallel and distributed\
        \ programs:\n- a programming style, based on functional and object-oriented\
        \ programming, useful to develop scalable applications, namely applications\
        \ that can be easily deployed over different computing architectures, with\
        \ different amounts of computing resources.\n  In particular, the students\
        \ will be able to: - develop an application by using the programming language\
        \ Scala and the platform Spark and deploy it on cloud computing systems like\
        \ those provided by Amazon Web Services (AWS) and Google Cloud Platform (GCP)."
      Course contents: 'Analisys of the problems concerning the realization of highly
        concurrent and distributed applications.


        Scalable approaches to the parallelization and distribution of both data and
        processes, like the MapReduce programming model.


        Functional approach to the realization of scalable systems through languages
        and frameworks like Scala and Spark.


        Cloud platforms for the execution of scalable applications like Amazon Web
        Services (AWS) and Google Cloud Platform (GCP).'
      Readings/Bibliography: 'Programming in Scala (3rd edition)

        Martin Odersky, Lex Spoon, Bill Venners

        Artima


        Learning Concurrent Programming in Scala (2nd edition)

        Aleksandar Prokopec

        Packt Publishing


        Learning Spark: Lightning-Fast Big Data Analysis

        Holden Karau, Andy Konwinski, Patrick Wendell, Matei Zaharia

        O’Reilly'
      Teaching methods: Theoretical and practical class lectures.
      Assessment methods: 'The final assessment will be based on two distinct activities,
        a written test composed of open-ended questions about the course contents,
        and a project work consisting of the realization of a system by using the
        techniques and platforms presented during the course lectures.


        The final grade will be obtained by combining the single evaluations assigning
        weight 2/3 to the written test and 1/3 to the project work.'
      Teaching tools: PC and beamer.
      Office hours: See the website of Gianluigi Zavattaro (https://www.unibo.it/sitoweb/gianluigi.zavattaro/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
