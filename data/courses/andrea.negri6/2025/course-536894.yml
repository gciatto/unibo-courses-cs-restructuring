  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/536894
    title: 2025/2026 PROGRAMMAZIONE (CL.A) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente ha una
        competenza di base sulla programmazione mediante linguaggio C e sull'analisi
        di alcuni problemi fondamentali e dei relativi algoritmi risolutori.
      Contenuti: "Il corso di Programmazione è finalizzato a fornire una forte competenza\
        \ sulla programmazione dei calcolatori elettronici. Non sono richiesti prerequisiti\
        \ di tipo informatico. Viene inizialmente fornita una prima descrizione dell'approccio\
        \ algoritmico alla soluzione di problemi mediante computer. Successivamente,\
        \ facendo uso del linguaggio C, di cui viene fornita una descrizione dettagliata\
        \ che prescinde da ogni eventuale competenza pregressa degli studenti, vengono\
        \ analizzati i principali problemi, strutture dati e algoritmi risolutori.\n\
        \nIl linguaggio C\n\nOrganizzazione della memoria, indirizzi, parole, puntatori.\
        \ Tipi di dato. Strutture dati. Il linguaggio C: scopi e caratteristiche.\
        \ La struttura di un programma C, header, dichiarazione, librerie. Puntatori;\
        \ aritmetica sui puntatori. Array e matrici e loro rappresentazione in memoria.\
        \ Strutture dati: liste, pile, code, alberi. Funzioni di libreria e funzioni\
        \ definite dall'utente. Passaggio di parametri. Funzioni ricorsive. Funzioni\
        \ di input/output. Funzioni sui file. Funzioni per la gestione diretta della\
        \ memoria. Funzioni su stringhe.\n\nProgetto ed analisi di algoritmi\n\nTipi\
        \ di dato; specifica algebrica e implementazione: vettori, liste, pile, code,\
        \ alberi.\n\nAlgoritmi con strutture dati: costruzione, ricerca e ordinamento.\n\
        \nStruttura del Corso\n\nIl corso di Programmazione è articolato in due moduli\
        \ distinti, pensati per favorire un apprendimento completo e graduale:\n\n\
        - Modulo 1 – Lezioni Frontali (in aula):\n  Questo modulo si svolge interamente\
        \ in aula e affronta in modo sistematico tutti gli argomenti previsti dal\
        \ programma. Le lezioni frontali guidano gli studenti attraverso i concetti\
        \ teorici fondamentali della programmazione, fornendo le basi necessarie per\
        \ affrontare le esercitazioni pratiche.\n- Modulo 2 – Laboratorio (in presenza):\n\
        \  Il secondo modulo è completamente dedicato alle attività di laboratorio.\
        \ Qui gli studenti hanno l'opportunità di mettere in pratica quanto appreso\
        \ durante le lezioni, sviluppando codice, risolvendo esercizi e lavorando\
        \ su piccoli progetti. L'obiettivo è consolidare le competenze teoriche attraverso\
        \ l’esperienza diretta e guidata."
      Testi/Bibliografia: 'Necessari alla preparazione dell’esame: copia dei lucidi
        usati a lezione e materiale didattico messi a disposizione dal docente sul
        sito dedicato al corso.


        Consigliati:


        - Programmazione in C - Kim N. King - Apogeo, 2009.


        Approfondimenti:


        - Introduction to Algorithms - T. H. Cormen, C. E. Leiserson, R. L. Rivest
        - MIT Press, Cambridge, 1990.'
      Metodi didattici: 'Didattica frontale, esercitazioni in aula, esercitazioni
        in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso lo svolgimento di una prova scritta e di una successiva
        prova orale. La prova scritta, della durata di circa due ore, mira ad accertare
        le abilità acquisite nella programmazione tramite linguaggio C, con l''implementazione
        di algoritmi efficienti, e a verificare l''acquisizione delle conoscenze previste
        dal programma del corso. Durante la prova scritta, lo studente non può avvalersi
        dell''aiuto di libri, appunti o di qualsiasi altro supporto. Per partecipare
        alla prova scritta lo studente iscriversi alla lista dell''appello tramite
        l''applicativo AlmaEsami.


        La valutazione della prova scritta deve risultare almeno sufficiente (i.e.,
        lo studente deve ottenere una valutazione ≥ 18/30) per poter accedere alla
        successiva obbligatoria prova orale. La prova orale, anch''essa valutata in
        trentesimi, mira a verificare l''acquisizione delle conoscenze previste dal
        programma del corso.


        Il voto finale, espresso in trentesimi, tiene conto delle valutazioni ottenute
        nella prova scritta e nella prova orale. Sarà valutata la padronanza dei concetti
        fondamentali e la capacità operativa nell’applicarli. Un punteggio più alto
        sarà assegnato a chi mostrerà una comprensione completa dei contenuti dell’insegnamento,
        sapendo impiegarli con proprietà di linguaggio e autonomia nella risoluzione
        di problemi, anche di natura nuova o non trattati durante le lezioni. Il mancato
        superamento dell’esame potrà invece derivare da una conoscenza parziale o
        inadeguata dei concetti di base, da un uso improprio del linguaggio tecnico,
        o da una scarsa capacità di astrazione e generalizzazione.


        Pur non essendo obbligatoria, la partecipazione attiva alle lezioni e ai laboratori
        è fortemente consigliata, in quanto rappresenta un supporto fondamentale per
        acquisire in modo efficace e graduale i contenuti del corso.'
      Strumenti a supporto della didattica: Tutto il materiale utilizzato durante
        le lezioni frontali e durante le esercitazioni di laboratorio viene reso disponibile
        anche in formato elettronico e raggiungibile sugli spazi di Ateneo dedicati
        al corso.
      Orario di ricevimento: 'Consulta il sito web di Antonella Carbonaro (https://www.unibo.it/sitoweb/antonella.carbonaro)


        Consulta il sito web di Mirko Ravaioli (https://www.unibo.it/sitoweb/mirko.ravaioli)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/536894
    title: 2025/2026 Programming (CL.A) — University of Bologna
    contents:
      Learning outcomes: After completing the course, the student has a strong knowledge
        of programming using C language and the analysis of some fundamental problems
        and related algorithms solvers.
      Course contents: 'The Programming course is designed to provide students with
        strong skills in computer programming. No prior knowledge of computer science
        is required. The course begins with an introduction to the algorithmic approach
        to problem-solving using computers. Then, through the use of the C programming
        language, presented in a detailed and accessible manner, regardless of students’
        previous experience, the course addresses key problems, data structures, and
        algorithms.


        The C Language


        Memory organization, addresses, words, pointers. Data types and data structures.
        C language: goals and features. Structure of a C program: headers, declarations,
        libraries. Pointers and pointer arithmetic. Arrays and matrices and their
        memory representation. Data structures: lists, stacks, queues, trees. Standard
        and user-defined functions. Parameter passing. Recursive functions. Input/output
        functions. File handling functions. Dynamic memory management functions. String
        functions


        Algorithm Design and Analysis


        Data types; algebraic specification and implementation: arrays, lists, stacks,
        queues, trees. Algorithms with data structures: construction, searching, and
        sorting

        Course Structure


        The Programming course is divided into two distinct modules, designed to support
        a complete and progressive learning experience:


        Module 1 – Lectures (in-class)


        This module takes place entirely in the classroom and systematically covers
        all topics in the syllabus. Lectures guide students through the fundamental
        theoretical concepts of programming, providing the foundation needed for hands-on
        practice.


        Module 2 – Laboratory (on-site)


        The second module is fully dedicated to laboratory activities. Here, students
        have the opportunity to apply what they have learned in class by writing code,
        solving exercises, and working on small projects. The goal is to reinforce
        theoretical knowledge through guided, hands-on experience.'
      Readings/Bibliography: 'Required for exam preparation:

        Copies of the lecture slides and the teaching materials provided by the instructor
        on the course website.


        Recommended reading:

        Programming in C – Kim N. King – Apogeo, 2009.


        Further reading:

        Introduction to Algorithms – T. H. Cormen, C. E. Leiserson, R. L. Rivest –
        MIT Press, Cambridge, 1990.'
      Teaching methods: 'Teaching methods:

        Lectures, classroom exercises, and laboratory sessions.


        Given the nature of the activities and the teaching methods adopted, attendance
        to this course requires all students to have previously completed Modules
        1 and 2 of the safety training for study environments, available in e-learning
        format at [https://elearning-sicurezza.unibo.it/ ].'
      Assessment methods: 'Learning assessment is carried out through a written exam
        followed by an oral exam.

        The written exam, lasting approximately two hours, is designed to assess the
        student’s programming skills in the C language, including the implementation
        of efficient algorithms, as well as to verify the acquisition of the knowledge
        covered in the course syllabus. During the written exam, students are not
        allowed to use books, notes, or any other form of assistance. To take the
        written exam, students must register for the exam session through the AlmaEsami
        platform.


        The written exam must receive at least a passing grade (i.e., a score ≥ 18/30)
        in order for the student to be admitted to the mandatory oral exam. The oral
        exam, also graded on a 30-point scale, aims to further verify the student’s
        understanding of the course content.


        The final grade, expressed in thirtieths, is determined by taking into account
        both the written and oral exam results. The evaluation will consider the student’s
        mastery of fundamental concepts and their ability to apply them effectively.
        Higher marks will be awarded to students who demonstrate a thorough understanding
        of all course topics, express ideas with technical precision, and solve problems
        autonomously, including those of a novel or more complex nature not explicitly
        covered in class. Failure to pass the exam may result from an insufficient
        or partial understanding of key concepts, improper use of technical language,
        or inadequate abstraction and generalization skills.


        Although not mandatory, active participation in lectures and laboratory sessions
        is strongly recommended, as it provides essential support for the gradual
        and effective acquisition of the course content.'
      Teaching tools: All materials used during lectures and laboratory exercises
        are also made available in electronic format and can be accessed through the
        University's online platforms dedicated to the course.
      Office hours: 'See the website of Antonella Carbonaro (https://www.unibo.it/sitoweb/antonella.carbonaro/en)


        See the website of Mirko Ravaioli (https://www.unibo.it/sitoweb/mirko.ravaioli/en)'
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
