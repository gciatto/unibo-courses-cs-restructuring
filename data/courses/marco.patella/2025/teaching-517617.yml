syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517617
    title: 2025/2026 TECNOLOGIE E SISTEMI PER LA GESTIONE DI BASI DI DATI E BIG DATA
      M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente ha una
        conoscenza approfondita dei principi realizzativi dei sistemi di gestione
        di basi di dati, sia dal punto di vista concettuale che dal punto di vista
        tecnologico. In

        particolare: conosce l''architettura di un DBMS; possiede un''avanzata abilità
        nella progettazione fisica di un DB relazionale, conoscendo a fondo le differenti
        tecnologie utilizzate nella risoluzione delle interrogazioni; è in grado di
        applicare paradigmi alternativi di interrogazione dei dati; conosce i diversi
        modelli di dati utilizzati nei sistemi Big Data (NoSQL).'
      Contenuti: "L'allievo che accede a questo insegnamento conosce i modelli e degli\
        \ strumenti per l'organizzazione e la gestione e il progetto di basi di dati\
        \ relazionali. Tali conoscenze sono acquisite, di norma, superando l'esame\
        \ di \"Sistemi Informativi T\" della laurea in Ingegneria Informatica.\n\n\
        1. Architettura di un DBMS\n  Principali moduli e loro ruolo.\n2. Il Data\
        \ Base fisico Gestione della memoria: dispositivi, pagine e file. Rappresentazione\
        \ di attributi e tuple. Lettura e scrittura di pagine: il buffer manager.\
        \ Tipi di file. Valutazione dei costi di alcune operazioni di base sui file.\n\
        3. Indici mono-dimensionali\n  Tipi di indici. Indici ad albero: Il B-tree\
        \ e il B+-tree. Indici hash: hash statico, hash dinamico.\n4. Dati e indici\
        \ multi-dimensionali (spaziali)\n  Interrogazioni spaziali. Indici per punti\
        \ (k-D e k-D-B-tree), indici per oggetti estesi (R-tree), GiST.\n5. Implementazione\
        \ degli operatori relazionali\n  Operatori logici e operatori fisici: sort\
        \ (sort-merge esterno a Z vie), selezione (sequenziale, con indice, con più\
        \ indici), proiezione (sort-based, hash-based, con indice), join (nested loops,\
        \ block nested loops, merge scan, hash join), operatori insiemistici (unione\
        \ e differenza), operatori di aggregazione.\n6. Elaborazione di interrogazioni\n\
        \  Passi del processo di elaborazione. Check semantici e uso dei cataloghi.\
        \ Riscrittura di interrogazioni SQL. Profili statistici: valori medi e istogrammi.\
        \ Stima dei costi e della dimensione dei risultati. Piani di accesso: valutazione\
        \ per materializzazione e in pipeline. Il processo di ottimizzazione: enumerazione\
        \ dei piani di accesso e regole di dominazione. Determinazione del piano ottimale\
        \ mediante programmazione dinamica.\n7. Gestione delle transazioni\n  Controllo\
        \ della concorrenza: tipi di problemi, lock e protocollo Strict 2PL. Protezione\
        \ dai guasti: log file, protocollo WAL, gestione del buffer e del commit,\
        \ checkpoint e DB dump.\n8. Progettazione fisica di Basi di Dati\n  Carico\
        \ di lavoro, selezione degli indici. Tuning delle prestazioni (indici, schema\
        \ e interrogazioni).\n9. Ranking dei risultati\n  Motivazioni e limiti delle\
        \ soluzioni sinora viste per interrogazioni Top-k. Estensione di SQL per il\
        \ ranking dei risultati.\n  Interrogazioni Top-k mono- e multi-dimensionali:\
        \ spazio degli attributi, pesatura degli attributi, funzioni distanza, valutazione\
        \ mediante B+-tree e suoi limiti.\n  Algoritmi basati su R-tree: k nearest\
        \ neighbor e distance browsing. Interrogazioni Top-k di join: modalità di\
        \ accesso sorted e random, funzioni di scoring, relazioni con le funzioni\
        \ distanza. Algoritmi B0, FA, TA, CA e NRA.\n10. Interrogazioni Skyline\n\
        \  Concetto di dominazione, relazione con le funzioni di scoring, algoritmi\
        \ senza indice (NL, BNL, SFS, SaLSa) e con indice (BBS).\n11. Big Data & NoSQL\
        \ DBMS\n  Hadoop e il paradigma MapReduce. Modelli di dati alternativi al\
        \ relazionale. Il teorema CAP."
      Testi/Bibliografia: "I seguenti testi sono consigliati per approfondimenti sui\
        \ contenuti del corso:\n\n- P. Ciaccia, D. Maio: Lezioni di Basi di Dati,\
        \ Esculapio\n- A. Albano: Costruire Sistemi per Basi di Dati, Addison-Wesley\n\
        - R. Ramakrishnan, J. Gehrke: Database Management Systems,\n  McGraw-Hill\n\
        - P. Lewis, A. Bernstein, M. Kifer: Databases and Transaction\n  Processing,\
        \ Addison-Wesley\n- D.E. Shasha, P. Bonnet: Database Tuning, Morgan Kaufmann"
      Metodi didattici: 'Il corso viene erogato mediante proiezione di slide dal computer
        del docente, in aula.


        Tutte le lezioni sono tenute in italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso. Il materiale didattico
        è comunque fornito in lingua inglese.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso un esame finale, che accerta l''acquisizione delle conoscenze
        e delle abilità attese tramite lo svolgimento di una prova orale con entrambi
        i docenti, da svolgersi in un''unica seduta. Il voto finale tiene conto della
        valutazione di entrambi i docenti. La data di svolgimento di tale prova va
        concordata con entrambi i docenti. In caso di appelli numerosi, è possibile
        venga richiesto lo svolgimento di una prova scritta con domande a risposta
        aperta.


        Il superamento dell''esame sarà garantito agli studenti che dimostreranno
        padronanza e capacità operativa in relazione ai concetti chiave illustrati
        nell''insegnamento. Un punteggio più elevato sarà attribuito agli studenti
        che dimostreranno di aver compreso ed essere capaci di utilizzare tutti i
        contenuti dell''insegnamento, illustrandoli con capacità di linguaggio, e
        risolvendo problemi anche complessi non necessariamente incontrati a lezione.
        Il mancato superamento dell''esame potrà essere dovuto all''insufficiente
        conoscenza dei concetti chiave, alla mancata padronanza del linguaggio tecnico,
        alla mancata o insufficiente capacità di astrazione dei concetti.'
      Strumenti a supporto della didattica: Le lezioni in aula verranno svolte utilizzando
        lucidi, con il supporto della lavagna per lo svolgimento di esercizi.
      Link ad altre eventuali informazioni: http://www-db.disi.unibo.it/courses/TBD/
