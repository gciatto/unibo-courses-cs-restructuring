syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/434708
    title: 2025/2026 INGEGNERIA DEL SOFTWARE T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza dei modelli e degli strumenti
        per l'analisi, il progetto, lo sviluppo e il collaudo dei sistemi software.
        Capacità di progetto, sviluppo e collaudo di sistemi software.
      Contenuti: '1. Introduzione all''ingegneria del software; prodotto software.

        2. Processo di sviluppo del software: studio di fattibilità, analisi e specifica
        dei requisiti, analisi del rischio, progettazione, realizzazione e collaudo
        dei moduli, integrazione e collaudo del sistema, utilizzo e manutenzione;
        fattori di qualità del software; modelli dei processi di sviluppo.

        3. Analisi e progettazione orientata agli oggetti: linguaggi di modellazione,
        UML.

        4. Analisi dei requisiti: raccolta dei requisiti e loro validazione, analisi
        del dominio, analisi dei requisiti, casi d''uso e scenari.

        5. Analisi del problema: modello statico, modello dinamico, definizione dell’architettura
        logica del problema.

        6. Progettazione: progettazione dell’architettura del sistema.

        7. Principi di progettazione: rigidità, fragilità e immobilità del software.

        8. Design pattern.

        9. Introduzione al framework .NET e al linguaggio C#.

        10. Sistemi di controllo delle versioni.'
      Testi/Bibliografia: 'I seguenti testi sono consigliati per approfondimenti sui
        contenuti del corso:


        - C. Larman, Applicare UML e i pattern: Analisi e progettazione orientata
        agli oggetti, Pearson

        - E. Gamma, R. Helm, R. Johnson, J. Vlissides, Design Patterns – Elements
        of Reusable Object-Oriented Software, Addison Wesley

        - M. Fowler, UML Distilled, Addison Wesley

        - S. Bennett, J. Skelton, K. Lunn, Introduzione a UML, McGraw-Hill

        - W. Zuser, S. Biffl, T. Grechenig, M. Köhle, Ingegneria del software con
        UML e UnifiedProcess, McGraw-Hill

        - J. Arlow, I. Neustadt, UML e UnifiedProcess – Analisi e progettazione object-oriented,
        McGraw-Hill, 2003

        - I. Sommerville, Ingegneria del software, Pearson

        - R. S. Pressman, Principi di Ingegneria del Software, McGraw-Hill'
      Metodi didattici: 'Il corso viene erogato mediante proiezione di slide dal computer
        del docente, in aula. Le slide sono disponibili sulla pagina web del corso.


        Tutte le lezioni sono tenute in italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale, che accerta l’acquisizione delle conoscenze
        e delle abilità attese tramite lo svolgimento di una prova scritta della durata
        di 1 ora senza l''aiuto di appunti o libri, seguita da un progetto.


        La prova scritta consiste di norma di 3 domande di teoria. Per poter partecipare
        alla prova scritta è necessario iscriversi alla lista dell''appello tramite
        l''applicativo AlmaEsami. Per superare la prova scritta è necessario ottenere
        un punteggio minimo di 6 punti (su 12).


        Il progetto è a tema libero e può essere sviluppato esclusivamente in team
        di 3 persone o singolarmente. Il progetto consiste di una relazione e di una
        presentazione. Il progetto è valutato sufficiente se ottiene un punteggio
        di 10 punti (su 18).


        La relazione dovrà contenere la trattazione completa dell''intero progetto
        (testo e diagrammi UML) a esclusione del prototipo (che deve essere presentato
        al momento della discussione). Saranno valutati principalmente i fattori di
        qualità della documentazione, come completezza, correttezza, coerenza, consistenza
        e navigabilità .


        La presentazione del progetto dovrà essere effettuata mediante slide. Per
        ottenere la sufficienza è necessario un punteggio di almeno 2 (su 4).


        Il superamento di entrambe le prove sarà garantito agli studenti che dimostreranno
        padronanza e capacità operativa in relazione ai concetti chiave illustrati
        nell''insegnamento. Un punteggio più elevato sarà attribuito agli studenti
        che dimostreranno di aver compreso ed essere capaci di utilizzare tutti i
        contenuti dell''insegnamento, illustrandoli con capacità di linguaggio, e
        risolvendo problemi anche complessi non necessariamente incontrati a lezione.
        Il mancato superamento dell''esame potrà essere dovuto all''insufficiente
        conoscenza dei concetti chiave, alla mancata padronanza del linguaggio tecnico,
        alla mancata o insufficiente capacità di astrazione dei concetti.'
      Strumenti a supporto della didattica: 'Le lezioni in aula verranno svolte utilizzando
        lucidi, con il supporto della lavagna per lo svolgimento di esercizi.


        Le (eventuali) esercitazioni in laboratorio consentiranno ad ogni studente
        di disporre di un calcolatore sul quale svolgere l''attività di progettazione
        prevista, sotto la guida di un tutor.'
      Orario di ricevimento: Consulta il sito web di Marco Patella (https://www.unibo.it/sitoweb/marco.patella)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/434708
    title: 2025/2026 Software Engineering T — University of Bologna
    contents:
      Learning outcomes: Knowledge of models and tools for the analysis, design, development,
        and testing of software systems. Ability to design, develop, and test software
        systems.
      Course contents: '1. Introduction to software engineering; software product.

        2. Process of software development: feasibility study, analysis and specification
        of requirements, design, implementation and testing of modules, integration
        and system testing, operation and maintenance, software quality factors, evolutionary
        models.

        3. Object-oriented analysis and design: modeling languages, UML.

        4. Requirement analysis: gathering and validation, domain analysis, requirement
        analysis, use cases and scenarios

        5. Problem analysis: static and dynamic model, definition of the logical architecture
        of the problem.

        6. Design: designing the system architecture.

        7. Principles of design: rigidity, fragility, and immobility of software.

        8. Design patterns.

        9. Introduction to the .NET framework and the C # language.

        10. Version control systems.'
      Readings/Bibliography: 'The following texts are recommended for further information
        on the course contents:


        - C. Larman, Applicare UML e i pattern: Analisi e progettazione orientata
        agli oggetti, Pearson

        - E. Gamma, R. Helm, R. Johnson, J. Vlissides, Design Patterns – Elements
        of Reusable Object-Oriented Software, Addison Wesley

        - M. Fowler, UML Distilled, Addison Wesley

        - S. Bennett, J. Skelton, K. Lunn, Introduzione a UML, McGraw-Hill

        - W. Zuser, S. Biffl, T. Grechenig, M. Köhle, Ingegneria del software con
        UML e UnifiedProcess, McGraw-Hill

        - J. Arlow, I. Neustadt, UML e UnifiedProcess – Analisi e progettazione object-oriented,
        McGraw-Hill, 2003

        - I. Sommerville, Ingegneria del software, Pearson

        - R. S. Pressman, Principi di Ingegneria del Software, McGraw-Hill'
      Teaching methods: 'The course is provided by means of slides displayed during
        lecture hours. Slides are available on the course website.


        Fluent spoken and written italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in italian.'
      Assessment methods: 'Achievements will be assessed by the means of a final exam.
        This is based on an analytical assessment of the "expected learning outcomes"
        described above. In order to properly assess such achievement the examination
        is composed of a written session (1 hour long, without the help of books or
        notes), possibly followed by a project.


        The written exam usually consists of 3 open questions. In order to be accepted
        to the written exam, the student should register through the AlmaEsami application.
        In order to pass the written exam, a minimum score of 6 points (out of 12)
        is needed.


        The project is about a specific theme chosen by the student and can be performed
        either singularly or in a team of 3 students. The project consists in a report
        and a presentation. The project will be evaluated as sufficient if a minimum
        score of 10 points (out of 18) is obtained.


        The report should contain the complete discussion of the whole project (text
        and UML diagrams), but not the prototype (which must be presented at the time
        of the presentation). The quality of the documentation will be evaluated among
        its main factors, such as completeness, correctness, coherence, consistency,
        and navigability.


        The presentation should be performed (by the whole team) by using slides.
        In order to pass the presentation exam, a minimum score of 2 points (out of
        4) is needed.


        To obtain a passing grade in both parts of the exam, students are required
        to at least demonstrate a knowledge of the key concepts of the subject, some
        ability for critical application, and a comprehensible use of technical language.
        Higher grades will be awarded to students who demonstrate an organic understanding
        of the subject, a high ability for critical application, and a clear and concise
        presentation of the contents. A failing grade will be awarded if the student
        shows knowledge gaps in key-concepts of the subject, inappropriate use of
        language, and/or logic failures in the analysis of the subject.'
      Teaching tools: 'Classroom lessons will be held using slides, which will be
        integrated with the use of the blackboard for the development of exercises.


        In case they are present, lab hours are supported by the tutor of the course.
        Students will be assigned a PC, so as to practice the concepts learned during
        the lessons.'
      Office hours: See the website of Marco Patella (https://www.unibo.it/sitoweb/marco.patella/en)
