syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/359894
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'insegnamento lo studente
        possiede le conoscenze e la capacità di comprendere le competenze informatiche
        di base necessarie all'utilizzo dei principali strumenti informatici di uso
        quotidiano, alla gestione dei sistemi informativi dei servizi, all'utilizzo
        della rete nella ricerca, nell'informatica medica, nella telemedicina e nella
        strumentazione biomedica.
      Contenuti: 'Nozioni di base su sistemi operativi e architettura del computer.

        Configurazione e l''uso di un PC connesso ad Internet.

        Fogli elettronici e strumenti per la ricerca su Web.

        Sistemi informativi aziendali, le reti aziendali e l''infrastruttura Web aziendale.

        Basi di dati ed interrogazioni in SQL.


        Verranno inoltre trattati approfondimenti riguardanti i dispositivi medici
        e l''applicazione dell’intelligenza artificiale nel contesto medico e della
        fisioterapia.'
      Testi/Bibliografia: 'Informatica per l''impresa tra soluzioni proprietarie ed
        open source.

        Mauro GASPARI, Gianluigi ROVEDA, Sara ZUPPIROLI

        Bonomo Editore 2023 (Quarta Edizione)


        Materiale aggiuntivo costituito da articoli scientifici indicati durante il
        corso.'
      Metodi didattici: Lezioni frontali e discussione in classe di articoli scientifici
        su temi riguardanti i dispositivi medici e l'applicazione dell’intelligenza
        artificiale nel contesto medico e della fisioterapia.
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto con 3
        esercizi: una query in SQL; un esercizio sui fogli elettronici; un esercizio
        sulle reti con tre domande aperte; una domanda aperta riguardante i dispositivi
        medici e l''applicazione dell’intelligenza artificiale nel contesto medico
        e della fisioterapia.


        La durata dell''esame sarà di un ora. Il voto sarà in 30esimi costituito dalla
        somma dei punti ottenuti nei diversi esercizi.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Lavagna, video proiettore, computer,
      Orario di ricevimento: Consulta il sito web di Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/359894
    title: 2025/2026 Computer Science — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will have acquired
        the knowledge and understanding of the basic IT skills necessary for the use
        of common digital tools, the management of service information systems, and
        the use of the internet in research, medical informatics, telemedicine, and
        biomedical instrumentation.
      Course contents: 'Basic Notions on Operating systems and computer architectures.

        Configuration and use of a PC connected to the Internet.

        Spreadsheets and search engines.

        Firms information systems, networks and Web infrastructure.

        Databases and SQL queries.


        Further insights will also be provided on medical devices and the application
        of artificial intelligence in the medical and physiotherapy context.'
      Readings/Bibliography: 'Informatica per l''impresa tra soluzioni proprietarie
        ed open source.

        Mauro GASPARI, Gianluigi ROVEDA, Sara ZUPPIROLI

        Bonomo Editore 2023 (Fourth Edition)


        Additional material consisting of scientific articles indicated during the
        course.'
      Teaching methods: Lectures and in-class discussions of scientific articles on
        topics related to medical devices and the application of artificial intelligence
        in the medical and physiotherapy contexts.
      Assessment methods: 'Written exam consisting of three exercises: an SQL query;
        an exercise on spreadsheets; an exercise on computer networks with three open-ended
        questions; and one open-ended question on medical devices and the application
        of artificial intelligence in the medical and physiotherapy context.


        The exam will last one hour. The final grade, expressed on a 30-point scale,
        will be the sum of the points obtained in the individual exercises.


        Students with learning disabilities or temporary or permanent disabilities:
        please contact the relevant University office promptly (https://site.unibo.it/studenti-con-disabilita-e-dsa/it).
        The office will advise students of possible adjustments, that will be submitted
        to the professor for approval 15 days in advance. He/she will evaluate their
        suitability also in relation to the academic objectives of the course.'
      Teaching tools: Blackboard, video projector and computer
      Office hours: See the website of Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari/en)
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
