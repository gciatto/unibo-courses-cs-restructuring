        Diapositive e altro materiale, insieme con la registrazione audio delle lezioni,
        sono disponibili sulla piattaforma "Virtuale".'
      Metodi didattici: Il corso è strutturato in lezioni frontali in aula in cui
        vengono presentati gli elementi fondamentali dell'Elettronica. In particolare
        ci si focalizzerà sui circuiti base dell'Elettronica Digitale e loro ruolo
        all'interno di sistemi elettronici odierni. Alla presentazione teorica di
        ogni tema trattato fanno seguito diverse lezioni dedicate alla risoluzione
        di esercizi e problemi specifici che sottolineano la natura applicata della
        disciplina e mirano a far acquisire il metodo per l'analisi e la progettazione
        di semplici circuiti digitali.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale che accerta l’acquisizione delle conoscenze
        e delle abilità attese. La prova d''esame è scritta e della durata di due
        ore.


        La prova scritta consiste di norma in un mix di esercizi e domande di teoria,
        a risposta multipla, con l''obiettivo di verificare l''acquisizione delle
        conoscenze previste secondo quanto dettagliato nel programma del corso. La
        prova è composta da uno o più esercizi/domande per modulo didattico e serve
        a verificare la capacità di analizzare circuiti realizzati con transistor
        MOS, i principali blocchi circuitali che costituiscono la ALU, il funzionamento
        delle memorie a semiconduttore, le tipologie di calcolatori e le loro caratteristiche
        in termini di performance, costo e consumi.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite bacheca
        elettronica, nel rispetto delle scadenze previste. Coloro che non riuscissero
        ad iscriversi entro la data prevista, sono tenuti a comunicare tempestivamente
        (e comunque prima della chiusura ufficiale delle liste di iscrizione) il problema
        alla segreteria didattica. Sarà facoltà del docente ammetterli a sostenere
        la prova.


        E'' possibile prendere visione del compito e chiedere chiarimenti in occasione
        della data di verbalizzazione immediatamente successiva all''appello in cui
        si è sostenuto l''esame. La possibilità di utilizzare orari alternativi di
        ricevimento per prendere visione del compito è riservata a casi eccezionali,
        con una valida motivazione.'
      Strumenti a supporto della didattica: Con l'eccezione di materiale coperto da
        copyright, il materiale didattico presentato a lezione verrà messo a disposizione
        dello studente caricandolo in formato elettronico sulla piattaforma "Virtuale"
        del corso.
      Orario di ricevimento: Consulta il sito web di Davide Brunelli (https://www.unibo.it/sitoweb/davide.brunelli)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/324368
    title: 2025/2026 Electronics T-A — University of Bologna
    contents:
      Learning outcomes: The course aims to provide basic knowledge of manufacturing
        processes, the operation of elementary electronic devices, and analog and
        digital circuit analysis.
      Course contents: "- Recommended Background\n\nA prerequisite for understanding\
        \ the course topics is knowledge of linear electric circuit theory. In particular,\
        \ students should be able to analyze the behavior of linear circuits under\
        \ both steady-state and transient conditions.\n\n- Fundamentals of Electromagnetism\
        \ and Transport Theory\n\nInsulating, conductive, and semiconductor materials.\n\
        \n- Semiconductor Devices\n\np–n junction. MOS transistor. Description of\
        \ the operation of *n-*MOS and *p-*MOS transistors. Operating regions and\
        \ constitutive equations.\n\nCMOS inverter. Operating regions of the transistors,\
        \ calculation of currents, and static input–output characteristics. Power\
        \ consumption. Transient behavior of the CMOS inverter. Calculation of rise\
        \ and fall transition times.\n\nParasitic components of *n-*MOS and *p-*MOS\
        \ transistors: calculation of the input capacitance of the CMOS inverter.\n\
        \nCMOS logic. General characteristics of Pull-Up and Pull-Down networks. Gate\
        \ topologies, analysis, and synthesis of logic functions.\n\nSwitching times\
        \ and sizing of MOS transistors in CMOS logic.\n\n- Signal Theory and Digital\
        \ Processing\n\nAnalog, digital, and binary signals. Analog-to-digital and\
        \ digital-to-analog conversion processes. Digital signal processing. Embedded\
        \ systems, warehouse-scale computers, and data centers. “Non–von Neumann”\
        \ architectures. Topology of electronic systems and computer architectures.\
        \ Major technological and architectural trends. Quantitative principles of\
        \ computer design. Fundamentals of memory hierarchies.\n\n- Binary Number\
        \ System and Logic Gates\n\nBinary and hexadecimal representations. Conversion\
        \ from decimal to binary and from binary to decimal. Operations on binary\
        \ numbers: addition, subtraction, multiplication, division, and two’s complement\
        \ representation.\n\n- Combinatory Circuits\n  Introduction to switching algebra.\
        \ Logic variables and logic expressions. Synthesis of logic functions based\
        \ on canonical forms. Karnaugh maps: adjacency rules and grouping. Coverage\
        \ and normal forms. Network analysis using Karnaugh maps. Examples of combinational\
        \ circuits.\n\n- Sequential Circuits\nBistable circuits.\n\nD-type latches\
        \ and D flip-flops. Examples of sequential circuit implementations. Analysis\
        \ and synthesis of finite state machines. Timing of sequential circuits. Temporal\
        \ parallelism.\n\n- Arithmetic Circuits\nImplementation of a full adder.\n\
        \nOperation of a ripple-carry adder. Subtractor circuits. Operation of multipliers:\
        \ serial ripple-carry multipliers and parallel multipliers.\n\n- Memories\n\
        \nMemory classification: volatile and non-volatile memories. Matrix organization\
        \ with row and column decoders. Operation of the 6-transistor SRAM cell. Read\
        \ and write operations in SRAM. DRAM memory structure. Read and write operations\
        \ of a DRAM cell and associated issues. Introduction to non-volatile memories.\
        \ ROM, PROM, and Flash memories. NOR and NAND array architectures. Operation\
        \ of Flash memory and electron injection into the floating gate.\n\n- Microcontroller-Based\
        \ Systems\n\nMain low-power characteristics of microcontrollers."
      Readings/Bibliography: 'M. Rudan, Tavole di Microelettronica, Pitagora, 3ª Ed.,
