        D. M. Harris, S. L. Harris, Sistemi digitali e architettura dei calcolatori,
        Zanichelli, 2017, ISBN: 9788808920737


        J. M. Rabaey, A. Chandrakasan, B. Nikolic, Circuiti integrati digitali, L’ottica
        del progettista, 2ª Ed, Pearson, 2020.


        A. S. Sedra, K. C. Smith, Circuiti per la Microelettronica, EdiSES, 2019,
        ISBN: 978-88-3319-054-9


        P. Spirito, Elettronica Digitale, McGraw-Hill, 2006.


        F. Fummi, M. Sami, C. Silvano, M. Lora, Progettazione digitale, McGraw-Hill,
        2007.


        https://www.zanichelli.it/ricerca/prodotti/sistemi-digitali-e-architettura-dei-calcolatori


        Diapositive e altro materiale, insieme con la registrazione audio delle lezioni,
        sono disponibili sulla piattaforma "Virtuale".'
      Teaching methods: The course is structured around in-class lectures that present
        the fundamental concepts of Electronics. In particular, the focus is on the
        basic circuits of Digital Electronics and their role within modern electronic
        systems. Each theoretical topic is followed by several sessions devoted to
        the solution of exercises and specific problems, highlighting the applied
        nature of the discipline and aiming to provide students with the methodology
        for the analysis and design of simple digital circuits.
      Assessment methods: 'Assessment of learning outcomes is carried out through
        a final examination aimed at verifying the acquisition of the expected knowledge
        and skills. The examination consists of a written test with a duration of
        two hours.


        The written test typically includes a combination of exercises and theoretical
        questions in multiple-choice format, with the objective of assessing the achievement
        of the learning outcomes specified in the course syllabus. The exam includes
        one or more exercises/questions for each teaching module and is designed to
        evaluate the ability to analyze circuits implemented with MOS transistors,
        the main circuit blocks composing the ALU, the operation of semiconductor
        memories, and the different types of computer systems, including their performance,
        cost, and power consumption characteristics.


        Registration for the examination via the electronic notice board is mandatory
        and must be completed in accordance with the specified deadlines. Students
        who are unable to register by the deadline are required to promptly notify
        the academic office (and in any case before the official closure of the registration
        lists). Admission to the examination in such cases is at the instructor’s
        discretion.


        Students may review their examination paper and request clarifications on
        the occasion of the grade recording session immediately following the exam
        date. Requests to review the examination paper during alternative office hours
        are limited to exceptional cases and must be supported by a valid justification.'
      Teaching tools: With the exception of copyrighted material, the teaching materials
        presented in class will be made available to students by uploading them in
        electronic format to the "Virtuale" platform.
      Office hours: See the website of Davide Brunelli (https://www.unibo.it/sitoweb/davide.brunelli/en)
