  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/324368
    title: 2025/2026 ELETTRONICA T-A — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Il corso si propone di fornire le conoscenze\
        \ di base sui processi di fabbricazione e sul funzionamento dei dispositivi\
        \ elettronici elementari, nonché sull\x92analisi dei circuiti analogici e\
        \ digitali."
      Contenuti: '- Prerequisiti/Propedeuticità consigliate


        Prerequisito per la comprensione degli argomenti svolti sono le nozioni della
        teoria dei circuiti elettrici lineari. In particolare, lo studente dovrebbe
        essere in grado di analizzare il comportamento di un circuito lineare sia
        in condizioni stazionarie che transitorie.


        - Richiami di elettromagnetismo e teoria del trasporto.


        Materiali isolanti, conduttori e semiconduttori.


        - Dispositivi a semiconduttore


        Giunzione p-n. Transistore MOS. Descrizione del funzionamento del transistore
        n-MOS e del transistore p-MOS. Regioni di funzionamento ed equazioni costitutive.


        Invertitore CMOS. Regioni di funzionamento dei transistori, calcolo delle
        correnti e della caratteristica statica ingresso-uscita. Consumo di potenza.
        Comportamento in transitorio dell''invertitore CMOS. Calcolo della durata
        del transitorio di salita e di discesa.


        Componenti parassiti del transistore n-MOS e p-MOS: calcolo della capacità
        d’ingresso dell''invertitore CMOS.


        Logica CMOS. Caratteristiche generali delle reti di Pull-Up e Pull-Down. Topologia
        dei gate, analisi e sintesi delle funzioni logiche.


        Tempi di commutazione e dimensionamento di transistori MOS in logica CMOS.


        - Teoria dei segnali ed elaborazione digitale.


        Segnale analogico, segnale digitale e segnale binario. Processo di conversione
        analogico-digitale e digitale-analogico. Elaborazione digitale. Sistemi embedded,
        warehouse scale computers e datacenters. Architetture «non von Neumann». Topologia
        dei sistemi elettronici e dei calcolatori. Principali trend tecnologici e
        architetturali. I principi quantitativi della progettazione dei calcolatori.
        Basi delle gerarchie delle memorie.


        - Sistema di numerazione binario e porte logiche.


        Rappresentazioni binaria ed esadecimale. Conversione da decimale a binario.
        Conversione da binario a decimale. Operazioni sui numeri binari: addizione,
        sottrazione, moltiplicazione, divisione e complemento a due.


        - Circuiti combinatori.


        Introduzione all‘Algebra di commutazione. Variabili logiche ed espressioni
        logiche. Sintesi di funzioni logiche basata sulle espressioni canoniche. Mappe
        di Karnaugh: regole di adiacenza e raggruppamenti. Copertura ed espressioni
        normali. Analisi di una rete mediante mappe di Karnaugh. Esempi di circuiti
        combinatori.


        - Circuiti sequenziali.


        Circuito bistabile. Latch di tipo D e flip-flop D. Esempi di realizzazione
        di circuiti sequenziali. Analisi e sintesi di macchine a stati finiti. Temporizzazione
        di circuiti sequenziali. Parallelismo temporale.


        - Circuiti Aritmetici.


        Realizzazione di un Full-Adder. Descrizione del funzionamento di un circuito
        sommatore a propagazione del riporto. Circuito sottrattore. Funzionamento
        di un moltiplicatore: moltiplicatore seriale a propagazione del riporto e
        moltiplicatore parallelo.


        - Memorie.


        Classificazione delle memorie: memorie volatili e non volatili. Struttura
        a matrice con decodificatori di riga e colonna. Descrizione del funzionamento
        della cella SRAM a 6 transistori. Lettura e scrittura di una memoria SRAM.
        Struttura della memoria DRAM. Lettura e scrittura di una cella DRAM e problematiche
        annesse. Introduzione alle memorie non volatili. ROM, PROM e memorie Flash.
        Architettura NOR e NAND della matrice. Funzionamento della memoria Flash,
        iniezione di elettroni nel floating gate.


        - Sistemi a Microcontrollore.


        Principali caratteristiche low-power dei microcontrollori.'
