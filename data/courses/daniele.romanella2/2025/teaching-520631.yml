syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/520631
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        una necessaria conoscenza della struttura del calcolatore ed una appropriata
        conoscenza dei linguaggi di programmazione moderni, in particolare di Python.
        Tali conoscenze sono adeguate e sufficienti per affrontare e risolvere semplici
        problemi di natura scientifica mediante la progettazione e l’implementazione
        di idonei algoritmi e strutture dati. L'attività laboratoriale lo introduce
        ai primi esempi di metodi e modelli applicati.
      Contenuti: 'Il corso introduce i concetti principali dell''informatica, del
        problem solving e delle macchine astratte. Si approfondisce poi la programmazione
        in Python, con particolare attenzione a:


        - Macchina python

        - Nomi e loro visibilità

        - Funzioni

        - Oggetti modificabili e non modificabili

        - Tipi di dato base (numeri, stringhe, liste, dizionari, etc..)

        - Tipi di dato astratti (alberi binari)


        Vengono poi presentate alcune classi di algoritmi (es. ordinamento), con cenni
        di complessità computazionale. Vengono discusse le limitazioni dei procedimenti
        effettivi e l''esistenza di problemi non risolubili per via algoritmica.


        E'' prevista attività di laboratorio per comprendere e applicare i concetti
        appresi durante le lezioni.'
      Testi/Bibliografia: 'John V. Guttag: Introduzione alla programmazione con python,
        Egea, 2021 (traduzione italiana ridotta di: Introduction to Computation and
        Programming Using Python Third Edition: With Application to Computational
        Modeling and Understanding Data, MIT Press, 2021)


        Altre letture:


        Allen B. Downey: How to Think Like a Computer Scientist: Learning with Python.
        Online interactive edition: https://runestone.academy/ns/books/published/thinkcspy/index.html


        Allen B. Downey: Think Python 2e, O''Reilly Media, 2012. ISBN 978-1449330729.
        https://greenteapress.com/wp/think-python-2e/


        Jessen Havill: Discovering Computer Science: Interdisciplinary Problems, Principles,
        and Python Programming. Chapman and Hall/CRC. ISBN 9781482254143'
      Metodi didattici: Lezioni in aula ed esercizi di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: Il corso prevede lo svolgimento
        di un progetto individuale o di gruppo relativo alla realizzazione di un'applicazione
        python e nella discussione delle scelte progettuali e di realizzazione di
        questo in una sessione di esame orale. Durante la sessione orale, inoltre,
        il docente si accerterà, tramite domande specifiche, che lo studente abbia
        interiorizzato i concetti discussi nel corso.
      Strumenti a supporto della didattica: Tutte le informazioni e il materiale sul
        corso saranno reperibili, durante il corso, sulla piattaforma virtuale.unibo.it.
      Orario di ricevimento: Consulta il sito web di Paolo Felli (https://www.unibo.it/sitoweb/paolo.felli)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/520631
    title: 2025/2026 INFORMATICA — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student possesses necessary
        knowledge of computer structure and appropriate familiarity with modern programming
        languages, particularly Python. Such knowledge is adequate and sufficient
        to address and solve simple scientific problems through the design and implementation
        of suitable algorithms and data structures. Laboratory activities introduce
        them to initial examples of applied methods and models.
      Course contents: 'The course introduces the main concepts of computer science,
        problem-solving, and abstract machines. It then delves into programming in
        Python, with particular attention to:


        - The Python machine

        - Names and their visibility

        - Functions

        - Modifiable and non-modifiable objects

        - Basic data types (numbers, strings, lists, dictionaries, etc.)

        - Abstract data types (binary trees)


        Furthermore, the course presents some classes of algorithms (e.g., sorting)
        with an overview of computational complexity. It discusses the limitations
        of effective procedures and the existence of problems that are unsolvable
        algorithmically.


        Laboratory activity is included, to support students in understanding and
        applying the concepts learned during the lessons.'
      Readings/Bibliography: 'John V. Guttag: Introduzione alla programmazione con
        python, Egea, 2021 (traduzione italiana ridotta di: Introduction to Computation
        and Programming Using Python Third Edition: With Application to Computational
        Modeling and Understanding Data, MIT Press, 2021)


        Further readings:


        Allen B. Downey: How to Think Like a Computer Scientist: Learning with Python.
        Online interactive edition: https://runestone.academy/ns/books/published/thinkcspy/index.html


        Allen B. Downey: Think Python 2e, O''Reilly Media, 2012. ISBN 978-1449330729.
        https://greenteapress.com/wp/think-python-2e/


        Jessen Havill: Discovering Computer Science: Interdisciplinary Problems, Principles,
        and Python Programming. Chapman and Hall/CRC. ISBN 9781482254143'
      Teaching methods: Lectures and laboratory exercises.
      Assessment methods: The course includes the completion of an individual or group
        project related to the development of a Python application. This project will
        be discussed, along with the design and implementation choices, during an
        oral exam session. During the oral session, the instructor will also verify
        the student's understanding of the discussed concepts through specific questions.
      Teaching tools: Slides and teaching material will be made available on virtuale.unibo.it.
      Office hours: See the website of Paolo Felli (https://www.unibo.it/sitoweb/paolo.felli/en)
