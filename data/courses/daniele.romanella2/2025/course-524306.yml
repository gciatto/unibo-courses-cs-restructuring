syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/524306
    title: 2025/2026 ARCHITETTURA DEGLI ELABORATORI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        l'architettura di base di un calcolatore, le reti combinatorie e sequenziali,
        e le regole di corrispondenza tra assembler ed un linguaggio ad alto livello.
        È in grado di progettare semplici reti combinatorie e di scrivere codice in
        un linguaggio assembler
      Contenuti: Organizzazione dei sistemi di calcolo. Rappresentazione dell'informazione.
        Reti logiche, algebra di Boole, reti combinatorie, reti sequenziali. Memorie,
        CPU e bus. Il livello ISA e la programmazione Assembly. Cenni sul sistema
        operativo. Legame fra linguaggi di programmazione ad alto livello ed i livelli
        architetturali sottostanti.
      Testi/Bibliografia: 'Non è necessario l''acquisto di testi specifici. Materiale
        didattico aggiornato e'' reperibile tramite il sito Virtuale.


        Per approfondimenti è consigliato: Andrew S. Tanenbaum - Todd Austin. Architettura
        dei calcolatori 6/Ed. Un approccio strutturato. Pearson. 2013.


        Il testo è anche consigliato per studenti non frequentanti.'
      Metodi didattici: 'Lezioni frontali e attivita'' di laboratorio basata sul progetto
        nand2tetris (https://www.nand2tetris.org/). La parte di laboratorio verra''
        effettuata dagli studenti usando i propri computer personali.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste di
        una prova scritta (comprendente sia domande teoriche aperte che esercizi)
        e di un progetto facoltativo che consiste nella realizzazione, in ambiente
        virtuale, di un processore e del relativo linguaggio Assembly. Il progetto,
        da svolgere individualmente, prevede diverse scadenze, sia durante il corso
        che dopo la sua conclusione. La prova scritta vale da 0 a 27 punti, il progetto
        da 0 a 6 punti. Un punto bonus puo'' essere ottenuto dalla partecipazione
        attiva alle lezioni. Il voto finale e'' dato dalla somma del voto della prova
        scritta e del progetto.


        Al momento i regolamenti prevedono solo esami in presenza. Se cambiamenti
        dei regolamenti consentiranno l''esame online allora le domande teoriche verranno
        tolte dallo scritto e discusse in una prova orale dopo la valutazione dello
        scritto.'
      Strumenti a supporto della didattica: 'Il materiale didattico e'' presente sul
        sito Virtuale. Ad inizio anno e'' presente una versione preliminare del materiale
        didattico, che potrebbe essere leggermente raffinato man mano che gli argomenti
        vengono presentati.


        Per la parte di progetto verrà usata la suite nand2tetris:


        https://www.nand2tetris.org/'
      Orario di ricevimento: 'Consulta il sito web di Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese)


        Consulta il sito web di Paolo Felli (https://www.unibo.it/sitoweb/paolo.felli)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/524306
    title: 2025/2026 Computer Architecture — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the basic architecture
        of a computer, combinatorial and sequential networks, and the correspondence
        between assembly and high-level languages. The student is able to design simple
        combinational and sequential circuits and write assembly code.
      Course contents: Organisation of computer systems. Binary representation of
        information. Boolean algebra, Logic Gates, Combinational circuits, Sequential
        circuits. Memory, CPU and Bus. The ISA level and assembly programming. Hints
        on operating systems. Mapping from high-level programming languages to lower
        architectural levels.
      Readings/Bibliography: 'No specific book is required. Updated teaching material
        is available through the Virtuale website.


        For further information we suggest: Andrew S. Tanenbaum - Todd Austin. Structured
        Computer Organization 6th edition. Pearson. 2013.


        The book is also recommended for students who are not attending the lessons.'
      Teaching methods: 'Frontal lessons and laboratory activity based on the nand2tetris
        project (https://www.nand2tetris.org/). The laboratory part will be done by
        students using their own computers.


        In relation to the kind of activities and didactical methods adopted, the
        attendance to this class will require the preliminary participation of all
        the students to the Modules 1 and 2 of the Safety rules on study places, which
        can be followed remotely in e-learning via the following link: https://elearning-sicurezza.unibo.it/'
      Assessment methods: 'The exam consists of a written test (including both open
        theoretical questions and exercises) and a design project consisting of the
        (virtual) realization of a processor and its assembly language. The project,
        to be carried our individually, includes different deadlines, both during
        the course and after its end. The written test is worth from 0 to 27 points,
        the project from 0 to 6 points. A bonus point could be obtained by active
        participation to classes. The final mark is given by the sum of the mark of
        the written test and of the project.


        At the moment rules allow for in presence exams only. In case changes in the
        rules will allow for online exams then the theoretical questions will be removed
        from the written test and discussed in an oral test after the evaluation of
        the written test.'
      Teaching tools: 'The teaching material is available on the Virtuale website.
        At the beginning of the course a preliminary version of the teaching material
        is available, it may be slightly refined as the different topics are presented.


        For the project part we will use the nand2tetris suite:


        https://www.nand2tetris.org/'
      Office hours: 'See the website of Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese/en)


        See the website of Paolo Felli (https://www.unibo.it/sitoweb/paolo.felli/en)'
