  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/423208
    title: 2025/2026 INFORMATICA UMANISTICA (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso si propone di fornire le basi teoriche
        per la comprensione dei metodi di rappresentazione digitale dell'informazione
        e di elaborazione automatica dei dati nel campo delle discipline umanistiche.
        Il corso si propone altresì di addestrare lo studente all'uso degli strumenti
        informatici applicati alla ricerca umanistica e alla realizzazione di risorse
        digitali accessibili in rete, sia singolarmente, sia depositate in archivi
        e raccolte organizzate. Lo studio delle materie trattate dovrebbe condurre
        all'acquisizione di conoscenze di base sui principi fondamentali riguardanti
        il funzionamento del computer e delle reti; l'elaborazione dell'informazione;
        la codifica e l'analisi del testo; l'edizione e la pubblicazione digitale
        di opere manoscritte e a stampa. Inoltre, l'attività pratica di laboratorio
        dovrebbe dotare lo studente delle abilità necessarie alla gestione e alla
        produzione diretta di risorse digitali.
      Contenuti: 'Il corso mira a fornire agli studenti una comprensione di base della
        programmazione informatica e gli strumenti per la codifica, analisi ed archiviazione
        di testi in formato digitale. Al termine, gli studenti possederanno le competenze
        necessarie per progettare, realizzare e testare un piccolo sistema software
        in grado di manipolare testi utilizzando un linguaggio di alto livello con
        programmazione orientata agli oggetti (i.e., Python).


        Contenuti:


        - concetti fondamentali per il trattamento dell'' informazione in formato
        digitale (quali numeri interi e floating point, stringhe, assegnazioni, variabili,
        librerie, liste e file);

        - costrutti base della programmazione, inclusa esecuzione sequenziale e selettiva,
        cicli, funzioni e classi di oggetti (definite dall''utente);

        - principi e tecniche fondamentali per l''elaborazione dell''informazione
        (inclusi il controllo condizionale ed iterativo, la manipolazione di stringhe,
        e la creazione ed edizione automatica di documenti di testo).


        Gli studenti che completano con successo questo corso saranno in grado di
        progettare e implementare piccoli (ma completi) programmi interattivi che
        utilizzano semplici strutture di controllo; usando anche concetti di programmazione
        ad oggetti, saranno in grado di produrre, analizzare, manipolare ed archiviare
        testi ed altre risorse in formato digitale.'
      Testi/Bibliografia: 'Allen B. Downey: “Think Python: How to think like a Computer
        Scientist”, Green Tea Press, 2015 (Seconda Ed.).


        John Zelle: “Python programming: an introduction to Computer Science”. Franklin,
        Beedle & Associates Inc., 2010 (Seconda Ed.)


        Charles Dierbach: “Introduction to Computer Science Using Python: a computational
        problem-solving focus”. John Wiley & Sons, 2013'
      Metodi didattici: Il corso si svolgerà in lezioni di teoria frontali (2 ore
        ciascuna), complementate, ogni settimana, da 2 ore di esercitazioni pratiche
        di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione finale
        si basera'' su due componenti:


        - un "Mini-progetto" individuale (un piccolo sistema software il cui tema
        specifico verra'' assegnato durante il corso) da consegnare sulle pagine di
        "Virtuale" (QUI (https://virtuale.unibo.it/course/view.php?id=79192)), e

        - una valutazione orale (in presenza).


        NB: La parte orale dell’esame non può essere sostenuta in assenza della preventiva
        consegna del Mini-progetto.


        Le persone con disabilità o disturbi specifici dell’apprendimento hanno diritto
        a speciali adattamenti in relazione alla loro condizione, previa valutazione
        del Servizio d’ateneo per le studentesse e gli studenti con disabilità e DSA.
        Si prega di non rivolgersi al/la docente, ma di contattare il Servizio per
        un appuntamento. Sarà cura del Servizio stabilire quali adattamenti si rendono
        opportuni. Maggiori informazioni alla pagina:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Strumenti a supporto della didattica: 'Oltre alle strutture didattiche installate
        nel laboratorio, il corso fara'' ampio uso della versione interattiva del
        libro di testo di Downey:


        Allen B. Downey, Jeffrey Elkner & Chris Meyers: “How to think like a Computer
        Scientist – Interactive Edition”, Green Tea Press, 2002


        , disponibile (gratuitamente) QUI (https://runestone.academy/ns/books/published/thinkcspy/index.html).'
      Orario di ricevimento: Consulta il sito web di Massimiliano Garagnani (https://www.unibo.it/sitoweb/massimiliano.garagnani)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/423208
    title: 2025/2026 Humanistic IT (1) — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student understands the concept
        of information and knows the methods of digital representation and the systems
        of automatic data processing in the field of humanities; he/she possesses
        theoretical knowledge, methodological skills and techniques to represent and
        process humanistic data.
      Course contents: 'The course aims to provide students with a basic understanding
        of computer programming and the tools for encoding, analyzing, and storing
        texts in digital format. Upon completion, students will have the skills necessary
        to design, develop, and test a small software system capable of manipulating
        text using a high-level, object-oriented programming language (i.e., Python).


        Contents:


        - fundamental concepts of digital information processing (including integers
        and floating-point numbers, strings, assignments, variables, libraries, lists
        and files);

        - basic programming constructs, such as sequential and selective execution,
        loops, user-defined functions and classes;

        - fundamental principles and techniques of information processing (including
        conditional and iterative control, string manipulation, and creation and automated
        processing of text documents).


        Students who successfully complete this course will be able to design and
        implement small (but complete) interactive programs that use basic control
        structures; drawing also upon object-oriented programming concepts, they''ll
        be able to produce, analyze, modify, and store texts and other resources in
        digital format.'
      Readings/Bibliography: 'Allen B. Downey: “Think Python: How to think like a
        Computer Scientist”, Green Tea Press, 2015 (Second Ed.).


        John Zelle: “Python programming: an introduction to Computer Science”. Franklin,
        Beedle & Associates Inc., 2010 (Second Ed.)


        Charles Dierbach: “Introduction to Computer Science Using Python: a computational
        problem-solving focus”. John Wiley & Sons, 2013'
      Teaching methods: The course will consist of face-to-face lectures (2 hours
        each), complemented each week by 2 hours of hands-on laboratory sessions.
      Assessment methods: 'The assessment will be based on two components:


        - an individual “Mini-project” (a small software system whose requirements
        will be specified during the course) to be submitted on the "Virtuale" pages
        (HERE (https://virtuale.unibo.it/course/view.php?id=79192)), and

        - an oral assessment (in person).


        NB: The oral part of the exam cannot be taken without prior submission of
        the Mini-project.


        Students with disabilities or specific learning disorders (DSA) are entitled
        to special accommodations according to their condition, following evaluation
        by the University Service for Students with Disabilities and DSA.

        Please do not contact the course coordinator directly, but get in touch with
        the Service to schedule an appointment. The Service will determine which accommodations
        - if any - are appropriate.


        More information available at:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Teaching tools: 'Besides the teaching facilities available in the laboratory,
        the course will make heavy use of the interactive version of Downey''s textbook:


        Allen B. Downey, Jeffrey Elkner & Chris Meyers, "How to Think Like a Computer
        Scientist – Interactive Edition", Green Tea Press, 2002


        , available free of cost HERE (https://runestone.academy/ns/books/published/thinkcspy/index.html).'
      Office hours: See the website of Massimiliano Garagnani (https://www.unibo.it/sitoweb/massimiliano.garagnani/en)
