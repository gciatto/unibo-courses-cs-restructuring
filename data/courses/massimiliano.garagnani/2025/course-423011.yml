syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/423011
    title: 2025/2026 LOGICA PER L'INFORMATICA (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        il linguaggio del calcolo proposizionale e della logica del prim'ordine. È
        in grado di scrivere e comprendere proposizioni logiche e di verificarne la
        validità.
      Contenuti: 'La prima parte del corso coprira’ concetti e formalismi del calcolo
        proposizionale, logica del sillogismo, e logica dei predicati / del prim''ordine.


        Sulla base di queste nozioni, la seconda parte introdurrà brevemente i concetti
        fondamentali di informazione, entropia e calcolabilita'' (Macchine di Turing),
        nonché tecniche di rappresentazione della conoscenza nell’ambito del ragionamento
        automatico.


        Nella terza ed ultima parte, verranno trattate la logica modale / epistemica
        e la logica dell’azione ("action logic"), per arrivare ai costrutti fondamentali
        della programmazione imperativa.


        Durante i laboratori, si utilizzeranno alcune piattaforme computazionali per
        apprendere, testare ed applicare i concetti teorici appresi in aula.'
      Testi/Bibliografia: 'Il seguente libro di testo puo'' essere utilizzato come
        riferimento generico per il corso:


        - Joan van Benthem et al. (2016) "Logic in Action" (Nuova Edizione)


        disponibile QUI (https://virtuale.unibo.it/mod/resource/view.php?id=2313926)
        (in particolare, i Capitoli 2-6).


        Materiale didattico aggiuntivo (inclusivo di slides ed esercizi) sarà reso
        disponibile sul sito (Virtuale) del corso.'
      Metodi didattici: 'Il corso si svolgerà in lezioni di teoria frontali (2 ore
        ciascuna) complementate da esercitazioni settimanali in laboratorio, volte
        a mettere in pratica e consolidare le nozioni apprese in classe.


        La frequenza alle lezioni ed ai laboratori è fortemente consigliata.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consisterà
        in una prova scritta di 2 ore, comprendente 10 domande (5 a risposta multipla
        e 5 esercizi pratici) su concetti e metodi trattati durante il corso.


        La prova scritta si svolgerà senza la possibilità di consultare libri, appunti,
        o strumenti digitali, pena l''annullamento della prova.


        In ciascuna delle 10 domande della prova è possibile ottenere da 0 ad un massimo
        di 3 punti; sommati, i punti ottenuti contribuiscono alla formazione del voto
        finale. La prova è superata con un punteggio minimo di 18 punti.


        Persone con disabilità e DSA


        Le persone con disabilità o disturbi specifici dell’apprendimento hanno diritto
        a speciali adattamenti in relazione alla loro condizione, previa valutazione
        del Servizio d’ateneo per le studentesse e gli studenti con disabilità e DSA.

        Si prega di non rivolgersi al/la docente, ma di contattare il Servizio per
        un appuntamento. Sarà cura del Servizio stabilire quali adattamenti si rendono
        opportuni. Maggiori informazioni alla pagina:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Strumenti a supporto della didattica: Eventuali strumenti di supporto alla didattica
        (slide e altri materiali di approfondimento) saranno resi disponibili sulla
        piattaforma Virtuale (https://virtuale.unibo.it/course/view.php?id=79193).
      Orario di ricevimento: Consulta il sito web di Massimiliano Garagnani (https://www.unibo.it/sitoweb/massimiliano.garagnani)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/423011
    title: 2025/2026 Logic for Informatics (1) — University of Bologna
    contents:
      Learning outcomes: The student will know propositional calculus and first order
        logic. He will be able to write and understand logical propositions and to
        verify them.
      Course contents: 'The first part of the course will cover concepts and formalisms
        of propositional calculus, syllogistic logic, and predicate/first-order logic.


        Based on these notions, the second part will briefly introduce the fundamental
        concepts of information, entropy, and computability (Turing machines), and
        knowledge representation techniques in the context of automated reasoning.


        In the third and final part, modal/epistemic logic and action logic will be
        covered, leading up to the fundamental constructs of imperative programming.


        During the lab sessions, specific computational platforms will be used to
        learn, test, and apply the theoretical concepts covered in class.'
      Readings/Bibliography: 'The following textbook can be used as a general reference
        for the course:


        - Joan van Benthem et al. (2016) "Logic in Action" (New edition)


        available HERE (https://virtuale.unibo.it/mod/resource/view.php?id=2313926)
        (in particular, Chapters 2-6).


        Additional educational materials (including slides and exercises) will be
        made available on the "Virtuale" web-pages of the course.'
      Teaching methods: 'The course will be delivered as theory lectures (2 hours
        each) complemented by weekly laboratory exercises, aimed at putting into practice
        and consolidating the concepts learned in class.


        Regular attendance in classes and labs is highly recommended.'
      Assessment methods: 'The exam will consist of a two-hour written test, comprising
        10 questions (5 multiple-choice and 5 practical exercises) on concepts and
        methods covered during the course.


        During the test, consulting books, notes, or digital devices will not be permitted;
        any violation will result in the exam being voided.


        Each of the 10 questions can earn from 0 up to 3 points; the final grade is
        obtained by adding together all the points thus obtained. The minimum score
        required for passing is 18 points.


        Students with disabilities or DSA


        Students with disabilities or specific learning disorders (DSA) are entitled
        to special accommodations according to their condition, following evaluation
        by the University Service for Students with Disabilities and DSA.

        Please do not contact the course coordinator directly, but get in touch with
        the Service to schedule an appointment. The Service will determine which accommodations
        - if any - are appropriate.


        More information available at:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Teaching tools: Any additional teaching materials (slides and other supplementary
        materials) will be made available on the Virtuale (https://virtuale.unibo.it/course/view.php?id=79193)
        platform.
      Office hours: See the website of Massimiliano Garagnani (https://www.unibo.it/sitoweb/massimiliano.garagnani/en)
