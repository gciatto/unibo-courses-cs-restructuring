    title: 2025/2026 ELECTRONIC SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: l corso si propone di fornire agli studenti
        gli strumenti per conoscere e comprendere gli elementi fondamentali sulla
        base dei quali operano i sistemi elettronici in uso in ambito automotive.
        La finalità non è quella di formare progettisti elettronici, quanto di offrire
        una competenza larga e di base sul funzionamento dei sistemi elettronici,
        ovvero sviluppare la capacità di lavorare all’interno di team interdisciplinari
        che comprendano anche progettisti elettronici ed esperti di tecnologie dell’informazione.
      Contenuti: "- Introduzione\n  \n  - panoramica sul sensing, sul condizionamento\
        \ del segnale, sull’elaborazione dell’informazione e sull’attuazione. Struttura\
        \ dei sistemi elettronici interfacciati con componenti meccaniche. Richiami\
        \ essenziali di teoria dei circuiti.\n- Gli ingredienti\n  \n  - nozioni di\
        \ base sui componenti elettrici e i dispositivi elettronici. Utilizzo dei\
        \ transistor sia come interruttori sia come regolatori continui. Introduzione\
        \ alle tecnologie impiegate nella realizzazione di sensori e trasduttori.\n\
        - Sistemi digitali\n  \n  - fondamenti di reti logiche; segnali digitali;\
        \ reti combinatorie e sequenziali; famiglie logiche; rappresentazione numerica;\
        \ blocchi funzionali fondamentali. ALU e microcontrollori. Introduzione a\
        \ PLA e FPGA.\n- Sistemi analogici\n  \n  - amplificatori operazionali, circuiti\
        \ statici ad amplificatore operazionale, filtri elementari e tecniche di base\
        \ per il condizionamento del segnale.\n- Acquisizione dati e rappresentazione\
        \ dell’informazione\n  \n  - conversione analogico-digitale (A/D) e digitale-analogica\
        \ (D/A).\n- Time encoding\n  \n  - conversioni tensione/frequenza (V/F) e\
        \ frequenza/tensione (F/V); tecniche di modulazione a larghezza di impulso\
        \ e a densità di impulso.\n- Cenni su attuazione e conversione di potenza\n\
        \  \n  - ulteriori approfondimenti sulla regolazione continua e sulla regolazione\
        \ a commutazione.\n\nNota: lievi variazioni nei contenuti sono possibili in\
        \ funzione delle conoscenze pregresse degli studenti, di eventuali circostanze\
        \ impreviste e dei feedback ricevuti. In particolare, gli ultimi due argomenti\
        \ potrebbero non essere trattati ogni anno."
      Testi/Bibliografia: '- A. Smaili, F. Mrad, “Applied Mechatronics”, Oxford University
        Press, 2008

        - Neil Storey, “Electronics: A Systems Approach”, Ed. Pearson, 6th Edition,
        2017

        - Robert Spence, “Introductory Circuits”, Ed. Wiley, 2008

        - W. Ribbens, “Understanding automotive electronics: an engineering perspective”,
        Elsevier, 8th Edition, 2017

        - Uwe Kiencke, Lars Nielsen, “Automotive Control Systems: For Engine, Driveline,
        and Vehicle”, Springer, 2nd Edition, 2010'
      Metodi didattici: L'insegnamento si articola in lezioni frontali teoriche, svolte
        sia alla lavagna sia con il supporto di diapositive. Alcune lezioni saranno
        dedicate a esercizi, esempi e casi di studio, presentati anch'essi alla lavagna
        oppure attraverso dimostrazioni che potranno fare uso di strumenti di calcolo
        numerico (ad esempio MATLAB), ambienti grafici per la programmazione e la
        simulazione di sistemi dinamici multidominio (come Simulink), o simulatori
        circuitali (come SPICE o Digital Logic Designer). Le diapositive del corso
        saranno messe a disposizione degli studenti, così come eventuali codici associati
        agli esempi, alle dimostrazioni e ai casi di studio.
      Modalità di verifica e valutazione dell'apprendimento: "La valutazione dell’apprendimento\
        \ si articola in una prova scritta seguita da una prova orale.\n\n- Prova\
        \ scritta\n  \n  - comprende esercizi mirati a verificare sia la comprensione\
        \ dei contenuti del corso, con particolare attenzione agli aspetti applicativi,\
        \ sia la padronanza pratica degli strumenti di analisi e progettazione. È\
        \ di norma suddivisa in due sezioni: una dedicata ai sistemi digitali e una\
        \ ai circuiti analogici per il condizionamento del segnale.\n- Prova orale\n\
        \  \n  - integra la prova scritta approfondendo gli aspetti teorici del corso.\n\
        \nL’accesso alla prova orale è consentito solo dopo il superamento della prova\
        \ scritta, e le due prove devono essere sostenute nello stesso appello."
      Strumenti a supporto della didattica: 'Il corso fa uso dei seguenti strumenti:


        - Videoproiettore e diapositive

        - Lavagna

        - Dimostrazioni del docente con ambienti di calcolo numerico e di simulazione
        di sistema e circuitale


        Tutto il materiale usato viene messo a disposizione degli studenti tramite
        il “Moodle” dell''Università.'
