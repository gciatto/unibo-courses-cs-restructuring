  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/384683
    title: 2025/2026 ELETTRONICA PER L'ELABORAZIONE ANALOGICA DEL SEGNALE LM — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente possiede
        conoscenze utili al progetto di moduli e sistemi elettronici analogici per
        la sintesi e l''elaborazione del segnale. In particolare:


        - Possiede competenze utili a progettare una varietà di moduli di sintesi
        di segnale, quali oscillatori sinusoidali e a rilassamento, generatori per
        alcune classi di forme d''onda complesse e aperiodiche, oscillatori a cristallo,
        temporizzatori e monostabili;

        - È in grado di progettare moduli per l''elaborazione del segnale con approccio
        tempo-continuo e tempo-discreto e in particolare sa progettare sistemi analogici
        a capacità e a correnti commutate;

        - Possiede elementi per la sintesi di segnali discreti nei livelli, utili
        per: il controllo di potenza ad elevata efficienza energetica; come rappresentazione
        intermedia nella conversione di formato; in sistemi di sintesi di frequenza
        quali PLL frazionari.'
      Contenuti: "- Introduzione all'elaborazione e alla sintesi di segnale tramite\
        \ circuiti analogici\n- Progetto di circuiti per la generazione di segnale\n\
        \  \n  - Oscillatori periodici\n  - Circuiti per la generazione di segnali\
        \ aperiodici e caotici\n  - Introduzione ai Phase-Locked-Loop (se le tempistiche\
        \ del corso lo consentono)\n- Blocchi funzionali analogici non lineari\n \
        \ \n  - circuiti logaritmici e antilogaritmici\n  - circuti di rettifica e\
        \ per la realizzazione di funzioni lineari a tratti\n  - moltiplicatori\n\
        - Tecniche di progetto di circuiti di elaborazione del segnale senza resistori\n\
        \  \n  - Architetture gm-C\n  - Circuiti analogici tempo-discreti\n    \n\
        \    - Considerazioni generali\n    - Circuiti a capacità commutate\n    -\
        \ Circuiti a correnti commutate\n    - Circuiti analogici riconfigurabili\
        \ e programmabili\n- Tecniche di modulazione per la sintesi di segnali a bassa\
        \ profondità di codifica, discreti nei valori\n  \n  - Modulazioni PWM e PDM\n\
        \  - Modulazioni delta-sigma\n    \n    - Applicazioni nella codifica di forme\
        \ d'onda\n    - Applicazioni nella conversione di potenza ad alta efficienza\
        \ energetica\n- Principi di base dell'analog-to-information conversion (se\
        \ le tempistiche del corso lo consentono)"
      Testi/Bibliografia: 'Il principale materiale di riferimento per gli studenti
        è costituito dagli appunti presi a lezione. Il corso, infatti, affronta e
        integra una varietà di argomenti, rendendo impossibile adottare un singolo
        testo didattico come riferimento univoco.


        Nel corso delle lezioni verranno comunque indicati:


        - testi utili per l’approfondimento di temi specifici;

        - articoli pubblicati di recente su riviste scientifiche internazionali.


        Inoltre, il docente metterà a disposizione parte del materiale didattico tramite
        il sito “Virtuale”, tra cui:


        - file PDF con le diapositive utilizzate durante le lezioni (ciascun file
        sarà reso disponibile solo dopo la relativa lezione);

        - codice dimostrativo relativo alle simulazioni e agli esperimenti svolti
        durante le lezioni;

        - documentazione relativa ai seminari che potranno essere inclusi nel corso;

        - articoli e altro materiale utile per approfondire argomenti trattati nel
        corso.


        Alcuni testi che possono risultare interesssanti per un approfondimento dei
        concetti di base sono:


        1. L. O. Chua, C. A. Desoer, E. S. Kuh, “Linear and Nonlinear Circuits”, McGraw-Hill

        2. Calzolari P. Ugo, Graffi Sergio, “Elementi di Elettronica”, Zanichelli

        3. A. V. Oppenheim, R. W. Schafer, “Discrete Time Signal Processing”, Prentice-Hall

        4. A. Antoniu, “Digital Filters: Analysis, Design and Applications”, McGraw-Hill'
      Metodi didattici: 'Il corso si articola in:


        - lezioni teoriche svolte in aula;

        - dimostrazioni al computer;

        - esercizi svolti in aula dal docente, alla lavagna o con il supporto di strumenti
        software.


        Al termine del corso, come attività opzionale, gli studenti sono incoraggiati
        a ideare, con la guida del docente, un piccolo progetto da sviluppare utilizzando
        metodi formali e simulazioni. In alcuni casi, si è arrivati anche alla prototipazione
        e alla fase di misura. Gli studenti sono infine invitati a redigere un breve
        elaborato che descriva il progetto svolto.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica del livello
        di competenza raggiunto avviene mediante un esame finale orale.


        L’esame è volto ad accertare sia la comprensione degli aspetti teorici del
        corso, sia la capacità di applicarli alla risoluzione di problemi pratici.
        Si articola generalmente in tre quesiti: due di carattere teorico e uno di
        natura applicativa, in cui si richiede di impostare la soluzione di un problema
        di analisi o di progetto.


        Gli studenti che hanno svolto l’attività progettuale facoltativa possono,
        a loro scelta, sostituire il quesito applicativo con la discussione della
        propria relazione.


        Qualora il numero di studenti frequentanti superi le 25 unità, l’esame orale
        potrà essere sostituito, in parte o interamente, da una prova scritta.'
      Strumenti a supporto della didattica: "Durante il corso verranno utilizzati\
        \ i seguenti strumenti:\n\n- Videoproiettore e diapositive\n- Lavagna\n- Personal\
        \ computer con software di simulazione e progettazione assistita, per la dimostrazione\
        \ dei concetti trattati:\n  \n  - simulatori a livello di circuito (LTspice);\n\
        \  - simulatori a livello di sistema (MATLAB/Simulink oppure Scilab/Xcos);\n\
        \  - eventuale utilizzo di notebook in Python."
      Orario di ricevimento: Consulta il sito web di Sergio Callegari (https://www.unibo.it/sitoweb/sergio.callegari)
      SDGs: 'Energia pulita e accessibile Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/384683
    title: 2025/2026 Electronics for analogic signal processing (2nd cycle) — University
      of Bologna
    contents:
      Learning outcomes: 'By the end of the course, the student has competence in
        the design of analog electronic modules and systems for signal synthesis and
        processing. Specifically:


        - He knows how to design different types of signal synthesis modules, including
        sinusoidal oscillators, relaxation oscillators, generators for some classes
        of spread spectrum waveforms and aperiodic waveforms, crystal oscillators,
        timers, etc;

        - He is able to design signal processing blocks based both on continuous and
        discrete time approaches. Particularly, he can design switched capacitors
        and switched current circuits;

        - He has basic knowledge on how to encode information in low depth formats,
        suitable for: switched mode power converters operating with a high energy
        efficiency; as an intermediate representation in data conversion; or in frequency
        synthesis systems such as fractional PLLs.'
      Course contents: "- Introduction to signal processing and synthesis using analog\
        \ circuits\n- Design of signal generation circuits\n  \n  - Periodic oscillators\n\
        \  - Circuits for the generation of aperiodic and chaotic signals\n  - Introduction\
        \ to Phase-Locked Loops (if time permits)\n- Nonlinear analog functional blocks\n\
        \  \n  - Logarithmic and antilogarithmic circuits\n  - Rectifier circuits\
        \ and circuits for implementing piecewise-linear functions\n  - Multipliers\n\
        - Design techniques for resistorless signal processing circuits\n  \n  - gm-C\
        \ architectures\n  - Discrete-time analog circuits\n    \n    - General considerations\n\
        \    - Switched-capacitor circuits\n    - Switched-current circuits\n    -\
        \ Reconfigurable and programmable analog circuits\n- Modulation techniques\
        \ for the synthesis of low-depth, discrete-valued signals\n  \n  - PWM and\
        \ PDM modulations\n  - Delta-sigma modulations\n    \n    - Applications in\
        \ waveform encoding\n    - Applications in high-efficiency power conversion\n\
        - Fundamentals of analog-to-information conversion (if time permits)"
      Readings/Bibliography: 'The main reference material for students consists of
        the notes taken during lectures. The course, in fact, covers and integrates
        a variety of topics, making it impossible to adopt a single textbook as a
        comprehensive reference.


        However, during the course the following will be indicated:


        - books useful for the in-depth study of specific topics;

        - recently published articles from international scientific journals.


        In addition, the instructor will provide part of the teaching material through
        the “Virtuale” platform, including:


        - PDF files containing the slides used during lectures (each file will be
        made available only after the corresponding lecture);

        - demonstration code related to the simulations and experiments conducted
        in class;

        - documentation concerning seminars that may be included in the course;

        - articles and other materials useful for further study of topics covered
        in the course.


        Some texts that may be of interest for deepening the understanding of basic
        concepts include:


        1. L. O. Chua, C. A. Desoer, E. S. Kuh, “Linear and Nonlinear Circuits”, McGraw-Hill

        2. Calzolari P. Ugo, Graffi Sergio, “Elementi di Elettronica”, Zanichelli

        3. A. V. Oppenheim, R. W. Schafer, “Discrete Time Signal Processing”, Prentice-Hall

        4. A. Antoniu, “Digital Filters: Analysis, Design and Applications”, McGraw-Hill'
      Teaching methods: 'The course consists of:


        - theoretical lectures held in the classroom;

        - computer-based demonstrations;

        - exercises carried out in class by the instructor, either on the board or
        using software tools.


        At the end of the course, as an optional activity, students are encouraged
        to design a small project with the guidance of the instructor, and to develop
        it using formal methods and simulation. In some cases, this has also led to
        prototyping and measurements. Students are then invited to produce a short
        report describing the project.'
      Assessment methods: 'The assessment of the level of competence achieved takes
        place through a final oral examination.


        The exam is intended to verify both the understanding of the theoretical aspects
        of the course and the ability to apply them to practical problem-solving.
        It generally consists of three questions: two focused on theoretical topics
        and one of a more applied nature, in which the student is asked to outline
        the solution to an analysis or design problem.


        Students who have completed the optional project activity may choose to replace
        the applied question with a discussion of their project report.


        If the number of students attending the course exceeds 25, the final oral
        exam may be partially or entirely replaced by a written test.'
      Teaching tools: "The following tools will be used during the course:\n\n- Video\
        \ projector and slides\n- Blackboard\n- Personal computer with simulation\
        \ and computer-aided design software, used to demonstrate the concepts presented:\n\
        \  \n  - circuit-level simulators (LTspice);\n  - system-level simulators\
        \ (MATLAB/Simulink or Scilab/Xcos);\n  - optional use of Python notebooks."
      Office hours: See the website of Sergio Callegari (https://www.unibo.it/sitoweb/sergio.callegari/en)
      SDGs: 'Affordable and clean energy Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
