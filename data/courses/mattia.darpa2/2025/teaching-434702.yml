  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/434702
    title: 2025/2026 SISTEMI INFORMATIVI T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza dei modelli e degli strumenti
        per l'organizzazione e la gestione e il progetto di basi di dati relazionali.
      Contenuti: "1. Sistemi di gestione di basi di dati (DBMS)\n  Sistemi informativi\
        \ e ruolo dei DBMS. Le funzionalità di base dei DBMS: architettura a 3 livelli,\
        \ linguaggi, controllo degli accessi e della concorrenza, protezione dai guasti.\n\
        2. Il modello relazionale dei dati\n  Concetti di base: domini, attributi,\
        \ tuple e relazioni, relazioni in 1NF, valori nulli. Vincoli sui dati: di\
        \ dominio, di tupla, di chiave, di integrità referenziale.\n3. L'algebra relazionale\n\
        \  Operatori unari: selezione, proiezione e ridenominazione. Operatori binari:\
        \ join naturale, unione e differenza. Operatori derivati: intersezione, theta-join\
        \ e divisione. Algebra con valori nulli: logica a 3 valori, outer join. Espressioni\
        \ e regole di equivalenza di base.\n4. Il linguaggio SQL (Structured Query\
        \ Language)\n  Istruzioni di definizione dei dati (DDL) e definizione di vincoli.\
        \ Il blocco Select-From-Where. Ordinamento del risultato. Istruzioni di modifica\
        \ dei dati. Interrogazioni con aggregazione del risultato. Interrogazioni\
        \ innestate. Definizione di viste e risoluzione di interrogazioni ricorsive.\
        \ Gestione delle autorizzazioni. Trigger. Transazioni.\n5. Progettazione di\
        \ basi di dati\n  Progettazione orientata ai dati. Fasi di progettazione.\
        \ Modelli concettuali e modelli logici dei dati. I principali meccanismi di\
        \ astrazione.\n6. Il modello Entity-Relationship (E-R)\n  Elementi di base:\
        \ entità, associazioni, attributi. Meccanismi di identificazione. Tipi di\
        \ gerarchie.\n7. Progettazione concettuale (cenni)\n  Raccolta e analisi dei\
        \ requisiti. Strategie di progettazione. Tipici pattern di progettazione.\n\
        8. Progettazione logica\n  Regole di traduzione di entità e associazioni orientata\
        \ al modello relazionale.Ristrutturazione dello schema E-R: eliminazione delle\
        \ gerarchie, eliiminazione di attributi multi-valore, scelta degli identificatori\
        \ principali. Criteri di ottimizzazione: carico di lavoro (volumi dei dati\
        \ e schemi di navigazione), analisi delle ridondanze, partizionamenti e accorpamenti.\n\
        9. Normalizzazione di schemi relazionali\n  Dipendenze funzionali e anomalie.\
        \ Forme normali (3NF e BCNF). Decomposizione di schemi. Decomposizioni senza\
        \ perdita. Preservazione delle dipendenze. Algoritmo di normalizzazione in\
        \ 3NF. Relazione tra dipendenze funzionali e schemi E-R."
      Testi/Bibliografia: 'Per la preparazione dell''esame è sufficiente il materiale
        reso disponibile sul sito del corso (http://www-db.disi.unibo.it/courses/SI-T/
        (http://www-db.disi.unibo.it/courses/SI-T/)) e su Virtuale.


        Per chi volesse approfondire gli argomenti trattati a lezione è consigliato
        il seguente testo:


        - P. Atzeni, S. Ceri, P. Fraternali, S. Paraboschi, R. Torlone: Basi di Dati
        [https://www.mheducation.it/basi-di-dati-6-ed-con-connect-9788838656545-italy
        (https://www.mheducation.it/9788838694455-italy-basi-di-dati-5ed-con-connect)],
        6/ed McGraw-Hill, 2023'
      Metodi didattici: 'Il corso viene erogato in aula mediante proiezione di slide
        dal computer del docente. Le lezioni sono integrate da esercitazioni in aula
        tenute dal docente e da esercitazioni pratiche in laboratorio. Ogni esercitazione
        in laboratorio affronta uno specifico argomento trattato a lezione dal docente
        proponendo esercizi che permettono allo studente di approfondire quanto visto
        a lezione. La soluzione degli esercizi presuppone l''uso di diversi strumenti
        software (tool di progettazione e DBMS).


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio),
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: La valutazione d'esame
        consiste in una prova in laboratorio relativa a tutto il programma del corso.
        La prova orale viene svolta solo su richiesta del docente.
      Strumenti a supporto della didattica: Le lezioni in aula vengono svolte con
        l'ausilio di lucidi proiettati da PC. Copia integrale dei lucidi proiettati
        è disponibile sul sito del corso (http://www-db.disi.unibo.it/courses/SI-T/
        ) e su Virtuale.
