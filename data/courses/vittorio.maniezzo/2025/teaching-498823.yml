syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498823
    title: 2025/2026 ALGORITMI E STRUTTURE DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le strutture dati di base e gli algoritmi in grado di operare su di esse.
        Lo studente conosce le principali tecniche per la stima del costo computazionale
        di algoritmi, ed è in grado di progettare e realizzare soluzioni efficienti
        per risolvere problemi comuni nell'ambito delle discipline legate alla tecnologia
        dell'informazione.
      Contenuti: 'Il corso consiste di due moduli, uno propriamente di introduzione
        agli algoritmi e strutture dati e il secondo di introduzione al linguaggio
        Python. Gli algoritmi e le strutture dati di interesse saranno presentati
        con un linguaggio astratto (pseudocodice) indipendente da dettagli sintattici
        e nelle esercitazioni verranno poi tradotti con riferimento principalmente
        al linguaggio C. Il linguaggio Python offrirà un''altra prospettiva, utile
        sia in questo corso e soprattutto in altri corsi successivi.


        Gli argomenti trattati durante il corso includono:


        - concetti di algoritmi ed efficienza/complessità

        - analisi e notazione asintotica della complessità (O-grande)

        - algoritmi ricorsivi e metodologia divide-et-impera

        - algoritmi di ricerca

        - algoritmi di ordinamento

        - strutture dati elementari: pile, code, liste

        - tabelle hash

        - grafi e algoritmi di visita su grafi

        - alberi binari di ricerca'
      Testi/Bibliografia: 'Il materiale fornito è necessario e sufficiente.


        Per approfondimenti, si suggeriscono i seguenti testi:


        - Introduzione agli algoritmi e strutture dati. Thomas H. Cormen, Charles
        E. Leiserson, Ronald L. Rivest. McGraw-Hill Education, 2010

        - Algoritmi e strutture dati - Astrazione, progetto e realizzazione. Pasquale
        Foggia, Mario Vento. McGraw-Hill, 2011'
      Metodi didattici: '- Lezioni frontali

        - Esercitazioni in laboratorio


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: "L'esame consisterà in\
        \ due parti\n\n1. un piccolo progetto (esercizio) relativo al modulo Python,\
        \ che costituirà criterio di ammissione allo scritto (senza voto), e\n2. in\
        \ una prova scritta/pratica al computer contenente domande relative a valutare\
        \ le conoscenze acquisite ed esercizi pratici di implementazione di algoritmi/strutture\
        \ dati (in C e/o Python) per la verifica delle competenze. Il voto finale\
        \ sarà dato dalla somma dei punteggi degli esercizi di tale prova.\n  Alle\
        \ Studentesse e agli Studenti con DSA o disabilità temporanee o permanenti\
        \ si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile,\
        \ all'indirizzo https://site.unibo.it/studenti-con-disabilita-e-dsa/it. Sarà\
        \ cura dell'ufficio proporre eventuali adattamenti, che dovranno comunque\
        \ essere sottoposti, con un anticipo di 15 giorni, all’approvazione del/la\
        \ docente, che ne valuterà l'opportunità anche in relazione agli obiettivi\
        \ formativi dell'insegnamento."
      Strumenti a supporto della didattica: '- Dispense a cura dei docenti

        - Esempi di codice e notebook Jupyter

        - Esercitazioni (con soluzioni)'
      Orario di ricevimento: 'Consulta il sito web di Roberto Casadei (https://www.unibo.it/sitoweb/roby.casadei)


        Consulta il sito web di Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498823
    title: 2025/2026 Algorithm and Data Structures — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the basic data
        structures and the notable algorithms from the literature operating on them.
        The student is familiar with the main techniques for estimating the computational
        cost of algorithms and is able to design and implement efficient solutions
        to solve common problems in the field of information technology disciplines.
      Course contents: 'The course consists of two modules: one primarily introducing
        algorithms and data structures, and the second introducing the Python language.
        The algorithms and data structures of interest will be presented using an
        abstract language (pseudocode) independent of syntactical details, and during
        the exercises, they will then be translated mainly using the C language. Python
        will offer another perspective, useful both in this course and especially
        in subsequent courses.


        The topics covered during the course include:


        - Concepts of algorithms and efficiency/complexity

        - Analysis and asymptotic notation of complexity (Big O)

        - Recursive algorithms and the divide-and-conquer methodology

        - Search algorithms

        - Sorting algorithms

        - Elementary data structures: stacks, queues, lists

        - Hash tables

        - Graphs and graph traversal algorithms

        - Binary search trees'
      Readings/Bibliography: 'The provided material is necessary and sufficient.


        For further study, the following texts are suggested:


        - Introduzione agli algoritmi e strutture dati. Thomas H. Cormen, Charles
        E. Leiserson, Ronald L. Rivest. McGraw-Hill Education, 2010

        - Algoritmi e strutture dati - Astrazione, progetto e realizzazione. Pasquale
        Foggia, Mario Vento. McGraw-Hill, 2011'
      Teaching methods: '- Lectures

        - Practical exercises in lab


        Considering the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the prior participation of all students
        in the training modules 1 and 2 on safety in the study places, https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        in e-learning mode.'
      Assessment methods: "The exam will consist of two parts:\n\n1. A small project\
        \ (exercise) related to the Python module, which will be a criterion for admission\
        \ to the written exam (without grade), and\n2. A written/practical exam containing\
        \ questions on theoretical aspects for the assessment of the acquired knowledge\
        \ and practical implementation exercises of algorithms/data structures (in\
        \ C and/or Python) for the assessment of the competences. The final grade\
        \ will be computed as the sum of the grades of the individual exercises.\n\
        \  Students with specific learning disorders (DSA) or temporary or permanent\
        \ disabilities are advised to contact the responsible University office in\
        \ advance, at the address https://site.unibo.it/studenti-con-disabilita-e-dsa/en.\
        \ The office will take care of proposing any necessary adjustments, which\
        \ must in any case be submitted, at least 15 days in advance, for the approval\
        \ of the instructor, who will assess their appropriateness also in relation\
        \ to the learning objectives of the course."
      Teaching tools: '- Handouts (slides) prepared by the instructors

        - Source code examples and Jupyter notebooks

        - Exercises (with solutions)'
      Office hours: 'See the website of Roberto Casadei (https://www.unibo.it/sitoweb/roby.casadei/en)


        See the website of Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo/en)'
