syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/341621
    title: 2025/2026 ARCHITETTURE DIGITALI PER L'ELABORAZIONE DEL SEGNALE M — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrare le architetture digitali piú
        in uso per la elaborazione del segnale. Partendo dallo studio di alcuni significativi
        algoritmi di elaborazione del segnale audio e video, si desumono le specifiche
        che debbono essere soddisfatte da architetture hardware par la elaborazione
        del segnale. L'analisi delle architetture piú in uso, seriali e parallele,
        viene svolta osservando la stretta correlazione tra specifiche algoritmiche
        ed architetturali nell'ambito di questa classe di macchine.
      Contenuti: 'Il corso si focalizza sulla specifica, il progetto e l''implementazione
        di architetture hardware digitali su chip, con particolare attenzione ad architetture
        dedicate per l''elaborazione del segnale digitale.

        Accompagna alla teoria una forte componente pratica e di laboratorio (>50%
        del corso).


        Teoria Modulo 1 (Conti):


        - Linguaggio di descrizione hardware SystemVerilog (cenni)

        - Algoritmi di elaborazione del segnale digitale (DSP): formati numerici e
        rappresentazione mediante data-flow graphs (DFG)

        - Progetto top-down di microarchitetture di datapath per DSP tramite scheduling
        e mapping di DFG; tecniche di ottimizzazione (retiming, pipelining, parallelismo)

        - Integrazione di datapath per DSP in System-on-Chip complessi basati su microprocessore
        come estensioni dell''instruction set e/o acceleratori dedicati.


        Teoria Modulo 2 (Rossi):


        - Sintesi logica ed implementazione fisica di sistemi digitali, impatto delle
        scelte progettuali su prestazioni, potenza ed efficienza energetica.


        Laboratorio:


        - Modulo 1: Realizzazione e simulazione (Siemens QuestaSim) di acceleratori
        dedicati per l''elaborazione del segnale; integrazione in SoC platform (PULPissimo).

        - Modulo 2: Implementazione fisica di sistemi on chip per l''elaborazione
        del segnale: sintesi logica (Synopsys Design Compiler) , flussi di place and
        route (Cadence Innovus).'
      Testi/Bibliografia: 'Materiali didattici: tutti i materiali didattici (slide,
        link, articoli scientifici) saranno distribuiti mediante Virtuale. Tutto il
        materiale sarà distribuito in lingua inglese.


        Testi di riferimento (per consultazione):


        - D. Marković, R. W. Brodersen, "DSP Architecture Design Essentials", Springer
        2012

        - G. De Micheli, "Synthesis and Optimization of Digital Circuits", McGraw-Hill
        Education 1994'
      Metodi didattici: 'Lezione frontale in aula in lingua italiana.

        Esercitazioni in laboratorio.'
      Modalità di verifica e valutazione dell'apprendimento: 'Relazione su esercitazioni
        assegnate in laboratorio.


        Esame orale unico sull''intero programma del corso (teoria mod 1 + mod 2 +
        laboratorio).'
      Strumenti a supporto della didattica: 'Il corso ha forte carattere pratico con
        esercitazioni in laboratorio volte all''utilizzo di tool professionali per
        lo sviluppo di sistemi digitali:


        - Ausilio alla specifica con linguaggi di alto livello (e.g., Python)

        - Progetto di architetture in SystemVerilog HDL

        - Simulazione mediante Siemens QuestaSim

        - Sintesi logica con Synopsys Design Compiler

        - Place and Route con Cadence Innovus'
      Orario di ricevimento: 'Consulta il sito web di Francesco Conti (https://www.unibo.it/sitoweb/f.conti)


        Consulta il sito web di Davide Rossi (https://www.unibo.it/sitoweb/davide.rossi)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/341621
    title: 2025/2026 Digital Architectures for Signal Processing M — University of
      Bologna
    contents:
      Learning outcomes: Analysis of algorithms for image compression and speech processing
        from the perspective of the digital system designer. Definitions of the specifications
        derived from these algorithms. Spec mapping on various computational architectures.
        Examples of digital signal processing algorithms suitable for parallel architectures
        such as digital signal processors and application specific system on chip.
      Course contents: 'The course is focused on the specification, design and implementation
        of digital hardware architecture on chip, with particular attention to dedicated
        architectures for digital signal processing. It couples theory with a strong
        practical and laboratory component (>50% of the course).


        Theory Module 1 (Conti):


        - Introduction to the SystemVerilog hardware description language

        - Algorithms for digital signal processing (DSP): numeric formats and representation
        as data-flow graphs (DFGs)

        - Top-down design of DSP datapath microarchitectures through scheduling and
        mapping of DFGs; optimization techniques (retiming, pipelining, parallelism)

        - Integration of DSP datapaths in complex System-on-Chips based on microprocessor
        cores - either as instruction set extensions or as dedicated accelerators.


        Theory Module 2 (Rossi):


        - Logic and physical synthesis of digital systems, impact of design choices
        upon performance, power and energy efficiency.


        Laboratorio:


        - Module 1: Design and simulation (Siemens QuestaSim) of dedicated hardware
        accelerators for signal processing; integration in an SoC platform (PULPissimo).

        - Module 2: Physical implementation of system-on-chip for signal processing:
        logic synthesis (Synopsys Design Compiler), place and route flows (Cadence
        Innovus).'
      Readings/Bibliography: 'Teaching material: all teaching material (slides, links,
        scientific papers) will be shared by means of Virtuale. Teaching material
        is distributed in English.


        Reference book:


        - D. Marković, R. W. Brodersen, "DSP Architecture Design Essentials", Springer
        2012

        - G. De Micheli, "Synthesis and Optimization of Digital Circuits", McGraw-Hill
        Education 1994'
      Teaching methods: 'Classroom lessons in Italian.

        Lab work.'
      Assessment methods: 'Final Report on lab work.

        Unified oral exam on the full course program (theory mod. 1 + mod. 2 + laboratory).'
      Teaching tools: 'The course is very practical, with lab exercises to learn how
        to use professional grade tool and flows for the development of digital systems:


        - Specification aided with high level languages (e.g., Python)

        - Architecture design in SystemVerilog HDL

        - Simulation with Siemens QuestaSim

        - Logic synthesis with Synopsys Design Compiler

        - Place and Route with Cadence Innovus'
      Office hours: 'See the website of Francesco Conti (https://www.unibo.it/sitoweb/f.conti/en)


        See the website of Davide Rossi (https://www.unibo.it/sitoweb/davide.rossi/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
