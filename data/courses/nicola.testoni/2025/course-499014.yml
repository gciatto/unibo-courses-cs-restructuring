  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/499014
    title: 2025/2026 Microcontroller electronic systems P — University of Bologna
    contents:
      Learning outcomes: 'The student acquires knowledge of the specifications and
        main characteristics of programmable microcontroller-based architectures for
        industrial applications.

        The student becomes familiar with examples of analog and digital interfaces,
        as well as communication components and subsystems.

        The student gains hands-on laboratory experience in programming microcontroller-based
        systems.'
      Course contents: 'Fundamentals of digital electronics, figures of merit, and
        speed–power consumption trade-offs. Microcontroller families. Analysis of
        processor and chip architecture. Input peripherals in microcontroller-based
        systems: serial and parallel interfaces, A/D converters. Output peripherals
        for microcontroller-based systems: PWM, LCD, D/A converters. Integrated components
        with analog and digital interfaces. Smart sensors and actuators.


        Auxiliary systems: timers, power management, etc. Memory systems: ROM, RAM,
        Flash, and external memories. Interfaces for wired and wireless communication.
        Laboratory activities: toolchains for code generation and optimization, debugging
        methodologies. Embedded programming techniques.'
      Readings/Bibliography: '1. Electronics for Embedded Systems, Ahmet Bindal, Springer
        2017

        2. Mastering STM32, Carmine Noviello, Leanpub, 2018

        3. C Programming: A Modern Modern Approach, Ed. Norton, 2008'
      Teaching methods: Il corso è strutturato in lezioni frontali
      Assessment methods: Oral exam
