syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/499014
    title: 2025/2026 SISTEMI ELETTRONICI A MICROCONTROLLORE P — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Lo studente acquisisce la conoscenza delle
        specifiche e delle caratteristiche principali delle architetture programmabili
        basate su micro-controllore per applicazioni industriali.


        - Lo studente conosce esempi di interfacce analogiche e digitali, di componenti
        e sottosistemi di comunicazione.

        - Lo studente acquisisce pratica in laboratorio nella programmazione di sistemi
        a microcontrollore.'
      Contenuti: 'Elementi di elettronica digitale, figure di merito e compromesso

        velocita/consumo, Famiglie di microcontrollori; Analisi della

        architettura del processore e del Chip; Periferiche di input in sistemi

        a microcontrollore: Interfacce seriali, parallele, convertitori A/D;

        Periferiche di output per sistemi a microcontrollore: PWM, LCD,

        convertitori D/A; componenti integrati con interfacce analogiche e

        digitali; Smart sensors/actuators.


        Sistemi ausiliari: timers, power management, etc. Sistema di memoria:

        ROM, RAM, FLASH e memorie esterne. Interfacce per la comunicazione

        cablata e wireless. Laboratorio: toolchains per la generazione e

        ottimizzazione del codice, metodologie per il debugging. Tecniche di

        programmazione embedded.'
      Testi/Bibliografia: '1. Electronics for Embedded Systems, Ahmet Bindal, Springer
        2017

        2. Mastering STM32, Carmine Noviello, Leanpub, 2018

        3. C Programming: A Modern Modern Approach, Ed. Norton, 2008'
      Metodi didattici: Il corso è strutturato in lezioni frontali
      Modalità di verifica e valutazione dell'apprendimento: Esame orale
      Strumenti a supporto della didattica: 'Dispositivi e software di riferimento:


