syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/434709
    title: 2025/2026 ELETTRONICA T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza di base sull'analisi e sui criteri
        di progetto dei circuiti elettronici digitali. Conoscenze di base sui circuiti
        elettronici analogici.
      Contenuti: 'Transistori MOS. Tecnologia planare del silicio. Tecnologia CMOS.
        inverter CMOS.


        Parametri di merito. Logiche CMOS. Dimensionamento dei gate.


        Fondamenti sulle memorie a semiconduttore. SRAM e DRAM. Memorie non volatili


        Segnali. Metodi matematici per l''analisi dei segnali. Amplificatori ed amplificatori
        multistadio. Amplificatori lineari.


        Amplificatori operazionali. Circuiti ad operazionali. Filtri attivi.


        Convertitori AD/DA.'
      Testi/Bibliografia: 'Jaeger-Blalock


        "Microelettronica"


        McGraw Hill


        Rabaey-Chandrakasan-Nicolic


        ‘’Circuiti Integrati Digitali’’


        Pearson'
      Metodi didattici: lezioni frontali con discussione
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica avviene
        tramite prova scritta con problemi di elettronica digitale ed analogica.

        Il tempo a disposizione dello studente per la prova scritta è di 90 minuti.
        Durante la prova è ammesso l''uso di materiale cartaceo di

        supporto quale: libri di testo e appunti


        E'' ammesso l'' uso di una calcolatrice.


        Non è ammesso l'' uso di strumenti informatici di nessun tipo.

        Il punteggio massimo ottenibile fornendo tutte le soluzioni esatte e complete
        è pari a 30 e lode.

        La prova si intende superata con un punteggio minimo di 18/30.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: https://virtuale.unibo.it
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/
      Orario di ricevimento: Consulta il sito web di Massimo Lanzoni (https://www.unibo.it/sitoweb/massimo.lanzoni)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/434709
    title: 2025/2026 Electronics T — University of Bologna
    contents:
      Learning outcomes: Basic elements of analog and digital electronics
      Course contents: 'MOS transistor, technology and circuits


        Elementary analog circuits based on opamps


        AD and DA converters'
      Readings/Bibliography: 'Jaeger-Blalock


        Microelettronica


        McGraw Hill


        -Rabaey-Chandrakasan-Nicolic


        ‘’Circuiti Integrati Digitali’’


        Pearson'
      Teaching methods: theoretical lectures
      Assessment methods: 'Written test. Problems of digital and analog electronics.


        Test duration 60 min.


        Paper books and notes are allowed. Electronics devices (except scientific
        calculator) are forbidden.


        maximum score 30L/30 , minimum score 18/30'
