syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/446880
    title: 2025/2026 STATISTICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo lo studente possiede
        le conoscenze e la capacità di comprendere i concetti e le possibili applicazioni
        della statistica di base in ambito biomedico e clinico, dall'antropometria
        alla biometria, alla programmazione, organizzazione e gestione dei servizi
        sanitari.
      Contenuti: '1. Cenni sui disegni degli studi sperimentali e osservazionali;

        2. Introduzione alla statistica;

        3. Statistica descrittiva univariata e bivariata;

        4. Statistica inferenziale e probabilità;

        5. Tabelle di frequenza e rappresentazioni grafiche;

        6. Indicatori sintetici di una distribuzione: media, mediana, moda;

        7. Misure di variabilità, intervalli di confidenza, precisione/bias;

        8. Principali test statistici e le relative applicazioni pratiche;

        9. Utilizzo di Excel nell’elaborazione dei dati.'
      Testi/Bibliografia: Andrea Sgarro, Laura Franzoi, Paolo Vicig. Statistica di
        Base. 2022. Zanichelli.
      Metodi didattici: Lezioni frontali.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso lo svolgimento di una prova scritta che prevede domande
        a scelta forzata con 4/5 risposte alternative, oppure domande aperte su argomenti
        inerenti gli obiettivi del Corso. Il voto sarà espresso sulla base delle risposte
        esatte e sarà un voto da 0 a 30 e Lode. La sufficienza è raggiunta con voto
        >=18. E’ ammesso l''uso di normale calcolatrice scientifica, ma non di libri,
        dispense, appunti, internet.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Andrea Sgarro, Laura Franzoi, Paolo Vicig.
        Statistica di Base. 2022. Zanichelli.
      Link ad altre eventuali informazioni: https://filippopiccinini.it/joomla/men-teachings
      Orario di ricevimento: Consulta il sito web di Filippo Piccinini (https://www.unibo.it/sitoweb/f.piccinini)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/446880
    title: 2025/2026 Statistics — University of Bologna
    contents:
      Learning outcomes: At the end of the module, the student will have the knowledge
        and the ability to understand the concepts and possible applications of basic
        statistics in the biomedical and clinical fields, ranging from anthropometry
        to biometrics, as well as to the planning, organization, and management of
        healthcare services.
      Course contents: '1. Overview of experimental and observational study designs;

        2. Introduction to statistics;

        3. Univariate and bivariate descriptive statistics;

        4. Inferential statistics and probability;

        5. Frequency tables and graphical representations;

        6. Summary measures of a distribution: mean, median, mode;

        7. Variability measures, confidence intervals, precision/bias;

        8. Main statistical tests and their practical applications;

        9. Use of Excel for data processing.'
      Readings/Bibliography: Andrea Sgarro, Laura Franzoi, Paolo Vicig. Statistica
        di Base. 2022. Zanichelli.
      Teaching methods: Frontal lessons.
      Assessment methods: 'The assessment of learning is conducted through a written
        test that includes multiple-choice questions with 4/5 alternative answers
        or open-ended questions on topics related to the course objectives. The grade
        will be based on the correct answers and will range from 0 to 30 cum laude.
        A passing grade is achieved with a score of 18 or higher. The use of a regular
        scientific calculator is allowed, but not books, handouts, notes, or the internet.


        Students with Specific Learning Disabilities (SLD) or temporary/permanent
        disabilities are advised to contact the University Office responsible in a
        timely manner (https://site.unibo.it/studenti-con-disabilita-e-dsa/en ). The
        office will be responsible for proposing any necessary accommodations to the
        students concerned. These accommodations must be submitted to the instructor
        for approval at least 15 days in advance, and will be evaluated in light of
        the learning objectives of the course.'
      Teaching tools: Andrea Sgarro, Laura Franzoi, Paolo Vicig. Statistica di Base.
        2022. Zanichelli.
      Links to further information: https://filippopiccinini.it/joomla/men-teachings
      Office hours: See the website of Filippo Piccinini (https://www.unibo.it/sitoweb/f.piccinini/en)
