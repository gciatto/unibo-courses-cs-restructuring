syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/443719
    title: 2025/2026 INGEGNERIA DEL SOFTWARE (9 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        metodi e strumenti di analisi, progettazione e misura di sistemi software.
        Comprende il ruolo dei modelli di processo di sviluppo del software, specialmente
        quelli orientati alla collaborazione agile. È in grado di descrivere un sistema
        software con il formalismo UML, di programmarlo con un linguaggio orientato
        agli oggetti, utilizzando strumenti collaborativi per le gestione delle versioni
        e della qualità del codice.
      Contenuti: •La produzione del software •Il ciclo di vita del software •I metodi
        di sviluppo agili •Il metodo Scrum •L'analisi e la specifica dei requisiti
        •Schemi (pattern) di progettazione •La modellazione del software con UML •Gli
        strumenti di sviluppo agile •Project Management per sistemi software • Controllare
        e misurare la qualità del software • La manutenzione dei sistemi software
        •La gestione della configurazione
      Testi/Bibliografia: 'Jacobson, The essentials of modern software engineering,
        ACM Books 2019 (necessario)


        Sommerville, Introduzione all''Ingegneria del Software moderna, Pearson 2021
        (consigliato)'
      Metodi didattici: 'Lezioni frontali, esercitazioni, lezioni/esercitazioni di
        progetto online, letture e presentazioni di articoli scientifici. Quiz di
        verifica in classe usando strumenti online.


        NOTA BENE: In considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza
        nei luoghi di studio, [https://elearning-sicurezza.unibo.it/] in modalità
        e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso orale sui temi del corso (modulo1+modulo2)

        L''orale mira a verificare l''acquisizione delle conoscenze previste dal programma
        del corso.

        In particolare occorre verificare l''apprendimento dei metodi dell''ingegneria
        del software e l''acquisizione di giudizio critico in relazione alle soluzioni
        dei problemi di analisi, specifica, progettazione e valutazione di sistemi
        software.'
      Strumenti a supporto della didattica: 'Copie dei trasparenti (slide) mostrati
        a lezione. Esercizi degli anni precedenti. Quiz a domande chiuse somministrati
        online. Canale di comunicazione basato su Telegram. Opzionale: ambiente di
        sviluppo open source con strumenti collaborativi di versionamento, di controllo
        di progetto e di analisi della qualità del codice'
      Orario di ricevimento: Consulta il sito web di Giancarlo Succi (https://www.unibo.it/sitoweb/giancarlo.succi2)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Consumo e
        produzione responsabili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
