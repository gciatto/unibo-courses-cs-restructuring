  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/447695
    title: 2025/2026 ELETTRONICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le competenze di base sulle tecniche di analisi di circuiti elettronici lineari
        e non lineari per applicazioni analogiche e digitali. Conosce ed è in grado
        di progettare i circuiti di base per l'amplificazione ed il trattamento del
        segnale in forma analogica e digitale.
      Contenuti: 'Modulo 1: Elettronica Analogica


        1. Reti elettriche lineari


        - Richiami sui metodi di analisi dei circuiti lineari, leggi di Kirchhoff,
        partitori di tensione e di corrente, bipoli equivalenti secondo Thevenin e
        Norton.

        - Consumo di potenza di circuiti lineari, guadagno di tensione, corrente,
        potenza.


        1. Circuiti non lineari


        - Diodo a semiconduttore e suoi modelli, approssimazione a soglia.

        - Circuiti analogici non lineari con diodi: raddrizzatori a semionda e onda
        intera, limitatori.

        - Condensatore MOS: struttura fisica e descrizione della polarizzazione in
        accumulazione, svuotamento ed inversione.

        - Transistore ad effetto di campo MOS: principio di funzionamento, modello
        analitico semplificato delle caratteristiche statiche I-V nei regimi lineare
        e di saturazione; effetto body; effetto di modulazione della lunghezza di
        canale. Transistori a canale N e a canale P.

        - Concetti di polarizzazione, linearizzazione e di piccolo segnale.

        - Circuito di polarizzazione a quattro resistori; il problema della desensibilizzazione
        rispetto alla dispersione dei parametri elettrici ed alla temperatura. Circuiti
        di polarizzazione a due e tre resistori.

        - Circuito equivalente "ai piccoli segnali" del transistore MOS in regione
        di saturazione, a due e tre parametri.

        - Esempi circuitali con applicazione del circuito equivalente "ai piccoli
        segnali". Connessioni elementari del MOSFET: Source Comune, Drain Comune,
        Gate Comune; parametri caratteristici ai piccoli segnali.

        - Collegamento in cascata di stadi amplificatori per piccoli segnali; accoppiamenti
        AC e DC.

        - Esercizi sull''analisi di circuiti amplificatori complessi mediante scomposizione
        in blocchi elementari.

        - Amplificatore differenziale a MOSFET.


        1. Amplificatori operazionali


        - Amplificatori operazionali (OPAMP), definizione e modello di OPAMP ideale.

        - Amplificatore invertente con OPAMP ideale: stato di riposo, guadagno; concetto
        di cortocircuito virtuale e cautele d''uso.

        - Amplificatore non invertente, separatore, amplificatore differenziale con
        OPAMP, convertitore corrente-tensione.

        - Amplificatori con OPAMP e componenti reattivi: relazioni differenziali fra
        Vu e Vi; caso dell''integratore.

        - Amplificatore per strumentazione.

        - Esercizi relativi a OPAMP ed elementi non-lineari.

        - Principali non idealità degli OPAMP: guadagno e resistenze di ingresso-uscita
        finite, offset in tensione e correnti di polarizzazione; limiti in tensione
        e corrente; slew-rate.


        1. Analisi di circuiti lineari nel dominio della frequenza


        - Funzioni di trasferimento di reti lineari a parametri tempo-invarianti

        - Caratteristiche di trasferimento passa basso, passa alto e passa banda.

        - Filtri RC primo ordine passa-alto, passa basso e passa-banda passivi ed
        attivi.


        Modulo 2: Elettronica dei Circuiti Digitali


        - Caratteristiche, prestazioni e fattori di merito delle famiglie logiche
        e dei circuiti digitali.

        - Logiche MOS statiche: caratteristiche statiche e di commutazione delle logiche
        a rapporto.

        - Logiche CMOS statiche: Full CMOS, pseudo-nMOS, logiche a pass transistors.

        - Logiche CMOS dinamiche: caratteristiche generali e problemi dei circuiti
        dinamici. Stili di progettazione a precarica, Domino CMOS, np-CMOS.

        - Consumo di potenza nei circuiti digitali.

        - Memorie a semiconduttore.'
      Testi/Bibliografia: 'Richard C. Jaeger, T. N. Blalock: Microelettronica, McGraw-Hill


        David Esseni,

        Fondamenti di Circuiti Digitali Integrati

        SGEditoriali Padova

        ISBN 88-89884-01-0


        J. Rabaey, A. Chandrakasan, B. Nikolic

        Digital Integrated Circuits, A design Perspective

        Prentice Hall.


        disponibile anche in versione italiana: Circuiti integrati digitali. L''ottica
        del progettista, Pearson Prentice Hall


        Il libro è corredato da un sito web

        (https://icbook.eecs.berkeley.edu/resources/powerpoint-slides) molto ricco
        di materiale didattico, inclusi i file dei lucidi relativi a molti capitoli
        del libro.'
      Metodi didattici: 'Lezioni teoriche in aula integrate da esercitazioni relative
        all''analisi ed al progetto di semplici circuiti analogici.


        Nell''ambito del modulo 1 vengono proposti esercizi, somministrati in itinere
        durante lo svolgimento del corso, sulla piattaforma "virtuale". Lo svolgimento
        di tali esercizi permette una graduale crescita delle conoscenze e delle conoscenze
        e facilita la preparazione dell''esame finale.


        Registrazione di lezioni relative a specifici argomenti che richiedano la
        ripetizione del processo di presentazione da parte del docente in ragione
        di particolari difficoltà di apprendimento e di contenuti di significativa
        rilevanza concettuale.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        è articolata in prove parziali scritte e orali, e consiste in una serie di
        domande volte ad accertare la conoscenza degli aspetti tecnologici e progettuali
        presentati a lezione e la soluzione a problemi pratici sul tipo di quelli
        affrontati durante le ore di esercitazione e/o laboratorio che affiancano
        il corso.


        In particolare, l''esame è suddiviso in due prove parziali relative ai due
        moduli di cui si compone il corso; ogni prova è ulteriormente articolata in
        due fasi:


        1. quesiti di carattere teorico-concettuale per la verifica della comprensione
        dei principali concetti forniti dal corso (scritto o orale);

        2. esercizi di analisi circuitale (scritto).


        Il raggiungimento da parte dello studente di una visione organica dei temi
        affrontati a lezione congiunta alla loro utilizzazione critica, la dimostrazione
        del possesso di una padronanza espressiva e di linguaggio specifico saranno
        valutati con voti di eccellenza. La conoscenza per lo più meccanica e/o mnemonica
        della materia, capacità di sintesi e di analisi non articolate e/o un linguaggio
        corretto ma non sempre appropriato porteranno a valutazioni discrete; lacune
        formative e/o linguaggio inappropriato – seppur in un contesto di conoscenze
        minimali del materiale d''esame - condurranno a voti che non supereranno la
        sufficienza. Lacune formative, linguaggio inappropriato, mancanza di orientamento
        all''interno dei materiali bibliografici offerti durante il corso non potranno
        che essere valutati negativamente.


        Ognuna delle due prove parziali viene valutata mediante un punteggio in trentesimi;
        il voto finale viene determinato dalla commissione d''esame e di norma coincide
        con la media aritmetica dei due voti parziali.'
      Strumenti a supporto della didattica: 'Proiettore slides come supporto alle
        lezione svolte alla lavagna.


        Strumenti per la diattica a distanza utilizzati prevalentemente per comunicazioni
        docente - studente a complemento della didattica tradizionale.


        Registrazione di lezioni relative a specifici argomenti che richiedano la
        ripetizione del processo di presentazione da parte del docente in ragione
        di particolari difficoltà di apprendimento e di punti di significativa rilevanza
        concettuale.'
