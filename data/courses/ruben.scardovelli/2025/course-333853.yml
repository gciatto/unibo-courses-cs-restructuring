  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/333853
    title: 2025/2026 Foundations of Informatics T (L-Z) — University of Bologna
    contents:
      Learning outcomes: The aim of the course is to give the student a general overview
        about computers and scientific computing. After this introductory part, the
        course is focused on the C language and on numerical methods both at an elementary
        level.
      Course contents: 'I. Computer architecture


        Basic digital circuits for combinational circuits, arithmetics and memories.

        RISC computers, pipelining, superscalar and parallel architectures. Memory
        hierarchy: registers, cache, main memory (RAM) and secondary memory(HD and
        CD-ROM). Addresses and buses. A brief mention of operating systems, Hard disk
        partitions and file system.


        II. The C language


        The function main, local declarations of variables, variable types. Assignment,
        arithmetic, relational and logical operators. Program blocks. Logical expressions.
        Flow control constructs: if-else if-else, switch, for, while e do-while. Multidimensional
        arrays. Functions and recursive functions. A brief mention of data structures,
        pointers and dynamic memory allocation. I/O functions in C.


        Binary numbers: integers and floating-point numbers (IEEE Standard 754), ASCII/UNICODE
        systems, RGB color palette. Sources of errors: absolute, relative and percentage
        errors. Numerical cancellation and error propagation. Machine precision and
        significant digits.


        III. Introduction to numerical methods


        Function approximation: Lagrangian interpolation, Taylor polynomial and series.


        Finite difference methods: approximation of the first, second and n-th derivative
        with backward and forward finite differences, with first and second order
        truncation error; approximation of the first, second and n-th derivative with
        centered finite differences. ODE of the second order with constant coefficients.


        Root-finding algorithms: solution of linear system with Gauss method. Non
        linear equations: bisection, Fixed point and Newton-Raphson''s (tangent) method.
        The secant method and Regula Falsi method.


        Numerical integration: rectangle rule, trapezoidal rule, Simpson''s formula.
        Richardson''s extrapolation and Romberg''s method. Gauss quadrature. Local
        and global truncation error and order of convergence.'
      Readings/Bibliography: 'Instructor lecture notes and lab tutorials (on the University
        platform: https://iol.unibo.it)


        Additional books:

        Brookshear, Kochan. Fondamenti di informatica e programmazione in C. Pearson

        Kelley, Pohl. C-Didattica e programmazione. Pearson

        Bellini, Guidi. Linguaggio C. McGraw-Hill

        Ceri, Mandrioli, Sbattella. Informatica: arte e mestiere. McGraw-Hill

        Monegato. Fondamenti di calcolo numerico. Levrotto & Bella

        Epperson. Introduzione all''analisi numerica. McGraw-Hil'
      Teaching methods: 'Class lectures and 12 laboratory tutorials with Personal
        Computers.


        Tutor assistance.'
      Assessment methods: 'Two written examinations.


        The grade is distributed as follows:


        1. Programming written C language test in lab and data visualization with
        linux operating system: ( minimum score: 8, max: 16)

        2. Programming written numerical analysis test in lab with linux operating
        system (minimum score: 8, max: 16)


        The total sum of the two scores, greater than or equal to the minimum, is
        the final grade, that must be >= 18. Honors are given if the score is > 30.


        In accordance with the University Code of Ethics and Conduct, students are
        reminded to act with the utmost integrity. Any activity aimed at improperly
        influencing the outcome of examinations is prohibited (e.g., cheating, plagiarism,
        accessing online course materials, or using unauthorized AI tools). It is
        specifically noted that merely possessing unauthorized devices or materials
        during an exam will result in the immediate invalidation of the test and reporting
        to the relevant offices.

        Any behavior that violates this prohibition may lead to disciplinary proceedings
        or reports to the appropriate authorities, where criminally relevant; in the
        latter case, there is a risk that the students involved may face criminal
        prosecution.'
      Teaching tools: PC, projector; class lectures and computing laboratory tutorials.
      Office hours: See the website of Ruben Scardovelli (https://www.unibo.it/sitoweb/ruben.scardovelli/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
