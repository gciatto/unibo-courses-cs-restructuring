  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/530782
    title: 2025/2026 FONDAMENTI DI INFORMATICA E LABORATORIO T-AB — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso lo studente è introdotto\
        \ all\x92uso di un linguaggio di programmazione di alto livello e relativi\
        \ ambienti di sviluppo. Possiede capacità di analisi, specifica e sintesi\
        \ di algoritmi. Possiede capacità di analisi, specifica e progetto, orientati\
        \ agli oggetti, di sistemi software."
      Contenuti: '- Introduzione all''informatica

        - Introduzione agli elaboratori elettronici

        - Introduzione alle reti

        - Introduzione ai sistemi operativi

        - Algoritmi e linguaggi di programmazione

        - Costruzione di componenti software

        - Metodologie per il progetto della soluzione di problemi su piccola scala

        - Tipi di dato

        - Input/Output

        - Espressioni e istruzioni di controllo

        - Funzioni e procedure

        - Ricorsione (cenni)

        - Record di attivazione e modello run-time

        - Array e stringhe

        - Matrici

        - File di testo e file binari

        - Allocazione dinamica

        - Comandi e console Unix (cenni)


        Durante lo svolgimento delle lezioni sul linguaggio C, verranno svolti numerosi
        esercizi ed esempi di programmazione in laboratorio, al fine di fornire agli
        studenti le capacità di analisi e progettazione di algoritmi (ad esempio studiando
        gli algoritmi di ordinamento o di calcolo numerico piu'' noti) dando al comtempo
        nozioni intuitive sulla complessità computazionale.'
      Testi/Bibliografia: '- Dispense del Corso disponibili in l (https://virtuale.unibo.it/course/view.php?id=54865)ucidi
        in formato elettronico (https://virtuale.unibo.it/course/view.php?id=60680)
        .

        - D. Mandrioli, S. Ceri, L. Sbattella, P. Cremonesi, G. Cugola: "Informatica:
        Arte e mestiere", Terza Edizione, McGraw-Hill, Giugno 2008.


        Linguaggio C:


        - A. Bellini, A. Guidi,"Linguaggio C: Guida alla Programmazione", Seconda
        Edizione, Mc Graw-Hill, Milano, 2003.

        - Kernighan, Ritchie: "Il Linguaggio C", Seconda Edizione, Pearson-Prentice
        Hall, 2004.

        - H. M. Deitel, J. Deitel, "C: Corso Completo di Programmazione", Apogeo,
        Terza Edizione, 2007.


        Esercizi in C:


        - A. Ciampolini, E. Lamma: "Esercizi di Programmazione in Linguaggio C", Progetto
        Leonardo, Esculapio, Bologna, 1999.'
      Metodi didattici: Il corso prevede circa 60 ore di didattica frontale e 60 ore
        di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione del modulo
        comprende:

        Una prova di laboratorio


        - Risoluzione di un problema mediante costruzione di un programma in linguaggio
        C.

        - Occorre dimostrare di saper effettivamente produrre un programma eseguibile
        che rispetti le specifiche date.


        Una prova (scritta)


        - Occorre dimostrare di aver assimilato anche le parti "teoriche".'
      Strumenti a supporto della didattica: 'Didattica frontale: lucidi proiettati
        a lezione.

        Laboratorio didattico con esercitazioni guidate.'
