syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517362
    title: 2025/2026 FONDAMENTI DI INFORMATICA T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Lo studente viene introdotto ai principi,
        alle metodologie di progetto e agli strumenti fondamentali per lo sviluppo
        di applicazioni informatiche, indagando alcuni classici problemi computazionali,
        procedendo per ciascuno di essi all’identificazione di idonei algoritmi risolutivi,
        formalizzati in termini del linguaggio di programmazione C. Lo studente acquisisce:
        - familiarità e padronanza del linguaggio di programmazione; - capacità di
        tradurrre un problema in un algoritmo; - aspetti teorici dell''informatica
        e dei sistemi di calcolo.'
      Contenuti: 'In seguito ad una discussione con il coordinamento del corso di
        studi, è stato stabilito di utilizzare per il corso il linguaggio Python.
        I rimanenti obiettivi formativi sono immutati.


        Il contenuti del corso includeranno:


        - Introduzione all''informatica

        - Utilizzo dell''emulatore di terminale

        - Interprete Python e notabook Jupyter

        - Programmazione strutturata

        - Funzioni

        - Collezioni

        - Sistema Operativo ed Hardware

        - Calcolo vettoriale in Python

        - Accenni di Programmazione Funzionale in Python

        - Accenni di Programmazione ad Oggetti in Python

        - Accenni a metodi di calcolo numerico


        In termini di applicazioni, il corso si focalizzerà sull''utilizzo del linguaggio
        Python per la soluzione di problemi di calcolo numerico.'
      Testi/Bibliografia: 'Il corso non avrà un testo di riferimento: il materiale
        sarà costituito principalmente da notebook interattivi e slide in PDF, con
        riferimenti a tutorial online per approfondimenti.'
      Metodi didattici: Il corso fonderà lezioni frontali sotto forma di tutorial
        e momenti di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consisterà
        in una prova pratica in laboratorio. Non sarà necessario portare il proprio
        PC.


        - La prova consisterà di 3 esercizi di calcolo numerico, da risolvere al calcolatore

        - Il tempo disponibile sarà di 2 ore

        - Sarà possibile consultare il materiale delle lezioni (slide, tutorial e
        soluzioni)

        - Non sarà possibile portare o consultare altro materiale

        - L''utilizzo di smartphone o smartwatch durante l''esame è proibito'
      Strumenti a supporto della didattica: Il materiale del corso consisterà principalmente
        di notebook Jupyter scaricabili e slide in formato PDF.
      Orario di ricevimento: Consulta il sito web di Michele Lombardi (https://www.unibo.it/sitoweb/michele.lombardi2)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/517362
    title: 2025/2026 Foundations of Computer Science T — University of Bologna
    contents:
      Learning outcomes: 'The student is introduced to the principles, project methodologies
        and fundamental tools for the development of computer applications, investigating
        some classic computational problems, proceeding for each of them to the identification
        of suitable solution algorithms, formalized in terms of the C programming
        language. The student acquires: - familiarity and mastery of the programming
        language; - ability to translate a problem into an algorithm; - theoretical
        aspects of computer science and computing systems.'
      Course contents: 'After a discussion with the Electrical Engineering course
        coordination, the course program has been modified to use Python as a target
        language. All other learning outcomes are unchanged.


        The course content will include:


        - Introduction to Computer Science

        - Using the terminal emulator

        - Python interpreter and Jupyter notebbok

        - Structured Programming

        - Functions

        - Collections

        - Operative System and Hardware

        - Vector computations in Python

        - Elements of Functional Programming in Python

        - Elements of Object Oriented Programming in Python

        - Elements of numerical methods in Python


        In terms of applications, the course will focus on the solution on using Python
        to address numerical problems.'
      Readings/Bibliography: 'There is no reference text: teaching material will consists
        of interactive notebooks and PDF slides, with references to online resource
        for more details.'
      Teaching methods: The course will meld lectures delivered as tutorials with
        hands-on sessions.
      Assessment methods: 'The exam will consist in practical test in one of the faculty
        labs. Bringing your own PC will not be necessary.


        - The test will consist of 3 numerical computation exercises, to be solved
        at the PC

        - The available time will be 2 hours

        - Students will be able to access official course material during the exam
        (slides, tutorials, solutions)

        - Students will be forbidden to consult other material (e.g. personal notes)

        - The use of smartphones or smartwatches during the exam is likewise forbidden.'
      Teaching tools: The course material will consists of interactive Jupyter notebooks
        and PDF slides.
      Office hours: See the website of Michele Lombardi (https://www.unibo.it/sitoweb/michele.lombardi2/en)
