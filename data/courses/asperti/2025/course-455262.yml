syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455262
    title: 2025/2026 DEEP LEARNING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student understands
        the foundational ideas, recent advances and application potential of deep
        neural systems. The student understands supervised and unsupervised techniques,
        basic neural topologies, methods for visualizing and understanding the behavior
        on neural nets, adversarial and generative techniques, reinforcement learning,
        and recurrent networks. The student is able to apply such technologies to
        solving classification problems in realistic domains.
      Contenuti: 'Il corso comincia con una introduzione alle Reti Neurali e al Deep
        Learning, e al loro tipico meccanismo di addestramento: l''algoritmo di backpropagation.


        Si discuteranno i principali tipi di reti neurali: feed forward, convoluzionali
        e ricorrenti, fornendo esempi concreti e discutendo architetture che si sono
        dimostrate utili per elaborazione di immagini, localizzazione, segmentazione,
        trasferimento di stile, elaborazione del testo e molti altre applicazioni.


        Investigheremo tecniche per la visualizzazione del comportamento delle unita''
        neurali nascoste (tematica collegata a deep dreams e inceptionism), tecniche
        per ingannare le reti neural, e moderne tecniche generative tra cui i recenti
        diffusion models.


        La parte finale del corso sara'' destinata ad una introduzione al Deep Reinforcement
        Learning, con particolare attenzione alla progettazione di agenti per video
        giochi, guida autonoma, ed ad altre situazioni che richiedono comportamenti
        intelligenti complessi e adattivi.


        Prerequisiti


        Il corso è mutuato da un corso integrato con Machine Learning del Corso di
        Studi in Artificial Intelligence. Si presuppongono conoscenze di:


        - machine learning

        - analisi

        - algebra

        - pyhton'
      Testi/Bibliografia: 'Testi consigliati:


        - Dive into deep learning (https://d2l.ai/) [https://d2l.ai/]

        - I.Goodfellow, Y.Bengio, A.Courville Deep Learning (https://www.deeplearningbook.org/front_matter.pdf).
        MIT Press.


        Per ogni lezione verrano forniti puntatori specifici a materiale disponibileon
        line, in aggiunta alle slides del corso.'
      Metodi didattici: 'Lezioni frontali basate su slides, con discussione di esempi
        pratici mediante l''uso di python notebooks.


        Si prevede anche lo svolgimento di laboratori integrativi, per ulteriori 12
        ore.'
      Modalità di verifica e valutazione dell'apprendimento: 'Progetto individuale
        su tracce definite dal docente.


        Il voto può essere integrato mediante un esame orale opzionale.


        Questa modalita'' di verifica puo essere soggetta a cambiamenti in conseguenza
        del numero degli sudenti iscritti.'
      Strumenti a supporto della didattica: Le lezioni faranno un uso estensivo di
        slides. Si forniranno esempi concreti e funzionanti mediante l'uso di python
        notebooks.
      Orario di ricevimento: Consulta il sito web di Andrea Asperti (https://www.unibo.it/sitoweb/andrea.asperti)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455262
    title: 2025/2026 Deep Learning — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student understands the foundational
        ideas, recent advances and application potential of deep neural systems. The
        student understands supervised and unsupervised techniques, basic neural topologies,
        methods for visualizing and understanding the behavior on neural nets, adversarial
        and generative techniques, reinforcement learning, and recurrent networks.
        The student is able to apply such technologies to solving classification problems
        in realistic domains.
      Course contents: 'The course begins with an introduction to Neural Networks
        and Deep Learning, focusing on their typical training mechanism: the backpropagation
        algorithm.


        We will discuss the main types of neural networks: feedforward, convolutional,
        and recurrent, providing concrete examples and examining architectures that
        have proven useful for image processing, localization, segmentation, style
        transfer, text processing, and many other applications.


        Techniques for visualizing the behavior of hidden neural units will be explored,
        including those related to deep dreams and inceptionism. We will also cover
        techniques for fooling neural networks and modern generative techniques, including
        recent diffusion models.


        The final part of the course will be dedicated to an introduction to Deep
        Reinforcement Learning, with particular attention to designing agents for
        video games, autonomous driving, and other situations that require complex
        and adaptive intelligent behaviors.


        Prerequisites:


        The course is part of the integrated curriculum with Machine Learning from
        the Artificial Intelligence Studies Program. Knowledge of the following subjects
        is assumed:


        - Machine Learning

        - Analysis

        - Algebra

        - Python'
      Readings/Bibliography: 'Suggested readings:


        - Dive into Deep Learning (https://d2l.ai/)

        - I.Goodfellow, Y.Bengio, A.Courville. Deep Learning (https://www.deeplearningbook.org/front_matter.pdf).
        MIT Press.


        Specific pointers to on line material will be provided at each lesson, in
        addition to the slides of the course.'
      Teaching methods: 'Frontal lessons based on slides, with discussion of practical
        examples via pyhton notebooks.


        We also foresee laboratories held by tutors, for 12 additional hours.'
      Assessment methods: 'Individual project on topics defined by the teacher.


        The grade can be optionally integrated by an oral examination.


        The assesment method may change in relation with the attendance.'
      Teaching tools: Lectures will make extensive usage of slides. Working examples
        will be delivered by means on python notebooks.
      Office hours: See the website of Andrea Asperti (https://www.unibo.it/sitoweb/andrea.asperti/en)
