      Metodi didattici: 'Le lezioni frontali saranno organizzate con un approccio
        laboratoriale, finalizzato a stimolare il dialogo e il coinvolgimento attivo
        degli studenti. Durante il corso verranno utilizzati sia strumenti topografici
        (livello ottico, stazione totale, laser scanner, ricevitori GNSS) sia strumenti
        informatici (software per la fotogrammetria e la computer grafica), oggetto
        di studio e applicazione.


        Al termine del corso, su base volontaria, gli studenti frequentanti avranno
        la possibilità di partecipare a una campagna di scavo archeologico presso
        il sito romano di Suasa (Ancona, Marche), diretta dal Prof. Giorgi e dal docente.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        per gli studenti che frequenteranno il corso verterà anche sulla valutazione
        della partecipazione attiva alle discussioni e all''attività didattica in
        aula.


        Il voto finale sarà stabilito per mezzo di un esame orale nel quale verranno
        posti almeno tre quesiti relativi ai temi principali affrontati nel corso
        delle lezioni:


        1. Tecnologie e sistemi multimediali per la documentazione e la valorizzazione
        dei siti archeologici;

        2. Strumenti per la documentazione tradizionale e tridimensionale dei contesti
        archeologici (Livello ottico, Total Station, Laser Scanenr, Ricevitori GNSS
        e Fotogrammetria);

        3. Tecniche e software di Computer Graphics 3D.


        Ai fini del superamento dell''esame lo studente dovrà dimostrare di aver compreso
        gli argomenti trattati, di saper identificare le metodologie di rilievo adatte
        ai diversi contesti archeologici proposti e di conoscere l''iter necessario
        alla realizzazione di una ricostruzione virtuale, utilizzando in modo appropriato
        la terminologia propria della disciplina.


        Criteri di valutazione:


        - valutazione insufficiente: lo studente dimostra conoscenze estremamante
        frammentarie e superficiali dei contenuti, errori nell’applicare i concetti,
        esposizione carente e preparazione non adeguata in nessuna delle tre parti
        della verifica;

        - valutazione sufficiente: lo studente dimostra conoscenze dei contenuti sufficienti
        ma generali, esposizione semplice, incertezze nell’applicazione di concetti
        teorici e preparazione accettabile in almeno due delle tre parti della verifica
        (punteggio compreso tra 18/30 e 22/30);

        - valutazione positiva: lo studente dimostra conoscenze dei contenuti appropriate,
        discreta capacità di applicazione dei concetti teorici e capacità di presentare
        i contenuti in modo sufficientemente articolato in tutte le parti della verifica
        (punteggio compreso tra 23/30 e 27/30);

        - valutazione eccellente: lo studente dimostra conoscenze dei contenuti ampie,
        complete ed approfondite, significative capacità di elaborazione critica degli
        argomenti trattati, buona applicazione dei contenuti, buona capacità di analisi
        e di sintesi, esposizione sicura e corretta in tutte le parti della verifica
        (punteggio compreso tra 28/30 e 30/30).

        - lode: lo studente dimostra conoscenze dei contenuti molto ampie, complete
        ed approfondite, capacità ben consolidata di applicare i contenuti, ottima
        capacità di analisi, di sintesi e di collegamenti interdisciplinari, padronanza
        di esposizione.'
      Strumenti a supporto della didattica: 'Presentazioni in power point;


        Bibliografia specialistica eventualmente indicata a chi ne facesse richiesta
        per un approfondimento;


        Materiale didattico online.'
