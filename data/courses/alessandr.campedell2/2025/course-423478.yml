    contents:
      Conoscenze e abilità da conseguire: "Il corso ha come obiettivo formativo la\
        \ conoscenza delle tecnologie informatiche applicate alla ricerca archeologica\
        \ nei diversi ambiti applicativi che caratterizzano il complesso iter processuale\
        \ che porta\nl'informazione collegata con il dato archeologico dalle tecniche\
        \ di prospezione, allo scavo, alla catalogazione, al restauro e alla relativa\
        \ musealizzazione. L'uso oramai estensivo delle tecnologie di rappresentazione\n\
        digitale dell'informazione nei diversi passaggi fa sì che l'informatica applicata\
        \ all'archeologia costituisca oggi un processo sistemico di integrazione in\
        \ networking di numerose tecnologie di rappresentazione\nmultimediale basate\
        \ su linguaggi object - oriented multipiattaforma - web based, organizzati\
        \ per lo più in strutture centralizzate (server) e in forma di metadati (XML,\
        \ JavaScript, KML etc.).\nAl termine del corso lo studente:\n\n- è in grado\
        \ di governare tale complesso iter processuale e tecnologico\n- è in possesso\
        \ delle basi teoriche e pratiche della rappresentazione digitale del dato\
        \ archeologico nei diversi formati,\n- è in possesso delle basi teoriche e\
        \ pratiche relative alle tecniche ed ai protocolli di trasformazione, rappresentazione,\
        \ di trasmissione e comunicazione dei dati archeologici\n- è in possesso delle\
        \ conoscenze, delle corrette strategie e delle abilità pratiche che gli consentono\
        \ di partecipare consapevolmente al progetto ed alla realizzazione di un sistema\
        \ informativo server-web di\n  archiviazione e rappresentazione multimediale\
        \ del dato archeologico."
      Contenuti: 'Il corso si articola in tre parti, con l''obiettivo di fornire agli
        studenti una panoramica completa sull''impiego delle tecnologie multimediali
        nella ricerca e nella valorizzazione del patrimonio archeologico.


        Parte I – Introduzione e contesto


        In apertura, verrà proposta una riflessione sul ruolo e sull’evoluzione delle
        nuove tecnologie multimediali applicate ai Beni Culturali, con particolare
        attenzione all’archeologia. Si delineerà un percorso logico-operativo che
        guida tutte le fasi necessarie per rilevare, documentare, conoscere e ricostruire
        virtualmente un contesto archeologico.


        Parte II – Tecniche di documentazione e rilievo


        La seconda sezione sarà dedicata ai moderni metodi di documentazione archeologica,
        con un focus sugli strumenti e le tecnologie più utilizzati: stazione totale,
        laser scanner, ricevitori GNSS e fotogrammetria digitale. Verranno esaminati
        i principali problemi connessi alla documentazione di un sito archeologico,
        considerando variabili quali l’estensione dell’area e lo stato di conservazione.
        Saranno inoltre introdotte le metodologie di elaborazione dei modelli 3D generati
        a partire da nuvole di punti acquisite tramite laser scanner e tecniche fotogrammetriche
        (image-based modeling).


        Parte III – Ricostruzione virtuale e computer graphics 3D


        Nella terza e ultima parte, attraverso l''analisi di alcuni casi studio, verranno
        approfondite le potenzialità delle tecniche di computer graphics 3D applicate
        alla ricerca archeologica. Verrà evidenziato come queste tecnologie abbiano
        profondamente trasformato, negli ultimi anni, il modo di rapportarsi con il
        passato e di comunicarlo al pubblico.


        La ricostruzione virtuale, per essere scientificamente fondata, non può basarsi
        su ipotesi arbitrarie: il corso seguirà dunque un approccio rigoroso, descrivendo
        tutte le fasi necessarie per giungere a un modello 3D credibile. Si partirà
        dalla raccolta e analisi delle informazioni sull’oggetto o contesto da ricostruire,
        passando per la produzione di elaborati grafici (ad es. disegni vettoriali
        2D), fino allo sviluppo del modello tridimensionale e alla progettazione della
        sua presentazione al pubblico. In questo processo, il rilievo digitale rappresenta
        una fase centrale e imprescindibile, in quanto fondamento per garantire l''affidabilità
        delle successive fasi ricostruttive.'
