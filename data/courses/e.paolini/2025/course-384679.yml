  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/384679
    title: 2025/2026 PROGETTO DI ELETTRONICA E TELECOMUNICAZIONI LM — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        la capacità di affrontare un problema complesso di carattere progettuale,
        di formulare le specifiche tecniche in base agli obiettivi prefissi e di procedere
        al progetto di un sistema elettronico o delle telecomunicazioni che risponda
        a tali specifiche.
      Contenuti: 'Modulo 1.


        Questo modulo introduce lo studente alla programmazione di sistemi per l''elaborazione
        numerica dei segnali (DSP) e alla programmazione model-based di sistemi embedded.
        Viene dapprima illustrata l''architettura di sistema e l''ambiente di programmazione.
        Successivamente, lo studente esegue numerose esperienze di laboratorio riguardanti
        l''implementazione di algoritmi che operano in tempo reale su DSP e esperienze
        di laboratorio che prevedono l''utilizzo di Matlab/Simulink. Fra essi:


        - Implementazione di filtri digitali FIR e IIR e loro caratterizzazione;

        - Implementazione di filtri adattativi basati sull''algoritmo LMS;

        - Effetti audio;

        - Sistemi di analisi spettrale dei segnali basati su FFT;

        - Sistemi di trasmissione numerica.


        Modulo 2.


        Durante il modulo verranno approfonditi aspetti legati al settore della progettazione
        elettronica, con particolare riferimento:


        - alla modellizzazione, progettazione e fabbricazione di schede a circuito
        stampato (PCB)

        - all''uso di programmi CAD Electronic Design Automation (EDA) per il progetto
        di sistemi elettronici a componenti discreti


        Il modulo illustrerà elementi legati alla tecnologia di fabbricazione di schede
        PCB, fornirà fondamenti di signal/power integrity, descriverà il flusso di
        progetto per schede PCB, affronterà problematiche di realizzazione del layout
        e approfondirà tecniche di progetto di schede PCB multistrato.


        Modulo 3.


        Questo modulo introduce lo studente alle tecniche avanzate di statistical
        signal processing in uso nelle reti di telecomunicazioni moderne, con riferimento
        sia a tematiche consolidate che a soluzioni innovative. Il programma prevede
        lezioni frontali ed esercitazioni in laboratorio in ambiente MATLAB. Le attività
        specifiche includono:


        - Introduzione alle tecniche base di machine learning e statistical signal
        processing: regressione lineare e non lineare, gradiente stocastico, algoritmi
        di detection e classificazione, clustering.

        - Implementazione ed utilizzo degli algoritmi visti a lezione per la risoluzione
        di alcuni problemi comuni nei sistemi di telecomunicazioni.'
      Testi/Bibliografia: 'Modulo 1.


        Le dispense fornite dal docente, i testi delle esercitazioni di laboratorio
        (resi disponibili online in formato elettronico sul repository istituzionale)
        e alcuni tutorial Mathworks rappresentano uno strumento sufficiente per lo
        svolgimento del modulo. I seguenti volumi possono tuttavia essere utili allo
        studenti ai fini di consultazione:


        - T.B. Welch, C.H.G. Wright, and M.G. Morrow, Real-Time Digital Signal Processing.
        CRC Press, 2006.

        - R. Chassaing, Digital Signal Processing and Applications with the C6713
        and C6416 DSK. Wiley Interscience, 2005.

        - R. Chassaing, Digital Signal Processing: Laboratory Experiments Using C
        and the TMS320C31 DSK. Wiley Series on Topics in Signal Processing, 1999.


        Alcune delle esercitazioni di laboratorio proposte sono tratte dal secondo
        volume della lista precedente.


        Modulo 2.


        Le dispense presentate a lezione vengono messe a disposizione dello studente
        in formato elettronico nei repository istituzionali. I seguenti volumi possono
        tuttavia essere utili allo studenti ai fini di consultazione e approfondimento:


        - S. C. Thierauf, High-Speed Circuit Board Signal Integrity, Artech House,
        2004

        - H. B. Bakoglu , Circuits, Interconnections and Packaging for VLSI, Addison-Wesley,
        1990.


        Modulo 3.


        Il docente renderà disponibili in formato elettronico, sui repository istituzionali,
        le dispense presentate a lezione.


        Di seguito alcuni testi consigliati:


        - C. M. Bishop, Pattern Recognition and Machine Learning, Springer, 2007.

        - J. Watt, R. Borhani, A. K. Katsaggelos, Machine Learning Refined: Foundations,
        Algorithms, and Applications, Cambridge University Press, 2020.

        - I. Goodfellow, Y. Bengio, A. Courville, Deep Learning, MIT Press, 2016.

        - R. M. Gray, L. D. Davisson, An Introduction to Statistical Signal Processing,
        Cambridge University Press, 2012.

        - M. Mitzenmacher, E. Upfal, Probability and Computing: Randomized Algorithms
        and Probabilistic Analysis, Cambridge University Press, 2005.'
      Metodi didattici: 'Modulo 1.


        L''attività didattica avrà luogo prevalentemente presso il Laboratorio di
        Elettronica e Telecomunicazioni e sarà per la maggior parte dedicata allo
        svolgimento di esperienze di laboratorio nelle quali verranno implementati
        algoritmi per l''elaborazione numerica dei segnali. Tali esperienze di laboratorio
        verranno eseguite dagli studenti in gruppi (tipicamente due studenti per gruppo).
        Sono previsti anche alcuni momenti di lezione frontale, finalizzati alla presentazione
        delle esperienze di laboratorio che si andranno a svolgere e, ove necessario,
        al richiamo di alcuni elementi di teoria utili per comprendere le esercitazioni
        stesse.


        Modulo 2.


        L''attività didattica sarà dedicata sia a lezioni teoriche in aula che a lezioni
        pratiche da svolgersi presso il Laboratorio di Elettronica e Telecomunicazioni
        al fine di apprendere l''uso di strumenti CAD EDA per la progettazione di
        sistemi elettronici a componenti discreti basati su schede a circuito stampato
        (PCB) . Oltre alla normale attività didattica, potranno essere previsti durante
        il corso alcuni seminari tenuti da esperti del settore, di estrazione universitaria
        e aziendale.


        Modulo 3.


        Il modulo prevede lezioni frontali, per introdurre gli argomenti specifici
        e approfondire gli aspetti più operativi, ed esercitazioni pratiche in laboratorio.
        Particolare enfasi è data alle esercitazioni, che sono essenziali per poter
        acquisire una comprensione completa delle tecniche introdotte a lezione. Allo
        scopo di motivare lo studente e stimolarne l''interesse, ciascuna esercitazione
        è strutturata in modo da conseguire determinati obiettivi pratici funzionali
        allo svolgimento delle esercitazioni successive. Le esercitazioni sono inoltre
        pensate per stimolare la capacità degli studenti a lavorare in gruppo.


        Nota - In considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai Moduli 1, 2 e 3 di formazione sulla
        sicurezza nei luoghi di studio (https://site.unibo.it/tutela-promozione-salute-sicurezza/it/corsi-di-formazione/formazione-obbligatoria-su-sicurezza-e-salute-per-svolgimento-di-tirocinio-tesi-laboratorio),
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Modulo 1.


        L''apprendimento viene verificato mediante l''assegnazione, da parte del docente,
        di un progetto che ciascun gruppo di studenti dovrà sviluppare ed implementare
        su DSP. Ciascun gruppo di studenti dovrà produrre una relazione, nella quale
        devono essere chiariti l''obiettivo del progetto, la soluzione identificata,
        una descrizione dell''algoritmo sviluppato, tutti i file sorgenti sviluppati,
        e il contributo individuale di ciascun componente del gruppo nell''ambito
        del progetto. A valle della consegna della relazione al docente, ciascun gruppo
        verrà chiamato a presentare al docente il proprio progetto, rispondendo a
        domande orali inerenti agli argomenti del corso e al progetto sviluppato.


        Modulo 2.


        Gli studenti dovranno sviluppare un progetto di circuito elettronico e la
        relativa implementazione su scheda PCB a 4 strati, redigendo una relazione
        in cui dovranno essere evidenziate le principali scelte progettuali.L''esame
        consisterà nella discussione della relazione da parte dello studente e in
        un colloquio orale volto a verificare la conoscenza dei contenuti presentati
        nel corso. Costituiranno elementi di valutazione la conoscenza e l''applicazione
        dei concetti e delle tecniche di progetto presentate durante il corso, la
        padronanza dei concetti presentati, l''uso corretto del linguaggio tecnico
        della disciplina.


        Modulo 3.


        La verifica dell''apprendimento avviene tramite una prova finale che intende
        valutare la capacità dello studente nel saper utilizzare le conoscenze acquisite
        a lezione per risolvere alcuni problemi comuni nei sistemi di telecomunicazioni.
        La prova consiste in un colloquio orale, in cui si chiede allo studente di
        illustrare una relazione finale sulle esperienze effettuate in laboratorio
        e su eventuali progetti di fine corso.


        Nota - Alle Studentesse e agli Studenti con DSA o disabilità temporanee o
        permanenti si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile,
        all''indirizzo (https://site.unibo.it/studenti-con-disabilita-e-dsa/it [https://site.unibo.it/studenti-con-disabilita-e-dsa/it):]
        ). Sarà cura dell''ufficio proporre eventuali adattamenti, che dovranno comunque
        essere sottoposti, con un anticipo di 15 giorni, all’approvazione del/la docente,
        che ne valuterà l''opportunità anche in relazione agli obiettivi formativi
        dell''insegnamento.'
      Strumenti a supporto della didattica: 'Modulo 1.


        Il modulo prevede l''uso di kit di sviluppo Texas Instruments TMS320C6713,
        programmati mediante ambiente di sviluppo Code Composer Studio. I kit di sviluppo
        DSP verranno interfacciati con strumenti di laboratorio quali il generatore
        di funzioni e l''oscilloscopio. Il modulo prevede anche l''utilizzo di Matlab/Simulink
        per la parte di programmazione model-based.


        Modulo 2.


        Oltre alla normale dotazione delle aule didattiche, il modulo prevede l''uso
        del laboratorio di elettronica e di workstation CAD equipaggiate con software
        CAD EDA per la progettazione di PCB.


        Modulo 3.


        PC dotati di sistema operativo Windows e MATLAB.'
