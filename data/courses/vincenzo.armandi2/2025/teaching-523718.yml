syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523718
    title: 2025/2026 ARCHITETTURA DI INTERNET — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        conoscenze relativamente alle architetture tecnologiche e all'organizzazione
        della rete Internet. Inoltre impara ad utilizzare i principali metodi, protocolli
        e strumenti della comunicazione, basati sul calcolatore, Internet e il WWW.
        In particolare, ha competenze relativamente alle procedure e ai dispositivi
        per le comunicazioni LAN e WAN, e al funzionamento del protocollo TCP/IP (Trasmission
        Control Protocol/Internet Protocol).
      Contenuti: '- Reti locali e Internetworking

        - Architettura e protocolli per Reti di Calcolatori LAN, WAN, MAN

        - Stack Iso/Osi: Livello Fisico, MAC, Rete, Trasporto e Applicazione

        - Struttura e Servizi Fondamentali di Internet

        - Routing e Accesso a Internet

        - Le Applicazioni su Internet

        - Esempi di protocolli: Ethernet, IEEE 802.11, HDLC, PPP, ARP, RARP, IP, TCP,
        UDP, HTTP, SMTP, POP, IMAP, ICMP, TELNET, FTP

        - Esempi di servizi: World Wide Web, Email, news, Chat, sistemi Client/Server,
        P2P e file-sharing

        - Cenni su Wireless Internet e Sicurezza delle Reti

        - Focus su HTTP, TCP, IP'
      Testi/Bibliografia: F. Kurose, K. W. Ross, Internet e Reti di Calcolatori, 3a
        Ed. o superiori, Pearson Ed.
      Metodi didattici: 'Il corso prevede:


        - lezioni in presenza tenute dal docente;

        - esercitazioni tenute dal docente/tutor, volte a fornire a candidate/i gli
        strumenti e i modelli per utili per la progettazione quantitativa e qualitativa
        di sistemi/protocolli/applicazioni/reti internet/web.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame di fine corso,
        ha lo scopo di verificare se studenti/studentesse sono in possesso delle conoscenze
        adeguate relativamente alle architetture tecnologiche della rete Internet,
        con particolare riferimento ai principali metodi, protocolli e strumenti della
        comunicazione tramite Internet e il WWW.


        In particolare, l''esame è scritto e mira a valutare tramite un congruo numero
        di esercizi/quesiti (una decina solitamete) se studenti/studentesse sappiano
        risolvere problemi di natura tecnica/progettuale, basati su calcoli, riguardo
        ai tre successivi ambiti:


        - i protocolli di livello applicazione, con attenzione a HTTP,

        - i protocolli di livello rete e routing, con attenzione a IP e RIP/OSPF/BGP,

        - i protocolli di livello trasporto, con attenzione a TCP.


        Ogni compito si compone di una decina di quesiti sui temi sopra indicati.
        Ogni quesito richiede lo sviluppo di (semplici) conti. 3 punti sono assegnabili
        per ogni quesito ben risolto, per assommare a 30.


        E'' possibile una estensione orale dell''esame dipendentemente dai casi.


        Per quanto concerne studenti/sse con DSA o disabilità temporanee o permanenti:
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: '- Riferimenti a materiale aggiuntivo
        disponibile sul web

        - Letture consigliate

        - Esercitazioni didattiche calibrate sulle caratteristiche della classe (o
        parte di essa)'
      Orario di ricevimento: Consulta il sito web di Marco Roccetti (https://www.unibo.it/sitoweb/marco.roccetti)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523718
    title: 2025/2026 Internet Architecture — University of Bologna
    contents:
      Learning outcomes: Learning the Internet architecture, its organizazion, its
        communication protocols and prominent applications (i.e., web)
      Course contents: '- Internetworking: fundamentals

        - Communication protocols for LAN, WAN, MAN

        - MAC, Transport, and Application Layers

        - Internet structure

        - Routing in Internet

        - Internet applications

        - Ethernet, IEEE 802.11, HDLC, PPP, ARP, RARP, IP, TCP, UDP, HTTP, SMTP, POP,
        IMAP, ICMP, TELNET, FTP

        - World Wide Web, Email, news, Chat, Client/Server, P2P file-sharing

        - Security and Privacy (brief notes)

        - Wireless Networking and Internet (brief notes)

        - Focus on HTTP, TCP and IP'
      Readings/Bibliography: F. Kurose, K. W. Ross, Internet e Reti di Calcolatori,
        3a Ed. or later ones, Pearson Ed.
      Teaching methods: 'The course is comprised of:


        - Lessons in presence.

        - Exercises (with calculations) for the design of Internet based systems/applications/services.'
      Assessment methods: 'The examination aims at evaluating if students have acquired
        adequate knowledge and sufficient practical skills as to the Internet architecture,
        its organisation, its communication protocols and prominent applications/services
        (i.e., the web).


        In particular, the written examination is comprised of an adequate number
        of exercises (usually the number is ten), whose solutions will indicate whether
        the student is able to manage this specific kind of knowledge, both from a
        technical and from a practical viewpoint.


        The following three topics are typically addressed.


        - application level protocols, e.g., HTTP,

        - network level protocols, e.g., IP, RIP/OSPF/BGP,

        - transport level protocols, e.g., TCP.


        Every test is comprised of ten questions. Each question (answers to which
        imply simple calculations) is assigned 3 point, yielding 30 for a test carried
        out perfectly.


        Also an oral examination can be conducted depending on the specific case.


        As to students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible ( https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        ) as soon as possible so that they can propose acceptable adjustments. The
        request for adaptation must be submitted in advance (15 days before the exam
        date) to the lecturer, who will assess the appropriateness of the adjustments,
        taking into account the teaching objectives.'
      Teaching tools: '- References to additional material on the web

        - Suggested readings

        - Exercises'
      Office hours: See the website of Marco Roccetti (https://www.unibo.it/sitoweb/marco.roccetti/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
