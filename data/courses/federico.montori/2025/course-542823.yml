syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/542823
    title: 2025/2026 Basic IT Skills — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'By the end of the course, the student:
        understands the functionality of software for online information research
        and for creating text documents, spreadsheets, and presentations; is able
        to create a text document and apply the desired formatting; is able to use
        the basic functions of a spreadsheet; is able to create a professional presentation.'
      Contenuti: 'This Course is part of the Integrated Course "Transversal Skills".


        The Integrated Course aims to provide the student with fundamental competences
        in digital literacy, evidence-based approach, and personal and professional
        well-being.


        The Integrated Course "Transversal Skills" contributes to the achievement
        of the following ESEVT Day One Competences: 1.1, 1.2, 1.4, 1.5, 1.6, 1.8,
        1.9, 1.10, 1.11, 1.12, 1.13, 1.14, 1.15.


        Specific Course contents:


        - 3h: usage of writing and presentation tools with a focus on formatting (Microsoft
        Word, Microsoft Power Point, Latex).

        - 2h lecture + 1h practical

        - 3h: usage of spreadsheet (Microsoft Excel).

        - 2h lecture + 1h practical

        - 2h: basics of generative artificial intelligence and prompt engineering
        (ChatGPT, Gemini, ...).

        - 1h lecture + 1h practical'
      Testi/Bibliografia: The teaching materials (Lecture Slides) for this course
        are available on the Virtuale Learning Environment (https://virtuale.unibo.it/?lang=en)
      Metodi didattici: The course includes both theoretical lectures and practical/laboratory
        sessions.
      Modalità di verifica e valutazione dell'apprendimento: 'The final exam of the
        Integrated Course "Transversal Skills (I.C.)" consists of two parts (scheduled
        on the same day).


        The first part is a written test comprising 18 multiple choice questions and
        1 open question covering topics from the 2 courses “Information literacy and
        Evidence-based medicine” and “Basic It Skills” of the Integrated Course, and
        a practical exercise on the use of Excel and it is designed to assess the
        student''s comprehensive knowledge of the subject matters of these 2 courses.


        Each correct question will earn 1 point (multi choice) and 2 points (open
        question); the practical part in Excel will earn 10 points. No points will
        be subtracted in case of wrong answer or unanswered question. The use of supporting
        material such as books, notebooks, class notes, etc. is not authorized during
        the test. Students can use their laptop/tablet only for the practical exercise
        in Excel.


        The test assignment will last 1h and will be considered as successful with
        a minimum grade of 18/30. If needed, a follow-up discussion will allow the
        Candidate to comment on the wrong answers.


        The second part is an oral exam. The oral exam will consist in an oral presentation
        of an individual assignment report covering topics from the course “Promoting
        personal and professional wellbeing” aimed at evaluating the acquisition of
        knowledge and competences in this course. The report should be presented through
        a power point presentation not exceeding 5 slides for a total of 10 minutes
        oral discussion. A minimum score of 18/30 is required to pass the oral exam.


        The final grade of the Integrated Course is determined by averaging the scores
        of the two assessments (if a minimum of 18/30 is obtained in both exams).
        Students can register for the exam through the online AlmaEsami platform (http://almaesami.unibo.it/
        ). In case of failure, the exam may be retaken after a minimum of three weeks.
        In accordance with Unibo teaching regulations, Article 16, Paragraph 5, students
        are entitled to refuse a passing grade on one occasion.


        In compliance with Law 104/1992 and Law 170/2010, and in alignment with institutional
        inclusion policies, students with certified disabilities or specific learning
        disorders—as well as those with recognized special educational needs—will
        receive appropriate accommodations during assessments. Such students should
        promptly contact the course instructor and inform the University’s Disability
        and SLD Support Service [https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ] . A faculty member is appointed to oversee this service within the Department
        [https://scienzemedicheveterinarie.unibo.it/it/dipartimento/organizzazione/referenti-istituzionali]
        .'
      Strumenti a supporto della didattica: 'Teaching materials are available on the
        Virtuale platform and can be reached through the link on the teacher webpage.


        In case of difficulty understanding the course content, the instructor is
        available for clarification meetings, which must be scheduled via email.'
      Orario di ricevimento: Consulta il sito web di Federico Montori (https://www.unibo.it/sitoweb/federico.montori)
