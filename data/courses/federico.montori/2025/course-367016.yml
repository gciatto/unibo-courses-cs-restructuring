  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/367016
    title: 2025/2026 LABORATORIO DI APPLICAZIONI MOBILI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "\"Il corso tratta gli aspetti tecnologici\
        \ e metodologici e gli strumenti per lo sviluppo di applicazioni per dispositivi\
        \ mobili, su piattaforme iOS (iPhone, iPad, iPod Touch, ecc.) e Android.\n\
        Sono incluse la gestione di dispositivi dotati di interfacce utente innovative,\
        \ multi-touch, gestione eventi, la programmazione Swift (iOS) e Android SDK,\
        \ design patterns, interfacciamento dati esterno, sensori e geo-localizzazione,\
        \ servizi di networking, debugging, problemi di privacy, context aware computing\
        \ e test di applicazioni.\nAlla fine del corso lo studente conosce:\n\n- le\
        \ problematiche delle applicazioni eseguite in contesto wireless mobile;\n\
        - le piattaforme più importanti per lo sviluppo di applicazioni mobili;\n\
        - le API dei device interni;\n- la gestione della multimedialita' in contesto\
        \ wireless mobile;\n- iOS SDK e Android SDK\n- come progettare e implementare\
        \ applicazioni con il design pattern Model-View-Controller, nei due ambienti\
        \ di sviluppo.\n  \""
      Contenuti: '- Panoramica sugli aspetti tecnologici dei dispositivi mobili

        - Differenze fra applicazioni ibride, native e WebApp.

        - Android Setup

        - Architettura e Componenti di Android

        - Kotlin per Android

        - Android Activities

        - Android Views, Layouts e Events

        - Android Resources

        - Android Intents

        - iOS Setup

        - Architettura e Componenti di iOS

        - Swift per iOS

        - iOS Storyboards e UIKit

        - iOS Target, Action e Outlets

        - Design Pattern Architetturali

        - Android Background Work

        - Android Data Management

        - Android Fragments e Navigation

        - Pervasività (mappe, sensori, …)

        - Programmatic UI e Compose

        - Programmatic UI e SwiftUI

        - Unit Tests and UI Tests

        - Flutter

        - React Native'
      Testi/Bibliografia: 'Materiale online su https://developer.apple.com/library/ios/navigation/


        Materiale online su https://developer.android.com/'
      Metodi didattici: 'Il corso si svolge al secondo semestre ed è strutturato in
        lezioni frontali in aula, in italiano con materiale in lingua inglese. Vengono
        presentati innanzitutto i fondamenti degli argomenti trattati nel resto del
        corso. In particolare, dopo aver introdotto le nozioni di base e gli strumenti
        di sviluppo (iOS Xcode e Android SDK) il corso si suddivide in due filoni
        asimmetrici di lezioni ed esercitazioni di laboratorio, che riguardano lo
        sviluppo di applicazioni mobili in ambiente Android e iOS.


        Ogni lezione illustra un tema specifico, con molti riferimenti alle librerie
        di supporto, agli strumenti e facilities per lo sviluppo e il debug, e nella
        maggior parte dei casi si finalizza con la messa in pratica dei concetti illustrati
        direttamente all''interno di esercitazioni di programmazione svolte in aula
        dal docente (demo). Ciò favorisce la comprensione dei principi e la loro messa
        in pratica, con il risultato di permettere agli studenti di realizzare le
        loro proto-applicazioni al di fuori dell''aula (su strumenti di sviluppo personali
        o nel laboratorio didattico del corso) in totale autonomia


        Vengono inoltre dati alcuni elementi per orientare lo studente verso lo sviluppo
        di applicazioni ibride.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/ ] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso prevede lo
        svolgimento di un progetto tipicamente individuale (in alcuni casi si contemplano
        gruppi di due persone) relativo alla realizzazione di un''applicazione iOS
        e/o Android (se lo studente lo desidera può essere anche ibrida) e nella discussione
        delle scelte progettuali e di realizzazione del progetto in una sessione di
        esame orale (di circa 30 minuti). Prima della fine del corso vengono proposte
        alcune tipologie di applicazioni mobili da realizzare come progetto del corso,
        e possibili livelli di estensione e complessità. Se lo studente è interessato,
        può proporre progetti su base personale. In tal caso, l''applicazione oggetto
        del progetto DEVE essere preventivamente concordata con il docente e il tutor,
        preferibilmente inviando una e-mail con subject "Proposta progetto esame corso
        LAM A.A. X/Y" all''indirizzo email del tutor del corso. Definito un progetto
        (approvato dal docente o facente parte dell''elenco fornito), il candidato
        deve sviluppare l''applicazione e deve produrre una presentazione di 10 minuti
        (supportata da 10-15 slide) oltre che una relazione in formato elettronico
        (pdf) equivalente ad una versione espansa dei contenuti verbali della presentazione,
        contenente la descrizione dell''utilizzo dell''applicazione supportato da
        screenshot, scelte progettuali e tutti i riferimenti a materiale, codice realizzato
        e fonti documentali. Per la consegna dei progetti sono fissate di norma 6
        scadenze annuali: a Giugno, Luglio, Settembre, Novembre, Gennaio e Febbraio.
        La consegna dei progetti deve avvenire entro le date indicate (comunicate
        nella mailing list del corso e sul portale VIRTUALE delle lezioni del corso),
        esclusivamente tramite l''applicativo VIRTUALE del corso, allegando un archivio
        compresso con il codice del progetto e la relazione. Una volta consegnato
        il progetto si viene convocati per la prova orale di norma nell''arco di una
        o due settimane che seguono la scadenza di consegna. La data della prova viene
        stabilita preventivamente su Almaesami e pubblicata sul newsgroup per consentire
        alle persone interessate di partecipare. La prova si tiene in presenza presso
        il l''ufficio del docente oppure in una delle aule seminari del Dipartimento
        di Informatica - Scienza e Ingegneria, in Mura Anteo Zamboni 7. Alla prova
        di esame (demo/presentazione del progetto) viene inoltre collegato un esame
        orale (costituito da domande e veloci esercizi) su tutto il programma del
        corso, incluse domande teoriche sulle demo svolte a lezione in entrambe le
        piattaforme (iOS e Android). Gli studenti sono quindi tenuti a conoscere le
        tecniche di sviluppo illustrate a lezione su entrambe le piattaforme.


        L''esito della discussione del progetto produce un voto in trentesimi che
        può essere modificato in difetto o in eccesso dalla parte teorica dell''esame
        orale. Ciò determina la proposta di voto finale. Entrambe le parti dell''esame
        devono essere sufficienti per poterne determinare il superamento. Se il voto
        finale così determinato eguaglia o supera i 30/30 può essere prevista l''attribuzione
        della lode.'
      Strumenti a supporto della didattica: 'Slides elettroniche, personal computer
        a proiettore.


        Riferimenti in rete.'
      Orario di ricevimento: Consulta il sito web di Federico Montori (https://www.unibo.it/sitoweb/federico.montori)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/367016
    title: 2025/2026 Mobile Applications Laboratory — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows methodological
        and technological aspects, and application development tools for mobile devices
        both under iOS (iPhone, iPad, iPod Touch) and Android platforms. Students
        will understand the management of devices with innovative user interfaces,
        multi-touch, event management, ObjectiveC programming, Xcode and Cocoa Touch,
        Eclipse and Android SDK, design patterns, I/O, sensors and geo-localization/maps
        APIs, networking services, debugging and testing of applications. In addition,
        students will understand the basic issues of applications' execution in wireless
        mobile scenarios, and will experience the most relevant platforms for mobile
        applications' development, APIs of internal devices, multimedia management,
        iPhone and Android SDK and design of applications under a Model-View-Control
        pattern.
      Course contents: '- Overview of the technological aspects of mobile devices

        - Differences between hybrid, native, and Web applications

        - Android Setup

        - Android Architecture and Components

        - Kotlin for Android

        - Android Activities

        - Android Views, Layouts, and Events

        - Android Resources

        - Android Intents

        - iOS Setup

        - iOS Architecture and Components

        - Swift for iOS

        - iOS Storyboards and UIKit

        - iOS Targets, Actions, and Outlets

        - Architectural Design Patterns

        - Android Background Work

        - Android Data Management

        - Android Fragments and Navigation

        - Pervasive computing (maps, sensors, …)

        - Programmatic UI and Compose

        - Programmatic UI and SwiftUI

        - Unit Tests and UI Tests

        - Flutter

        - React Native'
      Readings/Bibliography: 'Online material on https://developer.apple.com/library/ios/navigation/


        Online material on https://developer.android.com/'
      Teaching methods: 'The course takes place in the second semester and is structured
        as in-person lectures held in Italian, with course materials provided in English.
        It first introduces the fundamental concepts that are covered in the rest
        of the course. In particular, after presenting the basic notions and development
        tools (iOS Xcode and Android SDK), the course is divided into two parallel
        but asymmetrical tracks of lectures and laboratory sessions focused on mobile
        application development in the Android and iOS environments.


        Each lecture addresses a specific topic, with many references to support libraries,
        development tools, and debugging facilities. In most cases, lectures conclude
        with the practical application of the presented concepts through programming
        exercises carried out live in class by the instructor (demos). This approach
        fosters understanding of the principles and their practical implementation,
        enabling students to independently develop their own prototype applications
        outside the classroom (using personal development tools or the course’s teaching
        laboratory facilities).


        The course also provides introductory elements to guide students toward hybrid
        application development.


        Given the type of activities and teaching methods adopted, attendance in this
        course requires prior completion by all students of Modules 1 and 2 of the
        safety training for study environments, available in e-learning mode at: [https://elearning-sicurezza.unibo.it/
        ]'
      Assessment methods: 'The course requires the completion of a typically individual
        project (in some cases, groups of two are allowed) involving the development
        of an iOS and/or Android application (if the student wishes, it may also be
        hybrid). The project must then be discussed, including the design and implementation
        choices, during an oral exam session (approximately 30 minutes). Before the
        end of the course, several types of mobile applications are proposed as possible
        project topics, along with possible levels of extension and complexity. If
        interested, students may propose their own project ideas. In this case, the
        application must be agreed upon in advance with the instructor and the tutor,
        preferably by sending an email with the subject line: “Proposta progetto esame
        corso LAM A.A. X/Y” to the course tutor’s email address.


        Once the project has been defined (either approved by the instructor or selected
        from the provided list), the student must develop the application and prepare:
        a 10-minute presentation (supported by 10–15 slides); a written report in
        electronic format (PDF), equivalent to an expanded version of the presentation’s
        verbal content, including a description of how the application works supported
        by screenshots, design choices, and all references to materials, developed
        code, and documentation sources.


        There are normally six annual submission deadlines: June, July, September,
        November, January, and February. Projects must be submitted by the indicated
        deadlines (communicated via the course mailing list and on the VIRTUALE course
        portal), exclusively through the course’s VIRTUALE platform, by uploading
        a compressed archive containing the project code and the report. After submission,
        students are usually invited to the oral exam within one or two weeks following
        the deadline. The exam date is scheduled in advance on Almaesami and published
        on the course newsgroup to allow interested students to attend. The exam takes
        place in person at the instructor’s office or in one of the seminar rooms
        of the Department of Computer Science and Engineering, located at Mura Anteo
        Zamboni 7. The exam session (project demo/presentation) also includes an oral
        examination (consisting of questions and short exercises) covering the entire
        course syllabus, including theoretical questions about the in-class demos
        carried out on both platforms (iOS and Android). Students are therefore required
        to be familiar with the development techniques illustrated in class for both
        platforms. The outcome of the project discussion results in a grade out of
        30, which may be adjusted upward or downward based on the theoretical part
        of the oral exam. This determines the proposed final grade. Both parts of
        the exam must be passed in order to pass the course. If the final grade reaches
        or exceeds 30/30, honors (lode) may be awarded.'
      Teaching tools: 'Slides, personal computer, projector.


        Online references.'
