  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/412632
    title: 2025/2026 BUSINESS INTELLIGENCE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        in modo approfondito i sistemi di data warehouse, con particolare riferimento
        alle architetture e alle tecniche di analisi dei dati, e le principali tecnologie
        alla base dei sistemi di business intelligence. E altresì in grado di condurre
        un progetto di data warehouse attraverso le sue fasi di analisi delle sorgenti
        dati e dei requisiti, e di progettazione concettuale, logica, fisica e dell'alimentazione.
      Contenuti: "Prerequisiti\n\nL’allievo che accede a questo insegnamento conosce\
        \ i sistemi database, il modello relazionale e il linguaggio SQL. Tali conoscenze\
        \ sono acquisite, di norma, superando l’esame di Basi di Dati.\n\nTutte le\
        \ lezioni saranno tenute in Italiano. È quindi necessaria la comprensione\
        \ della lingua italiana per seguire con profitto il corso e per poter utilizzare\
        \ il materiale didattico fornito.\n\nProgramma\n\n1. Business intelligence:\n\
        \n- il ruolo della BI nel sistema informativo aziendale;\n- la piramide della\
        \ BI.\n\n1. Data Warehousing:\n\n- architetture;\n- tecniche di analisi dei\
        \ dati: reportistica e OLAP;\n- il ciclo di sviluppo:\n  \n  - analisi delle\
        \ sorgenti dati;\n  - analisi dei requisiti;\n  - progettazione concettuale;\n\
        \  - carico di lavoro e volume dati;\n  - progettazione logica;\n  - progettazione\
        \ dell'alimentazione;\n  - progettazione fisica."
      Testi/Bibliografia: "- Lucidi del corso.\n- M. Golfarelli, Stefano Rizzi. Data\
        \ Warehouse: teoria e pratica della progettazione. McGraw-Hill, seconda edizione,\
        \ 2006.\n  Letture consigliate:\n- M. Berry, G. Linoff. Data mining techniques\
        \ for marketing, sales, and customer support. John Wiley & Sons, 1997.\n-\
        \ B. Devlin. Data warehouse: from architecture to implementation. Addison-Wesley\
        \ Longman, 1997.\n- W.H. Inmon. Building the data warehouse. John Wiley &\
        \ Sons, 1996.\n- M. Jarke, M. Lenzerini, Y. Vassiliou, P. Vassiliadis. Fundamentals\
        \ of data warehouse. Springer, 2000.\n- R. Kimball, L. Reeves, M. Ross, W.\
        \ Thornthwaite. The data warehouse lifecycle toolkit. John Wiley & Sons, 1998.\n\
        - I. Witten, E. Frank. Data mining. Morgan Kaufmann Publishers, 2000."
      Metodi didattici: '- Lezioni ed esercitazioni in aula

        - Esercitazioni di gruppo su lavagne collaborative virtuali

        - Esercitazioni pratiche in laboratorio su strumenti di data warehousing diffusi
        in ambito aziendale


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Gli esami verranno effettuati
        in presenza. L''esame consiste in una prova scritta della durata di 90 minuti
        seguita da una prova pratica di 30 minuti; durante entrambe le prove è espressamente
        vietato consultare libri e appunti. Il testo della prova scritta si compone
        di una parte progettuale, che richiede di risolvere due esercizi di progettazione
        concettuale e logica di data warehouse (16/32 punti), e di una parte teorica
        (da risolvere online via EOL) che include alcune domande sui contenuti dell''intero
        corso (10/32 punti). La prova pratica utilizzerà le tecnologie viste durante
        le esercitazioni di laboratorio (6/32 punti). Ulteriori dettagli verranno
        comunicati a lezione e nelle "note" abbinate agli appelli pubblicati su AlmaEsami.

        Il punteggio viene assegnato in trentesimi.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite AlmaEsami,
        nel rispetto delle scadenze previste. Coloro che non riuscissero a iscriversi
        entro la data prevista, sono tenuti a comunicare tempestivamente (e comunque
        prima della chiusura ufficiale delle liste di iscrizione) il problema alla
        segreteria didattica. Sarà facoltà del docente ammetterli a sostenere la prova.
        Una volta pubblicato il risultato della prova, ciascuno studente ha una settimana
        di tempo per comunicare via email al docente se intende rifiutare il voto
        conseguito. Sono ammessi massimo due rifiuti.'
      Strumenti a supporto della didattica: 'Materiale didattico scaricabile da Internet.


        Piattaforma Teams per la didattica a distanza.


        Piattaforma Miro per le esercitazioni.'
      Orario di ricevimento: 'Consulta il sito web di Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi)


        Consulta il sito web di Enrico Gallinucci (https://www.unibo.it/sitoweb/enrico.gallinucci)'
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/412632
    title: 2025/2026 Business Intelligence — University of Bologna
    contents:
      Learning outcomes: After the course, the student is skilled in business intelligence
        architectures and functionalities. In particular, the student is capable of
        designing and administrating enterprise data warehouses.
      Course contents: "Requirements\n\nA prior knowledge and understanding of database\
        \ systems, relational model, and SQL language is required to attend with profit\
        \ this course. These notions are normally achieved by giving an exam of Databases\
        \ or Information Systems.\n\nFluent spoken and written Italian is a necessary\
        \ pre-requisite: all lectures and tutorials, and all study material will be\
        \ in Italian.\n\nCourse Contents\n\n1. Business intelligence:\n\n- the role\
        \ of BI in the corporate information system;\n- the BI pyramid.\n\n1. Data\
        \ Warehousing:\n\n- architectures;\n- techniques for data analysis: reporting\
        \ and OLAP;\n- lifecycle:\n  \n  - data source analysis;\n  - requirement\
        \ analysis;\n  - conceptual design;\n  - workload and data volume;\n  - logical\
        \ design;\n  - design of ETL procedures;\n  - physical design."
      Readings/Bibliography: "- Slides.\n- M. Golfarelli, Stefano Rizzi. Data Warehouse:\
        \ teoria e pratica della progettazione. McGraw-Hill, Second Edition, 2006.\n\
        \  Recommended readings:\n- M. Berry, G. Linoff. Data mining techniques for\
        \ marketing, sales, and customer support. John Wiley & Sons, 1997.\n- B. Devlin.\
        \ Data warehouse: from architecture to implementation. Addison-Wesley Longman,\
        \ 1997.\n- W.H. Inmon. Building the data warehouse. John Wiley & Sons, 1996.\n\
        - M. Jarke, M. Lenzerini, Y. Vassiliou, P. Vassiliadis. Fundamentals of data\
        \ warehouse. Springer, 2000.\n- R. Kimball, L. Reeves, M. Ross, W. Thornthwaite.\
        \ The data warehouse lifecycle toolkit. John Wiley & Sons, 1998.\n- I. Witten,\
        \ E. Frank. Data mining. Morgan Kaufmann Publishers, 2000."
      Teaching methods: '- Lessons and exercises in the classroom

        - Team exercises using virtual collaborative whiteboards

        - Practice in the laboratory on widespread data warehousing tools


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        online'
      Assessment methods: 'Exams will be done in person. An exam consists of a 90-minute
        written test, followed by a 30-minute practical test; no books or notes can
        be accessed during both tests. The written test includes a design section,
        that requires to solve two exercises about conceptual and logical data warehouse
        design (16/32 points), and a theoretical section (to be solved online via
        EOL) based on a few questions on all the course contents (10/32 points). The
        practical test uses the technological stack seen during lab lessons (6/32
        points). Further details will be given during the lessons and in the "notes"
        field of AlmaEsami.


        To attend the exam, each student must sign up via AlmaEsami within a deadline.
        Those who cannot sign up must immediately communicate the problem to the teaching
        secretariat. Deciding whether to allow them to attend the exam or not is up
        to the teacher. Once the test results have been published, each student has
        one week to decide if (s)he wants to accept the grade or not. In case s(he)
        decides to refuse the grade, s(he) has to write an email to the teacher. No
        more than two refusals are allowed.'
      Teaching tools: 'Downloadable didactic material.


        Teams platform for online teaching.


        Miro platform for exercises.'
      Office hours: 'See the website of Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi/en)


        See the website of Enrico Gallinucci (https://www.unibo.it/sitoweb/enrico.gallinucci/en)'
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
