syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/534687
    title: 2025/2026 FONDAMENTI DI INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le nozioni fondamentali riguardanti le macchine digitali e l'architettura
        dei calcolatori e il loro uso nell'elaborazione dell'informazione. Inoltre,
        possiede le conoscenze utili alla progettazione di algoritmi e gli strumenti
        necessari alla loro implementazione mediante un linguaggio di alto livello
        per risolvere semplici problemi dell’ingegneria.
      Contenuti: 'Architettura di base dei calcolatori: architettura di Von Neuman;
        struttura di una CPU.


        Rappresentazione dell''informazione: rappresentazione dell''informazione numerica
        (rappresentazione in complemento a due, rappresentazione floating-point);
        rappresentazione dell''informazione non numerica.


        Logica Booleana: Algebra di Boole. Espressioni e funzioni booleane. Porte
        logiche e schemi circuitali.


        Introduzione agli algoritmi e alle strutture dati: definizione di algoritmo
        ed esempi; strutture dati fondamentali.


        Introduzione all''intelligenza artificiale: concetti e strumenti fondamentali.


        Il linguaggio MATLAB/Octave: Costrutti fondamentali. Strutture dati. Operazioni
        su vettori e matrici. Elementi di programmazione vettoriale. Input e Output.
        Funzioni. Visibilità delle variabili. Uso di funzioni grafiche.'
      Testi/Bibliografia: 'Approfondimenti sulla parte di teoria:


        J. Glenn Brookshear, Dennis Brylow “Informatica—una panoramica generale”,
        12/ed., Pearson 2016


        G. Michael Schneider, Judith L. Gersting "Informatica " Edizione italiana
        a cura di Antonio Gentile e Roberto Pirrone - Maggioli, 2013


        Testo sulla programmazione in MATLAB:


        S. Attaway. MATLAB - A Practical Introduction to Programming and Problem Solving.
        5th Edition, Elsevier 2019.


        (la versione elettronica della quinta edizione del testo è scaricabile dal
        sito della casa editrice gratuitamente per gli studenti dell''Università di
        Bologna)'
      Metodi didattici: Lezioni in cui verranno introdotti i vari argomenti ed esercitazioni
        in cui ogni argomento sarà accompagnato da esempi, casi di studio ed esercizi.
      Modalità di verifica e valutazione dell'apprendimento: 'Gli studenti saranno
        valutati considerando di base 2 prove:


        - pratica: sviluppando autonomamente a casa dei progettini software in Matlab

        - scritto: composto da esercizi e domande di tipo teorico


        Sarà eventualmente disponibile anche un esame orale.


        L''esame è strutturato in modo tale da valutare il raggiungimento degli obiettivi
        didattici; in particolare, la capacità di ragionare in termini logici e algoritmici
        e le competenze di analisi e sintesi di programmi in linguaggio MATLAB/Octav'
      Strumenti a supporto della didattica: Nel corso sarà utilizzato anche materiale
        didattico fornito dal docente (in particolare, lucidi e dispense con esercizi
        e problemi vari).
      Orario di ricevimento: Consulta il sito web di Mirko Ravaioli (https://www.unibo.it/sitoweb/mirko.ravaioli)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/534687
    title: 2025/2026 Principles of Informatics — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student possesses the fundamental
        notions regarding digital machines and the architecture of computers and their
        use in information processing. In addition, he possesses the knowledge useful
        for the design of algorithms and the tools necessary for their implementation
        using a high-level language to solve simple engineering problems.
      Course contents: 'Basic computer architecture: Von Neuman architecture; structure
        of a CPU.


        Information representation: representation of numerical information (two''s
        complement representation, floating-point representation); representation
        of non-numerical information.


        Boolean logic: Boolean algebra. Boolean expressions and functions. Logic gates
        and circuit diagrams.


        Introduction to algorithms and data structures: definition of algorithm and
        examples; fundamental data structures.


        The MATLAB / Octave language: Fundamental constructs. Data structures. Operations
        on vectors and matrices. Vector programming elements. Input and Output. Functions.
        Visibility of variables. Use of graphic functions.'
      Readings/Bibliography: 'J. Glenn Brookshear, Dennis Brylow “Informatica—una
        panoramica generale”, 12/ed., Pearson 2016


        G. Michael Schneider, Judith L. Gersting "Informatica " Edizione italiana
        a cura di Antonio Gentile e Roberto Pirrone - Maggioli, 2013


        Testo sulla programmazione in MATLAB:


        S. Attaway. MATLAB - A Practical Introduction to Programming and Problem Solving.
        5th Edition, Elsevier 2019'
      Teaching methods: Lessons in which the various topics will be introduced and
        exercises in which each topic will be accompanied by examples, case studies
        and exercises.
      Assessment methods: 'Students will be assessed considering 2 basic tests:


        - autonomously developing software projects in Matlab at home

        - composed of exercises and theoretical questions


        An oral exam will eventually be available.


        The exam is structured in such a way as to evaluate the achievement of the
        didactic objectives; in particular, the ability to reason in logical and algorithmic
        terms and the skills of analysis and synthesis of programs in MATLAB / Octav
        language'
      Teaching tools: The course will also use didactic material provided by the teacher
        (in particular, slides and handouts with various exercises and problems).
      Office hours: See the website of Mirko Ravaioli (https://www.unibo.it/sitoweb/mirko.ravaioli/en)
