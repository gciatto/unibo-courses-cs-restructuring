syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498819
    title: 2025/2026 RETI DI CALCOLATORI E PROGRAMMAZIONE DI RETE — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        le nozioni essenziali sulle architetture delle moderne reti di telecomunicazioni,
        con particolare riferimento ad Internet, e sulle problematiche di progettazione
        e implementazione dei relativi protocolli di comunicazione e delle applicazioni
        che comunicano via rete.
      Contenuti: 'Il programma dell''insegnamento ha come obiettivo quello di presentare
        i problemi riguardanti le moderne applicazioni di rete, al fine di fornire
        una comprensione generale delle principali soluzioni, in modo generale e non
        strettamente correlati alle attuali tecnologie (che sono potenzialmente soggette
        a cambiamenti nel tempo).


        Le varie tematiche vengono pressoché sempre presentate in due fasi, la prima
        dedicata allo studio del problema in termini generali, la seconda orientata
        a mostrare le soluzioni tecnologiche correnti. Le principali tematiche affrontate
        sono le seguenti.


        Introduzione alle reti ed ai servizi di telecomunicazione. Multiplazione,
        commutazione di circuito e di pacchetto. Modello ISO-OSI. I principali mezzi
        trasmissivi.


        La rete Internet: servizi client-server e peer-to-peer, indirizzamento e instradamento
        IP, ISP e dorsali Internet, livelli di protocollo e modelli di servizio, primi
        cenni di sicurezza.


        Protocolli di trasporto, TCP ed UDP. Utilizzo delle socket per implementare
        applicazioni di rete.'
      Testi/Bibliografia: James F. Kurose, Keith W. Ross. Reti di Calcolatori e Internet,
        un approccio top-down. Pearson; 8° edizione (21 gennaio 2022), ISBN 8891916005.
      Metodi didattici: 'Lezioni frontali ed esercitazioni pratiche guidate.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio [ https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute
        ] in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: Le modalità di svolgimento
        della prova d'esame sono spiegate nella pagina del corso sulla piattaforma
        Virtuale.
      Strumenti a supporto della didattica: Il materiale didattico presentato a lezione
        viene messo a disposizione degli studenti in formato elettronico sulla piattaforma
        Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Andrea Melis (https://www.unibo.it/sitoweb/a.melis)


        Consulta il sito web di Franco Callegati (https://www.unibo.it/sitoweb/franco.callegati)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498819
    title: 2025/2026 Computer Networks and Network Programming — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student should be able to understand
        the more common technologies used to design network applications and the most
        common protocols.
      Course contents: 'The course will present the basic principles of network applications.
        The theoretical concepts presented will be applied in laboratory projects
        aimed at understanding the implementation of network application in today
        Internet.


        Computer networks: protocols, client-server architecture, protocol layers
        and service models.


        Protocol analysis: sniffing, collection of traffic traces, analysis and debug,
        use of the Wireshark protocol analyzer.


        Internet: addressing, IP forwarding and routing, ICMP, DHCP and NAT.


        Transport layer: services, multiplexing and demultiplexing, connectionless
        service, UDP protocol, reliable data transfer, connection-oriented communication,
        TCP protocol, congestion control.

        Basics of cybersecurity: authentication, authorization, digital signatures
        and certificates.'
      Readings/Bibliography: James Kurose, Keith W. Ross. Computer Networking [Global
        Edition] Pearson; 8th edition (June 10, 2021), ISBN 1292405465.
      Teaching methods: 'Class lectures and laboratory exercises.


        Considering the type of activities and the teaching methods adopted, attendance
        of this learning activity requires all students to have previously completed
        Modules 1 and 2 of the training on safety in study environments [https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute
        ] in e-learning mode.'
      Assessment methods: Written test, please see on Virtuale for the information
        about the test.
      Teaching tools: The slides and additional resources used during the lessons
        are available on the Virtuale platform.
      Office hours: 'See the website of Andrea Melis (https://www.unibo.it/sitoweb/a.melis/en)


        See the website of Franco Callegati (https://www.unibo.it/sitoweb/franco.callegati/en)'
