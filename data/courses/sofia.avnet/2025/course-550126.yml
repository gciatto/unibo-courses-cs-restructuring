    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso lo studente possiede\
        \ una preparazione che gli consente di comprendere le basi metodologiche dell'Informatica\
        \ di Base, con particolare riguardo agli aspetti relativi alla architetture\
        \ di elaborazione dei sistemi informatici e del software necessario al loro\
        \ funzionamento.\nIn particolare lo studente è in grado di:\n\x95 conoscere\
        \ le differenti architetture funzionali di un elaboratore elettronico;\n\x95\
        \ conoscere i criteri attraverso i quali si valutano le prestazioni di calcolo\
        \ dei sistemi informatici;\n\x95 descrivere i blocchi funzionali di un elaboratore\
        \ ed essere in grado di associare ad essi i dispositivi fisici corrispondenti;\n\
        \x95 descrivere le modalità di rappresentazione numerica nei sistemi binari\
        \ e decimale e la tipologia di dati circolanti in un calcolatore;\n\x95 riconoscere\
        \ le differenti modalità di trasferimento dati in un elaboratore elettronico\
        \ ed i flussi di input ed output generati dalle elaborazioni;\n\x95 distinguere\
        \ le differenti tipologie e funzionalità dei sistemi operativi disponibili\
        \ per un calcolatore elettronico;\n\x95 descrivere le varie categorie di elaborazioni\
        \ possibili (primarie e di servizio);\n\x95 conoscere le principali architetture\
        \ di connessioni in rete degli elaboratori elettronici e la struttura di Internet;\n\
        \x95 descrivere i protocolli e la modalità di trasmissione dati e i principali\
        \ servizi software disponibili in rete;\n\x95 configurare un elaboratore per\
        \ il suo collegamento in rete locale ed essere in grado di utilizzare i principali\
        \ software di office automation e di internetworking;\n\x95 utilizzare le\
        \ metodologie di base per la messa in sicurezza dei sistemi informatici."
      Contenuti: "- Fondamenti sugli elaboratori di calcolo (hardware e software)\n\
        - Fondamenti sui principali software del pacchetto Office:\n  \n  a) Teoria\
        \ e esercitazione pratica su come preparare una presentazione .ppt\n\nb) Teoria\
        \ di base e esercitazione pratica su come usare word\n\n- Fondamenti sull'uso\
        \ di utilities (Obsidian)\n- Fondamenti sui motori di ricerca scientifici\
        \ e gli strumenti di valutazione della ricerca scientifica (h-index, scopus,\
        \ web of science)"
      Testi/Bibliografia: Diapositive delle lezioni
      Metodi didattici: Lezioni frontali e una esercitazione pratica
      Modalità di verifica e valutazione dell'apprendimento: Test scritto
      Orario di ricevimento: Consulta il sito web di Sofia Avnet (https://www.unibo.it/sitoweb/sofia.avnet3)
