syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/446613
    title: 2025/2026 KNOWLEDGE ENGINEERING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa, lo studente
        conosce metodi (semi-)automatizzati per l'interpretazione di dati e contenuti
        come fonti di conoscenza. Lo studente domina i principi dell'estrazione, dell'ingegneria
        e del collegamento della conoscenza, rendendo i dati adatti al ragionamento
        automatico, tipicamente su piattaforme decentralizzate come il Web.
      Contenuti: 'Knowledge graphs and ontologies


        Semantic Web standards: OWL, RDF, SPARQL


        Ontology Design methodologies and ontology design patterns


        Reasoning methods, neuro-symbolic reasoning


        Large Language Models and Knowledge Engineering: applications and research
        challenges


        Knowledge extraction use cases: text and music'
      Testi/Bibliografia: 'Note e slide fornite dal docente.


        Hitzler, P., Gangemi, A., & Janowicz, K. (2016). Ontology Engineering with
        Ontology Design Patterns. Amsterdam: IOS Press.


        P.A. Bonatti, S. Decker, A. Polleres, V. Presutti, Knowledge graphs: new directions
        for knowledge representation on the Semantic Web (dagstuhl seminar 18371).
        Dagstuhl Rep. 8(9), 29–111 (2019)


        Aidan Hogan et. al. Knowledge graphs. ACM Computing Surveys, Vol. 54, No.
        4, Article 71


        Semantic Web (W3C Recommendations):


        OWL 2: https://www.w3.org/TR/2012/REC-owl2-rdf-based-semantics-20121211/ (https://www.w3.org/TR/2012/REC-owl2-rdf-based-semantics-20121211/&nbsp;)


        RDF: https://www.w3.org/TR/2014/REC-rdf11-mt-20140225/


        SPARQL: https://www.w3.org/TR/2013/REC-sparql11-query-20130321'
      Metodi didattici: Lezioni frontali, esercitazioni in laboratorio, compiti a
        casa e quiz di auto-valutazione.
      Modalità di verifica e valutazione dell'apprendimento: '- Progetto in gruppo,
        scelto da una lista proposta dai docenti (con valutazione individuale)


        Progetto: I gruppi dovranno applicare le metodologie di modellazione semantica
        acquisite e sperimentate durante il corso, per la creazione di un knowledge
        graph a partire da risorse esistenti (banca dati, testo, etc.), riusando /
        estendendo altre ontologie e dove necessario applicando strumenti di knowledge
        extraction, entity linking, ontology alignment, etc.


        I docenti assegneranno un progetto ad ogni gruppo fornendo loro le specifiche
        di realizzazione. Prima dell''assegnazione, ogni gruppo potrà esprimere tre
        preferenze in base a una lista di progetti disponibili. Sarà data priorità
        alle preferenze durante l''assegnazione, tuttavia non è possibile garantire
        che saranno soddisfatte (in caso di conflitti).'
      Strumenti a supporto della didattica: Slide, tool per l'autovalutazione, discord
        per le discussione e comunicazioni asincrone.
      Orario di ricevimento: 'Consulta il sito web di Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti)


        Consulta il sito web di Andrea Giovanni Nuzzolese (https://www.unibo.it/sitoweb/andrea.nuzzolese2)'
      SDGs: 'Istruzione di qualità Partnership per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/446613
    title: 2025/2026 Knowledge Engineering — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows some (semi-)automated
        methods for joint interpretation of data and content as sources of knowledge.
        The student masters the basics of knowledge extraction, engineering, and linking,
        making data suitable to machine querying and automated reasoning, typically
        on decentralized platforms such as the Web.
      Course contents: 'Knowledge graphs and ontologies


        Semantic Web standards: OWL, RDF, SPARQL


        Ontology Design methodologies and ontology design patterns


        Reasoning methods, neuro-symbolic reasoning


        Large Language Models and Knowledge Engineering: applications and research
        challenges


        Knowledge extraction use cases: text and music'
      Readings/Bibliography: 'Notes and slides provided by the teacher.


        Hitzler, P., Gangemi, A., & Janowicz, K. (2016). Ontology Engineering with
        Ontology Design Patterns. Amsterdam: IOS Press.


        P.A. Bonatti, S. Decker, A. Polleres, V. Presutti, Knowledge graphs: new directions
        for knowledge representation on the Semantic Web (dagstuhl seminar 18371).
        Dagstuhl Rep. 8(9), 29–111 (2019)


        Aidan Hogan et. al. Knowledge graphs. ACM Computing Surveys, Vol. 54, No.
        4, Article 71


        Semantic Web (W3C Recommendations):


        OWL 2: https://www.w3.org/TR/2012/REC-owl2-rdf-based-semantics-20121211/


        RDF: https://www.w3.org/TR/2014/REC-rdf11-mt-20140225/


        SPARQL: https://www.w3.org/TR/2013/REC-sparql11-query-20130321 (https://www.w3.org/TR/2014/REC-rdf11-mt-20140225/)'
      Teaching methods: Lectures, lab practice, homework, and self-assessment quizzes.
      Assessment methods: '- Group project: selected from a list proposed by the teachers
        (with individual assessment)


        Project: The students will apply the semantic modeling methodologies acquired
        and experimented during the course, for the creation of a knowledge graph
        starting from existing resources (database, text, etc.), reusing / extending
        other ontologies and where necessary applying knowledge extraction tools,
        entity linking, ontology alignment, etc.


        Teachers will assign a project to each group and will provide the specification
        for its realisation. Before the assignment each group will have the possibility
        to express two preferences on a list of available projects. Priority will
        be given to students'' preference if possible, it cannot be guaranteed though
        that they will be addressed (in case of conflicts).'
      Teaching tools: Slides, tools for self-assessment and, discord for asynchronous
        discussions and communication.
      Office hours: 'See the website of Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti/en)


        See the website of Andrea Giovanni Nuzzolese (https://www.unibo.it/sitoweb/andrea.nuzzolese2/en)'
      SDGs: 'Quality education Partnerships for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
