syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/543624
    title: 2025/2026 Computer Studies and Human Sciences (1) (LM) — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: The student knows how to apply specific
        software and informatics programmes to language and communication ambits.
      Contenuti: 'Questo modulo ha l''obiettivo di dotare gli studenti di conoscenze
        di base dell''informatica, del Web e dell''Intelligenza Artificiale, con particolare
        riferimento alle sue attuali applicazioni.


        Gli argomenti trattati nel corso sono riassunti dai seguenti punti:


        - Elementi di base dell''informatica e introduzione storica

        - Internet e il Web: basi di progettazione di pagine web (HTML, CSS)

        - Il Web semantico e basi di progettazione di ontologie e grafi di conoscenza

        - Panoramica sull''Intelligenza Artificiale (applicazioni e metodi)'
      Testi/Bibliografia: 'Note, slide e esercizi saranno resi reperibili su https://virtuale.unibo.it/


        Ciò che non è incluso nelle note può essere studiato utilizzando i seguenti
        testi / articoli / risorse online:


        - Web tutorial W3School (HTML) - https://www.w3schools.com/html/default.asp

        - Web tutorial W3School (CSS) -https://www.w3schools.com/css/default.asp

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in action (2006) reperibile online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. 2008. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann Publishers Inc., San Francisco,
        CA, USA.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns - Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press 2016, ISBN 978-1-61499-675-0'
      Metodi didattici: Lezioni frontali, esercitazioni, compiti a casa, quiz di autovalutazione.
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione di questo
        modulo è integrata con il modulo “KNOWLEDGE ENGINEERING FOR THE HUMANITIES“.
        La prova di esame e il voto sono unificati, la prova consiste in un progetto
        che può essere svolto solo dopo aver seguito il programma di entrambi i moduli.


        Si rimanda alla modalità di verifica di "KNOWLEDGE ENGINEERING FOR THE HUMANITIES"
        per i dettagli.'
      Strumenti a supporto della didattica: 'Lucidi proiettati durante la lezione
        e poi resi disponibili online sulla pagina del corso.


        Piattaforme online per quiz di autovalutazione.


        Discord, per discussioni e comunicazioni asincrone.'
      Orario di ricevimento: Consulta il sito web di Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/543624
    title: 2025/2026 Computer Studies and Human Sciences (1) (LM) — University of
      Bologna
    contents:
      Learning outcomes: The student knows how to apply specific software and informatics
        programmes to language and communication ambits.
      Course contents: 'This course aims at providing the student with an understanding
        of informatics, the Web, and artificial intelligence, with specific focus
        on its current applications.


        The topics addressed in the course are summarised as follow:


        - Basics of informatics and historical introduction

        - Internet and the Web: basics of Web page design (HTML, CSS)

        - The Semantic Web and basics of ontology and knowledge graph design

        - Artificial Intelligence (overview of applications and methods)'
      Readings/Bibliography: 'Notes, slides and exercises are available at https://virtuale.unibo.it/


        Topics not addressed by the notes and other material on iol are to be studied
        on the following books / articles / web resources:


        - Web tutorial W3School (HTML) - https://www.w3schools.com/html/default.asp

        - Web tutorial W3School (CSS) -https://www.w3schools.com/css/default.asp

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in action (2006) reperibile online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. 2008. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann Publishers Inc., San Francisco,
        CA, USA.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns - Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press 2016, ISBN 978-1-61499-675-0'
      Teaching methods: Lectures, exercises, homework, and self-assessment quizzes.
      Assessment methods: 'The assessment method for this module is integrated with
        the module "KNOWLEDGE ENGINEERING FOR THE HUMANITIES". Both the assessment
        and the evaluation (score) are unified, the assessment consists in the development
        and presentation of a project. This can be developed only after attending
        the classes of both modules.


        Please, refer to the "KNOWLEDGE ENGINEERING FOR THE HUMANITIES" module for
        details.'
      Teaching tools: Slides, they will be projected during the lectures and put online
        on the course web page.
      Office hours: See the website of Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti/en)
