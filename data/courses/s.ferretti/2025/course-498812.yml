syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498812
    title: 2025/2026 SISTEMI VIRTUALIZZATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        il sistema operativo Linux, il linguaggio di scripting bash ed è in grado
        di realizzare applicazioni che sfruttano processi concorrenti. Conosce i principi
        della virtualizzazione, il concetto di container e gli strumenti per realizzare
        sistemi informatici virtualizzati. Conosce il concetto di microservizi e le
        principali piattaforme cloud. Conosce il modello Infrastructure as code (IaC)
        ed è in grado di utilizzare gli strumenti ed i linguaggi di orchestrazione
        per realizzare infrastrutture di servizi scalabili automaticamente e che bilanciano
        il carico.
      Contenuti: 'Il corso fornisce le conoscenze teoriche sulla virtualizzazione
        e sulle piattaforme cloud e le abilità pratiche per applicare il modello Infrastructure
        as Code.


        - Casi di studio più significativi.

        - Bash Scripting.

        - Richiami sulla Gestione locale di un sistema Linux.

        - Cenni su sicurezza dei sistemi informatici, delle server farm e delle reti.
        Protocolli e utilities (tls/ssl, ssh, dtls). Strumenti essenziali in ambito
        Linux (iptables/netfilter). NAT e protocolli per superamento di NAT (STUN,TURN,
        ICE), Proxy/Relay, protocolli e strumenti per proxying, Socks.

        - Cenni su filesystem distribuiti (nfs) e storage a blocchi (iSCSI).

        - Principi di Virtualizzazione. Piattaforme di virtualizzazione. Container.
        Applicazioni della virtualizzazione.

        - Sistemi Cloud: Servizi cloud di tipo SaaS, PaaS, IaaS.

        - Cenni su Piattaforme per Cloud on premise (OpenStack, Proxmox).

        - Un primo esempio del modello Infrastructure as Code (IaC): creazione e configurazione
        automatizzata di macchine virtuali Linux (Vagrant, Cloud init, Ansible). Cenni
        su Terraform.

        - Architetture a Microservizi: architetture software language-independent
        a componenti. Bus dei messaggi (a livello kernel, locali e in cloud). Esempi
        notevoli di architetture a Microservizi in ambito locale e in ambito cloud.
        Servizi SaaS, PaaS, IaaS.

        - Un esempio di virtualizzazione a livello di container: Docker. Le API di
        docker. Le reti virtuali tra container di docker. Costruire un immagine di
        container automaticamente mediante Dockerfile; Introduzione a Docker Compose;
        Docker Swarm - eseguire applicazioni multicontainer in cluster di host utilizzando
        uno strumento nativo di docker.

        - Kubernetes: Orchestrazione di macchine virtuali, servizi e containers. Prodotti
        per orchestrazione on premise su cluster o su singolo nodo (minikube).

        - Modello Infrastructure as Code: Linguaggi e sistemi di orchestrazione (Terraform,
        Juju, ...).

        - Sistemi serverless e modello Function-as-a-Service (FaaS): Microsoft Azure
        Functions, AWS Lambda, Google Cloud Functions.

        - Cenni su IDentity Management (IDM). IDM a base Windows (Active Directory,
        LDAP) e Linux (Kerberos, openLDAP) .

        - Sviluppo di applicazioni distribuite: continuous development'
      Testi/Bibliografia: dispense del docente pubblicate sul sito personale a partire
        dall'inizio delle lezioni (vedi link)
      Metodi didattici: 'Lezioni Frontali e Esercitazioni in aula e in laboratorio
        informatico.


        I fondamenti teorici sono esposti durante le lezioni frontali. Numerosi esercizi
        pratici sono svolti in aula ad anticipare gli esercizi che gli studenti dovranno
        successivamente svolgere nelle esercitazioni guidate in laboratorio, con la
        supervisione del docente.


        Estensioni delle esercitazioni sono regolarmente suggerite, e le soluzioni
        pubblicate sul web, allo scopo di promuovere e favorire lo studio individuale
        e le attività di laboratorio autonome.


        Alcune esercitazioni in aula e in laboratorio sono dedicate a simulare lo
        svolgimento della prova teorico/pratica che costituisce la prova d''esame.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning [ https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        ].'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste di
        una verifica teorico/pratica delle conoscenza degli aspetti teorici e pratici
        della disciplina, effettuata mediante una prova scritta;


        La prova teorico/pratica consiste di una prova scritta che dura 1 ora e mezza
        e prevede risposte aperte ad una serie di domande ed alcuni semplici esercizi
        di programmazione e configurazione. La prova teorico/pratica scritta spazia
        tra tutti gli argomenti presentati durante il corso.


        Se la prova teorico/pratica viene superata, il voto viene verbalizzato dopo
        1 settimane. Lo studente ha perciò una settimana di tempo per rifiutare il
        voto.'
      Strumenti a supporto della didattica: 'Lezioni: proiezione di diapositive a
        disposizione via Web e dimostrazioni pratiche dei concetti, algoritmi, tecniche,
        API e strumenti esposti nelle discussioni a lezione. Le dimostrazioni pratiche
        utilizzano script e files che sono preventivamente messi a disposizione nella
        pagina web del corso. In tal modo, gli studenti possono meglio seguire le
        dimostrazioni e replicarle durante la stessa lezione sui loro laptop, verificando
        personalmente lo sviluppo delle operazioni e individuando e proponendo immediatamente
        al docente eventuali dubbi, così da sollecitare al massimo l''interazione
        tra studenti e docente durante le lezioni.


        Attività in laboratorio: il docente guida gli studenti nell''imparare progressivamente
        gli strumenti, le API e le strategie di risoluzione dei problemi concernenti
        tutti gli argomenti del corso. A ciascuno studente è fornito un proprio ambiente
        di lavoro virtualizzato, in cui lo studente opera con i privilegi di amministratore
        di sistema, in modo da effettuare realisticamente procedure operative di amministrazione
        dei sistemi.'
      Link ad altre eventuali informazioni: http://www.cs.unibo.it/~ghini/didattica/sistemivirtualizzati/index.html
      Orario di ricevimento: 'Consulta il sito web di Vittorio Ghini (https://www.unibo.it/sitoweb/vittorio.ghini)


        Consulta il sito web di Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498812
    title: 2025/2026 Virtualized Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the bash scripting
        language, the basic principles of virtualization, the concept of container,
        the Infrastructure as Code model and the basic language and tools to develop
        a virtualized system.
      Course contents: 'The course provides the knowledge of the basic principles
        of virtualization and the abilities to apply the Infrastructure as Code model.


        - Bash scripting.

        - Recall of local system management.

        - Overview on communication security aspects for information systems, server
        farms and network. Protocols and utilities (ssh, tls/ssl, dtls). Basic Linux
        tools (iptables/netfilter). NAT and protocols for NAT overcoming (STUN,TURN,ICE).
        Protocols and tools for proxying, socks.

        - Notes on distributed filesystems (NFS) and block storages (iSCSI).

        - Virtualization principle, platform for virtualization, container, application
        areas of virtualization.

        - Cloud systems: cloud service types such as SaaS, PaaS, IaaS.

        - Overview on cloud platform for on-premise cloud (OpenStack, Proxmox).

        - A simple example of Infrastructure as Code model: creating and configuring
        a Linux virtual machine by code (Vagrant, cloud init, ansible). Notes on Terraform

        - Micro-services Architectures: language-independent, component-based, software
        architectures. Message Bus (at a kernel level, local system or cloud scope).
        Most prominent examples of Micro-services Architectures in a local context
        and cloud context. SaaS, PaaS and IaaS cloud services.

        - A prominent example of container-level virtualization: Docker. The docker
        API. Virtual networks between docker containers. Building a container image
        automatically using Dockerfile; Introduction to Docker Compose; Docker Swarm
        - how to run multi-container applications in host clusters using a native
        docker tool.

        - Kubernetes: orchestration of virtual machines, services and containers.
        On premise orchestration products on cluster or on single node (minikube).

        - Infrastructure as Code model: Languages and systems for orchestrazione (Terraform,
        Juju, ...).

        - Introduction to Serverless systems and Function-as-a-Service (FaaS) model:
        Microsoft Azure Functions, AWS Lambda, Google Cloud Functions.

        - Notes on IDentity Management (IDM), IDM platforms and protocols based on
        Windows o.s. (Active Directory, LDAP) and based on Linux o.s. (Kerberos, openLDAP)
        .

        - Development of distributed applications: continuous development.'
      Readings/Bibliography: Slides and notes provided through course web site (see
        'Links to further information' after the beginning of course)
      Teaching methods: 'Classroom lectures and exercises, and laboratory activities.


        The theoretical knowledges are presented during the traditional lectures.
        A lot of practical exercises are developed in the lectures so as to introduce
        the laboratory activities, in which the students, under the supervision of
        the professor, check their knowledges, propose and solve their doubts and
        improve their skill.


        Extensions of the lab activities are regularly suggested, and the solutions
        published, so as to allow individual studies and autonomous lab activities.


        Some laboratory activities simulate the execution of the theoretical/practical
        exam so as to familiarize the students with the course assessment methods.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode [ https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        ].'
      Assessment methods: 'The examination consists of a verification of knowledge
        of the theoretical and practical aspects of the discipline, carried out by
        a written test;


        The theoretical/practical test is carried out as a 1-hour and half written
        exam that includes open questions and simple exercises on software programming
        and configuration. The theoretical/practical test may involve any subject
        presented during the course.


        If the theoretical/practical verification is passed, the overall grade is
        verbalized after 1 week. The student therefore has one week to refuse the
        overall grade.'
      Teaching tools: 'Lessons: projection of slideshows and practical demonstrations
        of the concepts, algorithms, techniques, API and tools proposed in the lessons.
        The practical demonstration uses scripts and files that are preventively provided
        by means of the web page of the course. Hence, the students can follow and
        replicate the demonstrations on their laptop using the wifi connections available
        in the classroom. In this way, the students can personally verify the progress
        of the operations, can identify any doubts and can ask the teacher for solutions,
        so as to solicit the interaction between the students and the lecturer during
        lessons.


        Practical laboratory activities: the teacher will guide the students to learn
        API, tools, troubleshooting strategies, and to solve problems regarding almost
        every subject of the course. A personal virtualized environment is available,
        where students can work with administrative privileges, allowing to simulate
        realistic system administrator operational procedures.'
      Links to further information: http://www.cs.unibo.it/~ghini/didattica/sistemivirtualizzati/index.html
      Office hours: 'See the website of Vittorio Ghini (https://www.unibo.it/sitoweb/vittorio.ghini/en)


        See the website of Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
