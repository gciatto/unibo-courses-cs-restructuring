syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517112
    title: 2025/2026 CYBERSECURITY — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student knows
        the basic principles of computer security and he/she is able to identify the
        main problems of computer and network security. He/she gets to understand
        and explain the main protocols and mechanisms used for securing communications
        and data transfer. He/she is able to perform a critical evaluation of the
        security of a computing infrastructure and to suggest the best countermeasures
        to mitigate the vulnerabilities, reduce the risk and increase the resilience
        to attacks. He/she is also capable of contributing to the design of systems
        that are secure by design and understanding the basic problems of computer
        forensics. Finally, he/she is able to design and contribute to the enhancement
        of the security of devices exposed to the Internet.
      Contenuti: '1. Sicurezza informatica, concetti di base. Minaccia, rischio, attacchi,
        risorse, requisiti funzionali.

        2. Brevissima introduzione ai meccanismi crittografici. Crittografia simmetrica.
        Crittografia a chiave pubblica. Firma digitale. Gestione delle chiavi.

        3. Meccanismi di autenticazione e relative problematiche.

        4. Controllo degli accessi.

        5. Malicious Software.

        6. Attacchi di tipo Denial-of-Service (DoS) e Distributed Denial-of-Service
        (DDoS).

        7. Problematiche di progettazione ed implementazione del software.

        8. Gestione della sicurezza e del rischio. Organizzazione. Analisi e valutazione
        del rischio. Progettazione ed implementazione di politiche per la gestione
        del rischio. Gestione della componente umana. Tecniche di auditing.

        9. Tecniche minimali di computer forensics e di anti-computer forensics.

        10. Tecniche per l''hardening di sistemi informatici.'
      Testi/Bibliografia: 'Il materiale didattico è costituito da:


        1. libro di testo adottato;

        2. dispense in formato elettronico messe a disposizione degli studenti su
        Virtuale (https://virtuale.unibo.it/);

        3. risorse segnalate durante le lezioni (in particolare un insieme di letture
        obbligatorie formate da articoli di stampa e articoli scientifici).


        Il testo di riferimento del corso è: Computer Security: Principles and Practice
        (https://www.pearson.com/uk/educators/higher-education-educators/program/Stallings-Computer-Security-Principles-and-Practice-Global-Edition-4th-Edition/PGM1911398.html),
        4/E William Stallings, Lawrie Brown. Global Edition. ISBN-10: 1292220619.
        ISBN-13: 978-1292220611


        La conoscenza di tutto il materiale didattico indicato nella lista precedente
        risulta essere necessaria per il superamento della prova d''esame. L''utilizzo
        delle sole dispense non è sufficiente a garantire una preparazione adeguata
        in quanto queste mirano ad integrare e sottolineare gli argomenti trattati
        nel libro di testo. Su Virtuale (https://virtuale.unibo.it/) è disponibile
        una lista dettagliata delle parti del libro di testo che sono da considerarsi
        come facenti parte del programma del corso. Inoltre le risorse segnalate durante
        l''insegnamento (es. articoli scientifici e tecnici) e sempre indicate su
        Virtuale (https://virtuale.unibo.it/) hanno lo scopo fondamentale di approfondire
        adeguatamente alcuni argomenti particolarmente importanti o di stretta attualità.


        Su Virtuale (https://virtuale.unibo.it/) sono inoltre disponibili le risposte
        alle domande più frequenti sia sui contenuti didattici che sulle modalità
        d''esame.


        Gli studenti eventualmente interessati ad approfondire l''argomento CyberSecurity
        anche da un punto vista non tecnico possono fare riferimento al volume "Cybersicurezza:
        che cos''è e come funziona (https://www.portazero.it/)" (edito da Il Mulino,
        2023). Nota: questo testo non è in alcun modo usato durante il corso né è
        necessario per l''esame.'
      Metodi didattici: 'L''insegnamento si compone di lezioni frontali erogate in
        modalità tradizionale ma con frequenti spunti alla discussione in aula legati
        alle tematiche trattate in ciascuna lezione.


        In alcune lezioni specifiche (indicate in precedenza agli studenti) viene
        effettuata una discussione di gruppo relativa ad alcuni materiali (es. articoli
        scientifici e tecnici) segnalati per tempo agli studenti e l''analisi di alcuni
        casi di studio particolarmente importanti.


        La presenza durante le lezioni (e soprattutto la parte relativa alle discussioni
        ed analisi) non è direttamente collegata al processo di valutazione ma mira
        comunque a facilitare il processo di apprendimento in particolare per quanto
        riguarda la capacità critica sviluppata dallo studente.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame di fine corso
        mira a valutare il raggiungimento degli obiettivi didattici:


        - conoscere i principali aspetti riguardanti la sicurezza informatica e delle
        reti (es. concetti di base e appropriatezza della terminologia);

        - verificare la capacità critica dello studente nell''analisi di esempi realistici
        o tratti dal mondo reale;

        - valutare la capacità dello studente nel proporre soluzioni concrete alle
        principali problematiche analizzate durante il corso.


        Il voto finale del corso si basa su una prova scritta (effettuata per mezzo
        della piattaforma EsamiOnLine (https://eol.unibo.it/)) della durata di 90
        minuti che consiste in 5 domande a risposta aperta su tutti gli argomenti
        trattati durante il corso (parti del libro di testo che sono parte del programma,
        dispense fornite dal docente, esercitazioni effettuate in aula e letture obbligatorie).
        Non è ammesso l''uso di: libri, appunti, calcolatrici, supporti informatici,
        sistemi di comunicazione. Per ciascuna domanda ci si attende che lo studente
        sia in grado di riportare in modo conciso ma appropriato l''argomento in questione
        e discuterlo con senso critico e capacità d''analisi adeguate ad un percorso
        di laurea magistrale.


        I voti vengono assegnati in base a una valutazione complessiva delle conoscenze,
        competenze, capacità di presentazione e discussione delle tematiche trattate.
        Gli intervalli dei voti possono essere descritti come segue:


        - 18-23: preparazione e capacità di analisi sufficienti ma relative ad un
        numero limitato di argomenti affrontati nel corso, utilizzo di un linguaggio
        complessivamente corretto;

        - 24-27: preparazione tecnicamente adeguata ma con alcuni limiti rispetto
        agli argomenti trattati, capacità di analisi buone, anche se non particolarmente
        articolate, espresse in un linguaggio corretto;

        - 28-30: ottima conoscenza di un ampio numero di temi affrontati nel corso,
        buone capacità di analisi e di critica, padronanza della terminologia specifica;

        - 30L: conoscenza eccellente e molto approfondita ed esaustiva dei temi affrontati
        nel corso, capacità di analisi critica e di collegamento, padronanza della
        terminologia specifica.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite il portale
        AlmaEsami (https://almaesami.unibo.it), nel rispetto delle scadenze previste.
        Coloro che non riuscissero a iscriversi entro la data prevista, sono tenuti
        a comunicare tempestivamente (e comunque prima della chiusura ufficiale delle
        liste di iscrizione) il problema alla segreteria didattica e in copia al docente.
        Sarà facoltà del docente ammetterli a sostenere la prova. Una volta pubblicato
        il risultato della prova, ciascuno studente potrà comunicare via e-mail al
        docente (entro alcuni giorni) l''eventuale volontà di rifiutare il voto conseguito.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all''approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Tutto il materiale didattico presentato
        a lezione (es. dispense, letture obbligatorie, materiale aggiuntivo) viene
        messo a disposizione degli studenti in formato elettronico su Virtuale (https://virtuale.unibo.it).
      Orario di ricevimento: 'Consulta il sito web di Gabriele D''Angelo (https://www.unibo.it/sitoweb/g.dangelo)


        Consulta il sito web di Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/517112
    title: 2025/2026 Cybersecurity — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the basic principles
        of computer security and he/she is able to identify the main problems of computer
        and network security. He/she gets to understand and explain the main protocols
        and mechanisms used for securing communications and data transfer. He/she
        is able to perform a critical evaluation of the security of a computing infrastructure
        and to suggest the best countermeasures to mitigate the vulnerabilities, reduce
        the risk and increase the resilience to attacks. He/she is also capable of
        contributing to the design of systems that are secure by design and understanding
        the basic problems of computer forensics. Finally, he/she is able to design
        and contribute to the enhancement of the security of devices exposed to the
        Internet.
      Course contents: '1. Computer and network security basics. Threats, risks, attacks,
        and assets. Security functional requirements.

        2. Small introduction to cryptography. Symmetric Encryption. Public-Key Encryption.
        Digital Signatures and Key Management.

        3. User authentication and authentication-related problems.

        4. Access control.

        5. Malicious software.

        6. Denial-of-Service (DoS) and Distributed Denial-of-Service (DDoS) attacks.

        7. Security aspects in design and implementation of software.

        8. Security management and risk assessment. Management. Risk analysis and
        evaluation. Design and implementation of security policies. Social engineering
        and human-in-the loop. Auditing.

        9. Basic computer forensics and anti-computer forensics techniques.

        10. Hardening of computing devices.'
      Readings/Bibliography: 'Teaching materials:


        - course book;

        - slides (available on Virtuale (https://virtuale.unibo.it));

        - additional resources (i.e., selected scientific papers and technical articles).


        The course book is: Computer Security: Principles and Practice (https://www.pearson.com/uk/educators/higher-education-educators/program/Stallings-Computer-Security-Principles-and-Practice-Global-Edition-4th-Edition/PGM1911398.html),
        4/E William Stallings, Lawrie Brown. Global Edition. ISBN-10: 1292220619.
        ISBN-13: 978-1292220611


        The detailed knowledge of the previously listed teaching material is mandatory
        for a positive outcome of the examination. The study of the slides is not
        sufficient for getting an adequate knowledge of the course topics.


        A list with the parts of the course book that are in the course program is
        available on Virtuale (https://virtuale.unibo.it). The additional resources
        are discussed during the lessons and then reported on Virtuale. The reading
        of these additional resources has the goal to provide a deep knowledge of
        some specific security aspects.


        On Virtuale (https://virtuale.unibo.it) is also available a list of "Frequently
        Asked Questions".'
      Teaching methods: 'The lesson are used for both teaching (with slides projected
        during the lessons) and to promote the class discussion on some selected topics.
        The class discussion is of main importance to foster a "critical thinking"
        approach among the students.


        In specific lessons (scheduled in advance) a part of the lesson is reserved
        for the discussion of the scientific papers and technical articles that have
        been assigned during a previous lesson.'
      Assessment methods: 'The final examination has the goal to check if the student
        has an adequate knowledge of the main course topics and is both able to evaluate
        the security of modern systems and to propose effective solutions to the main
        security issues.


        The exam consists of a 90-minutes written test (implemented using the EsamiOnLine
        (https://eol.unibo.it/) platform); no books, notes or electronic devices can
        be accessed during the test. The exam is made of 5 questions that cover all
        the teaching material.


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        and presentation and discussion proficiency concerning the topics covered.
        The corresponding grade ranges are described as follows:


        - 18–23: The student has sufficient preparation and analytical skills, but
        this competence is spread over only a few topics taught in the course. The
        overall jargon is correct.

        - 24–27: The student shows adequate preparation at a technical level, but
        with some doubts over the topics. Analytical skills are good yet not fully
        articulate, with the use of correct jargon.

        - 28–30: Strong knowledge about most of the topics taught in the course, good
        critical and analytical skills, and good usage of the specific jargon.

        - 30L: Excellent and in-depth knowledge of all the topics in the course, excellent
        critical and analytical skills, and excellent usage of specific jargon.


        To attend the exam, each student must sign up via AlmaEsami (https://almaesami.unibo.it)
        within a deadline. Those who cannot sign up must immediately communicate the
        problem to the teaching secretariat (and the teacher). Deciding whether to
        allow them to attend the exam or not is up to the teacher. Once the test results
        have been published, each student has some days to decide if (s)he wants to
        refuse the grade or not.


        Students with DSA or temporary or permanent disabilities: it is recommended
        to contact the responsible University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en)
        in good time: it will be their responsibility to propose any adaptations to
        the students concerned, which must however be submitted, with a 15-day notice,
        to the approval of the teacher, who will evaluate the opportunity also in
        relation to the educational objectives of the course.'
      Teaching tools: The slides and all the additional resources used during the
        lessons are available on Virtuale (https://virtuale.unibo.it).
      Office hours: 'See the website of Gabriele D''Angelo (https://www.unibo.it/sitoweb/g.dangelo/en)


        See the website of Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti/en)'
