syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/533916
    title: 2025/2026 KNOWLEDGE REPRESENTATION AND EXTRACTION (1) (LM) — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'This course aims to initiate to methods
        for interpretation of data and content as knowledge sources. At the end of
        the new course the students will be able to: master the basics of knowledge
        representation and reasoning, with application to the Semantic Web (ontologies,
        linked data, knowledge patterns); be familiar with the state-of-the-art in
        knowledge representation and extraction technologies; use applications to
        automatically extract knowledge from text; analyse the knowledge requirements
        of a customer, and produce a plan to implement them.'
      Contenuti: 'The students will master the basics of representation and extraction
        of knowledge, intended as data suitable to machine querying jointly with automated
        reasoning and generalised inferences. The course includes the following themes:


        - Knowledge Representation as computational logic methods (knowledge graphs,
        ontology design patterns, description logic, linked data frameworks)

        - Knowledge Extraction as a hybridization of either rule-based heuristics
        (scraping, linguistic patterns, graph-based data analysis), or statistical
        methods (generative AI models) for extracting data from arbitrary content

        - Representation and extraction will be presented both from a foundational
        (philosophical, cognitive) viewpoint, as well as optimal satisfaction of task-oriented
        requirements

        - The Web and Generative AI models will be the computational platforms to
        learn, test, and apply the learnt methods, with examples from multiple domains,
        with a focus on social sciences and humanities.

        - Multiple software components will be introduced during the course in order
        to make the students accustomed to semantic technologies'
      Testi/Bibliografia: 'Specific teaching materials, including papers, slides and
        exercises, will be available on the course site.

        Anyways, the following texts can be used as a generic reference for the course:


        - Logic in Action course by Johan van Benthem group (only chapters 1:4): http://www.logicinaction.org

        - World Wide Web Consortium Semantic Web standards portal: https://www.w3.org/standards/semanticweb/

        - P. Hitzler, A. Gangemi, K. Janowicz, A. Krishnadi, V. Presutti (eds.). Ontology
        Engineering with Ontology Design Patterns: Foundations and Applications, IOS
        Press, Amsterdam (2016)

        - Gangemi, A. and Nuzzolese, A.G. Logic-Augmented Generation. Journal of Web
        Semantics, 2025, https://www.sciencedirect.com/science/article/pii/S1570826824000453

        - De Giorgis, S., Gangemi, A., Russo, A. Neurosymbolic graph enrichment for
        Grounded World Models. Information Processing & Management, 62, 4, 2025, https://www.sciencedirect.com/science/article/pii/S030645732500069X'
      Metodi didattici: 'The course will be given in frontal lectures of 3 hours each,
        possibly including host lectures.

        A tutor will complement the course with hands-on and small projects in order
        to improve practical skills in realistic settings.


        Time permitting, a small project will be implemented by groups of students.
        Informal contests, such as a semantic treasure hunt, may be proposed to students.


        Projects and informal contests will contribute to the final grades.'
      Modalità di verifica e valutazione dell'apprendimento: 'The final exam will
        consist of a project work to be presented/defended with the teacher. Students
        will work in small teams (typically 3 members), choosing a realistic domain
        or problem that can be modelled, investigated, evaluated, and published on
        the Web.

        The choice will be guided by the teacher and the tutor, who will also accompany
        the teams in their work when needed. The work should be fairly spread among
        the members, and motivated during the exam presentation.


        AI can be a useful tool to support individual study with in-depth analysis,
        summaries, and self-assessment. As for learning assessment, the exam may consist
        in a section that can exploit substantial use of AI (problem solving, content
        generation), accompanied by a mandatory critical analysis section.


        Students with disabilities and Specific Learning Disorders (SLD)


        Students with disabilities or Specific Learning Disorders are entitled to
        special adjustments according to their condition, subject to assessment by
        the University Service for Students with Disabilities and SLD. Please do not
        contact teachers or Department staff, but make an appointment with the Service.
        The Service will then determine what adjustments are specifically appropriate,
        and get in touch with the teacher. For more information, please visit the
        page:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students'
      Strumenti a supporto della didattica: 'Besides the teaching facilities installed
        in the lab, software tools for design, reasoning, extraction, querying, and
        visualization of formal knowledge will be used on the existing machines by
        the students, either alone, in pairs, or in groups. The tools will enable
        the students to experiment a likely setting for real world semantic technology
        projects.


        Social media will be also used for informal interaction among students, and
        with the teacher.'
      Orario di ricevimento: Consulta il sito web di Aldo Gangemi (https://www.unibo.it/sitoweb/aldo.gangemi)
      SDGs: 'Partnership per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
