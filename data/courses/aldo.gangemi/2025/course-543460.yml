        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/543460
    title: 2025/2026 Universal Semantics (1) (LM) — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows and can apply
        abstraction methods to interpret any kind of signal from a physical, social
        or cognitive environment, either inductively (pattern discovery) or deductively
        (pattern finding). The methods will leverage theoretical or experimental findings
        from philosophy, cognitive science, semiotics, and computer science.
      Course contents: The course integrates computational and empirical approaches
        to investigate semantic universals across languages, modalities, cultures,
        practices, and neurocognitive systems. Students will engage in data-driven
        methods to analyze multimodal meaning-making processes. The curriculum balances
        theoretical frameworks with hands-on computational analysis, examining real-world
        phenomena like perspectivization, theory of mind, and conceptual blending
        through diverse methodological lenses. Assessment centers on a dedicated project
        integrating theoretical design with investigation techniques.
      Readings/Bibliography: 'De Giorgis, S., Gangemi, A., Russo, A. Neurosymbolic
        graph enrichment for Grounded World Models. Information Processing & Management,
        62, 4, 2025, https://www.sciencedirect.com/science/article/pii/S030645732500069X


        Gangemi, A. and Nuzzolese, A.G. Logic-Augmented Generation. Journal of Web
        Semantics, 2025, https://www.sciencedirect.com/science/article/pii/S1570826824000453


        Lakoff, George, and Srini Narayanan. The Neural Mind: How Brains Think. University
        of Chicago Press, 2025


        <Gangemi, A., Presutti, V., 2022. Formal Representation and Extraction of
        Perspectives. Vossen, P. et al. (eds.): Creating a More Transparent Internet:
        The Perspective Web, 2022, https://www.dropbox.com/scl/fi/qmaoifmxwqfklvixs629n/WebOfPerspectives-GangemiPresutti.pdf?rlkey=e82o49dz4crwgf84yue0eiupv&dl=0>'
      Teaching methods: The course will be given in 2-hours slots, with mixed lectures
        and hands-on sessions. Practical experiments will be designed on specific
        sessions.
      Assessment methods: 'The final exam will consist of a project implementing a
        model of cognitively-inspired sense-making on a specific topic agreed with
        the teacher, and a discussion.


        AI can be a useful tool to support individual study with in-depth analysis,
        summaries, and self-assessment. As for learning assessment, the exam may consist
        in a section that can exploit substantial use of AI (problem solving, content
        generation), accompanied by a mandatory critical analysis section.


        Students with disabilities and Specific Learning Disorders (SLD)


        Students with disabilities or Specific Learning Disorders are entitled to
        special adjustments according to their condition, subject to assessment by
        the University Service for Students with Disabilities and SLD. Please do not
        contact teachers or Department staff, but make an appointment with the Service.
        The Service will then determine what adjustments are specifically appropriate,
        and get in touch with the teacher. For more information, please visit the
        page:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students'
      Teaching tools: Online and desktop apps with artificial intelligence capabilities
        will be regularly used during the course.
      Office hours: See the website of Aldo Gangemi (https://www.unibo.it/sitoweb/aldo.gangemi/en)
      SDGs: 'Partnerships for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
