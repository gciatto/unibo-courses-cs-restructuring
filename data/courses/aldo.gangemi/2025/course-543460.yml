syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/543460
    title: 2025/2026 Universal Semantics (1) (LM) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student knows
        and can apply abstraction methods to interpret any kind of signal from a physical,
        social or cognitive environment, either inductively (pattern discovery) or
        deductively (pattern finding). The methods will leverage theoretical or experimental
        findings from philosophy, cognitive science, semiotics, and computer science.
      Contenuti: Il corso integra approcci computazionali e sperimentali per studiare
        gli universali semantici attraverso lingue, modalità, culture, pratiche e
        sistemi neurocognitivi. Gli studenti useranno metodi data-driven per analizzare
        processi multimodali di costruzione del significato. Il corso bilancia aspetti
        teorici e analisi computazionali, esaminando fenomeni come la prospettivizzazione,
        la teoria della mente e il blending concettuale attraverso lenti metodologiche
        diverse. La valutazione avverrà su un progetto dedicato che integra progettazione
        teorica e ricerca sperimentale.
      Testi/Bibliografia: 'De Giorgis, S., Gangemi, A., Russo, A. Neurosymbolic graph
        enrichment for Grounded World Models. Information Processing & Management,
        62, 4, 2025, https://www.sciencedirect.com/science/article/pii/S030645732500069X


        Gangemi, A. and Nuzzolese, A.G. Logic-Augmented Generation. Journal of Web
        Semantics, 2025, https://www.sciencedirect.com/science/article/pii/S1570826824000453


        Lakoff, George, and Srini Narayanan. The Neural Mind: How Brains Think. University
        of Chicago Press, 2025. (Lakoff, George, and Srini Narayanan. La mente neurale:
        Come pensa il nostro cervello. ROI Edizioni, 2025.)


        Gangemi, A., Presutti, V., 2022. Formal Representation and Extraction of Perspectives.
        Vossen, P. et al. (eds.): Creating a More Transparent Internet: The Perspective
        Web, 2022, https://www.dropbox.com/scl/fi/qmaoifmxwqfklvixs629n/WebOfPerspectives-GangemiPresutti.pdf?rlkey=e82o49dz4crwgf84yue0eiupv&dl=0'
      Metodi didattici: Il corso si svolgerà in sessioni di 2 ore ciascuna, con lezioni
        frontali e sessioni applicative con esercitazioni pratiche.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale consisterà
        in un progetto che implementi un modello di sense-making di ispirazione cognitiva
        su un argomento specifico concordato con il docente, seguito da una discussione.


        AI can be a useful tool to support individual study with in-depth analysis,
        summaries, and self-assessment. As for learning assessment, the exam may consist
        in a section that can exploit substantial use of AI (problem solving, content
        generation), accompanied by a mandatory critical analysis section.


        Studenti con disabilità e Disturbi Specifici dell''Apprendimento (DSA)


        Gli studenti con disabilità o Disturbi Specifici dell''Apprendimento hanno
        diritto a specifici adattamenti in base alla loro condizione, previa valutazione
        da parte del Servizio di Ateneo per Studenti con Disabilità e DSA. Si prega
        di non contattare docenti o personale di Dipartimento, ma di fissare un appuntamento
        con il Servizio. Il Servizio valuterà quindi quali adattamenti siano specificamente
        appropriati e contatterà il docente. Per maggiori informazioni, visitare la
        pagina:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Strumenti a supporto della didattica: Durante il corso verranno utilizzate regolarmente
        applicazioni online e desktop dotate di funzionalità di intelligenza artificiale.
      Orario di ricevimento: Consulta il sito web di Aldo Gangemi (https://www.unibo.it/sitoweb/aldo.gangemi)
