syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/501520
    title: 2025/2026 ALGORITMI E STRUTTURE DATI (9 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce gli algoritmi (divide-et-impera, programmazione dinamica, metodo
        greedy, backtracking, ricerca locale) per risolvere problemi computazionali
        di base su strutture dati elementari (liste, code, alberi, grafi, etc.);

        - conosce le tecniche di base (notazione asintotica, ricorrenze) per calcolare
        il costo computazionale degli algoritmi;

        - conosce le classi di complessità computazionale P, NP e NP-hard;

        - è in grado di progettare algoritmi efficienti per risolvere semplici problemi
        computazionali;

        - è in grado di stimare in ordine di grandezza il costo computazionale degli
        algoritmi;

        - è in grado di analizzare la complessità computazionale di problemi computazionali
        di base;

        - è in grado di dare una valutazione circa l''efficienza e la correttezza
        di un algoritmo;

        - è capace di elaborare e di presentare un progetto per la risoluzione di
        problemi computazionali di base'
      Contenuti: 'Strutture dati elementari (Liste, Pile, Code, Alberi...)


        Costo asintotico degli algoritmi


        Algoritmi di ordinamento, selezione e ricerca


        Insiemi, Dizionari


        Alberi binari di ricerca, alberi RB


        Tabelle Hash, Code di priorità


        Strutture union-find


        Tecniche Algoritmiche: divide et impera, algoritmi greedy, programmazione
        dinamica


        Grafi e visite di grafi: visita in ampiezza e profondità


        Algoritmi elementari su grafi, Minimum Spanning Tree, cammini minimi


        Cenni alla teoria della NP-completezza'
      Testi/Bibliografia: 'Testi adottati:


        Alan A. Bertossi, A. Montresor, Algoritmi e Strutture di Dati [https://www.cittastudi.it/catalogo/scienze/algoritmi-e-strutture-di-dati-1802],
        CittàStudi 2014, ISBN: 9788825173956


        Altri testi consigliati:


        Camil Demetrescu, Irene Finocchi, Giuseppe F. Italiano, Algoritmi e strutture
        dati 2/ed, McGraw-Hill, 2008, ISBN: 978 88 386 64687


        Camil Demetrescu, Umberto Ferraro Petrillo, Irene Finocchi, Giuseppe F. Italiano,
        Progetto di Algoritmi e Strutture Dati in Java, McGraw-Hill, 2007, ISBN: 9788838663741


        Thomas H. Cormen, Charles E. Leiserson, Ronald L. Rivest, Clifford Stein,
        Introduzione agli algoritmi e strutture dati 2/ed, McGraw-Hill, 2005, ISBN:
        9788838662515'
      Metodi didattici: Lezioni frontali e esercitazioni
      Modalità di verifica e valutazione dell'apprendimento: 'Nel corso di ogni anno
        accademico vengono fissati sei appelli: tre nella sessione estiva (Giugno/Luglio);
        uno nella sessione autunnale (Settembre) e due nella sessione invernale (Gennaio/Febbraio).


        La verifica dell''apprendimento avviene attraverso lo svolgimento di un progetto
        e di una prova orale. Il progetto mira ad accertare le abilità acquisite nel
        risolvere problemi computazionali tramite la progettazione e implementazione
        di algoritmi efficienti, e a verificare l''acquisizione delle conoscenze previste
        dal programma del corso.


        La valutazione dei progetti deve risultare almeno sufficiente (i.e., deve
        ottenere una valutazione ≥ 18/30) per essere valida ai fini dell''esame. La
        prova orale, anch''essa valutata in trentesimi, prevede una discussione dei
        progetti consegnati durante la quale possono essere somministrate domande
        che mirano a verificare l''acquisizione, da parte dello studente, delle conoscenze
        previste dall''intero programma del corso.


        Il voto finale, espresso in trentesimi, tiene conto delle valutazioni ottenute
        nei progetti e nella prova orale.'
      Strumenti a supporto della didattica: Le lezioni frontali prevedono l'uso di
        lucidi proiettati da un laptop e una lavagna tradizionale, articoli scientifici
        segnalati agli studenti etc. Il materiale didattico presentato a lezione verrà
        messo a disposizione dello studente in formato elettronico tramite internet.
      Orario di ricevimento: 'Consulta il sito web di Jocelyne Elias (https://www.unibo.it/sitoweb/jocelyne.elias)


        Consulta il sito web di Davide Rossi (https://www.unibo.it/sitoweb/daviderossi)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/501520
    title: 2025/2026 ALGORITMI E STRUTTURE DATI (9 CFU) — University of Bologna
    contents:
      Learning outcomes: Students will learn basic concepts about the fundamental
        algorithms (divide and conquer, dynamic programming, greedy method, backtracking,
        local search) to solve well knwon computational problems, and the basic data
        structures and abstract data types (lists, queues, trees, graphs, etc.), as
        well as techniques (asymptotic notation, recurrences) for evaluation of computational
        complexity of algorithms (and computation complexity classes P, NP, NP-hard)
        and space complexity of algorithms execution (memory space). The course will
        offer the illustration of trade-offs and sinergies between algorithms and
        data structures, and a training on methodologies to realize the design of
        efficient algorithms and correspondingly appropriate data structures to solve
        both generalized and specific instances of computational problems, under pre-defined
        assumptions and requirements
      Course contents: 'Basic data structures (List, Queue, Stack, Trees...)


        Computational Complexity


        Searching and Sorting Algorithms


        Sets, Dictionaries, Trees, Binary search, RB trees


        Heaps, Hash tables, Priority queues, Union-Find data structures


        Algorithmic techniques: divide et impera, greedy algorithms, dynamic programming,


        Graphs and graph algorithms: depth-first visit and breadth-first visit,


        Elementary graph algorithms, Minimum Spanning Tree, shortest paths algorithms


        Introduction to NP-completeness theory'
      Readings/Bibliography: 'Official text:


        Alan A. Bertossi, A. Montresor, Algoritmi e Strutture di Dati [https://www.cittastudi.it/catalogo/scienze/algoritmi-e-strutture-di-dati-1802],
        CittàStudi 2014, ISBN: 9788825173956


        Recommended readings:


        Camil Demetrescu, Irene Finocchi, Giuseppe F. Italiano, Algoritmi e strutture
        dati 2/ed, McGraw-Hill, 2008, ISBN: 978 88 386 64687


        Camil Demetrescu, Umberto Ferraro Petrillo, Irene Finocchi, Giuseppe F. Italiano,
        Progetto di Algoritmi e Strutture Dati in Java, McGraw-Hill, 2007, ISBN: 9788838663741


        Thomas H. Cormen, Charles E. Leiserson, Ronald L. Rivest, Clifford Stein,
        Introduzione agli algoritmi e strutture dati 2/ed, McGraw-Hill, 2005, ISBN:
        9788838662515'
      Teaching methods: Lectures and interactive exercises
      Assessment methods: 'Six exam sessions are scheduled each academic year: three
        in the summer session (June/July); one in the fall session (September); and
        two in the winter session (January/February).


        Assessment is conducted through a project and an oral exam. The project aims
        to assess the student''s ability to solve computational problems through the
        design and implementation of efficient algorithms and to verify the acquisition
        of the knowledge required by the course syllabus.


        Projects must be graded at least sufficient (i.e., a score ≥ 18/30) to be
        considered for the exam. The oral exam, also graded out of 30, includes a
        discussion of the submitted projects, during which questions may be asked
        to assess the student''s acquisition of the knowledge required by the entire
        course syllabus.


        The final grade, expressed out of 30, takes into account the grades obtained
        in the projects and the oral exam.'
      Teaching tools: The lectures utilize overhead slides projected from a laptop
        computer together with a white board, scientific papers made available to
        student, etc. The material presented during lectures will be made available
        in electronic format for downloading from the Course web site.
      Office hours: 'See the website of Jocelyne Elias (https://www.unibo.it/sitoweb/jocelyne.elias/en)


        See the website of Davide Rossi (https://www.unibo.it/sitoweb/daviderossi/en)'
