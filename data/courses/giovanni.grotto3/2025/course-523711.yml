syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523711
    title: 2025/2026 LABORATORIO DI PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i princìpi e le tecniche fondamentali del paradigma di programmazione orientato
        agli oggetti, nonché alcune nozioni di programmazione con linguaggi di scripting.
        Lo studente sa realizzare programmi orientati agli oggetti, sa scrivere script
        e sa utilizzare alcuni strumenti collaborativi per lo sviluppo del software.
      Contenuti: '- Introduzione alla programmazione orientata agli oggetti in Java

        - Incapsulamento

        - Ereditarietà

        - Polimorfismo e relazione di sottotipo

        - Realizzazione e uso di strutture dati in Java

        - Introduzione alla programmazione in Python

        - Uso di strutture dati in Python (sequenze, liste, dizionari)


        Nota: si assume che lo studente abbia familiarità con la nozione di relazione
        d’ordine parziale e con i principi di programmazione procedurale/imperativa
        in Java.'
      Testi/Bibliografia: '- Walter Savitch, Programmazione di base e avanzata con
        Java, Pearson Italia, 2018.

        - Al Sweigart, Automate the boring stuff with Python (https://automatetheboringstuff.com),
        William Pollock, 2020 (disponibile online)

        - Versione italiana del testo precedente (ma solo prima edizione): Automatizzare
        le cose noiose con Python, Edizioni Lswr, 2017.'
      Metodi didattici: Lezioni frontali con presentazione di slide e sviluppo di
        codice guidato dal docente. Esercizi da svolgere in aula, eventualmente in
        gruppo, con il portatile personale. Esercizi con autovalutazione da risolvere
        individualmente a casa.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame è costituito
        da un progetto di programmazione e una prova scritta. La prova scritta si
        svolge individualmente su carta o al calcolatore il giorno dell’esame senza
        l’ausilio di manuali, materiale didattico o appunti personali, ha la durata
        di 1 ora, comprende domande aperte, domande chiuse (a risposta multipla) e
        semplici esercizi di programmazione in Java e in Python e viene valutata con
        un punteggio compreso tra 0 e 27, con sufficienza a 16. Il progetto è da svolgersi
        in gruppi di 2-3 persone, comporta la risoluzione di un problema di programmazione,
        deve essere consegnato almeno una settimana prima di sostenere la prova scritta
        e viene valutato con un punteggio compreso tra 0 e 5, con sufficienza a 2.
        Per il superamento dell’esame è necessario ottenere la sufficienza in entrambe
        le prove. Il voto finale è determinando sommando il voto (sufficiente) di
        entrambe le prove. La lode è assegnata qualora il risultato sia maggiore o
        uguale a 31.


        Nota: l''accesso al laboratorio richiede lo svolgimento in modalità e-learning
        da parte di tutti gli studenti dei moduli 1 e 2 del corso di sicurezza (https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio).'
      Strumenti a supporto della didattica: '- Ambienti di programmazione per Java
        and Python

        - Dispense e slide

        - Esempi di codice

        - Esercizi di programmazione con soluzioni


        Tutto il materiale didattico sarà reso disponibile su Virtuale.'
      Orario di ricevimento: Consulta il sito web di Luca Padovani (https://www.unibo.it/sitoweb/luca.padovani2)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523711
    title: 2025/2026 Programming Laboratory — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the principles
        and fundamental techniques underpinning the object-oriented programming paradigm
        as well as some basic notions of programming with scripting languages. The
        student is capable of implementing object-oriented programs, writing scripts
        and using some collaborative tools for software development.
      Course contents: '- Introduction to object-oriented programming in Java

        - Encapsulation

        - Inheritance

        - Polymorphism and subtyping relation

        - Implementation and use of data structures in Java

        - Introduction to programming in Python

        - Use of data structures in Python (sequences, lists, dictionaries)


        Note: students are expected to be familiar with the notion of partial order
        relation and with the principles of procedural/imperative programming in Java.'
      Readings/Bibliography: '- Walter Savitch, Programmazione di base e avanzata
        con Java, Pearson Italia, 2018.

        - Al Sweigart, Automate the boring stuff with Python (https://automatetheboringstuff.com),
        William Pollock, 2020 (available online)

        - Italian version of the previous text(first edition only): Automatizzare
        le cose noiose con Python, Edizioni Lswr, 2017.'
      Teaching methods: Lectures with presentation of slides and program development
        guided by the teacher. Exercise sessions to be carried out in class, possibly
        in a group of students, with personal laptops. Self-evaluating exercises to
        be solved individually at home.
      Assessment methods: 'The exam comprises a project part and a written part. The
        written part must be completed individually in 1 hour on paper or at the computer
        on the day of the exam, it includes open questions, closed questions (multiple
        choices) and simple programming exercises in Java and Python. It is marked
        with a score from 0 to 27 and it is considered to be sufficient if marked
        with at least 16. The project must be carried out in a group of 2-3 students
        and submitted at least 1 week before the day of the exam. It is marked with
        a score from 0 to 5 and is considered sufficient if marked with at least 2.
        In order to pass the exam, both parts must be sufficient. The final score
        is the sum of the scores of the two parts. Mention is assigned if the score
        is at least 31.


        Nota: in order to access the computer science laboratory it is mandatory for
        all students to take the online course on security (modules 1 and 2) (https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio).'
      Teaching tools: '- Java and Python programming environments

        - Lecture notes and slides

        - Code examples

        - Programming exercises with solutions


        All the teaching material will be made available on Virtuale.'
      Office hours: See the website of Luca Padovani (https://www.unibo.it/sitoweb/luca.padovani2/en)
