syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/485397
    title: 2025/2026 IT AND GAME LOCALIZATION (CL2) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Lo/a studente/ssa conosce in modo approfondito
        le strategie, le tecniche, i metodi e gli strumenti professionali utilizzati
        per la localizzazione di videogiochi, prodotti informatici e contenuti per
        il web; è capace di applicarli nell’adattamento di applicazioni digitali complesse,
        che includono generi e tipi testuali differenziati, tra l’inglese e l''italiano,
        nel rispetto dei requisiti di accessibilità dei media; conosce ed è capace
        di utilizzare le tecniche fondamentali di documentazione, redazione e revisione
        dei testi, compresa una adeguata valutazione della qualità linguistica del
        videogioco, prodotto informatico o contenuto web adattato nel suo complesso.

        .'
      Contenuti: 'Il modulo Software Localization introduce il concetto di localizzazione
        in ambito software, illustrandone le peculiarità e le potenziali insidie rispetto
        ad altre forme di traduzione e contestualizzandolo in una più generale tecnologizzazione
        delle translation practices contemporanee.


        Successivamente saranno presentati i diversi testi che è necessario tradurre
        all''interno di un software (dialoghi, interfaccia, tutorial, ecc.) e saranno
        chiarite le modalità per affrontarli nel modo appropriato. A tal fine, saranno
        introdotti argomenti quali la gestione di variabili/placeholder, le limitazioni
        a livello di caratteri e lunghezze, la prevenzione dei bug e le convenzioni
        tipiche della localizzazione di software che non vengono applicate in altri
        ambiti all''interno del settore della traduzione e i servizi linguistici.'
      Testi/Bibliografia: '- Bernal-Merino, M. A. (2017). Translation and Localisation
        in Video Games: Making Entertainment Software Global. Routledge.

        - Esselink B. (2000). A Practical Guide to Localization. John Benjamins Publishing
        Co. ISBN 9027219567

        - O''Hagan, M. & Mangiron, C. (2013*). Game Localization: Translating for
        the Global Digital Entertainment Industry.* John Benjamins Pub Co.

        - Sánchez Muñoz, P. (2017). Localización de videojuegos. Editorial Síntesis.

        - AA. VV. GNU Gettext Tools (https://www.gnu.org/software/gettext/manual/gettext.pdf),
        version 0.22 (2023). Native Language Support Library and Tools Edition.

        - AA. VV., Microsoft Italian Style Guide (https://learn.microsoft.com/en-us/globalization/reference/microsoft-style-guides),
        Redmond, Microsoft Corporation, April 2023.

        - AA.VV. Android localization guide (https://developer.android.com/guide/topics/resources/localization)
        (2023)'
      Metodi didattici: 'Lezioni frontali interattive composte da parte teorica e
        parte di analisi di alcuni esempi dei concetti illustrati, tratti da progetti
        reali. Saranno inoltre proposte esercitazioni pratiche nelle quali gli studenti
        tradurranno testi di progetti reali per maturare competenze utili per poter
        in seguito entrare in questo settore a livello professionale.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning (https://elearning-sicurezza.unibo.it)**.'
      Modalità di verifica e valutazione dell'apprendimento: 'Per il progetto finale
        verrà completato un esercizio di localizzazione, che dovrà essere consegnato
        una settimana prima della data fissata per l’appello. Per il progetto, si
        creeranno team da due persone che lavoreranno insieme.


        Per quanto riguarda l’appello, gli studenti dovranno completare un esame orale.
        Nota: Questa modalità è stata accordata con gli studenti tramite voto diretto
        di fronte all’alternativa dell’esame scritto. Si possono trovare ulteriori
        informazioni nel Moodle dell’aula.


        Game and Software Localization è una componente del modulo Translation and
        Media Accessibility (insieme ad Audiovisual Translation). Il voto ottenuto
        nel modulo Software Localization farà media al 50% con il voto ottenuto nel
        modulo di Game Localization. I due voti ottenuti nelle due prove faranno a
        loro volta media al 50% con la componente Audiovisual Translation per il voto
        finale del corso integrato Translation and Media Accessibility.


        Modalità di valutazione


        - 30-30L: prova eccellente che dimostra ottima acquisizione delle conoscenze
        attese e completa padronanza del processo di localizzazione di software/game.
        Lo studente presta attenzione ai dettagli relativi a formattazione, lunghezza,
        chiarezza e usabilità.

        - 27-29: prova sopra la media, con errori minori o comunque compensati da
        dimostrazione più che sufficiente delle conoscenze e abilità tecniche. Lo
        studente mostra un''apprezzabile competenza negli aspetti relativi a formattazione,
        lunghezza, chiarezza e usabilità.

        - 24–26: prova valida, ma con alcuni errori evidenti che denotano una acquisizione
        parziale delle conoscenze e abilità richieste. Lo studente affronta almeno
        uno o due degli aspetti relativi a formattazione, lunghezza, chiarezza e usabilità.

        - 21-23: prova sufficiente ma con vistosi limiti nelle conoscenze e abilità
        da acquisire. Lo studente trascura gli aspetti relativi a formattazione, lunghezza,
        chiarezza e usabilità.

        - 18-20: prova che risponde solo ai criteri minimi di conoscenze e abilità
        da acquisire.

        - < 18 insufficiente: non sono state conseguite le conoscenze di base, l’esame
        va ripetuto.'
      Strumenti a supporto della didattica: 'Allo scopo di favorire le interazioni
        come parte essenziale del processo formativo, gli studenti potranno avvalersi
        dei materiali e gli strumenti informatici che permetteranno di assimilare
        le pratiche moderne di localizzazione di software, ovvero:


        - CAT Tool generiche e specifiche della localizzazione (quali POEdit e Crowdin).

        - Strumenti di edizione avanzata di testo e codice informatico.

        - Piattaforme di sviluppo di software (SDK) dove si crea e si gestisce il
        materiale da localizzare.

        - Strumenti di gestione della qualità (QA e testing) applicati nel processo
        e nelle diverse fasi di cui si compone il flusso di lavoro nella localizzazione
        di un software.


        Gli studenti avranno inoltre accesso al materiale didattico, le presentazioni
        e la guida didattica che fornirà il docente per completare l’apprendimento
        di ogni modulo didattico.


        Tutti gli strumenti e materiali sopra elencati saranno messi a disposizione
        degli studenti tramite la piattaforma Moodle del corso e il portale di comunicazione
        dell’Università.'
