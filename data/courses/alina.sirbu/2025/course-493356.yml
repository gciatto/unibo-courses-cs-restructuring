syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/493356
    title: 2025/2026 INTRODUZIONE ALL'ANALISI DEI DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente: (i)
        conosce le basi del linguaggio di programmazione Python;

        (ii) conosce i diversi tipi di analisi dei dati (diagnostica, predittiva,
        prescrittiva, ecc.) e le principali tecniche abilitanti;

        (iii) è in grado di progettare un processo di data-pipeline, dall''acquisizione
        dei dati fino alla loro analisi e valorizzazione;

        (iv) conosce le principali applicazioni della data analytics, con particolare
        attenzione alla biologia.'
      Contenuti: 'Il corso è composto da due parti: una prima parte di programmazione
        in Python, e una seconda parte di analisi di dati in Python.


        Programmazione Python:


        - Introduzione alla programmazione, concetti di algoritmo e struttura di dati.

        - Elementi di linguaggio: tipi di dati, controllo del flussso, strutture di
        dati, funzioni, librerie


        Analisi di dati in Python:


        - Tipi di dati presenti in Biologia e strutture di dati adatte. Esempi di
        applicazioni della data analytics

        - Analisi descrittiva per vari tipi di dati usando librerie.

        - Analisi predittiva usando modelli di regressione e/o di classificazione.

        - Test statistici e studio di modelli di classificazione/regressione per identificare
        variabili importanti

        - Librerie Python: numpy, scipy, matplotlib, pandas, scikitlearn'
      Testi/Bibliografia: 'Le slide e esercitazioni saranno messe a disposizione tramite
        la piattaforma virtuale.


        Si raccomanda di completare l''esame di Fondamenti di Matematica, Probabilità
        e Statistica (https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2023/490895)
        prima di seguire questo corso.


        Per approfondire:


        - Starting out with Python, T. Gaddis, qualsiasi edizione.

        - Python for Data Analysis: Data Wrangling with Pandas, NumPy, and IPython,
        Wes McKinney, qualsiasi edizione.'
      Metodi didattici: Lezioni frontali in aula, esercitazioni in Python in laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione consisterà
        in due prove:


        - Esame scritto: esercizi di programmazione e analisi di dati su carta, con
        tutto il materiale cartaceo (libri, esercizi stampati) a disposizione.

        - Esame orale: solo se l''esame scritto ottiene un punteggio di almeno 15/30.
        La prova orale può sia aumentare che diminuire il voto della prova scritta,
        incluso avere un''esito insufficiente.


        Studenti/sse con DSA o disabilità temporanee o permanenti***:*** si raccomanda
        di contattare per tempo l’Ufficio di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ). Sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con almeno 15 giorni di anticipo,
        all’approvazione del/della docente, il/la quale ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Slides will be made available, and solutions
        to exercises completed in class.


        A set of exercises for self practice will also be made available.'
      Orario di ricevimento: Consulta il sito web di Alina Sirbu (https://www.unibo.it/sitoweb/alina.sirbu)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/493356
    title: 2025/2026 INTRODUZIONE ALL'ANALISI DEI DATI — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student: (i) know the basics
        of Python programming language;

        (ii) is aware of different types of data-analytics (diagnostic, predictive,
        prescription, etc) and of the main enabling techniques;

        (iii) is able to design and data-pipeline process, from the data acquisition
        until the data analysis and valorization;

        (iv) knows the main applications of data analytics, with a special emphasis
        on biology.'
      Course contents: 'The course is made of two parts: a first part concentrating
        on Python programming, and a second part consisting of data analysis in Python.


        Python programming:


        - Introduction to programming, algorithms, data structures.

        - The Python language: data types, control flow, data structures, functions,
        libraries.


        Data analysis in Python:


        - Types of Biological data and suitable data structures.

        - Descriptive analytics for various data types using libraries.

        - Predictive analysis using regression and/or classification models.

        - Statistical tests and model analysis to identify important variables.

        - Python libraries: numpy, scipy, matplotlib, pandas, scikitlearn'
      Readings/Bibliography: 'The slides and solutions to exercises will be made available
        through the virtual platform.


        It is recommended that you complete the exam for the class Fondamenti di Matematica,
        Probabilità e Statistica (https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2023/490895)
        before taking this class.


        For further reading:


        - Starting out with Python, T. Gaddis, any edition.

        - Python for Data Analysis: Data Wrangling with Pandas, NumPy, and IPython,
        Wes McKinney, any edition.'
      Teaching methods: Frontal lectures in class, Python exercises in computer lab.
      Assessment methods: 'Evaluation will consist of two parts:


        - Written exam: programming exercises and data analysis, in ''open book''
        mode (all books and other hard copy material allowed).

        - Oral exam: only if the written exam obtains at least 15/30 points. The oral
        exam can increase or decrease the written grade, including the possibility
        of an insufficient outcome.


        Students with learning disorders and\or temporary or permanent disabilities***:***
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        ) as soon as possible so that they can propose acceptable adjustments. The
        request for adaptation must be submitted in advance (15 days before the exam
        date) to the lecturer, who will assess the appropriateness of the adjustments,
        taking into account the teaching objectives.'
      Teaching tools: 'Slides will be made available, and solutions to exercises completed
        in class.


        A set of exercises for self practice will also be made available.'
      Office hours: See the website of Alina Sirbu (https://www.unibo.it/sitoweb/alina.sirbu/en)
