  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/445693
    title: 2025/2026 Networks, Security And Data Bases — University of Bologna
    contents:
      Learning outcomes: The course aims to provide the student with some additional
        knowledge in computer science beyond the one from basic courses. This is meant
        to allow students to gain greater awareness of the potential of modern computing
        and communication systems. In particular, some concepts pertaining to operating
        systems, computer networks, computer security, and databases will be provided.
      Course contents: 'The course consists of two learning modules and provides an
        introduction to some main fields of computer science.


        The first module deals with the study of relational databases, database query
        languages, database management systems and database design.


        The second module introduces the fundamental concepts of computer networks
        and computer security.


        At the end of the course students will be able to discuss theoretical issues
        and solve some practical problems by using concepts and tools from each of
        the aforementioned fields.


        MODULE 1:


        Databases:


        - Boolean Algebra

        - Relational model and Relational Algebra

        - Relational DBMS and the SQL language

        - Database design and the ER language


        MODULE 2:


        Computer networks:


        - Structure and components of the internet

        - Protocol stack

        - Examples of network and web applications

        - Exercises in Python


        Cryptography:


        - Basics of modular arithmetics

        - Overview on cryptography (one-way functions, public/private keys cryptosystems)

        - Examples of public key cryptosystems (RSA, DHKE)

        - Exercises in Python'
      Readings/Bibliography: 'Slides of the lectures will be provided. For further
        reading we suggest the following textbooks:


        - Database System Concepts (4th edition). Silberschatz, Korth, Sudarshan.
        McGraw Hill, 2002.

        - Understanding Cryptography. Paar, C. and Pelzl, J. Springer-Verlag, Berlin-Heidelberg,
        2010.

        - Computer networking: a top-down approach. F Kurose, J., Ross, K, 2021. 8th
        edition, Pearson Education.'
      Teaching methods: Frontal lectures and exercise sessions.
      Assessment methods: 'The exam consists of a written test, including both open
        theoretical questions and exercises. The exam is common to the two modules,
        with points proportional to the number of hours (18 points for module 1, 14
        points for module 2). The exam is passed only if both modules are passed (at
        least 8 and 6 points, respectively).


        Students with learning disorders and\or temporary or permanent disabilities*:*
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        as soon as possible so that they can propose acceptable adjustments. The request
        for adaptation must be submitted in advance (15 days before the exam date)
        to the lecturer, who will assess the appropriateness of the adjustments, taking
        into account the teaching objectives.'
      Teaching tools: Slides will be provided and, when possible, recordings too.
      Office hours: 'See the website of Alina Sirbu (https://www.unibo.it/sitoweb/alina.sirbu/en)


        See the website of Paolo Felli (https://www.unibo.it/sitoweb/paolo.felli/en)'
