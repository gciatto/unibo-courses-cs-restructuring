  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/445693
    title: 2025/2026 NETWORKS, SECURITY AND DATA BASES — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: l’insegnamento ha come scopo quello di fornire
        allo studente conoscenze specialistiche nell’ambito delle scienze computazionali
        permettendogli/le di acquisire maggior consapevolezza circa il potenziale
        dei più recenti sistemi informatici e di comunicazione. Nello specifico saranno
        forniti concetti circa i sistemi operativi, le reti informatiche, la sicurezza
        informatica e le banche dati.
      Contenuti: 'Il corso consiste di due moduli e fornisce un''introduzione ad alcuni
        dei principali temi e strumenti dell''informatica.


        Nel primo modulo si studieranno la teoria e la pratica delle basi di dati
        relazionali e dei sistemi gestione di tali database, con un corrispondente
        linguaggio di query.


        Nel secondo modulo saranno discussi alcuni concetti fondamentali nell''ambito
        delle reti di calcolatori e della sicurezza informatica.


        Al termine del corso gli studenti saranno in grado di discutere diversi temi
        teorici e di risolvere alcuni problemi pratici utilizzando concetti e strumenti
        delle discipline menzionate.


        MODULO 1:


        Basi di Dati:


        - Algebra di Boole

        - Modello relazionale ed Algebra Relazionale

        - Relational DBMS e il linguaggio SQL

        - Progettazione di database relazionali ed il linguaggio ER


        MODULO 2:


        Reti di calcolatori:


        - Componenti e struttura di Internet

        - Livelli e protocolli di rete

        - Esempi di applicazioni di rete e web

        - Esercizi in Python


        Crittografia:


        - Cenni di aritmetica modulare

        - Panoramica generale sulla crittografia (funzioni one-way, crittosistemi,
        sistemi a chiave pubblica/privata)

        - Esempi di crittosistemi a chiave pubblica (RSA, DHKE)

        - Esercizi in Python'
      Testi/Bibliografia: 'Saranno distribuite le slide delle lezioni. Per ulteriore
        approfondimento suggeriamo i seguenti testi:


        - Database System Concepts (4th edition). Silberschatz, Korth, Sudarshan.
        McGraw Hill, 2002.

        - Understanding Cryptography. Paar, C. and Pelzl, J. Springer-Verlag, Berlin-Heidelberg,
        2010.

        - Computer networking: a top-down approach. F Kurose, J., Ross, K, 2021. 8th
        edition, Pearson Education.'
      Metodi didattici: Lezioni frontali e esercitazioni.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        una prova scritta, comprendente sia domande teoriche aperte che esercizi.
        La prova è comune ai due moduli, con punteggio proporzionale al numero di
        ore (18 punti per il modulo 1, 14 per il modulo 2). La prova è superata solo
        se entrambi i moduli vengono superati (almeno 8 e 6 punti, rispettivamente).


        Studenti/sse con DSA o disabilità temporanee o permanenti*:* si raccomanda
        di contattare per tempo l’Ufficio di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it).
        Sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con almeno 15 giorni di anticipo,
        all’approvazione del/della docente, il/la quale ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: Saranno distribuite le slide delle lezioni,
        ed ove possibile registrazioni.
