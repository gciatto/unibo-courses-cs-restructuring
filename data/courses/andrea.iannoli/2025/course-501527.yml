syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/501527
    title: 2025/2026 SISTEMI OPERATIVI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo, lo studente possiede
        i concetti e le tecniche di base dei sistemi operativi moderni incluse alcune
        tecniche per rendere il sistema più sicuro. Approfondisce inoltre le proprie
        conoscenze sui principali linguaggi di programmazione ad oggetto, imparando
        a gestire la concorrenza e la distribuzione.
      Contenuti: '1: Introduzione ai sistemi operativi (SO) 2: Richiami di architettura
        3: Organizzazione generale di un SO 4: Processi e threads 5: Concorrenza e
        comunicazione 6: Scheduling della CPU 7: Gestione della memoria 8: File system
        9: Richiami di sistemi distribuiti 10: Distributed comunication 11: Protezione,
        sicurezza, crittografia


        Maggiori dettagli si trovano nella pagina principale del corso, raggiungibile
        a partire dalla pagina web del docente'
      Testi/Bibliografia: 'Referenza principale: # Silberschatz, Galvin, and Gagne,
        Applied Operating Systems Concepts, John Wiley and Sons, (varie edizioni,
        di vari anni, esistono, e sono generalmente tutte valide, a patto che siano
        basate su Java; per esempio la versione della Pearson; esistono versioni del
        libro infatti basate su altri linguaggi). Altri testi su SO sono comunque
        possibili (consultare il docente)


        Sulla programmazione ad oggetti in ambito concorrente e/o distribuito, un
        ottimo testo e'': "Oggetti concorrenza distribuzione. Programmare a diversi
        livelli di astrazione", Crafa Silvia, edizioni Esculapio, 2014'
      Metodi didattici: Il corso integrato si compone di un centinaio circa di ore
        di lezioni frontali, di cui 40% di laboratorio nelle quali vengono approfonditi
        i temi principali trattati nel corso e svolti esempi ed esercizi.
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto e progetto
        (che fa parte del modulo "laboratorio"). Il voto finale tiene conto di entrambi
        i voti, dando piu'' peso pero'' al voto allo scritto.L''esame scritto mira
        a verificare la comprensione dei concetti esposti durante le lezioni e la
        capacita'' di sapere applicare tali concetti in situazioni concrete presentate
        come brevi esercizi.


        Il progetto e'' un lavoro di gruppo, che mira a verificare la comprensione
        dei costrutti di programmazione per sistemi concorrenti e/o distribuiti esaminati
        durante il corso.


        Un esame orale facoltativo puo'' essere usato dagli studenti per migliorare
        il voto dello scritto, o puo'' essere richiesto

        dal docente per una piu'' precisa valutazione dello scritto.


        Maggiori dettagli si trovano nella pagina principale del corso, raggiungibile
        a partire dalla pagina web del docente'
      Strumenti a supporto della didattica: Il materiale didattico presentato a lezione
        (con la possibile eccezione di esercizi svolti alla lavagna) verra' messo
        a disposizione degli studenti in formato elettronico tramite internet e ottenibile
        a partire dalla pagina principale del corso (raggiungibile a partire dal sito
        web del docente).
      Link ad altre eventuali informazioni: http://www.cs.unibo.it/~sangio/SO_currentAA/SO.html
      Orario di ricevimento: Consulta il sito web di Davide Sangiorgi (https://www.unibo.it/sitoweb/davide.sangiorgi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/501527
    title: 2025/2026 Operating Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the fundamental
        concepts and algorithms in use in modern operating systems. The student also
        learns how to use programming languages, mainly those based on objects, to
        handle concurrency and distribution and to program services
      Course contents: '1: Introduction to operating systems (OS) 2: Summary of concepts
        of architecture of computing systems 3: General organisation of an OS 4: Processes
        and threads 5: Concurrency and communication 6: CPU Scheduling 7: Memory management
        8: File systems 9: Concepts of distributed systems 10: Distributed comunication
        11: Protection, security and cryptography


        See the course main web page, reachable from the lecturer''s web page, for
        more details.'
      Readings/Bibliography: 'Silberschatz, Galvin, and Gagne, Applied Operating Systems
        Concepts, John Wiley and Sons (various editions exist, all valid). Note: other
        books are well possible, discuss this with the lecturer


        Concerning object-oriented programming in Java with concurrency and distribution,
        an excellent text is: "Oggetti concorrenza distribuzione. Programmare a diversi
        livelli di astrazione", Crafa Silvia, edizioni Esculapio, 2014 (there are
        several English text on the same topic)'
      Teaching methods: The integrated course consists of about 110 hours, of which
        40% in the "Laboratory" module, where the topics exposed in the main lectures
        are further discussed with examples and exercises.
      Assessment methods: 'There is a written exam, plus a project that is part of
        the "laboratory" module. The final note takes into account both the written
        exam and the project, although with a higher weight for the written exam.
        The goal of the written exam is to check the understanding of the concepts
        introduced in the lectures and the ability of being able to use them in concrete
        situations presented as short exercises. The project is a software development,
        that is carried out within groups of students; its goal is to check the understanding
        of the programming constructs for concurrency and distribution, described
        during the course.


        An oral exam is possible too, both to allow a student to improve on the note
        of the written exam, and to permit a more precise evaluation of the written
        exam by the teacher.


        See the course main web page, reachable from the lecturer''s web page, for
        more details.'
      Teaching tools: The slides used during the lectures will be made available to
        the students via internet, and reachable from the course main web page (reachable
        from the lecturer's home page)
      Links to further information: http://www.cs.unibo.it/~sangio/SO_currentAA/SO.html
      Office hours: See the website of Davide Sangiorgi (https://www.unibo.it/sitoweb/davide.sangiorgi/en)
