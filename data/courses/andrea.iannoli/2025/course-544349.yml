syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/544349
    title: 2025/2026 LABORATORIO DI MAKING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente è in grado
        di progettare e costruire oggetti composti da microsistemi, sensori e attuatori
        e di studiare e realizzare i relativi componenti software di interfacciamento,
        elaborazione e comunicazione. Inoltre lo studente conosce il funzionamento
        degli strumenti per la realizzazione fisica 3D di oggetti mediante sintesi
        costruttiva o sottrattiva ed è in grado di realizzare software per l''utilizzo
        innovativo delle macchine utensili a controllo numerico (Stampanti 3D, CNC,
        laser cutter, etc). In questo modo lo studente risulta in grado di formulare
        e portare a compimento progetti di artigianato digitale per fornire soluzioni
        originali e creative per la soluzione di specifici problemi pratici o per
        scopi artistici.

        Saranno altresì fornite competenze per la progettazione e lo sviluppo di metodologie
        di insegnamento dell''informatica basate sul Making, nonché tecniche di problem
        solving costruttivo.'
      Contenuti: 'Modulo 1


        - Introduazione: artigiani digitali

        - Elettronica con componenti Passivi: corrente elettrica, intensità, potenziale,
        potenza, energia, leggi di leggi di Kirchhoff, resistenze, leggi di Ohm, condensatori,
        induttanze, trasformatori.

        - Semiconduttori: diodi, transistor

        - Uso si strumenti di laboratorio: multimetro, oscilloscopio. analizzatore
        logico

        - Elettronica Digitale

        - Onde Radio

        - FPGA ee HDL: verilog, workbench/simulazione


        Modulo 2


        I contenuti del corso comprendono i seguenti argomenti, che spaziano dall’elettronica
        all’informatica:


        - Arduini e microcontrollori

        - Raspberry Pi e Systems-on-Chip

        - Protocolli di comunicazione seriale (OneWire, I2C, SPI, UART)

        - Motori e ponti ad H

        - Identificazione a radiofrequenze (RFID)

        - Centrali telefoniche VoIP (Asterisk)

        - Principi di Stampa 3D'
      Testi/Bibliografia: 'Lucidi delle lezioni, dispense del docente.


        “Elettronica per maker - Seconda edizione” di Paolo Aliverti, Edizioni LSWR'
      Metodi didattici: 'Lezioni frontali in aula e/o in laboratorio, con ausilio
        di materiale di progettazione. Sulla base del numero di iscritti/frequentanti
        si prende in considerazione l’ausilio di simulatori


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Esame Finale: demo e
        discussione di un progetto originale di making realizzato dal/la candidato/a
        oppure da gruppi di candidati fino a 3 persone. Il progetto prevede la consegna
        del codice e di tutta la documentazione necessaria per riprodurre il progetto
        in ogni sua parte. Metà della valutazione sarà subordinata alla qualità del
        materiale consegnato, l’altra metà alla sua presentazione e dimostrazione.


        I parametri di valutazione includono oltre al funzionamento, l’originalità
        del progetto, la replicabilità del prototipo, la configurabilità,'
      Strumenti a supporto della didattica: Il materiale didattico sarà accesibile
        tramite VIrtuale, a partire dalla pagina del professore.
      Orario di ricevimento: 'Consulta il sito web di Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli)


        Consulta il sito web di Federico Montori (https://www.unibo.it/sitoweb/federico.montori)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/544349
    title: 2025/2026 Laboratory of Making — University of Bologna
    contents:
      Learning outcomes: 'At the end of this course students will be able to design
        and create digitally enabled "things" consisting of single board computers,
        sensors and actuators. They will be also able to study and implements all
        the software components needed by their "things" to interface peripherals,
        to process data and to communicate/interoperate.


        Tools to create physical objects will be studied in this course as well, both
        additive and subtractive manifacturing methods. The students will learn how
        to implement innovative software for CNC-like machines (3D printers, CNC mills,
        laser cutters, etc).


        In this way a student can design physical and digitally enabled objects and
        tools from blueprint to prototype. Such "digital craft working" professionals
        can provide original solutions for both practical and artistic challenges.

        Subjects of the course will also be the design and development of teaching
        methods for computer Science based on Making, and Making as a problem solving
        paradigm.'
      Course contents: 'Module 1


        - Introduction: Digital Artisans

        - Electronics with passive components: electric current, intensity, potential,
        power, energy, Kirchhoff''s laws, resistors, Ohm''s laws, capacitors, inductors,
        transformers.

        - Semiconductors: diodes, transistors

        - Use of laboratory instruments: multimeter, oscilloscope, logic analyzer

        - Digital Electronics

        - Radio Waves

        - FPGA and HDL: verilog, workbench/simulation


        Module 2


        The course contents include the following topics, ranging from electronics
        to computer science:


        - Arduinos and microcontrollers

        - Raspberry Pi e Systems-on-Chip

        - Serial communication protocols (OneWire, I2C, SPI, UART)

        - Engines and H-bridges

        - Radio Frequency Identification (RFID)

        - VoIP telephone exchanges (Asterisk)

        - Principles of 3D Printing'
      Readings/Bibliography: 'Lecture slides, teacher handouts.

        “Electronics for Makers - Second Edition” by Paolo Aliverti, LSWR Editions'
      Teaching methods: 'Lectures in the classroom and/or in the lab, with the use
        of design materials. Depending on the number of students enrolled/attending,
        the use of simulators will be considered.


        Given the type of activity and teaching methods adopted, attendance at this
        training activity requires all students to first participate in Modules 1
        and 2 of the e-learning course on workplace safety [https://elearning-sicurezza.unibo.it/].'
      Assessment methods: 'Final Exam: Demo and discussion of an original making project
        created by the candidate or by groups of up to three people. The project requires
        submission of the code and all documentation necessary to reproduce the project
        in its entirety. Half of the evaluation will be based on the quality of the
        submitted material, the other half on its presentation and demonstration.


        The evaluation parameters include, in addition to functionality, the originality
        of the project, the replicability of the prototype, the configurability,'
      Teaching tools: The teaching material will be accessible via Virtuale, starting
        from the professor's page.
      Office hours: 'See the website of Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli/en)


        See the website of Federico Montori (https://www.unibo.it/sitoweb/federico.montori/en)'
