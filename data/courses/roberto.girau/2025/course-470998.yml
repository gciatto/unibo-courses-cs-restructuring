  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/470998
    title: 2025/2026 SMART VEHICULAR-SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Students taking this class: - Will An extended
        knowledge of challenges and opportunites in the area of vehicular communications
        including V2V and V2I. The class material will include real world examples

        and deployments. - Will understand impact of mobility and propagation on Vehicular
        Systems performances - Will learn vehicular application scenarios and their
        evolution - Will learn how design and model for

        connected/autonomous vehicular systems.'
      Contenuti: 'Autonomia, mobilità e intelligenza artificiale sono tra le innovazioni
        tecnologiche destinate a trasformare più profondamente la società negli anni
        a venire.

        Il corso offre una panoramica completa dei sistemi veicolari connessi, mobili
        e autonomi, con l’obiettivo di comprendere i loro componenti fondamentali
        e i principi di funzionamento.


        Saranno analizzati scenari che vanno dagli ADAS fino alla guida autonoma completa,
        evidenziando come le tecnologie attuali siano ancora in fase evolutiva e non
        esista una soluzione unica e definitiva. Verranno trattati temi quali sensing,
        percezione, decision-making, networking, system design e l’uso dei Digital
        Twin per la modellazione e la simulazione.


        Prerequisiti


        Si richiede agli studenti:


        - Una buona conoscenza di algoritmi e concetti introduttivi di AI.

        - Buone capacità di programmazione e familiarità con ambienti Linux e sistemi
        real-time o embedded.

        - Preferibilmente, conoscenza di modelli e framework AI (es. YOLO, TensorRT).

        - Conoscenze di ROS, programmazione CUDA/Jetson e nozioni di base di controllo
        sono un plus, ma non obbligatorie.


        Obiettivi del corso


        Il corso mira a fornire agli studenti una comprensione approfondita dei principi
        con cui vengono progettati, implementati e validati i moderni sistemi veicolari
        autonomi e connessi, e di come essi si evolveranno nel prossimo futuro. Le
        attività di laboratorio, basate sul simulatore CARLA, offriranno esperienza
        pratica su percezione, pianificazione, controllo e approcci Digital Twin.


        Uno studente che completa con successo il corso sarà in grado di:


        - Comprendere sfide e opportunità legate ai veicoli autonomi, alla mobilità
        intelligente e alla robotica mobile.

        - Acquisire conoscenze avanzate di networking e sistemi distribuiti applicati
        ai veicoli connessi, incluse architetture innovative oltre il modello classico
        di Internet.

        - Analizzare i requisiti di un sistema autonomo e selezionare l’architettura
        e le tecnologie più adeguate per sensing, percezione, comunicazione e computazione.

        - Acquisire familiarità pratica con ambienti di simulazione (es. CARLA) e
        piattaforme sperimentali per sistemi autonomi e connessi.'
      Testi/Bibliografia: "Il materiale principale del corso sarà fornito direttamente\
        \ dal docente e consisterà in articoli scientifici recenti, rapporti tecnici\
        \ e materiale selezionato da testi classici e moderni relativi a guida autonoma,\
        \ sistemi mobili, networking veicolare e AI per la mobilità.\n\nAgli studenti\
        \ sarà inoltre richiesto di seguire tutorial online e documentazione tecnica\
        \ relativi ai tool utilizzati nel laboratorio (ad es. CARLA, ROS2, toolkit\
        \ di AI, librerie per la percezione sensoriale).\n\nTesti consigliati\n\n\
        Sebbene non obbligatori, i seguenti libri forniscono un utile background teorico\
        \ e pratico:\n\n- Joseph O’Rourke, Computational Geometry, Cambridge University\
        \ Press.\n  Testo classico per la comprensione degli algoritmi geometrici\
        \ utilizzati in navigazione, mapping e ragionamento spaziale.\n- Kevin M.\
        \ Lynch & Frank C. Park, Modern Robotics: Mechanics, Planning, and Control,\
        \ Cambridge University Press.\n  Riferimento fondamentale per cinematica,\
        \ motion planning e controllo nei sistemi autonomi.\n- Andreas Lindholm, Niklas\
        \ Wahlström, Fredrik Lindsten,\n  Machine Learning: A First Course for Engineers\
        \ and Scientists, Cambridge University Press.\n  Introduzione pratica al machine\
        \ learning con applicazioni alla percezione, predizione e decision-making.\n\
        - Sean Meyn, Control Systems and Reinforcement Learning, Cambridge University\
        \ Press.\n  Testo che collega in modo moderno la teoria del controllo con\
        \ l'apprendimento per rinforzo, rilevante per il comportamento autonomo."
      Metodi didattici: 'Il corso è articolato in due componenti didattiche complementari:


        1. Lezioni Frontali Tradizionali (Parte Teorica)


        La parte teorica del corso verrà svolta tramite lezioni frontali classiche,
        dedicate ai fondamenti dei sistemi veicolari intelligenti, della guida autonoma,
        delle comunicazioni veicolari, della percezione e delle metodologie Digital
        Twin. Le lezioni forniranno le basi concettuali necessarie per comprendere
        architetture, algoritmi e compromessi progettuali.


        2. Laboratori Pratici con il Simulatore CARLA (Parte Applicativa)


        La componente pratica prevede sessioni di laboratorio basate sull’uso del
        simulatore di guida autonoma CARLA. Gli studenti lavoreranno individualmente
        o in piccoli gruppi per implementare, testare e analizzare funzioni veicolari
        come percezione, sensor fusion, pianificazione, controllo e modellazione tramite
        Digital Twin.'
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione si basa
        su un progetto di gruppo (massimo 3 studenti), che comprende un report scritto,
        il codice sorgente, una presentazione finale e una demo eseguita nel simulatore
        CARLA.


        Consegna del Progetto


        - Ogni gruppo riceverà un progetto assegnato durante il corso.

        - Gli studenti devono consegnare report e codice sorgente almeno una settimana
        prima della presentazione.

        - Il progetto deve essere già integrato con il controller del simulatore utilizzato
        in laboratorio.


        Ripartizione del Voto


        Il voto finale (massimo 32 punti) è suddiviso come segue:


        1. Report + Codice Sorgente — 24 punti


        Valutati in base a:


        - Correttezza e completezza dell’implementazione

        - Qualità dell’architettura e delle scelte progettuali

        - Chiarezza e approfondimento del report tecnico

        - Funzionalità e robustezza del sistema

        - Corretta integrazione con il simulatore CARLA


        2. Presentazione + Demo — 8 punti


        - Completezza della presentazione: 3 punti

        - Padronanza e chiarezza espositiva: 3 punti

        - Rispetto dei tempi assegnati: 2 punti


        Durata della Presentazione


        - Gruppo da 3 studenti: 30 minuti (più domande)

        - Gruppo da 2 studenti: 20 minuti (più domande)

        - Studente singolo: 10 minuti (più domande)


        Le slide sono obbligatorie a supporto della presentazione.

        La demo deve essere eseguita in CARLA, mostrando l’effettiva integrazione
        del sistema sviluppato.'
      Strumenti a supporto della didattica: 'Il corso fa uso di diversi strumenti
        software, ambienti di simulazione e framework di sviluppo che supportano sia
        le lezioni teoriche sia le attività di laboratorio. I principali strumenti
        didattici includono:


        Piattaforme di Sviluppo e Simulazione


        - Simulatore CARLA per guida autonoma, modellazione sensori e test di scenario

        - Python per scripting, analisi dati e prototipazione

        - Ambiente Linux (Ubuntu consigliato) per lo sviluppo e l’integrazione

        - Visual Studio Code o IDE equivalenti per programmazione e debugging

        - Git/GitHub per versionamento del codice e lavoro collaborativo


        Strumenti per AI, Percezione e Robotica


        - PyTorch / TensorFlow per machine learning e deep learning

        - OpenCV per computer vision

        - ROS2 (opzionale) per lo sviluppo modulare di sistemi robotici

        - Supporto NVIDIA CUDA / Jetson (opzionale) per accelerazione hardware


        Strumenti per Veicoli e Networking


        - Wireshark, tcpdump e altri tool di rete per analizzare comunicazioni veicolari

        - Client MQTT per architetture orientate ai messaggi (solo se necessari al
        progetto)'
