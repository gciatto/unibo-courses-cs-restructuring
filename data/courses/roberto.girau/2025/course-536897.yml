syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/536897
    title: 2025/2026 PROGRAMMAZIONE (CL.B) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente ha una
        competenza di base sulla programmazione mediante linguaggio C e sull'analisi
        di alcuni problemi fondamentali e dei relativi algoritmi risolutori.
      Contenuti: 'Il corso di Programmazione è finalizzato a fornire una competenza
        di base sulla programmazione dei calcolatori elettronici. Non sono richiesti
        prerequisiti di tipo informatico. Viene inizialmente fornita una prima descrizione
        dell''approccio algoritmico alla soluzione di problemi mediante computer.
        Successivamente, facendo uso del linguaggio C, di cui viene fornita una descrizione
        dettagliata che prescinde da ogni eventuale competenza pregressa degli studenti,
        vengono analizzati alcuni problemi fondamentali ed alcuni dei principali e
        più interessanti algoritmi risolutori.


        Il linguaggio C


        Organizzazione della memoria di un calcolatore, indirizzi, parole, puntatori.
        Tipi di dato (interi, float, double, char, stringa). Strutture dati (array,
        matrici, liste). Il linguaggio C: scopi e principali caratteristiche. La struttura
        di un programma C, l''inclusione degli header, dichiarazione delle variabili;
        le librerie. Tipi di dato elementari in linguaggio C: interi, floating point,
        double, small int, long, char. Puntatori; aritmetica sui puntatori. Array
        e matrici e loro rappresentazione in memoria. Strutture dati complesse: liste,
        alberi. Funzioni di libreria e funzioni definite dall''utente. Passaggio di
        parametri per valore e per indirizzo alle funzioni. Funzioni ricorsive. Funzioni
        di input/output; funzioni sui file; funzioni per la gestione diretta della
        memoria; funzioni sulle stringhe.


        Progetto ed analisi di algoritmi


        Tipi di dato; specifica algebrica e implementazione: vettori, liste, pile,
        code. Algoritmi con strutture dati: costruzione, ricerca e ordinamento in
        liste lineari; gestione di code e pile.'
      Testi/Bibliografia: 'Brian W. Kernighan, Dennis M. Ritchie. Linguaggio C. Jackson
        libri.


        Copia delle presentazioni usate a lezione e appunti messi a disposizione dai
        docenti.'
      Metodi didattici: 'Didattica frontale, esercitazioni in aula, esercitazioni
        al computer.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio [https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute]
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame del corso di
        Programmazione è composto di tre parti: la realizzazione di diversi elaborati
        (a scadenza settimanale), una prova scritta e una successiva prova orale.
        Tutti i dettagli sono reperibili su virtuale'
      Strumenti a supporto della didattica: Tutto il materiale utilizzato durante
        le lezioni frontali e durante le esercitazioni di laboratorio viene reso disponibile
        anche in forma elettronica e disponibile su Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Paola Salomoni (https://www.unibo.it/sitoweb/paola.salomoni)


        Consulta il sito web di Roberto Girau (https://www.unibo.it/sitoweb/roberto.girau)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/536897
    title: 2025/2026 Programming (CL.B) — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will have a basic understanding
        of programming in the C language, as well as the ability to analyze some fundamental
        problems and their corresponding solution algorithms.
      Course contents: "The Programming course aims to provide basic competence in\
        \ computer programming. No prior knowledge of computer science is required.\
        \ Initially, a basic description of the algorithmic approach to problem-solving\
        \ using computers is provided. Subsequently, using the C language, which is\
        \ described in detail regardless of any prior knowledge the students may have,\
        \ some fundamental problems and some of the main and most interesting solving\
        \ algorithms are analyzed.\n\nThe C Language\n\n- Organization of computer\
        \ memory: addresses, words, pointers.\n- Data types: integers, floats, double,\
        \ char, string.\n  Data structures: arrays, matrices, lists.\n- The C language:\
        \ purposes and main characteristics.\n- Structure of a C program: including\
        \ headers, variable declarations, libraries.\n- Elementary data types in C:\
        \ integers, floating point, double, small int, long, char.\n- Pointers and\
        \ pointer arithmetic.\n- Arrays and matrices and their memory representation.\n\
        - Complex data structures: lists, trees.\n- Library functions and user-defined\
        \ functions.\n- Parameter passing by value and by address to functions.\n\
        - Recursive functions.\n- Input/output functions, file functions, functions\
        \ for direct memory management, string functions.\n\nAlgorithm Design and\
        \ Analysis\n\n- Data types; algebraic specification and implementation: vectors,\
        \ lists, stacks, queues.\n- Algorithms with data structures: construction,\
        \ search, and sorting in linear lists; management of queues and stacks."
      Readings/Bibliography: 'Brian W. Kernighan, Dennis M. Ritchie. Linguaggio C.
        Jackson libri.


        Copies of the presentations used in class and notes provided by the lecturerers.'
      Teaching methods: 'Lectures, classroom exercises, computer exercises.


        Given the type of activities and the teaching methods adopted, attendance
        of this course requires all students to have previously completed Modules
        1 and 2 of the safety training for study environments [https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute
        (https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute)],
        available in e-learning mode.'
      Assessment methods: 'The Programming course exam consists of three parts: the
        completion of various assignments (on a weekly basis), a written test, and
        a subsequent oral exam. All details are available on the Virtuale platform.'
      Teaching tools: All materials used during lectures and lab exercises are also
        made available in electronic format on the Virtuale platform.
      Office hours: 'See the website of Paola Salomoni (https://www.unibo.it/sitoweb/paola.salomoni/en)


        See the website of Roberto Girau (https://www.unibo.it/sitoweb/roberto.girau/en)'
