    title: 2025/2026 Design of Electronic Systems T-A — University of Bologna
    contents:
      Learning outcomes: Introduction to circuit board design. the course provides
        basic tools to model and design digital systems from initial models in VHDL
        to detailed interconnect design. The lab tools provide first hand experience
        on professional grade CAD systems for FPGA design.
