      Metodi didattici: 'Il corso viene erogato in aula mediante proiezione di slide
        (disponibili sul sito Web del corso). Le lezioni sono integrate da esercitazioni
        pratiche guidate dai docenti in laboratorio (circa il 30% delle ore). Ogni
        esercitazione in laboratorio affronta uno specifico argomento trattato a lezione
        proponendo esercizi concreti (richiedendo l''utilizzo di IDE e tool di programmazione
        specifici).


        Tutte le lezioni sono tenute in italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        Note aggiuntive:


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale che accerta l’acquisizione delle conoscenze
        e delle abilità attese tramite lo svolgimento di una prova pratica svolta
        in laboratorio della durata di 3 ore (con possibilità di accesso ad appunti,
        libri e codice software), seguita da un colloquio orale, per i soli studenti
        che hanno superato la parte pratica.


        La prova pratica di programmazione consiste di norma di 3 esercizi (11 punti
        ciascuno). Per poter partecipare alla prova pratica è necessario iscriversi
        alla lista dell''appello tramite l''applicativo AlmaEsami.


        Per superare la prova pratica di laboratorio ed essere ammessi all’orale,
        è necessario totalizzare almeno 18 punti (su un totale disponibile di 33),
        equamente distribuiti sui tre esercizi, ovvero almeno 6 punti sul primo esercizio,
        6 punti sul secondo esercizio e 6 punti sul terzo esercizio.


        Il colloquio orale consiste di norma di veloci domande relative all''intero
        programma del corso e fornisce un punteggio che varia da +4 punti a -4 punti
        rispetto al punteggio acquisito nella prova pratica.


        Nel colloquio orale il massimo punteggio sarà garantito agli studenti che
        dimostreranno di aver compreso ed essere capaci di utilizzare tutti i contenuti
        dell''insegnamento, illustrandoli con capacità di linguaggio, e risolvendo
        problemi anche complessi non necessariamente incontrati a lezione. L''attribuzione
        del punteggio minimo potrà essere dovuta all''insufficiente conoscenza dei
        concetti chiave, alla mancata padronanza del linguaggio tecnico, alla mancata
        o insufficiente capacità di astrazione dei concetti.'
      Strumenti a supporto della didattica: In aula si usano slide (disponibili sul
        sito Web del corso). In laboratorio sono presenti strumenti di sviluppo e
        di supporto alla esecuzione delle esercitazioni (es. Eclipse, Tomcat, Chrome
        Developer Tools, react.js con eventuali toolchain, node.js). Gli studenti
        sono invitati a familiarizzare con questi o altri strumenti di uso personale.
      Orario di ricevimento: Consulta il sito web di Paolo Bellavista (https://www.unibo.it/sitoweb/paolo.bellavista)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/461146
    title: 2025/2026 Web Technologies T (A-O) — University of Bologna
    contents:
      Learning outcomes: Skills, knowledge, and ability to apply the primary existing
        models and tools for the design, implementation, deployment, and optimization
        of Web-based systems and applications.
      Course contents: "- The origins of the Web: the static model\n  Short historical\
        \ introduction\n  The originary World Wide Web model\n  Primary model elements:\
        \ the HTTP protocol and the URIs\n  Languages for page content description:\
        \ HTML and CSS\n- The evolution of the Web model\n  Towards a more dynamic\
        \ approach: personalization, state, sessions, and conversations\n  State management\n\
        \  Server-side programming: Servlet, JSP\n  Client-side programming: Javascript,\
        \ Ajax\n- Towards Enterprise-oriented server-side environments\n  Multi-layer\
        \ architectures: horizontal and vertical distribution, business logics separation,\
        \ component-container models\n  Rapid notes on Model View Controller for the\
        \ Web and on Java Model 2\n  Enterprise Java Beans as a notable example of\
        \ technology compliant with the heavy container model\n  Spring as a notable\
        \ example of technology compliant with the lightweight container model\n-\
        \ Emerging client-side technologies: single page applications, react.js, and\
        \ directions of evolution of front-end technologies\n- Emerging server-side\
        \ technologies: event-oriented and stateless models, node.js, asynchronous\
        \ I/O management\n- Upgrading towards HTTP2/0: Websocket motivations and mechanisms,\
        \ in Javascript (client side) and Java (server side)\n- Introductory elements\
        \ of HTTP3/0: motivations and primary characteristics of the QUIC protocol\n\
        \nPlease see also the full description of the course contents on the related\
        \ Website on Virtuale @UNIBO, which will be populated and enriched progressively\
        \ during the lecturing period. To have a preliminary idea of the contents,\
        \ please refer to the contents of the previous academic year."
      Readings/Bibliography: 'Primary source of material, information, and exercises:
        the lecturing slides available at the course Website


