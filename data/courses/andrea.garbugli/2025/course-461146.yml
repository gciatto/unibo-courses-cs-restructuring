      Teaching methods: 'The course lectures are held in presence in the assigned
        teaching rooms with the support of slide projection (all slides are available
        at the course Web site). Lecturing is integrated with practical exercises,
        led by the Professors in assigned labs (about 30% of the overall course time).
        Each lab exercise deals with a specific topic presented during the "regular"
        teaching lectures, by proposing a practical programming activity (which calls
        for the usage of specific programming IDEs and tools).


        All the lectures are taught in Italian.


        Additional notes:


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        ) as soon as possible so that they can propose acceptable adjustments. The
        request for adaptation must be submitted in advance (15 days before the exam
        date) to the lecturer, who will assess the appropriateness of the adjustments,
        taking into account the teaching objectives.


        By considering the type of programming activities and the adopted methodologies
        within this course, the participation and attendance of this course suggest
        that all students preliminarily attend the modules 1 and 2 of the e-learning
        course about security in study environments [https://elearning-sicurezza.unibo.it/].'
      Assessment methods: 'The verification and evaluation of the acquired skills
        is performed via a final exam that checks the reached level of knowledge and
        practical programming abilities via a programming activity with duration =
        3h (open book, with the possibility to access notes, books, and previously
        developed code), followed by an oral interview for the students who have passed
        the programming part.


        The programming part of the exam usually consists of 3 exercises (11 points
        each). To be admitted to the programming exam, thee is the need, as usual,
        to the associated list published in the AlmaEsami Web application.


        To pass the programming part of the exam and to be admitted to the oral interview,
        it is necessary to have a score >= 18 points (out of an overall maximum total
        of 33), equally distributed over the 3 exercises, i.e., at least 6 points
        for the first exercise, at least 6 points for the second exercise, and at
        least 6 points for the third exercise.


        The oral interview usually consists of a few rapid questions about the whole
        programme of the course; it can allow to achieve a score in the +4, -4 range,
        starting from the score obtained in the programming part of the exam.


        In the oral interview the maximum score will be assigned to the students who
        will exhibit an excellent knowledge and ability to use all the contents of
        the course, by illustrating them with good language property and by being
        able to solve even problems that have not been previously addressed during
        the lectures. The minimum score will be assigned, on the opposite, because
        of the insufficient knowledge of key concepts of the course, because of the
        lack of proper technical language, and because of insufficient abstraction
        capability on the course topics.'
      Teaching tools: 'In the "regular" teaching activities the course will exploitpresentation
        slides (all slides will be available at the course Web site).


        In labs, the course will use development and execution support tools for implementing
        and running the exercises (e.g., Eclipse, Tomcat, Chrome Developer Tools,
        react.js with possible associated toolchains, and node.js).


        Students are invited to get used and to know how to practically employ the
        development and support tools that will be introduced during the course lectures.'
      Office hours: See the website of Paolo Bellavista (https://www.unibo.it/sitoweb/paolo.bellavista/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
