  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/461146
    title: 2025/2026 TECNOLOGIE WEB T (A-O) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza e capacità di applicazione dei
        principali modelli e strumenti per il progetto e lo sviluppo di sistemi ed
        applicazioni basati sul Web.
      Contenuti: "- L'iniziale modello statico del Web\n  Breve introduzione storica\n\
        \  Modello originale del World Wide Web\n  Elementi del modello: protocollo\
        \ HTTP e URI\n  Linguaggi di descrizione della pagina: HTML e CSS\n- Evoluzione\
        \ del modello Web\n  Verso un approccio dinamico: personalizzazione, stato,\
        \ sessioni e conversazioni\n  Gestione dello stato\n  Programmazione Server\
        \ Side: Servlet, JSP\n  Programmazione Client Side: Javascript e Ajax\n- Verso\
        \ ambienti server-side di tipo Enterprise\n  Architetture multilivello: distribuzione\
        \ orizzontale e verticale, separazione di business logic, modelli componente-container\n\
        \  Cenni di Model View Controller per Web e Java Model 2\n  Enterprise Java\
        \ Beans come esempio di tecnologia conforme al modello a container pesante\n\
        \  Spring come esempio di tecnologia conforme al modello a container leggero\n\
        - Tecnologie emergenti client-side: single page application, react.js e direzioni\
        \ di evoluzione per front-end\n- Tecnologie emergenti server-side: modello\
        \ orientato agli eventi e stateless, node.js, gestione asincrona I/O\n- Upgrading\
        \ verso HTTP2/0: motivazioni e meccanismo delle Websocket in Javascript (client-side)\
        \ e Java (server-side)\n- Cenni di HTTP3/0: motivazioni e caratteristiche\
        \ principali di QUIC\n\nVedi anche il programma del corso di Tecnologie Web\
        \ T sul sito Web di Virtuale @UNIBO, che sarà popolato man mano durante lo\
        \ svolgimento del corso."
