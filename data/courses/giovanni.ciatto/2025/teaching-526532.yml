syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526532
    title: 2025/2026 DISTRIBUTED SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course, students got
        acquainted with the fundamental issues of distributed systems, the computational
        models capturing their essence, and the technologies currently helping facing
        them in the most systematic and effective way. In particular, students become
        familiar with the fittest solutions, technologies, architectures, and methodologies
        to design distributed systems, and is capable of

        devising out the most critical aspects of distributed systems coming from
        physical distribution

        determining the most proper methodological approaches

        selecting the fittest technologies for implementing the solutions detected'
      Contenuti: "- Case Studies\n  \n  - The CAP Theorem. Availability, Consistency,\
        \ Failure in Distributed Systems\n  - The Problem of Consensus in Distributed\
        \ Systems\n  - Distributed Ledger Technology. Blockchain as Middleware\n \
        \ - Representational State Transfer (ReST)\n  - Logical Clocks\n  - Simple\
        \ Agents in JADE\n  - Coordination in Linda\n  - Code Mobility\n- General\
        \ Issues of Distributed Systems\n  \n  - Why Distributed Systems?\n  - Replication\
        \ & Consistency in Distributed Systems\n  - Dependability in Distributed Systems\n\
        \  - Roots of Distributed Systems. Computation in Space & Time\n  - Definitions\
        \ & Goals for Distributed Systems\n  - Sorts of Distributed Systems\n  - Modelling\
        \ Distributed Systems. Software & System Architectures\n  - Modelling Distributed\
        \ Systems. Process Algebra\n  - Computing with Time\n  - Agents for Distributed\
        \ Systems\n  - Coordination of Distributed Systems\n  - Computing with Space\n\
        - Technologies for Distributed Systems\n  \n  - Infrastructural components\
        \ and interaction patterns for distributed systems\n  - Tools and diagrams\
        \ for distributed systems modelling\n  - Basic mechanisms for distributed\
        \ systems\n  - Communication mechanisms (stream- and packet-based interaction\
        \ with sockets) in Python\n  - Data presentation, serialization and deserialization:\
        \ tools and technologies\n  - Anatomy of Remote Procedure Calls\n  - Case\
        \ study: guided design and implementation of a distributed system from scratch"
      Testi/Bibliografia: The bibliography is made available through the course web
        site.
      Metodi didattici: '- Lessons with slides

        - Examples discussed and built by the teachers

        - Lab activity'
      Modalità di verifica e valutazione dell'apprendimento: '- Development of an
        individual/group project involving the design and prototyping of a distributed
        system (software+report)

        - Presentation and discussion of the aforementioned project'
      Strumenti a supporto della didattica: '- web site of the professor (http://andreaomicini.apice.unibo.it/)

        - web page of the course (https://apice.unibo.it/xwiki/bin/view/Course/Ds2526)
        with slides (PDF), other materials and useful links

        - recorded lectures for background topics'
      Link ad altre eventuali informazioni: https://apice.unibo.it/xwiki/bin/view/Courses/Series/Ds/
      Orario di ricevimento: 'Consulta il sito web di Andrea Omicini (https://www.unibo.it/sitoweb/andrea.omicini)


        Consulta il sito web di Giovanni Ciatto (https://www.unibo.it/sitoweb/giovanni.ciatto)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
