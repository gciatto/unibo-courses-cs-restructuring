syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455810
    title: 2025/2026 INTELLIGENT SYSTEMS ENGINEERING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course, students get
        acquainted with the fundamental issues of intelligent systems, the most relevant
        computational models and technologies, and the most effective methods. In
        particular, students become familiar with the fittest solutions, languages,
        technologies, architectures, and methodologies to design intelligent systems,
        and are capable of


        - devising the problems requiring artificial intelligence techniques for their
        solution;

        - determining the most proper conceptual and methodological approaches;

        - selecting and integrating the fittest technologies for implementing the
        solutions detected.'
      Contenuti: "- Case Studies\n  \n  - ChatGPT—Beyond the Turing Test\n  - Autonomy\
        \ in Biology\n  - Programming Intentional Agents in AgentSpeak(L) & Jason\n\
        \  - Natural Language Processing\n- General Issues of Intelligent Systems\n\
        \  \n  - Drivers for Intelligent Systems\n  - On Autonomy. Concepts & Definitions\n\
        \  - Agents for Intelligent Systems Engineering\n  - Artificial Intelligence.\
        \ A Bird’s Eye View\n  - Automated Reasoning\n  - Reasoning Agents\n  - Logic\
        \ & Computation\n  - Planning for Intelligent Agents\n  - Self-Organising\
        \ Systems\n  - Nature-Inspired Coordination & Self-Organisation\n  - Interacting\
        \ with Autonomous Systems: Conversational Informatics\n  - Simulation & Multi-Agent\
        \ Systems: An Introduction\n- Scientific Competences\n  \n  - Sources of Scientific\
        \ Literature for Intelligent & Autonomous Systems\n  - Systematic Literature\
        \ Review. A Methodology for Scientific Surveys\n- Technologies for Intelligent\
        \ Systems\n  \n  - Knowledge Representation\n  - Inference\n  - Perception\
        \ and Actuation\n  - Planning with STRIPS\n  - Programming Intentional Agents:\
        \ Exercises in Jason\n  - eXplainable Artificial Intelligence (XAI): A Gentle\
        \ Introduction"
      Testi/Bibliografia: The bibliography is made available through the course web
        site.
      Metodi didattici: '- Lessons with slides

        - Examples discussed and built by the teachers

        - Lab activity'
      Modalità di verifica e valutazione dell'apprendimento: '- Development of an
        individual/group project, typically involving the design and prototyping of
        an intelligent system (software+report)

        - Presentation and discussion of the aforementioned project'
      Strumenti a supporto della didattica: '- web site of the professor (http://andreaomicini.apice.unibo.it/)

        - web page of the course (https://apice.unibo.it/xwiki/bin/view/Course/Ise2526)
        with slides (PDF), other materials and useful links'
      Link ad altre eventuali informazioni: https://apice.unibo.it/xwiki/bin/view/Courses/Series/Ise/
      Orario di ricevimento: 'Consulta il sito web di Andrea Omicini (https://www.unibo.it/sitoweb/andrea.omicini)


        Consulta il sito web di Giovanni Ciatto (https://www.unibo.it/sitoweb/giovanni.ciatto)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
