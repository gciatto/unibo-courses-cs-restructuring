    title: 2025/2026 TECNICHE DI DIGITALIZZAZIONE DEI DOCUMENTI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'L’insegnamento mira a formare all''utilizzo
        critico di tecnologie e

        strumenti informatici per l''acquisizione digitale, l’elaborazione e il restauro
        digitale di documenti

        testuali su vari supporti. Al termine del corso lo studente conosce principi
        e metodologie efficaci

        per la acquisizione e per la rappresentazione digitale delle immagini, ed
        è in grado di predisporre

        attività di digitalizzazione, restituzione e valorizzazione di documenti testuali'
      Contenuti: 'Argomenti trattati:


        - Scenari digitali per i Beni Culturali: temi e problematiche

        - Scene, immagini analogiche ed immagini digitali

        - Processi di scansione e dispositivi di acquisizione (scanner piani e planetari,
        fotocamere digitali, dorsi digitali)

        - Risoluzione ottica ed interpolata

        - Calibrazione di uno scanner

        - Digitalizzazione di un testo stampato e manoscritto

        - Metodologie di verifica della qualità di un’immagine digitale (istogrammi,
        distribuzioni e contenuto informativo)

        - Visualizzazione su un medium qualunque

        - Memorizzazione delle immagini digitali

        - I formati

        - Cenni sulla funzione dei metadati tecnici

        - Uso della nomenclatura nella struttura logica

        - Dimensionamento di una collezione digitale (considerazioni generali sull''incertezza
        di determinare esattamente gli spazi di memorizzazione di una collezione digitale)

        - Analisi critica delle linee guida pubblicate dal PND https://docs.italia.it/italia/icdp/

        - Analisi critica dei capitolati tecnici per le gare di digitalizzazione

        - Cenni su riuso delle immagini digitali con l''ausilio delle tecnologie AI


        Obbiettivi del corso:


        -Conoscere/sapere: essere in possesso delle conoscenze necessarie alle problematiche
        relative alle tecniche di digitalizzazione dei documenti, della produzione
        delle immagini digitali e dei loro rapporti con l’iconografia tradizionale;
        essere in grado di distinguere ed utilizzare i principali trattamenti del
        dato visivo con strumenti di calcolo numerico; conoscere gli aspetti tipici
        della conservazione e valorizzazione dei grandi patrimoni iconografici, evidenziando
        le criticità della conservazione a lungo termine e le possibili soluzioni..


        -Saper fare: essere in grado di utilizzare le tecnologie e strumenti informatici
        per l''acquisizione e per l''elaborazione di immagini digitali di documenti
        testuali e per la loro complessiva ricostruzione digitale; affrontare le varie
        fasi di un progetto di digitalizzazione e di valorizzazione delle risorse
        documentarie; essere in grado di stendere un capitolato tecnico relativo ad
        un progetto di digitalizzazione.


        -Autonomia di giudizio: essere in grado di verificare un Data Management Plan;
        saper adottare gli strumenti tecnologici di verifica sulla qualità delle immagini
        digitali prodotte seguendo le direttive espresse dalle nuove “linee guida
        di digitalizzazione del patrimonio culturale” del PND.


        -Abilità comunicative: saper illustrare con rigore logico e terminologico
        questioni anche tecniche inerenti alle tecniche di digitalizzazione dei documenti.


        -Capacità di apprendimento: saper approfondire in maniera autonoma i temi
        inerenti alla disciplina'
      Testi/Bibliografia: 'Per tutti ( frequentanti e non frequentanti):


        Nicola Barbuti, La digitalizzazione dei beni documentali. Metodi, tecniche,
        buone prassi , Editrice Bibliografica , 2022


        C. Jacob*,* Dimensionamento e politiche di gestione di una biblioteca digitale**,**
        in E-Lis 2007 http://eprints.rclis.org/10717/


        A. Salarelli, International Image Interoperability Framework (IIIF): a panoramic
        view in JLIS Vol. 8, No. 1 (2017) https://air.unipr.it/bitstream/11381/2825535/1/12090-22175-3-PB.pdf


        E. Groppo, C. Cortese et all*,* International Image Interoperability Framework
        (IIIF) per la gestione, la fruizione e lo studio delle immagini digitali in
        Bibelot V. 23 N. 2 (2017) https://riviste.aib.it/index.php/bibelot/article/view/11677


        ** I non frequentanti aggiungeranno la lettura del volume a sostituzione delle
        esercitazioni tenute in aula


        C.Jacob Immagini per la biblioteca digitale 2006, dispensa deposito SIAE n.
        9801090 testo scaricabile (https://liveunibo-my.sharepoint.com/:b:/g/personal/emiliaadele_groppo_unibo_it/EZk3iuWDR1BHpwKUO9E4KLABQrQzZKf1bQYxTdFTu7Va3g)


        Tutti gli studenti non frequentanti sono tenuti alla visualizzazione delle
        lezioni registrate e disponibili su virtuale e di conseguenza agli argomenti
        trattati durante le lezioni'
      Metodi didattici: 'Il modulo di didattica innovativa sarà basato sulle metodologie
        didattiche di cooperative learning (apprendimento cooperativo).


        Al termine di un ciclo di lezioni introduttive frontali verranno proposte
        attività di tipo laboratoriale on line. Gli studenti frequentati verranno
        divisi in gruppi omogenei a cui verrà assegnata una classe virtuale su teams;
        verranno adottati tutti gli strumenti collaborativi e di condivisione dei
        materiali messi a disposizione della piattaforma, realizzando così una completa
        integrazione tra conoscenze, competenze e capacità differenti, sia dal punto
        di vista cognitivo che da quello relazionale. L’ambiente virtuale permetterà
        agli studenti di condividere lo studio di documenti messi a disposizione dal
        docente e la produzione di report e documenti di analisi. Alla fine del percorso
        didattico innovativo ciascun gruppo di lavoro illustrerà agli altri gruppi
        di studenti docente i propri elaborati. Questa attività di presentazione permetterà
        agli studenti di affinare le proprie abilità comunicative sui principali temi
        del corso. La discussione ed il confronto permetteranno agli studenti di affinare
        le proprie capacità di giudizio.'
      Modalità di verifica e valutazione dell'apprendimento: 'La presenza alle lezioni
        è fortemente consigliata e nella valutazione si terrà conto anche della partecipazione
        attiva durante le attività di gruppo e le esercitazioni pratiche che verranno
        svolte in modalità ibrida


        Si valuteranno: la conoscenza e la padronanza degli argomenti discussi durante
        le lezioni.


        La capacità di sapersi esprimere adeguatamente e con linguaggio appropriato
        alla materia trattata, la capacità di sintesi e di analisi dei temi e dei
        concetti, e infine le capacità critiche e metodologiche maturate dallo studente.


        Gli studenti che dimostreranno di aver raggiunto queste capacità verranno
        valutati con un punteggio ottimo (A = 27-30 con lode). Un''acquisizione prevalentemente
        mnemonica degli argomenti trattati nel corso oltre alla mancanza di padronanza
        riguardo agli esempi sviluppati durante i lavori di gruppo e le esercitazioni,
        associata ad espressione verbale e capacità logiche non pienamente soddisfacenti,
        verranno valutate con punteggio compreso tra buono (B = 24-26) e soddisfacente
        (C = 21-23).


        Si avverte che lacune formative, linguaggio inappropriato, mancanza di orientamento
        all''interno dei materiali bibliografici offerti durante il corso saranno
        valutati negativamente. Durante l’esame gli studenti che avranno partecipato
        al corso potranno presentare l’attività laboratoriale svolta nel proprio gruppo
        di lavoro a partire dagli elaborati condivisi.'
      Strumenti a supporto della didattica: Per le lezioni on line ed i lavori di
        gruppo si utilizzerà la piattaforma Teams di Ateneo, con la creazione di apposite
        classi virtuali, una per ciascun gruppo di lavoro.
