  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/479053
    title: 2025/2026 Distributed Software Systems — University of Bologna
    contents:
      Learning outcomes: The course presents some current technologies to develop
        distributed systems. The concept of distributed system is introduced first,
        then the concept of middleware technology as a distributed programming platform.
        The fundamental principles of distributed systems will be explained. This
        introductory material is followed by a description of the main architectures
        of distributed systems, including those for implementing and deploying service-based
        applications in the cloud. At the end of the course the students will be able
        to select the appropriate middleware platform for a given problem and to apply
        the main technologies presented to solve practical case studies. The exam
        will consist of 1) a midterm presentation on a research paper chosen by the
        student and 2) a final project assigned by the instructor.
