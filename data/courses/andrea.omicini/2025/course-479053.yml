syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/479053
    title: 2025/2026 DISTRIBUTED SOFTWARE SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso presenta le principali tecnologie
        attualmente usate per sviluppare sistemi software distribuiti. Inizialmente
        si introducono i principi fondamentali dei sistemi distribuiti e successivamente
        si discutono le tecnologia middleware che mettono a disposizione piattaforme
        per la programmazione distribuita. Questo materiale introduttivo è seguito
        dalla descrizione delle principali architetture per la realizzazione di sistemi
        distribuiti, incluse quelle per implementare applicazioni basate su servizi
        in ambiente cloud. Alla fine del corso lo studente saprà selezionare la piattaforma
        middleware appropriata per un dato problema, e sarà in grado di applicare
        le tecnologie presentate per risolvere casi di studio pratici. L'esame consisterà
        di 1) una presentazione preliminare di un articolo di ricerca scelto dallo
        studente e di 2) un progetto finale assegnato dal docente.
      Contenuti: "- Case Studies\n  \n  - The CAP Theorem. Availability, Consistency,\
        \ Failure in Distributed Systems\n  - The Problem of Consensus in Distributed\
        \ Systems\n  - Distributed Ledger Technology. Blockchain as Middleware\n \
        \ - Representational State Transfer (ReST)\n  - Logical Clocks\n  - Simple\
        \ Agents in JADE\n  - Coordination in Linda\n  - Code Mobility\n- General\
        \ Issues of Distributed Systems\n  \n  - Why Distributed Systems?\n  - Replication\
        \ & Consistency in Distributed Systems\n  - Dependability in Distributed Systems\n\
        \  - Roots of Distributed Systems. Computation in Space & Time\n  - Definitions\
        \ & Goals for Distributed Systems\n  - Sorts of Distributed Systems\n  - Modelling\
        \ Distributed Systems. Software & System Architectures\n  - Modelling Distributed\
        \ Systems. Process Algebra\n  - Computing with Time\n  - Agents for Distributed\
        \ Systems\n  - Coordination of Distributed Systems\n  - Computing with Space\n\
        - Technologies for Distributed Systems\n  \n  - Infrastructural components\
        \ and interaction patterns for distributed systems\n  - Tools and diagrams\
        \ for distributed systems modelling\n  - Basic mechanisms for distributed\
        \ systems\n  - Communication mechanisms (stream- and packet-based interaction\
        \ with sockets) in Python\n  - Data presentation, serialization and deserialization:\
        \ tools and technologies\n  - Anatomy of Remote Procedure Calls\n  - Case\
        \ study: guided design and implementation of a distributed system from scratch"
