syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518190
    title: 2025/2026 METODI INFORMATICI PER LA TRASFORMAZIONE DIGITALE — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso intende fornire le conoscenze
        fondamentali sui principali strumenti e sulle metodologie per la pianificazione,
        lo sviluppo, la realizzazione e la valutazione delle trasformazioni digitali
        basate su software, utilizzando anche nelle modalità di organizzazione della
        didattica un approccio molto pratico di learning by doing con esercitazioni
        laboratoriali.

        Al termine del corso lo studente sarà in grado di valutare e applicare i principi
        che guidano il processo di sviluppo di software complesso, e consentano di
        realizzare prodotti software efficienti e affidabili; valutare gli aspetti
        legati alla produzione del software, agli approcci strutturati per lo sviluppo
        e ai modelli di sistema; effettuare l’analisi ad oggetti di un sistema di
        complessità limitata, a partire dai requisiti; utilizzare efficacemente uno
        o più linguaggi ad oggetti.'
      Contenuti: 'Elementi di trasformazione digitale: dati, tecnologie, competenze,
        processi


        Strutture di dati


        Il ruolo del software nella trasformazione digitale


        Pianificare, descrivere e gestire i progetti software


        Metodi di sviluppo del software: i metodi agili


        Scrum: un metodo agile di collaborazione


        Un ruolo chiave della trasformazione digitale: Il product owner


        I requisiti del software - le user story e i casi d''uso


        Il ruolo del facilitatore della collaborazione agile


        Gli strumenti informatici di supporto alla collaborazione


        Contenuti del modulo della prof. Giorgia Lodi:


        - Il ruolo dei dati nella trasformazione digitale

        - Ciclo di vita dei dati

        - Protezione dei dati personali – principi e azioni per una buona azione in
        linea con il GDPR

        - Dati aperti – definizione con sguardo alle normative, formati aperti e licenze
        aperte

        - Gli standard del web semantico a supporto dell’interoperabilità semantica
        - introduzione ai grafi della conoscenza'
      Testi/Bibliografia: Kelly The art of agile product ownership, APress 2019
      Metodi didattici: 'Lezioni frontali, esercitazioni, letture e presentazioni
        di articoli scientifici. Quiz di verifica in classe usando strumenti online:
        es. Kahoot.


        NOTA BENE: In considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza
        nei luoghi di studio, [https://elearning-sicurezza.unibo.it/] in modalità
        e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'In classe, durante il
        corso: quiz a risposta multipla, giochi di team building, presentazioni individuali.


        La verifica finale dell''apprendimento avviene attraverso: 1) la discussione
        di un progetto da fare in gruppo seguendo un approccio agile 2) una presentazione
        preparata individualmente su un argomento scientifico a scelta dello studente
        e concordato col docente; 3) una interrogazione orale (opzionale a richiesta
        dello studente).


        Il progetto mira ad accertare e consolidare le abilità collaborative ("teamwork")
        acquisite nel risolvere problemi nell''ambito delle principali tematiche affrontate
        nel corso.


        La presentazione mira a verificare la capacità di comprendere ed esporre argomenti
        di ricerca relativi alla trasformazione digitale nell''ambito del settore
        pubblico.'
      Strumenti a supporto della didattica: Copie degli appunti (slide) discussi a
        lezione. Quiz a domande chiuse somministrati online. Canale di comunicazione
        condiviso tra docente e studenti basato su Telegram. Strumenti informatici
        collaborativi (es. Trello, Slack, MS Teams)
      Orario di ricevimento: 'Consulta il sito web di Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio)


        Consulta il sito web di Giorgia Lodi (https://www.unibo.it/sitoweb/giorgia.lodi4)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Città e comunità
        sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518190
    title: 2025/2026 Computer Methods for Digital Transformation — University of Bologna
    contents:
      Learning outcomes: The course aims to provide fundamental knowledge on the main
        tools and methodologies for planning, developing, and evaluating software-based
        digital transformations, also using a very practical learning by doing approach
        with hands-on exercises in class. At the end of the course the student will
        be able to evaluate and apply the principles that guide the social, collaborative
        development process of software services and products for the digital transformation,
        in particular is able to define and analyze the requirements of a new service
        or digital product and to collaborate in an IT-type development process.
      Course contents: This course is in Italian. See the Italian description
      Readings/Bibliography: Kelly The art of agile product ownership, APress 2019
      Teaching methods: 'Lectures, exercises, readings and presentations of scientific
        articles. Verification quiz in the classroom using online tools: eg. Kahoot.'
      Assessment methods: 'Quizzes during lectures, group project, individual presentations.

        The final assessment of learning takes place through: 1) the discussion of
        a project to be done in a group following an agile approach 2) an individually
        prepared presentation on a scientific topic chosen by the student and agreed
        with the teacher; 3) an oral question (optional at the request of the student).

        The project aims to ascertain and consolidate the collaborative skills ("teamwork")
        acquired in solving problems in the context of the main issues addressed in
        the course.

        The presentation aims to test the ability to understand and present research
        topics related to digital transformation within the public sector.'
      Teaching tools: Copies of the notes (slides) discussed in class. Closed question
        quizzes administered online. Communication channel shared between teacher
        and students based on Telegram. Collaborative IT tools (e.g. Trello, Slack,
        MS Teams)
      Office hours: 'See the website of Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio/en)


        See the website of Giorgia Lodi (https://www.unibo.it/sitoweb/giorgia.lodi4/en)'
      SDGs: 'Quality education Decent work and economic growth Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
