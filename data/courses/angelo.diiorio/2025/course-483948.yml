syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/483948
    title: 2025/2026 ELABORAZIONE DI TESTI E GESTIONE DOCUMENTALE — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso intende fornire le conoscenze
        sui modelli, sui processi e sugli strumenti per la rappresentazione ed elaborazione
        di documenti digitali, in particolare documenti amministrativi e normativi,
        e la loro organizzazione in basi documentali accessibili e interoperabili.

        Al termine del corso lo studente conoscerà le principali tecniche per estrarre
        informazioni da documenti di testo. Lo studente sarà in grado di rappresentare
        e collegare documenti di testo in formato digitale, progettare basi documentali
        complesse, e analizzare testi ed estrarne informazioni significative in modo
        automatico.'
      Contenuti: 'Il corso prevede una parte introduttiva sulle principali tecniche
        per la marcatura dei documenti e identificazione delle loro componenti strutturali,
        in particolare su tecnologie XML e linguaggi di validazione.


        Si studieranno inoltre i principali formati documentali e le loro caratteristiche,
        campi di applicazione e limiti.


        A seguire, si studieranno alcuni linguaggi e strumenti per la trasformazione
        tra formati documentali.


        Si studieranno inoltre alcuni modelli e gli strumenti per l’estrazione automatica
        di informazioni dal testo, e le principali tecniche di Natural Language Processing.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si suggerisce di
        mettersi subito in contatto con l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it)
        e con il/la docente, per cercare insieme le strategie più efficaci nel seguire
        le lezioni e/o nel preparare l’esame.'
      Testi/Bibliografia: 'Vista la rapida evoluzione della materia, non viene usato
        un unico testo di riferimento.


        Tutto il materiale didattico sarà reso disponibile sulla piattaforma Virtuale,
        inclusi riferimenti a materiale on-line di approfondimento e risorse utili
        allo svolgimento del progetto.'
      Metodi didattici: 'Il corso prevede lezioni frontali, con slide fornite su Virtuale
        insieme ad altro materiale didattico.


        Previste inoltre attività di laboratorio, sui linguaggi studiati durante il
        corso, e uso di alcune librerie Python.


        Prerequisiti: conoscenze di base di programmazione in Python.'
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione finale
        prevede la realizzazione e discussione di un progetto, svolto individualmente
        o in coppia.


        Le specifiche del progetto saranno pubblicate all''inizio del corso.


        La discussione consiste nel mostrare il funzionamento del progetto e descrivere
        il codice prodotto.


        La valutazione tiene conto del corretto funzionamento e rispetto delle specifiche,
        dell''organizzazione e qualità del codice, della capacità di motivare le scelte
        progettuali e della conoscenza di linguaggi e tecnologie collegate al progetto.


        L''enfasi è sui temi affrontati durante il corso, e relativi all''elaborazione
        di testi e formati documentali, piuttosto che su aspetti di programmazione
        in Python.'
      Orario di ricevimento: Consulta il sito web di Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/483948
    title: 2025/2026 ELABORAZIONE DI TESTI E GESTIONE DOCUMENTALE — University of
      Bologna
    contents:
      Learning outcomes: 'The course aims to provide knowledge about models, processes,
        and tools for the representation and processing of digital documents, particularly
        administrative and regulatory documents, and their organization into accessible
        and interoperable document repositories.


        At the end of the course, the student will know the main techniques for extracting
        information from text documents.


        The student will be able to represent and link digital text documents, design
        complex document repositories, and analyze texts to automatically extract
        meaningful information.'
      Course contents: 'The course includes an introductory part on the main techniques
        for document markup and the identification of their structural components,
        with a particular focus on XML technologies and validation languages.


        The main document formats will also be studied, along with their characteristics,
        fields of application, and limitations.


        Subsequently, some languages and tools for the transformation between document
        formats will be covered.


        Additionally, the course will address some models and tools for the automatic
        extraction of information from text, as well as the main Natural Language
        Processing techniques.


        Students with SLD or temporary or permanent disabilities. It is suggested
        that they get in touch as soon as possible with the relevant University office
        (https://site.unibo.it/studenti-con-disabilita-e-dsa/en) and with the lecturer
        in order to seek together the most effective strategies for following the
        lessons and/or preparing for the examination.'
      Readings/Bibliography: 'Due to the rapid evolution of the subject, no single
        textbook is used.


        All teaching materials will be made available on Virtuale, including references
        to online resources for further study and useful practice for the project
        work.'
      Teaching methods: 'The course includes lectures, with slides provided on Virtuale
        along with other teaching materials.


        Laboratory activities are also planned, focusing on the languages studied
        during the course and the use of some Python libraries.'
      Assessment methods: 'The final evalution will consist of the preparation and
        presentation of a project work, individual or in group of maximum two students.


        See the Italian version for details.'
      Teaching tools: Slides and lab exercises
      Office hours: See the website of Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio/en)
      SDGs: 'Quality education Decent work and economic growth


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
