  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523706
    title: 2025/2026 PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i princìpi e le tecniche base della programmazione. E' in grado di realizzare
        programmi in uno specifico linguaggio di programmazione.
      Contenuti: 'Il corso copre principalmente il paradigma di programmazione imperativa,
        utilizzando il linguaggio Java. Gli argomenti trattati sono i seguenti:


        - Introduzione alla programmazione e al linguaggio Java

        - Variabili, tipi, operatori, espressioni

        - Costrutti di selezione

        - Costrutti di iterazione

        - Array e matrici

        - Programmazione procedurale

        - Ricorsione

        - Lettura e scrittura file'
      Testi/Bibliografia: 'Il libro principalmente utilizzato per lo sviluppo di questo
        corso è:


        W. Savitch, Programmazione di base e avanzata con Java, Pearson Italia S.p.A.,
        2024.


        L''acquisto del libro non è necessario per seguire il corso né per sostenere
        l’esame.'
      Metodi didattici: 'Il materiale didattico viene presentato attraverso slide
        ed esempi di codice.


        Il corso prevede inoltre esercitazioni in aula sugli argomenti trattati durante
        le lezioni frontali, condotte sia dai docenti sia dal tutor del corso. Se
        possibile, verranno organizzate anche esercitazioni facoltative con il tutor
        al di fuori dell’orario delle lezioni.


        Tutto il materiale didattico sarà reso disponibile sulla piattaforma Virtuale
        del corso.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame copre tutti
        gli argomenti trattati nel corso e consiste nella progettazione e scrittura
        di codice Java.


        Si svolge in laboratorio, senza l''ausilio di manuali, appunti personali o
        dispositivi elettronici di alcun tipo.


        La durata dell’esame dipende dal numero di esercizi assegnati, considerando
        un minimo di 30 minuti per esercizio e un massimo di tre ore complessive.


        La prova di laboratorio viene valutata sulla base dei seguenti criteri:


        - Correttezza sintattica: il codice deve compilare; gli esercizi che non compilano
        non verranno presi in considerazione.

        - Correttezza semantica: il codice deve eseguire correttamente quanto richiesto
        dalla consegna.

        - Pragmatica: il codice deve essere pulito, leggibile, non ridondante e il
        più possibile efficiente.


        Gli studenti che otterranno un voto pari o superiore a 27 nella prova di laboratorio
        dovranno sostenere un’ulteriore verifica orale, finalizzata a confermare,
        modificare o incrementare il voto conseguito.


        La prova orale consisterà nello svolgimento (anche parziale) di esercizi,
        nella discussione delle soluzioni proposte e nell’approfondimento di argomenti
        correlati.


        Al fine di prevenire casi di plagio, i docenti si riservano la facoltà di
        richiedere una verifica orale anche agli studenti con un voto inferiore a
        27, oppure di somministrare l’esame in forma scritta su carta anziché in laboratorio.


        Sono garantiti sei appelli d’esame all’anno, con adeguamenti specifici previsti
        per gli studenti con DSA.'
      Strumenti a supporto della didattica: 'Laboratorio GNU/ Linux Ercolani:


        52 PC fissi per studenti con accesso a Internet

        45 postazioni per portatili studenti.

        Indirizzo: Scuole Ercolani, Mura Anteo Zamboni 2/B – Bologna


        In tutte le postazioni è installato il sistema operativo Debian.


        Le macchine sono dotate di processori Intel Core I5-4590 a 3,30 GHz e di 8
        GB di RAM. I PC sono utilizzabili da remoto 24 ore al giorno e 7 giorni su
        7.


        Questo laboratorio è sottoposto al controllo degli accessi, per cui l''accesso
        è consentito solo mediante l''utilizzo del badge studenti, rilasciato dalla
        Segreteria Studenti della Scuola di Scienze (via Zamboni 33). Dal momento
        del rilascio potrebbero essere necessari alcuni giorni per ottenere l''abilitazione
        all''accesso.'
      Orario di ricevimento: 'Consulta il sito web di Roberto Amadini (https://www.unibo.it/sitoweb/roberto.amadini)


        Consulta il sito web di Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523706
    title: 2025/2026 Programming — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will know the basic
        principles and techniques of programming, and will be able to create programs
        in a specific programming language.
      Course contents: 'The course mainly covers the imperative programming paradigm
        using the Java language. The topics covered are as follows:


        - Introduction to programming and the Java language

        - Variables, types, operators, expressions

        - Selection constructs

        - Iteration constructs

        - Arrays and matrices

        - Procedural programming

        - Recursion

        - File input and output'
      Readings/Bibliography: 'The main textbook used in the development of this course
        is:


        W. Savitch, Programming: Fundamentals and Advanced Techniques with Java, Pearson
        Italia S.p.A., 2024.


        Purchasing the book is not required in order to attend the course or take
        the exam.'
      Teaching methods: 'Teaching materials are presented through slides and code
        examples.


        The course also includes in-class exercises on the topics covered during the
        lectures, conducted by both the instructors and the course tutor. If possible,
        optional tutoring sessions will also be offered outside of regular class hours.


        All teaching materials will be made available on the course''s Virtuale platform.'
      Assessment methods: 'The exam covers all topics addressed during the course
        and consists of designing and writing Java code.


        It takes place in a lab setting, without the aid of manuals, personal notes,
        or any kind of electronic devices.


        The duration of the exam depends on the number of exercises assigned, with
        a minimum of 30 minutes per exercise and a maximum total of three hours.


        The lab exam is evaluated based on the following criteria:


        - Syntactic correctness: the code must compile; exercises that do not compile
        will not be considered.

        - Semantic correctness: the code must correctly perform the tasks required
        by the assignment.

        - Pragmatics: the code must be clean, readable, non-redundant, and as efficient
        as possible.


        Students who achieve a grade of 27 or higher on the lab exam must take an
        additional oral exam, aimed at confirming, modifying, or increasing the score
        obtained.


        The oral exam will consist of completing (even partially) exercises, discussing
        proposed solutions, and exploring related topics in more depth.


        To prevent cases of plagiarism, instructors reserve the right to request an
        oral verification even for students with a score below 27, or to administer
        the exam in written form on paper instead of in the lab.


        Six exam sessions per year are guaranteed, with specific accommodations provided
        for students with learning disabilities (DSA).'
      Teaching tools: 'GNU/Linux Ercolani Lab:


        52 fixed PCs for students with Internet access

        45 workstations for student laptops.

        Address: Scuole Ercolani, Mura Anteo Zamboni 2/B - Bologna.


        In all the workstations the operating system Debian is installed.


        The machines are equipped with Intel Core I5-4590 processors at 3.30 GHz and
        8 GB of RAM.

        The PCs can be used remotely 24 hours a day, 7 days a week.


        This lab is subject to access control, so access is allowed only through the
        use of the student badge, issued by the Student Secretariat of the School
        of Science (via Zamboni 33). From the moment of issue, it may take a few days
        to obtain the access authorization.'
      Office hours: 'See the website of Roberto Amadini (https://www.unibo.it/sitoweb/roberto.amadini/en)


        See the website of Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio/en)'
