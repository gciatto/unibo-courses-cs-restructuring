  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/543012
    title: 2025/2026 SISTEMI SOFTWARE A OGGETTI T (L-Z) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente ha una
        conoscenza approfondita dei sistemi software a oggetti, sia dal punto di vista
        metodologico-concettuale sia dal punto di vista pratico, ed è capace di sviluppare
        applicazioni software di media complessità. In particolare: a) possiede i
        fondamenti metodologici per l’analisi e lo sviluppo di sistemi software secondo
        il paradigma a oggetti; b) conosce approfonditamente le tecniche di programmazione
        a oggetti, sia dal punto di vista concettuale che dal punto di vista pratico,
        in particolare nel linguaggio Java, e sa applicarle a casi concreti di media
        complessità; c) possiede le nozioni fondamentali relative agli aspetti funzionali
        nei moderni linguaggi a oggetti; d) conosce e sa utilizzare gli elementi di
        base per la costruzione di interfacce grafiche secondo tecniche di programmazione
        event-driven; e) conosce e sa utilizzare le strutture dati fondamentali e
        alcuni dei principali algoritmi.'
      Contenuti: 'Concetti fondamentali dei linguaggi di programmazione. Famiglie
        di linguaggi imperativi, funzionali, logici e a oggetti. Introduzione alla
        progettazione del software: componenti software, tipi di dato astratto (5h).


        Concetti, metodologie e linguaggi. Introduzione alla programmazione ad oggetti
        in un''ottica multi-linguaggio (Java, C#, Scala, Kotlin), con specifico focus
        sul linguaggio Java: oggetti singleton, classi e istanze, meccanismi di costruzione-distruzione
        di istanze. Oggetti composti, ereditarietà, polimorfismo e genericità. Classi
        astratte, interfacce: il ruolo delle interfacce nel progetto e loro relazione
        con le classi. (30h frontale + 12h lab)


        Ereditarietà semplice e multipla fra interfacce. Lambda expression e interfacce
        funzionali. (12h + 6h lab)


        Il concetto di eccezione. Stream di I/O. Principali strutture dati: liste,
        hashmap, alberi. Algoritmi su tali strutture dati e loro implementazione sia
        in forma procedurale sia in forma orientata agli oggetti in Java. (20h + 12h
        lab)


        Introduzione alla programmazione funzionale e specificatamente agli stream
        di operazioni in Java (3h)


        Elementi di base per la costruzione di interfacce grafiche: concetto di evento
        e programmazione event-driven, la piattaforma JavaFX. (10h+10h lab)'
      Testi/Bibliografia: Si veda l'elenco aggiornato disponibile on-line sul portale
        didattico curato dal docente
      Metodi didattici: 'Il corso viene erogato in modo fortemente interattivo, alternando
        la discussione dei problemi, illustrati mediante proiezione di diapositive
        (scaricabili dallo studente dal sistema VirtuaLe.unibo.it, in modo da evitare
        allo studente l''ansia di dover trascrivere tutto ciò che viene mostrato,
        permettendogli di concentrarsi sui contenuti esposti), esempi concreti, esempi
        live attraverso l''uso d una pluralità di strumenti di programmazione.


        La metodologia di insegnamento prevede infatti un approccio fortemente integrato
        teoria+pratica, sia nel modulo 1 - che discute e presenta continuamente esempi
        pratici tramite live session - sia nei moduli di esercitazione di laboratorio,
        che costituiscono sessioni mirate di sviluppo per obiettivi, dove si sfruttano
        anche tecnologie di interazione (MS Teams) per agire a livello di gruppo.


        Più in generale, lezioni ed esercitazioni sono continuamente intercalate,
        alternando l''esposizione di un concetto o costrutto linguistico con i relativi
        esempi e la loro utilizzabilità pratica in casi reali, di complessità via
        via crescente.


        Il modulo di taglio più teorico è strettamente integrato con il modulo di
        laboratorio: ogni esercitazione pratica affronta uno specifico argomento (tipicamente
        spiegato nella/e lezione/i precedente/i), mediante la proposta di esercizi
        e casi di studio il più possibile concreti, per la cui soluzione è necessario
        mettere a frutto quanto acquisito.


        Per questi motivi, in considerazione della tipologia di attività e dei metodi
        didattici adottati, la frequenza di questa attività formativa richiede la
        preventiva partecipazione di tutti gli studenti ai moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio, [https://elearning-sicurezza.unibo.it/]
        in modalità e-learning.


        L''uso di tecniche di Intelligenza Artificiale, in particolare per la generazione
        di codice e/o di esercitazioni individuali, è possibile esclusivamente a)
        durante lo studio individuale, al fine di sviluppare la capacità critica e
        di confronto; b) in specifici momenti o scenari prestabiliti e concordati
        con il docente, comunque sempre solo limitatamente a specifiche applicazioni
        e in specifici contesti.


        NON è invece assolutamente MAI consentito l''uso di tali tecniche durante
        le esercitazioni di laboratorio né durante l''esame finale: ogni utilizzo
        costituisce violazione dell’integrità accademica, con tutte le conseguenze
        del caso.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        si svolge sia in forma di autovalutazione dello studente, tramite le esercitazioni
        sistematicamente proposte in laboratorio durante il corso, sia al termine,
        sotto forma di prova d''esame.


        La prova d''esame è integrata con quella del modulo di laboratorio svolto
        in parallelo e consiste in una prova pratica svolta a computer, così da potersi
        avvalere degli strumenti su esso disponibili nonché di testi, dispense e manuali,
        che lo studente potrà liberamente portare con sé.


        Non è invece consentito l''accesso a Internet durante la prova: a tal fine,
        i laboratori saranno configurati in rete chiusa e saranno raggiungibili soltanto
        i siti autorizzati dal docente. Tutti i dispositivi personali capaci di connettività
        (smartphone, tablet, etc.) dovranno essere spenti e collocati sul banco in
        modo visibile dai sorveglianti. La violazione di questa regola costituisce
        violazione dell''integrità accademica e comporta l''immediato annullamento
        della prova, con allontanamento del trasgressore.


        Per lo stesso motivo, non è assolutamente consentito l''uso di tecniche di
        AI, anche generativa, per nessuna ragione durante l''esame. Infrangere questa
        regola costituisce violazione dell''integrità accademica e comporta l''immediato
        annullamento della prova con allontanamento del trasgressore.


        Coerentemente con l''obiettivo della prova, che è simulare ''nel piccolo''
        una sessione di lavoro di un ingegnere professionista di fronte a un problema
        concreto da risolvere in un tempo assegnato e non già costituire un mero esercizio
        di memoria, la prova consiste nella risoluzione di un problema applicativo
        di media complessità: il programma consegnato deve essere compilabile e superare
        almeno i 2/3 dei test forniti (diversamente, non sarà neppure valutato, con
        conseguente esito negativo dell''esame) e ragionevolmente funzionante. Il
        tema d''esame prevede da parte del candidato sia l''analisi della parte di
        applicazione fornita ("start kit"), sia lo sviluppo della parte richiesta:
        quest''ultima è divisa in sottoparti, ciascuna con un proprio punteggio dettagliato
        nel testo, in modo da supportare effettivamente il processo di auto-valutazione
        dello studente. NON è consentita alcuna forma di interazione con altri, né
        l''uso di AI in alcuna forma: causerà l''immediato annullamento del compito
        e l''allontanamento del trasgressore.


        Le regole d''esame dettagliate sono disponibili sulla home page del corso
        e sul sito VirtuaLE.


        L''esito positivo (almeno 18/30) della prova pratica di laboratorio è di norma
        direttamente verbalizzabile: la Commissione si riserva comunque di effettuare
        una prova orale ogni qual volta lo ritenga necessario. In tal caso, l''orale
        consiste principalmente - ma non esclusivamente - nella discussione della
        prova di laboratorio e in domande tese ad appurare la competenza dello studente
        nelle aree che abbiano evidenziato le maggiori lacune.


        Lo studente può comunque chiedere di affrontare una prova orale facoltativa:
        in tal caso, l''orale verte sull''intero programma del corso e il voto ottenuto
        è comunque verbalizzato.


        La richiesta di orale dev''essere fatta al docente entro un mese dalla prova
        di laboratorio: il corrispondente orale dovrà essere sostenuto entro quattro
        mesi dalla data della prova originale. Nel calcolo dei suddetti periodi non
        si computano i periodi festivi (Natale, Pasqua, agosto).


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.


        L''esito dell''esame è sempre verbalizzato, coerentemente con i regolamenti
        di Ateneo: è tuttavia concesso allo studente un tempo adeguato (almeno fino
        all''appello successivo) per decidere se accettare o rifiutare il voto.'
      Strumenti a supporto della didattica: 'Il sito VirtuaLE.unibo.it ospita tutto
        il materiale del corso, dalle diapositive proiettate e discusse a lezione
        ad altre dispense integrative, start kit, esercizi, annunci e forum di discussione.


        Un elenco esaustivo di testi di riferimento e manuali è consultabile sia sul
        sito Web, sia sulle diapositive, ed è frequentemente aggiornato. Il sito del
        corso, sul portale didattico del docente, fornisce ultime notizie e ospita
        l''archivio delle prove d''esame passate.


        I principali strumenti per la parte pratica sono il JDK (Java Development
        Kit) ed Eclipse, nella versione "IDE for Java developers"; sono altresì utilizzati
        strumenti online, sia per Java sia per altri linguaggi (Kotlin, Scala, C#).'
      Link ad altre eventuali informazioni: http://enricodenti.disi.unibo.it/
      Orario di ricevimento: 'Consulta il sito web di Enrico Denti (https://www.unibo.it/sitoweb/enrico.denti)


        Consulta il sito web di Ambra Molesini (https://www.unibo.it/sitoweb/ambra.molesini)'
      SDGs: 'Istruzione di qualità Parità di genere Lavoro dignitoso e crescita economica
        Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/543012
    title: 2025/2026 SISTEMI SOFTWARE A OGGETTI T (L-Z) — University of Bologna
    contents:
      Learning outcomes: 'The course aims to provide an in-depth concptual & practical
        knowedlge about the basics concepts, methodologies, technologies and tools
        for the design and development of medium-size applications according to the
        object-oriented paradigm.


        At the end, the student:


        - knows the methodological foundations for the analysis and development of
        object-oriented software applications

        - knows the corresponding techniques in depth both from the conceptual and
        practical viewpoints

        - is able to apply such knowledge and techniques to medium-size applications
        using the Java language

        - knows in depth the fundamental data structures and related algorithms

        - has the fundamental notions of functional programming in modern OO-blended
        languages (Java, Kotlin, Scala, C#)


        -is able to develop simple graphical user interfaces in JavaFX according to
        the event-driven programming pattern


        Throughout the course, while the Java language and platform are the main reference
        (and the only one required for assessment in the final examination), a multi-language
        approach is adopted when introducing concepts and constructs, presenting the
        Java approch in comparison with other object-oriented languages such as C#,
        Scala, Kotlin, so as to provide a broader view.'
      Course contents: 'Basic concepts of programming languages. Language families
        -- imperative, functional, logic, and object-oriented languages (5hrs).


        Introduction to Object-oriented software design in a multi-language perspective:
        singleton objects, abstract data types, classes and objects. Basic concepts
        of the Java language and architecture: classes, instances, object construction
        and deletion, inheritance, polymorphism. Abstract classes, interfaces, multiple
        inheritance. (30hrs + 12hrs lab)


        Lambda expressions and functional interfaces. (12hrs + 6hrs lab)


        Exceptions and exception handling. I/O streams and file access, object serialization.
        Data structures: lists, hashmaps, trees and related algorithms. (20hrs + 12hrs
        lab)


        Introduction functional programming in general and specifically to Java streams.
        (3rhs)


        Basic elements for GUI construction in Java on the JavaFX platform: event-driven
        programming, event listeners. (10hrs + 10hrs lab)'
      Readings/Bibliography: Please see the course's web portal and the course slides.
      Teaching methods: 'The course adopts an interactive approach, where problem
        presentation and discussion (via slides, donwloadable from the VirtuaLE.unibo.it
        site) are continuoulsy interleaved. Live examples and coding sessions are
        also exploited whenever necessary.


        Exercises are continuously interleaved with theoretical concepts and immediately
        shown ''on line''. MS Teams is also exploited for blended learning, and to
        support team work during lab hours.


        Generally speaking, the more theorectical module is strictly integrated with
        the lab module, which is mainly devoted to lab experiments and exercises,
        both in groups and as individual activities: each week, a task is assigned
        to be completed during the lab session. Its resolution tests the students''
        ability in the concepts explained in the previous weeks, according to the
        constructive, "how to", interactive learning approach.


        Due to the relevant lab work expected, this course requires the mandatory
        previous participation to both 1 & 2 modules about safety at work, as per
        the Italian law. Such modules can be attended on-line at [https://elearning-sicurezza.unibo.it/].


        AI techniques, especially for code generation or personal exercises, is allowed
        ONLY a) at home for personal study, in order to experiment pros and cons,
        and assess the student''s awareness; b) in specific moments or scenarios previously
        agreed upon with the teacher, and only for specific applications or experiments.


        Conversely, AI techniques are NEVER allowed during the lab sessions, nor are
        they allowed during the final examination in any way. Any such attempt constitutes
        a severe violation, leading to the cancellation of the exam. The student will
        be asked to leave the lab immediately and the exam will be considered as FAILED
        with no further discussion.'
      Assessment methods: 'Assessment is achieved both as self-evaluation in the lab
        sessions systematically proposed during the course, and as a final examination,
        which is integrated for both modules (theory & lab). The lab assignments during
        the course do not replace the final examination, nor do they contribute to
        the final evaluation, given their purpose of allowing students to self-evaluate.


        The final examination consists in the practical implementation of the solution
        to a practical medium-size problem in the lab: during the test, students can
        freely consult books, manuals, on-line slides and resources in order to provide
        a solution to the proposed application problem.


        Instead, no Internet access is allowed during the exam: labs will be configured
        as a closed network, and the only external sites accessible will be pre-selected
        by the teacher. As a consequence, all personal devices capable of Internet
        connection (smartphones, tablets, etc.) will have to be switched off and put
        on your desk in a visibile position. The violation of this rule leads to the
        immediate termination of the exam as FAILED and the student will be asked
        to leave the lab immediately.


        The test is divided in parts, with specific scores for each part, so as to
        effectively support student self-evaluation.


        The solution can be considered for correction and evaluation only if it is
        compiled by the Java compiler and passes at least 2/3 of the unit tests provided:
        if compilation fails or too many test fail, the exam is considered not passed,
        regardless of any other consideration. If it compiles, the proposed solution
        is evaluated, taking into account in particular its conformity to the problem
        specification. It is strongly prohibited to use any messaging app or tool,
        and to exploit AI tools: such behaviour will cause the nullification of the
        assignment, and the violator will be asked to leave immediately.


        For the same reason, AI techniques and generative tools are NEVER permitted
        during exams and will cause the immediate invalidation of the test.


        The detailed exam rules are available both on the course web page and on Unibo
        VirtuaLE site.


        Normally, a successful lab test (evaluation of 18/30 or above) can be officially
        registered as a passed exam with no need for an oral discussion. However,
        the teacher reserves the right to call the student to an oral discussion anytime:
        in such a case, the discussion is mainly (but not exclusively) devoted to
        explore more in depth the approach and solution of the lab test.


        The student can always ask to take an optional oral exam, in order to (hopefully)
        improve his/her evaluation. In this case, the discussion concerns any topic
        in the course, and the final result is always officially registered, independently
        of the final score.


        The exam result (either accepted od declined) is always officially registered
        , coherently with the university regulations. However, students are allowed
        a reasonable time - typically, at least until the next exam date - to decide
        whether to accept or decline the exam result.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        ) as soon as possible so that they can propose acceptable adjustments. The
        request for adaptation must be submitted in advance (at least 15 days before
        the exam date, even in advance if possible) to the lecturer, who will assess
        the appropriateness of the adjustments, taking into account the teaching objectives.'
      Teaching tools: 'The main tools are the JDK (Java Development Kit) and the Eclipse
        IDE for Java developers; programming editors can also be of help for quick
        tests, as well as online testing environments (both for Java and other languages
        like Kotlin, Scala, C#) on a personal basis.


        The course web pages provide updated information, while the VirtuaLE unibo
        site hosts all the course material (slides, exercises, start kits, extramaterial,
        suggested books).'
      Links to further information: http://enricodenti.disi.unibo.it/
      Office hours: 'See the website of Enrico Denti (https://www.unibo.it/sitoweb/enrico.denti/en)


        See the website of Ambra Molesini (https://www.unibo.it/sitoweb/ambra.molesini/en)'
      SDGs: 'Quality education Gender equality Decent work and economic growth Industry,
        innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
