syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/446615
    title: 2025/2026 MULTI-AGENT SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa, lo studente
        conosce le fondamenta concettuali e tecniche dei sistemi multi-agente, ed
        è in grado di modellare sistemi computazionali e sociotecnici complessi in
        termini di astrazioni orientate agli agenti; costruire sistemi computazionali
        e sociotecnici complessi usando tecnologie e metodologie orientate agli agenti;
        progettare e costruire sistemi intelligenti come sistemi multi-agente, integrando
        le tecniche e i metodi dell'intelligenza artificiale in modo efficace e metodologicamente
        corretto.
      Contenuti: '– Temi generali dei sistemi multi-agente

        I “primi motori” dei sistemi intelligenti • Gli agenti per i sistemi complessi
        distribuiti • Autonomia: concetti e definizioni • Artefatti per agenti: concetti
        e definizioni • Ragionamento automatico • Agenti razionali • Coordinazione
        di sistemi multi-agente • Sistemi auto-organizzanti • Coordinazione e autorganizzazione
        di ispirazione naturale • Simulazione e sistemi multi-agente: introduzione


        – Tecnologie per i sistemi multi-agente

        Agenti in JADE • Programmare agenti intenzionali: esercizi in Jason


        – Competenze scientifiche

        Fonti della letteratura scientifica sui sistemi intelligenti autonomi • Systematic
        Literature Review: una metodologia per le rassegne scientifiche'
      Testi/Bibliografia: La bibliografia è resa disponibile tramite il sito del corso.
      Metodi didattici: '- Lezioni teoriche in aula con uso di lucidi

        - Esempi discussi e costruiti in aula al computer dal docente e da esperti

        - Attività di laboratorio'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        dei contenuti del corso avviene tramite lo sviluppo di un progetto individuale
        o di gruppo, che si traduce nella produzione dei più opportuni artefatti,
        sia documentali sia software.


        La prova orale finale consiste nella discussione orale del progetto.


        La valutazione finale dipende dal livello e dall''estensione del progetto,
        dalla qualità degli artefatti documentali e software prodotti, e ovviamente
        dal livello di conoscenza dei temi del corso dimostrato durante la discussione
        finale.'
      Strumenti a supporto della didattica: '- Pagina web del docente (http://robertacalegari.apice.unibo.it/)

        - Pagina web del corso (http://apice.unibo.it/xwiki/bin/view/Course/Mas2526/)'
      Orario di ricevimento: Consulta il sito web di Roberta Calegari (https://www.unibo.it/sitoweb/roberta.calegari)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/446615
    title: 2025/2026 Multi-Agent Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student understands the conceptual
        and technical foundation of multi-agent systems, and is able to model complex
        computational and socio-technical systems in terms of agent-oriented abstractions;
        build complex computational and socio-technical systems using agent-oriented
        technologies and methodologies; design and engineer intelligent systems as
        multi-agent systems, by integrating techniques and methods from artificial
        intelligence in an effective and methodologically-sound way.
      Course contents: '– General Issues of Multi-Agent Systems

        Drivers for Intelligent Systems • Agents for Complex Distributed Systems •
        On Autonomy. Concepts & Definitions • Artefacts for Agents. Function and Use
        in MAS • Automated Reasoning • Reasoning Agents • Coordination of Multi-Agent
        Systems • Self-Organising Systems • Nature-Inspired Coordination & Self-Organisation
        • Simulation & Multi-Agent Systems: An Introduction


        – Technologies for Multi-Agent Systems

        Agents in JADE • Programming Intentional Agents: Exercises in Jason


        – Scientific Competences

        Sources of Scientific Literature for Intelligent & Autonomous Systems • Systematic
        Literature Review. A Methodology for Scientific Surveys'
      Readings/Bibliography: The bibliography is made available through the course
        web site.
      Teaching methods: '- Lessons with slides

        - Examples discussed and built by the teacher and by experts from the field

        - Lab activity'
      Assessment methods: 'The assessment of the learning achievements is based on
        the development of an individual/group project, which results in the production
        of suitable artefacts, either documental or software.


        The final test consists in the oral discussion of the project.


        Final evaluation depends on the level and extent of the project, the quality
        of the document and software artefacts produced, and the degree of knowledge
        on the course''s subjects demonstrated in the final discussion.'
      Teaching tools: '- Web page of the professor (http://robertacalegari.apice.unibo.it/)

        - Web page of the course (http://apice.unibo.it/xwiki/bin/view/Course/Mas2526/)'
      Office hours: See the website of Roberta Calegari (https://www.unibo.it/sitoweb/roberta.calegari/en)
