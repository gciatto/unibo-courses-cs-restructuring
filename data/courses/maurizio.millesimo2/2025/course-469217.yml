syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/469217
    title: 2025/2026 LABORATORIO DI ELETTRONICA DI POTENZA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al temine del corso lo studente conosce
        ed è in grado di utilizzare strumenti di analisi circuitale e di simulazione
        numerica per l''analisi e il progetto di circuiti e sistemi elettronici di
        potenza per la conversione dell''energia.

        È in grado di realizzare il progetto di massima di un impianto fotovoltaico
        di piccole dimensioni.'
      Contenuti: "Introduzione ai sistemi elettronici di potenza\n\n- Sistemi di conversione\
        \ dell’energia elettrica\n- Principio di funzionamento dei regolatori lineari\
        \ ed a commutazione (switching)\n- Tipi di convertitori\n\nInterruttori di\
        \ potenza a semiconduttore\n\n- Diodo di potenza: caratteristiche, tipologie\
        \ e applicazioni\n- Interruttore controllato: caratteristiche ideali e reali\n\
        - MOSFET di potenza\n\nConcetti fondamentali sui circuiti elettrici\n\n- Definizione\
        \ di regime stazionario\n- Potenza media e corrente efficace\n- Comportamento\
        \ di un induttore e di un condensatore\n- Valore medio di tensione e corrente\
        \ a regime\n\nRaddrizzatori a diodi a frequenza di linea\n\n- Concetti fondamentali\
        \ sui raddrizzatori\n- Raddrizzatore a singola semionda\n- Raddrizzatore a\
        \ doppia semionda (ponte di diodi)\n\nConvertitori DC-DC a commutazione\n\n\
        - Convertitore abbassatore (Step-down o Buck):\n  \n  - modalità di conduzione\
        \ in continua, boundary e discontinua\n  - Casi a tensione costante in ingresso\
        \ o in uscita\n  - Ripple della tensione di uscita\n- Principio di funzionamento\
        \ PWM\n- Convertitore elevatore (Step-up o Boost):\n  \n  - modalità di conduzione\
        \ in continua, boundary e discontinua\n  - Ripple della tensione di uscita\n\
        \nCircuiti Snubber\n\n- Funzionamento e tipologie di circuiti snubber\n- Implementazione\
        \ Snubber RC\n\nInverter DC-AC a commutazione\n\n- Concetti fondamentali\n\
        - Commutazione con modulazione a larghezza d'impulso\n- Inverter Half-Bridge\n\
        - Inverter Full-Bridge\n\nIntroduzione al simulatore circuitale LTspice\n\n\
        Attività in laboratorio:\n\n- Desing e Simulatione, attraverso LTspice, di\
        \ convertitori di potenza AC-DC, DC-DC e DC-AC\n- Test sperimentali di convertitori\
        \ DC-DC Buck e Boost"
      Testi/Bibliografia: '1. N. Mohan, T. M. Undeland, W. P. Robbins, “Power Electronics:
        Converters, Applications, and Design”, Third Edition, John Wiley & Sons, Inc.
        ISBN: 978-0-471-22693-2.

        2. Disponibile anche in versione italiana: “Elettronica di Potenza: Convertitori
        e Applicazioni”, Hoepli, ISBN: 9788820334284.'
      Metodi didattici: 'Lezioni teoriche in aula (40%) ed esercitazioni in laboratorio
        (60%) relative alla simulazione e testing di circuiti di potenza.


        NOTA: Per poter seguire le esercitazioni in laboratorio, è necessario che
        tutti gli studenti abbiano completato il corso di formazione sulla sicurezza
        e salute nei luoghi di studio, relativo ai moduli 1 e 2, in modalità e-learning
        [https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio].'
      Modalità di verifica e valutazione dell'apprendimento: La verifica dell'apprendimento
        avviene mediante una prova orale, e consiste in una serie di domande volte
        ad accertare la conoscenza degli argomenti e degli aspetti progettuali presentati
        a lezione e trattati durante le esercitazioni di laboratorio.
      Strumenti a supporto della didattica: Slide rese disponibili su virtuale.unibo.it
        come supporto alle lezioni svolte alla lavagna.
      Orario di ricevimento: Consulta il sito web di Andrea Natale Tallarico (https://www.unibo.it/sitoweb/a.tallarico)
      SDGs: 'Energia pulita e accessibile Città e comunità sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/469217
    title: 2025/2026 Laboratory on Power Electronics — University of Bologna
    contents:
      Learning outcomes: The student will acquire the basic skills on power electronic
        systems used in sectors such as renewable energy, automotive, etc. He/She
        knows and is able to design and simulate, using LTspice, basic circuits for
        AC-DC, DC-DC and DC-AC conversion.
      Course contents: "Introduction to Power Electronic Systems\n\n- Power Electronics\
        \ versus Linear Electronics\n- Scope and Applications\n- Classification of\
        \ power converters\n\nPower Semiconductor Switches\n\n- Diodes\n- Desired\
        \ Characteristics in Controllable Switches\n- MOSFET\n\nBasic Electrical Circuit\
        \ Concepts\n\n- Definition of Steady State\n- Average Power and rms Current\n\
        - Inductor and Capacitor Response\n- Current and Voltage Avarage in Steady\
        \ State\n\nLine-Frequency Diode Rectifiers\n\n- Basic Rectifier concepts\n\
        - Single-phase diode bridge rectifiers\n\nDC-DC Switch-Mode Converters\n\n\
        - Step-down (Buck) Converter:\n  \n  - Continuous, Boundary and Discontinuous\
        \ Conduction Mode\n  - Output Voltage Ripple\n- Pulse-Width Modulator (PWM)\n\
        - Step-up (Boost) Converter:\n  \n  - Continuous, Boundary and Discontinuous\
        \ Conduction Mode\n  - Output Voltage Ripple\n\nSnubber Cicuits\n\n- Function\
        \ and types of Snubber circuits\n- Implementation of a RC snubber\n\nSwitch-mode\
        \ DC-AC Inverters\n\n- Basic concepts of Switch-mode inverters\n- Single-phase\
        \ inverters\n\nIntroduction to LTspice Circuit Simulator\n\nLaboratory Activities:\n\
        \n- Desing and Simulation, using LTspice, of AC-DC, DC-DC, amd DC-AC power\
        \ converters\n- Experimental tests of Buck and Boost DC/DC converters"
      Readings/Bibliography: 'N. Mohan, T. M. Undeland, W. P. Robbins, “Power Electronics:
        Converters, Applications, and Design”, Third Edition, John Wiley & Sons, Inc.
        ISBN: 978-0-471-22693-2.'
      Teaching methods: 'Theoretical lessons (40%) and laboratory activities (60%)
        related to simulation and testing of Ac-DC, DC-DC and DC-AC power converters.


        NOTE: In order to attend the laboratory activities, all students must have
        completed the safety and health training course for study environments, specifically
        modules 1 and 2, in e-learning mode [https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio]'
      Assessment methods: Oral exam, which consists in a series of questions aimed
        at ascertaining the knowledge of the topics and project aspects presented
        in class and treated during the laboratory activities.
      Teaching tools: Slides, Circuit Simulator (LTspice), Instrumentation for experimental
        characterization of DC-DC power converters.
      Office hours: See the website of Andrea Natale Tallarico (https://www.unibo.it/sitoweb/a.tallarico/en)
      SDGs: 'Affordable and clean energy Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
