syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498809
    title: 2025/2026 INGEGNERIA DEI SISTEMI WEB — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente conosce
        i principali stack per il Web LAMP e MEAN. E’ in grado di sviluppare applicazioni
        e servizi Web, client side e server side. Conosce e sa utilizzare in modo
        appropriato i principali framework e content management system per lo sviluppo
        dei siti Web. Conosce le principali differenze tra le tipologie di applicazioni
        per device mobili: web app, app ibride e app native.'
      Contenuti: '- Confronto tra le differenti architetture e solution stack per
        il Web.

        - Solution stack MEAN, con introduzione di NodeJS.

        - Introduzione ai Build tools

        - SuperSet di Linguaggi per il Web: TypeScript, SCSS e SASS.

        - Solution stack LAMP, con focus su PHP

        - Principali differenze tra le tipologie di applicazioni per device mobili:
        web app, app ibride e app native'
      Testi/Bibliografia: Le slide e il materiale aggiuntivo saranno rese disponibili
        su Virtuale.
      Metodi didattici: 'Lezioni frontali ed esercitazioni in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio [https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        (http://https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute)]
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame è diviso in
        due parti: la presentazione di gruppo del progetto e una prova orale individuale.'
      Strumenti a supporto della didattica: Le slide e il materiale aggiuntivo saranno
        rese disponibili su Virtuale.
      Orario di ricevimento: Consulta il sito web di Chiara Ceccarini (https://www.unibo.it/sitoweb/chiara.ceccarini6)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498809
    title: 2025/2026 Web Systems Engineering — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student is familiar with the
        main web stacks, LAMP and MEAN. They are able to develop web applications
        and services, both client-side and server-side. They know and can appropriately
        use the main frameworks and content management systems for web development.
        They also understand the key differences between the main types of mobile
        device applications: web apps, hybrid apps, and native apps.'
      Course contents: '- Comparison of different Web Architectures and Solution Stacks

        - MEAN stack solution, with an introduction to Node.js

        - Introduction to Build Tools

        - Supersets of Web Languages: TypeScript, SCSS, and SASS

        - LAMP Stack Solution, with a focus on PHP

        - Key differences between the main types of mobile applications: Web Apps,
        Hybrid Apps, and Native Apps'
      Readings/Bibliography: The slides and additional materials will be made available
        on Virtuale.
      Teaching methods: 'Lectures and laboratory exercises.


        Given the type of activities and the teaching methods adopted, attendance
        of this course requires all students to have previously completed Modules
        1 and 2 on safety in study environments [https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        (http://https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute)]
        via e-learning.'
      Assessment methods: 'The exam is divided into two parts: a group project presentation
        and an individual oral examination.'
      Teaching tools: All slides and supplementary materials will be accessible through
        the Virtuale platform.
      Office hours: See the website of Chiara Ceccarini (https://www.unibo.it/sitoweb/chiara.ceccarini6/en)
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
