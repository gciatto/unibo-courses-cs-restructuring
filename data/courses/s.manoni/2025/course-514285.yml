  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514285
    title: 2025/2026 ARCHITETTURA DEI CALCOLATORI ELETTRONICI M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrare sistemi a microprocessori a parallelismo
        multibyte, sistemi di memorie multibyte, agenti hardware intelligenti, schede
        reali basate su microprocessore x86, architetture avanzate, tecnologie cache,
        sistemi impaginati e segmentati, famiglia Pentium, pipelinining, accesso burst
        e temporizzazioni, cache di secondo livello e sistemi multiprocessore, esecuzione
        out-of-order e tecnologie implementative, i processori Pentium II, III e IV
        e i chip di supporto, interfacciamento delle memorie dinamiche.
      Contenuti: 'Obiettivo dell''insegnamento è aiutare lo studente a impadronirsi
        di un quadro di riferimento che gli consenta di affrontare con consapevolezza
        la progettazione digitale a diversi livelli di astrazione (dal componente
        al sistema, sia esso su singolo chip o su scheda).


        Il modulo si colloca a valle degli insegnamenti di reti logiche, calcolatori
        elettronici, e fondamenti di informatica impartiti nelle lauree triennali
        dell''Ingegneria dell''Informazione dell''Università di Bologna.

        L''insegnamento presuppone acquisite le conoscenze elementari di architettura
        dell''hardware dei calcolatori elettronici (Set di istruzioni Registro-Registro
        e Memoria-Registro, datapath e unità di controllo, pipeline a 5 stadi per
        set di istruzioni R-R (RISC), memorie, gestione delle interfacce di ingresso/uscita
        a interrupt e a controllo di programma, driver), e intende trasferire conoscenze
        più avanzate sull''architettura, sui principi di funzionamento, sulle prestazioni
        e sulla evoluzione dei calcolatori ad alta integrazione e larga diffusione.

        In particolare il corso tratta i seguenti argomenti:


        - parallelismo a livello di istruzione, modelli di esecuzione bloccanti e
        non bloccanti

        - set di istruzioni per architetture RISC-V

        - gerarchia delle memorie

        - parallelismo a livello dati, estensioni vettoriali

        - sistemi multi/many core

        - estensioni architetturali per la sicurezza, gestione dei consumi.


        Il corso si sofferma inoltre su alcune strutture che trovano impiego diffuso
        all''interno dei calcolatori ad alte prestazioni.'
      Testi/Bibliografia: 'J. L. Hennessy, D. A. Patterson, Computer Architecture:
        a quantitative approach, 6° edizione, Morgan Kaufmann

        (https://www.elsevier.com/books/computer-architecture/hennessy/978-0-12-811905-1)


        David J. Greaves, Modern System-on-Chip Design on Arm, ARM Education Media
        (https://www.arm.com/resources/education/books/modern-soc)


        David A Patterson John L Hennessy, Struttura e progetto dei calcolatori. Progettare
        con RISC-V, (https://www.zanichelli.it/ricerca/prodotti/struttura-e-progetto-dei-calcolatori-edizione-risc?hl=risc-v)'
      Metodi didattici: 'La didattica si basa sulla illustrazione e discussione interattiva
        in aula delle slides disponibili pubblicamente sulla piattaforma (IOL).


        In caso di emergenza sanitaria le lezioni potranno essere affiancate o sostituite
        da lezioni interattive online sulla piattaforma Microsoft Teams.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        viene effettuata sul risultato di una prova scritta volta a verificare la
        preparazione dello studente sia sulla progettazione sia sull''architettura
        dell''hardware dei calcolatori.


        E'' previsto un colloquio orale facoltativo per gli studenti che hanno superato
        lo scritto. Il colloquio orale è volto a verificare la capacità dello studente
        di valutare l''efficacia e le implicazioni delle diverse tecniche architetturali
        trattate a lezioni oltre a saperne discutere il funzionamento. Qualora precedentemente
        concordato con il docente lo studente e/o piccoli gruppi di studenti possono
        presentare elaborati di approfondimento degli argomenti trattati a lezioni.


        La formazione dell''esito finale è composta per 3/4 dalla prova scritta e
        per 1/4 dal colloquio orale facoltativo.'
      Strumenti a supporto della didattica: In caso di emergenza sanitaria le lezioni
        potranno essere affiancate o sostituite da lezioni interattive online sulla
        piattaforma Microsoft Teams.
      Orario di ricevimento: Consulta il sito web di Andrea Bartolini (https://www.unibo.it/sitoweb/a.bartolini)
      SDGs: 'Imprese innovazione e infrastrutture Consumo e produzione responsabili
        Lotta contro il cambiamento climatico


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/514285
    title: 2025/2026 COMPUTER ARCHITECTURES M — University of Bologna
    contents:
      Learning outcomes: "Focus is on quantitative aspects of computer architecture.\n\
        Expected outcome is understanding of:\n\n- instruction level parallelism and\
        \ latency tolerance\n- memory hierarchy\n- Uniform Memory Access (UMA) architectures\n\
        - protection and task management\n- architecture impact on power and performance\
        \ at processor and system level\n  Within the course the student will practice\
        \ abstraction as the most effective method to handle the complexity of modern\
        \ computer architectures. The final test verifies the ability to apply methods\
        \ and concepts offered by the course."
      Course contents: "Processor Architecture:\n\n- Instruction set architecture\
        \ for multitasking protected systems (Intel IA32 architecture)\n- Instruction\
        \ level parallelism; dependencies; hazards; hazards avoidance\n- superscalar\
        \ architectures; superpipelining and underpipelining; non blocking architectures;\
        \ out of order execution (Tomasulo approach); speculative execution;\n- Introduction\
        \ to simultaneous multithreading, logical processors, multicore architectures\
        \ and virtualisation\n  Memory Hierarchy\n- Goals, reference model and performance\
        \ parameters\n- memory hierarchy in the Intel IA32 architecture: segmentation,\
        \ virtual memory, main memory and caches\n- address mapping, write policies,\
        \ replacement policies; implementation techniques and performance analysis\n\
        - the MESI protocol for memory coherence in shared memory multiprocessor architecture\
        \ (UMA architectures)\n  System Architecture\n- Interleaved memory access\
        \ in multibyte data bus systems\n- Uniform Memory Access (UMA) architectures,\
        \ and introduction to NUMA multicore based architectures\n- Bus hierarchy\
        \ and bus protocols\n- Multimaster systems with DMA based I/O: hardware/software\
        \ power/performance perspective"
      Readings/Bibliography: 'J. L. Hennessy, D. A. Patterson, Computer Architecture:
        a quantitative approach*, Sixth Edition*, Morgan Kaufmann (https://www.elsevier.com/books/computer-architecture/hennessy/978-0-12-811905-1)


        David J. Greaves, Modern System-on-Chip Design on Arm, ARM Education Media
        (https://www.arm.com/resources/education/books/modern-soc)'
      Teaching methods: 'Slides stored in the platform (IOL) are presented and interactively
        discussed in the classroom.


        Classroom lectures may be complemented or replaced by online interactive lectures.'
      Assessment methods: Assessment shall be based on the outcome of a written test
        and an optional oral exam.
      Teaching tools: In case of sanitary emergencies classroom lectures might be
        complemented or replaced by online interactive lectures on Microsoft Teams.
      Office hours: See the website of Andrea Bartolini (https://www.unibo.it/sitoweb/a.bartolini/en)
      SDGs: 'Industry, innovation and infrastructure Responsible consumption and production
        Climate Action


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
