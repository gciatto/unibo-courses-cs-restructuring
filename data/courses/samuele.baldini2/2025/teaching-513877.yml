        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/513877
    title: 2025/2026 Foundations of Informatics T — University of Bologna
    contents:
      Learning outcomes: The aim of the course is to give the student a general overview
        about computers and scientific computing. After this introductory part, the
        course is focused on the C++ language and on numerical methods both at an
        elementary level.
      Course contents: "I. The Linux operating system:\n\n- preliminary notions: shell\
        \ use; basic commands; filesystem and partitions; operating system installation;\n\
        \nII. Introduction to C++\n\n- Fundamentals: variable and arithmetic expressions;\
        \ for loops; if statements; constants: input and output; arrays; functions;\
        \ passing arguments by reference; external variables and scope.\n- Pointers\
        \ and arrays: pointers and addresses; pointers and function arguments; address\
        \ arithmetic; pointers and arrays; dynamic memory allocation; pointer arrays;\
        \ pointers to pointers; multidimensional arrays; command line arguments;function\
        \ pointers; void pointers.\n- Classes: basics of classes; operator overloading;\
        \ self referential classes.\n- Header files and libraries: header files; conditional\
        \ inclusion; compiling multiple files; the Makefile.\n- Toward numerical applications:\
        \ sources of errors: absolute, relative and percentage errors; numerical cancellation\
        \ and error propagation;\n  machine precision and significant digits.\n\n\
        III. Introduction to numerical methods\n\n- Function approximation: Lagrangian\
        \ interpolation, Taylor polynomial and series.\n- Finite difference methods:\
        \ approximation of the first, second and n-th derivative with backward and\
        \ forward finite differences, with first and second order truncation error;\
        \ approximation of the first, second and n-th derivative with centered finite\
        \ differences. ODE of the second order.\n- Root-finding algorithms: solution\
        \ of linear system with Gauss method. Non linear equation: bisection and Newton-Raphson's\
        \ (tangent) method. The secant method and Regula Falsi method.\n- Numerical\
        \ integration: rectangle rule, trapezoidal rule, Simpson's formula. Gauss\
        \ quadrature. Local and global truncation error and order of convergence."
      Readings/Bibliography: 'Instructor lecture notes and lab tutorial (on AMS campus
        https://virtuale.unibo.it/ )


        Additional books:

        Aguilar, L. J., & Dragoni, A. F. (2021). Fondamenti di programmazione in C++:
        Algoritmi, strutture dati e oggetti. Milano: McGraw-Hill.


        Shtern, V. (2001). Core C [plus plus]: A software engineering approach. Upper
        Saddle River, N.J: Prentice Hall PTR.


        Overland, B. (2001). C++ in plain English. Foster, City, CA: I.D.G. Books.


        Ceri, Mandrioli, Sbattella. Informatica: arte e mestiere. McGraw-Hill

        Monegato. Fondamenti di calcolo numerico. Levrotto & Bella

        Epperson. Introduzione all''analisi numerica. McGraw-Hil'
      Teaching methods: 'Class lectures and laboratory tutorials with Personal Computers.


        Tutor assistance'
      Assessment methods: 'Two written examinations.


        The grade is distributed as follows:


        - 1. Programming written C++ language test in lab with linux operating system:
        score 0-16 ( sufficient if test score> 9)

        - 1. Programming written numerical analysis test in lab with linux operating
        system: score 0-16 (sufficient if test score> 9)


        The total sum of the scores that are sufficient forms the final grade. Laude
        is given if one exceeds the score of 30.


        In accordance with the University Code of Ethics and Conduct, students are
        reminded to act with the utmost integrity. Any activity aimed at improperly
        influencing the outcome of examinations is prohibited (e.g., cheating, plagiarism,
        accessing online course materials, or using unauthorized AI tools). It is
        specifically noted that merely possessing unauthorized devices or materials
        during an exam will result in the immediate invalidation of the test and reporting
        to the relevant offices. Any behavior that violates this prohibition may lead
        to disciplinary proceedings or reports to the appropriate authorities, where
        criminally relevant; in the latter case, there is a risk that the students
        involved may face criminal prosecution.'
      Teaching tools: Class lectures and computing laboratory tutorials
