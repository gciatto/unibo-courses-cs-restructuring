syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/421624
    title: 2025/2026 VISIONE ARTIFICIALE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le principali aree applicative della visione artificiale e gli algoritmi di
        base per l’analisi di immagini e il riconoscimento di oggetti.
      Contenuti: '- Strumenti di base per l''elaborazione delle immagini (modelli
        di colore, convoluzione, topologia digitale e morfologia matematica)

        - Tecniche per individuare e segmentare oggetti nelle immagini

        - Metodi per il rilevamento e l''inseguimento di oggetti nei video

        - Riconoscimento di oggetti da immagini e video'
      Testi/Bibliografia: 'Richard Szeliski, Computer Vision: Algorithms and Applications,
        2nd ed., 2022 (il PDF può essere richiesto qui (http://szeliski.org/book))'
      Metodi didattici: '- Lezioni frontali

        - Esercitazioni guidate in laboratorio'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso una prova scritta della durata di 90 minuti, durante la
        quale non è ammesso l''uso di libri, appunti, calcolatrici, o supporti elettronici.


        La prova d''esame mira a verificare il raggiungimento dei seguenti obiettivi
        didattici:


        1. conoscenza approfondita degli algoritmi e delle tecniche illustrate durante
        il corso;

        2. capacità di implementare tali algoritmi e di applicarli all''interno di
        programmi che elaborino immagini e video;

        3. comprensione del funzionamento di base delle librerie software utilizzate
        durante le esercitazioni in laboratorio.


        A tale fine, la prova scritta si compone sia di domande teoriche che di esercizi
        pratici, nei quali si chiede allo studente di implementare algoritmi o porzioni
        di algoritmi, sfruttando eventualmente alcune funzionalità delle librerie
        software utilizzate durante le esercitazioni in laboratorio. Il voto assegnato
        alla prova è determinato dalla somma del punteggio ottenuto complessivamente
        nelle domande teoriche (che può variare fra 0 e 15) e quello ottenuto complessivamente
        negli esercizi pratici (che può variare fra 0 e 17); se il valore è superiore
        a 30, si assegna 30 e Lode.


        La frequentazione delle lezioni (incluse quelle di laboratorio) non è obbligatoria
        e non concorre al voto finale, che è unicamente determinato dalla prova scritta.'
      Strumenti a supporto della didattica: Dispense a cura del docente
      Orario di ricevimento: Consulta il sito web di Raffaele Cappelli (https://www.unibo.it/sitoweb/raffaele.cappelli)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/421624
    title: 2025/2026 Computer Vision — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the main application
        areas of computer vision and the basic algorithms for image analysis and object
        recognition.
      Course contents: '- Basic image processing tools (color models, convolution,
        digital topology and mathematical morphology

        - Techniques for object detection and segmentation from images

        - Video object detection and tracking

        - Object recognition from images and videos'
      Readings/Bibliography: 'Richard Szeliski, Computer Vision: Algorithms and Applications,
        2nd ed., 2022'
      Teaching methods: '- Lectures

        - Guided exercises at the PC'
      Assessment methods: 'Assessment is carried out through a 90-minute written examination,
        during which the use of books, notes, calculators, or electronic devices is
        not permitted.


        The exam aims to verify the achievement of the following learning objectives:


        1. In-depth knowledge of the algorithms and techniques illustrated during
        the course;

        2. Ability to implement these algorithms and apply them within programs that
        process images and videos;Understanding of the basic functioning of the software
        libraries used during laboratory exercises.


        To this end, the written exam consists of both theoretical questions and practical
        exercises, in which the student is asked to implement algorithms or portions
        of algorithms, potentially utilizing some functionalities of the software
        libraries used during the laboratory exercises. The grade assigned to the
        exam is determined by the sum of the total score obtained in the theoretical
        questions (which can range between 0 and 15) and the total score obtained
        in the practical exercises (which can range between 0 and 17); if the value
        is greater than 30, "30 e Lode" is assigned.


        Attendance of the lessons (including laboratory sessions) is not mandatory
        and does not contribute to the final grade, which is solely determined by
        the written examination.'
      Teaching tools: Lecture notes
      Office hours: See the website of Raffaele Cappelli (https://www.unibo.it/sitoweb/raffaele.cappelli/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
