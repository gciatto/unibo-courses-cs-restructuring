  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/485189
    title: 2025/2026 ALGORITMI E STRUTTURE DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente: - conosce
        gli algoritmi per risolvere problemi computazionali di base su strutture di
        dati elementari; - conosce le tecniche di base per calcolare il costo computazionale
        degli algoritmi; - conosce le classi di complessità computazionale P, NP e
        NP-hard; - è in grado di progettare algoritmi efficienti per risolvere semplici
        problemi computazionali; - è in grado di stimare in ordine di grandezza il
        costo computazionale degli algoritmi; - è in grado di analizzare la complessità
        computazionale di problemi computazionali di base; - è in grado di dare una
        valutazione circa l''efficienza e la correttezza di un algoritmo; - è capace
        di elaborare e di presentare un progetto per la risoluzione di problemi computazionali
        di base'
      Contenuti: 'Progettazione e analisi di algoritmi. Complessita'' computazionale.
        Ordini di grandezza. Equazioni di ricorrenza. Algoritmi di ordinamento: SelectionSort,
        InsertionSort, MergeSort, QuickSort, CountingSort, RadixSort. Strutture dati
        elementari: liste, pile e code. Alberi. Visite di alberi (pre-ordine, in-ordine,
        post-ordine, in ampiezza). Alberi binari di ricerca e alberi binari bilanciati
        di ricerca. Dizionari. Tabelle hash. Heaps: HeapSort e Code con priorita''.
        Strutture Union-Find. Tecniche di progettazione: divide-et-impera, greedy,
        programmazione dinamica. Grafi. Visite DFS e BFS. Algoritmi su grafi: Minimum
        Spanning Tree (Prim, Kruskal), Cammini Minimi (Bellman-Ford, Dijkstra, Floyd-Warshall).
        Complessita''. Le classi P ed NP. NP-completezza.


        Il corso include inoltre lezioni pratiche durante le quale si implementano
        e usano le strutture di dati presentate durante le lezioni di teoria. Si introdurrà
        inoltre il paradigma di programmazione Object-Oriented e alcune nozioni base
        sul linguaggio Java.'
      Testi/Bibliografia: 'Libro di testo:


        Camil Demetrescu, Irene Finocchi, Giuseppe F. Italiano

        Algoritmi e strutture dati

        McGraw-Hill - terza edizione. 2025.


        Libri consigliati:


        A.A. Bertossi & A. Montresor, Algoritmi e Strutture di Dati, Citta'' Studi
        Edizioni, Torino. Terza edizione. 2014.


        Thomas H. Cormen, Charles E. Leiserson, Ronald L. Rivest, Clifford Stein

        Introduzione agli algoritmi e strutture dati

        McGraw-Hill - quarta edizione. 2023.'
      Metodi didattici: Il corso si svolge nel secondo semestre ed è strutturato in
        lezioni frontali in aula, comprendenti lezioni ed esercitazioni. Vengono presentati
        innanzitutto gli aspetti teorici degli argomenti trattati. In particolare,
        dopo aver introdotto le nozioni di base, vengono presentate le principali
        strutture di dati e i piu' comuni problemi computazionali. Per tali problemi,
        sono progettati algoritmi risolutivi, evidenziando le varie tecniche di progettazione
        impiegate. Per gli algoritmi proposti, sono analizzate la loro correttezza
        e la loro complessita' computazionale in tempo (e in alcuni casi anche in
        spazio). Successivamente ampio spazio viene dedicato alla risoluzione di esercizi.
        Si svolgeranno inoltre lezioni di laboratorio in cui gli studenti saranno
        coinvolti nella progettazione e implementazione delle strutture dati presentate
        durante il corso.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso una prova scritta finale di 2 ore preceduta dalla consegna
        facoltativa di un progetto di programmazione Java da svolgersi singolarmente.


        Durante la prova scritta non è ammesso l''uso di libri, appunti, calcolatrici,
        supporti elettronici. La prova scritta consiste di 4 quesiti, alcuni dei quali
        sono esercizi che mirano ad accertare le abilità acquisite nel risolvere problemi
        computazionali tramite la progettazione di algoritmi efficienti, mentre altri
        sono domande aperte che mirano a verificare l''acquisizione delle conoscenze
        previste dal programma del corso.


        Il progetto Java viene proposto a completamento delle attività laboratoriali
        e ha l''obiettivo di verificare che lo studente abbia acquisito la capacità
        di implementare in Java algoritmi descritti in pseudo-codice, possibilmente
        utilizzando appropriate strutture dati ausiliarie.


        La valutazione del progetto Java consta di un voto compreso fra 0 e 3, che
        viene aggiunto alla valutazioni in 30-esimi dello scritto.'
      Strumenti a supporto della didattica: Videoproiettore e calcolatore per le attività
        laboratoriali.
      Orario di ricevimento: 'Consulta il sito web di Gianluigi Zavattaro (https://www.unibo.it/sitoweb/gianluigi.zavattaro)


