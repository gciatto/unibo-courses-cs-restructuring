      Metodi didattici: Lectures and hands-on practical sessions in the lab. Lectures
        will be face-to-face, yet the whole course will be recorded and access to
        recording may be granted to students upon request, in case specific needs
        arise.
      Modalità di verifica e valutazione dell'apprendimento: 'The exam consists of
        a mandatory written test and an optional project work, with final grading
        given by the sum of the two scores capped at 30/30: the written test assesses
        theoretical knowledge, is mandatory, and contributes up to 27/30, while the
        optional project work assesses practical skills and contributes up to 6/30.


        About the written test


        The written test is a closed-book, in-presence exam with open-ended questions
        concerning the topics of the course, no internet access, a fixed time limit,
        and strict anti-cheating rules; it is offered six times per academic year,
        roughly four in the summer session and two in the winter session, with exact
        dates and locations published on AlmaEsami, where registration is mandatory,
        non-negotiable, and subject to limited seating. The exam is normally conducted
        on university computers, with paper as a fallback, in case of technical issues.


        Unsuccessful or unsatisfactory attempts can be retried in later calls, and
        completing an attempt without renouncing overwrites any previous result.


        Once a passing grade of at least 18/30 is obtained in the written test, students
        may either accept and finalize the exam without the project or proceed with
        the project and postpone finalization.


        Remark: the list of potential questions for the written exam is provided as
        part of the slides of the course.


        About the project work


        The project work, although optional, is strongly recommended and may be carried
        out individually or in stable groups of up to three students declared in advance;
        it involves developing a software artifact, writing an English report covering
        the full software engineering process taught in the course, and presenting
        and discussing the work with the teacher in an oral session arranged by appointment,
        with evaluation based on both process and outcome.


        Remark: further rules apply for tracking/negotiating project work activities.
        Details will be provided in the slides of the course.


        Template for project report: https://github.com/unibo-dtm-se/template-project-work


        Template for software project: https://github.com/unibo-dtm-se/template-python-project'
