  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/378217
    title: 2025/2026 BASI DI DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        le nozioni fondamentali della tecnologia delle basi di dati relazionali e
        gli strumenti metodologici necessari per il suo impiego nella progettazione
        di un sistema informativo.
      Contenuti: '- Descrizione ad alto livello dei principali componenti di un RDBMS:
        Query Optimizer, Transaction Manager, Scheduler, Recovery Manager, Cache Manager,
        Storage Manager, Access Methods Manager.

        - Modelli dei dati: modelli concettuali vs. modelli logici, il modello relazionale.

        - Progettazione concettuale: cenni sulle metodologie per l''analisi dei requisiti;
        il modello concettuale Entity-Relationship (E/R); progettazione concettuale
        dei dati con schemi E/R.

        - Progettazione logica: stima del carico di lavoro, ristrutturazione dello
        schema, traduzione di entità e associazioni.

        - Forme normali: dipendenze funzionali, 1NF, 2NF, 3NF, BCNF.

        - Algebra relazionale: operatori di base e derivati.

        - Il linguaggio SQL: istruzioni DDL, DML e DCL.

        - Le transazioni: proprietà ACID, gestione della concorrenza, protocolli.

        - Organizzazioni dei dati e relativi metodi di gestione: organizzazioni sequenziale
        e ad accesso diretto, indici primari e secondari, B-tree, B*- tree e B+-tree.

        - Sviluppo di applicazioni database: panoramica delle diverse modalità di
        accesso ai dati. Esempi d''uso in Java e C#.

        - Descrizione sintetica delle principali architetture client-server. Cenni
        su DDBMS, Cloud database e sull’evoluzione delle architetture**.**

        - Trend di evoluzione delle tecnologie delle basi di dati. Cenni sui sistemi
        NoSQL.'
      Testi/Bibliografia: 'Dispense a cura del docente disponibili sulla piattaforma
        e-learning dell''ateneo.


        D. Maio, S. Rizzi, A. Franco. Esercizi di Progettazione di Basi di Dati. Esculapio,
        2005.


        Testi per approfondimenti


        R. Elmasri, S. Navathe. Sistemi di basi di dati – Fondamenti e complementi
        (settima edizione). Pearson, 2018.


        P. Atzeni, S. Ceri, P. Fraternali, S. Paraboschi, R. Torlone. Basi di Dati,
        McGraw-Hill Italia, 2018.


        P. Ciaccia, D. Maio. Lezioni di Basi di Dati. Esculapio, 2002.'
      Metodi didattici: 'Durante le lezioni sono illustrate e discusse in modo approfondito
        le diverse problematiche connesse con la progettazione e lo sviluppo di sistemi
        per la gestione di dati.


        Il corso è affiancato da esercitazioni guidate in aula e in laboratorio. Queste
        attività sono programmate in modo che all''interno di ogni esercitazione lo
        studente possa realizzare praticamente le soluzioni dei problemi delineati
        in forma teorica durante le lezioni. In considerazione della tipologia di
        attività e dei metodi didattici adottati, la frequenza di questa attività
        formativa richiede la preventiva partecipazione di tutti gli studenti ai Moduli
        1 e 2 di formazione sulla sicurezza nei luoghi di studio (https://elearning-sicurezza.unibo.it/),
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame è composto
        di due parti:


        1. un elaborato di progetto che consiste nella progettazione e realizzazione
        di un''applicazione database; l''ammissione alla prova scritta è subordinata
        alla consegna di un elaborato giudicato idoneo dal responsabile dell''insegnamento;

        2. una prova scritta della durata di 2 ore, costituita da un insieme di esercizi
        e/o domande su vari argomenti trattati nel corso; durante lo svolgimento della
        prova scritta non è ammessa la consultazione di alcun tipo di materiale.


        N.B. Il periodo di conservazione agli atti dell’elaborato di progetto e della
        prova scritta è di 6 mesi a decorrere dalla verbalizzazione dell’esito dell’esame
        sostenuto.'
      Strumenti a supporto della didattica: Nel laboratorio sono disponibili diversi
        DBMS (SQL Server, MySQL, Access, Oracle, ...); per le esercitazioni è utilizzato
        SQL Server o MySQL. Si fa inoltre ricorso ad alcuni strumenti di ausilio alla
        progettazione di DB. Per lo sviluppo di applicazioni è previsto l'uso dei
        linguaggi Java e C#.
      Orario di ricevimento: Consulta il sito web di Annalisa Franco (https://www.unibo.it/sitoweb/annalisa.franco)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/378217
    title: 2025/2026 Databases — University of Bologna
    contents:
      Learning outcomes: Fundamentals of the relational database systems technology;
        methodologies and tools for database design and implementation.
      Course contents: '- Main components of a RDBMS: Query Optimizer, Transaction
        Manager, Scheduler, Recovery Manager, Cache Manager, Storage Manager, Access
        Methods.

        - Data Models: conceptual vs. logical models. The relational model.

        - Conceptual database design: the Entity-Relationship model, introduction
        to requirement analysis and to conceptual database design.

        - Logical database design: workload estimation, schema restructuration, entity
        and associations translation.

        - Normal forms: functional dependencies, 1NF, 2NF, 3NF, BCNF.

        - Relational algebra: basic and derived operators.

        - The SQL language : DDL, DML and DCL statements.

        - Transactions: ACID properties, concurrency management, protocols.

        - Data Structures in secondary memory and related management algorithms (sequential
        and direct access organizations, primary and secondary indeces, B-tree, B*-tree
        and B+tree).

        - Database applications: overview of data access modalities (examples in Java
        and .NET C#).

        - Description of the main client-server RDBMS architectures, hints on DDBMS
        and cloud databases.

        - Brief introduction to NoSQL Systems.'
      Readings/Bibliography: 'Lecture slides are available at Unibo e-learning platform.


        D. Maio, S. Rizzi, A. Franco. Esercizi di Progettazione di Basi di Dati. Esculapio,
        2005.


        Further readings


        R. Elmasri, S. Navathe. Sistemi di basi di dati – Fondamenti e complementi
        (settima edizione). Pearson, 2018.


        P. Atzeni, S. Ceri, P. Fraternali, S. Paraboschi, R. Torlone. Basi di Dati,
        McGraw-Hill Italia, 2018.


        P. Ciaccia, D. Maio. Lezioni di Basi di Dati. Esculapio, 2002.'
      Teaching methods: 'The lectures will focus on database design and implementation.


        The course is integrated with guided class and laboratory exercises, where
        the theoretical aspects are put into practice. As concerns the teaching methods
        of this course unit, all students must attend Module 1, 2 on Health and Safety
        (https://elearning-sicurezza.unibo.it/) online'
      Assessment methods: 'The examination consists of two parts:


        1. A laboratory project concerning the design and implementation of a database
        application. The accomplishment of the project is necessary qualification
        for the examination.

        2. Written test (2 hours) with exercises and questions about the course topics.
        During the written test it is not allowed to consult any kind of material.


        Note. The retention period of the project document and written exam test is
        6 months starting from the official recording of the exam grade.'
      Teaching tools: Several RDBMSs are available in the laboratory (SQL Server,
        MySQL, Access, Oracle. ...); SQL Server (or MySQL) is used for the laboratory
        exercises. Moreover some database design tools are available. Java and C#
        are adopted for db application development.
      Office hours: See the website of Annalisa Franco (https://www.unibo.it/sitoweb/annalisa.franco/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
