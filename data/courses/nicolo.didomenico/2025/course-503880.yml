syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/503880
    title: 2025/2026 MACHINE LEARNING LM — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, anche grazie a una
        rilevante attività di laboratorio, lo studente sarà in grado di:


        - progettare sistemi capaci di apprendere in modo automatico

        - implementare tecniche di classificazione, regressione e clustering per risolvere
        problemi in diversi ambiti applicativi

        - utilizzare reti neurali e tecniche di base in ambito deep learning.'
      Contenuti: '- Intelligenza Artificiale e Machine Learning

        - Apprendimento Automatico Supervisionato e Non supervisionato

        - Classificazione e Regressione

        - Classificatori: Bayes, k-Nearest Neighbor, Support Vector Machines, Multiclassificatori

        - Clustering (K-means, EM) e Riduzione di Dimensionalità (PCA, DA)

        - Neural Networks (NN)

        - Introduzione al Deep Learning

        - Convolutional Neural Networks (CNN)

        - Reti Ricorrenti (RNN)

        - Transformers e Large Language Models (LLM)

        - Reinforcement Learning (RL)'
      Testi/Bibliografia: 'Dispense a cura del docente al link:


        http://bias.csr.unibo.it/maltoni/ml'
      Metodi didattici: 'Lezioni frontali ed esercitazioni guidate.


        Testi e soluzione esercitazioni al link:


        http://bias.csr.unibo.it/maltoni/ml


        Nota: in considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza
        nei luoghi di studio, in modalità e-learning (link (https://elearning-sicurezza.unibo.it/))'
      Modalità di verifica e valutazione dell'apprendimento: 'MODALITA'' STANDARD


        Esame scritto dalla durata di 90 minuti con esercizi e domande con risposta
        e testo libero.


        Esempi di esami precedenti (con correzione) sono disponibili sulla pagina
        web del corso.


        Non è possibile consulare materiale (es. dispense, libri, appunti) ma può
        essere usata una semplice calcolatrice (no smartphone).


        Il punteggio (in trentesimi) è calcolato come somma dei punteggi dei singoli
        esercizi e domande. Il punteggio dei singoli esercizi può essere leggermente
        differente a seconda della loro complessità. Se il punteggio totale raggiunto
        è maggiore di 30 il voto finale è 30 e lode.


        MODALITA'' ONLINE (EMERGENZA COVID-19)


        In caso di misure restrittive dovute all''emergenza COVID-19, la prova scritta
        potrà essere sostituita da una prova orale in videoconferenza, che verte su
        tutti gli argomenti/esercizi oggetto della prove in modalità standard. Le
        modalità saranno comunicate con debito anticipo.


        E'' possibile rifiutare il voto dell''esame al massimo due volte.'
      Strumenti a supporto della didattica: 'Librerie e tool di sviluppo per il machine
        learning:


        - Scikit-learn (Python)

        - Tensorflow, PyTorch, Caffè'
      Link ad altre eventuali informazioni: http://bias.csr.unibo.it/maltoni/ml
      Orario di ricevimento: Consulta il sito web di Davide Maltoni (https://www.unibo.it/sitoweb/davide.maltoni)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/503880
    title: 2025/2026 Machine Learning (2nd cycle) — University of Bologna
    contents:
      Learning outcomes: 'Providing the student with the concepts necessary: - to
        understand and apply machine learning approaches; - implement classification,
        regression and clustering algorithms to solve problems in different applicative
        fields; use neural networks and other deep learning techniques.'
      Course contents: '- Artificial Intelligence and Machine Learning

        - Supervided and Unsupervised Learning

        - Classification and Regression

        - Classifiers: Bayes, k-Nearest Neighbor, Support Vector Machines, Multiclassifiers

        - Clustering (K-means, EM) and Dimensionality Reduction (PCA, DA)

        - Neural Networks (NN)

        - Introduction to Deep Learning

        - Convolutional Neural Networks (CNN)

        - Recurrent Neural Networks (RNN)

        - Transformers and Large Language Models (LLM)

        - Reinforcement Learning (RL)'
      Readings/Bibliography: 'Teacher''s slides at:


        http://bias.csr.unibo.it/maltoni/ml'
      Teaching methods: 'Lectures + Practical (guided) sessions in lab.


        Lab assignments and solutions at:


        http://bias.csr.unibo.it/maltoni/ml


        Note: As concerns the teaching methods of this course unit, all students must
        attend Module 1, 2 (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        on Health and Safety online'
      Assessment methods: 'STANDARD MODE


        Written exam with exercises and questions with free text answers.


        The exam duration is 90 minutes.


        Examples (previous exams with corrections) are available in the course web
        page.


        It is not permitted to use books, teacher slides and notes.


        A simple scientific calculator can be used (no smartphones).


        The exam score is computed as the sum of single exercise/question scores.
        The scores of single exercises/questions can be slightly different based on
        their relative difficulty. If the total score exceeds 30, the final grade
        is 30 lode.


        ONLINE MODE (COVID-19 EMERGENCY)


        In case of restrictions for the Covid-19 emergency, the written exam could
        be replaced by an oral exam via videoconferencing. The exams topics (questions/exercises)
        are the same of the standard mode. Notice will be given in advance.


        The exam grade can be rejected no more than two times.'
      Teaching tools: 'Software libraries and tools for machine learning:


        - Scikit-learn (Python)

        - Tensorflow, PyTorch, Caffè'
      Links to further information: http://bias.csr.unibo.it/maltoni/ml
      Office hours: See the website of Davide Maltoni (https://www.unibo.it/sitoweb/davide.maltoni/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
