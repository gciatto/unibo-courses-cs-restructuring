syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/401461
    title: 2025/2026 INFORMATICA -- — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo lo studente possiede
        le conoscenze di base degli strumenti informatici utili per la conduzione
        di un ambulatorio podologico
      Contenuti: "Contenuto del corso:\n\n- Introduzione all'informatica di base,\
        \ dal punto di vista di un\n  utilizzatore di servizi informatici. Storia\
        \ dell'informatica. Modello organizzativo del sistema sanitario.\n- Architettura\
        \ di un elaboratore. CPU, tipologie di memorie, periferiche di I/O.\n- Introduzione\
        \ ai linguaggi di programmazione e al software di sistema e applicativo.\n\
        - Sistema operativo e reti di calcolatori. Classificazione delle reti.\n-\
        \ Internet e il world-wide-web.\n- Sicurezza informatica, protezione dei dati,\
        \ crittografia, firma digitale. Posta elettronica certificata.\n- Un utile\
        \ applicativo: Microsoft Excel"
      Testi/Bibliografia: 'Alberto Rosotti. Informatica Medica: Una guida ai sistemi
        informativi sanitari (terza edizione). McGraw Hill, 2025.'
      Metodi didattici: Lezioni frontali con proiettore.
      Modalità di verifica e valutazione dell'apprendimento: Agli studenti verrà assegnato
        un piccolo progetto in excel, da svolgere a casa. Il progetto verrà valutato
        in 30-esimi. A seguire, una prova orale, anch'essa valutata in 30-esimi. Il
        voto finale sarà ottenuto come media di questi due voti.
      Strumenti a supporto della didattica: Nessun pre-requisito è necessario. Tutte
        le slide sono disponibili sulla piattaforma virtuale.
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/course/view.php?id=35780
      Orario di ricevimento: Consulta il sito web di Roberto Gorrieri (https://www.unibo.it/sitoweb/roberto.gorrieri)
      SDGs: 'Parità di genere Lavoro dignitoso e crescita economica


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/401461
    title: 2025/2026 Informatics — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will have the basic
        knowledge about computer tools useful for their profession.
      Course contents: "Contents:\n\n- Introduction to computer science, from the\
        \ point of view of a user of computer services. History of computer science.\
        \ Organization of the italian health system.\n- Introduction to computer architecture.\
        \ CPU, memories, I/O devices.\n- Introduction to programming languages and\
        \ software.\n- Operating systems and computer networks. Taxonomy.\n- Internet\
        \ and the world-wide-web.\n- Security, data protection, cryptography, digital\
        \ signature, certified email.\n- A useful application: Microsoft\n  Excel"
      Readings/Bibliography: 'Alberto Rosotti. Informatica Medica: Una guida ai sistemi
        informativi sanitari (terza edizione). McGraw Hill, 2025.'
      Teaching methods: Lectures with the help of a beamer.
      Assessment methods: Each student will be assigned a small-size excel project,
        to be done at home, that will be evaluated up to 30. Then, an oral examination,
        evaluated up to 30. The final grade is the average of these two grades.
      Teaching tools: No prior knowledge is required. The teaching material is available
        on the virtuale platform.
      Links to further information: https://virtuale.unibo.it/course/view.php?id=35780
      Office hours: See the website of Roberto Gorrieri (https://www.unibo.it/sitoweb/roberto.gorrieri/en)
      SDGs: 'Gender equality Decent work and economic growth


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
