syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517543
    title: 2025/2026 INGEGNERIA DEI SISTEMI SOFTWARE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'insegnamento, lo studente
        è in grado a) di impostare processi di sviluppo cooperativo del software basati
        su approcci agili basati su Scrum e DevOps; b) di affrontare l'analisi, la
        progettazione, lo sviluppo e il testing di sistemi software distribuiti a
        micro-servizi in ambito cloud e IOT usando dispositivi a basso costo come
        Raspberry Pi e Arduino; c) di realizzare la distribuzione di prodotti software
        mediante Docker e Kubernetes; d) di comprendere come definire un Domain Specific
        Language (DSL) e una relativa Software Factory capace di generazione automatica
        di codice, al fine di una rapida prototipazione di micro-servizi basati su
        Attori che interagiscono a messaggi.
      Contenuti: 'Al termine del corso lo studente:


        - è in grado di impostare processi di sviluppo cooperativo del software basati
        su approcci agili (in particolare SCRUM) avvalendosi anche di modelli eseguibili,
        espressi mediante meta-modelli custom;

        - è'' in grado di progettare e sviluppare sistemi software e relativi piani
        di testing in modo incrementale ed evolutivo, partendo dal problema e dal
        dominio applicativo piuttosto che dalla tecnologia realizzativa, attraverso
        la definizione di modelli eseguibili dell''analisi dei requisiti e dell''analisi
        del problema;

        - è in grado di valutare in modo critico le continua evoluzione delle tecnologie
        informatiche, sia a livello computazionale, sia livello di sviluppo-software,
        acquisendo conoscenze teorico-operative su linguaggi, metododologie e strumenti
        quali Kotlin, Gradle, SCRUM, SpringBoot, Devops, Docker;

        - è in grado di comprendere il ruolo dei diversi stili di architetture software
        (layers, client-server, pipeline, microkernel, service-based, event-driven,
        space-based, microservices) e di come scegliere lo stile architetturale più
        opportuno per i diversi sotto-sistemi individuati;

        - è in grado di affrontare l''analisi, il progetto e la costruzione di applicazioni
        distribuite ed eterogenee di tipo proattivo e/o reattivo (unitamente a loro
        possibili piattaforme di sviluppo e di supporto run-time) con particolare
        riferimento a modelli computazionali a scambio di messaggi e ad eventi;

        - è in grado di realizzare le interazioni a scambio di messaggi tra componenti
        distribuiti utilizzando modelli logici di alto livello e implementazioni basate
        su protocolli diversi (TCP, UDP, HTTP, CoAP, MQTT);

        - è in grado di comprendere come sia possibile progettare e costruire ambienti
        di sviluppo custom capaci di generazione automatica di codice (Software Factories
        in ''ecosistemi'' come Eclipse/IntelliJ), basandosi su Model Driven Software
        Development (MDSD) e sull''uso di Domain Specific Languages (DSL), valutando
        anche il contributo di tecnologie basate sulla Intelligenza Artificiale ;

        - è in grado di sviluppare applicazioni capaci di combinare aspetti di alto
        livello (in particolare di AI) con aspetti di basso livello relativi a dispositivi
        di Internet of Things (IOT), utilizzando sia ambienti virtuali sia dispositivi
        reali costruibili utilizzando elaboratori a basso costo quali RaspberryPi
        e Arduino;

        - è in grado di applicare i concetti, i dispositivi, e gli strumenti sviluppati
        in modo concreto ed operativo durante il corso per lo sviluppo di una applicazione
        finale che utilizza uno o più dispositivi IOT ''situati'' - con particolare
        riferimento a Differental Drive Robots (DDR) con sensori - che possono agire
        in modo relativamente autonomo in diversi ambienti virtuali o reali, senza
        modificare il software che esprime la ''business logic'' del problema.'
      Testi/Bibliografia: 'Il docente fornisce materiale didattico come guida di riferimento
        per la consultazione di testi e siti specializzati esplicitamente indicati.


        Più specificatamente, ogni caso di studio proposto nel corso è corredato da
        una documentazione in forma ipertestuale (HTML) utilizzabile sia come base
        per lo studio individuale sia come punto di partenza per lo sviluppo di versioni
        specializzate da parte dello studente.'
      Metodi didattici: 'Il corso prevede una stretta interazione tra la parte teorica
        e la parte pratica di laboratorio e lo sviluppo cooperativo (docente.studente
        e studente-studente) di casi di studio concreti.


        I casi di studio vengono affrontati in modo incrementale, procedente dal semplice
        al complesso, con l''obiettivo di costruire componenti e sotto-sistemi riusabili,
        utilizzabili per l''applicazione finale.


        Adottando une metodologia ispirata a SCRUM, il lavoro individuale e di gruppo
        verrà sistematicamente analizzato e discusso durante apposite fasi di revisione
        di prodotto e di processo in modo da meglio comprendere i motivi della moderna
        evoluzione di paradigmi computazionali di riferimento e delle metodologie
        di produzione.'
      Modalità di verifica e valutazione dell'apprendimento: 'Le attività di laboratorio
        sono intrinsecamente connesse in modo continuo a una autovalutazione del lavoro
        svolto da parte di ogni singolo studente.


        Al termine del corso, viene proposto un tema di progetto come naturale punto
        di sintesi delle attività svolte, da affrontare in due fasi.


        - La prima fase inizia con la pubblicazione di un testo di requisiti per la
        costruzione di un prototipo La costruzione del prototipo mira a verificare
        il raggiungimento di adeguate abilità teorico/pratiche e può essere effettuata
        in modo individuale o in un gruppo di non più di tre studenti.

        - Al termine di questa fase seguirà una una discussione individuale orale
        sul lavoro svolto, volta a valutare il livello di conoscenza, consapevolezza
        e di autonomia analitico/progettuale del singolo studente. In questa fase
        lo studente è invitato a porre in luce gli aspetti salienti del lavoro svolto
        e le scelte effettuate alla luce delle nozioni teorico/pratiche apprese durante
        il corso.


        Si veda anche: Criteri di valutazione (https://github.com/anatali/issLab2025/blob/main/iss25Material/docs/_build/pdfdocs/CriteriValutazioneISS2025.pdf)'
      Strumenti a supporto della didattica: 'Il corso utilizza diffusi ambienti e
        supporti per la produzione del software (come Eclipse, IntelliJ, Gradle, GIT)
        e per la promozione di lavoro cooperativo docente-studenti e studente-studente.


        Il repository GIT del corso [https://github.com/anatali/issLab2025] fornisce
        sia il materiale didattico relativo alla parte teorica sia il codice dei casi
        di studio.


        Ogni caso di studio è corredato da una documentazione in forma ipertestuale
        (HTML) utilizzabile come documentazione, come materiale didattico ad anche
        come punto di partenza per lo sviluppo di versioni specializzate da parte
        dello studente.'
      Link ad altre eventuali informazioni: https://github.com/anatali/issLab2026
      Orario di ricevimento: Consulta il sito web di Antonio Natali (https://www.unibo.it/sitoweb/antonio.natali)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/517543
    title: 2025/2026 Software Systems Engineering M — University of Bologna
    contents:
      Learning outcomes: Detailed knowledge about languages, models and technologies
        for the analysis, the development, the documentation, the deployment and the
        maintenance of (distributed) software systems.
      Course contents: 'At the end of the course, the student:


        - is able to set-up cooperative software production processes, based on agile
        (SCRUM) development that exploit also executable models exprressed using custom
        meta-models;

        - is able to design and develop software systems with related testing plans,
        in an incremental and evolutive way, by starting from the problem and from
        the application domain rather than from the implementation technology, also
        by using executable models of requirement and problem analysis;

        - is able to critically evaluate the continuos evolution of software technologies,
        both as regars the computational aspects and the software development process,
        by operationally acquiring knowledge on languages, methodologies and tools
        such as Kotlin, Gradle, SCRUM, SpringBoot, DevOps, Docker, etc.

        - is able to understand the role of the different styles of software architectures
        (layers, client-server, pipeline, microkernel, service-based, event-driven,
        space-based, microservices) and how to select the most appropriate architectural
        style for each different sub-system;

        - is able to face the analysis, the design and development of distributed,
        heterogeneous proactive-reactive applications (together with related development
        platforms and run-time supports) with particular reference to computational
        models based on message-passing and event-driven paradigms;

        - is able to realize message-based interactions among distributed software
        components by using high-level logical models and implementations based on
        different protocols (TCP, UDP, HTTP, CoAP, MQTT);

        - is able to understand how it is possible to design and build software development
        environments able to automatic code generation (Sofware Factories in ecosystems
        like Eclipse and IntelliJ) based on Model Driven Software Development (MDSD)
        and on Domain Specific Languages (DSL), by considering also AI Generated Code
        technologies;

        - is able to develop application able to combine high-level aspects (with
        particular reference to AI) with low-level aspects related to Internet of
        Things (IOT) devices, in the context of both virtual and real environments,
        built by using low-cost computers like RaspberryPi and Arduino;

        - is able to apply the concepts, the devices and the tools developed in the
        course for the design and development of a final application that exploits
        one or more IOT devices - in particular Differental Drive Robots (DDR) with
        sensors - that can operate in relatively autonomous way in different virtual
        or real enviroments, without modifying the software that does express the
        business logic of the problem.'
      Readings/Bibliography: 'The teacher provides lerning material as a reference
        guide for the reading of more detailed papers and books


        More spefically, each case-study discussed in the course is furnished with
        HTML documents that can be used as documention, as learning material and also
        as a starting point for more specialized versions built by the student.'
      Teaching methods: 'The course is based on a strong interaction between theory
        and practice, and on the cooperative work (teacher-students and student-student)
        related to a set of case-studies.


        The case studies are proposed in an incremental way, with increasing complexity,
        with the goal to build reusable software, useful for the final application


        The work of the students will be discussed during specifc ''review'' phases
        (in the SCRUM style) related both to the product and to the develpment process,
        with the goal to better understand the motivation for the modern evolution
        of computational paradigms and of software production processes.'
      Assessment methods: "The activites are naturally related to the continuos self-evaluation\
        \ of the work of each student.\n\nThe final examination will performed in\
        \ two-phases.\n\n- The first phase starts by publishing a set of requirements\
        \ and ends with the production of a prototype\n  of a software system satisfying\
        \ the requirements, The goal of this phase is to evaluate the achievement\
        \ of practical skills and can be performed both in individual way or in a\
        \ team composed of at most 3 students.\n- The second phase consists of an\
        \ individual discussion of the work. The goal is to evaluate the degrre of\
        \ theorectical knowldege, awarness and autonomy of each specific student.\
        \ In this phase, the student should highlight the essential aspects of the\
        \ work done amd the choices made with reference to what exposed in the course.\n\
        \nSee also GitHubNatali (https://github.com/anatali/issLab2025/blob/main/iss25Material/docs/_build/pdfdocs/CriteriValutazioneISS2025.pdf)"
      Teaching tools: 'The course makes use of widespread environments and tools (e.g.
        Eclipse, IntelliJ, Git) software production with the intent to promote cooperative
        work between the teacher and the students and between the students.


        The GIT repository of the course [https://github.com/anatali/issLab2025] provides
        material related both to theory and coding.


        Each case-study discussed in the course is furnished with HTML documents that
        can be used as documention, as learning material and also as a starting point
        for more specialized versions built by the student.'
      Links to further information: https://github.com/anatali/issLab2026
      Office hours: See the website of Antonio Natali (https://www.unibo.it/sitoweb/antonio.natali/en)
