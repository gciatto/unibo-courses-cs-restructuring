  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/385100
    title: 2025/2026 PROGRAMMAZIONE DI APPLICAZIONI DATA INTENSIVE — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente è in grado
        di progettare e sviluppare componenti e applicazioni per gestire ed elaborare
        dati strutturati e destrutturati in scenari di interesse aziendale, impiegando
        moderne architetture e tecnologie di rete e di accesso a basi di dati remote.
      Contenuti: 'IL CORSO TRATTA I FONDAMENTI DI DATA SCIENCE E MACHINE LEARNING,
        DAGLI ALGORITMI DI BASE ALLE RETI NEURALI PER LO SVILUPPO DI APPLICAZIONI
        DI INTELLIGENZA ARTIFICIALE IN PYTHON.


        Con gli algoritmi di machine learning saranno sviluppati modelli e applicazioni
        capaci di fare previsioni di varia natura: applicazioni per predire ad esempio
        l''andamento della borsa valori, predire quali prodotti/servizi acquisterà
        ogni cliente, prevedere l''andamento delle vendite aziendali, i consumi energetici,
        il valore di immobili, se un prestito bancario sarà restituito etc


        Inoltre il machine learning sarà applicato al natural language processing
        per classificare opinioni e recensioni di utenti su prodotti/servizi pubblicati
        in social network e nelle piattaforme di e-commerce. Infine saranno sviluppate
        applicazioni di question answering per fornire assistenza ad utenti con chatbot,
        come sviluppare motori di ricerca semantici e come sono realizzati sistemi
        di questo tipo in medicina per la diagnosi di patologie o per indicare come
        trattare i sintomi di un paziente descritti in linguaggio naturale.


        Dettagli sui contenuti del programma del corso


        https://bit.ly/3aG9Brb


        Materiale delle lezioni e laboratori


        sito web del corso (https://virtuale.unibo.it/course/view.php?id=52948) con
        materiale didattico e laboratori con soluzioni (https://virtuale.unibo.it/course/view.php?id=52948)


        Non sono richieste propedeuticità o conoscenze pregresse poiché i concetti,
        incluso il linguaggio Python, sono spiegati da zero.


        L''accesso al materiale non è vincolante per l''iscrizione al corso (scegliere
        iscrizione spontanea per visionare il materiale)'
      Testi/Bibliografia: '- Dispense e riferimenti bibliografici forniti dal docente


        Testo consigliato (non obbligatorio)


        - Data Science con Python, Dai Fondamenti al Machine Learning (http://www.egeaeditore.it/eng/products/ict-e-sistemi-informativi/data-science-con-python__.aspx).
        Joel Grus, 2021. Gianluca Moro, curatore scientifico dell''edizione italiana.
        EGEA Casa Editrice dell''Università Bocconi. Edizione in inglese (https://iol.unibo.it/mod/book/view.php?id=222834),
        O’Reilly Media (versione precedente (http://math.ecnu.edu.cn/~lfzhou/seminar/[Joel_Grus]_Data_Science_from_Scratch_First_Princ.pdf))'
      Metodi didattici: Lezioni in aula affiancate da esercitazioni assistite in laboratorio
        su casi di studio reali di machine learning e data science per lo sviluppo
        di applicazioni di intelligenza artificiale in diversi domini aziendali e
        sociali.
      Modalità di verifica e valutazione dell'apprendimento: Progetto di laboratorio
        svolto in gruppo, con possibilità di scegliere il tema di AI di interesse,
        e discussione orale individuale del progetto.
      Strumenti a supporto della didattica: '- slide delle lezioni e delle attività
        di laboratorio disponibili in anticipo

        - tecnologie open source python e jupyter disponibili nei laboratori della
        scuola

        - attività di laboratorio assistite fruibili anche online in remoto mediante
        open cloud computing come colab o binder

        - esempio di attività di laboratorio in python fruibile con google colab (https://colab.research.google.com/github/datascienceunibo/dialab2019/blob/master/Recommendation_Semplice/Recommendation_con_Python_senza_librerie.ipynb#scrollTo=lheT_i90LU8n)


        Link ai contenuti delle lezioni dell''a.a. 2022/23. I contenuti di machine
        learning per l''a.a. 2023/24 sono in corso di aggiornamento con le più recenti
        soluzioni della comunità accademica ed aziendale di AI:


        https://virtuale.unibo.it/course/view.php?id=37961'
      Orario di ricevimento: Consulta il sito web di Gianluca Moro (https://www.unibo.it/sitoweb/gianluca.moro)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/385100
    title: 2025/2026 Data Intensive Applications — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student is able to design and
        develop intelligent applications of corporate interest by processing structured
        and unsctructured data with modern data science methods and fundamental machine
        learning technologies.
      Course contents: 'The course covers the fundamentals of data science and machine
        learning from basic algorithms to neural networks for developing AI applications
        in python.


        Course Content Details


        https://bit.ly/3aG9Brb


        Lectures and Laboratories


        course web site (https://virtuale.unibo.it/course/view.php?id=52948) (https://virtuale.unibo.it/course/view.php?id=52948)


        The material view does not require the enrolment to the course (in this case
        access the course web site selecting "spontaneous registration")'
      Readings/Bibliography: '- Materials and bibliographic references supplied by
        the teacher


        Suggested course book


        - Data Science from Scratch (https://iol.unibo.it/mod/book/view.php?id=222834),
        Joel Grus, O’Reilly Media, 2019 early edition freely available (http://www.egeaeditore.it/eng/products/ict-e-sistemi-informativi/data-science-con-python__.aspx)
        (previous edition 2015). Italian edition 2021, Data Science con Python. Dai
        Fondamenti al Machine Learning. Scientific Editor Gianluca Moro. Published
        by EGEA.'
      Teaching methods: Lectures are followed by aided laboratory practicals on real
        case studies of machine learning and data science for the development of artificial
        intelligence applications in several industrial and social domains.
      Assessment methods: Group project work with individual oral discussion of the
        project. Students can choose the AI theme of the project.
      Teaching tools: '- slides of lectures and laboratory practicals available in
        advance

        - python and jupyter open source technologies fully available in the school
        laboratories

        - aided laboratory activities linked also to open cloud computing such as
        colab or binder to perform them online remotely

        - example of a laboratory practical in python available with google colab
        (https://colab.research.google.com/github/datascienceunibo/dialab2019/blob/master/Recommendation_Semplice/Recommendation_con_Python_senza_librerie.ipynb#scrollTo=lheT_i90LU8n)


        Link to the lessons of 2022/23. The contents of machine learning for the 2023/24
        will be updated according to the most recent solution of the academic and
        industrial communities of AI:


        https://virtuale.unibo.it/course/view.php?id=37961'
      Office hours: See the website of Gianluca Moro (https://www.unibo.it/sitoweb/gianluca.moro/en)
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
