syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/341714
    title: 2025/2026 SISTEMI INTEGRATI PER L'ANALISI SPETTRALE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Fornire le metodologie e le tecniche di
        progettazione di sistemi integrati per l'acquisizione, l'elaborazione e la
        classificazione di dati, segnali ed immagini mediante l'impiego di algoritmi
        e sistemi avanzati.
      Contenuti: "1. Introduzione. Necessità della analisi tempo-frequenza. Classificazione\
        \ e proprietà dei segnali. Richiami sulla analisi di Fourier. Decomposizione,\
        \ analisi e ricostruzione del segnale ed esempi di tecniche generali di analisi\
        \ tempo-frequenza.\n2. Metodologie di progetto. Alcuni complementi sulle metodologie\
        \ di progetto di filtri digitali: decomposizione spettrale, filtri massimamente\
        \ piatti.\n3. Elaborazione multifrequenza del segnale: banchi di filtri. Campionamento\
        \ e decimazione. Descrizione polifase: proprietà e applicazioni. Filtri a\
        \ M-bande. Banchi QMF alias-free, Banchi uniformi e strutture speciali. Progettazione\
        \ di banchi di filtri a ricostruzione perfetta e multicanale. Esempi di progetto\
        \ e valutazione delle prestazioni.\n4. Elementi di Analisi tempo-frequenza\
        \ del segnale.\n  Principio di indeterminazione e rappresentazione dei segnali\
        \ come elementi di uno spazio vettoriale. Rappresentazione mediante basi ortonormali,\
        \ biortogonali, frame. Esempi: base di Fourier, di Haar, di Shannon. La Short\
        \ Time Fourier Transform (STFT): definizione, proprietà principali, sua interpretazione\
        \ come banco di filtri. Esempi di implementazione hardware. Teorema di Balian-Low.\
        \ La Trasformata Wavelet Continua (CWT): definizione, proprietà principali\
        \ e definizione delle trasformate discrete (DWT).\n5. Elementi di Analisi\
        \ Multirisoluzione. Definizione e caratteristiche della Analisi Multirisoluzione.\
        \ Metodi di costruzione delle funzioni scala e wavelet madre. Proprietà di\
        \ invertibilità, ortonormalità e localizzazione. Basi di wavelet ortonormali\
        \ e banchi di filtri. Proprietà di regolarità e definizione di Wavelet da\
        \ filtri. Esempi di costruzione di funzioni wavelet. Algoritmi di trasformazione\
        \ veloci (FWT). Esempi di analisi di segnali nonstazionari sintetici e reali.\n\
        6. Wavelet di seconda generazione: lo schema Lifting. Descrizione nel dominio\
        \ z e Teorema di decomposizione. Esempi di implementazione hardware.\n7. Cenni\
        \ sulle Distribuzioni Tempo-Frequenza (TFD) Quadratiche: segnali asintotici,\
        \ tempo di rilassamento, nucleo di un segnale: Funzione di autocorrelazione\
        \ istantanea e spettrale. La Distribuzione di Wigner-Ville: proprietà e caratteristiche.\
        \ Definizione generale delle TFD Quadratiche a partire dalla Distribuzione\
        \ di Wigner-Ville.\n\nLe lezioni e la prova finale si svolgono in italiano."
      Testi/Bibliografia: "- S. K. Mitra \"Digital Signal Processing\" 3rd Edition,\n\
        \  McGraw Hill, 2006.\n- M.Vetterli J.Kovacevic \"Wavelets and Subband Coding\"\
        \ Prentice Hall, 1995\n- M. Luise, G. M. Vitetta, G Bacci \"Teoria dei Segnali\"\
        \ McGraw Hill, 4 ed., 2025\n- P.P. Vaidyanathan \"Signals, Sistems, and Signal\
        \ Processing\", Cambridge, 2024."
      Metodi didattici: 'Durante le lezioni saranno illustrate le problematiche legate

        al progetto di banchi di filtri digitali a perfetta ricostruzione e saranno
        discusse le principali

        proprietà delle tecniche di analisi tempo-frequenza più diffuse.

        L''attività didattica può essere completata da approfondimenti

        individuali legati ad alcuni degli argomenti introdotti durante il

        corso e concordati preventivamente con il docente.'
      Modalità di verifica e valutazione dell'apprendimento: 'La prova finale consiste
        in un colloquio volto ad accertare le conoscenze acquisite sulle proprietà
        e le tecniche di elaborazione specifiche per i segnali non stazionari. Esso
        può essere in parte integrato con la

        discussione dei risultati ottenuti dallo studente

        nell''approfondimento di alcuni argomenti indicati nel programma del corso
        e concordati preventivamente con il

        docente.


        Alle Studentesse e agli Studenti con DSA o disabilità temporanee o permanenti
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile, all''indirizzo
        (**https://site.unibo.it/studenti-con-disabilita-e-dsa/it). Sarà cura dell''ufficio
        proporre eventuali adattamenti, che dovranno comunque essere sottoposti, con
        un anticipo di 15 giorni, all’approvazione del/la docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Simulazione al computer e lucidi
      Orario di ricevimento: Consulta il sito web di Nicolò Attilio Speciale (https://www.unibo.it/sitoweb/nicolo.speciale)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/341714
    title: 2025/2026 Time-Frequency and Multirate Signal Processing M — University
      of Bologna
    contents:
      Learning outcomes: 'Upon completing this course, students will be able to:


        1. apply transform methods to the analysis of digital signals and linear time-invariant
        systems

        2. design of advanced Finite Impulse Response (FIR) and Infinite Impulse Response
        (IIR) digital filters to meet specifications

        3. create efficient realizations for upsampling and downsampling of signals
        using the polyphase decomposition

        4. design digital filter banks

        5. master basic concepts and definitions of time-frequency techniques (Duration-Bandwidth
        Principle, Joint Energy Density, Frame Theory)

        6. apply FT, DFT, Short-time FT and Wavelet Transform to analyze non-stationary
        signals in real world situations

        7. recognise different problem types in digital signal processing, and decide
        upon appropriate methodologies for their solution.


        Students will

        develop the necessary background and proficiency to pursue some of

        the current research works in wavelets and will be able to work

        with current software packages in their own area of applications.'
      Course contents: 'The course is aimed to deal with some of the basic concepts,
        methodologies and tools of signal processing using time-frequency techniques
        (STFT, wavelets, Wigner-Ville). The point of view that is emphasized is expansion
        into orthogonal and biorthogonal bases.


        A basic knowledge of Fourier transforms and digital filters is mandatory.


        1. Introduction. DSP tools and the z-transform: Hilbert space, bases, frame
        theory. Filter Bank analysis and Wavelets: Multirate Signal Processing: filtering,
        decimation, polyphase systems, perfect reconstruction and aliasing removal.

        2. Multiresolution Analysis and Wavelet Transform: pyramid and cascade algorithms,
        Daubechies wavelets, orthogonal and biorthogonal wavelets, smoothness, approximation.
        Time-Frequency and Time-Scale Analysis. Examples. Second-Generation Wavelets.
        Quadratic Time-Frequency Distributions: the Wigner-Ville Transform and the
        Cohen''s Class.

        3. Design Methods: spectral factorization, cosine-modulated filter banks.
        Lifting Scheme. Examples of VLSI architectures for computing the time-frequency
        spectrum.


        All lectures (and final exam) will be held in Italian. It is therefore necessary
        to understand the Italian language to profitably attend the course and be
        able to use the educational material provided.'
      Readings/Bibliography: "- S. K. Mitra \"Digital Signal Processing\" 3rd Edition,\n\
        \  McGraw Hill, 2006.\n- M.Vetterli J.Kovacevic \"Wavelets and Subband Coding\"\
        \ Prentice Hall, 1995.\n- P.P. Vaidyanathan \"Signals, Sistems, and Signal\
        \ Processing\", Cambridge, 2024."
      Teaching methods: 'The course consists of lectures and examples on topics related
        to the analysis and design of filter banks structures and time-frequency techniques.


        In-depth studies on specific topics related to the student''s area of interest
        are also possible only with prior agreement with the teacher.'
      Assessment methods: 'The final exam (in italian) consists of an interview aimed
        at verifying the knowledge acquired on the properties and techniques of processing
        for non-stationary signals. It can be partially integrated with the discussion
        of the results obtained by the student in the deepening of some topics indicated
        in the program of the course and agreed in advance with the teacher.


        Students with DSA or temporary or permanent disabilities are advised to contact
        the University office in good time (https://site.unibo.it/studenti-con-disabilita-e-dsa/it**).
        The office will be responsible for proposing any adaptations, which must be
        submitted for the teacher''s approval at least 15 days in advance. The teacher
        will assess the appropriateness of the adaptations in relation to the teaching
        objectives.'
      Teaching tools: Computer simulations and slides.
      Office hours: See the website of Nicolò Attilio Speciale (https://www.unibo.it/sitoweb/nicolo.speciale/en)
