syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/423128
    title: 2025/2026 FONDAMENTI DI ELETTRONICA PER L'AUTOMAZIONE T — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente possiede
        competenze elettroniche di base su: dispositivi e circuiti per l’elaborazione
        di segnali in applicazioni quasi-lineari; circuiti per l’acquisizione di segnali
        da sensori; elettronica di potenza; circuiti per l’elaborazione elettronica
        di segnali digitali; memorie digitali.


        In particolare, lo studente:


        · acquisisce conoscenze elementari su: utilizzo di BJT, MOSFET e amplificatori
        operazionali; componenti di catene di acquisizione di segnali; circuiti elettronici
        operanti in commutazione; circuiti per la generazione di forme d’onda e la
        trasmissione di segnali; gate logici CMOS, figure di merito di circuiti elettronici
        digitali, memorie digitali.


        · è in grado di impostare l’analisi di: circuiti basati su transistori e amplificatori
        operazionali in regime di funzionamento dc e ac; circuiti con comparatori
        di tensione; circuiti con transistori operanti in commutazione; circuiti basati
        su gate logici CMOS.'
      Contenuti: 'Il corso di Fondamenti di Elettronica per l''Automazione T è suddiviso
        in due parti, una tenuta dal prof. Alberto Santarelli (90 ore - Moduli 1 e
        2), e l''altra dal prof. Alberto Maria Angelotti (30 ore - Modulo 3).


        Moduli 1 e 2 (9 cfu)


        Dispositivi elettronici e circuiti di amplificazione di segnali


        Diodo a giunzione. Convertitore AC/DC monofase a singola e a doppia semionda.
        Capacità di spianamento. Diodo Zener. Limitatori di tensione. Circuiti per
        fissare riferimenti di tensione. Transistori bipolari a giunzione. Transistori
        MOSFET a canale n e canale p. Circuiti di polarizzazione. Amplificatori di
        segnale quasi-lineari. Linearizzazione di bipoli elementari. Circuito equivalente
        per piccoli segnali del BJT e del MOSFET. Parametri fisici e ibridi. Effetti
        dinamici. Analisi alle variazioni di stadi elementari di amplificazione. Accoppiamento
        a condensatore tra stadi in cascata. Amplificatori accoppiati in continua.
        Deriva termica. Offset. Amplificatore differenziale: guadagno differenziale
        e di modo comune; fattore di reiezione del modo comune. Amplificatori operazionali.
        Circuiti elementari quasi-lineari basati su amplificatori operazionali. Amplificatore
        alle differenze. Amplificatore differenziale per strumentazione. Comparatori
        di tensione. Trigger di Schmitt. Generazione di forme d''onda triangolari.
        Modulatori PWM analogici. Convertitore DC/DC switching (chopper).


        Circuiti per l''acquisizione e la conversione dei segnali


        Cenni sulla qualità dei segnali: messa in scala delle variabili, rumore, immunità
        ai disturbi. Classificazione dei sensori: sensori multipli, differenziali
        e bilanciati. Cenni sui principi di funzionamento dei sensori di tipo diretto
        (elettrodinamici, termocoppie, piezoelelettrici). Dispositivi opto-elettronici:
        diodo fotorivelatore e LED. Sensori modulanti (parametrici). Cenni su alcuni
        sensori parametrici di tipo resistivo, induttivo e capacitivo ed esempi di
        sensore differenziale. Circuiti per la generazione di segnali impieganti sensori
        parametrici. Circuiti a mezzo ponte e ponte intero di impedenze. Introduzione
        ai segnali modulati in ampiezza, frequenza e fase. Cenni su modulazioni di
        tipo impulsivo (PAM, PWM, PPM, PFM). Circuiti demodulatori d''ampiezza (rivelatore
        di cresta, demodulatore a mixer analogico e switching). Demodulazione di segnali
        con modulazione impulsiva. Principi di funzionamento dei circuiti oscillatori
        sinusoidali. Impieghi degli oscillatori come generatori di portante, clock,
        modulatori di frequenza (VCO) e come generatori di segnali modulati impieganti
        sensori di tipo risonante. Conversioni Analogico/Digitale e Digitale/Analogico:
        quantizzazione, codifica binaria, errore di quantizzazione. Circuiti per la
        conversione D/A. Circuiti per la conversione A/D: a successive approssimazioni,
        flash/parallelo e a doppia rampa. Campionamento dei segnali e circuiti Sample/Hold.


        Modulo 3 (3 cfu)


        Circuiti elettronici digitali


        Caratteristiche peculiari dei circuiti digitali. Definizione e proprietà generali
        delle famiglie logiche: margini di immunità ai disturbi, fan in, fan out,
        tempi di commutazione, dissipazione di potenza. Il transistore visto come
        un interruttore controllato: calcolo della caratteristica di trasferimento
        statica ingresso-uscita di un invertitore a MOSFET con carico resistivo. Invertitore
        CMOS. Famiglie logiche CMOS e relative proprietà. Realizzazione di gate NOR
        e NAND in tecnologia CMOS. Circuiti CMOS statici e dinamici. Concetti di pass-transistor
        e transfer-gate. Esempi di realizzazione di circuiti logici combinatori e
        sequenziali in tecnologia CMOS. L''interfacciamento nei circuiti logici. L''architettura
        delle memorie e principali tipologie di celle (statiche e dinamiche).'
      Testi/Bibliografia: '- J. Millman, A. Grabel, P. Terreni, Elettronica di Millman,
        McGraw-Hill.

        - R. C. Jaeger, T. N. Blalock, Microelettronica (1, 2, 3), McGraw-Hill.

        - P. U. Calzolari, S. Graffi, Elementi di Elettronica, Zanichelli.'
      Metodi didattici: Il corso prevede lezioni frontali ed esercitazioni. Le esercitazioni
        saranno svolte presso il LAB 1 oppure usando un laptop personale con il programma
        LTSPICE e consentiranno agli studenti di studiare mediante simulazione numerica
        il comportamento di diversi tipi di circuiti elettronici impiegati nell'ambito
        dell'automazione industriale.
      Modalità di verifica e valutazione dell'apprendimento: 'La prova di accertamento
        è orale anche se potrà essere prevista una parte di esame sotto forma di quiz
        a risposte multiple e/o lo svolgimento di un breve esercizio. La prova mira
        a verificare: 1. l''acquisizione dei concetti alla base degli argomenti del
        programma del corso; 2. a valutare il livello con cui è stato approfondito
        lo studio delle tematiche proposte a lezione e in laboratorio; 3. la capacità
        di esposizione degli argomenti in termini di chiarezza e proprietà di linguaggio
        tecnico. Al Candidato verrà chiesto di esporre tre argomenti e, su richiesta,
        gli si consentirà prima del colloquio un tempo adeguato per la stesura in
        forma scritta dei supporti (formule, grafici, schemi) che riterrà opportuni
        per la successiva discussione.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Appunti del corso. Dispense delle esercitazioni
      Link ad altre eventuali informazioni: https://dei.unibo.it/en/research/research-groups/edm
