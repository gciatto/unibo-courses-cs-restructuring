syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/385090
    title: 2025/2026 PROGRAMMAZIONE DI SISTEMI MOBILE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        strumenti teorici e pratici fondamentali per lo sviluppo di applicazioni native
        su piattaforma iOS e Android, oltre ad un'introduzione alla progettazione
        e sviluppo di applicazioni performanti per device mobili in contesto ibrido.
        In particolare, lo studente conosce come progettare e sviluppare l'architettura
        e le interfacce grafiche delle applicazioni mobile.
      Contenuti: '1. Progettazione e design di applicazioni mobili (circa il 15% delle
        ore)

        2. Introduzione ad Android (circa il 50% delle ore)


        - Architettura di un''applicazione Android

        - Componenti e risorse

        - Activity e Intent

        - Menu, Dialog e Toast

        - Material design

        - Gestione dei dati

        - Volley

        - Multithreading e servizi

        - Sensori

        - Camera

        - Mappe e GPS


        1. Introduzione ad iOS (circa il 30% delle ore)


        - Fondamenti dello sviluppo per iPhone

        - il linguaggio Swift

        - MVVM e SwiftUI

        - UserDefaults

        - Core data

        - Eventi, multi-touch e gesti

        - Multithreading

        - Map kit e GPS


        1. Introduzione alle applicazioni mobile ibride e principali tecnologie utilizzate
        (circa il 5% delle ore)'
      Testi/Bibliografia: Vista la velocità con il quale il mondo mobile cambia e
        si aggiorna, non ci sono testi consigliati. Si consiglia quindi di utilizzare
        il materiale fornito dal docente e presente su Virtuale, incluso il materiale
        di approfondimento messo a disposizione del docente.
      Metodi didattici: 'Lezioni frontali in aula e lezioni di esercitazione in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Per l’esame finale è
        richiesto lo sviluppo di un’applicazione nativa in

        Android o iOS.

        L’app viene valutata con un punteggio massimo di 28 punti.

        Può essere svolta singolarmente o (consigliato) in gruppi da 2 persone. Eccezione:
        gruppi da 3, dopo averlo concordato tramite email con i docenti, possono sviluppare
        lo stesso progetto nei due OS oppure creare un’unica app con funzionalità
        avanzate.


        Oltre al codice dell’applicazione, andrà consegnata una relazione sotto forma
        di slide.

        Lunghezza: 4 o 5 slide sono sufficienti

        Contenuti: scopo dell’app, tecnologie utilizzate (librerie, API, ecc.), mockup
        e screenshot dell’app.


        Non ci sono feature obbligatorie, ma gli studenti possono scegliere quali
        implementare tra:

        • Feature proposte da noi, hanno un range di punti che

        saranno assegnati sulla base di:

        – Qualità e dettaglio dell’implementazione

        – Coerenza con lo scopo dell’app che si sta creando

        • Feature aggiuntive o cura particolare nella realizzazione dell''app, sono
        valutate al momento dell’esame e valgono punti se sono inerenti al corso.


        È poi possibile integrare il voto ottenuto con l’applicazione effettuando
        un approfondimento su un tema relativo al mondo del mobile e ottenendo un
        massimo di 4 punti aggiuntivi. Il punteggio dipende da: chiarezza espositiva,
        uso del tempo a disposizione, dettaglio, conoscenze acquisite, ecc.

        Su Virtuale è presente una wiki con tutti gli argomenti di approfondimento.
        Molti sono proposti da noi, ma potrete sceglierne altri concordandoli con
        i docenti. Salvo eccezioni, un argomento può essere scelto da un solo studente.
        Nella wiki, è

        necessario inserire il vostro nome accanto all’approfondimento scelto, in
        modo da evitare duplicati.


        Il punteggio finale è quindi dato dalla somma:

        – Applicazione: obbligatoria, max 28 punti

        – Approfondimento: opzionale, max 4 punti, necessario per conseguire voti
        maggiori di 28.


        In particolare, il punteggio finale corrisponde alla seguente valutazione:


        18–23:

        Lo studente dimostra una conoscenza di base dello sviluppo di applicazioni
        mobili, limitata a pochi argomenti trattati nel corso. L’applicazione realizzata
        risulta funzionante ma semplice, con architettura o interfaccia grafica essenziale
        e scarsa cura nei dettagli tecnici o di design.


        24–27:

        Lo studente mostra una buona preparazione tecnica e comprensione generale
        delle piattaforme Android e/o iOS. L’applicazione è coerente e ben strutturata,
        pur presentando alcune lacune o semplificazioni nell’implementazione o nel
        design. L’uso delle librerie e delle API è corretto ma non particolarmente
        approfondito.


        28–30:

        Lo studente dimostra un’ottima padronanza della progettazione e dello sviluppo
        di applicazioni mobili. L’app è completa, stabile, curata dal punto di vista
        architetturale e grafico, con un uso efficace di API, librerie e principi
        di progettazione nativi. Mostra buone capacità critiche e autonomia nello
        sviluppo.


        30L (con lode):

        Lo studente possiede una conoscenza eccellente e approfondita di tutti gli
        argomenti del corso. L’applicazione si distingue per originalità, complessità,
        prestazioni e qualità del design. L’elaborato e la presentazione sono di livello
        professionale, mostrando grande autonomia, creatività e rigore tecnico.'
      Strumenti a supporto della didattica: Piattaforma Virtuale
      Orario di ricevimento: 'Consulta il sito web di Catia Prandi (https://www.unibo.it/sitoweb/catia.prandi)


        Consulta il sito web di Chiara Ceccarini (https://www.unibo.it/sitoweb/chiara.ceccarini6)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/385090
    title: 2025/2026 Mobile Application Programming — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student has theoretical and
        practical tools fundamental for the development of native applications on
        the iOS and Android platforms, as well as an important introduction to the
        design and development of performing applications for smartphones. In particular,
        the student knows the architecture, and the graphical interfaces of smartphone
        applications.
      Course contents: '1. Mobile applications design (circa 15%)

        2. Introduction to Android (circa 50%)


        - Components and resources

        - Activity and Intent

        - Material design

        - Menu, Dialog and Toast

        - Data management

        - Volley

        - Multithreading and services

        - Sensors

        - Camera

        - Map and GPS


        1. Introduction to iOS (circa 30%)


        - Swift language

        - MVVM and SwiftUI

        - Core data

        - Events, multi-touch and gesture

        - Map kit and GPS


        1. Introduction to hybrid mobile applications and the main related technologies
        (5%)'
      Readings/Bibliography: Virtuale platform.
      Teaching methods: 'Lectures in the classroom and laboratory lessons.


        Consideration the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the prior participation of all students
        in the training modules 1 and 2 on safety in the study places, [https: //
        elearning-security. unibo.it/] in e-learning mode.'
      Assessment methods: "For the final exam, students are required to develop a\
        \ native application for Android or iOS.\nThe app will be graded with a maximum\
        \ score of 28 points.\nIt can be done individually or (recommended) in groups\
        \ of two.\nException: groups of three, after agreeing with the instructors\
        \ via email, may either develop the same project for both operating systems\
        \ or create a single app with advanced features.\n\nIn addition to the application\
        \ code, a report in the form of slides must be submitted.\nLength: 4 or 5\
        \ slides are sufficient.\nContents:\n\n- Purpose of the app\n- Technologies\
        \ used (libraries, APIs, etc.)\n- Mockups and screenshots of the app\n\nThere\
        \ are no mandatory features, but you can choose which ones to implement among:\n\
        \n- Features proposed by the instructors, which have a range of points assigned\
        \ based on:\n  – Quality and level of detail of the implementation\n  – Consistency\
        \ with the app’s purpose\n- Additional features or particular attention to\
        \ the app’s realization, which will be evaluated during the exam and may earn\
        \ points if relevant to the course.\n\nIt is also possible to increase the\
        \ score obtained from the app by doing an in-depth presentation on a topic\
        \ related to the mobile world, earning up to 4 additional points.\nThe score\
        \ depends on: clarity of presentation, use of allotted time, depth of analysis,\
        \ acquired knowledge, etc.\n\nOn the Virtuale platform there is a wiki with\
        \ all the available in-depth topics.\nMany are proposed by the instructors,\
        \ but you may choose others after consulting them.\nExcept for special cases,\
        \ a topic can be chosen by only one student.\nOn the wiki, you must write\
        \ your name next to the chosen topic to avoid duplicates.\n\nThe final grade\
        \ is therefore the sum of:\n\n- Application: mandatory, max 28 points\n- In-depth\
        \ presentation: optional, max 4 points (required to achieve a score above\
        \ 28)\n\nIn particular, the grade corresponds to the following evaluations:\n\
        \n18–23:\nThe student demonstrates a basic understanding of mobile application\
        \ development, limited to a few topics covered in the course. The developed\
        \ app is functional but simple, with minimal architectural design or user\
        \ interface refinement and limited attention to technical or design details.\n\
        \n24–27:\nThe student shows good technical preparation and a general understanding\
        \ of Android and/or iOS platforms. The app is coherent and well-structured\
        \ but may contain some simplifications or gaps in implementation or design.\
        \ The use of libraries and APIs is correct but not particularly in-depth.\n\
        \n28–30:\nThe student demonstrates strong mastery of mobile app design and\
        \ development. The application is complete, stable, and well-crafted both\
        \ architecturally and visually, showing effective use of APIs, libraries,\
        \ and native design principles. The student shows solid critical thinking\
        \ and autonomy in development.\n\n30L (with honors):\nThe student exhibits\
        \ excellent and in-depth knowledge of all course topics. The developed app\
        \ stands out for its originality, complexity, performance, and design quality.\
        \ The accompanying materials and presentation are of professional quality,\
        \ demonstrating exceptional autonomy, creativity, and technical rigor."
      Teaching tools: Virtuale platform
      Office hours: 'See the website of Catia Prandi (https://www.unibo.it/sitoweb/catia.prandi/en)


        See the website of Chiara Ceccarini (https://www.unibo.it/sitoweb/chiara.ceccarini6/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
