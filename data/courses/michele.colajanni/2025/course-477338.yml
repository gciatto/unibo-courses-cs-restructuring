syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/477338
    title: 2025/2026 SCALABLE AND RELIABLE SERVICES M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Digital services have to meet various requirements
        in terms of performance, scalability and reliability. We analyze the whole
        lifecycle of high quality services, from design to deployment, testing and
        operation. In each phase, we aim to provide the students with the ability
        to gather and analyze data, to identify sources of outages and critical dependencies,
        and to avoid bottlenecks and single points of failure. Finally, we expect
        students to be prepared to evaluate and discuss alternatives and justify investment
        in support of business services.
      Contenuti: 'Introduzione

        • Servizi cloud

        • Architetture di provider cloud

        • Servizi di alta qualità: prestazioni, scalabilità, affidabilità (e sicurezza)

        • Ciclo di vita di servizi di alta qualità


        Parte 1: Architetture per servizi scalabili e affidabili

        • Fonti di interruzioni e dipendenze critiche

        • Colli di bottiglia e single point of failure

        • Design: valutazione della maturità, principi architetturali per affidabilità
        e scalabilità, modello cubo in scala AKF

        • Migrazione al cloud

        • Gestione dei dati critici: Strategia, Governance, Management

        • Alternative di implementazione su piattaforme cloud e multi-cloud


        Parte 2: Distribuzione del servizio

        • Produzione di software sicura e robusta

        • DevOps sicuri e robusti

        • Laboratori su piattaforme cloud


        Parte 3: Test

        • Analisi comparativa

        • Test delle prestazioni

        • Stress testing


        Parte 4: Organizzazioni scalabili e affidabili

        • Ruoli e responsabilità

        • Leader e manager

        • Mettere tutto insieme

        • Capacity planning

        • Comprendere e gestire la complessità

        • Gestione dei cambiamenti


        Parte 5: Problemi, incidenti e crisi

        • Monitoraggio delle prestazioni

        • Segnali di malfunzionamenti operativi

        • Gestione degli incidenti

        • Gestione della crisi'
      Testi/Bibliografia: Slide, dispense del docente, capitoli di libro, articoli
        scientifici e risorse online disponibili sul sito di Virtuale.
      Metodi didattici: Il corso si compone di lezioni ed esercitazioni in aula e
        laboratori remoti su cloud. L'interazione è apprezzata e valutata come componente
        del voto finale.
      Modalità di verifica e valutazione dell'apprendimento: 'Vi sono due possibilità
        di esame.

        (1) Progetto software (max 3 studenti), presentazione dei risultati e spunto
        per la discussione dei temi del corso

        (2) Attività progettuale individuale durante l''esame, presentazione dei risultati
        e prova orale.

        Gli studenti interessati all''opzione (1) devono completare l''esame entro
        la fine di luglio 2024.'
      Strumenti a supporto della didattica: Tutto il materiale didattico è a disposizione
        degli studenti sul sito Web del corso (Virtuale).
      Orario di ricevimento: Consulta il sito web di Michele Colajanni (https://www.unibo.it/sitoweb/michele.colajanni)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/477338
    title: 2025/2026 Scalable and Reliable Services M — University of Bologna
    contents:
      Learning outcomes: Digital services have to meet various requirements in terms
        of performance, scalability and reliability. We analyze the whole lifecycle
        of high quality services, from design to deployment, testing and operation.
        In each phase, we aim to provide the students with the ability to gather and
        analyze data, to identify sources of outages and critical dependencies, and
        to avoid bottlenecks and single points of failure. Finally, we expect students
        to be prepared to evaluate and discuss alternatives and justify investment
        in support of business services.
      Course contents: 'Introduction

        Cloud services

        Cloud provider architectures

        High-quality services: performance, scalability, reliability (and security)

        Lifecycle of high-quality services


        Part 1: Architectures for scalable and reliable services

        Sources of outages and critical dependencies

        Bottlenecks and single points of failure

        Design: maturity assessment, architectural principles for reliability and
        scalability, AKF scale cube model

        Migration to cloud

        Critical data management: Strategy, Governance, Management

        Implementation alternatives on cloud platforms and multi-clouds


        Part 2: Service deployment

        Secure and robust software production

        Secure and robust DevOps

        Labs on cloud platforms


        Part 3: Tests

        Benchmarking

        Performance testing

        Stress testing


        Part 4: Scalable and reliable organizations

        Roles and responsibilities

        Leaders and managers

        Putting all together

        Capacity planning

        Understanding and managing complexity

        Managing changes


        Part 5: Issues, incident and crises

        Performance monitoring

        Warning signs in operation

        Incidents management

        Crisis management'
      Readings/Bibliography: Slides, teacher's notes, book chapters, scientific articles
        and online resources indicated on the Virtuale website.
      Teaching methods: The course consists of lectures and exercises in class. Interaction
        is appreciated and evaluated as a component of the final grade.
      Assessment methods: The course consists of lectures and exercises in class.
        Interaction is appreciated and evaluated as a component of the final grade.
      Teaching tools: 'There are two possibilities of assessment.


        (1) Software project (max 3 students), presentation of the results and discussion.


        (2) Individual design project, presentation of the results and oral exam.


        The students interested to the option (1) must complete the exam by the end
        of July.


        All the teaching material is available to the students on the course (Virtuale)
        website.'
      Office hours: See the website of Michele Colajanni (https://www.unibo.it/sitoweb/michele.colajanni/en)
