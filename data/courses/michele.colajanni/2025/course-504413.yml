syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/504413
    title: 2025/2026 GOVERNANCE  DELLA CYBERSECURITY — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso intende offrire le conoscenze per
        comprendere e valutare le principali minacce ai sistemi informatici e sociali
        derivanti da attacchi cyber nonché le principali modalità di mitigazione dei
        rischi in organizzazioni pubbliche e private. Al termine del corso lo studente
        sarà in grado di applicare le conoscenze acquisite per trattare i rischi cyber
        in molteplici contesti organizzativi definendo le priorità di intervento.
      Contenuti: 'Il corso affronta i temi strategici e di gestione della cybersecurity
        dal punto di vista degli stati e delle organizzazioni pubbliche e private
        di diverse dimensioni.


        Dopo aver descritto l''attuale scenario digitale, il corso affronta gli obiettivi
        prioritari di ciascuna entità insieme alle minacce cyber e alle vulnerabilità
        interne che mettono a rischio tali obiettivi.


        I rischi cyber devono essere valutati per definire le priorità di intervento
        che devono essere a livello di prevenzione, rilevazione e risposta.


        Per ciascuna fase, il trattamento dei rischi dovrà operare a livello:


        - strategico

        - gestionale

        - operativo


        Nell''ultima parte, si affronteranno altri rischi e contromisure a livello
        di:


        - disinformazione

        - cyber conflict

        - società smart

        - Artificial Intelligence


        L''utilizzo di strumenti di AI per il cybersecurity management non è probito,
        ma favorito, a patto che venga dichiarato e i risultati messi a fattor comune
        della classe.'
      Testi/Bibliografia: Slide, appunti del docente, capitoli di libri, articoli
        scientifici e risorse online riportati sul sito virtuale.unibo.it.
      Metodi didattici: Il corso comprende lezioni frontali e discussioni in aula.
        L'interazione in classe è valutata come componente del voto finale.
      Modalità di verifica e valutazione dell'apprendimento: 'Una parte del voto (circa
        il 20%) può essere acquisito attraverso interazioni e presentazioni in aula.
        Tali voti verranno comunicati entro il termine del corso.


        A seconda dell''interazione, l''80% o il 100% del voto si basa su un esame
        orale con due possibilità.


        Entro la sessione invernale (febbraio 2026) gli studenti possono scegliere
        un argomento da approfondire, presentare e discutere nella sessione d''esame.
        L''argomento deve essere preventivamente concordato con il docente.


        Da marzo 2026 la valutazione si basa esclusivamente su di un tipico esame
        orale su tutti gli argomenti del corso.'
      Strumenti a supporto della didattica: Tutto il materiale didattico sarà messo
        a disposizione degli studenti sul sito virtuale.unibo.it subito dopo il termine
        di ciascuna lezione.
      Orario di ricevimento: Consulta il sito web di Michele Colajanni (https://www.unibo.it/sitoweb/michele.colajanni)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/504413
    title: 2025/2026 Cybersecurity Governance — University of Bologna
    contents:
      Learning outcomes: The course aims to provide the knowledge to understand and
        assess the main threats to information and social systems from cyber-attacks
        as well as the main ways to mitigate the risks in public and private organisations.
        Upon completion of the course, the student will be able to apply the acquired
        knowledge to deal with cyber risks in multiple organisational contexts by
        defining priorities for intervention.
      Course contents: 'The course addresses the strategic and management issues of
        cybersecurity from the perspective of states and public and private organizations
        of various sizes.


        After describing the current digital landscape, the course addresses the priority
        objectives of each entity, along with the cyber threats and internal vulnerabilities
        that jeopardize these objectives.


        Cyber risks must be assessed to define intervention priorities for prevention,
        detection, and response.


        For each phase, risk management must operate at the following levels:


        - strategic

        - management

        - operational


        The final section will address other risks and countermeasures related to:


        - disinformation

        - cyber conflict

        - smart society

        - Artificial Intelligence


        The use of AI tools for cybersecurity management is not prohibited, but encouraged,
        provided it is declared and the results are shared by the class.'
      Readings/Bibliography: Slides, lecturer notes, book chapters, scientific articles,
        and online resources are available on virtuale.unibo.it.
      Teaching methods: Il corso comprende lezioni frontali e discussioni in aula.
        L'interazione in classe è valutata come componente del voto finale
      Assessment methods: 'Part of the grade (approximately 20%) can be earned through
        classroom interactions and presentations. These grades will be communicated
        by the end of the course.


        Depending on the interaction, 80% or 100% of the grade is based on an oral
        exam with two options.


        By the winter session (February 2026), students may choose a topic to explore,
        present, and discuss in the exam session. The topic must be agreed upon in
        advance with the instructor.


        From March 2026, the evaluation will be based exclusively on a typical oral
        exam covering all course topics.'
      Teaching tools: All teaching materials will be made available to students on
        the virtuale.unibo.it website immediately after each lesson.
      Office hours: See the website of Michele Colajanni (https://www.unibo.it/sitoweb/michele.colajanni/en)
