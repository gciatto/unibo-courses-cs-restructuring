    title: 2025/2026 TECNOLOGIE WEB (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le tecnologie più importanti utilizzate in ambito World Wide Web. È in grado
        di scrivere documenti nei linguaggi del Web, di curarne l'aspetto visivo,
        di verificarne la correttezza e universalità, e di realizzare semplici applicazioni
        distribuite sul Web.
      Contenuti: 'Il corso si occupa delle principali tecnologie Web, con enfasi sia
        su aspetti teorici che pratici.


        Le lezioni sono divise in due parti, di cui la seconda opzionale per gli studenti
        che mutuano il corso, per le lauree in Lettere, Scienze della Comunicazione
        e Filosofia.


        Parte I: Tecnologie Web di base


        - Princìpi ed evoluazione del World Wide Web, organismi e processi di standardizzazione

        - Protocolli e Architettura delle applicazioni: URI, HTTP, REST, progettazione
        API

        - Linguaggi di markup e XML

        - HTML

        - CSS

        - Javascript e Ajax


        Parte II: Sviluppo backend e framework client-side


        - Tecnologie server-side per applicazioni web: NodeJs e e framework server-side

        - Introduzione ai framework client-side: Vue, React, Angular'
      Testi/Bibliografia: 'Vista la rapida evoluzione della materia, non viene usato
        un unico testo di riferimento.


        Tutto il materiale didattico sarà reso disponibile sulla piattaforma Virtuale,
        inclusi riferimenti a materiale on-line di approfondimento e risorse utili
        per esercitarsi.'
      Metodi didattici: 'Inizio e svolgimento lezioni


        Il corso si terrà nel primo semestre.


        Prerequisiti


        Il corso assume conoscenze di base di programmazione, necessarie per affrontare
        la parte su Javascript e la programmazione client-side e server-side.


        Non sono richieste conoscenze di HTML, CSS e Javascript che saranno invece
        argomenti delle lezioni.


        Lezioni ed esercitazioni


        Il corso prevede sia lezioni frontali che esercitazioni in aula sugli argomenti
        trattati, condotte sia dal docente che dal tutor.


        La frequenza non è obbligatoria ma consigliata. Non impatta comunque sulla
        valutazione finale.


        Le slide e gli esempi di codice saranno disponibili su Virtuale.


        La piattaforma Virtuale sarà inoltre usata per rendere disponibili esercizi
        d''esame, tra cui alcuni completi di soluzioni.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale prevede
        una prova di laboratorio.


        A differenza dei precedenti anni accademici non è prevista la consegna di
        un progetto.


        Per gli studenti che hanno consegnato il progetto in passato il voto resta
        valido e sarà sommato al voto della prova di laboratorio.


        Un voto sufficiente ottenuto nella prova di laboratorio resta valido per l''intero
        anno accademico.


        Prova di laboratorio


        La prova di laboratorio è pensata per verificare sia la preparazione teorica
        che le competenze pratiche degli studenti.


        Si compone di due parti ma la prova è unica e si svolge nella stessa data
        e ora, prenotata su AlmaEsami. L''esame si svolge obbligatoriamente in presenza
        in laboratorio.


        La prima parte consiste nel rispondere a domande di teoria. In particolare
        si richiede di rispondere a quattro domande a risposta multipla e una domanda
        aperta in un tempo di 20 minuti. Si possono ottenere al massimo 8 punti, che
        saranno sommati al voto della seconda parte.


        La seconda parte consiste nello svolgimento di tre esercizi sugli argomenti
        del corso. In particolare è sempre presente un esercizio su HTML/CSS e uno
        su Javascript, entrambi obbligatori per gli studenti di Informatica per il
        management. Il mancato svolgimento di uno tra questi due esercizi, quindi,
        preclude la possibilità di superare l''esame.


        La prova ha una durata di due ore o due ore e mezza, in base alla complessità
        degli esercizi. Si possono ottenere al massimo 24 punti che saranno sommati
        al volto della prima parte.


        Durante lo svolgimento degli esercizi, quindi solo nella seconda parte, è
        ammesso accedere a tutto il materiale del corso pubblicato su Virtuale, incluse
        sia le slide che il materiale delle esercitazioni svolte in aula.


        Sono garantiti sei appelli d’esame all’anno, nonché l’adattamento della prova
        per studenti con DSA, previa richiesta di autorizzazione con le modalità suggerite
        dagli uffici DSA di Ateneo.


        Formazione obbligatoria per accedere ai laboratori


        Per accedere ai laboratori, è obbligatorio seguire la formazione sulla sicurezza
        sui luoghi di lavoro, moduli 1 e 2 in modalità e-learning: https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio'
      Strumenti a supporto della didattica: 'Laboratorio GNU/ Linux Ercolani:


        - 52 PC fissi per studenti con accesso a Internet

        - 45 postazioni per portatili studenti.

        - Indirizzo: Scuole Ercolani, Mura Anteo Zamboni 2/B – Bologna


        In tutte le postazioni è installato il sistema operativo Debian.


        Le macchine sono dotate di processori Intel Core I5-4590 a 3,30 GHz e di 8
        GB di RAM. I PC sono utilizzabili da remoto 24 ore al giorno e 7 giorni su
        7.


        Questo laboratorio è sottoposto al controllo degli accessi, per cui l''accesso
        è consentito solo mediante l''utilizzo del badge studenti, rilasciato dalla
        Segreteria Studenti della Scuola di Scienze (via Zamboni 33). Dal momento
        del rilascio potrebbero essere necessari alcuni giorni per ottenere l''abilitazione
        all''accesso.'
      Orario di ricevimento: Consulta il sito web di Angelo Di Iorio (https://www.unibo.it/sitoweb/angelo.diiorio)
