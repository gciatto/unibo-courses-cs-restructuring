syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/447115
    title: 2025/2026 SISTEMI OPERATIVI T (L-Z) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza dei principi di organizzazione
        e di funzionamento dei moderni sistemi operativi. Conoscenza e capacità di
        applicazione degli strumenti per lo sviluppo di applicazioni di sistema.
      Contenuti: "Introduzione ai sistemi operativi:\n\n- Che cos'è un sistema operativo:\
        \ ruolo, funzionalità e struttura\n- Evoluzione dei sistemi operativi: batch,\
        \ multiprogrammazione, time-sharing\n- Richiami sul funzionamento di un elaboratore:\
        \ interruzioni e loro gestione, I/O, modi di funzionamento single e dual,\
        \ system call\n  Organizzazione di un Sistema Operativo\n- Funzionalità\n\
        - Struttura: sistemi monolitici e modulari, sistemi stratificati, macchina\
        \ virtuale\n- Organizzazione e funzionalità del sistema operativo UNIX/Linux\n\
        - Organizzazione e funzionalità del sistema operativo MSWindowsXP\n  Processi\
        \ e Thread\n- Il concetto di processo pesante/leggero e sua rappresentazione\
        \ nel sistema operativo\n- Stati di un processo\n- Gestione dei processi leggeri/pesanti\
        \ da parte del SO\n- Operazioni sui processi\n- Classificazione dei processi\n\
        - La gestione dei processi in UNIX/Linux:\n  \n  - stati, rappresentazione,\
        \ gestione (scheduling), operazioni e comandi relativi ai processi\n    Scheduling\
        \ della CPU\n- Concetti generali: code, preemption, dispatcher\n- Criteri\
        \ di scheduling\n- Algoritmi di scheduling: FCFS, SJF, con priorità, round-robin,\
        \ con code multiple\n- Scheduling in UNIX, Linux e WinXP\n  Interazione tra\
        \ processi mediante memoria condivisa\n- il problema della sincronizzazione\
        \ tra processi\n- sezione critica e mutua esclusione\n- i semafori\n- strumenti\
        \ hardware per la sincronizzazione: test-and-set\n  Interazione tra processi\
        \ mediante scambio di messaggi:\n- comunicazione diretta/indiretta,simmetrica/asimmetrica,\
        \ buffering\n- interazione tra processi Unix: pipe e fifo, sincronizzazione\
        \ tramite segnali\n  Gestione del File System\n- file system e sua realizzazione\n\
        - il file system di UNIX:\n  \n  - organizzazione logica e fisica, comandi\
        \ e system call per la gestione e l'accesso a file/direttori\n    Gestione\
        \ della Memoria\n- spazi degli indirizzi e binding\n- allocazione della memoria\
        \ contigua:\n  \n  - a partizione singola e partizioni multiple; frammentazione;\n\
        - allocazione non contigua:\n  \n  - paginazione, segmentazione\n- memoria\
        \ virtuale\n- gestione della memoria in UNIX/Linux\n  Programmazione shell\n\
        - Introduzione alla Linux bash shell\n- comandi come filtri\n- Piping e ridirezione\n\
        - Espansione metacaratteri\n- Strutture di controllo\n- Sviluppo di file comandi\n\
        \  Programmazione Concorrente\n- Il problema della mutua esclusione e possibili\
        \ soluzioni.\n- strumenti di sincronizzazione nel modello a memoria comune:\
        \ il semaforo\n- costrutti linguistici per la sincronizzazione: il monitor\n\
        - sincronizzazione tra thread java\n  Gestione dell'I/O\n- architettura del\
        \ sottosistema di I/O\n- device driver\n- Gestione dei dispositivi a controllo\
        \ di programma, tramite interruzioni, con DMA."
      Testi/Bibliografia: 'P. Ancilotti, M. Boari, A. Ciampolini, G. Lipari: Sistemi
        Operativi, seconda edizione, McGraw-Hill, 2008.'
      Metodi didattici: 'LEZIONI (Modulo 1):


        Durante le lezioni in aula verranno discussi sia gli aspetti teorici che progettuali/realizzativi
        dei sistemi operativi moderni. Gli argomenti trattati verranno esemplificati
        facendo principalmente riferimento al sistema GNU/Linux


        ESERCITAZIONI (Modulo 2):


        Parte integrante del corso è rappresentata dalle esercitazioni in laboratorio,
        svolte nel Modulo 2. Le esercitazioni sono individuali e pratiche ed hanno
        lo scopo di fornire la possibilitá a ogni studente di potersi misurare nello
        sviluppo di applicazioni di sistema in ambiente GNU/Linux e nella programmazione
        concorrente in Java.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione avviene
        mediante:


        1. una prova scritta TEORICA sui concetti trattati a lezione;

        2. una prova PRATICA/PROGETTUALE, da svolgersi in laboratorio, per verificare:


        - Capacità di sviluppo di programmi di sistema e script nell''ambiente GNU/linux

        - Capacità di programmazione concorrente in Java


        1. Una prova orale facoltativa.'
      Strumenti a supporto della didattica: 'Le lezioni si svolgeranno anche con il
        supporto di un computer collegato ad un videoproiettore mediante il quale
        potranno essere esemplificati concretamente i concetti esposti.


        L''attività di laboratorio si svolgerà nei laboratori informatici della sede
        di Ingegneria, nei quali ci sarà un personal computer a disposizione di ogni
        studente.'
      Link ad altre eventuali informazioni: https://virtuale.unibo.it
      Orario di ricevimento: 'Consulta il sito web di Anna Ciampolini (https://www.unibo.it/sitoweb/anna.ciampolini)


        Consulta il sito web di Daniela Loreti (https://www.unibo.it/sitoweb/daniela.loreti)'
