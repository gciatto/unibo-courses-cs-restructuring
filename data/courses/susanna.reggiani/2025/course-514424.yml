        with solutions will be available to students via the distribution list or
        in https://www.unibo.it/sitoweb/susanna.reggiani/contenuti-utili'
      Office hours: See the website of Susanna Reggiani (https://www.unibo.it/sitoweb/susanna.reggiani/en)
