    title: 2025/2026 MICROELETTRONICA M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrazione dei metodi di fabbricazione
        dei circuiti integrati. Analisi del funzionamento dei principali dispositivi
        a semiconduttore. Introduzione ai dispositivi di ultima generazione. Analisi
        di alcuni sensori integrati. Progettazione assistita dal calcolatore.
      Contenuti: 'Prerequisiti/Propedeuticità consigliate


        Lo studente deve possedere le nozioni di tipo matematico e fisico tipiche
        di un corso di Laurea triennale in Ingegneria o Fisica. La frequenza di altri
        insegnamenti della Laurea Magistrale non è un prerequisito per la frequenza
        di Microelettronica.


        Introduzione


        Presentazione del corso. Scopi del corso. Orario delle lezioni e di ricevimento.
        Nozioni che si suppongono già acquisite in precedenza da parte degli Studenti.
        Modalità dell''esame e iscrizione agli appelli. Programma. Bibliografia.


        Programma


        Generalità sull''importanza industriale dei sistemi elettronici. Diffusione
        e pervasività dei microprocessori. I principali processi di fabbricazione
        di circuiti integrati.


        Reticoli cristallini. Definizioni generali. Vettori caratteristici. Cella
        elementare. Reticolo diretto e reticolo reciproco. Prima zona di Brillouin.
        Il reticolo cubico a facce centrate. Indici di Miller. Esempi: la struttura
        del diamante e quella della zincoblenda.


        Richiami di meccanica lagrangiana e hamiltoniana. Cenni sulla relazione di
        dispersione E(k) in un cristallo. Densità degli stati nello spazio k. Forma
        delle bande di conduzione e valenza nel silicio. Tipi di transizioni: intravalle,
        intervalle, interbanda dirette, interbanda assistite da trappole. Forma delle
        bande nel germanio e nell''arseniuro di gallio.


        Sviluppo della relazione E(k) nell''intorno di un estremo di una banda. Definizione
        e calcolo della densità degli stati in energia. Statistica di Fermi. Funzione
        di distribuzione. Il caso limite dell''equilibrio. Concentrazione degli elettroni
        nelle bande. Concetto di lacuna. Definizione della concentrazione di elettroni
        e lacune a partire dalla funzione di distribuzione. Classificazione dei cristalli
        in conduttori, isolanti e semiconduttori.


        Calcolo della concentrazione intrinseca all''equilibrio. Posizione del livello
        di Fermi intrinseco. Valori delle grandezze notevoli per i semiconduttori
        di maggior interesse.


        Modello intuitivo del comportamento elettrico di un semiconduttore intrinseco.
        Definizione della densità di corrente di elettroni e lacune a partire dalla
        funzione di distribuzione. Cenno alle relazioni dinamiche per elettroni e
        lacune. Modello intuitivo del comportamento elettrico di un semiconduttore
        drogato.


        Il caso del drogaggio uniforme di tipo donatore. Calcolo delle concentrazioni.
        Approssimazioni di non degenerazione e di completa ionizzazione. Il caso del
        drogaggio uniforme di tipo accettore. Calcolo delle concentrazioni. Approssimazione
        di non degenerazione e di completa ionizzazione. Effetto della temperatura
        e della concentrazione del drogante sulla posizione del livello di Fermi.
        Condizione intrinseca, di saturazione e di congelamento del drogante.


        Il caso del drogante non uniforme. Restringimento del gap causato dal drogaggio.
        Varie espressioni delle concentrazioni di elettroni e lacune all''equilibrio.
        Equazione di Poisson nel semiconduttore.


        Il caso fuori equilibrio. Equazioni di continuità. Condizioni di quasi stazionarietà.
        Equazioni del trasporto di tipo ohmico-diffusivo. Deduzione euristica del
        termine ohmico. Modello matematico dei dispositivi a semiconduttore. Definizione
        e uso degli pseudopotenziali di Fermi. Condizioni al contorno del modello.


        Transizioni assistite da trappole. Modello matematico comprendente la dinamica
        delle cariche intrappolate. Deduzione della funzione di ricombinazione SRH.
        Casi limite della funzione di ricombinazione SRH: completo svuotamento e debole
        iniezione. Ricombinazione Auger e ionizzazione per impatto. Generazioni e
        ricombinazioni dirette di tipo termico e ottico. Andamento del tasso di generazione
        ottica all''interno del materiale. Caso limite della forte ionizzazione.


        Modelli macroscopici della mobilità. Collisioni con il reticolo, le impurezze
        ionizzate e le interfacce. Dipendenza della mobilità dalla temperatura, dalla
        concentrazione complessiva delle impurezze e dal campo normale all''interfaccia.
        Cenno alla dipendenza della mobilità dal gradiente dello pseudopotenziale
        di Fermi. Regola di Mathiessen. Esempio di modello macroscopico di mobilità:
        l''effetto delle impurezze ionizzate. Risultati di calcoli di mobilità a partire
        dalla soluzione dell''equazione di Boltzmann.


        Giunzione p-n: struttura e andamento qualitativo del potenziale. Risultato
        della soluzione dell''equazione di Poisson nel caso dell''equilibrio. Regioni
        neutre e regioni di carica spaziale. Bilanciamento dei termini ohmico e diffusivo
        nel caso dell''equilibrio. Effetto dei contatti. Contatti ohmici ideali. Funzionamento
        qualitativo della giunzioni p-n. Teoria di Shockley. Ipotesi di piccole iniezioni
        e disaccoppiamento delle zone neutre. Calcolo della relazione corrente-tensione
        della giunzione p-n. Dipendenza dalla temperatura della corrente della giunzione
        p-n in polarizzazione inversa. Ipotesi di completo svuotamento della regione
        di carica spaziale nella condizione di polarizzazione inversa. Andamento qualitativo
        della densità di carica, del campo elettrico e del potenziale elettrico. Calcolo
        dell''estensione della regione di carica spaziale in polarizzazione inversa.
        Determinazione della capacità di barriera della giunzione p-n. Richiami sulla
        ionizzazione per impatto. Modello di Chynowetz dei coefficienti di ionizzazione.
        Calcolo degl''integrali di ionizzazione. Esempio di applicazione.


        Transistore bipolare. Funzionamento qualitativo. Calcolo delle correnti. Modello
        di Ebers e Moll. Circuito equivalente a due generatori di corrente. Circuito
        equivalente a un generatore di corrente. Ottimizzazione del guadagno di corrente.


        Struttura del condensatore MOS. Zona neutra e zona di carica spaziale. Relazione
        fra carica del semiconduttore e potenziale superficiale nelle regioni di funzionamento
        del dispositivo. Soluzione dell''equazione di Poisson nel condensatore MOS
        nel caso del drogaggio costante. Condizione di banda piatta. Condizioni di
        svuotamento e di inversione. Relazioni approssimate fra carica per unità di
        area e potenziale superficiale basate sull''ipotesi di completo svuotamento
        e ASCE. Andamento delle bande nella giunzione metallo-semiconduttore. Capacità
        differenziale del condensatore MOS. Relazione fra potenziale superficiale
        e potenziale di gate nel caso impulsato.


        Struttura del transistore MOS. Calcolo della corrente di drain. Ipotesi del
        profilo graduale e conclusione del calcolo delle caratteristiche statiche
        del transistore MOS. Il modello parabolico-lineare. Parametri differenziali
        del transistore MOS a bassa frequenza. Limiti dell''ipotesi del profilo graduale.
        Soluzione dell''equazione di Poisson nel canale del transistore MOS in condizioni
        di fuori equilibrio. Giustificazione dell''ipotesi del profilo graduale. Potenziale
        superficiale al source e al drain.


        Evoluzione dei circuiti integrati. Regole di scala a campo costante. Progettazione
        assistita dal calcolatore: introduzione alle simulazioni numeriche TCAD e
        utilizzo del tool di simulazione.


        Introduzione al formalismo della Meccanica Quantistica: vettori ket/bra, operatori
        lineari, operatori Hermitiani, il problema agli autovalori, osservabili, completezza,
        funzioni di operatori, rappresentazione matriciale di vettori e operatori.
        I postulati della Meccanica Quantistica: quantizzazione, commutatore di operatori
        coniugati, equazione di Schroedinger. Misure di osservabili ed interpretazione
        probabilistica. Principio di indeterminazione di Heisenberg. Sistemi quantistici
        elementari: particella libera, elettrone in una buca di potenziale rettangolare.'
      Testi/Bibliografia: 'I testi elencati devono intendersi come testi di consultazione:


        D. A. Neamen, Semiconductor Physics and Devices, IRWIN, 1992.


