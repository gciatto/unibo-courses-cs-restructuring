syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518551
    title: 2025/2026 INTELLIGENZA ARTIFICIALE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i principali linguaggi, tecniche di modellizzazione e metodi di ragionamento
        che stanno alla base della risoluzione di problemi di intelligenza artificiale.
        In particolare, è in grado di realizzare sistemi 'intelligenti' che, nella
        soluzione di problemi, simulano il comportamento di esperti umani della disciplina
        in oggetto. Inoltre è in grado di modellizzare e risolvere semplici problemi
        di ottimizzazione basati su programmazione a vincoli.
      Contenuti: 'Introduzione all'' intelligenza artificiale.

        Le principali tecnologie e applicazioni dell''intelligenza artificiale.

        La nozione di agente.

        Strategie di ricerca non informata.

        Strategie di ricerca informata.

        Ricerca con avversari.

        Modellazione di problemi con vincoli e CSP: nozioni di base.

        Programmazione logica.

        Programmazione con vincoli, cenni a MiniZinc.

        Introduzione al machine learning.

        Il calcolo sub-simbolico e le reti neurali


        Large language models


        Aspetti economici, etici e filosofici.'
      Testi/Bibliografia: 'Russell, Norvig. Artificial Intelligence: A Modern Approach,
        3rd Edition. Pearson (Intl) 2010 (US edition) and 2016 (Global edition).


        Materiale fornito a lezione.'
      Metodi didattici: Lezioni frontali
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame consiste nello
        sviluppo di un progetto e nella sua presentazione e discussione.


        in ogni anno accademico sono fissati sei “appelli”: due nella prima Sessione
        (Gennaio/Febbraio); tre nella seconda (Giugno/Luglio) e uno nella terza (Settembre).
        Le date degli appelli sono pubblicate su Almaesami e possono subire variazioni.
        Si consiglia di verificare 24 ore prima dello scritto che la data non sia
        cambiata.


        Per partecipare ad un appello d’esame occorre iscriversi su Almaesami entro
        7 giorni dalla data dell’esame. Chi non si iscrive in tempo non potrà sostenere
        l’esame, e dovrà attendere l’appello successivo.


        La verifica avviene con la presentazione del progetto ed eventuali domande
        sugli argomenti del corso.

        Lo studente dovrà quindi dimostrare di aver lavorato attivamente al progetto
        (che viene fatto a gruppi)(

        e di padroneggiare le tecniche principali di AI viste nel corso.


        Il voto dell’esame è stabilito in base ai criteri seguenti:


        - se i contenuti del progetto, la sua esposizione e la discussione sono limitati,
        con limitata padronanza degli argomenti del corso, il voto sarà compreso nell’intervallo
        18-21;

        - se i contenuti del progetto, la sua esposizione e la discussione sono soddisfacenti,
        con sufficiente padronanza degli argomenti del corso, il voto sarà compreso
        nell’intervallo 22-25;

        - se i contenuti del progetto, la sua esposizione e la discussione sono buoni,
        con buona padronanza degli argomenti del corso, il voto sarà compreso nell’intervallo
        26-29;

        - se i contenuti del progetto, la sua esposizione e la discussione sono ottimi,
        con piena padronanza degli argomenti del corso, allora il voto sarà 30 oppure
        30 e lode.


        Al termine della prova orale lo studente saprà il voto conseguito e potrà
        decidere se accettarlo o rifiutarlo. Come da regolamento didattico di ateneo,

        il rifiuto deve essere concesso dal docente almeno una volta sul singolo insegnamento.


        Questo corso è integrato con il corso di 28796 - COMPLEMENTI DI BASI DI DATI,

        di conseguenza la verbalizzazione del voto finale potrà avvenire solo entro
        3 giorni dal conseguimento di entrambi i voti.'
      Strumenti a supporto della didattica: Le lezioni saranno tenute usando slides.
        Durante il corso saranno usati anche alcuni strumenti software specifici per
        IA.
      Orario di ricevimento: 'Consulta il sito web di Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli)


        Consulta il sito web di


        Stefano Pio Zingaro'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518551
    title: 2025/2026 Artificial Intelligence — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student will know the principal
        languages, the modeling techniques and the reasoning methods that are at the
        base of artificial intelligence. In particular the student will be able to
        construct systems that exhibit intelligent behaviours, often simulating the
        behavior of human experts of a specific discipline. Moreover she will be able
        to model and solve simple constraint and optimization problems by using constraint
        programming.
      Course contents: 'Introduction to artificial intelligence.

        The principal technologies and applications of artificial intelligence.

        The notion of agent.

        Non informed search strategies.

        Informed search strategies.

        Search with adversaries.

        Modeling of problems with costraints and CSP: basic notions.

        Logic programming.

        Constraint programming, basic notions of MiniZinc.

        Introduction to machine learning.


        Sub-symbolic computation and neural networks .


        Large language models

        Philosophical aspects and future challenges.'
      Readings/Bibliography: 'Russell, Norvig. Artificial Intelligence: A Modern Approach,
        3rd Edition. Pearson (Intl) 2010 (US edition) and 2016 (Global edition).


        Handouts provided during the course.'
      Teaching methods: Frontal lectures.
      Assessment methods: 'The exam consists of the development of a project and its
        presentation and discussion.


        Each academic year includes six exam sessions (“appelli”): two in the first
        session (January/February), three in the second (June/July), and one in the
        third (September). The dates of the sessions are published on Almaesami and
        may be subject to change. It is recommended to check 24 hours before the written
        exam to ensure that the date has not been modified.


        To take part in an exam session, students must register on Almaesami no later
        than 7 days before the exam date. Students who fail to register on time will
        not be allowed to sit the exam and will have to wait for the next session.


        The assessment consists of the presentation of the project and possible questions
        on the course topics.

        The student must therefore demonstrate that they have actively worked on the
        project (which is carried out in groups) and that they have mastered the main
        AI techniques covered in the course.


        The exam grade is determined according to the following criteria:


        - if the project content, its presentation, and discussion are limited, with
        limited mastery of the course topics, the grade will range between 18–21;

        - if the project content, its presentation, and discussion are satisfactory,
        with sufficient mastery of the course topics, the grade will range between
        22–25;

        - if the project content, its presentation, and discussion are good, with
        good mastery of the course topics, the grade will range between 26–29;

        - if the project content, its presentation, and discussion are excellent,
        with full mastery of the course topics, the grade will be 30 or 30 with honors
        (“30 e lode”).


        At the end of the oral exam, the student will be informed of the grade obtained
        and may decide whether to accept or refuse it. According to the university’s
        academic regulations, the possibility to refuse the grade must be granted
        by the instructor at least once for each course.


        This course is integrated with course 28796 – COMPLEMENTI DI BASI DI DATI.

        Consequently, the final grade can only be recorded within 3 days of obtaining
        both grades.'
      Teaching tools: We will use slides and specific software tools for AI applications
      Office hours: 'See the website of Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli/en)


        See the website of


        Stefano Pio Zingaro'
