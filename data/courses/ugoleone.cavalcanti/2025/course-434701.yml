syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/434701
    title: 2025/2026 CALCOLATORI ELETTRONICI T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza dei principi architetturali dei
        calcolatori elettronici. Unità centrale di elaborazione, unità di memoria,
        unità di I/O. Coprocessori e controllori periferici.
      Contenuti: Evoluzione tecnologica dei calcolatori - Metodologie di progetto
        dei calcolatori elettronici - Organizzazione gerarchica dei calcolatori -
        Architetture RISC (con riferimento al processore DLX) e confronto con architetture
        CISC - Cenni sulle architetture avanzate - Memorie e decodifiche - Unità di
        controllo sequenziali - Unità di controllo pipelined - Gestione dell' I/O
        - Interruzioni
      Testi/Bibliografia: 'Lucidi disponibili nella piattaforma Virtuale.


        Per approfondimenti (opzionali e non strettamente necessari ):


        - Hennessy Patterson - Computer architecture: a quantitative approach - Cap.
        1..5

        - David A Patterson, John L Hennessy, STRUTTURA E PROGETTO DEI CALCOLATORI,
        Zanichelli,'
      Metodi didattici: Al termine di ogni argomento sono previste esercitazioni svolte
        in aula dagli studenti con successiva e approfondita soluzione svolta in aula
        insieme agli studenti.
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto: domande
        di carattere generale inerenti le tematiche del corso ed esercizi e un progetto
        di un sistema basato su CPU. Per superare l''esame è necessario rispondere
        in modo soddisfacente alle domande ed eseguire il progetto del sistema basato
        su CPU.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnament'
      Strumenti a supporto della didattica: Lucidi ed esercizi, in molti casi con
        dettagliata soluzione, disponibiliin Virtuale.
      Orario di ricevimento: Consulta il sito web di Stefano Mattoccia (https://www.unibo.it/sitoweb/stefano.mattoccia)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/434701
    title: 2025/2026 Electronic Calculators T — University of Bologna
    contents:
      Learning outcomes: The course aims at providing basic computer architecture
        principles focusing on RISC (Reduced Instruction Set Computer) processors
        with a focus on the DLX CPU. The outcome of the course are methodologies to
        design systems based on modern microprocessors focusing on interfacing techniques
        for memory and input/output devices.
      Course contents: Microprocessor evolution - Processor hierarchy and design methodologies
        - RISC architectures and comparison to CISC architectures - Memories and address
        decoding techniques - Sequential control units - Pieplined control units -
        I/O handling - Interrupts
      Readings/Bibliography: 'Slides available in Virtuale.


        Further reading (not strictly required):


        - Hennessy Patterson -Computer architecture: a quantitative approach - Caps.
        1..5 - Morgan Kaufmann pub. Inc.

        - David A Patterson, John L Hennessy, COMPUTER ORGANIZATION AND DESIGN, Morgan
        Kaufmann'
      Teaching methods: At the end of each topic the students will be faced with simple
        exercises for self evaluation purposes. For each proposed exercise, the solution(s)
        will be thoroughly analysed and discussed with the students.
      Assessment methods: 'Written exam: questions regarding the course topics and
        design of a CPU-based system. A satisfactory answer to the questions and the
        design of a CPU-based system is crucial for a positive evaluation.

        The methodologies learned in Logic Design T are essential.'
      Teaching tools: Slides and exercises, often with detailed solution, are available
        in Virtuale.
      Office hours: See the website of Stefano Mattoccia (https://www.unibo.it/sitoweb/stefano.mattoccia/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
