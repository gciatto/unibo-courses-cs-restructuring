  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/535949
    title: 2025/2026 LABORATORIO DI INFORMATICA GRAFICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del modulo lo studente acquisisce
        le conoscenze di base dell''informatica applicata alla rappresentazione grafica
        digitale, le metodologie e gli strumenti pratici per l''utilizzo dei sistemi
        operativi digitali più diffusi nel campo dell''architettura.

        In particolare, lo studente è in grado di:


        - gestire criticamente i formati grafici digitali, nelle caratterizzazioni
        raster e vettoriale;

        - acquisire le conoscenze di base sull''utilizzo di strumenti informatici
        CAD;

        - rappresentare un edificio, o sue parti e componenti, ed è in grado di gestire
        e elaborare disegni tecnici digitali e tavole architettoniche.'
      Contenuti: 'Il corso all''interno del Corso Integrato DISEGNO DELL''ARCHITETTURA
        I ha lo scopo di fornire allo studente tutti gli strumenti fondamentali, teorici
        e pratici, per la corretta rappresentazione del progetto di Architettura atraverso
        l''uso degli strumenti digitali, sia come strumento di disegno indipendente
        sia come integrazione del disegno a mano.


        In particolare saranno previste lezioni in aula ed esercitazioni in laboratorio
        sui seguenti argomenti:


        - Introduzione all''uso dell''elaboratore per applicazioni grafiche: generalità
        sugli elaboratori, CPU, dispositivi di input-output, memoria di lavoro, memoria
        di massa, schede grafiche, sistemi operativi.


        - Grafica raster: generalità, definizione di pixel, metodi colore, risoluzione
        dell''immagine e della periferica, compressione dei dati lossy e non lossy,
        principali formati raster e caratteristiche principali**.**


        Applicazione GIMP.


        - Grafica vettoriale e disegno Tecnico CAD (2D): generalità, funzioni di un
        sistema di disegno interattivo, primitive di disegno e strumenti di modifica,
        layer, stili e spessori di linee, retini, stampa, progettazione e realizzazione
        di un layout grafico, principali formati di disegno vettoriale e formati misti.


        Applicazione Autodesk AutoCAD.'
      Testi/Bibliografia: 'D. Martini, M. Bertolo, A. Rizzi, Comunicazione visiva
        digitale, ed. Addison Welley, Milano, 2001


        L. Santapaga, M. Trasi, AutoCAD guida facile al disegno CAD 2D e 3D, ed. Apogeo,
        2016


        Manuale GIMP: http://gimp.linux.it/www/manual/gimp-help-2/html/it/


        Dispense on-line fornite dal docente.'
      Metodi didattici: 'Il corso è organizzato in lezioni teoriche in aula e una
        serie di lezioni pratiche nel laboratorio CAD, segute da esercizi di verifica
        delle nozioni acquisite.


        Durante l''anno saranno previste una serie di revisioni sul lavoro di gruppo
        e due consegne in itinere degli elaborati, al fine di valutare l''andamendo
        del lavoro.'
      Modalità di verifica e valutazione dell'apprendimento: 'Esame: elaborati e prove


        L’esame del corso integrato di Disegno dell’architettura comprende la verifica
        dell’apprendimento dei contenuti di tutti i moduli/insegnamenti che compongono
        il corso integrato e si svolge in un’unica prova d’esame divisa in due parti.
        Nella prima parte della prova lo studente dovrà presentare le tavole richieste
        del tema di architettura.


        La seconda parte consiste in una prova orale, nella quale viene chiesto allo
        studente di giustificare, dal punto di vista teorico, le costruzioni che sono
        state illustrate nel corso delle lezioni.


        L''esame consiste anche nella valutazione della qualità e della correttezza
        geometrica degli elaborati grafici. Questi elaborati sono:


        · il taccuino, che è un quaderno rilegato, di fogli di carta da disegno, bianchi,
        sul quale lo studente annota e riporta in ordine gli appunti presi a lezione;


        · le tavole realizzate durante le esercitazioni in aula e completate, ove
        necessario, nello studio individuale; questi disegni saranno realizzati su
        fogli di formato minimo A3, ma volendo anche più grandi, di carta ruvida o
        semiruvida adatta alla tecnica dell''acquerello;


        · i file e le stampe A1 relative al disegno digitale delle piante e degli
        alzati dell''edificio assegnato, memorizzati su CD o DVD.


        Il voto d’esame è unico e corrisponde alla valutazione complessiva degli argomenti
        didattici dei tre moduli del corso integrato.


        Gli elaborati e l’orale saranno valutati sulla base dei seguenti criteri a
        cui si assegneranno rispettivamente i punti in elenco.


        1 - Qualità e correttezza geometrica degli elaborati grafici assegnati; per
        un totale fino a un massimo di 18 punti.

        Nello specifico:

        Il taccuino fino a un massimo di 3 punti;

        Le tavole di geometria descrittiva fino a un massimo di 5 punti;

        I file e le stampe A1 del tema architettonico fino a un massimo di 10 punti;


        2 - Verifica della prova orale fino a un massimo di 12 punti.


        Alle Studentesse e agli Studenti con DSA o disabilità temporanee o permanenti
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile, all''indirizzo
        (https://site.unibo.it/studenti-con-disabilita-e-dsa/it [https://site.unibo.it/studenti-con-disabilita-e-dsa/it):]
        ). Sarà cura dell''ufficio proporre eventuali adattamenti, che dovranno comunque
        essere sottoposti, con un anticipo di 15 giorni, all’approvazione del/la docente,
        che ne valuterà l''opportunità anche in relazione agli obiettivi formativi
        dell''insegnamento.'
      Strumenti a supporto della didattica: 'Organizzazione del Corso, iscrizione


        Il Corso si serve del sistema di e-learning dell''Università di Bologna, basato
        su Moodle. Ogni studente, dal proprio computer o servendosi dei computer a
        disposizione nelle aule informatiche, dovrà per prima cosa collegarsi con
        il sito http://elearning.unibo.it/ e leggere attentamente il Manuale Studente,
        nel quale sono riportate anche le modalità di iscrizione. I rapporti didattici
        saranno gestiti attraverso la piattaforma Moodle, che consente agli studenti
        di prelevare i documenti messi a disposizione dal docente (testi, immagini,
        disegni e modelli 3D etc.), di comunicare con il docente stesso o di interagire
        in gruppi di discussione, di caricare documenti da sottoporre a verifica,
        di partecipare a test di valutazione, etc.


        Materiali necessari per il disegno


        E'' necessario che lo studente disponga dei comuni materiali da disegno: uno
        stiratore di circa 50 * 40 cm, matite di durezza H, F e B, penne da disegno,
        una riga da 50 cm, una squadra a 45° e un compasso. Oltre a ciò, è richiesto
        un album di carta pesante a fogli ruvidi o semiruvidi, formato A3 o maggiore
        (30*40 circa), un tubetto di acquerello color seppia (per la resa del chiaroscuro),
        due pennelli sintetici da acquerello, uno fine e uno medio. Infine è richiesto
        un taccuino formato A5, A4 o simile, a fogli bianchi lisci di carta pesante
        (150 g/mq), rilegato.


        Software


        Il docente si servirà, nelle lezioni, di vari programmi (thinkdesign, Rhinoceros,
        3ds max, etc.). Per il disegno digitale è richiesto l''uso di GIMP, software
        libero, e autocad, software che lo studente può ottenere gratuitamente, come
        in seguito specificato. Questi programmi sono anche installati su tutte le
        macchine presenti nelle aule informatiche della Facoltà. Lo studente potrà
        ottenere gratuitamente, per un anno (rinnovabile fino al compimento degli
        studi), la licenza d''uso di AutoCAD. Il software può essere scaricato all''indirizzo:
        http://students.autodesk.com/ .'
      Orario di ricevimento: Consulta il sito web di Enrico Gamberini (https://www.unibo.it/sitoweb/enrico.gamberini2)
