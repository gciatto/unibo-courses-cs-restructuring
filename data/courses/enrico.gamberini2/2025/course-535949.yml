        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/535949
    title: 2025/2026 Lab-based Course on Computer Graphics — University of Bologna
    contents:
      Course contents: 'The course is organized in order to afford the technical and
        theoretical tools for the right representation of the architectural project.

        This course is intended as an overall introduction to information technology
        and to computer use. The course will give to the student the methodology and
        the practical tools in order to work with the applications and with the most
        common operating systems.

        Classroom lessons and laboratory practices will focus on this topics:


        - Introduction to using computer for graphic applications: computer overall,
        CPU, Input/Output devices, random access memory (RAM), mass storage, graphics
        cards, Operating system.


        -Raster graphics: overall, pixel definition, color space, image and device
        resolution, lossy and non-lossy data compression, most common raster formats
        and their main feature, Adobe Photoshop.


        -Vector graphics and tecnical drawing: overall, functions and tools of a drawing
        application, graphic primitives, modify tools, layers, line styles and weight,
        screen frequency, print, design and development of a graphic layout, most
        common vector and vector/raster formats, Autodesk AutoCad.'
      Readings/Bibliography: 'D. Martini, M. Bertolo, A. Rizzi, Comunicazione visiva
        digitale, ed. Addison Welley, Milano, 2001


        L. Santapaga, M. Trasi, AutoCAD guida facile al disegno CAD 2D e 3D, ed. Apogeo,
        2016


        GIMP Manual: https://docs.gimp.org/2.8/en/


        The teacher will provide online handouts.'
      Teaching methods: 'The course consists of two phases:


        -Theoretical lessons in the classroom, with notebook and projector for practical
        examples


        -Practical lessons in the laboratory with exercise in order to verify the
        level of knowledges'
      Assessment methods: 'The exam of Disegno dell’Architettura includes the verification
        of all modules/teaching programmes that form the integrated course. The exam
        consist in one test divided in two parts. In the first part of the test, the
        student must presents the architectural drawings of the case study.


        The second part of the test consists of an oral test, in which the student
        is asked to justify, from the theoretical point of view, the buildings that
        have been discussed during the lectures. The examination also consists in
        assessing the quality and accuracy of geometric drawings. These papers are:


        - the notebook, which is a bound notebook, a sheet of drawing paper, white,
        on which the student notes and reports regarding the notes taken in class;


        · the tables created during the exercises in the classroom and supplemented
        where necessary, in individual study, and these drawings will be made of at
        least A3 size paper, but if you want even larger, rough paper or semiruvida
        suitable for watercolors;


        · The file and prints relating to the digital design of the plants and the
        elevations of the building assigned, stored on CD or DVD.


        The exam mark is unique and corresponds to the overall assessment of the teaching
        topics of the three modules of the integrated course. A different mark will
        be given to both parts of the examination and the final one will be a weighted
        average of the two marks (compared to the credit weights of the various modules).


        The documents and the oral will be assessed on the basis of the following
        criteria to which the points in the list will be assigned respectively.


        1 - Quality and geometric correctness of the graphic drawings assigned; for
        a total of up to 18 points. In particular:

        The notebook up to a maximum of 3 points;

        The descriptive geometry boards up to a maximum of 5 points;

        The architectural theme boards and files up to a maximum of 10 points;


        2 - Verification of the oral exam up to a maximum of 12 points.'
      Teaching tools: 'Organization of the course, enrollment.


        The course makes use of the e-learning at the University of Bologna, based
        on Moodle. Each student, from their computer or using the computers available
        in computer labs, must first connect to the site and read the http://elearning.unibo.it/
        Student Handbook, which are also reported enrollment . The teaching relationship
        will be managed using the Moodle platform, which allows students to take the
        documents provided by the teacher (text, images, drawings and 3D models, etc..),
        To communicate with the teacher himself or interact in discussion groups,
        to upload documents to be audited, to participate in assessment tests, etc..


        Materials needed for the drawing.


        It is necessary that the student has the common drawing materials: a launderer
        of about 50 * 40 cm, pencil hardness of H, F and B, pen drawing, a line of
        50 cm, a team of 45 ° and a compass. In addition, it requested an album of
        heavy paper or coarse semiruvidi charts, A3 size or larger (about 30 * 40),
        a tube of sepia watercolor (for the performance of light and shade), two synthetic
        watercolor brushes, an order and a medium. Finally, a notebook is required
        A5, A4 or similar, smooth white sheets of heavy paper (150 g / m²), bound.


        Software.


        The teacher will use in class, for various programs (thinkdesign, Rhinoceros,
        3ds max, etc..). For digital design requires the use of GIMP, free software,
        and AutoCAD software, the student can get free, as specified below. This programs
        is also installed on all machines in the computer labs of the Faculty. The
        student will be able to get free for one year (renewable until completion
        of studies), the license of AutoCAD. The software can be downloaded at: http://students.autodesk.com/'
      Office hours: See the website of Enrico Gamberini (https://www.unibo.it/sitoweb/enrico.gamberini2/en)
      SDGs: 'Quality education Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
