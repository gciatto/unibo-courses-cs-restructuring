  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/550197
    title: 2025/2026 BASI INFORMATICHE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'E'' in grado di utilizzare in modo efficace
        gli strumenti del pacchetto Office per creare document, analizzare dati e
        preparare presentazioni.

        Acquisisce conoscenze di base sull''intelligenza artificiale

        Sa riconoscere le applicazioni pratiche dell''intelligenza artificiale nel
        contesto prefessionale.'
      Contenuti: 'Questo Insegnamento è componente del Corso Integrato B9090 - Soft
        Skills. Il Corso Integrato B9090 - SOFT SKILLS contribuisce al raggiungimento
        delle seguenti ESEVT Day One Competences: 1.1, 1.4, 1.6, 1.11, 1.12.


        Il corso BASI DI INFORMATICA affronterà i concetti e gli strumenti fondamentali
        per un utilizzo efficace e consapevole delle tecnologie digitali in ambito
        accademico e professionale.


        Nello specifico, le lezioni affronteranno i seguenti temi:


        - Introduzione all''informatica: concetti di base (Hardware, Software, Reti),
        architettura di un computer e sistemi operativi (1 ora)

        - Elaborazione testi e presentazioni creare e formattare documenti di testo,
        gestire stili, indici e bibliografie. Tecniche e strumenti per creare presentazioni
        chiare, professionali ed efficaci. (2 ore)

        - Fogli di calcolo (Spreadsheets): organizzare dati, utilizzare formule e
        funzioni fondamentali, creare grafici per l''analisi e la visualizzazione
        dei dati. (2 ore)

        - Comunicazione e collaborazione online: posta elettronica professionale,
        cloud storage, strumenti per il lavoro di gruppo (es. Office 365, Teams, OneDrive).
        (1 ora)

        - Sicurezza informatica e privacy: riconoscere le principali minacce (virus,
        malware, phishing), proteggere i propri dispositivi, i propri dati e la propria
        identità digitale. (1 ora)

        - Introduzione a nuovi strumenti: utilizzo degli strumenti di intelligenza
        artificiale, utilizzo di software per l’informatica medica (1 ora)'
      Testi/Bibliografia: 'Il materiale didattico dell''insegnamento (slide, esercitazioni,
        guide) è disponibile sulla piattaforma Virtuale (https://virtuale.unibo.it/
        ).


        Testi per approfondimenti:


        - Rosati, Alberto (2025) Informatica medica. Una guida ai Sistemi Informativi
        Sanitari. McGraw-Hill Education

        - Marengo A. e Pagano A (2021) Informatica di base. Con Connect. Con aggiornamento
        online McGraw-Hill Education


        Saranno inoltre forniti link a guide online e risorse web di riferimento.'
      Metodi didattici: 'L''insegnamento si compone di lezioni teoriche frontali ed
        esercitazioni pratiche guidate in laboratorio informatico.


        Le lezioni teoriche sono frontali, supportate da slide e dimostrazioni pratiche.
        Le esercitazioni pratiche si svolgono a postazione individuale nel laboratorio
        informatico per applicare direttamente i concetti appresi. La finalità è quella
        di promuovere un apprendimento attivo da parte dello studente e di svilupparne
        le capacità di problem-solving.


        Gli studenti e le studentesse con disabilità e bisogni speciali che abbiano
        necessità di adattamenti, supporto e modifiche in aula o in sede di esame
        sono pregati/e di esprimere le loro necessità alla docente il prima possibile
        (all’inizio del corso) e/o contattare il servizio UNIBO per studenti e studentesse
        con bisogni speciali (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ).'
      Modalità di verifica e valutazione dell'apprendimento: 'Esame di Corso Integrato


        Questo insegnamento è parte del Corso Integrato (C.I.) 09090 - SOFT SKILLS.
        L’esame si svolgerà in una unica seduta per l’intero C.I. e includerà tutti
        i moduli che lo compongono. Per superare l’esame, sarà necessario raggiungere
        o superare la soglia di sufficienza (circa 60%, corrispondente a 18/30) in
        ognuno degli insegnamenti che compongono il C.I. Se una o più delle parti
        del corso integrato non vengono superate, sarà necessario ripetere l’intero
        esame.


        Struttura dell’esame B9254 - BASI DI INFORMATICA e schema di valutazione per
        l’insegnamento La verifica dell''apprendimento sarà effettuata mediante una
        prova scritta (per una durata indicativa di circa 30 minuti).


        La prova sarà strutturata come segue:


        - cinque quesiti a risposta multipla su concetti teorici, ciascuno con una
        risposta corretta su quattro possibili risposte .

        - un quesito a risposta aperta con possibilità di svolgimento di un problema
        di informatica.


        La valutazione sull’insegnamento verrà espressa su una scala da 18 a 30L,
        in base allo schema di valutazione qui riassunto:


        - 18-19: con un minimo aiuto da parte della docente, il Candidato/a è in grado
        di identificare rispondere parzialmente ai quesiti.

        - 20-24: il Candidato/a mostra una conoscenza degli aspetti di base ed è in
        grado di rispondere autonomamente alle domande proposte, utilizzando un linguaggio
        nel complesso corretto.

        - 25-29: il Candidato/a esprime un giudizio completo sugli aspetti informatici
        proposti con argomentazioni complete.

        - 30-30L: il Candidato/a è in grado di rispondere correttamente a tutte le
        domande e discute in modo critico ai concetti proposti.


        Valutazione finale di corso integrato, registrazione e altre informazioni
        utili


        L’esame si intende superato se si è ottenuto esito positivo in tutte le prove
        previste e il voto finale è dato dalla media dei voti conseguiti nelle diverse
        parti dell’esame, espressa in trentesimi. È necessario ottenere un voto finale
        minimo di 18/30. La valutazione negativa non comporta l''attribuzione di un
        voto, ma solo un giudizio (ritirato o respinto) riportato sul verbale elettronico
        compilato su AlmaEsami, pertanto non influisce sulla carriera dello studente.
        È possibile iscriversi agli appelli d’esame tramite AlmaEsami (http://almaesami.unibo.it/
        ). Gli appelli vengono proposti nell''ambito delle finestre riportate nel
        calendario didattico. Ulteriori sessioni d’esame sono riservate agli studenti
        fuori corso. In caso non venisse superato, l’esame può essere ri-sostenuto
        dopo un minimo di due settimane. Nel rispetto dei regolamenti didattici Unibo
        (Articolo 16, Paragrafo 5), gli studenti che abbiano superato l’esame con
        una valutazione che ritengono insoddisfacente hanno il diritto di rifiutare
        il voto in una occasione, comunicandolo al docente verbalizzante via e-mail
        entro 5 giorni lavorativi. Il docente verbalizzante di questo Corso è XXX


        Studenti/esse con DSA o disabilità temporanee o permanenti: In ottemperanza
        alle leggi 104/1992 e 170/2010, e delle politiche istituzionali di inclusione,
        gli studenti e le studentesse con disabilità certificate o disturbi specifici
        dell’apprendimento, nonché coloro con bisogni educativi speciali riconosciuti,
        hanno diritto ad avere gli adeguati adattamenti durante gli esami. Si raccomanda
        di contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        ). Sarà sua cura proporre agli/alle studenti/esse interessati/e eventuali
        adattamenti, che dovranno comunque essere sottoposti, con un anticipo di 15
        giorni, all’approvazione del/della docente, che ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell''insegnamento. Un membro
        della facoltà ha l’incarico di supervisionare questo servizio all’interno
        del Dipartimento (https://scienzemedicheveterinarie.unibo.it/it/dipartimento/organizzazione/referenti-istituzionali
        ).'
      Strumenti a supporto della didattica: '- Videoproiettore

        - Laboratorio Informatico con PC a disposizione degli studenti

        - Piattaforma e-learning Virtuale


        In caso di difficoltà nella comprensione della materia, il docente è disponibile
        a ricevere lo studente per un colloquio di chiarimento previo appuntamento
        via mail.'
      Orario di ricevimento: Consulta il sito web di Yari Vecchio (https://www.unibo.it/sitoweb/yari.vecchio)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/550197
    title: 2025/2026 Basic IT Skills — University of Bologna
    contents:
      Learning outcomes: He/she is able to effectively use the tools of the Office
        suite to create, analyse and present documents, spreadsheets and presentations.
        They will also have acquired basic knowledge of artificial intelligence and
        will be able to recognise its practical applications in a professional context.
      Course contents: 'This course is part of the Integrated Course B9090 - Soft
        Skills. The Integrated Course B9090 - SOFT SKILLS contributes to the achievement
        of the following ESEVT Day One Competences: 1.1, 1.4, 1.6, 1.11, 1.12.


        The BASICS OF COMPUTER SCIENCE course will address the fundamental concepts
        and tools for the effective and informed use of digital technologies in academic
        and professional settings.


        Specifically, the lessons will cover the following topics:


        - Introduction to computer science: basic concepts (hardware, software, networks),
        computer architecture, and operating systems (1 hour)

        - Word processing and presentations: creating and formatting text documents,
        managing styles, indexes, and bibliographies. Techniques and tools for creating
        clear, professional, and effective presentations. (2 hours)

        - Spreadsheets: organizing data, using basic formulas and functions, creating
        charts for data analysis and visualization. (2 hours)

        - Online communication and collaboration: professional email, cloud storage,
        tools for teamwork (e.g., Office 365, Teams, OneDrive). (1 hour)

        - Cybersecurity and privacy: recognizing the main threats (viruses, malware,
        phishing), protecting your devices, data, and digital identity. (1 hour)

        - Introduction to new tools: using artificial intelligence tools, using medical
        informatics software (1 hour)'
      Readings/Bibliography: 'The teaching materials (slides, exercises, guides) are
        available on the Virtual platform (https://virtuale.unibo.it/).


        Further reading:


        - Rosati, Alberto (2025) Medical Informatics: A Guide to Health Information
        Systems. McGraw-Hill Education

        - Marengo A. and Pagano A (2021) Basic Informatics: With Connect. With online
        updates. McGraw-Hill Education


        Links to online guides and web resources will also be provided.'
      Teaching methods: 'The course consists of theoretical lectures and guided practical
        exercises in the computer lab.


        The theoretical lectures are supported by slides and practical demonstrations.
        The practical exercises take place at individual workstations in the computer
        lab, allowing students to directly apply the concepts they have learned. The
        aim is to promote active learning on the part of the student and to develop
        their problem-solving skills.


        Students with disabilities and special needs who require adaptations, support,
        and modifications in the classroom or during exams are asked to express their
        needs to the instructor as soon as possible (at the beginning of the course)
        and/or contact the UNIBO service for students with special needs (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ).'
      Assessment methods: 'Integrated Course Exam


        This course is part of the Integrated Course (IC) 09090 - SOFT SKILLS. The
        exam will take place in a single session for the entire IC and will include
        all the modules that comprise it. To pass the exam, students must achieve
        or exceed the pass mark (approximately 60%, corresponding to 18/30) in each
        of the courses that make up the IC. If one or more parts of the integrated
        course are not passed, the entire exam must be retaken.


        Structure of the B9254 - BASICS OF COMPUTER SCIENCE exam and assessment scheme
        for the courseLearning will be assessed through a written test (lasting approximately
        30 minutes).


        The test will be structured as follows:


        - five multiple-choice questions on theoretical concepts, each with one correct
        answer out of four possible answers.

        - One open-ended question with the possibility of solving a computer science
        problem.


        The course will be graded on a scale from 18 to 30L, based on the grading
        scheme summarized here:


        - 18-19: With minimal help from the instructor, the candidate is able to identify
        and partially answer the questions.

        - 20-24: the candidate demonstrates knowledge of the basic aspects and is
        able to answer the questions independently, using generally correct language.

        - 25-29: the candidate expresses a comprehensive opinion on the IT aspects
        proposed, with complete arguments.

        - 30-30L: the candidate is able to answer all questions correctly and critically
        discusses the concepts proposed.


        Final assessment of the integrated course, registration, and other useful
        information


        The exam is considered passed if a positive result has been obtained in all
        the tests and the final grade is given by the average of the grades obtained
        in the different parts of the exam, expressed in thirtieths. A minimum final
        grade of 18/30 is required. A negative assessment does not result in a grade
        being awarded, but only in a judgment (withdrawn or rejected) recorded in
        the electronic report compiled on AlmaEsami, and therefore does not affect
        the student''s career. You can register for exam sessions via AlmaEsami (http://almaesami.unibo.it/
        ). Exam sessions are offered within the windows indicated in the academic
        calendar. Additional exam sessions are reserved for students who are behind
        in their studies. If you fail the exam, you can retake it after a minimum
        of two weeks. In accordance with Unibo teaching regulations (Article 16, Paragraph
        5), students who have passed the exam with a grade they consider unsatisfactory
        have the right to refuse the grade on one occasion, communicating this to
        the recording teacher by email within 5 working days. The recording teacher
        for this course is XXX


        Students with SLDs or temporary or permanent disabilities: In accordance with
        Laws 104/1992 and 170/2010, and institutional inclusion policies, students
        with certified disabilities or specific learning disorders, as well as those
        with recognized special educational needs, are entitled to appropriate accommodations
        during exams. It is recommended that you contact the relevant university office
        (https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti ) in
        good time. This office will propose any necessary accommodations to the students
        concerned, which must in any case be submitted 15 days in advance for approval
        by the instructor, who will evaluate their appropriateness in relation to
        the educational objectives of the course. A faculty member is responsible
        for supervising this service within the Department (https://scienzemedicheveterinarie.unibo.it/it/dipartimento/organizzazione/referenti-istituzionali
        ).'
      Teaching tools: '- Video projector

        - Computer lab with PCs available for student use

        - Virtual e-learning platform


        If students have difficulty understanding the subject matter, the instructor
        is available to meet with them for clarification by appointment via email.'
      Office hours: See the website of Yari Vecchio (https://www.unibo.it/sitoweb/yari.vecchio/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
