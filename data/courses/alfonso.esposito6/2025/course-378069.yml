  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/378069
    title: 2025/2026 BASI  DI DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce il modello dei dati relazionale ed i principali costrutti del linguaggio
        SQL;

        - è in grado di progettare e realizzare una base di dati;

        - è capace di elaborare un progetto per la realizzazione di un sistema informatico.'
      Contenuti: 'Il programma del corso è suddiviso in quattro parti, all''interno
        delle quali si affrontano tematiche complementari legate all''ambito delle
        basi di dati e dei sistemi informativi. Nella prima parte, vengono introdotti
        i concetti di base del corso (dato, informazione, base di dati, etc), le caratteristiche
        del modello relazionale e dei DBMS relazionali, e le principali funzionalità
        del linguaggi per le operazioni CRUD sui dati. A tal proposito, vengono illustrate
        in maniera dettagliata le caratteristiche del linguaggio SQL per la creazione,
        modifica ed interrogazione di basi di dati relazionali. Inoltre,vengono forniti
        cenni ad approcci alternativi al modello relazionale (database NoSQL), ed
        alle tecnologie per la gestione dei big data. La seconda parte presenta metodologie
        e strumenti per la progettazione di basi di dati a partire dell''analisi dei
        requisiti di sistema. Vengono presentate in dettaglio le fasi tradizionalmente
        legate all''ingegneria del software per la progettazione dei dati, ossia analisi
        dei requisiti, progettazione concettuale, progettazione logica, progettazione
        fisica, analisi delle prestazioni dei modelli, tecniche di normalizzazione.
        La terza parte fornisce una (breve) panoramica su tecniche ed algoritmi di
        data-mining basati su metodi supervised ed unsupervised, per la creazione
        di modelli di classificazione e di predizione a partire dai dati contenuti
        in un database. Vengono forniti esempi di applicazioni di tali tecniche in
        ambito industriale e business. Infine, la quarta parte introduce le caratteristiche
        principali dei sistemi informativi sul Web (WIS), e presenta alcune tecnologie
        utilizzate per lo sviluppo di applicazioni Web in grado di interfacciarsi
        con database SQL.

        Segue l''elenco sommario degli argomenti del corso:


        Introduzione del corso: informazioni, dati e DBMS


        Modelli e Linguaggi per Basi di Dati


        - Il modello relazionale: concetti di base, vincoli di integrita'' e chiavi

        - Caratteristiche dei Database Management Systems (DMBS) relazionali

        - Il linguaggio SQL: definizione dei dati, modifica dei dati, interrogazioni,
        definizione di viste, transazioni.

        - Approcci alternativi al modello relazionale, NoSQL (cenni) e tecnologie
        per i big data (cenni)


        Progettazione di Basi di Dati


        - Progettazione concettuale: il modello E/R, raccolta ed analisi di requisiti,
        strategie di progettazione concettuale, verifica di qualita''.

        - Progettazione logica: ristrutturazione degli schemi E/R, traduzione nel
        modello relazionale, analisi di qualità di schemi E/R.

        - Tecniche di normalizzazione: forme normali (Boyce-Codd, terza forma normale),
        decomposizione in forma normale.

        - Progettazione fisica: indici e tecniche per la memorizzazione dei dati


        Introduzione al data-mining


        - Cenni generali e scenari applicativi delle tecniche di data-mining

        - Algoritmi di classificazione e clustering


        DBMS per Applicazioni


        - Esempi di DBMS: MySQL, MongoDB, Cassandra.

        - SQL e Linguaggi di scripting server-side (PHP+MySQL).'
      Testi/Bibliografia: 'Il testo di riferimento del corso è il seguente:


        - Paolo Atzeni, Stefano Ceri, Stefano Paraboschi, Riccardo Torlone, "Basi
        di dati" 5/ed, 2018, ISBN: 9788838694455


        Inoltre, è consigliata la lettura dei seguenti testi per lo svolgimento del
        progetto:


        - Kevin Yank, "Sviluppare applicazioni con PHP e MySQL", 2/ed, 2012, ISBN:
        9788850331826'
      Metodi didattici: Il corso prevede lezioni frontali svolte in aula, mediante
        l'ausilio di PC e proiettore da parte del docente. Le esercitazioni sul linguaggi
        SQL sono svolte in aula mediante l'ausilio del tool CodeRunner integrato nella
        piattaforma Virtuale.
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso prevede un
        esame scritto (obbligatorio), un progetto (obbligatorio), ed una prova orale
        (facoltativa).


        La prova scritta ha una durata di 2 ore e mezza, non consente l'' ausilio
        di libri o appunti, e richiede una pre-registrazione da parte dello studente
        attraverso il sito ALMA-ESAMI. La prova scritta è strutturata in esercizi
        relativi alle diverse parti del corso, ed è volta ad accertare il raggiungimento
        degli obiettivi didattici per quanto riguarda: la conoscenza delle basi di
        dati basate sul modello relazionale, dei linguaggi di interrogazione, e della
        progettazione delle basi di dati. L''esito della prova scritta, espressa in
        trentesimi, concorre a determinare i 2/3 del voto finale. Il progetto consiste
        nell''implementazione di un sistema informativo con interfaccia Web, ed è
        finalizzato a verificare l''acquisizione delle competenze nell''ambito della
        progettazione e dell''implementazione di basi di dati attraverso gli strumenti
        software, le tecnologie e le metodologie presentate in aula. Il progetto determina
        1/3 del voto finale. Il docente fornisce la descrizione delle tracce del progetto
        (che possono essere anche proposte dagli studenti, previa discussione preliminare
        con il docente), delle modalità e delle tempistiche di consegna attraverso
        la pagina web del corso. La prova orale è facoltativa, e prevede quesiti ed
        esercizi sugli argomenti del corso. Possono essere previsti esercizi bonus,
        assegnati durante il corso e svolti come compiti per casa dagli studenti,
        in via facoltativa; la consegna degli esercizi produce un bonus di massimo
        un punto, che si somma alla media delle prove precedenti (scritto/progetto/orale).'
      Strumenti a supporto della didattica: 'Il materiale didattico (slides, codice)
        presentato a lezione viene messo a disposizione dello studente attraverso
        la piattaforma VIRTUALE. La dashboard del corso in VIRTUALE contiene inoltre:
        link a strumenti software utilizzabili per lo svolgimento del progetto, e
        puntatori a sorgenti di informazioni (es. forum, riviste online) correlate
        agli argomenti del corso.'
      Orario di ricevimento: Consulta il sito web di Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Città e comunità
        sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/378069
    title: 2025/2026 Data Bases — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the student: - knows the relational
        data model and the SQL language; - is able to design and develop a relational
        database; - is capable of processing a project to implement an information
        system.'
      Course contents: 'The course program is divided into four parts, each addressing
        complementary topics related to databases and information systems.


        In the first part, the fundamental concepts of the course are introduced (data,
        information, database, etc.), along with the characteristics of the relational
        model and relational DBMSs, and the main functionalities of languages used
        for performing CRUD operations on data. In this context, the features of the
        SQL language for creating, modifying, and querying relational databases are
        explained in detail. Additionally, there are brief discussions on alternative
        approaches to the relational model (NoSQL databases) and technologies for
        big data management.


        The second part presents methodologies and tools for designing databases based
        on the analysis of system requirements. This includes a detailed discussion
        of the traditional phases of software engineering applied to data design:
        requirements analysis, conceptual design, logical design, physical design,
        performance analysis of data models, and normalization techniques.


        The third part provides a (brief) overview of data mining techniques and algorithms
        based on supervised and unsupervised learning methods, aimed at creating classification
        and prediction models from the data stored in a database. Examples of applications
        of these techniques in industrial and business contexts are also provided.


        Finally, the fourth part introduces the main features of Web Information Systems
        (WIS), and presents some technologies used for the development of web applications
        that can interface with SQL databases.


        Summary of course topics:


        Course Introduction: Information, Data, and DBMS


        Models and Languages for Databases


        - The relational model: basic concepts, integrity constraints, and keys

        - Features of relational Database Management Systems (DBMSs)

        - The SQL language: data definition, data modification, queries, view definitions,
        transactions

        - Alternative approaches to the relational model, brief overview of NoSQL
        and big data technologies


        Database Design


        - Conceptual design: the E/R model, requirements gathering and analysis, conceptual
        design strategies, quality assessment

        - Logical design: restructuring E/R schemas, translation into the relational
        model, quality analysis of E/R schemas

        - Normalization techniques: normal forms (Boyce-Codd, third normal form),
        decomposition into normal form

        - Physical design: indexes and data storage techniques


        Introduction to Data Mining


        - General concepts and application scenarios of data mining techniques

        - Classification and clustering algorithms


        DBMS for Applications


        - Examples of DBMSs: MySQL, MongoDB, Cassandra

        - SQL and server-side scripting languages (PHP + MySQL)'
      Readings/Bibliography: 'The reference textbook of the course is the following:


        - Paolo Atzeni, Stefano Ceri, Stefano Paraboschi, Riccardo Torlone, "Basi
        di dati" 5/ed, 2018, ISBN: 9788838694455


        Moreover, these books are recommended for the project development:


        - Kevin Yank, "Sviluppare applicazioni con PHP e MySQL" 1/ed, 2012, ISBN:
        9788850331826'
      Teaching methods: 'The course includes in-person lectures held in the classroom,
        with the use of a computer and projector by the instructor.

        SQL language exercises are conducted in class using the CodeRunner tool integrated
        within the Virtuale platform.'
      Assessment methods: 'The course includes a written exam (mandatory), a project
        (mandatory), and an oral exam (optional).


        The written exam lasts 2.5 hours; no books or notes are allowed. Students
        must register in advance via the ALMA-ESAMI website. The exam consists of
        exercises covering the various parts of the course and is aimed at assessing
        the achievement of the learning objectives related to: knowledge of relational
        database concepts, query languages, and database design. The grade of the
        written exam, expressed on a scale of 30, accounts for 2/3 of the final grade.


        The project involves the implementation of an information system with a web
        interface, and is intended to assess the student’s ability to design and implement
        databases using the software tools, technologies, and methodologies presented
        in class. The project accounts for 1/3 of the final grade. The instructor
        provides the project topics (which can also be proposed by students, subject
        to prior discussion with the instructor), as well as the delivery guidelines
        and deadlines, through the course web page.


        The oral exam is optional and includes questions and exercises on the topics
        covered in the course.


        Optional bonus exercises may be assigned during the course as take-home work.
        Submission of these exercises may provide a bonus of up to one point, which
        is added to the average of the previous components (written exam/project/oral
        exam).'
      Teaching tools: 'The teaching materials (slides, code) presented during lectures
        are made available to students through the VIRTUALE platform.

        The course dashboard on VIRTUALE also includes:

        – links to software tools that can be used for the project, and

        – references to information sources (e.g., forums, online journals) related
        to the course topics.'
      Office hours: See the website of Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3/en)
      SDGs: 'Quality education Industry, innovation and infrastructure Sustainable
        cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
