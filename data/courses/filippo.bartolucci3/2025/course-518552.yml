    title: 2025/2026 COMPUTER VISION — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del percorso didattico, lo studente
        è in grado di implementare algoritmi fondamentali di visione artificiale,
        come ad esempio: rilevamento di oggetti, segmentazione semantica, descrizione
        del contenuto di immagini e video. Durante il percorso lo studente acquisisce
        le basi della visione artificiale e le conoscenze necessarie alla progettazione
        e l''implementazione di reti neurali convoluzionali, reti neurali ricorrenti
        e loro combinazione. Lo studente acquisisce, inoltre, familiarità con gli
        strumenti fondamentali per la realizzazione di applicazioni di visione artificiale
        basate su reti neurali.'
