syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455038
    title: 2025/2026 LABORATORIO DI LOGICA DI PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        una conoscenza di base del linguaggio di programmazione utile per l'elaborazione
        di dati. Sa utilizzare le conoscenze acquisite per implementare autonomamente
        algoritmi e strutture dati per la risoluzione di problemi. Lo studente sarà
        in grado di affrontare un problema individuandone le variabili che lo caratterizzano
        ed elaborando una soluzione.
      Contenuti: 'Il pensiero computazionale. Programmazione in Python: nomi e loro
        visibilità, funzioni, oggetti modificabili e non modificabili, tipi di base
        (numeri, stringhe, liste, dizionari). Istruzioni di ramificazione e iterazione.
        Algoritmi di ordinamento.'
      Testi/Bibliografia: 'Allen B. Downey

        Think Python 2e.

        O''Reilly Media, 2012. ISBN 978-1449330729.

        On-line manuscript: seegreenteapress.com/wp/think-python-2e (http://greenteapress.com/wp/think-python-2e/)'
      Metodi didattici: 'Lezioni in aula, con esercitazioni pratiche svolte o con
        i propri portatili o utilizzando i pc del laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (http://https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Prova orale sugli argomenti
        spiegati a lezione e sulle esercitazioni svolte dallo studente.


        Se lo studente porta a termine almeno il 70% di tutte le esercitazioni assegnate
        a lezione e a casa entro i termini definiti svolgerà la sola prova orale.


        Gli studenti che non porteranno a termine le consegne parziali assegnate in
        aula e a casa, oltre a sostenere la prova orale, dovranno consegnare un progetto
        individuale.'
      Strumenti a supporto della didattica: 'Presentazioni con slide, laboratorio
        con esercitiazioni svolte utilizzando interprete Python online.


        Gli studenti e le studentesse che per ragioni dipendenti da disabilità, patologie
        o disturbi psicologici, o disturbi specifici dell’apprendimento (DSA) necessitino
        di strumenti compensativi potranno rivolgersi direttamente al Servizio per
        gli studenti con disabilità (disabilita@unibo.it [mailto:disabilita@unibo.it]
        ) e al Servizio per studenti con disturbi dell''apprendimento (dsa@unibo.it
        [mailto:dsa@unibo.it] ) per concordare l’adozione degli accorgimenti più opportuni.'
      Orario di ricevimento: Consulta il sito web di Sara Zuppiroli (https://www.unibo.it/sitoweb/sara.zuppiroli)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455038
    title: 2025/2026 Programming Lab — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student has a basic knowledge
        of the programming language. Can use the acquired knowledge to autonomously
        implement algorithms and data structures for solving problems.
      Course contents: 'Computational thinking. Programming in Python: names and their
        visibility, functions, editable and non-editable objects, basic types (numbers,
        strings, lists, dictionaries). Branching and iteration instructions. Sorting
        algorithms.'
      Readings/Bibliography: 'Allen B. Downey

        Think Python 2e.

        O''Reilly Media, 2012. ISBN 978-1449330729.

        On-line manuscript: seegreenteapress.com/wp/think-python-2e (http://seegreenteapress.com/wp/think-python-2e)'
      Teaching methods: 'Lectures.


        Practical exercises carried out either with their own laptops or using the
        laboratory PCs.


        As concerns the teaching methods of this course unit, all students must attendModules
        1 and 2 on Health and Safety online (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)'
      Assessment methods: 'Oral test on the topics explained in lecture and the exercises
        done by the student.


        If the student completes at least 70% of all the exercises assigned in class
        and at home within the defined deadlines he/she will only take the oral test.


        Students who do not complete the partial assignments will have to hand in
        an individual project in addition to taking the oral test.'
      Teaching tools: 'Presentations, laboratory with exercises carried out using
        an online Python interpreter.


        Students who need compensatory tools for reasons related to disabilities or
        specific learning disorders (SLD) can directly contact the Service for Students
        with Disabilities (disabilita@unibo.it [mailto:disabilita@unibo.it] ) and
        the Service for Students with learning disabilities (dsa@unibo.it [mailto:dsa@unibo.it]
        ) to agree on the adoption of the most appropriate measures.'
      Office hours: See the website of Sara Zuppiroli (https://www.unibo.it/sitoweb/sara.zuppiroli/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
