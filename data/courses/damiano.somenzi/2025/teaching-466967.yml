syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/466967
    title: 2025/2026 DATABASES — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The student learns the fundamental principles
        of the relational data model and of the relational database management systems.
        In particular, the student will be able to understand the structure of a relational
        database, the integrity constraints on data and the SQL query language.
      Contenuti: 'Capire i dati: elementari, complessi e del Web


        Modellare i dati


        Tecniche per organizzare i dati:


        - Modello concettuale (diagramma Entità - Relazione)

        - Modello logico (schema delle relazionali)


        Modelli di basi di dati non relazionali (noSQL)


        Gestire le basi di dati


        - Sistemi di gestione di basi di dati


        Il linguaggio per le basi di dati relazionali: SQL


        - Manipolare i dati

        - Interrogare le basi di dati


        I linguaggi per le basi di dati non relazionali


        Analizzare i dati


        - Estrarre dati, informazioni

        - Realizzare viste sui dati


        Esperienze con R di Analisi Statistiche su dati da Database e dal Web'
      Testi/Bibliografia: 'Le lezioni si baseranno principalmente sul testo di Jeff
        Ullman e Jennifer Widom: "A First Course in Database Systems" e sulla documentazione
        disponibile sul Web.


        Approfondimenti, esempi e esercizi saranno messi a disposizione settimanalmente
        su “Virtual Learning Environment”.'
      Metodi didattici: 'Le lezioni si svolgeranno sia in aula tradizionale sia in
        aula informatica. La partecipazione alle lezioni (teoriche e pratiche) è un
        valido supporto alla comprensione degli argomenti trattati.


        Le sessioni pratiche sono prevalenti e fondamentali per acquisire le conoscenze
        e competenze dei concetti e degli strumenti trattati.'
      Modalità di verifica e valutazione dell'apprendimento: 'Prova scritta e pratica
        (durata 2 ore). La prova si articola in due parti.


        Una prima parte scritta con la richiesta di disegnare un modello di dati sulla
        base di requisiti (35%) ed inoltre con brevi esercizi e/o quesiti sul programma
        dell’insegnamento (20%). Non è ammesso l''uso del materiale didattico.


        Una seconda parte pratica con la richiesta di realizzare delle interrogazioni,
        nel linguaggio SQL, su una base di dati reale (45%). E'' ammesso l''uso del
        solo materiale didattico.


        Il voto finale (in trentesimi) è determinato applicando le percentuali - pesi
        - assegnate a ciascun tipo di richiesta.'
      Strumenti a supporto della didattica: Personal Computer e Open Source software
        per la gestione e interrogazione di basi di dati relazionali (MySQL) e Open
        Source software per l’analisi di dati (R).
      Orario di ricevimento: Consulta il sito web di Damiano Marino Somenzi (https://www.unibo.it/sitoweb/damiano.somenzi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/466967
    title: 2025/2026 Databases — University of Bologna
    contents:
      Learning outcomes: The student learns the fundamental principles of the relational
        data model and of the relational database management systems. In particular,
        the student will be able to understand the structure of a relational database,
        the integrity constraints on data and the SQL query language.
      Course contents: 'Understand data: elementary, complex and on the Web


        Data modelling


        Main concepts to describe and arrange data:


        - Conceptual model (Entity - Relationship diagram)

        - Logical model (relations schema)


        Models for non relational databases (noSQL)


        Database management


        - Database management systems


        The language to query data bases: SQL


        - Data definition and manipulation

        - Query databases


        Languages for non relational databases


        Data analysis


        - Extract data, information

        - Create data views


        Practice sessions with R of Statistical Analysis on data from Databases and
        from the Web'
      Readings/Bibliography: 'Lectures will be mainly based on the book of Jeff Ullman
        and Jennifer Widom: "A First Course in Database Systems" and documentation
        available on the Web.


        Further readings, examples and exercises will be made available weekly on
        “Virtual Learning Environment”.'
      Teaching methods: 'Lectures will be held in seminar and in computer rooms. Participation
        at the lecture (theory and practice) is a valid support for the comprehension
        of the topics covered.


        Practice sessions are prevalent and fundamental to acquire the knowledge and
        competencies on the concepts and tools.'
      Assessment methods: 'Practical and written assessment (2 hours).The assessment
        consists in two parts.


        In the first written part is required to design a data model based on given
        requisites (35%), and further to solve/answer to exercises and/or questions
        on course contents (20%). Use of teaching material is not allowed.


        In the second practical part is required to write queries on a real database
        through SQL language (45%). It is allowed to use only the teaching material.


        The final grade (over thirty) is computed applying percentages (weights) assigned
        to each type of request.'
      Teaching tools: Personal Computer and Open Source software to manage and query
        relational databases (MySQL) and Open Source software for data analysis (R).
      Office hours: See the website of Damiano Marino Somenzi (https://www.unibo.it/sitoweb/damiano.somenzi/en)
