syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/529396
    title: 2025/2026 INFORMATION SYSTEMS AND DATABASE MANAGEMENT — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Aim of the course is to understand the
        concepts and learn the techniques to access data stored in database systems
        for analytical purposes. In particular, the student will understand the main
        concepts of relational and noSQL database systems and will learn how to effectively
        extract data from those systems in order to prepare them for subsequent application
        of statistical and machine learning techniques.

        The course will deal with both the query languages of databases and the interfaces
        with programmatic languages, such as R or Python.


        At the end of the course the student is able:


        - to understand the structure of a given database, either relational or noSql;

        - to access the data stored in a Database Management System either with the
        specific standard languages or with programmatic interfaces.'
      Contenuti: 'Capire i dati: elementari, complessi e del Web


        Modellare i dati


        Tecniche per organizzare i dati:


        Basi di dati relazionale:


        - Modello concettuale (diagramma Entità-Relazione)

        - Modello logico (schema delle relazionali)


        Basi di dati noSQL:


        - Modello document-based

        - Modello graph-based


        Gestire le basi di dati


        - Sistemi per la gestione delle basi di dati


        Il linguaggio per interrogare le basi di dati:


        - Interrogare le basi di dati relazionali (SQL)

        - Interrogare le basi di dati noSQL


        Analizzare i dati


        - Estrarre dati, informazioni

        - Realizzare viste sui dati


        Esperienze con Python di Analisi Statistiche su dati da Database e dal Web'
      Testi/Bibliografia: 'Le lezioni si baseranno per la parte basi di dati relazionali
        sul testo di Jeff Ullman e Jennifer Widom: "A First Course in Database Systems",
        per la parte basi di dati noSQL sulla documentazione disponibile sul Web.


        Approfondimenti, esempi e esercizi saranno messi a disposizione settimanalmente
        su “Virtual Learning Environment”.'
      Metodi didattici: 'Le lezioni si svolgeranno sia in aula tradizionale sia in
        aula informatica. La partecipazione alle lezioni (teoriche e pratiche) è un
        valido supporto alla comprensione degli argomenti trattati.


        Le sessioni pratiche sono prevalenti e fondamentali per acquisire le conoscenze
        e competenze dei concetti e degli strumenti trattati.'
      Modalità di verifica e valutazione dell'apprendimento: 'Prova scritta e pratica
        (durata 2 ore). La prova si articola in due parti.


        Una prima parte scritta con la richiesta di disegnare modelli di dati sulla
        base di requisiti (40%) ed inoltre con brevi esercizi e/o quesiti sul programma
        dell’insegnamento (20%). Non è ammesso l''uso del materiale didattico.


        Una seconda parte pratica con la richiesta di realizzare delle interrogazioni,
        nel linguaggio SQL, su una base di dati reale (40%). E'' ammesso l''uso del
        solo materiale didattico.


        Il voto finale (in trentesimi) è determinato applicando le percentuali - pesi
        - assegnate a ciascun tipo di richiesta.'
      Strumenti a supporto della didattica: Personal Computer e Open Source software
        per la gestione e interrogazione di basi di dati relazionali e Open Source
        software per l’analisi di dati (Python).
      Orario di ricevimento: Consulta il sito web di Damiano Marino Somenzi (https://www.unibo.it/sitoweb/damiano.somenzi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/529396
    title: 2025/2026 Information Systems and Database Management — University of Bologna
    contents:
      Learning outcomes: 'Aim of the course is to understand the concepts and learn
        the techniques to access data stored in database systems for analytical purposes.
        In particular, the student will understand the main concepts of relational
        and noSQL database systems and will learn how to effectively extract data
        from those systems in order to prepare them for subsequent application of
        statistical and machine learning techniques.

        The course will deal with both the query languages of databases and the interfaces
        with programmatic languages, such as R or Python.


        At the end of the course the student is able:


        - to understand the structure of a given database, either relational or noSql;

        - to access the data stored in a Database Management System either with the
        specific standard languages or with programmatic interfaces.'
      Course contents: 'Understand data: elementary, complex and on the Web


        Data modelling


        Main concepts to describe and arrange data:


        Relational database:


        - Conceptual model (Entity-Relationship diagram)

        - Logical model (relations schema)


        noSQL database:


        - document-based model

        - graph-based model


        Database management


        - Database management systems


        The language to query databases:


        - Query relational databases (SQL)

        - Query noSQL databases


        Data analysis


        - Extract data, information

        - Create data views


        Practice sessions with Python of Statistical Analysis on data from Databases
        and from the Web'
      Readings/Bibliography: 'Lectures will be based for relational databases on the
        book of Jeff Ullman and Jennifer Widom: "A First Course in Database Systems",
        for noSQL databases on Web documentation.


        Further readings, examples and exercises will be made available weekly on
        “Virtual Learning Environment”.'
      Teaching methods: 'Lectures will be held in seminar and in computer rooms. Participation
        at the lecture (theory and practice) is a valid support for the comprehension
        of the covered topics.


        Practice sessions are prevalent and fundamental to acquire the knowledge and
        competencies on the concepts and tools.'
      Assessment methods: 'Practical and written assessment (2 hours).The assessment
        consists in two parts.


        In the first written part is required to design data models based on given
        requisites (40%), and further to solve/answer to exercises and/or questions
        on course contents (20%). Use of teaching material is not allowed.


        In the second practical part is required to write queries on a real database
        through SQL language (40%). It is allowed to use only the teaching material.


        The final grade (over thirty) is computed applying percentages (weights) assigned
        to each type of request.'
      Teaching tools: Personal Computer and Open Source software to manage and query
        relational databases (MySQL) and Open Source software for data analysis (Python).
      Office hours: See the website of Damiano Marino Somenzi (https://www.unibo.it/sitoweb/damiano.somenzi/en)
