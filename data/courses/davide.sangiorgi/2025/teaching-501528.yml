    title: 2025/2026 LABORATORIO DI SISTEMI OPERATIVI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del laboratorio, lo studente
        è in grado di applicare le nozioni teoriche che apprende nel modulo di sistemi
        operativi.
      Contenuti: '1: Java threads 2: Sincronizzazione tra processi 3: Comunicazioni
        su rete 4: Shell e programmazione di shell 5: Programmazione client-server'
      Testi/Bibliografia: Vedere la scheda per il modulo di Sistemi Operativi.
      Metodi didattici: Vedere la scheda per il modulo di Sistemi Operativi.
      Modalità di verifica e valutazione dell'apprendimento: Vedere la scheda per
        il modulo di Sistemi Operativi.
      Strumenti a supporto della didattica: Vedere la scheda per il modulo di Sistemi
        Operativi.
      Orario di ricevimento: Consulta il sito web di Davide Sangiorgi (https://www.unibo.it/sitoweb/davide.sangiorgi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/501528
    title: 2025/2026 Lab-based Course on Operating Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the lab course, the student is capable of reasoning
        with the concepts and the theory examined during the main course.
      Course contents: 'Support for the main topics in the "Operating System" course,
        notably:

        1: Java threads 2: Sinchronisation among processes 3: Communication primitives
        for networks 4: Shell and shell programming 5: Client-server programming'
      Readings/Bibliography: See information in the "Operating System" module.
      Teaching methods: See information in the "Operating System" module.
      Assessment methods: See information in the "Operating System" module.
      Teaching tools: See information in the "Operating System" module.
