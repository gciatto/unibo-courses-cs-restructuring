syllabus:
  it:
    title: 2025/2026 DIGITAL FORENSICS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente conosce
        le principali problematiche della digital forensics e si è confrontato con
        l''utilizzo di base di alcuni tool per gestire gli scenari più comuni: singolo
        device (computer, tablet, smartphone) e diversi tipi di file, rete (wireless
        e wired), e-mail e social media. Lo studente conosce l''importanza della catena
        di custodia e le principali metodologie di acquisizione, conservazione e analisi
        dei dati. Lo studente conosce l''importanza della relazione finale e dispone
        di strumenti concettuali per la sua corretta stesura.'
      Contenuti: 'Le basi della digital forensics

        Struttura di base del laboratorio

        Acquisizione dei dati

        Esame delle scene

        Lavorare con sistemi Windows e CLI

        Principali strumenti di digital forensics

        File system di Linux e Macintosh

        Recupero di file grafici

        Analisi e validazione

        Macchine virtuali, acquisizioni live, network forensics

        Investigazioni legali di e-mail e social media

        Device mobili

        Cloud

        Scrittura della relazione

        Testimonianza

        Etica'
      Testi/Bibliografia: 'Nelson B., Phillips A., Steuart C., Wilson R., Guide to
        Computer Forensics and Investigations (7-th ed.). Cengage. (https://faculty.cengage.com/works/9780357672884)


        Quenau R., , Einaudi, 2014. [http://www.einaudi.it/libri/libro/raymond-queneau/esercizi-di-stile/978880622074]


        [http://www.einaudi.it/libri/libro/raymond-queneau/esercizi-di-stile/978880622074]Nelson
        B., Philips A., Steuart C., Cengage, 2018 [https://www.cengage.co.uk/books/9781337568944/]


        ISO/IEC 27037:2012, Information technology - Security techniques - Guidelines
        for identification, collection, acquisition and preservation of digital evidence
        [https://www.iso.org/standard/44381.html]


        ISO/IEC 27041:2015, Information technology - Security techniques - Guidance
        on assuring suitability and adequacy of incident investigative method [https://www.iso.org/standard/44405.html]


        ISO/IEC 27042:2015, Preview Information technology - Security techniques -
        Guidelines for the analysis and interpretation of digital evidence [https://www.iso.org/standard/44406.html]


        ISO/IEC 27043:2015 Preview, Information technology - Security techniques -
        Incident investigation principles and processes [https://www.iso.org/standard/44407.html]'
      Metodi didattici: 'In considerazione della tipologia di attività e dei metodi
        didattici adottati, la frequenza di questa attività formativa richiede la
        preventiva partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio [https://elearning-sicurezza.unibo.it/],
        in modalità e-learning.


        Lezioni ed esercitazioni BYOD.'
      Modalità di verifica e valutazione dell'apprendimento: Gli studenti si dividono
        in gruppi. Ogni gruppo lavora ad un caso in qualità di perito di una delle
        parti o del giudice. I gruppi producono le perizie. Gli argomenti verteranno
        sulle le tematiche del corso e sono concordati preventivamente con il docente.
        La perizia viene valutata in contraddittorio con gli altri due gruppi e deve
        essere consegnata alla scadenza stabilita prima della data dell'esame. L'esame
        prosegue con una prova orale in cui si discutono gli aspetti peculiari del
        lavoro realizzato. L'esame si conclude con una ulteriore prova orale in merito
        agli argomenti del corso.
      Strumenti a supporto della didattica: Laboratorio
      Orario di ricevimento: Consulta il sito web di Alessandro Amoroso (https://www.unibo.it/sitoweb/alessandro.amoroso)
      SDGs: 'Istruzione di qualità Parità di genere Lavoro dignitoso e crescita economica
        Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Digital Forensic — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the students will know the main
        topics of digital forensics. Moreover, they have used several basic tools
        to manage some common scenarios: single device (computer, tablet, smartphone)
        and several kinds of file, networking (wireless and wired), e-mail and social
        media. The students will know the importance of the chain of custody and also
        the main procedures to acquire, conserve and analyze the data. The students
        will know both the importance of the final report and the conceptual instruments
        for its appropriate drafting'
      Course contents: 'Understanding the Digital Forensics Profession and Investigations

        The Investigator''s Office and Laboratory

        Data Acquisition

        Processing Crime and Incident Scenes

        Working with Windows and CLI Systems

        Current Digital Forensics Tools

        Linux and Macintosh File Systems

        Recovering Graphics Files

        Digital Forensics Analysis and Validation

        Virtual Machine Forensics, Live Acquisitions, and Network Forensics

        E-mail and Social Media Investigations

        Mobile Device Forensics

        Cloud Forensics

        Report Writing for High-Tech Investigations

        Expert Testimony in Digital Investigations

        Ethics for the Expert Witness'
      Readings/Bibliography: 'Nelson B., Phillips A., Steuart C., Wilson R., Guide
        to Computer Forensics and Investigations (7-th ed.). Cengage. [https://faculty.cengage.com/works/9780357672884]


        Quenau R., Einaudi, 2014. [http://www.einaudi.it/libri/libro/raymond-queneau/esercizi-di-stile/978880622074]


        [http://www.einaudi.it/libri/libro/raymond-queneau/esercizi-di-stile/978880622074]Nelson
        B., Philips A., Steuart C., , Cengage, 2018 [https://www.cengage.co.uk/books/9781337568944/]


        ISO/IEC 27037:2012, Information technology - Security techniques - Guidelines
        for identification, collection, acquisition and preservation of digital evidence
        [https://www.iso.org/standard/44381.html]


        ISO/IEC 27041:2015, Information technology - Security techniques - Guidance
        on assuring suitability and adequacy of incident investigative method [https://www.iso.org/standard/44405.html]


        ISO/IEC 27042:2015, Preview Information technology - Security techniques -
        Guidelines for the analysis and interpretation of digital evidence [https://www.iso.org/standard/44406.html]


        ISO/IEC 27043:2015 Preview, Information technology - Security techniques -
        Incident investigation principles and processes [https://www.iso.org/standard/44407.html]'
      Teaching methods: 'Considering the type of the activities and the teaching methodology,
        to participate to this course it is required to partecipate at the e-learning
        modules Modules 1 and 2 of Health and Safety Training Courses [https://elearning-sicurezza.unibo.it/course/index.php?categoryid=41]
        . [https://elearning-sicurezza.unibo.it/]


        Lessons and practice BYOD.'
      Assessment methods: The students are grouped together. Each group works on a
        case as expert either for one of the two parts or for the court. The topics
        have to be discussed in advance with the teacher. Each groups will produce
        a report. The report will be evaluated by cross-question with the other two
        groups. The report has to be submitted before a fixed deadline. The exam continues
        with an oral discussion of the main aspect of the work. The exam ends with
        an oral discussion on the main topics of the course.
      Teaching tools: Laboratory
      Office hours: See the website of Alessandro Amoroso (https://www.unibo.it/sitoweb/alessandro.amoroso/en)
      SDGs: 'Quality education Gender equality Decent work and economic growth Industry,
        innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
