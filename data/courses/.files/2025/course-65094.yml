syllabus:
  it:
    title: 2025/2026 ADVANCED PROGRAMMING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'This course will be devoted to complete
        the preparation by giving the student all elements of programming with modern
        languages: e.g. python, object-oriented programming.'
      Contenuti: 'Il linguaggio di programmazione Python: dalle basi alla programmazione
        avanzata per il calcolo scientifico. La prima parte include una rapida panoramica
        su variabili, tipi di dati, operatori, strutture di controllo, funzioni, elenchi,
        tuple, dizionari, gestione dei file. Nella seconda parte lo studente inizierà
        a esplorare la versatilità e la potenza del calcolo scientifico, imparando
        a padroneggiare librerie essenziali come NumPy, SciPy, Pandas, Matplotlib
        e Scikit-Learn. Queste librerie saranno gli strumenti per gestire, analizzare
        e visualizzare in modo efficiente grandi set di dati comunemente incontrati
        nella ricerca scientifica.


        Lo studente applicherà le competenze apprese nella risoluzione di semplici
        equazioni fisiche (es. equazioni di D''alembert, equazione del calore, equazione
        del trasporto) con l''ausilio della modellazione numerica di base, nell''estrazione
        delle principali proprietà statistiche da set di dati fisici e nel confronto
        con dati teorici previsioni, nella visualizzazione e rappresentazione grafica
        di set di dati e delle loro proprietà.


        Il corso introdurrà alcune nozioni base sui comandi di shell per ottimizzare
        e automatizzare flussi di lavoro e serie di codici.'
      Testi/Bibliografia: '-Appunti del Docente.


        - How to Think Like a Computer Scientist: Learning with Python, di Allen Downey,
        Jeff Elkner e Chris Meyers. Gree Tea Press (available at: https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf
        )

        - Python in Earth Science, a brief introduction by Sujan Koirala and Jake
        Nelson (Max Planck Institute for Biogeochemistry, Jena, Germany) (http://hydro.iis.u-tokyo.ac.jp/~sujan/docs/PythonInEarthScience.pdf
        )'
      Metodi didattici: Lezioni frontali con esempi pratici ed esercitazioni al computer.
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame consiste in
        un colloquio orale con oggetto sugli argomenti trattati nel corso.


        Durante il colloquio lo studente sarà invitato a discutere un codice sviluppato
        durante il corso, applicando le metodologie e le competenze acquisite. Inoltre,
        verranno presentati problemi pratici e situazioni relative ai temi del corso:
        ci si aspetta che lo studente fornisca soluzioni e approfondimenti basati
        sulle nozioni e metodologie acquisite.'
      Orario di ricevimento: Consulta il sito web di Enrico Baglione (https://www.unibo.it/sitoweb/enrico.baglione)
  en:
    title: 2025/2026 ADVANCED PROGRAMMING — University of Bologna
    contents:
      Learning outcomes: 'This course will be devoted to complete the preparation
        by giving the student all elements of programming with modern languages: e.g.
        python, object-oriented programming.'
      Course contents: 'The Python programming language: from basics to advanced programming
        for scientific computing. The first part includes a quick overview over variables,
        data types, operators, control structures, functions, lists, tuples, dictionaries,
        file handling. Within the second part the student will start exploring the
        versatility and power for scientific computing, learning how to unleash the
        potential of Python by mastering essential libraries such as NumPy, SciPy,
        Pandas, Matplotlib and Scikit-Learn. These libraries will be the tools for
        efficiently managing, analyzing, and visualizing large datasets commonly encountered
        in scientific research.


        The student will apply the learned skills in the resolution of simple physical
        equations (ex. D’alembert equations, heat equation, transport equation) with
        the help of basic numerical modeling, in the extraction of major statistical
        properties from physical datasets and comparison with theoretical predictions,
        in the visualization and graphical representation of datasets and their properties.


        The course will introduce to some basics of shell commands to optimize and
        automate workflows and series of codes.'
      Readings/Bibliography: '- Notes of the teacher.

        - How to Think Like a Computer Scientist: Learning with Python, di Allen Downey,
        Jeff Elkner e Chris Meyers. Gree Tea Press (available at: https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf
        )

        - Python in Earth Science, a brief introduction by Sujan Koirala and Jake
        Nelson (Max Planck Institute for Biogeochemistry, Jena, Germany) (http://hydro.iis.u-tokyo.ac.jp/~sujan/docs/PythonInEarthScience.pdf
        )'
      Teaching methods: Frontal lectures with practical examples and computer exercises
      Assessment methods: 'The assessment will be an oral interview focusing on the
        topics covered in the course.


        During the interview, students will be asked to discuss a code they developed
        throughout the course, applying the methodologies and skills they have acquired.
        Additionally, they will be presented with practical problems and situations
        related to the course''s themes, and they will be expected to provide solutions
        and insights based on their knowledge and understanding.'
      Office hours: See the website of Enrico Baglione (https://www.unibo.it/sitoweb/enrico.baglione/en)
