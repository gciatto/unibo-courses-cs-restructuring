course_title:
  id: '88566'
  name: TECNOLOGIE WEB
integrated_course: ''
campi:
- Bologna
programmes:
- Laurea in Informatica
syllabus:
  it:
    title: 2025/2026 TECNOLOGIE WEB (9 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le tecnologie più importanti utilizzate in ambito World Wide Web. È in grado
        di scrivere documenti e semplici applicazioni distribuite Web, di curarne
        l'aspetto visivo, di verificarne la correttezza e universalità, e di progettarne
        e verificarne l'usabilità e la user experience.
      Contenuti: 'Il corso si occupa dei seguenti argomenti:


        1. Fondamenti: protocolli di VII livello, codifiche caratteri, organismi di
        standard

        2. Tecnologie base del web: HTTP, URI, HTML, CSS, XML

        3. Tecnologie server-side per applicazioni web: php, python, NodeJs

        4. Tecnologie client-side per applicazioni web: JavaScript, Ajax, JSON, framework
        Javascript.

        5. Component-based web programming: Angular, React, Vue.

        6. Introduzione ad alcune tecnologie del Semantic Web: RDF, OWL, SPARQL, ontologie.

        7. User Experience Design per siti web: il modello Garrett.


        Attenzione: gli studenti con disturbi specifici dell’apprendimento (DSA) o
        disabilità temporanee/permanenti sono invitati a contattare tempestivamente
        l’ufficio di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ) e concordare con il docente le strategie più efficaci per seguire le lezioni
        e prepararsi all’esame.'
      Testi/Bibliografia: A causa della rapida evoluzione della materia, non esiste
        un libro di testo che copra tutta la disciplina. Gli studenti ricevono slide
        proiettate a lezione e vengono di volta in volta guidati a risorse tipicamente
        gratuite e disponibili in rete per lo svolgimento del corso e l'approfondimento
        degli argomenti.
      Metodi didattici: Il corso prevede una parte di fondamenti in aula, esercitazioni
        in laboratorio e un progetto, per gruppi di 2-3 persone volto a realizzare
        un'applicazione web che usi le tecnologie più recenti di sviluppo.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame è diviso in
        due parti: la presentazione di gruppo del progetto e una prova scritta individuale.


        La presentazione del progetto è di gruppo, e tende a verificare la correttezza,
        completezza ed interoperabilità della applicazione web, nonché il contributo
        individuale allo svolgimento complessivo del lavoro


        Lo scritto è composto da alcuni esercizi sulle tecnologie descritte nel corso
        e alcune domande teoriche.'
      Strumenti a supporto della didattica: Il sito virtuale.unibo.it (http://virtuale.unibo.it)dà
        accesso al sito del corso (che cambia di anno in anno) e che contiene slide,
        esercizi, prove d'esame, dettagli sul progetto e il prodotti intermedi del
        lavoro interattivo di tutti gli studenti del corso per la realizzazione del
        progetto di fine corso.
      Orario di ricevimento: Consulta il sito web di Fabio Vitali (https://www.unibo.it/sitoweb/fabio.vitali)
  en:
    title: 2025/2026 Web Technology (9 ECTS) — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the most important
        technologies used in the World Wide Web context. The student is able to create
        web documents and simple distributed web applications, determine their visual
        aspects, verify their correctness and universality, and design and verify
        their usability and user experience.
      Course contents: 'The course covers the following topics:


        1. Fundamentals: Layer 7 protocols, character encodings, standardization bodies

        2. Core web technologies: HTTP, URI, HTML, CSS, XML

        3. Server-side technologies for web applications: PHP, Python, NodeJs

        4. Client-side technologies for web applications: JavaScript, Ajax, JSON,
        JavaScript frameworks

        5. Component-based web programming: Angular, React, Vue

        6. Introduction to some Semantic Web technologies: RDF, OWL, SPARQL, ontologies

        7. User Experience Design for websites: the Garrett model


        Important: Students with specific learning disorders (SLD) or temporary/permanent
        disabilities are invited to promptly contact the appropriate University office
        (https://site.unibo.it/studenti-con-disabilita-e-dsa/en ) and agree with the
        teacher on the most effective strategies for attending the lectures and preparing
        for the exam.'
      Readings/Bibliography: Due to the rapid evolution of the field, there is no
        textbook that covers the entire subject. Students are provided with slides
        shown during lectures and are guided from time to time to typically free and
        online resources for completing the course and exploring topics in greater
        depth.
      Teaching methods: The course includes a fundamentals section in the classroom,
        lab exercises, and a project carried out in groups of 2–3 people aimed at
        developing a web application using the latest development technologies.
      Assessment methods: 'The exam is divided into two parts: a group project presentation
        and an individual written test.


        The project presentation is done in groups and is intended to assess the correctness,
        completeness, and interoperability of the web application, as well as each
        member''s individual contribution to the overall work.


        The written test consists of exercises on the technologies covered in the
        course and some theoretical questions.'
      Teaching tools: The website virtuale.unibo.it (http://virtuale.unibo.it)provides
        access to the course site (which changes from year to year) and contains slides,
        exercises, exam samples, project details, and the intermediate outputs of
        the collaborative work by all students in the course towards the final project.
      Office hours: See the website of Fabio Vitali (https://www.unibo.it/sitoweb/fabio.vitali/en)
