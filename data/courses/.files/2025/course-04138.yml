course_title:
  id: 04138
  name: LINGUAGGI DI PROGRAMMAZIONE
integrated_course: ''
campi:
- Bologna
programmes:
- Laurea in Informatica
syllabus:
  it:
    title: 2025/2026 LINGUAGGI DI PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce i principali concetti della teoria dei linguaggi formali e li sa
        applicare per la classificazione di semplici linguaggi;

        - conosce le principali tecniche per l''analisi sintattica dei linguaggi di
        programmazione;

        - conosce la struttura di un linguaggio di programmazione e le tecniche per
        implementare la sua macchina astratta;

        - conosce il paradigma orientato agli oggetti ed un altro paradigma non imperativo.'
      Contenuti: 'Il corso è strutturato in due moduli, strettamente integrati.


        Primo modulo, primo semestre; docente:Roberto Gorrieri http://www.cs.unibo.it/~gorrieri/


        Evoluzione dei linguaggi di programmazione: Dai linguaggi assembler ai linguaggi
        ad alto livello. Macchine astratte, interpreti, compilatori. Descrizione di
        un linguaggio: Sintassi, semantica, pragmatica e implementazione. Sinatssi
        in BNF. Semantica operazionale strutturata (SOS). Grammatiche regolari, automi
        finiti, espressioni regolari: equivalenze e risultati principali (p.e., pumping
        lemma). Costruzione di analizzatori lessicali; cenni a Lex. Grammatiche libere
        da contesto, automi a pila: equivalenze e risultati principali (p.e., pumping
        theorem). Grammatiche libere deterministiche: algoritmi di riconoscimento
        e costruzione dell''albero di derivazione; grammatiche LL(1), LR(0), SLR,
        LR(1), LALR(1). Cenni a YACC.


        Secondo modulo, secondo semestre; docenti: Maurizio Gabbrielli e Saverio Giallorenzo


        http://www.unibo.it/SitoWebDocente/default.htm?UPN=maurizio.gabbrielli%40unibo.it


        https://www.unibo.it/sitoweb/saverio.giallorenzo2


        Ambiente, regole di scoping e loro implementazione. Pila dei record di attivazione;
        heap. Gestione della memoria: garbage collection. Controllo di sequenza, procedure,
        ricorsione. Tipi e controllo di tipo. Parametri e modalità di passaggio: per
        valore, per riferimento, per risultato, per nome. Parametri funzionali. Chiusure.
        Eccezioni. Il paradigma object-oriented: classi e oggetti, inizializzazione,
        inheritance e late-binding, il modello operazionale, differenza tra subtyping
        e inheritance. Cenni al paradigma logico: unificazione, derivazioni SLD, Prolog.
        Cenni al paradigma funzionale: Scala. Cenni alla programmazione concorrente
        e service oriented: Jolie.'
      Testi/Bibliografia: 'Maurizio Gabbrielli, Simone Martini


        Linguaggi di programmazione: principi e paradigmi. Seconda edizione. McGraw-Hill
        Italia, 2010. ISBN 88-386-6573-8.


        Maurizio Gabbrielli, Simone Martini, Saverio Giallorenzo,


        Programming Languages: Principles and Paradigms (second edition), Springer,
        2023. ISBN 978-3031341434'
      Metodi didattici: Lezioni frontali ed esercitazioni
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto ed esame
        orale.


        L''esame scritto si compone di 8 esercizi a domanda aperta su diversi argomenti
        del corso. L''esame scritto é valutato con un punteggio in 32-esimi, dove
        ad ogni esercizio è attribuito un punteggio di 4. Durante l''esame scritto,
        della durata di 120 minuti, non è ammesso l''uso di libri o appunti.


        Potranno essere offerti esami scritti limitati a uno o più moduli del corso,
        il cui superamento complessivo configura il superamento dell''esame scritto.


        La validità di ogni esame scritto superato è limitata all''interno di una
        sessione, per un totale di 3: estiva, autunnale e invernale. L''esame orale
        segue l''esame scritto e può essere sostenuto solo se si è ottenuto, nell''esame
        scritto, un punteggio minimo di 16/30 nella sessione in cui si intende sostenere
        l''esame orale.


        Durante la prova orale, della durata di circa 20-30 minuti, allo studente
        vengono poste domande che possono riguardare tutti gli argomenti in programma.
        La prova orale é valutata con un punteggio in 30-esimi. Il voto dell''esame
        orale è stabilito in base alla preparazione rispetto agli argomenti facenti
        parte del programma del corso, la capacità critica di analizzare gli stessi,
        la padronanza della terminologia specifica e la capacità di collegare i vari
        argomenti trattati nel corso.


        Il punteggio finale, in 30-esimi, rappresenta la media dei punteggi della
        prova scritta e della prova orale.'
      Strumenti a supporto della didattica: 'https://virtuale.unibo.it/course/view.php?id=68543


        http://www.cs.unibo.it/~gorrieri/LP/lp.html (login:esame password:linguaggi)


        http://www.cs.unibo.it/~gabbri/corsi/linguaggi.html'
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/course/view.php?id=68543
      Orario di ricevimento: 'Consulta il sito web di Roberto Gorrieri (https://www.unibo.it/sitoweb/roberto.gorrieri)


        Consulta il sito web di Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli)


        Consulta il sito web di Saverio Giallorenzo (https://www.unibo.it/sitoweb/saverio.giallorenzo)'
      SDGs: 'Istruzione di qualità Parità di genere


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Programming Languages — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will know the principal
        techniques for defining the syntax and the semantics of the most common programming
        languages; they will also know how to implement the principal constructs.
      Course contents: 'First module, first semester; instructor: Roberto Gorrieri


        http://www.cs.unibo.it/~gorrieri/


        The evolution of programming languages. From assembly to higher level languages.
        Abstract machines, intepreters and compilers. Description of a programming
        language: syntax, semantics, pragmatics and implementation. Syntax (BNF).
        Structured Operational Semantics (SOS). Regular grammars, regular expressions,
        and finite automata: equivalences and principal theorems (e.g., pumping lemma).
        Design of lexical analysers. Lex. Context free grammars and push-down automata:
        equivalences and principal theorems (e.g., pumping theorem). Deterministic
        context free grammars: algorithms for parsing; grammars LL(1), LR(0), SLR,
        LR(1), LALR(1). YACC.


        Second module, second semester; instructors: Maurizio Gabbrielli and Saverio
        Giallorenzo


        http://www.unibo.it/SitoWebDocente/default.htm?UPN=maurizio.gabbrielli%40unibo.it


        https://www.unibo.it/sitoweb/saverio.giallorenzo2


        Environment, scoping rules and their implementation. Stack of the activation
        records; heap. Memory management: garbage collection. Sequence control, procedures,
        recursion. Types and type checking. Parameters and parameter passing: by value,
        by reference, by result, by name. Functional parameters; closures. Exceptions.
        The object-oriented paradigm: classes and objects, initialization, inheritance
        and late-binding. Subtyping is not inheritance. The logical paradigm. The
        functional paradigm (Scala). The concurrent paradigm and service-oriented
        computing (Jolie).'
      Readings/Bibliography: 'Maurizio Gabbrielli, Simone Martini


        Linguaggi di programmazione: principi e paradigmi. Seconda edizione. McGraw-Hill
        Italia, 2010. ISBN 88-386-6573-8.


        For the second module, one can use also the new English edition:

        Maurizio Gabbrielli, Simone Martini, Saverio Giallorenzo. Programming Languages:
        Principles and Paradigms [http://www.springer.com/computer/book/978-3031341434].
        Springer, 2023. ISBN 978-3031341434 .'
      Teaching methods: Lectures
      Assessment methods: 'Written and oral examinations.


        The written exam is composed of 8 exercises on various subjects of the course.
        The written exam is evaluated with a grade up to 32, where each exercise contributes
        up to 4. During the written examination, that lasts 120 minutes, the student
        cannot consult textbooks or handnotes.


        Written exams, limited to one or more modules of the course, may be offered;
        if these are passed, then there is no need to pass the written exam.


        The validity of a written exam is limited within a session, for a total of
        three: summer, autumn and winter sessions. The oral exam follows the written
        exam and can be taken only if the written exam is evaluated with a grade of
        16/30, in the same session.


        During the oral exam, that lasts about 20-30 minutes, the student will be
        asked to answer questions about all the topics of the course. The oral exam
        is evaluated with a mark up to 30. The mark is decided depending on the preparation
        with respect to the topics included on the programme of the course, the critical
        capability to analyze them, the proficiency about the specific terminology
        and the ability to link the various subjects of the course.


        The final grade, up to 30, is computed as the average of the grades of the
        written and oral examinations.'
