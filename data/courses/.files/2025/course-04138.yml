        http://www.cs.unibo.it/~gorrieri/LP/lp.html (login:esame password:linguaggi)


        http://www.cs.unibo.it/~gabbri/corsi/linguaggi.html'
      Links to further information: https://virtuale.unibo.it/course/view.php?id=68543
      Office hours: 'See the website of Roberto Gorrieri (https://www.unibo.it/sitoweb/roberto.gorrieri/en)


        See the website of Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli/en)


        See the website of Saverio Giallorenzo (https://www.unibo.it/sitoweb/saverio.giallorenzo/en)'
