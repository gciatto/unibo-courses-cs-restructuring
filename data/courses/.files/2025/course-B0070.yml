syllabus:
  it:
    title: 2025/2026 METODOLOGIE E TECNICHE DI SIMULAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso ha l’obiettivo di fornire le basi
        delle metodologie e degli strumenti per progettare, realizzare e convalidare
        modelli di simulazione per l'analisi e la valutazione di sistemi sociali complessi.
        Al termine del corso lo studente sarà in grado di progettare, realizzare e
        convalidare modelli di simulazione adottando le tecnologie più adeguate all’analisi
        dello specifico problema. Lo studente sarà inoltre in grado di applicare le
        conoscenze acquisite per risolvere problemi simulativi di varia natura, utilizzando
        strumenti software opportunamente specializzati per i casi d’interesse.
      Contenuti: 'Questo corso ha l''obiettivo di dotare gli studenti di conoscenze
        approfondite sui knowledge graph e sui metodi e strumenti per interrogarli.
        Si affronteranno sia lo studio della modellazione di grafi di conoscenza basati
        su ontologie, sia l''uso pratico di alcuni strumenti software di supporto
        per la loro esplorazione e interrogazione. Inoltre, si studieranno le caratteristiche
        dei Large Language Models e le principali tecniche di prompting.


        Gli argomenti trattati nel corso sono riassunti dai seguenti punti:


        - Il Web semantico e basi di progettazione di ontologie e grafi di conoscenza

        - Panoramica sull''Intelligenza Artificiale (applicazioni e metodi)

        - Tecniche di prompting


        Si utilizzeranno i seguenti strumenti:


        - SPARQL query engine

        - Graffoo; OWL diagrams notation

        - Github

        - LLMs: GPT, Llama, Mistral, Mixtral, Gemini'
      Testi/Bibliografia: 'Note, slide e esercizi saranno resi reperibili su https://virtuale.unibo.it/


        Ciò che non è incluso nelle note può essere studiato utilizzando i seguenti
        testi / articoli / risorse online:


        - Web tutorial W3School (HTML) - https://www.w3schools.com/html/default.asp

        - Web tutorial W3School (CSS) -https://www.w3schools.com/css/default.asp

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in action (2006) reperibile online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. 2008. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann Publishers Inc., San Francisco,
        CA, USA.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns - Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press 2016, ISBN 978-1-61499-675-0

        - https://w3id.org/arco/

        - https://protegewiki.stanford.edu/wiki/Ontology101

        - http://owl.cs.manchester.ac.uk/publications/talks-and-tutorials/protg-owl-tutorial/

        - https://www.w3.org/TR/rdf-sparql-query/

        - https://essepuntato.it/graffoo/

        - https://projects.dharc.unibo.it/melody

        - http://wit.istc.cnr.it/stlab-tools/fred/

        - https://github.com/'
      Metodi didattici: Lezioni frontali, esercitazioni in laboratorio, compiti a
        casa e quiz di autovalutazione.
      Modalità di verifica e valutazione dell'apprendimento: 'Lo studente viene valutato
        attraverso lo sviluppo e la discussione di un progetto da svolgersi in gruppo.


        Il voto sarà stabilito sulla base di una presentazione del progetto e un colloquio
        di approfondimento. Il progetto riguarderà gli argomenti studiati. Ogni componente
        del gruppo sarà valutato individualmente. Un gruppo può essere formato da
        2 (minimo) fino a 6 (massimo) membri. Le indicazioni e le linee guida specifiche
        saranno fornite durante il corso e rese disponibili attraverso la piattaforma
        Virtuale.'
      Strumenti a supporto della didattica: 'Lucidi proiettati durante la lezione
        e poi resi disponibili online sulla pagina del corso.


        Piattaforme online per quiz di autovalutazione.


        Discord per discussioni e comunicazioni asincrone.'
      Orario di ricevimento: Consulta il sito web di Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti)
  en:
    title: 2025/2026 METODOLOGIE E TECNICHE DI SIMULAZIONE — University of Bologna
    contents:
      Learning outcomes: Students are familiar with semantic web and LLM technologies.
        They know the core differences between knowledge-based and machine learning-based
        Artificial Intelligence methods. They know the basic principles and theories
        behind this technologies and are able to design, build and query ontologies
        and knowledge graphs. They are familiar with the main prompting techniques
        and are able to use them in combination with knowledge graphs.
      Course contents: 'This course aims to provide students with in-depth knowledge
        of knowledge graphs and the methods and tools used to query them. It will
        cover both the theoretical foundations of ontology-based knowledge graph modeling
        and the practical use of software tools for their exploration and querying.
        In addition, the course will explore the characteristics of Large Language
        Models (LLMs) and the main prompting techniques.


        The topics covered in the course are summarized as follows:


        - The Semantic Web and the basics of ontology and knowledge graph design

        - Overview of Artificial Intelligence (applications and methods)

        - Prompting techniques


        The following tools will be used:


        - SPARQL query engine

        - Graffoo; OWL diagram notation

        - GitHub

        - LLMs: GPT, Llama, Mistral, Mixtral, Gemini'
      Readings/Bibliography: 'Notes, slides, and exercises will be made available
        at: https://virtuale.unibo.it/


        Topics not covered in the lecture notes can be studied using the following
        texts, articles, and online resources:


        - W3Schools HTML tutorial – https://www.w3schools.com/html/default.asp

        - W3Schools CSS tutorial – https://www.w3schools.com/css/default.asp

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in Action (2006), available online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann, 2008.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns – Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press, 2016. ISBN 978-1-61499-675-0

        - https://w3id.org/arco/

        - https://protegewiki.stanford.edu/wiki/Ontology101

        - http://owl.cs.manchester.ac.uk/publications/talks-and-tutorials/protg-owl-tutorial/

        - https://www.w3.org/TR/rdf-sparql-query/

        - https://essepuntato.it/graffoo/

        - https://projects.dharc.unibo.it/melody

        - http://wit.istc.cnr.it/stlab-tools/fred/

        - https://github.com/'
      Teaching methods: Lectures, lab exercises, homework assignments, and self-assessment
        quizzes.
      Assessment methods: 'Students will be assessed through the development and presentation
        of a group project.


        The final grade will be based on a project presentation and an individual
        oral discussion. The project will focus on topics covered in the course. Each
        group member will be evaluated individually. Groups must consist of a minimum
        of 2 and a maximum of 6 members. Specific guidelines and instructions will
        be provided during the course and made available on the Virtuale Platform.'
      Teaching tools: 'Slides will be presented during the lectures and later made
        available online on the course webpage.


        Online platforms will be used for self-assessment quizzes.


        Discord will be used for asynchronous discussions and communication.'
      Office hours: See the website of Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti/en)
