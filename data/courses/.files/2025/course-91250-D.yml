syllabus:
  it:
    title: 2025/2026 DEEP LEARNING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso ha l''obiettivo di fornire agli
        studenti competenze avanzate (sia teoriche che pratiche) nell''ambito del
        machine learning, con particolare riferimento al deep learning.

        Al termine del corso, anche grazie all''attività di laboratorio, lo studente
        sarà in grado di:


        - addestrare/ottimizzare in maniera approfondita sistemi in grado di apprendere
        in maniera automatica;

        - selezionare e personalizzare la tecnica di machine learning più opportuna
        da utilizzare in ambiti applicativi reali;

        - utilizzare tecniche avanzate in ambito deep learning.'
      Contenuti: '- Introduzione al deep learning

        - Algebra lineare, calculus e differenziazione automatica

        - Reti neurali

        - Backpropagation

        - Algoritmi di ottimizzazione

        - Convolutional Neural Networks (CNN)

        - Reti ricorrenti (RNN)

        - Transformers

        - AutoEncoders (AE)

        - Modelli generativi

        - Reinforcement Learning (RL)

        - Natural Language Processing (NLP) (un esempio pratico)'
      Testi/Bibliografia: 'Slide del corso.


        Testi consigliati:


        - C. M. Bishop, and H. Bishop, "Deep Learning: Foundations and Concepts (https://link.springer.com/book/10.1007/978-3-031-45468-4)",
        Springer, 2024.

        - F. Chollet, "Deep Learning with Python (2nd edition) (https://www.manning.com/books/deep-learning-with-python-second-edition)",
        Manning Publications Co., USA, 2021.

        - A. Zhang, Z. C. Lipton, M. Li, and A. J. Smola, "Dive into Deep Learning
        (https://d2l.ai/index.html)", 2020.

        - M. Elgendy, "Deep Learning for Vision Systems (https://www.manning.com/books/deep-learning-for-vision-systems)",
        Manning Publications Co., USA, 2020.

        - A. Geron, “Hands-on Machine Learning with Scikit-Learn, Keras, and TensorFlow:
        Concepts, Tools, and Techniques to Build Intelligent Systems (https://www.oreilly.com/library/view/hands-on-machine-learning/9781492032632/)”,
        O''Reilly Media, Inc., USA, 2019.

        - M. Nielsen, "Neural Networks and Deep Learning (http://neuralnetworksanddeeplearning.com/index.html)",
        2019.

        - I. Goodfellow, Y. Bengio, and A. Courville, "Deep Learning (http://www.deeplearningbook.org/)",
        MIT Press, 2016.'
      Metodi didattici: 'Lezioni frontali ed esercitazioni guidate.


        Nota: in considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza
        nei luoghi di studio (https://elearning-sicurezza.unibo.it/), in modalità
        e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: L'esame consiste nella
        realizzazione e discussione di un progetto di deep learning e in una prova
        orale (sull'intero programma del corso) volta a valutare le conoscenze che
        lo studente ha acquisito.
      Strumenti a supporto della didattica: 'Librerie e tool di sviluppo per il deep
        learning:


        - Python

        - Jupyter

        - Tensorflow

        - Keras'
      Orario di ricevimento: Consulta il sito web di Matteo Ferrara (https://www.unibo.it/sitoweb/matteo.ferrara)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Deep Learning — University of Bologna
    contents:
      Learning outcomes: 'The course aims at providing advanced skills (both theoretical
        and practical) on machine learning and, in particular, on deep learning.

        At the end of the course the student will be able to:


        - in-depth train and optimize deep learning approaches;

        - choose and customize the most appropriate techniques to be used in real
        application scenarios;

        - use advanced deep learning techniques.'
      Course contents: '- Introduction to deep learning

        - Linear algebra, calculus and automatic differentiation

        - Artificial neural networks

        - Backpropagation

        - Optimization algorithms

        - Convolutional Neural Networks (CNN)

        - Recurrent Neural Networks (RNN)

        - Transformers

        - AutoEncoders (AE)

        - Generative models

        - Reinforcement Learning (RL)

        - Natural Language Processing (NLP) (a practical example)'
      Readings/Bibliography: 'Slides of the course.


        Suggested reading:


        - C. M. Bishop, and H. Bishop, "Deep Learning: Foundations and Concepts (https://link.springer.com/book/10.1007/978-3-031-45468-4)",
        Springer, 2024.

        - F. Chollet, "Deep Learning with Python (2nd edition) (https://www.manning.com/books/deep-learning-with-python-second-edition)",
        Manning Publications Co., USA, 2021.

        - A. Zhang, Z. C. Lipton, M. Li, and A. J. Smola, "Dive into Deep Learning
        (https://d2l.ai/index.html)", 2020.

        - M. Elgendy, "Deep Learning for Vision Systems (https://www.manning.com/books/deep-learning-for-vision-systems)",
        Manning Publications Co., USA, 2020.

        - A. Geron, “Hands-on Machine Learning with Scikit-Learn, Keras, and TensorFlow:
        Concepts, Tools, and Techniques to Build Intelligent Systems (https://www.oreilly.com/library/view/hands-on-machine-learning/9781492032632/)”,
        O''Reilly Media, Inc., USA, 2019.

        - M. Nielsen, "Neural Networks and Deep Learning (http://neuralnetworksanddeeplearning.com/index.html)",
        2019.

        - I. Goodfellow, Y. Bengio, and A. Courville, "Deep Learning (http://www.deeplearningbook.org/)",
        MIT Press, 2016.'
      Teaching methods: 'Lectures + Practical (guided) sessions in lab.


        Note: as concerns the teaching methods of this course unit, all students must
        attend the online e-learning modules 1 and 2 on health and safety (https://elearning-sicurezza.unibo.it/?lang=en).'
      Assessment methods: The examination consists of the realization and discussion
        of a deep learning project and an oral test.
      Teaching tools: 'Software libraries and tools for deep learning:


        - Python

        - Jupyter

        - Tensorflow

        - Keras'
      Office hours: See the website of Matteo Ferrara (https://www.unibo.it/sitoweb/matteo.ferrara/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
