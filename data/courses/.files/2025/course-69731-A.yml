course_title:
  id: '69731'
  name: ARCHITETTURE DEGLI ELABORATORI
integrated_course: ''
campi:
- Cesena
programmes:
- Laurea in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 ARCHITETTURE DEGLI ELABORATORI (CL.A) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        le nozioni necessarie alla comprensione delle architetture, del funzionamento
        degli elaboratori e della programmazione assembly.
      Contenuti: 'Introduzione e storia dei calcolatori


        Rappresentazione digitale dell''informazione


        Architettura del calcolatore e delle periferiche


        Il livello ISA e l''assembly language


        Algebra di Boole


        Il livello della logica digitale


        Architetture a confronto


        Architetture parallele'
      Testi/Bibliografia: 'ARCHITETTURA DEI CALCOLATORI


        di Andrew Tanenbaum e Todd Austin


        Sesta Edizione (2013)


        Pearson Italia'
      Metodi didattici: 'Lezioni frontali


        Esercitazioni


        Laboratorio assistito


        Nota: in considerazione della tipologia di attività e dei metodi didattici
        adottati, la frequenza di questa attività formativa richiede la preventiva
        partecipazione di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza
        nei luoghi di studio, in modalità e-learning (link (https://elearning-sicurezza.unibo.it/))'
      Modalità di verifica e valutazione dell'apprendimento: 'Per poter sostenere
        l’esame, è necessario iscriversi su AlmaEsami (entro la chiusura delle iscrizioni)
        e consegnare con successo tutti gli elaborati almeno una settimana prima dell’appello
        di esame che si intende sostenere. Gli elaborati permettono di sostenere l’esame
        (si tratta di una idoneità) ma la loro valutazione non concorre al voto finale.


        L’esame si compone di:


        - una prova scritta di natura pratica, con esercizi da risolvere simili a
        quelli svolti durante le esercitazioni in aula e per i quali sono presenti
        sulla piattaforma Virtuale numerosi esempi, con relativa soluzione;

        - una prova scritta di natura teorica, con domande aperte su tutto il programma
        del corso.


        La frequentazione delle lezioni (incluse quelle di laboratorio) non è obbligatoria
        e non concorre al voto finale.


        Alla prima prova viene assegnato un punteggio fra 0 e 30. Se tale punteggio
        è inferiore a 18, la seconda prova non viene corretta e l’esame non è superato.
        Altrimenti il voto finale è calcolato come somma di tale punteggio con il
        risultato ottenuto nella seconda prova, che può variare da -4 a +4, e che
        può quindi diminuire o aumentare il punteggio della prima prova. Tuttavia,
        qualora la seconda prova ottenesse una valutazione gravemente insufficiente
        (ad esempio con la maggior parte delle risposte lasciate in bianco o completamente
        errate), l’esame non è superato, indipendentemente dal punteggio risultante.


        Se il punteggio complessivo è superiore a 30, si assegna 30 e lode.


        Aquisizione crediti parziali (per passaggio da altra carriera)


        Fino a tre crediti: è sufficiente consegnare gli elaborati per confermare
        il voto precedente.

        Fino a sei crediti: è sufficiente consegnare gli elaborati e sostenere la
        prima prova. Il voto sarà calcolato come la media del voto precedente e quello
        della prima prova.

        Contattare il docente di laboratorio per maggiori dettagli operativi.'
      Strumenti a supporto della didattica: Dispense del docente
      Orario di ricevimento: 'Consulta il sito web di Davide Maltoni (https://www.unibo.it/sitoweb/davide.maltoni)


        Consulta il sito web di Matteo Ferrara (https://www.unibo.it/sitoweb/matteo.ferrara)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Computer Architecture (CL.A) — University of Bologna
    contents:
      Learning outcomes: 'Providing the student with the concepts

        necessary for understanding computer architectures and assembly

        programming'
      Course contents: 'Introduction and history of computers


        Information coding


        Architecture of a computer and its

        peripherals


        The ISA level and the assembly language


        Boole''s algebra


        The level of digital logic


        Examples of real computer architecturs


        Parallel architectures'
      Readings/Bibliography: 'ARCHITETTURA DEI CALCOLATORI


        by Andrew Tanenbaum and Todd Austin


        Sesta Edizione (2013)


        Pearson Italia'
      Teaching methods: 'Lectures


        Tutorials


        Laboratory


        Note: As concerns the teaching methods of this course unit, all students must
        attend Module 1, 2 (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        on Health and Safety online'
      Assessment methods: 'To take the exam, it is necessary to register on AlmaEsami
        (before the registration deadline) and successfully submit all assignments
        at least one week before the exam session you intend to take. The assignments
        allow you to take the exam, but their evaluation does not contribute to the
        final grade.

        The exam consists of:


        - a practical written test, with exercises to solve similar to those completed
        during the in-class tutorials, for which numerous examples with their solutions
        are available on the Virtuale platform;

        - a theoretical written test, with open-ended questions on the entire course
        syllabus.


        Attendance of lessons (including laboratory sessions) is not mandatory and
        does not contribute to the final grade.

        The first test is assigned a score between 0 and 30. If this score is below
        18, the second test is not corrected and the exam is failed. Otherwise, the
        final grade is calculated as the sum of this score with the result obtained
        in the second test, which can vary from -4 to +4, and can therefore decrease
        or increase the score of the first test. However, if the second test receives
        a severely insufficient evaluation (for example, with most answers left blank
        or completely wrong), the exam is failed, regardless of the resulting score.
        If the overall score is above 30, "30 e lode" is awarded.


        Acquisition of Partial Credits (from another degree program)


        Up to three credits: It is sufficient to submit the assignments to confirm
        the previous grade.

        Up to six credits: It is sufficient to submit the assignments and take first
        written test. The final grade will be calculated as the average of the previous
        grade and the grade from the first test.

        Please contact the laboratory professor for more operational details.'
      Teaching tools: Teacher's slides
      Office hours: 'See the website of Davide Maltoni (https://www.unibo.it/sitoweb/davide.maltoni/en)


        See the website of Matteo Ferrara (https://www.unibo.it/sitoweb/matteo.ferrara/en)'
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
