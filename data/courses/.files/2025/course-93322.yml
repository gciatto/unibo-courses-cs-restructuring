syllabus:
  it:
    title: 2025/2026 HARDWARE-SOFTWARE DESIGN OF IOT SYSTEMS M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: L'obiettivo principale del corso è fornire
        metodologie per l'analisi e la programmazione di sistemi elettronici embedded
        single-core e multi-core. Viene sottolineata l'importanza dei componenti software
        in tutti i sistemi elettronici. Le principali conoscenze e competenze da conseguire
        sono (i) una chiara comprensione delle architetture hardware embedded programmabili
        più comuni e delle piattaforme hardware-software; (ii) metodologie per l'analisi
        comparativa e approcci per stimare gli indicatori chiave di prestazione (KPI)
        come costi, prestazioni, efficienza energetica, per valutare quantitativamente
        l'utilizzo di una piattaforma hardware-software per un dominio applicativo
        (ad esempio automobilistico, di consumo, industriale) e per un'applicazione
        specifica; (iii) tecniche di sviluppo e verifica del software embedded, tenendo
        conto dei vincoli tipici e degli indicatori chiave di prestazione che differenziano
        i sistemi embedded dai sistemi informatici generici; (iv) metodi e strumenti
        di ottimizzazione del software per hardware embedded sia single-core che multi-core.
      Contenuti: Refer to the English Section
      Testi/Bibliografia: Refer to the English Section
      Metodi didattici: see English Section
      Modalità di verifica e valutazione dell'apprendimento: See English Section
      Strumenti a supporto della didattica: See English Section
      Orario di ricevimento: Consulta il sito web di Luca Benini (https://www.unibo.it/sitoweb/luca.benini)
      SDGs: 'Lavoro dignitoso e crescita economica Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Hardware-Software Design of Iot Systems M — University of Bologna
    contents:
      Learning outcomes: The main goal of the class is to provide methodologies for
        analyzing and programming singe-core and multi-core embedded electronic systems.
        The importance of software components in virtually all electronic systems
        is emphasized. The key learning outcomes are (i) a clear understanding of
        the most common programmable embedded hardware architectures and hardware-software
        platforms; (ii) methodologies for comparative analysis and approaches to estimate
        key performance indicators (KPIs) such as cost, performance, energy efficiency,
        to quantitatively assess the matching of a hardware-software platform for
        an application domain (e.g. automotive, consumer, industrial) and for a specific
        application; (iii) embedded software development and verification techniques,
        taking into account typical constraints and performance KPIs that differentiate
        embedded systems from general-purpose computing systems; (iv) hardware-aware
        software optimization methods and tools for both single-core and multi-core
        embedded hardware.
      Course contents: '1. Introduction to Hardware/Software design and System-on-Chip
        Architectures.

        2. Microcontroller systems design – Hardware and Software


        Microcontroller architecture based on the ARM Cortex M family and RISC-V.
        Microcontroller peripherals. Microcontroller programming for maximum Energy
        efficiency

        Analog and Digital sensor interfaces, MEMS sensors – Smart sensors – Wireless
        sensor interfacs. System power management


        1. Parallel Architecture and Parallel programming for advanced embedded systems


        Multicore architectures and their use in energy efficient embedded Systems
        with examples from consumer and industrial market segments.

        Programming shared memory multicore systems using the OpenMP programming model
        – with practical examples based on open-source multicore RISC-V system (PULP
        platform)'
      Readings/Bibliography: '1. Computer Architecture, A Quantitative Approach By
        John L. Hennessy, David A. Patterson and Christos Kozyraki Edition 7 (or 6)

        2. Notes and online documentation shared during lectures'
      Teaching methods: Teaching in class + lab exercises
      Assessment methods: compulsory written exam ( and optional oral exam)
      Teaching tools: Online material shared via Virtuale
      Office hours: See the website of Luca Benini (https://www.unibo.it/sitoweb/luca.benini/en)
      SDGs: 'Decent work and economic growth Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
