syllabus:
  it:
    title: 2025/2026 COGNITIVE SEMANTICS FOR ARTIFICIAL INTELLIGENCE (1) (LM) — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student knows
        and can apply formal, ontological and computational methods to deal with the
        semiotic interpretation of multimodal data and content. The interpretations
        considered will concern different ontological levels. A 4E (embodied, enactive,
        embedded, extended) approach will be assumed.
      Contenuti: This course covers interdisciplinary research across semiotics, ontology,
        artificial intelligence, and cognitive science.
      Testi/Bibliografia: 'De Giorgis, S., Gangemi, A., Russo, A. Neurosymbolic graph
        enrichment for Grounded World Models. Information Processing & Management,
        62, 4, 2025, https://www.sciencedirect.com/science/article/pii/S030645732500069X


        Gangemi, A. and Nuzzolese, A.G. Logic-Augmented Generation. Journal of Web
        Semantics, 2025, https://www.sciencedirect.com/science/article/pii/S1570826824000453


        Lakoff, George, and Srini Narayanan. The Neural Mind: How Brains Think. University
        of Chicago Press, 2025. (Lakoff, George, and Srini Narayanan. La mente neurale:
        Come pensa il nostro cervello. ROI Edizioni, 2025.)


        Ciroku, F., De Giorgis, S., Gangemi, A., Martinez-Pandiani, D.S., Presutti,
        V. Automated multimodal sensemaking: Ontology-based integration of linguistic
        frames and visual data. Computers in Human Behavior, 107997, 2024, https://drive.google.com/file/d/1_2ju5yg_3vxrQXW-KgP903DhNJ6csLan/view


        Gangemi, A., Presutti, V., 2022. Formal Representation and Extraction of Perspectives.
        Vossen, P. et al. (eds.): Creating a More Transparent Internet: The Perspective
        Web, 2022, https://www.dropbox.com/scl/fi/qmaoifmxwqfklvixs629n/WebOfPerspectives-GangemiPresutti.pdf?rlkey=e82o49dz4crwgf84yue0eiupv&dl=0


        Gangemi, A. Closing the Loop between Knowledge Patterns in Cognition and the
        Semantic Web. Semantic Web, Volume 11, Issue 1, 2020, Pages 139-151, https://semantic-web-journal.net/system/files/swj2334.pdf'
      Metodi didattici: The course will be given in 3-hours slots, with mixed lectures
        and hands-on sessions. Practical experiments will be reproduced or newly designed
        on specific sessions.
      Modalità di verifica e valutazione dell'apprendimento: 'The final exam will
        consist of a project implementing a model of cognitively-inspired sense-making
        on a specific topic agreed with the teacher, and a discussion.


        AI can be a useful tool to support individual study with in-depth analysis,
        summaries, and self-assessment. As for learning assessment, the exam may consist
        in a section that can exploit substantial use of AI (problem solving, content
        generation), accompanied by a mandatory critical analysis section.


        Students with disabilities and Specific Learning Disorders (SLD)


        Students with disabilities or Specific Learning Disorders are entitled to
        special adjustments according to their condition, subject to assessment by
        the University Service for Students with Disabilities and SLD. Please do not
        contact teachers or Department staff, but make an appointment with the Service.
        The Service will then determine what adjustments are specifically appropriate,
        and get in touch with the teacher. For more information, please visit the
        page:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students'
      Strumenti a supporto della didattica: Online and desktop apps with artificial
        intelligence capabilities will be regularly used during the course.
      Orario di ricevimento: Consulta il sito web di Aldo Gangemi (https://www.unibo.it/sitoweb/aldo.gangemi)
      SDGs: 'Partnership per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
