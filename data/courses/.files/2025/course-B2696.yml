syllabus:
  it:
    title: '2025/2026 LANGUAGE, TECHNOLOGY, RESEARCH I: COMPUTATIONAL THINKING — Università
      di Bologna'
    contents:
      Conoscenze e abilità da conseguire: 'Lo/la studente/essa conosce gli elementi
        base (termini, concetti, metodi) del pensiero computazionale. È in grado di:
        comprendere e usare diversi tipi di dati e di strutture dati; progettare e
        implementare script e usare librerie standard per la manipolazione di dati
        numerici e testuali; applicare le conoscenze acquisite per la risoluzione
        di problemi con strumenti computazionali.'
      Contenuti: 'Il corso insegna a utilizzare alcuni degli strumenti di calcolo
        che possono aiutare un professionista della comunicazione linguistica e interculturale
        a risolvere i problemi. Presta particolare attenzione ai problemi su larga
        scala e all''implementazione di soluzioni che vanno oltre l''uso di software
        standard.


        1. Introduzione al pensiero computazionale

        2. Decomposizione

        3. Riconoscimento di modelli

        4. Abstrazione

        5. Pensiero algoritmico

        6. Introduzione alla programmazione

        7. Quaderni Jupyter

        8. Operazioni di base

        9. Trattare il testo

        10. I metodi

        11. Le classi


        Questa lezione rappresenta l''introduzione minima necessaria per seguire le
        lezioni sull''elaborazione del linguaggio naturale e la messa a punto della
        traduzione automatica (ad esempio, all''interno del curriculum Translation
        and Technology (https://corsi.unibo.it/2cycle/SpecializedTranslation/course-structure-diagram/piano/2023/9174/C09/000/2023)).


        (contenuti post-editati dalla traduzione automatica con deepl)'
      Testi/Bibliografia: '1. Church, K. W. (1994). Unix for poets (https://www.cs.upc.edu/~padro/Unixforpoets.pdf)
        . Notes of a course from the European Summer School on Language and Speech
        Communication, Corpus Based Methods.

        2. Colburn, T. and G. Shute (2007). Abstraction in computer science (https://www.d.umn.edu/~tcolburn/papers/Abstraction.pdf).
        Minds and Machines, 17:169–184.

        3. Erickson, J. (2019). Algorithms (http://jeffe.cs.illinois.edu/teaching/algorithms/).
        Independently published

        4. Hey, T. and G. Pápay (2014). The Computing Universe: A Journey through
        a Revolution (https://www.cambridge.org/core/books/computing-universe/254200CEE6406C377BBB8E1E3ECA6FF9).Cambridge
        University Press

        5. Jeannet M Wing. Computational thinking (https://www.cs.cmu.edu/afs/cs/usr/wing/www/publications/Wing06.pdf).
        Commun. ACL 49(3) [1], 33-35 (2006)

        6. Numerous Wikipedia (https://en.wikipedia.org/wiki/Main_Page) articles on
        relevant topics'
      Metodi didattici: 'Una combinazione di lezioni e seminari interattivi. Gli studenti
        avranno un ruolo attivo nella lezione, proponendo e implementando soluzioni.


        (contenuti post-editati dalla traduzione automatica con deepl)'
      Modalità di verifica e valutazione dell'apprendimento: '50% progetto finale


        50% programma finale


        - 30-30L: Conoscenza approfondita dell''argomento, eccezionale capacità di
        applicare i concetti. La/o studente(ssa) esegue rigorosi esperimenti formali
        e produce una relazione eccezionale, di qualità paragonabile a una presentazione
        nell''ambito di una conferenza nazionale nel campo.

        - 27-29: Conoscenza approfondita dell''argomento, solida capacità di applicare
        i concetti e buone capacità analitiche. La/o studente(ssa) esegue buoni esperimenti
        formali e produce una relazione di alta qualità.

        - 24-26: Discreta conoscenza dell''argomento e ragionevole capacità di applicare
        correttamente i concetti. La/o studente(ssa) esegue alcuni esperimenti ragionevoli
        e produce una buona relazione.

        - 21-23: Conoscenza adeguata, ma non approfondita, dell''argomento e parziale
        capacità di applicare i concetti. La/o studente(ssa) esegue esperimenti imprecisi
        e produce una relazione ragionevole.

        - 18-20: Conoscenza appena adeguata e solo superficiale dell''argomento che
        denota scarsa coerenza nell''applicare i concetti. La/o studente(ssa) esegue
        esperimenti sbagliati e produce una relazione approssimativa.

        - < 18 insufficiente: Conoscenza inadeguata dell''argomento, errori significativi
        nell''applicazione dei concetti. Sia gli esperimenti che la relazione sono
        di scarsa qualità.


        Studentesse e studenti con DSA o disabilità temporanee o permanenti (inclusi
        gravi problemi di salute che interferiscono con il normale svolgimento degli
        studi) sono pregati di contattare tempestivamente l’ufficio di Ateneo responsabile
        Servizio per gli Studenti con Disabilità e con DSA (https://site.unibo.it/studenti-con-disabilita-e-dsa/it),
        possibilmente prima dell’inizio del corso. Nota bene: sarà cura dell’Ufficio
        preposto proporre alle studentesse e agli studenti interessati eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni
        dalla data dell’esame, all’approvazione del docente, che ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Il materiale del corso (diapositive,
        codice) sarà reso disponibile su moodle. Gli studenti utilizzeranno anche
        i taccuini Jupyter per codificare in Python.


        (contenuti post-editati dalla traduzione automatica con deepl)'
      Orario di ricevimento: Consulta il sito web di Luis Alberto Barron Cedeno (https://www.unibo.it/sitoweb/a.barron)
  en:
    title: '2025/2026 Language, Technology, Research I: Computational Thinking — University
      of Bologna'
    contents:
      Learning outcomes: 'The student knows the basic features (terms, concepts and
        methods) of computational thinking. S/he is able to: understand and use different
        types of data and data structures; design and implement scripts and use core
        libraries for the processing of numerical and textual data; apply the acquired
        knowledge to solve problems with computing tools.'
      Course contents: "The course teaches how to use some of the computational tools\
        \ that can help a professional in language and intercultural communication\
        \ to solve problems. It pays particular attention to large-scale problems\
        \ and to the implementation of solutions that go beyond using standard software.\n\
        \n1. Introduction to computational thinking\n2. Decomposition\n3. Pattern\
        \ recognition\n4. Abstraction\n5. Algorithmic thinking\n6. Introduction to\
        \ programming\n7. Jupyter notebooks\n8. Basic operations\n9. Dealing with\
        \ text\n10. Methods\n11. Classes\n  This lesson represents the minimum necessary\
        \ introduction to follow lessons on natural language processing and machine\
        \ translation fine tuning (e.g., within the Translation and Technology (https://corsi.unibo.it/2cycle/SpecializedTranslation/course-structure-diagram/piano/2023/9174/C09/000/2023)\
        \ MA curriculum)."
      Readings/Bibliography: '1. Church, K. W. (1994). Unix for poets (https://www.cs.upc.edu/~padro/Unixforpoets.pdf).
        Notes of a course from the European Summer School on Language and Speech Communication,
        Corpus Based Methods.

        2. Colburn, T. and G. Shute (2007). Abstraction in computer science (https://www.d.umn.edu/~tcolburn/papers/Abstraction.pdf).
        Minds and Machines, 17:169–184.

        3. Erickson, J. (2019). Algorithms (http://jeffe.cs.illinois.edu/teaching/algorithms/).
        Independently published

        4. Hey, T. and G. Pápay (2014). The Computing Universe: A Journey through
        a Revolution (https://www.cambridge.org/core/books/computing-universe/254200CEE6406C377BBB8E1E3ECA6FF9).Cambridge
        University Press

        5. Jeannet M Wing. Computational thinking (https://www.cs.cmu.edu/afs/cs/usr/wing/www/publications/Wing06.pdf).
        Commun. ACL 49(3) [1], 33-35 (2006)

        6. Numerous Wikipedia (https://en.wikipedia.org/wiki/Main_Page) articles on
        relevant topics'
      Teaching methods: A combination of lectures and interactive seminars. The students
        will play an active role in the lesson by proposing and implementing solutions.
      Assessment methods: '50% final project


        50% final program


        - 30 - 30L Excellent. The student has acquired all targeted concepts, and
        has conducted a methodologically sound project that s/he clearly presented
        in the report and the oral presentation.

        - 27 - 29 Above average. The student has a very good command of the targeted
        concepts, with some minor errors or inconsistencies in project implementation
        and/or presentation.

        - 24 - 26 Generally sound. The student has a generally good command of the
        targeted concepts, but with larger gaps or inconsistencies in project implementation
        and/or presentation.

        - 21 - 23 Adequate. The student has just an adequate command of the targeted
        concepts and displays significant shortcomings in project implementation and/or
        presentation.

        - 18 - 20 Minimum. The student has only grasped the basic targeted concepts
        and was only partially successful in implementing a project.

        - < 18 Fail. The student does not reach a minimum threshold of knowledge and
        was unsuccessful in implementing a project.


        Students with specific learning difficulties (SpLD) or with disabilities that
        can affect their ability to attend courses are invited to contact the University
        service for students with disabilities and SLD (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        at the earliest opportunity -- ideally before the start of the course. The
        University service will suggest possible adjustments to the course work and/or
        exam, which must then be submitted to the course leader so they can assess
        their feasibility, in line with the learning objectives of the course. Please
        note that adjustments to the exam must be requested at least two weeks in
        advance.'
      Teaching tools: The course materials (slides, code) will be made available on
        moodle. The students will also use Jupyter notebooks to code in Python.
      Office hours: See the website of Luis Alberto Barron Cedeno (https://www.unibo.it/sitoweb/a.barron/en)
