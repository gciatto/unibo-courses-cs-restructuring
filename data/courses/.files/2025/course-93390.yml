course_title:
  id: '93390'
  name: DIGITAL SYSTEMS AND INTRODUCTION TO COMPUTER ARCHITECTURES M
integrated_course: ''
campi:
- Bologna
programmes:
- Laurea Magistrale in Ingegneria elettronica
syllabus:
  it:
    title: 2025/2026 DIGITAL SYSTEMS AND INTRODUCTION TO COMPUTER ARCHITECTURES M
      — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Provide a vision of digital circuits at
        transistor and gate level so as to have clear ideas about the main factors
        determining circuit performance, power consumption, signal integrity digital
        throughput. Overview of digital circuits at logic and register transfer level.
        Overview of microprocessor and memory architectures. Basics of testing, performance
        and power consumption at system level.
      Contenuti: '1 - Introduction


        - Brief history of digital circuits design

        - Hierarchical design and levels of abstractions in digital systems

        - Brief introduction to digital design methodologies

        - Main fundamental metrics that helps to quantify cost, reliability and performance
        of a design


        2 -The MOS transistor


        - Description of n-MOS and p-MOS transistor behavior


        -Description of device models, operating regions, static characteristic, channel
        length modulation, velocity saturation, drain current vs. voltage, sub-threshold
        conductance, dynamic behavior


        -Effects of technology scaling on device parameters


        3 - CMOS technology and circuits


        - Introduction to basic digital gates

        - I/O inverter characteristic

        - Inverter design for optimum performance

        - Power consumption of CMOS inverters

        - Dynamic behavior of CMOS inverters

        - CMOS inverter design from delay specifications

        - Design of NOR and NAND CMOS gates

        - Design of complex CMOS gates, dynamic and DOMINO logic, Pass transistor
        logic'
      Testi/Bibliografia: '- J.M. Rabaey, A. Chandrakasan, B. Nikolic: “Digital Integrated
        Circuits: a Design Perspective, Second Edition”, Prentice Hall Int.'
      Metodi didattici: The course consists of classroom lectures in which the basic
        electronic elements are presented. In particular we will focus on the key
        concepts of Digital Electronics.
      Modalità di verifica e valutazione dell'apprendimento: 'Learning assessment
        is done through a final exam that ensures acquisition of knowledge and expected
        skills. It will be an oral examination.


        The oral test consists in 3 questions. To obtain a passing grade, the student
        must demonstrate the capacity to manage the key concepts illustrated in the
        course program. The duration of the oral test is about 45 minutes.


        Students with specific learning disabilities (SLD) or temporary/permanent
        disabilities are advised to contact the University office in charge in due
        time (https://site.unibo.it/studenti-con-disabilita-e-dsa/en ). The office
        will be responsible for proposing any necessary accommodations to the students
        concerned. Such accommodations must be submitted to the instructor at least
        15 days in advance for approval, which will be granted based on the relevance
        and compatibility with the learning objectives of the course.'
      Strumenti a supporto della didattica: -PC, projector, Power Point slides.
      Orario di ricevimento: 'Consulta il sito web di Elena Gnani (https://www.unibo.it/sitoweb/elena.gnani)


        Consulta il sito web di Francesco Conti (https://www.unibo.it/sitoweb/f.conti)


        Consulta il sito web di Francesco Conti (https://www.unibo.it/sitoweb/f.conti)'
      SDGs: 'Istruzione di qualità Energia pulita e accessibile Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
