syllabus:
  it:
    title: 2025/2026 INFORMATICA APPLICATA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso lo studente possiede\
        \ una preparazione che gli consente di applicare le tecniche e i metodi tipici\
        \ della Scienza dell'Informazione nel contesto formativo della Odontoiatria\
        \ e Protesi Dentaria.\nIn particolare lo studente è in grado di:\n\x95 conoscere\
        \ l'architettura di base dei sistemi informativi e i principali aspetti applicativi\
        \ della Dental Informatics;\n\x95 identificare gli elementi costitutivi dei\
        \ sistemi informativi e comprendere i vantaggi della la gestione integrata\
        \ dei dati a fini gestionali e organizzativi\n\x95 definire tecniche di modellazione\
        \ e le differenti modalità di rappresentazione e strutturazione informatica\
        \ dei dati, realizzare algoritmi di elaborazione ed i relativi diagrammi di\
        \ flusso\n\x95 distinguere tra linguaggi di programmazione procedurali e generalizzati\
        \ e le loro differenti tipologie e identificare le strutture di controllo\
        \ utilizzate per le differenti categorie di linguaggi.\n\x95 descrivere l'organizzazione\
        \ dei dati in una database dai campi alla struttura del record alla organizzazione\
        \ tabellare;\n\x95 completare le fasi di analisi dei requisiti, definizione\
        \ del progetto concettuale e logico di un data base fino alla completa implementazione;\n\
        \x95 utilizzare DBMS relazionali e il linguaggio SQL per la gestione delle\
        \ informazioni archiviate e la realizzazione di nuovi database;\n\x95 eseguire\
        \ integrazioni di dati eterogenei per qualità e quantità e descrivere procedure\
        \ di data mining in ambito odontoiatrico."
      Contenuti: 'Contenuti

        Generalità su architettura ed elementi costitutivi dei sistemi informativi

        Elementi Organizzativi: ciclo di vita dei documenti, strutturazione, procedure
        e gestione informatizzata dei dati

        Elementi Tecnologici: catalogazione funzionale di workstation, server e sistemi
        di elaborazione dedicati, architetture di rete e di elaborazione (client server
        e pear to pear). Reti a commutazione di linea o trasferimento dati a pacchetto,
        software di interconnessione e modalità di trasferimento dati. Protocollo
        TCP/IP. STACK ISO/OSI e trasferimento dati da livello fisico a livello applicativo.
        Internet: storia, architettura, enti di controllo, modalità di accesso, regole
        di utilizzo ed apparati di interconnessione (Router, bridge, switch).

        Elementi Applicativi: generalità, categorie funzionali degli applicativi per
        elaborazione dati, diagramma di flusso e schema a blocchi del processo di
        elaborazione dati (Input, Editing, Output). Sistemi operativi di rete ed architetture
        dei sistemi operativi mono e multi utente, mono e multitasking. Software proprietario
        e Open Source. Elaborazione dati ed applicativi software di supporto e servizio
        ed elaborazioni primarie (testo, numeriche, grafiche, etc.). Protocolli di
        rete e architetture di elaborazione client server. (SMTP, POP, HTTP, SSH,
        HTTP, FTP, altri)

        Modelli di rappresentazione dei dati e Algoritmi:

        Generalità, diagrammi di flusso, linguaggi di programmazione e sequenze seriali
        di elaborazione.

        Basi di Dati:

        Generalità e metodologia di progettazione (Raccolta requisiti, progetto concettuale,
        progetto logico, progetto fisico). Modelli di rappresentazione dati. Esempi
        applicativi e schema E-R. Identificazione, caratteristiche ed attributi di
        ENTITA'' e Associazioni con esempi applicativi e schemi grafici derivati.
        Sistemi e programmi di elaborazione dedicati. Descrizione ed utilizzo di Access
        e MySQL e generalità sui DBMS e RDBMS. Linguaggi per la gestione delle basi
        di dati. SQL e modalità di accesso ed utilizzo single o multi user. Linguaggi
        per la gestione dei RDBMS - Data Manipulation Language, Data definition Language,
        Data Control Language. Esempi applicativi con introduzione ai concetti di
        selezione, vista, indice, join. Sintassi dei comandi ed esempi applicativi
        con introduzione ai concetti di congiunzione ed estrazione di DataBase, operatori
        condizionali (<>= OR, AND, LIKE), di aggregazione (GROUP), riordino (ORDER
        BY)

        Internet:

        Modalità di accesso alle basi di dati biomediche on line. Sistemi per l''accesso
        integrato alle informazioni: PUBMED, TOXNET, ENTREZ, PBDB, Visible Human Project,
        Istological Atlas, etc. Funzionamento dei motori di ricerca, analisi delle
        architetture e delle funzioni dei siti HTTP e modalità di utilizzo integrato
        delle basi di dati e dei protocolli di accesso ai dati tramite la rete.'
      Testi/Bibliografia: 'Presentazioni Power Point.

        e-Learning.

        Fondamenti di Informatica Volume 1 e 2 Zanichelli'
      Metodi didattici: Lezioni frontali in aula con esercitazioni
      Modalità di verifica e valutazione dell'apprendimento: Test a risposte multiple
        ed esercizi in excel
      Strumenti a supporto della didattica: Virtuale
      Orario di ricevimento: Consulta il sito web di Gabriele Amato (https://www.unibo.it/sitoweb/gabriele.amato)
