course_title:
  id: B8536
  name: 'Computer-Aided Human Translation: CAT, MT and AI'
integrated_course: Componente del corso integrato TECHNOLOGIES FOR TRANSLATION (IC)
  (CURRICULUM SPECIALIZED TRANSLATION)
campus: Forli
programme: Laurea Magistrale in Specialized Translation
syllabus:
  it:
    title: '2025/2026 Computer-Aided Human Translation: CAT, MT and AI (CL1) — Università
      di Bologna'
    contents:
      Conoscenze e abilità da conseguire: Lo/a studente/ssa conosce i principali strumenti
        informatici per la gestione dei file, la traduzione assistita (CAT) e la traduzione
        potenziata dall'intelligenza artificiale (IA), inclusa la traduzione automatica
        (MT); sa utilizzare efficacemente gli strumenti CAT, applicare tecniche basilari
        di prompting all’interno di strumenti di traduzione basati sull’IA e lavorare
        con diversi motori di TA; è in grado di verificare e garantire la qualità
        delle traduzioni e effettuare post-editing in modo efficiente e accurato su
        vari tipi di testi e in vari domini, adattandoli a diversi pubblici secondo
        necessità; è in grado di concepire, gestire e valutare progetti articolati
        che coinvolgono varie professionalità e varie modalità e strumenti (CAT, MT,
        post-editing e IA); è in grado di elaborare autonomamente ulteriori conoscenze
        e competenze nell’ambito di CAT, IA e post-editing, applicandole a nuove pratiche
        basate sull'IA, nel rispetto della deontologia professionale e degli standard
        di settore.
      Contenuti: 'Il modulo di "Computer-aided human translation: CAT, MT and AI"
        (CatMAI) si svolge nel secondo semestre ed è uno dei due che compongono il
        corso di "Technologies for Translation", insieme a "Information Mining and
        Terminology", che si svolge nel primo semestre e che è tenuto dal Prof. Adriano
        Ferraresi (https://www.unibo.it/sitoweb/adriano.ferraresi/didattica/2025).


        Nella prima parte si concentra sul concetto di traduzione assistita. Dopo
        aver fornito un''introduzione teorica, verranno presentati alcuni dei principali
        strumenti di traduzione assistita da computer (CAT) presenti sul mercato (Trados
        Studio, MemoQ, MateCat), proprietari e liberi. In particolare ci si concentrerà
        sulla traduzione dei principali formati di file, sulla creazione e gestione
        di memorie di traduzione e sul controllo della qualità dei testi di arrivo.
        Verranno inoltre fornite le basi per la gestione di progetti di traduzione
        complessi che prevedono la partecipazione di figure professionali diverse
        (Project Management) tramite CAT. Infine, verranno presentate le più recenti
        funzionalità dei CAT tool che sfruttano l''intelligenza artificiale (IA) generativa
        per ottimizzare i flussi di lavoro sia in fase di traduzione, sia in fase
        di revisione.


        La seconda parte, collegata alla prima, inizierà con la presentazione degli
        evidenti vantaggi relativi all''utilizzo della traduzione potenziata dall''IA,
        inclusa la traduzione automatica (TA) accompagnata dal post-editing. Ci si
        concentrerà inoltre sulle possibilità di integrazione tra sistemi CAT, sistemi
        di TA e funzionalità di traduzione generativa basata sull’IA presenti nei
        software CAT. In merito al PE verranno approfondite diverse modalità di intervento
        (minimo, completo, ecc.) in relazione a variabili quali le condizioni specifiche
        del particolare incarico, il profilo del post-editor (bilingue, monolingue
        della lingua d''arrivo, esperto del settore, ecc.), la tipologia della traduzione,
        la sede di pubblicazione e le modalità di diffusione previste per il testo
        d''arrivo revisionato, i suoi potenziali lettori e utenti, ecc. Verranno presentate
        le varie strategie di PE che permettono di migliorare l''output grezzo ottenuto
        dai sistemi di TA e dai sistemi di IA generativa e di elaborare quindi un
        testo d''arrivo finale di qualità adeguata alle specifiche esigenze del contesto
        traduttivo.


        Verranno inoltre introdotte le tecniche basilari di prompting utilizzabili
        all’interno di strumenti di traduzione basati sull’IA sia per ottimizzare
        l’output grezzo di un testo tradotto automaticamente, sia per post-editarlo.'
      Testi/Bibliografia: 'Durante le lezioni di carattere più teorico, la docente
        farà riferimento alla seguente bibliografia:


        Bersani Berselli, G. (a cura di) (2011) "Usare la Traduzione Automatica".
        Bologna: CLUEB.


        Bowker, L., (2002). “Computer-Aided Translation Technology. A Practical Introduction”.
        University of Ottawa Press.


        Bowker, Lynne, (2005). “Productivity vs. Quality? A pilot study on the impact
        of translation memory systems”. Localisation Focus 4:1. 13-20.


        Cevoli, M. & S. Alasia, (2012). “Guida completa a OmegaT”. Badalona: Qabiria.


        Declercq, C. (2023). Editing in translation technology. In Routledge encyclopedia
        of translation technology (pp. 551-564). Routledge.


        Fagbohun, O., Harrison, R. M., & Dereventsov, A. (2024). An empirical categorization
        of prompting techniques for large language models: A practitioner''s guide.
        arXiv preprint arXiv:2402.14837.


        He, S. (2024). Prompting ChatGPT for translation: A comparative analysis of
        translation brief and persona prompts. arXiv preprint arXiv:2403.00127.


        Koponen, M. (2016) "Is machine translation post-editing worth the effort?
        A survey of research into post-editing and effort". The Journal of Specialised
        Translation. Disponibile online: https://www.jostrans.org/issue25/art_koponen.pdf


        Lecci, C. & E. Di Bello, (2012). “Usare la traduzione assistita”. Bologna:
        CLUEB.


        Poulis, Alexandros and David Kolovratnik (2012) "To Post-edit or not to Post-edit?
        Estimating the Benefits of MT Post-editing for a European Organization". Proceedings
        of the AMTA 2012 Workshop on Post-editing Technology and Practice (WPTP 2012).
        The Tenth Biennial Conference of the Association for Machine Translation in
        the Americas, October 28-November 1 2012, San Diego, CA, USA. Disponibile
        online: http://amta2012.amtaweb.org/AMTA2012Files/html/9/9_paper.pdf


        Qian, M., & Kong, C. (2024, May). Enabling Human-Centered Machine Translation
        Using Concept-Based Large Language Model Prompting and Translation Memory.
        In International Conference on Human-Computer Interaction (pp. 118-134). Cham:
        Springer Nature Switzerland.


        Toto P. (2021). “Flipped classrooms and translation technology teaching: a
        case study”. In Wang C., Zheng B., Empirical studies of translation and interpreting.
        London: Routledge.


        Vela M., Pal S., Zampieri M., Kumar Naskar S. (2019). “Improving CAT Tools
        in the Translation Workflow: New Approaches and Evaluation”. Saarland University,
        Germany, University of Wolverhampton, UK, Jadavpur University, India. Online:
        https://arxiv.org/pdf/1908.06140.pdf


        Vieira, L. N. (2019). Post-editing of machine translation. "The Routledge
        handbook of translation and technology". 319-336. London: Routledge.


        Zhang, B., Haddow, B., & Birch, A. (2023). Prompting large language model
        for machine translation: A case study. In International Conference on Machine
        Learning (pp. 41092-41110). PMLR.'
      Metodi didattici: 'Le lezioni si svolgono in forma di workshop e si articolano
        secondo uno schema ben definito che unisce aspetti teorici a una forte componente
        pratica e applicativa.


        I contributi teorici vengono trasmessi attraverso presentazioni da parte della
        docente ed eventuali letture di approfondimento assegnate alle studentesse
        e agli studenti durante il corso.


        La componente pratica consiste in esercitazioni in laboratorio, esercizi di
        consolidamento da svolgere a casa e successiva discussione in classe e risoluzione
        dei problemi emersi nell''attività esercitatoria per permettere un monitoraggio
        puntuale e costante dello sviluppo delle capacità tecnologiche oggetto del
        corso.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.


        Il corso prevede l''obbligo di frequenza pari al 70%.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale ha una
        durata complessiva di due ore e consiste in una prova pratica di traduzione
        assistita - ad esempio la creazione di memorie di traduzione, database terminologici
        e progetti/pacchetti di traduzione con uno degli strumenti CAT presentati
        a lezione - della durata di un''ora e trenta minuti ed una prova teorica su
        TA, post-editing e IA - un quesito a risposta aperta - della durata di circa
        trenta minuti e riguardante i principi e le metodologie affrontati in classe
        durante il modulo e le loro applicazioni nella traduzione professionale, con
        un''analisi critica delle relative potenzialità e applicazioni.


        ESAME PER STUDENTESSE E STUDENTI InTeCo/InConf


        Solo per studentesse e studenti dei curricula InTeCo e InConf (corso di laurea
        in Interpretazione), per i quali il corso è opzionale, l''esame consiste in
        due quesiti a risposta aperta - della durata di circa sessanta minuti - riguardanti
        i principi e le metodologie affrontati in classe durante il modulo e le loro
        applicazioni nella traduzione professionale, con un''analisi critica delle
        relative potenzialità e applicazioni.


        Valutazione


        30 – 30L risultati eccellenti, che dimostrano una ottima comprensione dei
        contenuti del corso, così come una buona consapevolezza e capacità di valutazione
        dei diversi sistemi CAT da adottare per esigenze e flussi di lavoro diversi.

        27 – 29 risultati sopra la media, con errori minori o bilanciati da una buona
        conoscenza dei concetti e delle applicazioni fondamentali.

        24 – 26 buoni risultati, con alcuni errori o lacune di conoscenza che mostrano
        una parziale comprensione dei contenuti e delle competenze richieste.

        21 – 23 risultati sufficienti, ma con notevoli lacune nelle conoscenze o abilità
        acquisite nei contenuti del corso.

        18 – 20 risultati che dimostrano solo una conoscenza minima dei contenuti
        del corso.

        < 18 insufficiente, i concetti di base non sono stati compresi o dimostrati,
        la studentessa o lo studente dovrà ripetere il test.


        Studentesse e studenti con DSA o disabilità temporanee o permanenti (inclusi
        gravi problemi di salute che interferiscono con il normale svolgimento degli
        studi) sono pregati di contattare tempestivamente l’ufficio di Ateneo responsabile
        (Servizio per gli Studenti con Disabilità e con DSA: https://site.unibo.it/studenti-con-disabilita-e-dsa/it),
        possibilmente prima dell’inizio del corso. Nota bene: sarà cura dell’Ufficio
        preposto proporre alle studentesse e agli studenti interessati eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni
        dalla data dell’esame, all’approvazione del/della docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Le lezioni si svolgono in laboratorio
        informatico con collegamento internet e videoproiettore.


        Data la modalità di erogazione della didattica, in forma di workshop con ampi
        spazi per le esercitazioni pratiche, le studentesse e gli studenti hanno la
        possibilità di utilizzare i principali applicativi software utilizzati nel
        campo della traduzione assistita, sia proprietari sia open-source o comunque
        di libero accesso.


        I materiali didattici (testi, presentazioni, file di progetto, manuali d''uso,
        ecc.) sono resi disponibili attraverso la piattaforma e-learning Moodle.'
      Link ad altre eventuali informazioni: https://moodle.dipintra.it/course/view.php?id=67
      Orario di ricevimento: Consulta il sito web di Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: '2025/2026 Computer-Aided Human Translation: CAT, MT and AI (CL1) — University
      of Bologna'
    contents:
      Learning outcomes: The student is familiar with key digital tools for file management,
        computer-assisted translation (CAT) and AI-enhanced translation, including
        Machine Translation (MT); they can use CAT tools effectively, apply basic
        prompting techniques for AI-driven translation tools, and work with MT engines;
        they can vouchsafe translation quality and post-edit texts efficiently and
        accurately across various text types and domains, adapting them to different
        audiences, as needed; they can set up, manage, and evaluate projects involving
        other professionals that combine CAT, MT, post-editing, and AI tools; they
        can expand and refine their knowledge of CAT, AI and post-editing autonomously,
        applying it to new AI-driven practices, in line with professional ethics and
        industry standards.
      Course contents: 'The "Computer-aided human translation: CAT, MT and AI " (CatMAI)
        module is delivered in the second semester and is one of the two modules that
        make up the "Technologies for Translation" course, together with "Information
        Mining and Terminology", which is delivered in the first semester and which
        is held by Prof. Adriano Ferraresi (https://www.unibo.it/sitoweb/adriano.ferraresi/didattica/2025).


        The first part offers a theoretical introduction to the notion of computer-assisted
        translation. Subsequently some of the most common CAT tools are presented
        (Trados Studio, MemoQ, MateCat), proprietary and free. In particular, the
        module focuses on the translation of the main file formats, the creation and
        managing of translation memories and the quality assurance of target texts
        (QA check). The basis for managing complex translation projects involving
        different professionals (Project Management) through CAT are also provided.
        Finally, the latest CAT tool functionalities that integrate generative artificial
        intelligence (AI) to optimise workflows in both translation and revision will
        be presented.


        The second part, which is linked to the first one, starts with a presentation
        of the obvious advantages of using AI-enhanced translation, including machine
        translation (MT) accompanied by post-editing. It will also focus on the possibilities
        of integration between CAT and MT systems and AI-based generative translation
        functionalities included in CAT software.


        With regard to PE, different ways of intervention (light, full, etc.) are
        discussed in relation to variables such as the specific conditions of the
        revision task, the post-editor profile (bilingual, monolingual of the target
        language, expert in the field, etc.), the type of translation, the publication
        venue and the circulation methods planned for the revised target text, its
        potential readers and users, etc. Various PE strategies allowing for the improvement
        of the raw output provided by MT and generative AI systems are also presented.
        The aim of these strategies is to obtain a target text which meets the specific
        requirements of the translation context.


        Basic prompting techniques that can be used within AI-based translation tools,
        both to optimise the raw output of a machine-translated text and to post-edit
        it, will also be introduced.'
      Readings/Bibliography: 'During lessons based on theoretical aspects, the teacher
        will be using the following bibliographical references:


        Bersani Berselli, G. (a cura di) (2011) "Usare la Traduzione Automatica".
        Bologna: CLUEB.


        Bowker, L., (2002). “Computer-Aided Translation Technology. A Practical Introduction”.
        University of Ottawa Press.


        Bowker, Lynne, (2005). “Productivity vs. Quality? A pilot study on the impact
        of translation memory systems”. Localisation Focus 4:1. 13-20.


        Cevoli, M. & S. Alasia, (2012). “Guida completa a OmegaT”. Badalona: Qabiria.


        Declercq, C. (2023). Editing in translation technology. In Routledge encyclopedia
        of translation technology (pp. 551-564). Routledge.


        Fagbohun, O., Harrison, R. M., & Dereventsov, A. (2024). An empirical categorization
        of prompting techniques for large language models: A practitioner''s guide.
        arXiv preprint arXiv:2402.14837.


        He, S. (2024). Prompting ChatGPT for translation: A comparative analysis of
        translation brief and persona prompts. arXiv preprint arXiv:2403.00127.


        Koponen, M. (2016) "Is machine translation post-editing worth the effort?
        A survey of research into post-editing and effort". The Journal of Specialised
        Translation. Disponibile online: https://www.jostrans.org/issue25/art_koponen.pdf


        Lecci, C. & E. Di Bello, (2012). “Usare la traduzione assistita”. Bologna:
        CLUEB.


        Poulis, Alexandros and David Kolovratnik (2012) "To Post-edit or not to Post-edit?
        Estimating the Benefits of MT Post-editing for a European Organization". Proceedings
        of the AMTA 2012 Workshop on Post-editing Technology and Practice (WPTP 2012).
        The Tenth Biennial Conference of the Association for Machine Translation in
        the Americas, October 28-November 1 2012, San Diego, CA, USA. Disponibile
        online: http://amta2012.amtaweb.org/AMTA2012Files/html/9/9_paper.pdf


        Qian, M., & Kong, C. (2024, May). Enabling Human-Centered Machine Translation
        Using Concept-Based Large Language Model Prompting and Translation Memory.
        In International Conference on Human-Computer Interaction (pp. 118-134). Cham:
        Springer Nature Switzerland.


        Toto P. (2021). “Flipped classrooms and translation technology teaching: a
        case study”. In Wang C., Zheng B., Empirical studies of translation and interpreting.
        London: Routledge.


        Vela M., Pal S., Zampieri M., Kumar Naskar S. (2019). “Improving CAT Tools
        in the Translation Workflow: New Approaches and Evaluation”. Saarland University,
        Germany, University of Wolverhampton, UK, Jadavpur University, India. Online:
        https://arxiv.org/pdf/1908.06140.pdf


        Vieira, L. N. (2019). Post-editing of machine translation. "The Routledge
        handbook of translation and technology". 319-336. London: Routledge.


        Zhang, B., Haddow, B., & Birch, A. (2023). Prompting large language model
        for machine translation: A case study. In International Conference on Machine
        Learning (pp. 41092-41110). PMLR.'
      Teaching methods: 'Lessons take the form of workshops covering theoretical aspects
        as well as devoting substantial space to practical exercises.


        Theoretical contents are acquired through presentations by the lecturer and,
        when relevant, readings assigned to the students during the course.


        The applied part consists of hands-on practice in the lab and homework exercises.
        These are discussed during troubleshooting sessions in the following class,
        so as to constantly monitor progress in the development of the technological
        skills that make the object of the course.


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        online.


        Attendance is compulsory (at least 70% of lessons must be attended).'
      Assessment methods: 'The final exam lasts overall two hours and consists of
        a practical test on computer-assisted translation - e.g. the creation of translation
        memories, terminology databases and translation projects/packages using one
        of the CAT tools presented in class - lasting one hour and thirty minutes,
        and a theoretical test on MT, post-editing and AI - an open-ended question
        - lasting approximately thirty minutes and covering the principles and methodologies
        covered in class during the module and their applications in professional
        translation, with a critical analysis of their potential and applications.


        ESAME PER STUDENTESSE E STUDENTI InTeCo/InConf


        Only for students of the InTeCo and InConf curricula (Master''s degree in
        Interpretation), for whom the course is an elective, the final exam consists
        of two open-ended questions - lasting approximately sixty minutes - concerning
        the principles and methodologies covered in class during the module and their
        applications in professional translation, with a critical analysis of their
        potential and applications.


        Evaluation


        30 – 30L excellent results, demonstrating an excellent understanding of the
        course content, as well as a good awareness and ability to evaluate different
        CAT systems to be adopted for different needs and workflows.

        27 – 29 above average results, with minor errors or balanced by a good knowledge
        of fundamental concepts and applications.

        24 – 26 good results, with some errors or knowledge gaps that show a partial
        understanding of contents and required skills.

        21 – 23 sufficient results, but with notable gaps in knowledge or skills acquired
        in the course contents.

        18 – 20 results that only prove minimal knowledge of the course contents.

        < 18 insufficient, basic concepts have not been understood or demonstrated,
        the students has to take again the test.


        Students with specific learning difficulties (SpLD) or with disabilities that
        can affect their ability to attend courses are invited to contact the University
        service for students with disabilities and SLD at the earliest opportunity
        -- ideally before the start of the course: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students.
        The University service will suggest possible adjustments to the course work
        and/or exam, which must then be submitted to the course leader so they can
        assess their feasibility, in line with the learning objectives of the course.
        Please note that adjustments to the exam must be requested at least two weeks
        in advance.'
      Teaching tools: 'Lessons are held in a computer lab with internet connection
        and beamer.


        Since lessons take the form of workshops, with substantial time devoted to
        pratical hands-on exercises, students have the possibility to become acquainted
        with the main software programs used in the fields of CAT, both proprietary
        and open-source/free.


        Support materials (sample texts, slides, project files, instructions etc.)
        are made available through the Moodle e-learning platform.'
      Links to further information: https://moodle.dipintra.it/course/view.php?id=67
      Office hours: See the website of Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2/en)
      SDGs: 'Quality education Decent work and economic growth


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
