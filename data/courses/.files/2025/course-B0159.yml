syllabus:
  it:
    title: 2025/2026 ELETTRONICA ANALOGICA INTEGRATA LM — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente possiede
        gli strumenti necessari per affrontare lo studio dei circuiti integrati analogici.
        Gli argomenti trattati includono gli effetti a canale corto, gli schemi di
        amplificatori elementari e alcune soluzioni circuitali più avanzate. Al termine
        del corso, lo studente è in grado di: (a) discutere il funzionamento di un
        transistor MOS al variare della polarizzazione; (b) progettare riferimenti
        di tensione, di corrente e stadi amplificatori elementari; (c) progettare
        amplificatori operazionali a partire da specifiche di guadagno, velocità,
        comportamento in frequenza. Sono presentati e commentati esempi concreti per
        sviluppare la capacità di analisi e progetto.'
      Contenuti: '- Alcuni richiami sui modelli ai grandi e piccoli segnali dei transistori
        MOS. Cenni sull''evoluzione e l''impatto delle nuove tecnologie sui dispositivi,
        le loro prestazioni e i modelli.

        - Studio sulle proprietà degli stadi elementari di guadagno e sugli stadi
        amplificatori CMOS a singolo stadio. Configurazione cascode.

        - Generatori e specchi di corrente, riferimenti di tensione.

        - La coppia differenziale.

        - I concetti di stabilità e retroazione nei circuiti analogici integrati.

        - Non idealità, slew rate e principali tecniche di compensazione per garantire
        la stabilità in configurazione ad anello chiuso.

        - Amplificatori operazionali e OTA. Topologie principali, specifiche e parametri
        caratteristici (nel tempo e in frequenza).

        - Analisi dettagliata di un classico schema di operazionale a due stadi

        - Cenni sulle soluzione Rail-to-Rail e sulla retroazione di modo comune.

        - Esempi di circuiti analogici integrati (amplificatori e filtri).'
      Testi/Bibliografia: 'E'' di importanza fondamentale l''utilizzo degli appunti
        presi a lezione e del materiale didattico integrativo (esempi ed esercizi)
        reso disponibile online all''interno dell''applicativo Virtuale. Si consiglia
        inoltre la consultazione dei seguenti testi:


        - R.C. Jaeger, T. Blalock, B.J Blalock "Microelettronica" McGraw Hill 6a Ed.
        2023

        - P.R. Gray, P.J Hurst, S.H Lewis, R.G. Meyer, "Analysis and Design of analog
        integrated circuits", 5th ed. New York, NY (USA): John Wiley & Sons, 2009.

        - T. C. Carusone, D.A. Johns, K. Martin, "Analog Integrated Circuit Design",
        2nd ed. John Wiley & Sons, 2011'
      Metodi didattici: 'Lezioni frontali ed esercitazioni in aula. Saranno presentati
        e commentati esempi circuitali per sviluppare la capacità di analisi e progetto
        degli studenti con riferimento a semplici sistemi elettronici.


        Verranno forniti settimanalmente esercizi utili per verificare in modo autonomo
        i livelli di apprendimento e comprensione della materia raggiunti. Gli esercizi
        più complessi saranno risolti in aula per confrontare le soluzioni proposte
        e dirimere le eventuali difficoltà incontrate dagli studenti.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso una prova scritta finale della durata di 2 ore, costituita
        da due esercizi e una domanda di teoria a risposta libera. Durante l''esame
        non è ammesso l''uso di PC, libri o appunti.


        La prova scritta mira ad accertare il livello di comprensione acquisito nella
        analisi e nel progetto dei blocchi analogici fondamentali di un sistema elettronico,
        valutando la capacità di risolvere i problemi illustrati nell''ambito delle
        tematiche affrontate nel corso.


        Su richiesta dello studente è possibile sostenere una prova orale facoltativa
        incentrata sui tipi di amplificatori CMOS integrati presentati nel corso,
        valutando la capacità di sintesi e di utilizzazione del linguaggio tecnico
        appropriato da parte dello studente.


        Il voto conseguito, espresso in trentesimi, contribuisce per il 50% alla definizione
        del voto finale per il corso integrato Sensori e Elettronica Analogica LM.


        Alle Studentesse e agli Studenti con DSA o disabilità temporanee o permanenti
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile, all''indirizzo
        (**https://site.unibo.it/studenti-con-disabilita-e-dsa/it). Sarà cura dell''ufficio
        proporre eventuali adattamenti, che dovranno comunque essere sottoposti, con
        un anticipo di 15 giorni, all’approvazione del/la docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Lucidi, simulazioni circuitali al calcolatore,
        esempi di schemi elettrici di amplificatori.
      Orario di ricevimento: Consulta il sito web di Nicolò Attilio Speciale (https://www.unibo.it/sitoweb/nicolo.speciale)
  en:
    title: 2025/2026 Integrated Analog Electronics (2nd cycle) — University of Bologna
    contents:
      Learning outcomes: 'The aim of the course is to develop the necessary background
        to deal with the study of analog integrated circuits. Topics covered include
        short channel effects, elementary amplifier schemes, and some more advanced
        circuit solutions. At the end of the course, the student is able to: (a) know
        the characteristics of modern MOS transistors; (b) design voltage and current
        reference circuits and elementary amplifier; (c) design operational amplifiers
        starting from specifications of gain, speed, frequency behavior. Concrete
        examples are presented and commented to develop analysis and design capacity.'
      Course contents: '- The basic physical behavior and compact modeling of integrated
        MOSFET transistors. Second order effects.

        - Basic building blocks of analog integrated circuits: MOS current mirrors
        and active-load single-stage amplifiers. Cascode amplifier.

        - Fundamental principles of basic opamp design.

        - Stability and feedback in electronic systems.

        - Compensation techniques needed to ensure stability in closed-loop amplifiers.
        Slew rate, zeroing systematic input offset voltage and process-insensitive
        lead compensation.

        - Detailed analysis of the classical two-stage CMOS opamp.

        - Cascode and fully-differential opamp schemes.

        - Examples of amplifiers and analog filters circuits.'
      Readings/Bibliography: 'It is very important to study personal notes and supplementary
        teaching materials (examples and exercises) made available online in Virtuale.
        It is also recommended to consult the following texts:


        - P.R. Gray, P.J Hurst, S.H Lewis, R.G. Meyer, "Analysis and Design of analog
        integrated circuits", 5th ed. John Wiley & Sons, 2009

        - T. C. Carusone, D.A. Johns, K. Martin, "Analog Integrated Circuit Design"
        2nd ed. John Wiley & Sons, 2011.'
      Teaching methods: 'The teaching method is based on lectures and exercises on
        topics related to the analysis and design of integrated analog blocks and
        operational amplifiers.


        Detailed examples will be extensively used to develop analytical skills of
        the students and their capacity to analyze and design simple electronic systems.


        Weekly homework will be provided. The most complex exercises will be solved
        in class to compare the proposed solutions and resolve any difficulties encountered
        by the students.'
      Assessment methods: 'Achievements will be assessed by the means of a final written
        exam composed of two exercices (2 hours). No books, laptops, Internet appliances,
        smart phones, can be used during exams.


        An optional oral session on the topics of the carried out lectures is possible
        upon request of the student.


        To obtain a passing grade, students are required to at least demonstrate a
        knowledge of the key concepts of the subject, and a proper use of technical
        language.


        Higher grades will be awarded to students who demonstrate a firm understanding
        of the subject and a clear and concise presentation of the contents.


        A failing grade will be awarded if the student shows knowledge gaps in key-concepts
        of the subject, inappropriate use of language, and/or logic failures in the
        analysis of the subject.


        Students with DSA or temporary or permanent disabilities are advised to contact
        the University office in good time (https://site.unibo.it/studenti-con-disabilita-e-dsa/it).
        The office will be responsible for proposing any adaptations, which must be
        submitted for the teacher''s approval at least 15 days in advance. The teacher
        will assess the appropriateness of the adaptations in relation to the teaching
        objectives.'
      Teaching tools: Slides, computer simulations examples.
      Office hours: See the website of Nicolò Attilio Speciale (https://www.unibo.it/sitoweb/nicolo.speciale/en)
