syllabus:
  it:
    title: 2025/2026 CYBER-PHYSICAL SYSTEMS PROGRAMMING M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso fornisce allo studente una conoscenza
        di base delle architetture software e gli ambienti di sviluppo, programmazione
        e progettazione di sistemi cyber-fisici, con particolare enfasi alla coesistenza
        di task di controllo, processing di data stream, e comunicazione IoT con requisiti
        di real-time e cybersecurity. Nel corso lo studente impara a utilizzare compilatori,
        librerie, runtime e middleware per piattaforme e architetture eterogenee,
        dotate di processori multicore, co-processori e acceleratori HW e SW per il
        processing di stream di dati da sensori e verso attuatori.
      Contenuti: '- Introduction to software development and cross-compilation for
        cyber-physical systems (CPS): compiler, bootloader, system calls, RTOS, middleware,
        real-time applications (e.g. controllers, real-time sensor data processing)

        - Embedded firmware development (baremetal programming) for embedded systems:
        C runtime, call stack, development of drivers

        - Real-time operating systems (RTOS) for CyberPhysical Systems (e.g. Nuttx,
        Zephyr, SEL4, PikeOS and automotive RTOSes); RTOS configuration and drivers
        for CPS (Examples on FreeRTOS and NuttX)

        - Middleware for CPS (microROS, xrce-DDS, DDS)

        - Case study: Programming the Crazyflie drone

        - Advanced topics: i) Elements of cybersecurity applied to CPS (Trusted Execution
        Environments, Trusted Platform Modules for firmware signature/verification
        and secure communication, control flow integrity); ii) Elements of Artificial
        Intelligence for autonomous CPS (neural networks and deep reinforcement learning)

        - Laboratory topics: i) Baremetal programming on QEMU emulator; ii) Learning
        the development environment of FreeRTOS/Crazyflie; iii) Development of a sensor
        drivers in FreeRTOS/Crazyflie, debugging howto; iv) Development of applications
        on Crazyflie (e.g. flight controller, autonomous flight)'
      Testi/Bibliografia: 'Materiale didattico:


        - slide fornite dal docente

        - articoli scientifici forniti dal docente

        - puntatori a manuali e siti web specifici'
      Metodi didattici: 'Il corso si compone di lezioni teoriche e laboratori guidati.
        Nelle lezioni teoriche verranno esposti i concetti principali che verranno
        poi affrontati in maniera pratica su schede prototipo e droni in laboratorio
        che saranno usati come esempi di CPS.


        Le lezioni teoriche contengono una parte principale di fondamenti di programmazione
        di sistemi embedded e CPS e una parte più avanzata relativa a temi di sicurezza
        e AI applicati ai CPS.


        I laboratori saranno guidati dal docente e gli studenti verranno forniti di
        hardware su cui fare esperienza di programmazione. Saranno organizzati in
        almeno 3 gruppi di 3 esercitazioni ciascuno:


        - Gruppo I: Programmazione baremetal su emulatore

        - Gruppo II: Programmazione di un piccolo drone (Crazyflie)

        - Gruppo III: Sviluppo di applicazioni di controllo di volo e di missione


        NOTA:


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame sarà composto
        da uno scritto della durata di 1 ora con domande a risposta chiusa e dalla
        discussione di un progetto sviluppato dagli studenti partendo dagli strumenti
        imparati durante i laboratori.


        Gli studenti svolgeranno il progetto singolarmente o in gruppo a seconda della
        numerosità e dei progetti disponibili.


        Il docente proporrà alcuni progetti ma gli studenti potranno proporre personalizzazioni
        degli stessi. Gli studenti potranno presentare modifiche alle proposte di
        progetto che verranno valutate dal docente per essere approvate.


        Il progetto dovrà essere presentato tramite alcune slide e una breve dimostrazione.'
      Strumenti a supporto della didattica: 'Parte teorica:


        - lecture notes

        - siti web e repository di codice

        - articoli scientifici


        Parte di laboratorio:


        - board di sviluppo basate su microcontrollori ARM e RISC-V

        - droni bitcraze crazyflie


        I supporti hardware potranno essere soggetti a modifiche/aggiornamenti a seconda
        del numero degli studenti e dei componenti disponibili'
      Orario di ricevimento: 'Consulta il sito web di Andrea Acquaviva (https://www.unibo.it/sitoweb/andrea.acquaviva)


        Consulta il sito web di Francesco Barchi (https://www.unibo.it/sitoweb/francesco.barchi)'
      SDGs: 'Energia pulita e accessibile Città e comunità sostenibili Lotta contro
        il cambiamento climatico


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Cyber-Physical Systems Programming M — University of Bologna
    contents:
      Learning outcomes: The course provides the student with a basic knowledge of
        software architectures as well as the development, programming and design
        environments for cyber-physical systems, with particular emphasis on the coexistence
        of control tasks, data stream processing, and IoT communication with real-time
        and cybersecurity requirements. The student will learn to use compilers, libraries,
        runtimes and middleware for heterogeneous platforms and architectures, equipped
        with multicore processors, co-processors and HW and SW accelerators for the
        processing of data streams from sensors and towards actuators.
      Course contents: '- Introduction to software development and cross-compilation
        for cyber-physical systems (CPS): compiler, bootloader, system calls, RTOS,
        middleware, real-time applications (e.g. controllers, real-time sensor data
        processing)

        - Embedded firmware development (baremetal programming) for embedded systems:
        C runtime, call stack, development of drivers

        - Real-time operating systems (RTOS) for CyberPhysical Systems (e.g. Nuttx,
        Zephyr, SEL4, PikeOS and automotive RTOSes); RTOS configuration and drivers
        for CPS (Examples on FreeRTOS and NuttX)

        - Middleware for CPS (microROS, xrce-DDS, DDS)

        - Case study: Programming the Crazyflie drone

        - Advanced topics: i) Elements of cybersecurity applied to CPS (Trusted Execution
        Environments, Trusted Platform Modules for firmware signature/verification
        and secure communication, control flow integrity); ii) Elements of Artificial
        Intelligence for autonomous CPS (neural networks and deep reinforcement learning)

        - Laboratory topics: i) Baremetal programming on QEMU emulator; ii) Learning
        the development environment of FreeRTOS/Crazyflie; iii) Development of a sensor
        drivers in FreeRTOS/Crazyflie, debugging howto; iv) Development of applications
        on Crazyflie (e.g. flight controller, autonomous flight)'
      Readings/Bibliography: 'Teaching materials:


        - slides provided by the teacher

        - scientific articles provided by the teacher

        - pointers to specific manuals and websites'
      Teaching methods: 'The course consists of theoretical lessons and guided laboratories.
        In the theoretical lessons, the main concepts will be presented and then addressed
        practically using prototype boards and drones in the laboratory, which will
        be used as examples of CPS.


        The theoretical lessons include a main part on the fundamentals of embedded
        systems and CPS programming and a more advanced part on security and AI topics
        applied to CPS.


        The laboratories will be guided by the instructor, and students will be provided
        with hardware to gain programming experience. They will be organized into
        at least three groups of three exercises each:


        - Group I: Bare-metal programming on an emulator

        - Group II: Programming a small drone (Crazyflie)

        - Group III: Development of flight and mission control applications


        NOTE:

        Given the type of activities and teaching methods adopted, participation in
        this course requires prior completion by all students of Modules 1 and 2 of
        safety training in study environments, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode.'
      Assessment methods: 'The exam will consist of a 1 hour writing with closed-ended
        questions and the discussion of a project developed by the students starting
        from the tools learned during the lab sessions.


        Students will carry out the project individually or in groups depending on
        the number and the projects available.


        The teacher will propose some projects but the students will be able to propose
        customizations of the same. Students will be able to submit changes to the
        project proposals that will be evaluated by the teacher for approval.


        The project must be presented through some slides and a short demonstration.'
      Teaching tools: 'Theoretical part:


        - lecture notes

        - websites and code repositories

        - scientific articles


        Laboratory part:


        - development boards based on ARM and RISC-V microcontrollers

        - bitcraze crazyflie drones


        The hardware supports may be subject to changes / updates depending on the
        number of students and the components available'
      Office hours: 'See the website of Andrea Acquaviva (https://www.unibo.it/sitoweb/andrea.acquaviva/en)


        See the website of Francesco Barchi (https://www.unibo.it/sitoweb/francesco.barchi/en)'
      SDGs: 'Affordable and clean energy Sustainable cities Climate Action


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
