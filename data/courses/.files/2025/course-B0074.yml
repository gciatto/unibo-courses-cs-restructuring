syllabus:
  it:
    title: 2025/2026 PIATTAFORME PER LA TRASFORMAZIONE DIGITALE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso intende offrire gli strumenti
        utili alla comprensione dei concetti di processo, di trasformazione digitale,
        delle questioni teoriche e tecniche relative alle piattaforme digitali, e
        del loro impatto sui processi.

        Al termine del corso lo studente sarà in grado di comprendere l''impatto che
        le piattaforme hanno sui processi organizzativi, decisionali, politici e sociali,
        e di valutare il potenziale impatto della trasformazione digitale sugli stessi.'
      Contenuti: Negli ultimi anni si è assistito ad un sostanziale cambio di paradigma
        nello sviluppo del software che ha portato a ripensare processi ed ambiti
        applicativi. In particolare, è emerso un rinnovato interesse per l’intelligenza
        artificiale, con un forte interesse all’applicazione dell’apprendimento automatico
        nei modelli di predizione e qualità, e nell’uso di modelli cognitivi per orientare
        i processi di produzione. D’altrocanto, è emerso un forte bisogno di identificare
        strumenti software adatti per gestire le piattaforme di analisi dati, che
        sono sempre più complesse e generano sistemi che in prima battuta sembrano
        di notevole portata ma poi sono difficili da far evolvere.
      Testi/Bibliografia: Materiale presentato a lezione, altri riferimenti comunicati
        dal docente.
      Metodi didattici: Lezioni frontali, discussioni e progetti opzionali
      Modalità di verifica e valutazione dell'apprendimento: 'Nella prima sessione
        di esame, lo studente in corso può scegliere tra un orale onnicomprensivo
        e un progetto (eventualmente da svolgersi in gruppo) sui temi del corso es
        assegnato dal docente; ci saranno inoltre test in classe per valutare l’apprendimento
        incrementale del materiale presentato.


        Nelle successive sessioni, la valutazione si baserà su un orale onnicomprensivo.'
      Orario di ricevimento: Consulta il sito web di Giancarlo Succi (https://www.unibo.it/sitoweb/giancarlo.succi2)
  en:
    title: 2025/2026 PIATTAFORME PER LA TRASFORMAZIONE DIGITALE — University of Bologna
    contents:
      Learning outcomes: 'The course aims to educate students so that, at the end
        of the course, they: • know the main cognitive models that can explain how
        people develop software • are aware of the opportunities and limitations of
        applying artificial intelligence tools to software development • become familiar
        with how software engineering principles can guide the development of artificial
        intelligence-based systems • master the principles of blockchain and its applications
        • understand the role and potential of cryptocurrencies, and the issues associated
        with them in the development of software systems • are able to build complex
        production and product models by combining the various leading sectors of
        today''s production, with particular relevance to artificial intelligence,
        blockchain systems and cryptocurrencies'
      Course contents: In recent years, there has been a substantial paradigm shift
        in software development, leading to a rethinking of processes and application
        areas. In particular, there has been a renewed interest in artificial intelligence,
        with a strong focus on the application of machine learning in prediction and
        quality models, and in the use of cognitive models to guide production processes.
        On the other hand, there has been a strong need to identify suitable software
        tools for managing data analytics platforms, which are increasingly complex
        and generate systems that initially appear to be impressive but are ultimately
        difficult to evolve.
      Readings/Bibliography: Material presented in class, other references communicated
        by the instructor.
      Teaching methods: Material presented in class, other references communicated
        by the teacher.
      Assessment methods: 'In the first exam session, current students can choose
        between a comprehensive oral exam and a project (possibly to be completed
        in a group) on course topics assigned by the instructor. There will also be
        in-class tests to assess incremental learning of the material presented.


        In the subsequent sessions, assessment will be based on a comprehensive oral
        exam.'
      Office hours: See the website of Giancarlo Succi (https://www.unibo.it/sitoweb/giancarlo.succi2/en)
