  id: '85285'
  name: PROGRAMMING
integrated_course: ''
campi:
- Bologna
programmes:
- Laurea in Genomics
syllabus:
  it:
    title: 2025/2026 PROGRAMMING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i principi, gli strumenti e le tecniche della programmazione delle applicazioni
        informatiche. È in grado di individuare soluzioni a nuovi problemi informatici
        utilizzando tecniche computazionali e scegliendo quegli strumenti informatici
        che meglio risolvono specifici problemi di programmazione. Al termine dell'esperienza
        di laboratorio lo studente sa programmare negli specifici linguaggi di programmazione
        utilizzati in campo bioinformatico.
      Contenuti: Introduzione a Python. Semplici programmi numerici. Astrazione e
        scoping di funzioni. Tipi strutturati, mutability e funzione di alto ordine.
        Testing e debugging. Eccezioni e asserzioni. Calli e programmazione orientata
        agli oggetti. Una introduzione semplicistica alla complessità algoritmica.
        Alcuni semplici algoritmi e strutture dati. Programmazione dinamica. Programmi
        stocastici, probabilità e distribuzioni. Simulazioni di Monte Carlo. Intervalli
        di confidenza e campionamenti. Comprendere i dati sperimentali. Bugie, dannate
        bugie e la statistica. Rapida introduzione al machine learning.
      Testi/Bibliografia: 'John V. Guttag; Introduction to Computation and Programming
        Using Python (2 ed.); The MIT Press. (https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-second-edition)


        Daniel Zingaro; Learn to code By solving problems - a Python programming primer;
        No Starch Press. (https://nostarch.com/learn-code-solving-problems)


        http://www.python.org


        Zed A. Shaw; Learn Python 3 the Hard Way: A Very Simple Introduction to the
        Terrifyingly Beautiful World of Computers and Code; Pearson Addison-Wesley
        (https://www.informit.com/store/learn-python-3-the-hard-way-a-very-simple-introduction-9780134692883)'
      Metodi didattici: 'Lezioni frontali (BYOD)


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: Esame scritto e orale
        di teoria e pratica.
      Strumenti a supporto della didattica: Alcuni codici sorgente
      Orario di ricevimento: 'Consulta il sito web di Alessandro Amoroso (https://www.unibo.it/sitoweb/alessandro.amoroso)


        Consulta il sito web di Zeynep Kiziltan (https://www.unibo.it/sitoweb/zeynep.kiziltan)'
      SDGs: 'Istruzione di qualità Parità di genere Lavoro dignitoso e crescita economica
        Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Programming — University of Bologna
    contents:
      Learning outcomes: By the end of the course, the student knows the principles,
        the tools and the methodologies pertaining to computer programming. The successful
        student can find solutions to basic programming problems and to choose the
        best informatics tools to solve specific programming challenges. At the end
        of the hands-on lab, the student can program in at least one of the main languages
        used in bioinformatics.
      Course contents: Introduction to Python. Simple numerical programs. Functions
        scoping and abstractions. Structured types, mutabilty and higher-order functions.
        Testing and debugging. Exceptions and assertions. Classes and object-oriented
        programming. A simplistic introduction to algorithmic complexity. Some simple
        algorithms and data structures. Dynamic programming. Stochastic programs,
        probability and distributions. Monte Carlo simulations. Sampling and confidence
        intervals. Understanding experimental data. Lies, damned lies, and statistics.
        Quick look at machine learning.
      Readings/Bibliography: 'John V. Guttag; Introduction to Computation and Programming
        Using Python (2 ed.); The MIT Press. (https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-second-edition)


        Daniel Zingaro; Learn to code By solving problems - a Python programming primer;
        No Starch Press (https://nostarch.com/learn-code-solving-problems).


        http://www.python.org


        Zed A. Shaw; Learn Python 3 the Hard Way: A Very Simple Introduction to the
        Terrifyingly Beautiful World of Computers and Code; Pearson Addison-Wesley
        (https://www.informit.com/store/learn-python-3-the-hard-way-a-very-simple-introduction-9780134692883)'
      Teaching methods: 'Lessons (BYOD).


        Considering the type of the activities and the teaching methodology, to participate
        to this course it is required to partecipate at the e-learning modules Modules
        1 and 2 of Health and Safety Training Courses (https://elearning-sicurezza.unibo.it/course/index.php?categoryid=41).'
      Assessment methods: Both written and oral exam about theory and practice.
      Teaching tools: Some source codes
      Office hours: 'See the website of Alessandro Amoroso (https://www.unibo.it/sitoweb/alessandro.amoroso/en)


        See the website of Zeynep Kiziltan (https://www.unibo.it/sitoweb/zeynep.kiziltan/en)'
      SDGs: 'Quality education Gender equality Decent work and economic growth Industry,
        innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
