course_title:
  id: '95630'
  name: BIG DATA AND CLOUD PLATFORMS
integrated_course: ''
campus: Cesena
programme: Laurea Magistrale in Digital Transformation Management
syllabus:
  it:
    title: 2025/2026 BIG DATA AND CLOUD PLATFORMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course, the student:


        - Knows the applications of Big Data technologies and the respective challenges

        - Knows the hardware and software architectures proposed to handle Big Data

        - Knows the techniques to store the data and the fundamentals aspect of new
        generation database systems

        - Knows the programming paradigms generally adopted in this kind of systems
        and the main analysis methodologies (batch, interactive, streaming)

        - Learns the design patterns that regulate the deployment in the Cloud of
        complex ICT solutions

        - Learns some of the most relevant components of the Cloud Platforms, with
        a specific focus on those services that enable Big Data management and IoT
        applications

        - Is able to make decisions concerning the appropriate Cloud Platform and
        the related services to be adopted

        - Knows the billing models that lay behind Cloud Computing services and learns
        how to estimate the cost of a specific solution, to support project management,
        to prepare quotations, or to support the management control system

        - Acquires practical expertise through laboratory activities in using some
        of the main open-source Big Data software tools, as well as some of the most
        adopted Cloud Computing services available on the market'
      Contenuti: 'Big Data Architectures and Paradigms


        - Hardware infrastructures and software architectures

        - Data storage in distributed file systems and NoSQL databases

        - The MapReduce programming paradigm

        - Main principles of application design and optimization based on Apache Spark

        - Architectures and algorithms to handle streams of data


        Handling Big Data in the Cloud


        - Introduction to data platforms: shifting from databases to well-integrated
        data ecosystems

        - Definition of cloud and taxonomy of cloud services

        - Introduction to the most relevant Cloud Platforms, with a specific focus
        on those services that enable data platforms and IoT applications

        - Introduction to the billing models that lay behind Cloud Computing services.
        Cluster migration Cluster on-premises vs in the cloud

        - Deploy real case studies on a cloud provider


        Seminars by companies working with cloud and big data platforms'
      Testi/Bibliografia: 'The slides contain the material necessary for studying
        the subject.


        Attending lectures and seminars is highly recommended in order to complete
        the knowledge required to master the subject and apply it to real case studies.


        Recommended readings:


        - Ian Foster, Dennis Gannon. Cloud Computing for Science and Engineering.
        MIT Press, 2017

        - Zburivsky, Danil, and Lynda Partner. Designing Cloud Data Platforms. Simon
        and Schuster, 2021.

        - Tom White. Hadoop - The Definitive Guide (4th edition). O''Reilly, 2015

        - Matei Zaharia, Holden Karau, Andy Konwinski, Patrick Wendell. Learning Spark,
        2nd Edition. O''Reilly, 2020

        - Andrew G. Psaltis. Streaming Data - Understanding the real-time pipeline.
        Manning, 2017


        Further readings will be mentioned during the course.'
      Metodi didattici: 'Lessons and (mainly guided) practical exercises.


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        online.'
      Modalità di verifica e valutazione dell'apprendimento: 'The exam consists of
        an oral examination on all the covered topics.


        - No external material is allowed.


        Grading scale for the final mark:


        - 18–19: Sufficient preparation on a very limited number of topics covered
        in the course; analytical ability emerges only with the teacher’s assistance;
        sufficient use of language.

        - 20–24: Fair preparation on a limited number of topics covered in the course;
        ability to link notions with the aid of the teacher; correct use of language.

        - 25–29: Good preparation on a wide range of topics covered in the course;
        ability to link notions without the aid of the teacher; mastery of specific
        terminology.

        - 30–30L (with honors) Excellent preparation on all the topics covered in
        the course; ability to make independent choices in critical analysis; mastery
        of specific terminology.'
      Strumenti a supporto della didattica: Cloud/big data services are accessed through
        Amazon Web Services and/or Google Cloud Platform via coupons.
      Orario di ricevimento: 'Consulta il sito web di Matteo Francia (https://www.unibo.it/sitoweb/m.francia)


        Consulta il sito web di Enrico Gallinucci (https://www.unibo.it/sitoweb/enrico.gallinucci)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
