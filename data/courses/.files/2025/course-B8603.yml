syllabus:
  it:
    title: 2025/2026 MACHINE TRANSLATION AND ARTIFICIAL INTELLIGENCE FOR LANGUAGE
      SERVICES — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Lo/a studente/ssa conosce la storia, i principi
        teorici e gli sviluppi più attuali nell’ambito della traduzione automatica
        (TA) e dell'intelligenza artificiale (AI) applicate ai servizi linguistici
        e di traduzione; comprende i principi di pre- e post-editing, nonché di prompt
        design e prompt engineering, ed è in grado di applicarli mantenendo adeguati
        standard etici; è in grado di concepire, svolgere, gestire e valutare progetti
        complessi che coinvolgono varie professionalità e una gamma di strumenti linguistici
        e di traduzione basati sull'IA; è in grado di elaborare autonomamente ulteriori
        conoscenze nell’ambito delle tecnologie di TA e IA e di applicarle per ottimizzare
        e innovare processi dell’industria delle lingue.
      Contenuti: 'Al termine del corso, lo studente


        - conosce le fasi storiche fondamentali dell''evoluzione della traduzione
        automatica

        - è in grado di descrivere le principali tecnologie su cui si fonda la disciplina

        - sa descrivere, applicare ed interpretare le più importanti metriche qualitative
        usate nel campo della traduzione automatica

        - è in grado di attuare un ciclo completo di addestramento e manutenzione
        di un modello di MT, a cominciare dalla fase di reperimento e selezione dei
        dati

        - ha acquisito familiarità con gli strumenti software presentati durante le
        sessioni di laboratorio

        - è in grado di espandere autonomamente le competenze acquisite in materia
        e di trarne vantaggio in contesti professionali'
      Testi/Bibliografia: 'Philipp Koehn (2020), "Neural Machine Translation", Cambridge
        University Press


        Thierry Poibeau (2017), "Machine Translation", MIT Press


        Joss Moorkens, S. Castilho, F. Gaspari, S. Doherty (2018), "Translation Quality
        Assessment: From Principles to Practice", Springer


        Kyunghyun C., van Merrienboer B., Bahdanau D., Bengio Y. (2016) "On the Properties
        of Neural Machine Translation: Encoder-Decoder Approaches" arXiv.org > cs
        > arXiv:1409.1259'
      Metodi didattici: Lezioni frontali ed esercitazioni in laboratorio
      Modalità di verifica e valutazione dell'apprendimento: 'Consegna di un progetto
        finale seguita da un esame orale.


        Studentesse e studenti con DSA o disabilità temporanee o permanenti (inclusi
        gravi problemi di salute che interferiscono con il normale svolgimento degli
        studi) sono pregati di contattare tempestivamente l’ufficio di Ateneo responsabile
        (Servizio per gli Studenti con Disabilità e con DSA: https://site.unibo.it/studenti-con-disabilita-e-dsa/it),
        possibilmente prima dell’inizio del corso. Nota bene: sarà cura dell’Ufficio
        preposto proporre alle studentesse e agli studenti interessati eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni
        dalla data dell’esame, all’approvazione del/della docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'I principali riferimenti teorici esposti
        durante le lezioni verranno distribuiti sotto forma di file PowerPoint (usati
        durante le lezioni stesse).

        Durante le esercitazioni di laboratorio verrà fatto uso di strumenti software
        concepiti specificamente per l''addestramento e l''impiego di modelli di traduzione
        automatica.'
      Orario di ricevimento: Consulta il sito web di Luca Astolfi (https://www.unibo.it/sitoweb/luca.astolfi5)
  en:
    title: 2025/2026 MACHINE TRANSLATION AND ARTIFICIAL INTELLIGENCE FOR LANGUAGE
      SERVICES — University of Bologna
    contents:
      Learning outcomes: The student knows the history, theoretical principles, and
        latest developments of machine translation (MT) and artificial intelligence
        (AI) applied to language and translation services; they understand the principles
        of pre- and post-editing, as well as prompt design and engineering, and can
        apply them maintaining adequate ethical standards; they can plan, execute,
        and evaluate complex projects involving other professionals and a range of
        AI-based language and translation tools; they are able to acquire further
        knowledge independently in both MT and AI technologies and apply it to optimize
        and innovate language industry processes.
      Course contents: 'In this course, the student will learn:


        - the main phases of the history and evolution of machine translation

        - the intuition behind the main principles underlying MT

        - how to apply and interpret the most important evaluation metrics for machine-produced
        translations

        - how to set up and maintain a MT model, including gathering and cleaning
        training data

        - to use specialised MT software and utilities

        - to think about MT systems critically and leverage their knowledge to boost
        productivity'
      Readings/Bibliography: 'Philipp Koehn (2020), "Neural Machine Translation",
        Cambridge University Press


        Thierry Poibeau (2017), "Machine Translation", MIT Press


        Joss Moorkens, S. Castilho, F. Gaspari, S. Doherty (2018), "Translation Quality
        Assessment: From Principles to Practice", Springer


        Kyunghyun C., van Merrienboer B., Bahdanau D., Bengio Y. (2016) "On the Properties
        of Neural Machine Translation: Encoder-Decoder Approaches" arXiv.org > cs
        > arXiv:1409.1259'
      Teaching methods: Lectures and workshops
      Assessment methods: 'Capstone project followed by a viva voce.


        Students with specific learning difficulties (SpLD) or with disabilities that
        can affect their ability to attend courses are invited to contact the University
        service for students with disabilities and SLD at the earliest opportunity
        -- ideally before the start of the course: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students.
        The University service will suggest possible adjustments to the course work
        and/or exam, which must then be submitted to the course leader so they can
        assess their feasibility, in line with the learning objectives of the course.
        Please note that adjustments to the exam must be requested at least two weeks
        in advance.'
      Teaching tools: PowerPoint files used during lectures will be made available
        to students. Specific MT software will be used during workshops.
      Office hours: See the website of Luca Astolfi (https://www.unibo.it/sitoweb/luca.astolfi5/en)
