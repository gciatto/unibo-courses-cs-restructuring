syllabus:
  it:
    title: 2025/2026 ANALOG CIRCUITS AND SENSOR SYSTEMS M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Fundamentals of analog interface design:
        how to bridge the physical and digital worlds. Application examples will include
        signal conditioning systems for pressure, temperature and optical sensors.
        Detailed contents: Operational amplifiers and review of basic linear op-amp
        circuits, Voltage/current references, Instrumentation Amplifiers, I/V and
        V/I conversion, charge amplifiers, Active Filters, Noise in analog circuits,
        A/D and D/A converters, Signal integrity, EMI/EMC.'
      Contenuti: 'L''obiettivo di questo corso consiste nel fornire un''introduzione
        alla progettazione di circuiti integrati e sistemi analogici.


        In particolare sono trattati i seguenti argomenti:


        Modelli analitici dei transistor ed effetti reattivi; impiego del simulatore
        circuitale SPICE. Stadi elementari, specchi di corrente. Stadio amplificatore
        di tipo cascode, coppia differenziale;


        Schemi di base di amplificatori operazionali e generalità sulla compensazione;


        Richiami al problema del rumore nei circuiti;


        Richiami sui filtri analogici e metodi di sintesi,sensibilità alla variazione
        dei parametri;


        Amplificatori per strumentazione;


        Progetto di un sistema sensoriale.'
      Testi/Bibliografia: 'T.C. Carusone, D.A. Johns, K. Martin "Analog Integrated
        Circuit Design" Wiley & Sons.


        P. R. Gray, P. J. Hurst, S. H. Lewis, R. G. Meyer “Analysis and Design of
        Analog Integrated Circuits” Wiley & Sons.


        P.E. Allen, D.R Holberg, “CMOS analog integrated circuit design”, Oxford University
        Press.


        Adel S. Sedra , Kenneth Smith, "Microelectronic Circuits", Oxford University
        Press Inc'
      Metodi didattici: Il corso si basa principalmente su lezioni frontali, integrate
        da esempi ed esercitazioni al calcolatore mirate alla simulazione e progettazione
        di circuiti integrati e sistemi per l'interfacciamento con sensori.
      Modalità di verifica e valutazione dell'apprendimento: L'esame consiste in una
        prova orale volta a dimostrare la padronanza dei concetti di analisi delle
        caratteristiche dei circuiti analogici per la realizzazione di interfacce
        sensoriali. La prova orale può essere integrata da uno o due progetti concordati
        con il docente.
      Strumenti a supporto della didattica: 'Lucidi delle lezioni.


        Simulazioni circuitali con LTSpice'
      Orario di ricevimento: Consulta il sito web di Luca De Marchi (https://www.unibo.it/sitoweb/l.demarchi)
      SDGs: 'Imprese innovazione e infrastrutture Partnership per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Analog Circuits and Sensor Systems M — University of Bologna
    contents:
      Learning outcomes: 'Fundamentals of analog interface design: how to bridge the
        physical and digital worlds. Application examples will include signal conditioning
        systems for pressure, temperature and optical sensors. Detailed contents:
        Operational amplifiers and review of basic linear op-amp circuits, Voltage/current
        references, Instrumentation Amplifiers, I/V and V/I conversion, charge amplifiers,
        Active Filters, Noise in analog circuits, A/D and D/A converters, Signal integrity,
        EMI/EMC.'
      Course contents: 'The main goal of the class is to provide an overview on the
        methods for designing sensor interfacing circuits. Application examples will
        include signal conditioning systems for pressure, temperature and optical
        sensors.


        Detailed contents:


        Analog circuit Modeling, Device Characterization;


        Circuit simulation and analysis with LTSPice;


        Analog Subcircuits;


        Voltage/current references;


        Operational amplifiers and review of basic linear op-amp circuits,


        Instrumentation Amplifiers;


        Active Filters;


        Noise in analog circuits;


        Design of sensor systems.'
      Readings/Bibliography: 'T.C. Carusone, D.A. Johns, K. Martin "Analog Integrated
        Circuit Design" Wiley & Sons.


        P. R. Gray, P. J. Hurst, S. H. Lewis, R. G. Meyer “Analysis and Design of
        Analog Integrated Circuits” Wiley & Sons.


        P.E. Allen, D.R Holberg, “CMOS analog integrated circuit design”, Oxford University
        Press.


        Adel S. Sedra , Kenneth Smith, "Microelectronic Circuits", Oxford University
        Press Inc'
      Teaching methods: 'The implementation of sensor interfacing circuits will be
        addressed in the lectures at different abstraction levels: device, circuit,and
        system.


        Design projects will be assigned to the student.


        Aim of the project works is that of giving to each student the possibility
        to practise the design strategies described during the lectures.'
      Assessment methods: The assessment is based on a single individual oral examination,
        and on design projects (not compulsory).
      Teaching tools: 'Recommended readings. Slides and lecture notes.


        Circuit simulations with LTSpice.'
      Office hours: See the website of Luca De Marchi (https://www.unibo.it/sitoweb/l.demarchi/en)
      SDGs: 'Industry, innovation and infrastructure Partnerships for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
