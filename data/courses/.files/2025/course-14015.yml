syllabus:
  it:
    title: 2025/2026 CRITTOGRAFIA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso, lo studente:\n\n\
        - conosce i risultati e le tecniche di base della matematica discreta che\
        \ stanno alla base degli algoritmi crittografici;\n- conosce gli algoritmi\
        \ crittografici di base a chiave pubblica e a chiave segreta;\n- conosce le\
        \ principali problematiche di sicurezza informatica;\n- conosce i principali\
        \ protocolli crittografici moderni;\n- è capace di comprendere le principali\
        \ problematiche inerenti la sicurezza di un sistema informatico;\n  -conosce\
        \ i risultati di base della teoria dell’informazione e della compressione\
        \ dati;\n- è in grado di comprendere i collegamenti tra crittografia e teoria\
        \ dell’informazione."
      Contenuti: '- Introduzione e cenni storici

        - Crittografia a chiave segreta

        - Crittografia a Chiave Pubblica

        - Confidenzialità

        - Autenticazione

        - Integrità

        - Firma digitale

        - SSL

        - PGP

        - Certificati

        - Meccanismi di trust distribuito

        - Crittografia post-quantistica'
      Testi/Bibliografia: 'Handbook of Applied Cryptography, by A. Menezes, P. van
        Oorschot, and S. Vanstone, CRC Press, 1996


        Computer Security: Principles and Practice (4th Edition), Stallings and Brown,
        Pearson, 2018.


        Computer Security: Art and Science (2nd Edition), Matt Bishop, Addison-Wesley,
        2018.'
      Metodi didattici: 'Lezioni frontali ed esercitazioni in aula. I fondamenti teorici

        concernenti i sistemi crittografici e le loro principali applicazioni, e

        le principali problematiche di sicurezza dei sistemi informatici sono

        esposti durante le lezioni frontali. Numerosi esercizi sono svolti in

        aula, in preparazione alla prova d''esame.

        Estensioni degli esercizi sono regolarmente suggeriti, e le soluzioni

        pubblicate sul web, allo scopo di promuovere e favorire lo studio

        individuale.'
      Modalità di verifica e valutazione dell'apprendimento: 'Scrittura di una relazione
        di approfondimento di almeno 30 pagine su un argomento svolto a lezione o
        scelto autonomamente dallo studente in ambito crittografico. Lo studente o
        la studentessa possono sempre scegliere di sostenere una prova orale aggiuntiva
        e il docente può richiedere il sostenimento della prova orale quando lo ritenga
        opportuno per una accurata verifica dell’apprendimento. La consegna delle
        relazioni deve avvenire per posta elettronica in un qualunque ultimo giorno
        del mese (12 appelli totali). La frequenza delle lezioni non influenza il
        voto finale e non è obbligatoria per sostenere le prove di verifica. Per consegnare
        la relazione non è prevista l’iscrizione su almaesami.

        La modalità di verifica ha lo scopo di accertare le conoscenze, le competenze
        e la maturità scientifica acquisite dallo studente o dalla studentessa durante
        il corso. Attraverso l’elaborazione scritta lo studente dimostra la padronanza
        dei concetti teorici e dei metodi fondamentali della crittografia, la capacità
        di analizzare criticamente un argomento specifico e di collegarlo ai contenuti
        del corso o alla letteratura scientifica di riferimento. La relazione consente
        di valutare la capacità di approfondimento personale, l’autonomia di giudizio
        e la chiarezza nella presentazione dei contenuti, elementi che riflettono
        la maturità e la consapevolezza scientifica raggiunte. La prova intende anche
        verificare la capacità di comunicare in modo rigoroso, ordinato e preciso
        concetti complessi, utilizzando un linguaggio tecnico appropriato e una struttura
        argomentativa coerente. Essa stimola inoltre la curiosità intellettuale, la
        propensione alla ricerca e la capacità di integrare conoscenze teoriche e
        applicative in un quadro unitario e coerente. La possibilità di sostenere
        una prova orale aggiuntiva consente una valutazione diretta della comprensione
        e della chiarezza espositiva, garantendo un giudizio equilibrato sull’apprendimento
        complessivo.

        Saranno valutati la qualità complessiva della relazione scritta e il livello
        di padronanza dei concetti teorici, metodologici e comunicativi. Nella fascia
        di eccellenza, corrispondente ai voti tra 30 e 30 e lode, la relazione si
        distingue per originalità, rigore, chiarezza e profondità di analisi, dimostrando
        piena autonomia e curiosità scientifica. Nella fascia buona, tra 27 e 29,
        l’elaborato risulta solido, ben strutturato e corretto, con conoscenze approfondite
        e una comunicazione efficace, pur senza caratteri di eccezionalità. Nella
        fascia sufficiente, tra 18 e 26, il lavoro è adeguato ma limitato nella profondità
        o nella precisione, con esposizione chiara ma a tratti schematica e linguaggio
        tecnico solo parzialmente appropriato. Nella fascia insufficiente, fino al
        voto di 17, la relazione presenta carenze teoriche e metodologiche rilevanti,
        scarsa coerenza argomentativa e limitata capacità di analisi, non raggiungendo
        gli obiettivi minimi di apprendimento richiesti.'
      Strumenti a supporto della didattica: 'Lezioni: proiezione di diapositive messe
        a disposizione via Web, dimostrazioni teoriche e pratiche di concetti, algoritmi,
        tecniche, e strumenti esposti nelle discussioni a lezione.'
      Orario di ricevimento: Consulta il sito web di Luciano Margara (https://www.unibo.it/sitoweb/luciano.margara)
  en:
    title: 2025/2026 Cryptography — University of Bologna
    contents:
      Learning outcomes: "At the end of the course the student:\n\n- will be familiar\
        \ with the mathematical foundations of modern cryptography\n- knows the basic\
        \ public and secret keys cryptographic algorithms;\n- knows the basic cryptographic\
        \ protocols;\n- is able to understand how modern cryptographic techniques\
        \ work\n  -is able to understand the fundamental security issues arising in\
        \ a computer system\n- knows the basic results of information theory and data\
        \ compression\n- is able to understand the connection between information\
        \ theory and cryptography"
      Course contents: '- Introduction and historical background

        - Secret key cryptography

        - Public key cryptography

        - Confidentiality

        - Authentication

        - Integrity

        - Digital signature

        - SSL

        - PGP

        - Digital Certificates

        - Distributed trust mechanisms

        - Post-quantum cryptography'
      Readings/Bibliography: 'Handbook of Applied Cryptography, by A. Menezes, P.
        van Oorschot, and S. Vanstone, CRC Press, 1996


        Computer Security: Principles and Practice (4th Edition), Stallings and Brown,
        Pearson, 2018.


        Computer Security: Art and Science (2nd Edition), Matt Bishop, Addison-Wesley,
        2018.'
      Teaching methods: The Course is worth 6 credits and consists of traditional
        lectures.
      Assessment methods: 'Writing a report of at least 30 pages on a topic covered
        in class or independently chosen by the student within the field of cryptography.
        Students may always choose to take an additional oral exam, and the instructor
        may require it whenever deemed appropriate for an accurate assessment of learning.
        Reports must be submitted by email on any last day of the month (12 sessions
        per year). Attendance does not affect the final grade and is not mandatory
        to take the exam. Registration on AlmaEsami is not required for submitting
        the report.

        The purpose of the assessment method is to verify the knowledge, skills, and
        scientific maturity acquired by the student during the course. Through the
        written work, the student demonstrates mastery of the theoretical concepts
        and fundamental methods of cryptography, the ability to critically analyze
        a specific topic, and to connect it with the course content or relevant scientific
        literature. The report allows for the evaluation of personal depth of study,
        independence of judgment, and clarity in presenting content—elements that
        reflect the student’s scientific maturity and awareness. The exam also aims
        to assess the ability to communicate complex concepts in a rigorous, orderly,
        and precise manner, using appropriate technical language and a coherent argumentative
        structure. It further encourages intellectual curiosity, research aptitude,
        and the ability to integrate theoretical and applied knowledge into a unified
        and coherent framework. The optional oral exam provides a direct evaluation
        of understanding and clarity of exposition, ensuring a balanced overall assessment
        of learning.

        The overall quality of the written report and the level of mastery of theoretical,
        methodological, and communication skills will be assessed. In the excellence
        range (grades 30–30 cum laude), the report stands out for originality, rigor,
        clarity, and analytical depth, showing full autonomy and scientific curiosity.
        In the good range (grades 27–29), the paper is solid, well-structured, and
        accurate, with strong knowledge and effective communication, though lacking
        exceptional features. In the sufficient range (grades 18–26), the work is
        adequate but limited in depth or precision, with clear but sometimes schematic
        exposition and partially appropriate technical language. In the insufficient
        range (up to grade 17), the report shows significant theoretical and methodological
        weaknesses, poor argumentative coherence, and limited analytical capacity,
        failing to meet the minimum learning objectives required.'
      Teaching tools: The lectures utilize overhead slides projected from a laptop
        computer together with a white board. The material presented during lectures
        will be made available in electronic format for downloading from the Course
        web site.
      Office hours: See the website of Luciano Margara (https://www.unibo.it/sitoweb/luciano.margara/en)
