syllabus:
  it:
    title: 2025/2026 PRINCIPLES, MODELS AND APPLICATIONS FOR DISTRIBUTED SYSTEMS M
      — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Knowledge related to the technologies needed
        for management and usage of computer networks and distributed systems.
      Contenuti: 'MODULO 1 - PRINCIPI E MODELLI PER I SISTEMI DISTRIBUITI


        1. Introduzione ai sistemi distribuiti, architetture.

        2. Processi, thread, virtualizzazione, scalabilità.

        3. Protocolli DNS e HTTP.

        4. Comunicazioni, programmazione di socket, API, remote procedure call.

        5. Introduzione al linguaggio di programmazione Python.

        6. Esercitazioni pratiche in laboratorio sugli argomenti di cui sopra.


        MODULO 2 - APPLICAZIONI DEI SISTEMI DISTRIBUITI NELLE TELECOMUNICAZIONI


        1. Cloud computing e orchestrazione di servizi, OpenStack, Kubernetes.

        2. Virtualizzazione delle funzioni di rete (NFV), Open RAN (O-RAN).

        3. Reti definite via software (SDN), NETCONF.

        4. Esercitazioni pratiche in laboratorio sugli argomenti di cui sopra.'
      Testi/Bibliografia: '- M. van Steen, A. S. Tanenbaum, "Distributed Systems,"
        4th Edition, 2023, ISBN: 978-90-815406-3-6.

        - Altro materiale fornito dai docenti.'
      Metodi didattici: 'Il corso consiste in lezioni frontali, per introdurre concetti,
        principi e modelli, a cui fanno seguito esercitazioni pratiche o sessioni
        in laboratorio. Le esercitazioni sono pensate anche per stimolare la capacità
        degli studenti a lavorare in gruppo.


        Parte del secondo modulo verrà tenuta da un professionista aziendale esterno.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'E'' prevista una prova
        finale che intende valutare la capacità dello studente di comprendere i principi
        e le applicazioni dei sistemi distribuiti. La verifica dell''apprendimento
        avviene tramite una prova orale su tutti gli argomenti del corso e la presentazione
        delle attività svolte durante le esercitazioni pratiche o le sessioni di laboratorio.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: 'Ambiente di programmazione Python.


        Strumenti software per la gestione delle reti e l''analisi dei protocolli.


        PC dotati di sistema operativo Linux e software di gestione di macchine virtuali
        e/o container.


        Piattaforme software per l''orchestrazione di servizi.'
      Orario di ricevimento: Consulta il sito web di Davide Borsatti (https://www.unibo.it/sitoweb/davide.borsatti)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Principles, Models and Applications for Distributed Systems M
      — University of Bologna
    contents:
      Learning outcomes: Knowledge related to the technologies needed for management
        and usage of computer networks and distributed systems.
      Course contents: 'MODULE 1 - PRINCIPLES AND MODELS FOR DISTRIBUTED SYSTEMS


        1. Introduction to Distributed Systems, architectures.

        2. Processes, threads, virtualization, scalability.

        3. DNS and HTTP protocols.

        4. Communications, socket programming, APIs, remote procedure call.

        5. Introduction to the Python programming language.

        6. Practical lab exercises on the above topics.


        MODULE 2 - APPLICATIONS OF DISTRIBUTED SYSTEMS IN TELECOMMUNICATIONS


        1. Cloud computing and service orchestration, OpenStack, Kubernetes.

        2. Network Function Virtualization (NFV), Open RAN (O-RAN).

        3. Software-Defined Networking (SDN), NETCONF.

        4. Practical lab exercises on the above topics.'
      Readings/Bibliography: '- M. van Steen, A. S. Tanenbaum, "Distributed Systems,"
        4th Edition, 2023, ISBN: 978-90-815406-3-6.

        - Other material provided by the instructors.'
      Teaching methods: 'The course consists of lectures to introduce concepts, principles,
        and models, followed by some practical or lab-based hands-on sessions. Lab
        exercises are also intended to stimulate teamwork skills.


        Part of the second module will be given by a professional from an external
        company.


        In view of the type of activity and teaching methods adopted, the attendance
        of this course requires the prior participation of all students in Modules
        1 and 2 of the Health and Safety Training, in e-learning mode.'
      Assessment methods: 'The final examination will assess the student''s ability
        to understand the principles and applications of distributed systems. Students
        will be asked to answer a few questions on the whole set of course topics,
        and report on the practical exercises or hands-on sessions performed during
        the course.


        Students with learning disabilities or temporary or permanent disabilities:
        please contact the relevant University office promptly (https://site.unibo.it/studenti-con-disabilita-e-dsa/en).
        They will be responsible for suggesting any accommodations to the students
        concerned. However, these accommodations must be submitted to the instructor
        for approval 15 days in advance, who will evaluate their suitability in relation
        to the educational objectives of the course.'
      Teaching tools: 'Python language programming environment.


        Software tools for network management and protocol analysis.


        Linux-based workstations and virtual machine hypervisors and/or container
        management systems.


        Software platforms for service orchestration.'
      Office hours: See the website of Davide Borsatti (https://www.unibo.it/sitoweb/davide.borsatti/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
