programme: Laurea in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 INGEGNERIA DEL SOFTWARE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        le nozioni fondamentali riguardanti l'ingegneria del software e la progettazione
        di sistemi informatici; conosce i metodi che consentono l'impiego corretto
        delle tecnologie a oggetti.
      Contenuti: 'Prerequisiti


        L’allievo che accede a questo insegnamento conosce le basi dei linguaggi di
        programmazione e degli algoritmi, e il paradigma a oggetti. Tali conoscenze
        sono acquisite, di norma, superando gli esami di Programmazione, Algoritmi
        e Strutture Dati, e Programmazione a Oggetti.


        Tutte le lezioni saranno tenute in Italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        Programma


        1. Il ciclo di vita dei sistemi informatici:


        - fasi e attività;

        - pianificazione, analisi dei requisiti, progettazione.


        1. Analisi e progettazione orientate agli oggetti:


        - il paradigma a oggetti: astrazione, incapsulamento, ereditarietà, polimorfismo,
        delegazione;

        - lo sviluppo di sistemi a oggetti.


        1. Il linguaggio UML:


        - diagramma dei casi d''uso;

        - diagramma delle classi;

        - diagramma degli oggetti;

        - diagramma di sequenza;

        - diagramma di collaborazione;

        - diagramma degli stati;

        - diagramma di attività;

        - diagramma dei componenti;

        - diagramma di dispiegamento.


        1. Cenni alla progettazione di interfacce utente

        2. Ingegneria del software:


        - criteri di qualità;

        - misurazione;

        - produzione;

        - prototipazione;

        - verifica;

        - certificazione;

        - manutenzione.'
      Testi/Bibliografia: "- Lucidi del corso.\n  Letture consigliate:\n- J. Arlow,\
        \ I Neustadt. UML e Unified Process. McGraw-Hill, 2003.\n- S. Bennett, J.\
        \ Skelton, K. Lunn. Introduzione a UML. McGraw-Hill, 2002.\n- A. Binato, A.\
        \ Fuggetta, L. Sfardini. Ingegneria del Software. Pearson, 2006.\n- G. Booch,\
        \ J. Rumbaugh, I. Jacobson. The UML user guide. Addison Wesley, 1999.\n- M.\
        \ Candolfini, M. Cassiani, M. Musu, C. Zavalloni. CRM: elementi di progettazione\
        \ e prototipazione di un CRM con UML. Gruppo Editoriale INFOMEDIA, 2003.\n\
        - J. Conallen. Applicazioni web con UML. Pearson, 2003.\n- M. Fowler. UML\
        \ distilled. Pearson, 2004.\n- C. Ghezzi, M. Jazayeri, D. Mandrioli. Ingegneria\
        \ del Software. Pearson, 2004.\n- M. Golfarelli, D. Maio, S. Rizzi. Ingegneria\
        \ dei Sistemi Informativi: Lezioni ed esercizi di Modellazione dei Requisiti.\
        \ Esculapio, 2000.\n- L. Maciaszek. Sviluppo di sistemi informativi con UML.\
        \ Addison-Wesley, 2002.\n- R. Pressman. Principi di Ingegneria del Software.\
        \ McGraw-Hill, 2008.\n- W. Zuser, S. Biffl, T. Grechenig, M. Kohle. Ingegneria\
        \ del software con UML e Unified Process. McGraw-Hill, 2004."
      Metodi didattici: '- Lezioni ed esercitazioni in aula

        - Esercitazioni di gruppo su lavagne collaborative virtuali

        - Autovalutazioni'
      Modalità di verifica e valutazione dell'apprendimento: 'Gli esami verranno effettuati
        in presenza. La prova consisterà in uno scritto della durata di 60 minuti,
        durante la quale è espressamente vietato consultare libri e appunti. Il testo
        dell''esame si compone di una parte progettuale (su carta, 40 minuti, 14/31
        punti), che richiede di risolvere uno o più esercizi di analisi e modellazione
        di specifiche con UML, e di una parte teorica (su EOL, 20 minuti, 17/31 punti)
        che include alcuni quiz sui contenuti dell''intero corso. Per superare la
        prova occorre conseguire un punteggio sufficiente sia nella parte progettuale
        sia in quella teorica. Ulteriori dettagli verranno comunicati a lezione e
        nelle "note" abbinate agli appelli pubblicati su AlmaEsami.


        Il punteggio viene assegnato in trentesimi. Per sostenere la prova d''esame
        è necessaria l''iscrizione tramite AlmaEsami, nel rispetto delle scadenze
        previste. Coloro che non riuscissero a iscriversi entro la data prevista sono
        tenuti a comunicare tempestivamente (e comunque prima della chiusura ufficiale
        delle liste di iscrizione) il problema alla segreteria didattica. Sarà facoltà
        del docente ammetterli a sostenere la prova. Una volta pubblicato il risultato
        della prova, ciascuno studente ha una settimana di tempo per comunicare via
        email al docente se intende rifiutare il voto conseguito. Sono ammessi massimo
        due rifiuti.'
      Strumenti a supporto della didattica: '- Materiale didattico scaricabile da
        Internet

        - Piattaforma Teams per la didattica a distanza

        - Piattaforma LucidChart per le esercitazioni'
      Orario di ricevimento: Consulta il sito web di Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Software Engineering — University of Bologna
    contents:
      Learning outcomes: The course aims at providing the basic concepts related to
        software engineering, and the tools and techniques for analysis and design
        of software systems. Particular relevance will be given to the methods enforcing
        correct use of object-oriented technologies.
      Course contents: 'Requirements


        A prior knowledge and understanding of programming languages and algorithms,
        and of the object-oriented paradigm is required to attend with profit this
        course. These notions are normally achieved by giving an exam of Programming,
        Algorithms and Data Structures, and OO Programming.


        Fluent spoken and written Italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in Italian.


        Course Contents


        1. The lifecycle of software systems:


        - phases and activities;

        - planning, requirement analysis, design.


        1. Object-oriented analysis and design:


        - the object-oriented paradigm (abstraction, information hiding, inheritance,
        polymorphism, delegation);

        - designing object-oriented systems.


        1. The UML language:


        - use case diagrams;

        - class and object diagrams;

        - sequence diagrams;

        - collaboration diagrams;

        - state diagrams;

        - activity diagrams;

        - component diagrams;

        - deployment diagrams.


        1. Basics of user interface design

        2. Software engineering:


        - quality criteria;

        - evaluation;

        - prototyping;

        - production;

        - testing;

        - certification;

        - maintenance.'
      Readings/Bibliography: "- Slides.\n  Recommended readings:\n- J. Arlow, I Neustadt.\
        \ UML e Unified Process. McGraw-Hill, 2003.\n- S. Bennett, J. Skelton, K.\
        \ Lunn. Introduzione a UML. McGraw-Hill, 2002.\n- A. Binato, A. Fuggetta,\
        \ L. Sfardini. Ingegneria del Software. Pearson, 2006.\n- G. Booch, J. Rumbaugh,\
        \ I. Jacobson. The UML user guide. Addison Wesley, 1999.\n- M. Candolfini,\
        \ M. Cassiani, M. Musu, C. Zavalloni. CRM: elementi di progettazione e prototipazione\
        \ di un CRM con UML. Gruppo Editoriale INFOMEDIA, 2003.\n- J. Conallen. Applicazioni\
        \ web con UML. Pearson, 2003.\n- M. Fowler. UML distilled. Pearson, 2004.\n\
        - C. Ghezzi, M. Jazayeri, D. Mandrioli. Ingegneria del Software. Pearson,\
        \ 2004.\n- M. Golfarelli, D. Maio, S. Rizzi. Ingegneria dei Sistemi Informativi:\
        \ Lezioni ed esercizi di Modellazione dei Requisiti. Esculapio, 2000.\n- L.\
        \ Maciaszek. Sviluppo di sistemi informativi con UML. Addison-Wesley, 2002.\n\
        - R. Pressman. Principi di Ingegneria del Software. McGraw-Hill, 2008.\n-\
        \ W. Zuser, S. Biffl, T. Grechenig, M. Kohle. Ingegneria del software con\
        \ UML e Unified Process. McGraw-Hill, 2004."
      Teaching methods: '- Lessons and exercises in the classroom

        - Team exercises using virtual collaborative whiteboards

        - Self-evaluations'
      Assessment methods: 'Exams will be done in presence. The test will consist of
        a 60-minute written test; no books or notes can be accessed during the test.
        The test includes a design section (on paper, 40 mins, 14/31 points), which
        requires solving a requirement analysis and modeling problem with UML, and
        a theoretical section (via EOL, 20 mins, 17/31 points) based on a few quizzes
        on all the course contents. To pass the test, the student must achieve sufficiency
        on both the design and the theoretical sections. Further details will be given
        during the lessons and in the "notes" field of AlmaEsami.


        The maximum evaluation score is 31/31. To attend the exam, each student must
        sign up via AlmaEsami within a deadline. Those who cannot sign up must immediately
        communicate the problem to the teaching secretariat. Deciding whether to allow
        them to attend the exam or not is up to the teacher. Once the test results
        have been published, each student has one week to decide if (s)he wants to
        accept the grade or not. In case (s)he decides to refuse the grade, (s)he
        has to write an email to the teacher. No more than 2 refusals are allowed.'
      Teaching tools: '- Downloadable didactic material

        - Piattaforma Teams per la didattica a distanza

        - Piattaforma LucidChart per le esercitazioni'
      Office hours: See the website of Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
