  id: '84339'
  name: BASI DI DATI AVANZATE
integrated_course: ''
campus: Cesena
programme: Laurea in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 BASI DI DATI AVANZATE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        competenze avanzate e capacità pratiche relativamente alle tecnologie legate
        alle basi di dati relazionali e non relazionali, nonché la capacità di realizzare
        applicazioni centrate sull'utilizzo di DBMS.
      Contenuti: '---------- Progettazione di DBMS NoSQL ----------


        1. Modelli dati non relazionali (Document-based, Graph-based, Column oriented)

        2. Architetture per DBMS non relazionali: Cluster, Sharding e persistenza

        3. Progettazione dei dati in DBMS NoSQL

        4. Esercitazioni di laboratorio con MongoDB


        ---------- Programmazione e gestione di DBMS Relazionali ----------


        1. Amministrazione di basi di dati

        2. Programmazione avanzata di basi di dati e basi di dati attive

        3. Ottimizzazione delle prestazioni'
      Testi/Bibliografia: 'Dispense a cura del docente

        R. van der Lans Introduzione a SQL . Addison-Wesley, 2001.

        R. A. Elmasri, S.B. Navathe. Sistemi di basi di dati - Complementi. Pearson,
        2005.

        Making Sense of NoSQ. Daniel G. McCreary and Ann M. Kelly. Manning, 2013.

        Martin J. Fowler & Pramodkumar J. Sadalage. Nosql Distilled: A Brief Guide
        to the Emerging World of Polyglot Persistence. Addison Wesley, 2009.'
      Metodi didattici: Lezioni in aula ed esercitazioni in laboratorio
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consta di due
        prove scritte. La prima prova è pratica e viene svolta in laboratorio, mira
        a vautare le capacità dello studente rispetto ai sistemi e alle tecnologie
        informatiche utilizzate durante il corso. La seconda prova si compone di un
        insieme di domande aperte su tutto il programma del corso. Durante la prima
        prova lo studente potrà consultare testi e appunti.

        La realizzazione di un elaborato è opzionale e fornirà punti addizionali per
        il voto finale.


        i voti vengono assegnati in base a una valutazione complessiva delle conoscenze,
        competenze, capacità di presentazione e discussione delle tematiche trattate.
        I range di voti corrispondono possono essere descritti come segue:


        18-23: preparazione e capacità di analisi sufficienti ma relative ad un numero
        limitato di argomenti affrontati nel corso, utilizzo di un linguaggio complessivamente
        corretto;


        24-27: preparazione tecnicamente adeguata ma con alcuni limiti rispetto agli
        argomenti trattati, capacità di analisi buone, anche se non particolarmente
        articolate, espresse in un linguaggio corretto;


        28-30: ottima conoscenza di un ampio numero di temi affrontati nel corso,
        buone capacità di analisi e di critica, padronanza della terminologia specifica;


        30L: conoscenza eccellente e molto approfondita ed esaustiva dei temi affrontati
        nel corso, capacità di analisi critica e di collegamento, padronanza della
        terminologia specifica.


        Nel caso in cui, causa pandemia, non sia possibile svolgere gli esami in presenza
        ma solo a distanza la stturuttura dell''esame non cambierà.'
      Strumenti a supporto della didattica: Le esercitazioni saranno svolte utilizzando
        il DBMS Oracle 11g e il DBMS MongoDB
      Link ad altre eventuali informazioni: http://bias.csr.unibo.it/golfarelli/BDA/index.htm
      Orario di ricevimento: 'Consulta il sito web di Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli)


        Consulta il sito web di Alessandra Lumini (https://www.unibo.it/sitoweb/alessandra.lumini)'
  en:
    title: 2025/2026 Advanced Database Systems — University of Bologna
    contents:
      Learning outcomes: 'The course has a dual purpose: (1) understand NoSql architectures
        and get familiar with the design of non-relational data models; (2) deepen
        the knowledge of relational DBMSs and improves her practical capabilities.
        In both cases the theoretical knowledge will be combined with practical skills
        through laboratory activities'
      Course contents: '-------------- NoSQL DBMS Design --------------


        1. Modelli dati non relazionali (Document-based, Graph-based, Column oriented)

        2. Architetture per DBMS non relazionali: Cluster, Sharding e persistenza

        3. Progettazione dei dati in DBMS NoSQL

        4. Esercitazioni di laboratorio con MongoDB


        ---------- Relational DBMSs Management and Programming ----------


        1. Database administration

        2. Database programming and active database

        3. Provisioning and resource optimization'
      Readings/Bibliography: 'Teacher slides

        R. van der Lans Introduzione a SQL . Addison-Wesley, 2001.

        R. A. Elmasri, S.B. Navathe. Sistemi di basi di dati - Complementi. Pearson,
        2005.

        Making Sense of NoSQ. Daniel G. McCreary and Ann M. Kelly. Manning, 2013.

        Martin J. Fowler & Pramodkumar J. Sadalage. Nosql Distilled: A Brief Guide
        to the Emerging World of Polyglot Persistence. Addison Wesley, 2009.'
      Teaching methods: Oral lessons and practical exercises
      Assessment methods: 'Two written tests. The first one is carried out on the
        PC and evaluates the student practical capabilities (the user can use books
        and slides). The second one is a set of open questions on all the course program.

        An optional project to be agreed on with the teacher will give addition points.


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        presentation and discussion skills of the topics covered. The ranges of grades
        correspond can be described as follows:


        18-23: the student has sufficient preparation and analytical skills, spread
        however, over just few topics taught in the course, the overall jargon is
        correct


        24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate analytical skills
        with the use of a correct jargon


        28-30: Great knowledge about most of the topics taught in the course, good
        critical and analytical skills, good usage of the specific jargon


        30L: excellent and in depth knowledge of all the topics in the course, excellent
        critical and analytical skills, excellent usage of specific jargon.


        The structure of the exam does not change if, due to the pandemic, you will
        have to opt for remote examinations'
      Teaching tools: Exercises and Lab training will be carried out using Oracle
        DBMS 11g and MongoDB
      Links to further information: http://bias.csr.unibo.it/golfarelli/BDA/index.htm
      Office hours: 'See the website of Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli/en)


        See the website of Alessandra Lumini (https://www.unibo.it/sitoweb/alessandra.lumini/en)'
