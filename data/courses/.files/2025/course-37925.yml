syllabus:
  it:
    title: 2025/2026 PROGETTO DI SISTEMI VIRTUALI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        i metodi di progettazione di sistemi virtuali quali macchine virtuali, sistemi
        operativi a virtualizzazione parziale, reti virtuali, file system virtuali.
        Il corso ha una forte componente progettuale con approfondimenti personalizzati
        che consentono allo studente di specializzarsi negli aspetti di maggiore interesse.
      Contenuti: '- Virtualita'': introduzione.

        - Reti Virtuali

        - Macchine Virtuali

        - Device Virtuali

        - FIle System Virtuali

        - Stack di Rete Virtuali, IoTh: Internet of Threads

        - Sistemi operativi a livello utente: VUOS

        - I moduli di virtualizzazione'
      Testi/Bibliografia: Articoli e documenti verrano forniti durante il corso in
        forma elettronica
      Metodi didattici: 'Lezioni frontali di presentazione dell’uso degli strumenti
        software che implementano macchine virtuali, reti virtuali, device virtuali,
        file system virtuali


        Studio dell’implementazione degli strumenti software di virtualizzazione.


        Discussione sui problemi aperti e presentazione di proposte per progetti.


        Brainstorming collettivo di discussione sull''avanzamento dei progetti.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Gli studenti singolarmente
        o max in coppia realizzano un progetto e lo presentano durante la prova orale
        che si svolge su appuntamento.


        A titolo esemplificativo i temi del progetto possono vertere su: implementazione
        di nuove funzioni per gli strumenti studiati, documentazione del funzionamento
        o del codice, pacchettizzazione di strumenti per distribuzioni software, proof
        of concept per nuovi metodi di impelmentazione.


        I progetti vengono seguiti dal docente e dal tutor (se nominato). La valutazione
        dei progetti è correlata alla complessità e alla mole del lavoro svolto. Vengono
        valutate positivamente l’autonomia del candidato e l’originalità della soluzioni
        proposte.'
      Strumenti a supporto della didattica: 'Video proiettore, lavagna, Internet,
        interesse per l''hacking.

        Non viene fatto uso di software proprietario, verra'' studiato solo software
        libero. Gli studenti potranno quindi approfondire ogni tema a loro piacimento
        ed utilizzare liberamente la conoscenza acquisita nel corso.'
      Link ad altre eventuali informazioni: http://wiki.virtualsquare.org
      Orario di ricevimento: Consulta il sito web di Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Partnership
        per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Virtual System Design — University of Bologna
    contents:
      Learning outcomes: The objective of the course is to teach the structure and
        implementation of virtual systems like virtual machines and view based operating
        systems, virtual networks, virtual file systems. This course is mainly based
        on laboratory projects.
      Course contents: '- Virtuality: introduction

        - Virtual Networks

        - Virtual Machines

        - Virtual Devices

        - Virtual File Systems

        - Virtual Networking stacks. Internet of Threads (IoTh)

        - User level Operating systems: VUOS.

        - VUOS modules'
      Readings/Bibliography: Papers and documents will be provided during the course
        in electronic format
      Teaching methods: 'Frontal lectures presenting the use of software tools that
        implement virtual machines, virtual networks, virtual devices, virtual file
        systems


        Study of the implementation of virtualization software tools.


        Discussion of open problems and presentation of project proposals.


        Collective brainstorming and discussion on project progress.


        Taking into account the type of activity and teaching methods adopted, attendance
        of this training activity requires the prior participation of all students
        in Modules 1 and 2 of training on safety in the workplace, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode.'
      Assessment methods: 'Students, individually or in pairs, create a project and
        present it during the oral exam, which takes place by appointment.


        For example, project topics may include: implementation of new functions for
        the tools studied, documentation of their operation or code, packaging of
        tools for software distributions, proof of concept for new implementation
        methods.


        Projects are supervised by the instructor and the tutor (if appointed). Project
        evaluation is based on the complexity and scope of the work completed. Candidates''
        autonomy and the originality of their proposed solutions are given a positive
        evaluation.'
      Teaching tools: 'Video projector, blackboard, Internet, hacking skills.

        This course is proprietary software free, i.e. we''ll use libre (FLOSS) software
        only. Students can deepen their understanding at any level and they are free
        to use the knowledge acquired in this course.'
      Links to further information: http://wiki.virtualsquare.org
      Office hours: See the website of Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli/en)
      SDGs: 'Quality education Industry, innovation and infrastructure Partnerships
        for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
