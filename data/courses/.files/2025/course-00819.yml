course_title:
  id: 00819
  name: PROGRAMMAZIONE
integrated_course: ''
campus: Bologna
programme: Laurea in Informatica
syllabus:
  it:
    title: 2025/2026 PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i principi, gli strumenti e le tecniche della programmazione di applicazioni
        informatiche. È in grado di programmare in uno specifico linguaggio di programmazione
      Contenuti: 'Introduzione alla programmazione con il linguaggio C++.


        Programmazione imperativa in C++: algoritmi e programmi, tipi di dato, assegnamento,
        input/output, condizionali, iterazione, funzioni, ricorsione e funzioni ricorsive,
        vettori, record, allocazione della memoria, strutture dati dinamiche (liste,
        code, alberi)


        Programmazione object-oriented in C++: classi, metodi, overloading, ereditarieta''


        Uso di un ambiente di sviluppo.'
      Testi/Bibliografia: 'Seguiremo 1 che e in Inglese. Il testo 2 e un riferimento
        per un testo in italiano.


        1. Savitch - Mock: "Problem Solving with C++", Pearson (una qualunque edizione)

        2. Deitel - Deitel : "C++. Fondamenti di programmazione", Apogeo.

        3. Materiale disponibile sul sito di e-learning (slide delle lezioni, esercizi
        svolti in classe).'
      Metodi didattici: Lezioni frontali, laboratorio. Il laboratorio sara svolto
        in gran parte in aula (utilizzando portatili/tablet personali). Almeno una
        volta si andra nei laboratori didattici (dove viene svolto l'esame scritto).
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame verificherà
        che lo studente abbia acquisito competenze

        di programmazione, in particolare la capacità di scrivere uno o più

        programmi in linguaggio C++. L''esame include anche lo sviluppo di un progetto.
        Lo scritto si svolge nei laboratori didattici ed e` formato da 3 esercizi
        (uno sugli array, uno sulle strutture dati dinamiche e uno sulle classi) e
        il massimo voto finale e 26; lo scritto e superato con voto maggiore o uguale
        a 16. Nell''orale si discute lo sviluppo preventivo di un progetto che gli
        studenti svolgono in gruppo (di al massimo 3 persone). Il voto massimo dell''orale
        e 6 punti.'
      Strumenti a supporto della didattica: Proiettore, lavagna, laptop, laboratorio.
      Orario di ricevimento: 'Consulta il sito web di Cosimo Laneve (https://www.unibo.it/sitoweb/cosimo.laneve)


        Consulta il sito web di Alina Sirbu (https://www.unibo.it/sitoweb/alina.sirbu)'
  en:
    title: 2025/2026 Programming — University of Bologna
    contents:
      Learning outcomes: At the end course, the student knows programming principles,
        tools and techniques. He/she is able to program in a specific programming
        language.
      Course contents: 'Introduction to Programming with C++.


        Imperative programming in C++: algorithms and programs, data types, assignment,
        input / output, conditional, iteration, functions, recursion and recursive
        functions, vectors, records, memory allocation, dynamic data structures (lists,
        queues, trees)


        Object-oriented programming in C++: classes, methods, overloading, inheritance.


        Use of a development environment.'
      Readings/Bibliography: 'Our reference will be 1, which is in English. 2 is a
        reference for an Italian book.


        1. Savitch - Mock:

        2. "Problem Solving with C++", Pearson (una qualunque edizione)

        3. Deitel - Deitel : "C++. Fondamenti di programmazione", Apogeo.

        4. Material available on the e-learning website (slides of lectures, exercises
        done during the lectures).'
      Teaching methods: 'Lectures and lab sessions.

        Most of the lab work will be conducted in the classroom using students’ personal
        laptops or tablets. At least once during the course, a session will take place
        in the university’s teaching laboratories, where the written exam is held.'
      Assessment methods: 'The exam will assess whether the student has acquired programming
        skills, particularly the ability to write one or more programs in the C++
        language.

        The exam also includes the development of a project.


        The written test takes place in the teaching laboratories and consists of
        three exercises: one on arrays, one on dynamic data structures, and one on
        classes. The maximum score for the written part is 26 points, and it is considered
        passed with a grade of 16 or higher.


        The oral examination involves a discussion of the preliminary development
        of a project that students carry out in groups of up to three people. The
        maximum score for the oral part is 6 points.'
      Teaching tools: Projector, blackboard, laptop, computing laboratory.
      Office hours: 'See the website of Cosimo Laneve (https://www.unibo.it/sitoweb/cosimo.laneve/en)


        See the website of Alina Sirbu (https://www.unibo.it/sitoweb/alina.sirbu/en)'
