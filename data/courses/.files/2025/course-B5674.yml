syllabus:
  it:
    title: 2025/2026 MANAGEMENT OF DIGITAL MEDIA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The student is expected to understand the
        functions and processes of transformations within the media industries and
        the innovations connected to new digital technologies applied to creative
        industries.
      Contenuti: 'The digital revolution has fundamentally reshaped our world, transforming
        how we create, distribute, and consume everything from news and entertainment
        to social connections.


        This course, Management of Digital Media, is an in-depth exploration of the
        economic principles and models that govern this new landscape.


        The course will be focused on two of the most important media industries,
        music and video. For each of them, it will be introduced and analyzed the
        value chain, all the relevant typologies of players and how the technological
        evolution and the changes in consumer habits are influencing the markets’
        dynamics and their structure.'
      Testi/Bibliografia: 'Case Studies


        “Spotify: Face the Music (Update 2024)” (Govert Vroom, Isaac Sastre Boquet,
        IESE Business School, 2024)


        “Netflix: Disrupting Digital Streaming” (Siddarth Rawat, Essec Business School,
        2017)


        “The Netflix Pivot” (Angus Finney, Allegre L Hadida - Cambridge Judge Business
        School, 2025)'
      Metodi didattici: 'Frontal classes


        Role Playing and case studies


        Direct experience of managers from some of the most important media companies'
      Modalità di verifica e valutazione dell'apprendimento: 'Individual Oral Examination:
        3-4 questions, ca 15 minutes


        Materials to Study


        - Course Presentation

        - Your notes

        - Case studies

        - Articles shared during the course'
      Strumenti a supporto della didattica: "Other Suggested Materials\n\nResources\
        \ in case you want to know a little more about the digital media industry\n\
        \nBooks\n\n- Alan B. Krueger, “Rockonomics: What the Music Industry Can Teach\
        \ Us About Economics (and Our Future)” (John Murray Hachette)\n- Patrik Wikström,\
        \ “The Music Industry” (Polity)\n- Will Page, “Tarzan Economics: Eight Principles\
        \ for Pivoting Through Disruption” (Simon & Schuster)\n- Anita Elberse, “Blockbusters.\
        \ Why big hits – and big risks – are the future of the entertainment business”\
        \ (Faber & Faber)\n- Gillian Doyle, “Understanding Media Economics”, (SAGE\
        \ Pubblications)\n- Donald S. Passman, “All you need to know about the music\
        \ industry” (Simon & Schuster)\n- Martin Spinelli, Lance Dann, “Podcasting\
        \ – The Audio Media Revolution” (Bloomsbury)\n- Maria Eriksson, Rasmus Fleischer,\
        \ Anna Johansson, Pelle Snickars, Patrick Vonderau, “Spotify Teardown” (The\
        \ MIT Press)\n- Ramon Lobato, “Netflix Nations: The Geography of Digital Distribution”\
        \ (NYU Press)\n- Reed Hastings, Erin Meyer, “No Rules Rules: Netflix and the\
        \ Culture of Reinvention” (Penguin)\n- John B. Thompson [https://www.amazon.com/John-B-Thompson/e/B001IU0QSC/ref=dp_byline_cont_book_1],\
        \ “Book Wars: The Digital Revolution in Publishing” (Editore: Polity Press)\n\
        - Mattias Frey, “MUBI and the Curation Model of Video On Demand” (Palgrave\
        \ MacMillan)\n- Michael D. Smith and Rahul Telang, “Streaming, Sharing, Stealing”\
        \ (The MIT Press)\n- Ed Catmull, “Creativity, Inc” (Bantam Press)\n- Liz Pelly,\
        \ “Mood Machine – The rise of Spotify and the cost of the perfect playlist”\
        \ (Hodder & Stoughton)\n- Robert Iger, “The Ride of a Lifetime” (Random House)\n\
        - Lelio Simi, “Mediastorm – Il nuovo ordine mondiale dei media” (Hoepli –\
        \ Italian)\n- Mu$icBiz – L’industria musicale ai tempi dello streaming (Hoepli\
        \ – Italian)\n\nDocumentaries/Series\n\n- The Defiant Ones (Netflix)\n- Trainwreck:\
        \ Woodstock ’99 (Netflix)\n- Quincy (Netflix)\n- The Story of Content: Rise\
        \ of the New Marketing (Youtube)\n- FYRE: The Greatest Party That Never Happened\
        \ (Netflix)\n- The Social Dilemma (Netflix)\n- The Great Hack (Netflix)\n\
        - The Pixar Story (Disney+)\n- The Playlist (Netflix) Podcasts\n- Business\
        \ Wars: Netflix vs Blockbuster\n- Business Wars: Taylor Swift vs. Scooter\
        \ Braun\n- The Town with Matthew Belloni\n- Acquired (Ben Gilbert and David\
        \ Rosenthal)\n- Bubble Trouble (Will Page and Richard Kramer)\n- The Music\
        \ Industry Podcast\n- The New Music Business (Ari Herstand)\n- Your Morning\
        \ Coffee (Jay Gilbert & Mike Etchart)\n- The MBW Podcast: Talking Trends (Music\
        \ Business Worldwide)\n- The New Music Business (Ari Herstand)\n- Crew Call\
        \ with Anthony D’Alessandro (Deadline)\n- The Ankler Podcast\n- The Business\
        \ (Kim Masters)\n- Variety’s “Strictly Business”\n- The Rest is Entertainment\n\
        - The Media Odissey (Marion Ranchet and Evan Shapiro)\n  \n  Newsletters\n\
        - Soundbite by Ashley Carman (Bloomberg)\n- The Medium from Parqoor by Andrew\
        \ Rosen (The Information)\n- Evan Shapiro: Media War & Peace\n- Fearless Media\
        \ with Peter Csathy\n- Benedict’s Newsletter (Benedict Evans)\n- Screentime\
        \ by Lucas Shaw (Bloomberg)\n- Entertainment Strategy Guy\n- What I’m Hearing\
        \ - Matthew Belloni (Puck)\n- Variety\n- Deadline\n- The Hollywood Reporter\n\
        - Streaming Made Easy"
      Orario di ricevimento: Consulta il sito web di Luca Bersaglia (https://www.unibo.it/sitoweb/luca.bersaglia2)
