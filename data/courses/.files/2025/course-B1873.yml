syllabus:
  it:
    title: 2025/2026 Machine Learning for Humanities (1) (LM) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the studentis
        familiar with the theoreticalprinciplesunderpinning modernmachine learning.
        The student isfurtherable to understand, apply and evaluatethe main machinelearningtechniquesand
        implementationsrelevantto addressingpracticalproblems and tasksin thedomains
        ofCultural Heritageand GLAM.Lastly, the student is able to critically reflect
        on thepreconditions and implications of using machine learning in these domains.
      Contenuti: 'This course offers an introduction to Machine Learning (ML), with
        a focus on applications in the Arts and Humanities. The course will introduce
        foundational ML concepts and methods, and will be complemented by laboratory
        activities where methods will be implemented.


        After completing this course, the student can:


        - Understand basic and advanced Machine Learning concepts and methods.

        - Find software libraries that can be used to develop ML applications.

        - Implement ML applications using Python.

        - Evaluate whether ML could be used in an Arts and Humanities task.


        Course contents


        Machine Learning (ML) is increasingly used in the context of Arts & Humanities
        research and GLAM applications (Galleries, Libraries, Archives, Museums).
        Examples range from text recognition and information extraction from historical
        sources to image search and analysis on artwork collections, from automatic
        3D reconstructions of built heritage to the automatic detection of archeological
        sites from satellite or drone images. This course will lay the foundations
        for the students to explore and implement similar applications and more.


        The breakdown of the topics is as follows (per week):


        1. Week 1: Introduction to Machine Learning, part 1. We discuss the course
        setup, the fundamentals of machine learning, the types of ML tasks, the key
        components of an ML workflow, some foundational mathematical concepts, and
        linear regression. We implement linear regression in numpy.

        2. Week 2: Introduction to Machine Learning, part 2. We discuss the worked-out
        examples of linear regression, linear classification, and the Multi-Layer
        Perceptron (MLP), and implement them in numpy.

        3. Week 3: PyTorch and Machine Vision. We introduce PyTorch, discuss tasks
        in machine vision and the main architectures to work with images (convolutional
        and residual networks). We implement an image-based task in PyTorch.

        4. Week 4: Language Processing. We introduce tasks in natural language processing
        and the Transformer, the main architecture to work with texts. We implement
        text-based tasks in PyTorch.

        5. Week 5: Generative AI. We discuss generative AI models, in particular focusing
        on Large Language Models (LLMs). We see how to use LLMs in practice and mention
        advanced applications such as Retrieval Augmented Generation (RAG). We implement
        a RAG-enabled chatbot using LlamaIndex and Chainlit.


        Note that this list of topics might still change slightly.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) immediately and agree with the teacher the most effective strategies for
        attending the lectures and preparing for the exam.'
      Testi/Bibliografia: "The materials will be provided via GitHub. The students\
        \ are expected to take their own notes.\n\nReadings\n\nBOOK: Zhang et al.,\
        \ Dive Into Deep Learning, MIT Press, 2023. https://d2l.ai/index.html.\n\n\
        Readings:\n\n- Allamar, Jay, The Illustrated Transformer, 2018. https://jalammar.github.io/illustrated-transformer.\n\
        - Riedl, Mark. A Very Gentle Introduction to LLMs, 2023. https://mark-riedl.medium.com/a-very-gentle-introduction-to-large-language-models-without-the-hype-5f67941fa59e.\n\
        - Open AI. GPT-4, 2023. https://openai.com/index/gpt-4-research.\n- At least\
        \ one among:\n  \n  - Colavizza, Giovanni, Tobias Blanke, Charles Jeurgens,\
        \ and Julia Noordegraaf. “Archives and AI: An Overview of Current Debates\
        \ and Future Perspectives.” Journal on Computing and Cultural Heritage 15,\
        \ no. 1 (February 28, 2022): 1–15. https://doi.org/10.1145/3479010.\n  - Fiorucci,\
        \ Marco, Marina Khoroshiltseva, Massimiliano Pontil, Arianna Traviglia, Alessio\
        \ Del Bue, and Stuart James. “Machine Learning for Cultural Heritage: A Survey.”\
        \ Pattern Recognition Letters 133 (May 2020): 102–8. https://doi.org/10.1016/j.patrec.2020.02.017.\n\
        \  - Lombardi, Francesco, and Simone Marinai. “Deep Learning for Historical\
        \ Document Analysis and Recognition—A Survey.” Journal of Imaging 6, no. 10\
        \ (October 16, 2020): 110. https://doi.org/10.3390/jimaging6100110.\n  - Santos,\
        \ Iria, Luz Castro, Nereida Rodriguez-Fernandez, Álvaro Torrente-Patiño, and\
        \ Adrián Carballal. “Artificial Neural Networks and Deep Learning in the Visual\
        \ Arts: A Review.” Neural Computing and Applications 33, no. 1 (January 2021):\
        \ 121–57. https://doi.org/10.1007/s00521-020-05565-4.\n  - Sommerschield,\
        \ Thea, Yannis Assael, John Pavlopoulos, Vanessa Stefanak, Andrew Senior,\
        \ Chris Dyer, John Bodel, Jonathan Prag, Ion Androutsopoulos, and Nando De\
        \ Freitas. “Machine Learning for Ancient Languages: A Survey.” Computational\
        \ Linguistics 49, no. 3 (September 1, 2023): 703–47. https://doi.org/10.1162/coli_a_00481.\n\
        \  - Wevers, Melvin, and Thomas Smits. “The Visual Digital Turn: Using Neural\
        \ Networks to Study Historical Images.” Digital Scholarship in the Humanities,\
        \ January 18, 2019. https://doi.org/10.1093/llc/fqy085.\n\nVisual Neural Networks\
        \ course by 3blue1brown: https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_ZCJB-3pi.\n\
        \nFurther resources: Awesome AI 4 LAM. https://ai4lam.github.io/awesome-ai4lam."
      Metodi didattici: 'Lectures and live coding sessions. Attending students are
        expected to come prepared to class.


        It is recommended for all students to attend in person.'
      Modalità di verifica e valutazione dell'apprendimento: 'Oral exam on all course
        contents (50%, duration approx 30m) and an individual project on a topic of
        choice (50%). The student may select a topic for the project in agreement
        with the lecturer. The project must be applied, i.e., entailing a substantial
        component of writing of code and the development of an ML application of choice.
        The project has to be sent to the lecturer at least 5 days in advance of the
        oral exam date. The project must be submitted before taking the exam. Project
        guidelines will be provided at the beginning of the course.


        The program for non-attending students is the same.


        Recommended prior knowledge


        You need to know how to code in Python. High-school algebra and calculus are
        also expected (you can refresh them using the first reading below). The students
        will also benefit from having attended 1st-year courses such as ‘Computational
        Thinking’.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) in advance. The office will be responsible for proposing adaptations to
        interested students. Such adaptations must be submitted to the teacher for
        approval at least 15 days before the exam session. The teacher will also evaluate
        the adaptations regarding the training objectives of teaching.'
      Strumenti a supporto della didattica: 'Slides, live coding, demonstrations,
        readings, and seminar discussions.


        Classes are held in a classroom equipped with personal computers connected
        to the Internet.'
      Link ad altre eventuali informazioni: https://github.com/Giovanni1085/UNIBO_MachineLearning
      Orario di ricevimento: Consulta il sito web di Giovanni Colavizza (https://www.unibo.it/sitoweb/giovanni.colavizza)
