syllabus:
  it:
    title: 2025/2026 Interaction Media Design (1) (LM) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course students are put
        in touch with the intangible cultural heritage mediated by computer science
        and expressed under the form of practices, representations and skills that
        the multimedia research community recognizes as part of its identity. Students
        are able to reflect upon and manipulate a variety of digital instruments,
        including objects, artifacts and cultural spaces, manifested through interactive
        multimedia signs and actions.
      Contenuti: 'Interaction Media Design focuses on the design of interactive applications
        in the humanities and specifically in the domain of Cultural Heritage. During
        the course, media are treated (images, audio, video, 3d, etc.), together with
        their acquisition and processing. Main design principles are discussed in
        relation with CH and cognitive sciences.


        The course is one of the modules of the exam "Digital Heritage and Multimedia".
        The second module (Museology, Museography and Virtual Environments), is held
        by prof.sa Tartarini.


        The course is divided in 6 areas:


        1. Cognitive-Emotional goals of Interactive Media Design:


        Distraction and Concentration, Meaningfulness, Transformation through Provocation,
        Sense of Belonging and Caring attitude, Memory and Recall, Authenticity, Embodiment,
        Language and Narration, Engagement, Empathy, The Perception of Cultural Heritage,
        Curiosity


        1. Human Computer Interaction for Cultural Heritage:


        basics: what is interaction, interaction principles, how do we interact, WIMP
        paradigm: Device-based Interaction and Natural Interaction


        1. Digital Images and Digital Photography:


        principles, analog/digital, electromagnetic spectrum, colors and human vision,
        color in visualization, image processing and computer vision, intensity images,
        range images, pixels, bit depth, file formats /jpg, tiff, gif, png, raw/,
        rawtherapee (sw); Digital Photography: focus, slr/dslr camera, exposure, Shutter
        Speed, Aperture and F-number, Luminance, Focal length, Depth of Field, ISO


        1. Beyond Multimedia: from digital images to virtual experiences:


        Computer Graphics: non interactive CG, interactive CG, 3d models, file formats,
        software; Image Based Modelling; Panoramas and Virtual Tours (Pano2VR); Videogames:
        design tools (Twine)


        1. Interactive Media Design principles and Tools:


        PACT frameworks, Egonomics, Mental Models, Personas, Metaphors, Requirements,
        Design Brief; Card Sorting, Visitor Box, Scenarios (role-play), Cultural Probes,
        Storyboards, Interactive Storytelling (Twine)


        1. Hands-on: the Design Process


        the Design Process: 1-Context definition, Star Assets and Target Audience;
        2-Institutional Goals (Cognitive and Educational Goals); 3-Design Brief (motivations,
        barriers, capabilities, devices); 4-Ideas generation and envisionment techniques:
        storyboarding (Twine) and virtual tours (Pano2VR); 5-Distruption (constraints,
        negative experiences, beyond); 6-Revision and Evaluation; other envisionment
        techniques (low-fi prototypes); 10 golden rules of Interactive Media design
        for Cultural Heritage'
      Testi/Bibliografia: 'The preparation of the exam requires:


        FOR THOSE ATTENDING THE LECTURES


        - Main volume to study: Benyon D. “Designing User Experience: A guide to HCI,
        UX and interaction design” (2019)


        This volume should be integrated by the following chapters or scientific papers
        (that will be made available in VIRTUALE):


        - Li Ze-Nian, Drew S.M., Fundamentals of Multimedia. (2004). chapters 3-4
        [An extract can be requested to the teacher]


        FOR THOSE NOT ATTENDING THE LECTURES


        - Book: Benyon D. “Designing User Experience: A guide to HCI, UX and interaction
        design” (2019)

        - Chapters: Ansel Adams, The Camera, 2012: chapters 1,2,5-7

        - Chapters: Li Ze-Nian, Drew S.M., Fundamentals of Multimedia. (2004). chapters
        3-4

        - Chapters: Marschner S., Shirley P. Fundamentals of computer graphics. CRC
        Press, 2018.: chapter 1 and 3

        - Paper: Remondino F., El‐Hakim S. "Image‐based 3D modelling: a review (https://onlinelibrary.wiley.com/doi/full/10.1111/j.1477-9730.2006.00383.x)."
        The photogrammetric record 21.115 (2006): 269-291.

        - Paper: Bekele, Mafkereseb Kassahun, et al. "A survey of augmented, virtual,
        and mixed reality for cultural heritage (https://dl.acm.org/doi/pdf/10.1145/3145534)."
        Journal on Computing and Cultural Heritage (JOCCH) 11.2 (2018): 1-36.

        - Paper: Pescarin, Sofia, et al. "Designing Coloured Experiences (https://link.springer.com/chapter/10.1007/978-3-032-07792-9_7)."
        Chromatic Visions: Exploring Colour in Art, Archaeology and Digital Realities,
        Part I. Cham: Springer Nature Switzerland, 2025. 223-252.

        - Paper: Veggi, Manuele, et al. "Sense of care in the design of digital heritage
        applications (https://diglib.eg.org/items/64c08e3c-6a66-464e-a82c-2a871e30b60e)."
        Chromatic Visions: Exploring Colour in Art, Archaeology and Digital Realities,
        Part I. Cham: Springer Nature Switzerland, 2025. 128-161

        - Paper: Pescarin, S., Città, G., Gentile, M., & Spotti, S. (2023). Authenticity
        in VR and XR Experiences: a Conceptual Framework for Digital Heritage (https://diglib.eg.org/items/64c08e3c-6a66-464e-a82c-2a871e30b60e).

        - Paper: Travaglini, Laura, et al. "The codesign tool. A card-based framework
        for interactive and collaborative design in cultural heritage (https://link.springer.com/chapter/10.1007/978-3-032-13164-5_18)."
        International Conference on Human-Computer Interaction. Cham: Springer Nature
        Switzerland, 2025.'
      Metodi didattici: 'Students will follow theoretical lectures and participate
        to hands-on sessions of design and of creation of multimedia content, such
        as digital images, panoramas, virtual tours and interactive stories.


        All students are invitated to attend to the lectures, due to their characteristics
        and nature (exercises, interaction, hands-on examples, etc.).


        Students who could not attend, should advice the teacher at the beginning
        of the course, to receive indication on the special bibliography for the exam'
      Modalità di verifica e valutazione dell'apprendimento: 'The course is part of
        the "integrated course" Digital heritage and multimedia. So there will be
        only one final exam which will include module A [Interaction Media Design
        (Prof. S. Pescarin)] + module B [Museology, Museography and Virtual Environments
        (Prof. C. Tartarini)] assessments.


        The exam is made of 3 parts:


        1. T1: WRITTEN TEST [Interaction Media Design (Prof. S. Pescarin)];

        2. T2: WRITTEN TEST [Museology, Museography and Virtual Environments (Prof.
        C. Tartarini)];

        3. O3: FINAL ORAL SESSION [Digital heritage and multimedia (Prof. S. Pescarin
        + Prof. C. Tartarini)].


        DETAILS


        T1) WRITTEN TEST Module A - Interaction Media Design (Prof. S. Pescarin):
        the test is aimed at verifying the acquisition of main concepts among those
        listed here (https://www.unibo.it/it/studiare/dottorati-master-specializzazioni-e-altra-formazione/insegnamenti/insegnamento/2024/502365)
        [LINK].


        Passing the test is mandatory to be able to enroll for final exam.


        The time for students to complete this written test is 90 minutes.


        The mark represents 25% of the overall score.


        T2) WRITTEN TEST Module B - Museology, Museography and Virtual Environments
        (Prof. C. Tartarini): the test is aimed at verifying the acquisition of main
        concepts among those listed above.


        Passing the test is mandatory to be able to enroll for the final exam.


        The time for students to complete this written test is 90 minutes.


        The mark represents 25% of the overall score.


        N.B. In case of GLOC/ERASMUS students attending ONLY module B - Museology,
        Museography and Virtual Environments the mark will represent 40% of the overall
        score.


        O3) FINAL ORAL SESSION (project work presentation) Digital heritage and multimedia
        [Prof. S. Pescarin + Prof. C. Tartarini]


        The project must be submitted by mail to both professors at least 10 days
        before the final examination date (dates of the final examination will be
        published in https://almaesami.unibo.it/)


        The mark represents 50% of the overall score.


        In case of GLOC/ERASMUS students attending ONLY module Museology, Museography
        and Virtual Environments the mark will represent 60% of the overall score.


        N.B. Students with specific learning disorders (SLD) or temporary/permanent
        disabilities should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en)
        in advance. The office will be responsible for proposing adaptations to interested
        students. Such adaptations must be submitted to the teacher for approval at
        least 15 days before the exam session. The teacher will also evaluate the
        adaptations regarding the training objectives of teaching.


        ASSESSMENT CRITERIA


        - EXCELLENT (i.e. final score: 30 or 30 cum laude): in-depth view of all the
        course topics; active and intensive involvement in the development of the
        project following all the theoretical principles and the practical guidelines
        provided to the student during the lectures;

        - VERY GOOD (i.e. final score: between 26/30 and 29/30): accurate knowledge
        of the topics and very good analysis skills; active involvement in the development
        of the project following the theoretical principles and the practical guidelines
        provided to the student during the lectures;

        - GOOD (i.e. final score: between 25/30 and 22/30): good knowledge of the
        topics and involvement in the development of the project following the theoretical
        principles and the practical guidelines provided to the student during the
        lectures

        - SUFFICIENT (i.e. final score: between 18/30 and 22/30): partial view of
        the course topics; minor contribution to the development of the project

        - INSUFFICIENT = UNSUCCESSFUL (i.e. final score: lesser than 18): either not
        reaching even partial view on the course topics or not providing any contribution
        to the project. In the event of an "unsuccessful" assessment, the student
        must re-apply for a later examination call.'
      Strumenti a supporto della didattica: 'The following software will be used and
        required:


        - RAWTHERAPEE

        - PTGUI

        - PANO2VR

        - TWINE

        - QCad

        - ATON


        Slides, Papers and other resources will be available in VIRTUALE'
      Orario di ricevimento: Consulta il sito web di Sofia Pescarin (https://www.unibo.it/sitoweb/sofia.pescarin)
