syllabus:
  it:
    title: 2025/2026 BLOCKCHAIN AND CRYPTOCURRENCIES — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa, lo studente
        conosce le principali tematiche collegate alle nuove tecnologie blockchain,
        criptovalute, smart contract and nuove applicazioni costruite sopra la blockchain.
        È capace di definire e realizzare semplici smart contracts che possano essere
        inseriti in una blockchain.
      Contenuti: 'Bitcoin e le nuove criptovalute hanno generato un vasto interesse.
        Sempre più utenti si interessano e investono su queste tecnologie, mentre
        altri etichettano queste innovazioni come una pericolosa bolla speculativa,
        con potenziali applicazioni di carattere illegale. La verità è che ogni tecnologia
        è di per sé neutra. La blockchain, così come tutte le implementazioni di un
        "distributed ledger", rappresenta una interessante tecnologia che può essere
        utilizzata per costruire nuove applicazioni distribuite.


        Gli elementi che compongono una blockchain, e in general un distributed ledger,
        sono strettanente collegati ad aspetti fondamentali dell''informatica. Questo
        corso si propone di illustrare i principi della blockchain e delle criptovalute.


        Programma


        - Introduzione ai sistemi Peer-to-Peer

        - Tipologie di overlay e decentralizzazione

        - Introduzione alle criptovalute

        - La blockchain: come si ottiene la decrentralizzazione

        - Transazioni e linguaggi di scripting

        - Mining

        - Attacchi alla blockchain

        - Anononimità

        - Smart contracts'
      Testi/Bibliografia: 'Dispense e slide fornite dal docente, assieme ad articoli
        e riferimenti bibliografici.


        Il materiale fornito sarà principalmente in lingua inglese.'
      Metodi didattici: 'Lezioni frontali


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, https://elearning-sicurezza.unibo.it/'
      Modalità di verifica e valutazione dell'apprendimento: La prova d'esame mira
        a verificare il raggiungimento degli obiettivi del corso. La verifica dell'apprendimento
        avviene attraverso il solo esame finale, che accerta l'acquisizione delle
        conoscenze e delle abilità attese tramite lo svolgimento di una prova di progetto.
      Strumenti a supporto della didattica: Piattaforma di e-learning dell'Ateneo
      Orario di ricevimento: Consulta il sito web di Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti)
  en:
    title: 2025/2026 Blockchain and Cryptocurrencies — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the relevant
        themes related to blockchain technologies, cryptocurrencies, smart contracts
        and novel applications that can be built over the blockchain. The student
        is able to develop simple smart contracts that can be deployed on a blockchain.
      Course contents: 'Bitcoin and novel cryptocurrencies gathered momentum in the
        last months. More and more investors look with interest at these technologies,
        while others label them as a dangerous speculative bubble. The truth is that
        the blockchain, and the alternative implementations of a distributed ledger,
        represent very interesting technologies, that can be exploited to build novel
        distributed applications. The underlying building blocks are related to many
        concepts and research areas of computer science in general. This course will
        illustrate the main principles and conceptual foundations of the blockchain
        and the Bitcoin network.


        Program


        - Introduction to peer-to-peer sysystems

        - Overlay topologies and decentralization

        - Introduction to Crypto and Cryptocurrencies

        - The blockchain: how to achieve decentralization

        - Transactions and transaction scripting languages

        - Mining

        - Attacks to the blockchain

        - Anonymity

        - Smart contracts'
      Readings/Bibliography: Lecture notes and slides will be provided by the instructor,
        along with papers and a list of bibliographical references and additional
        material. All the course material is in English.
      Teaching methods: 'Frontal lessons


        In relation to the kind of activities and didactical methods adopted, the
        attendance to this class will require the preliminary participation of all
        the students to the Modules 1 and 2 of the Safety rules on study places, which
        can ne followed remotely in e-learning via the following link: https://elearning-sicurezza.unibo.it/'
      Assessment methods: Project
      Teaching tools: Unibo e-learning platform
      Office hours: See the website of Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti/en)
