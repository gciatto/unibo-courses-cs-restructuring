syllabus:
  it:
    title: 2025/2026 NANOELETTRONICA M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso si propone di fornire agli studenti
        che lo frequentano gli strumenti concettuali per affrontare lo studio dei
        dispositivi a dimensione nanometrica. La complessità delle equazioni quantiche
        del trasporto rende difficile lo sviluppo di modelli compatti e obbliga all’adozione
        di tecniche numeriche per la loro soluzione. Pertanto, il corso comprenderà
        nel proprio programma anche lo studio dei principali metodi numerici per la
        soluzione dell’equazione di Schrödinger a contorno sia chiuso che aperto,
        per il quale ha oggi assunto una grande popolarità il formalismo della funzione
        di Green di non equilibrio (NEGF). I dispositivi oggetto di studio comprenderanno,
        per la loro importanza preminente, i transitori ultrasottili di silicio su
        isolante (SOI), i fili quantici di silicio (NW-FET) e i dispositivi multi-gate
        (MG-FET), recentemente annunciati da Intel come componenti base del nodo tecnologico
        a 22 nanometri. Il corso esaminerà altresì dispositivi a eterostruttura basati
        su semiconduttori composti III-V, il cui interesse per le applicazioni digitali
        sta oggi aumentando a livello di ricerca per la realizzazione di componenti
        dotati di una transizione veloce fra lo stato di spegnimento e quello di accensione.
        Sono fra questi i transistori a effetto tunnel banda a banda e i super-reticoli
        (SL-FET) che, per la loro proprietà di filtraggio degli elettroni ad alta
        energia, rendono possibili pendenze inverse sotto soglia molto minori di (kBT/q)
        ln(10) = 60 mV/dec.
      Contenuti: 'Premessa


        La evoluzione delle tecnologie microelettroniche ha reso possibile la fabbricazione
        di sistemi integrati contenenti alcuni miliardi di transistori con dimensioni
        lineari dell''ordine di una decina di nanometri. In molti casi, tali dimensioni
        sono minori o comparabili al cammino libero medio degli elettroni. Il processo
        di contrazione dei dispositivi elettronici ha pertanto raggiunto un livello
        così avanzato da rendere inadeguati i metodi classici di trattamento del trasporto
        di carica nei semiconduttori. Il modello di trasporto a deriva e diffusione
        (drift-diffusion) si basa infatti sull''assunto opposto, ovvero che le variazioni
        dei campi elettrici nel dispositivo avvengano su una scala spaziale molto
        maggiore del cammino libero medio, e che le loro variazioni nel tempo abbiano
        luogo su una scala temporale molto maggiore del tempo medio fra collisioni
        successive delle cariche mobili. Inoltre, il confinamento strutturale delle
        cariche produce nuovi effetti, come la quantizzazione dell''energia e, pertanto,
        la separazione delle bande di conduzione e di valenza in una molteplicità
        di sottobande a dimensionalità ridotta. Infine, l''effetto tunnel "source
        to drain" costituisce una limitazione di importanza crescente sulle loro prestazioni.
        Nasce da questi effetti la necessità di una revisione profonda dei metodi
        classici di analisi dei dispositivi e l''esigenza di adottare nuove metodologie
        di studio che possano interpretare fenomeni come il confinamento quantico
        delle cariche, l''effetto tunnel e il trasporto balistico o quasi balistico.


        Il corso di Nanoelettronica M si propone di dare una risposta a questa esigenza,
        e di investigare il trasporto di carica in strutture a dimensione minore o
        comparabile al cammino libero medio degli elettroni. Scompare pertanto l''assunto
        di quasi-equilibrio locale e la descrizione del trasporto attraverso il concetto
        di mobilità e diffusività degli elettroni. La natura delle equazioni costitutive
        diviene fortemente non locale e aumenta l''importanza delle condizioni al
        contorno, con le quali si cerca, non sempre con successo, di isolare il dispositivo
        dal suo contesto circuitale.


        I dispositivi oggetto di studio comprenderanno, per la loro importanza preminente,
        i transistori multi-gate (MG-FET), che rappresentano i componenti base dei
        nodi tecnologici da 22 a 2 nanometri, i transistori silicio su isolante a
        svuotamento completo (FD-SOI), i transistori a struttura cilindrica con gate
        avvolgente (SG-FET) e i transistori a nanostrati multipli. Il corso tratterà
        inoltre i transistori a effetto tunnel banda a banda (TFET), che si caratterizzano
        per una elevata pendenza della caratteristica di trasferimento sotto soglia
        e dei dispositivi basati su materiali a struttura bidimensionale, inclusi
        grafene e dicalcogenuri di metalli di transizione.


        Contenuti dell’Insegnamento di Nanoelettronica M


        Fondamenti di Struttura della materia


        1. Evoluzione delle conoscenze sulla struttura della materia

        2. Richiami sui principi generali della Meccanica Quantistica

        3. Elementi di Elettrodinamica Quantistica

        4. Applicazioni elementari: atomi idrogenoidi

        5. Spin dell’elettrone. Equazioni di Pauli

        6. Elementi di Meccanica Quantistica relativistica. Equazione di Dirac

        7. Metodi approssimati: teoria delle perturbazioni indipendenti e dipendenti
        dal tempo; metodo WKB.


        Sistemi di particelle e teoria dello stato solido


        1. Indistinguibilità degli elettroni e principio di esclusione

        2. L’approssimazione adiabatica

        3. Vibrazioni reticolari nelle molecole e nei corpi solidi

        4. Statistiche quantiche

        5. Elettroni e lacune nei semiconduttori

        6. Teorema di Bloch

        7. Teorema della massa efficace

        8. Bande di energia nei semiconduttori


        Trasporto di carica nei semiconduttori


        1.Equazione di Boltzmann

        2. Equazioni di continuità nei semiconduttori

        3. Equazioni di trasporto nei semiconduttori


        Dispositivi a dimensione nanometrica


        1. Transistore simmetrico a due gate (DG-FET)

        2. Transistore silicio su isolante (SOI-FET)

        3. Transistore cilindrico a gate avvolgente (NW-FET)

        4. Transistore a nanostrati multipli (NS-FET)

        5. Transistore a effetto tunnel (T-FET)

        6. Transistori realizzati con materiali bidimensionali'
      Testi/Bibliografia: 'S. Datta: "Electronic Transport in Mesoscopic Systems",
