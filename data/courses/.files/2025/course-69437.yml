        riproducibili alla lavagna.
      Modalità di verifica e valutazione dell'apprendimento: La verifica dell'apprendimento
        dello studente avrà luogo mediante esame orale.
      Strumenti a supporto della didattica: Sono suggeriti libri di testo e sono distribuiti
        appunti a cura del docente.
