syllabus:
  it:
    title: 2025/2026 TECNOLOGIE INFORMATICHE PER LA MODA (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le conoscenze necessarie ad applicare le tecnologie informatica al contesto
        della moda. Acquisisce abilità di utilizzo di piattaforme volte allo sviluppo
        di attività di ufficio e di comunicazione basate sulle moderne tecnologie.
        Impara ad interagire con specialisti informatici, al fine di tradurre le idee
        in concrete implementazioni software.
      Contenuti: '- Definire l''Information Technology (Cap 1)

        - Il Funzionamento delle Reti (Cap 2);

        - HTML (Cap 3)

        - Trovare Informazioni sul Web (Cap 4)

        - La rappresentazione dell''Informazione (Cap 5)

        - Rappresentare l''Informazione Multimediale (Cap 6)

        - Pensare in modo algoritmico (Cap 8)

        - Implicazioni Sociali dell''Information Technology (Cap 9)

        - Privacy e Sicurezza Digitale (Cap 10)

        - Ore di laboratorio che verteranno sulle tecnologie e piattaforme HTML, A-Frame,
        Glitch, WIX/WEEBLY, Excel, SEO per applicazioni al settore della moda.

        - Brevi cenni a software di modellazione 3D (Clo3D e Style3D).

        - Brevi cenni all''Artificial Intelligence, Virtual Reality e Augmented Reality.'
      Testi/Bibliografia: 'I libri di testo consigliati per il corso sono:


        "Fluency - Conoscere e usare l''informatica", di Lawrence Snyder e Alessandro
        Amoroso, Pearson, (i capitoli indicati si riferiscono alla settima edizione
        del testo).


        Le slide del corso e tutto il materiale relativo alle attività di laboratorio
        sono rese disponibili sulla piattaforma Virtuale.'
      Metodi didattici: Lezioni frontali ed esercitazioni di laboratorio riguardanti
        l'implementazione di un sito web (mediante piattaforme WIX/WEEBLY) e la creazione
        di un ambiente virtuale (mediante libreria A-Frame).
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica delle conoscenze
        apprese dallo studente é basata su:


        (a) un esame scritto a risposte multiple che verte sugli argomenti del libro
        di testo trattati in classe con domande che mirano alla verifica dell''apprendimento
        di nozioni base dell''informatica, oltre che di comprenderne il linguaggio
        specialistico (50% dell''esito finale);


        (b) un progetto (50% dell''esito finale). Il progetto richiede la realizzazione
        o di una interfaccia web o di un ambiente virtuale 3D seguendo le specifiche
        (disponibili alla pagina Virtuale associata al corso) fornite dal docente
        durante lo svolgimento delle ore di laboratorio


        Nota: Previo parere favorevole del docente, il progetto di cui al punto (b)
        che prevede la realizzazione di un''interfaccia web, può essere sostituito
        con un altro progetto legato alle tematiche sviluppate durante il corso e
        di maggior interesse per lo studente. Gli studenti interessati dovranno concordare
        con il docente il nuovo progetto durante il corso o, in ogni caso, almeno
        un mese prima di sostenere la prova d''esame.


        Nota: Gli studenti con disturbi specifici dell''apprendimento (DSA) e/o disabilità
        temporanee o permanenti sono pregati di contattare il prima possibile l’ufficio
        competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        ) affinché possano proporre eventuali misure compensative adeguate. La richiesta
        di adattamento deve essere presentata con anticipo (almeno 15 giorni prima
        della data dell’esame) al docente, il quale valuterà l’appropriatezza degli
        adattamenti proposti, tenendo conto degli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Sulla piattaforma Virtuale saranno rese
        disponibili le slide del corso e tutto il materiale relativo alle esercitazioni
        laboratoriali.

        I vari tool utilizzati durante le attività di laboratorio sono gratuiti e
        disponibili online.'
      Orario di ricevimento: Consulta il sito web di Pasquale Cascarano (https://www.unibo.it/sitoweb/pasquale.cascarano2)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Partnership
        per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Informatic Tecnologies for Fashion (1) — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student has the necessary knowledge
        to apply computer technologies to the context of fashion. The student acquires
        the skills required to use state of the art platforms aimed at developing
        office and communication activities. The student learns to interact with IT
        specialists in order to translate ideas into concrete software implementations.
      Course contents: '- Define Information Technology (Chapter 1)

        - How Networks Work (Chapter 2)

        - HTML (Chapter 3)

        - Finding Information on the Web (Chapter 4)

        - The Representation of Information (Chapter 5)

        - Representing Multimedia Information (Chapter 6)

        - Thinking Algorithmically (Chapter 8)

        - Social Implications of Information Technology (Chapter 9)

        - Digital Privacy and Security (Chapter 10)

        - Laboratory sessions will focus on technologies and platforms such as HTML,
        A-Frame, Glitch, WIX/WEEBLY, Excel, and SEO, with applications in the fashion
        sector.

        - Brief overview of 3D modeling software (Clo3D and Style3D).

        - Brief overview of Artificial Intelligence, Virtual Reality, and Augmented
        Reality.'
      Readings/Bibliography: 'Recommended textbook:


        "Fluency - Conoscere e usare l''informatica", Lawrence Snyder e Alessandro
        Amoroso, Pearson. (The chapters indicated refer to the seventh edition of
        the textbook).


        The course slides and all materials related to the laboratory activities are
        made available on the Virtuale platform.'
      Teaching methods: Lectures and laboratory exercises focused on the implementation
        of a website (using WIX/WEEBLY platforms) and the creation of a virtual environment
        (using the A-Frame library).
      Assessment methods: 'Student assessment is based on:


        (a) a written test (multiple choice) covering the textbook material discussed
        in class, with the aim of verifying how the student masters basic computer
        science concepts and terminology (50% of credit);


        (b) a project (50% of credit). The project includes the implementation of
        a web project or a virtual environment, following the instructions provided
        during lab hours (the file describing the requirements is available on the
        Virtuale platform pages associated with the course).


        Note: Subject to the favorable opinion of the teacher, the project mentioned
        in point (b), which involves the creation of a web interface, can be replaced
        with another project related to the topics covered during the course and of
        greater interest to the student. Interested students must coordinate with
        the teacher on the new project during the course or, in any case, before taking
        the exam.


        Note: Students with learning disorders and/or temporary or permanent disabilities:
        Please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        as soon as possible so that they can propose acceptable adjustments. The request
        for adaptation must be submitted in advance (15 days before the exam date)
        to the lecturer, who will assess the appropriateness of the adjustments, taking
        into account the teaching objectives.'
      Teaching tools: 'The course slides and all materials related to the laboratory
        exercises will be made available on the Virtuale platform.

        All tools used during the laboratory activities are free and available online.'
      Office hours: See the website of Pasquale Cascarano (https://www.unibo.it/sitoweb/pasquale.cascarano2/en)
      SDGs: 'Quality education Decent work and economic growth Partnerships for the
        goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
