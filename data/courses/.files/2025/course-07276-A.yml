syllabus:
  it:
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo Studente conosce
        gli elementi hardware e software che compongono un calcolatore e i relativi
        principi di funzionamento, ha conoscenza delle reti informatiche e delle loro
        applicazioni, ha un approfondimento delle conoscenze pratiche dei software
        Word, Excel e Powerpoint
      Contenuti: 'Introduzione all’Informatica e sua evoluzione:


        - cenni storici e nascita di Internet;

        - introduzione all’Intelligenza Artificiale e sue applicazioni in Medicina.


        Rappresentazione delle informazioni:


        - Codifica di numeri e sistemi di numerazione;

        - Le quattro operazioni in base binaria;

        - Codifica digitale di testi e immagini;


        Struttura HW e SW di un elaboratore;


        Algebra booleana;


        Programmazione e Algoritmi;


        Approfondimenti su strumenti di utilità personale (Microsoft Word/Excel/PowerPoint);
        gestione dei dati della ricerca (protezione dei dati personali; protezione
        file).


        Parte riservata al CdL Tecniche Ortopediche:


        Tecnologie per la modellazione 3D delle strutture anatomiche;


        Tecnologie e materiali per la stampa additiva in medicina;


        Software di segmentazione e modellazione 3D in ambito medicale.


        Sessioni pratiche di progettazione 3D di dispositivi personalizzati (ESERCITAZIONI
        Lab. Informatico)'
      Testi/Bibliografia: Slides del corso messe a disposizione dal docente sulle
        piattaforme di Ateneo
      Metodi didattici: Lezioni frontali con ausilio di Power Point e di video. Metodi
        interattivi/esercitazioni per favorire la partecipazione attiva degli studenti.
      Modalità di verifica e valutazione dell'apprendimento: 'L’iscrizione all’appello
        avviene obbligatoriamente tramite Alma Esami.


        La prova finale consiste in un esame scritto costituito da 16 domande a risposta
        multipla, ciascuna del valore di 2 punti, ad eccezione di una domanda dal
        valore di 1 punto, per un punteggio massimo complessivo di 31. Il punteggio
        di 31/31 corrisponde all’attribuzione del voto di 30 e lode.


        Le domande riguardano gli argomenti trattati nel programma del corso e sono
        finalizzate a verificare:


        - la conoscenza e comprensione dei contenuti fondamentali;

        - la capacità di applicare le conoscenze acquisite per la risoluzione di problemi/esercizi
        pratici.


        L’esame si considera superato con un punteggio pari o superiore a 18/31.

        Il punteggio finale sarà espresso in trentesimi (+lode) e integrato, nel calcolo
        complessivo del Corso Integrato (FISICA, STATISTICA E INFORMATICA), mediante
        media matematica ponderata in base ai crediti formativi di ciascun modulo.


        Gradazione del voto finale


        - 18–19/31→ Conoscenza sufficiente dei principali argomenti del corso (riposte
        corrette: 9-10/16)

        - 20–24/31 → Buona conoscenza dei contenuti (riposte corrette: 10-12/16)

        - 25–28/31 → Conoscenza ampia e articolata della materia (riposte corrette:
        tra 13-14/16).

        - 29–31/31→ Preparazione completa e approfondita (risposte corrette: 15-16/16).'
      Strumenti a supporto della didattica: 'Durante le lezioni verranno fatte proiezioni
        con Power Point e proiezioni di video didattici. Verranno messe a disposizione
        anche postazioni informatiche di Ateneo per esercitazioni al calcolatore con
        software di modellazione 3D.


        I materiali didattici ritenuti utili ai fini della preparazione ed integrativi
        verranno messi in rete sulle piattaforme di Ateneo oppure sono disponibili
        presso il docente


        Gli studenti con disturbi dell''apprendimento e disabilità temporanee o permanenti
        sono invitati a contattare l''ufficio dedicato (https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti)
        il più presto possibile in modo da poter convenire sulle opportune misure
        compensative. La richiesta deve essere presentata in anticipo (15 giorni prima
        della data dell''esame) al docente, che valuterà l''adeguatezza delle misure
        tenendo conto degli obiettivi didattici.'
      Orario di ricevimento: Consulta il sito web di Laura Cercenelli (https://www.unibo.it/sitoweb/laura.cercenelli)
  en:
    title: 2025/2026 Computer Science — University of Bologna
    contents:
      Learning outcomes: At the end of the module the student has the basic knowledge
        on the following topics:systems of numeration, the four operations in binary
        basis. Elements of Boolean algebra and logical functions. The HW structure
        of a computer (CPU internal memory, mass memory, IO peripherals) and the SW
        (operating system and programs/apps). Basic principles of algorithms and programmimg.
        The student will also acquire knowledge of the main digital formats for images
        and 3D modeling software for medical applications.
      Course contents: 'Introduction to Computer Science (CS) and its evolution:


        - CS history and birth of Internet;

        - introduction to Artificial Intelligence and its applications in Medicine


        Representation of the Information:


        - Encoding of numbers and numbering systems;

        - The four operations in binary basis

        - Digital coding of texts and images;


        HW and SW structure of a computer;


        Boolean algebra;


        Programming and Algorithms;


        Insights on personal utility tools (Microsoft Word/Excel/PowerPoint) (EXERCISE
        IT Lab.); Research data management (personal data protection; file protection).


        Section reserved to CdL Orthopedic Techniques:


        Technologies for 3D modeling of anatomical structures;


        Technologies and materials for additive printing in medicine;


        Segmentation and 3D modeling software in the medical field;


        Practical sessions of 3D design of customized devices (EXERCISES Computer
        Lab)'
      Readings/Bibliography: Course presentation slides uploaded by the professor
        to the university platforms
      Teaching methods: Lectures supported by PowerPoint and videos. Interactive methods
        and exercises to encourage active student participation.
      Assessment methods: 'Enrollment for the exam session is mandatory through AlmaEsami.
        The final assessment consists of a written exam made up of 16 multiple-choice
        questions, each worth 2 points, except for one question worth 1 point, for
        a maximum total score of 31. A score of 31/31 corresponds to a grade of 30
        cum laude.


        The questions cover the topics included in the course program and are designed
        to assess:


        - the knowledge and understanding of the fundamental content;

        - the capacity to use the acquired knowledge to address practical tasks and
        problem-solving exercises


        The exam is considered passed with a score of 18/31 or higher.

        The final score will be expressed on a 30-point scale (cum laude) and will
        be integrated into the overall calculation of the Integrated Course (PHYSICS,
        STATISTICS, AND COMPUTER SCIENCE) using a weighted arithmetic average based
        on the credits of each module.


        Final grade scale


        - 18–19/31 → Sufficient knowledge of the main course topics (correct answers:
        9–10/16)

        - 20–24/31 → Good knowledge of the contents (correct answers: 10–12/16)

        - 25–28/31 → Broad and thorough knowledge of the subject (correct answers:
        13–14/16)

        - 29–31/31 → Complete and in-depth preparation (correct answers: 15–16/16)'
      Teaching tools: 'During the lectures, PowerPoint presentations and educational
        videos will be projected.

        University computer workstations will also be made available for practical
        exercises using 3D modeling software.


        Teaching materials considered useful for exam preparation or as supplementary
        resources will be uploaded to the university platforms or can be obtained
        directly from the professor.


        Students with learning disabilities or temporary/permanent impairments are
        invited to contact the dedicated office (https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        ) as early as possible in order to agree on appropriate compensatory measures.

        The request must be submitted to the professor in advance (at least 15 days
        before the exam date), who will assess the suitability of the measures in
        light of the learning objectives'
      Office hours: See the website of Laura Cercenelli (https://www.unibo.it/sitoweb/laura.cercenelli/en)
