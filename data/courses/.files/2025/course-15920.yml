syllabus:
  it:
    title: 2025/2026 LABORATORIO INFORMATICO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente possiede
        conoscenze generali sulle

        Scienze Computazionali.

        Conosce concetti relativi ad algoritmi, metodi e strumenti di base per il

        Calcolo Scientifico e li applica alla classificazione di semplici

        problemi, collegati alle sue attivita'' di studio e lavorative.

        E'' in grado di valutare l''efficienza di semplici programmi applicativi,

        in particolare per la gestione di testi ed ipertesti e per la

        manipolazione di immagini mediche.

        Sa sviluppare un approccio informatico di base per la soluzione di

        semplici problemi, che intervengano nella sua preparazione accademica e

        professionale.

        Sa interpretare correttamente i risultati ottenuti dall''impiego di

        semplici programmi applicativi, utili allo svolgimento delle sue

        attivita'', sia di studio che lavorative.'
      Contenuti: '- Software di produttività individuale: fogli elettronici (excel
        e google fogli), database (cenni).'
      Testi/Bibliografia: Teacher's notes and any recent text relating to the certification
        of IT skills (ECDL, EIPASS 7 user modules, etc.)
      Metodi didattici: 'Didattica frontale.


        Metodi didattici partecipativi.


        Esercitazioni pratiche al PC (anche volte in gruppo).


        Learning by doing.


        Cooperative Learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'scritto/pratico (al
        PC) (quiz a risposta multipla)


        Il test scritto che si svolgerà al PC, consta di 16 domanda a risposta chiusa
        (multiple choice).


        Ogni risposta esatta darà 2 punti.


        La somma dei punti darà il voto finale.


        Il punteggio di 32 corrisponde a 30 e Lode, mentre la sufficienza si otterrà
        con 18/30.


        Il test è volto a verificare le competenze apprese durante il corso, in termini
        di conoscenze specifiche degli argomenti trattati, abilità e competenze da
        dimostrare sugli argomenti oggetto del corso.'
      Strumenti a supporto della didattica: 'Proiezione di diapositive


        Esercitazioni su excel.


        Le diapositive del corso sono accessibili sul sistema VIRTUALE.


        Gli studenti con certificazioni per DSA o disabilità possono richiedere le
        misure compensative assegnate dal Servizio di Ateneo contattando i docenti
        almeno 15 giorni prima dell’esame. Informazioni più dettagliate al riguardo
        sono disponibili alla pagina del Servizio Studenti con DSA e disabilità di
        Ateneo [https://site.unibo.it/studenti-con-disabilita-e-dsa/it] . Per informazioni,
        è possibile contattare anche la referente per il Dipartimento di Scienze Mediche
        Veterinaria, dott.ssa Fabiana Trombetti (fabiana.trombetti@unibo.it)'
      Orario di ricevimento: Consulta il sito web di Alessandro Gesuato (https://www.unibo.it/sitoweb/alessandro.gesuato2)
      SDGs: 'Salute e benessere Istruzione di qualità Lavoro dignitoso e crescita
        economica Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Computer Lab — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student will have general knowledge
        of Computational Sciences. He knows concepts relating to algorithms, methods
        and basic tools for Scientific Computing and applies them to the classification
        of simple problems, connected to his study and work activities. He is able
        to evaluate the efficiency of simple application programs, in particular for
        the management of texts and hypertexts and for the manipulation of medical
        images. He knows how to develop a basic IT approach for the solution of simple
        problems, which contribute to his academic and professional preparation. He
        knows how to correctly interpret the results obtained from the use of simple
        application programs, useful for carrying out his activities, both study and
        work.
      Course contents: 'Individual productivity software: spreadsheets (Excel and
        Google Sheets), databases (outlines).'
      Readings/Bibliography: Teacher's notes and any recent text relating to the certification
        of IT skills (ECDL, EIPASS 7 user modules, etc.)
      Teaching methods: 'Frontal teaching.


        Participatory teaching methods.


        Practical exercises on the PC (also sometimes in groups).


        Learning by doing.


        Cooperative Learning.'
      Assessment methods: 'written/practical (on PC) (multiple choice quiz)


        The written test that will be held on the PC, consists of 16 closed-ended
        questions (multiple choice).


        Each correct answer will give 2 points.


        The sum of the points will give the final grade.


        The score of 32 corresponds to 30 cum laude, while the pass mark will be obtained
        with 18/30.


        The test is aimed at verifying the skills learned during the course, in terms
        of specific knowledge of the topics covered, skills and competences to be
        demonstrated on the topics covered in the course.'
      Teaching tools: 'Slide show


        Excel exercises.


        The course slides are accessible on the VIRTUAL system.


        Students with certifications for DSA or disabilities can request the compensatory
        measures assigned by the University Service by contacting the professors at
        least 15 days before the exam. More detailed information on this subject is
        available on the page of the Student Service with DSA and disabilities of
        the University [https://site.unibo.it/studenti-con-disabilita-e-dsa/it]. For
        information, you can also contact the contact person for the Department of
        Veterinary Medical Sciences, Dr. Fabiana Trombetti (fabiana.trombetti@unibo.it)'
      Office hours: See the website of Alessandro Gesuato (https://www.unibo.it/sitoweb/alessandro.gesuato2/en)
      SDGs: 'Good health and well-being Quality education Decent work and economic
        growth Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
