syllabus:
  it:
    title: 2025/2026 DATABASE SYSTEMS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The student learns the fundamental principles
        of the relational data model and of the relational database management systems.
        In particular, the student will be able to understand the structure of a relational
        database, the integrity constraints on data and the SQL query language. Moreover,
        the student gains an introductory background in NoSQL architectures and non-relational
        data models.
      Contenuti: '- Il modello relazionale; la struttura del modello relazionale,
        i vincoli di integrità, le forme normali.

        - Il linguaggio SQL: definizione e manipolazione dei dati, query SQL

        - Componenti principali di un RDBMS: Query Optimizer, Transaction Manager,
        Scheduler, Recovery Manager, Cache Manager, Storage Manager, Access Methods.

        - Progettazione di database relazionali: il modello E/R, introduzione all''analisi
        dei requisiti e alla progettazione concettuale di database. Progettazione
        logica di database. Tecniche di normalizzazione.

        - Breve introduzione ai sistemi NoSQL'
      Testi/Bibliografia: 'Le slide delle lezioni sono disponibili sulla piattaforma
        e-learning di Unibo.


        Ulteriori approfondimenti:


        P. Atzeni, S. Ceri, P. Fraternali, S. Paraboschi, R. Torlone. Database Systems:
        Concepts, Languages and Architectures, McGraw-Hill.


        R. Elmasri , S. B. Navathe. Fundamentals of Database Systems. Pearson.'
      Metodi didattici: 'Il corso è erogato mediante slides visualizzate durante le
        ore di lezione ed è integrato con esercitazioni guidate in aula e in laboratorio,
        dove vengono messi in pratica gli aspetti teorici.


        A causa dell''emergenza sanitaria parte delle lezioni potrà svolgersi online
        (Teams).


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: 'Per poter partecipare
        ad un appello d''esame, gli studenti devono registrarsi su Almaesami.


        L''esame si compone di due parti:


        1. Un progetto di laboratorio relativo alla progettazione e alla documentazione
        di un''applicazione di database o alla soluzione di alcuni esercizi assegnati.
        La consegna del progetto è condizione necessaria per sostenere la prova scritta.

        2. Prova scritta della durata di 120 minuti con esercizi e domande sugli argomenti
        del corso. La prova potrà essere svolta su carta oppure al computer. Durante
        la prova scritta non è consentita la consultazione di alcun tipo di materiale.


        I voti vengono assegnati in base a una valutazione complessiva delle conoscenze,
        competenze, capacità di presentazione e discussione delle tematiche trattate.
        I range di voti corrispondono possono essere descritti come segue:


        18-23: preparazione e capacità di analisi sufficienti ma relative ad un numero
        limitato di argomenti affrontati nel corso, utilizzo di un linguaggio complessivamente
        corretto;


        24-27: preparazione tecnicamente adeguata ma con alcuni limiti rispetto agli
        argomenti trattati, capacità di analisi buone, anche se non particolarmente
        articolate, espresse in un linguaggio corretto;


        28-30: ottima conoscenza di un ampio numero di temi affrontati nel corso,
        buone capacità di analisi e di critica, padronanza della terminologia specifica;


        30L: conoscenza eccellente e molto approfondita ed esaustiva dei temi affrontati
        nel corso, capacità di analisi critica e di collegamento, padronanza della
        terminologia specifica.'
      Strumenti a supporto della didattica: 'I materiali didattici proiettati in aula
        (slide, esempi di codice, esercizi e soluzioni) sono resi disponibili attraverso
        la piattaforma e-learning di Unibo.


        In laboratorio sono disponibili diversi RDBMS (SQL Server, Access, Oracle,
        MySQL). MySQL viene utilizzato per le esercitazioni di laboratorio. Sono inoltre
        disponibili alcuni strumenti di progettazione di database.'
      Orario di ricevimento: Consulta il sito web di Alessandra Lumini (https://www.unibo.it/sitoweb/alessandra.lumini)
  en:
    title: 2025/2026 Database Systems — University of Bologna
    contents:
      Learning outcomes: The student learns the fundamental principles of the relational
        data model and of the relational database management systems. In particular,
        the student will be able to understand the structure of a relational database,
        the integrity constraints on data and the SQL query language. Moreover, the
        student gains an introductory background in NoSQL architectures and non-relational
        data models.
      Course contents: '- The relational model; the structure of the relational model,
        integrity constrints, Normal forms.

        - The SQL language : Data definition and manipulation, Query databases

        - Main components of a RDBMS: Query Optimizer, Transaction Manager, Scheduler,
        Recovery Manager, Cache Manager, Storage Manager, Access Methods.

        - Relational database design: the Entity-Relationship model, introduction
        to requirement analysis and to conceptual database design. Logical database
        design. Normalization techniques.

        - Brief introduction to NoSQL Systems'
      Readings/Bibliography: 'Lecture slides are available at Unibo e-learning platform.


        Further reading:


        P. Atzeni, S. Ceri, P. Fraternali, S. Paraboschi, R. Torlone. Database Systems:
        Concepts, Languages and Architectures, McGraw-Hill.


        R. Elmasri , S. B. Navathe. Fundamentals of Database Systems. Pearson.'
      Teaching methods: 'The course is provided by means of slides displayed during
        lecture hours and it is integrated with guided class and laboratory exercises,
        where the theoretical aspects are put into practice.


        Due to health emergency part of the lectures may be held online (Teams).


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        on Health and Safety online'
      Assessment methods: 'In order to take part in an exam session, students must
        register on Almaesami.


        The examination consists of two parts:


        1. A laboratory project concerning either the design and documentation of
        a database application or the solution of some home assignments. The accomplishment
        of the project is necessary qualification for the examination.

        2. Written test (duration: 120 minutes) including exercises and questions
        on the course topics. The test can be taken either on paper or on a computer.
        Consulting any kind of material during the test is not allowed.


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        presentation and discussion skills of the topics covered. The ranges of grades
        correspond can be described as follows:


        18-23: the student has sufficient preparation and analytical skills, spread
        however, over just few topics taught in the course, the overall jargon is
        correct


        24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate analytical skills
        with the use of a correct jargon


        28-30: Great knowledge about most of the topics taught in the course, good
        critical and analytical skills, good usage of the specific jargon


        30L: excellent and in depth knowledge of all the topics in the course, excellent
        critical and analytical skills, excellent usage of specific jargon.'
      Teaching tools: 'Classroom lessons will be held using slides.


        Teaching materials (slides, code examples, exercises and solutions) are made
        avalaible to students through the Unibo e-learning platform.


        Several RDBMSs are available in the laboratory (SQL Server, Access, Oracle,
        MySQL). MySQL is used for the laboratory exercises. Moreover some database
        design tools are available.'
      Office hours: See the website of Alessandra Lumini (https://www.unibo.it/sitoweb/alessandra.lumini/en)
