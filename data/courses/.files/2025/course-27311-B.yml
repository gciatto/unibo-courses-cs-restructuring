syllabus:
  it:
    title: 2025/2026 INFORMATICA UMANISTICA (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente comprende
        il concetto di informazione e conosce i metodi della rappresentazione digitale
        e dei sistemi di elaborazione automatica dei dati nel campo delle discipline
        umanistiche; possiede conoscenze teoriche, capacità metodologiche e tecniche
        per rappresentare ed elaborare dati di natura umanistica.
      Contenuti: "Il corso guiderà lo studente nell'apprendimento dei principi che\n\
        stanno a fondamento della filiera produttiva di oggetti\ndigitali di àmbito\
        \ umanistico, con speciale attenzione al mondo\ndel Web. In particolare lo\
        \ studente acquisirà competenze relative\nal complesso processo di ideazione,\
        \ progettazione, realizzazione e pubblicazione di una risorsa digitale nei\
        \ termini di una raccolta di oggetti e relative descrizioni. In\nparticolare\
        \ saranno argomenti del corso i seguenti step di\nprocesso:\n\n- Fasi del\
        \ project management plan. Brief, benchmark,\n  documento di progetto, produzione,\
        \ sviluppo, testing,\n  promozione;\n- Principi della produzione. Codifica\
        \ dei caratteri e\n  formati, scrittura per il Web, usabilità dei contenuti,\
        \ architettura\n  della pagina, testo e media;\n- Ideare visualmente. Mappe\
        \ concettuali, strutturali, wireframes e mockups;\n- Fondamenti della progettazione\
        \ d'interfaccia. Browsing categoriale, filtri, faccette, posizionamento, layout\
        \ responsive;\n- Linguaggi del Web. Markup HTML5, fogli di stile CSS, fondamenti\
        \ di Javascript;\n- Sistemi di disseminazione. Frameworks per la\n  distribuzione\
        \ Web (e.g. HTML5 BoilerPlate e Bootstrap);\n- La pubblicazione dei dati.\
        \ I sistemi di Web hosting (e.g. Github);\n- Verso l'arricchimento. Tools\
        \ e utilities per lo sviluppatore."
      Testi/Bibliografia: "Il manuale di riferimento per le questioni teoriche è:\
        \ F. Tomasi, Metodologie informatiche e discipline umanistiche, Carocci,\n\
        Roma 2008, in particolare i capitoli 1, 2, 3, 4 e 5. Si consiglia di leggere\
        \ i capitoli del testo PRIMA dell'avvio delle lezioni.\n\nGli studenti sono\
        \ invitati anche a cercare in autonomia nei repertori su Web (per\nesempio\
        \ OPAC SBN, ACNP, risorse elettroniche d'Ateneo -\nsezione libri e periodici\
        \ -, ma anche Google) risorse utili\nrispetto alle keyword che emergeranno\
        \ durante il corso. I domini su cui si concentrerà il corso sono:\n\n- editoria\
        \ ed ebooks - concetto di formato, di\n  medium e piattaforme utilizzate per\
        \ la disseminazione;\n- ambienti di aggregazione per i beni culturali -\n\
        \  accesso lato utente: filtri e faccette, sistemi di\n  metadatazione;\n\
        - biblioteche - query, ambienti, metadati, linguaggi di\n  markup;\n- archivi\
        \ storici - piattaforme per la preservazione e\n  l'interoperabilità;\n- gallerie\
        \ e musei - strumenti di accesso,\n  interazione lato utente;\n- edizioni\
        \ di testi - linguaggi di annotazione e\n  interfaccia utente;\n- riviste\
        \ elettroniche - ambienti, piattaforme per la\n  preservazione e metadati\
        \ descrittivi e gestionali.\n\nLe risorse, che verranno proposte dagli studenti,\
        \ saranno discusse\ndurante il corso e rese disponibili, assieme alle slide\
        \ del corso, su Virtuale.\n\nGli studenti sono tenuti anche alla lettura dei\
        \ capitoli 1 e 6 del volume: Francesca Tomasi, Organizzare la conoscenza:\
        \ Digital Humanities e Web semantico. Un percorso tra archivi, biblioteche\
        \ e musei, Milano, Editrice Bibliografica, 2022."
      Metodi didattici: 'Le lezioni avranno carattere teorico e pratico, con presentazione

        di esempi in linea ed esercitazioni di laboratorio.

        L''attività pratica di laboratorio dovrebbe dotare lo

        studente delle abilità necessarie alla gestione e alla produzione

        di risorse digitali di àmbito umanistico.'
      Modalità di verifica e valutazione dell'apprendimento: 'Lo studente è chiamato
        a progettare una risorsa Web in uno dei seguenti àmbiti: patrimonio culturale
        (archivistico, bibliotecario o museale) come dominio; rivista, edizione di
        un testo, biblioteca digitale come tipologia di risorsa.


        Una volta scelto dominio e tipologia è chiesto allo studente di ideare una
        risorsa (p.e. una rivista di archivistica, una biblioteca digitale di oggetti
        museali, l’edizione di un testo in volume conservato presso una biblioteca),
        basandosi anche su quanto esiste già (e che verrà presentato durante il corso);
        progettare la risorsa attraverso un piano organico (project management plan);
        realizzare alcune pagine Web: almeno la home del progetto, la raccolta degli
        oggetti coinvolti nel progetto, un singolo oggetto descritto e la pagina che
        conterrà la documentazione descrittiva.


        Il progetto andrà riversato su un sistema di hosting (idealmente Github) e
        presentato oralmente il giorno dell’esame.


        Gli studenti che NON provengono da un corso di studi umanistico saranno anche
        interrogati sui contenuti del corso (e in particolare sui capitoli dei due
        manuali di riferimento menzionati nella sezione Testi/Bibliografia).


        La valutazione del lavoro si baserà sui seguenti parametri:


        IDEAZIONE del piano progettuale. Adeguatezza dell’ideazione attraverso appropriata
        concettualizzazione; qualità dello schema logico delle dipendenze; efficacia
        delle scelte architetturali; qualità delle soluzioni adottate per l’efficacia
        comunicativa a livello di interfaccia utente e per la disseminazione; adeguatezza
        delle soluzioni per l''arricchimento.


        PROGETTAZIONE della risorsa. Qualità del project management plan in base a:
        esaustività dei punti della progettazione; completezza delle singole voci
        di progetto; correttezza tecnica del piano proposto; capacità di descrizione
        del progetto attraverso un lessico specialistico.


        REALIZZAZIONE del progetto Web. Adeguatezza delle soluzioni proposte; usabilità
        della risorsa realizzata; qualità del piano di preservazione ideato; efficacia
        delle strategie di arricchimento proposte e implementabili.


        Questi tre parametri verranno adottati per stabilire se la proposta realizzata
        è insufficiente (non rispetta nessuno dei tre parametri), sufficiente (rispetta
        solo uno/due parametri), buona (rispetta i tre parametri) o ottima (aggiunge
        ai tre parametri una capacità di rielaborazione personale).


        Gli studenti non frequentanti (è considerato frequentante lo studente che
        partecipa almeno al 75% delle lezioni) saranno esaminati anche sui contenuti
        dei due manuali di riferimento, che per i frequentanti sono solo un supporto
        alla preparazione del progetto finale.'
      Strumenti a supporto della didattica: 'Le lezioni si svolgeranno in aule attrezzate
        a laboratorio

        informatico con PC collegati in rete Intranet e Internet.


        Alle lezioni teoriche sarà sempre affiancata una parte

        pratica: utilizzo e analisi critica degli strumenti disponibili

        (siti Web, software specifici, linguaggi formali).


        Gli studenti e le studentesse che per ragioni dipendenti da disabilità o disturbi
        specifici dell’apprendimento (DSA) necessitino di strumenti compensativi o
        dispensativi devono innanzitutto prendere contatto con l''apposito ufficio:
        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti.'
      Orario di ricevimento: Consulta il sito web di Francesca Tomasi (https://www.unibo.it/sitoweb/francesca.tomasi)
  en:
    title: 2025/2026 Humanistic IT (1) — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student understands the concept
        of information and knows the methods of digital representation and the systems
        of automatic data processing in the field of humanities; he/she possesses
        theoretical knowledge, methodological skills and techniques to represent and
        process humanistic data.
      Course contents: "The course will guide the students in learning the principles\
        \ at\nthe basis of digital objects production in the humanistic domain,\n\
        expecially in a Web-oriented dimension. In particular the students\nwill acquire\
        \ skills related to the complex process of conception, design and implementation\
        \ of digital resources, choosing the most\nappropriate tools and languages,\
        \ respect to the ideal model to\nachieve. In particular the topics of the\
        \ course will be:\n\n- Project management plan (brief,\n  benchmark, project\
        \ document, production, development, testing,\n  promotion);\n- Production\
        \ principles. Character encoding and\n  format, writing, usability of content,\
        \ the architecture of the\n  page, text and multimedia;\n- Markup Languages.\
        \ XHTML, XML, HTML5, CSS;\n- Interface design. Produce a mockup Filters, facets,\
        \ positioning, responsive\n  layout;\n- Dissemination. Frameworks for Web\n\
        \  distribution (examples: Boilerplate and Bootstrap);\n- Enrichment. Some\
        \ tools for developpers."
      Readings/Bibliography: 'The reference manual is: F. Tomasi, Metodologie informatiche
        e

        discipline umanistiche, Carocci, Roma 2008, capp. 1, 2, 3, 4 e 5. The reading
        of the book is suggested BEFORE the starting of the classes.


        Other materials

        will be made available on Virtuale. Students are also asked to search Web
        resources that will be discussed during the

        lessons.


        Students are also required to read chapters 1 and 6 of the book: Francesca
        Tomasi, Organizzare la conoscenza: Digital Humanities e Web semantico. Un
        percorso tra archivi, biblioteche e musei, Milano, Editrice Bibliografica,
        2022.'
      Teaching methods: 'Lessons

        will be theoretical and practical, with presentation of examples online and

        laboratory.

        The practical activity of the laboratory should equip students with the skills

        needed to manage the production of digital

        resources in the

        humanities.'
      Assessment methods: 'The student is asked to design a Web resource in one of
        the following fields: cultural heritage (archive, library or museum) as the
        domain; journal, edition of a text, digital library as a type of resource.

        Once chosen both domain and type the student is asked to design a possible
        resource (e.g. an archival magazine, a digital library of museum objects,
        the edition of a text by volume kept at a library), considering what already
        exists (and which will be presented during the course); designing the resource
        through a comprehensive project management plan; create at least two Web pages:
        the homepage of the project and the page that will contain the descriptive
        documentation.

        The project will need to be uploaded on a hosting system and it will be presented
        during the exam day.


        The evaluation will be based on the following parameters:


        DESIGN of the project plan. Adequacy of the ideation through appropriate conceptualization;
        quality of the tree of dependencies; effectiveness of architectural choices;
        quality of the solutions adopted for the effective communication at the user
        interface level and for the dissemination; adequacy of the solutions for conservation
        and enhancement.

        DESIGN of the resource. The project management plan quality is based on: completeness
        of the plan; completeness of the individual project items; technical correctness
        of the proposed plan; use of a specialized lexicon.

        CREATION of the Web project. Adequacy of the proposed solutions; usability
        of the resource; quality of the preservation plan; effectiveness of enrichment
        strategies proposed and implemented.


        These three parameters will be taken to determine whether the proposal made
        is insufficient (does not meet any of the three parameters), sufficient (meets
        only one/two parameters), good (respects all the three parameters) or excellent
        (adds to the three parameters a personal elaboration capacity).


        Not attending students will be evaluated also on the knowledge related to
        the two reference book.'
      Teaching tools: 'Classes are held in classrooms equipped with computer lab with
        PCs

        connected to the intranet and Internet.

        Theory lessons will always be accompanied by a practical part:

        critical analysis and use of the tools available (Web sites,

        softwares, formal languages).


        Students who require specific services and adaptations to teaching activities
        due to a disability or specific learning disorders (SLD), must first contact
        the appropriate office: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students.'
      Office hours: See the website of Francesca Tomasi (https://www.unibo.it/sitoweb/francesca.tomasi/en)
