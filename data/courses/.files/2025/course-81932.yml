        of Big Data technologies and the respective challenges - Knows the available
        hardware and software architectures to handle Big Data - Knows the techniques
        to store the data, the programming languages and paradigms generally adopted
        in this kind of systems - Knows the design methodologies for the different
        kinds of applications in the area of Big Data - Acquires practical expertise
        in using the different technologies through laboratory and projects. In particular,
        the main technologies used in practical exercises will be NoSQL databases
        and the Hadoop platform: Hive, Spark, Tez, Dremel, Giraph, Storm, Mahout,
        and Open R'
