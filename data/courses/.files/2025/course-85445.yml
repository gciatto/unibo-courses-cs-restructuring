syllabus:
  it:
    title: 2025/2026 INFORMATION MODELING AND WEB TECHNOLOGIES (1) (LM) — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student knows
        the most important approaches to model information and data structures for
        permanent and robust storage and management. The student also knows the most
        recent technologies to create successful web resources (both information-oriented
        web sites and service-oriented web applications). The student is able to write
        documents ready to be published on the web, is able to design their visual
        aspects, is able to verify their correctness and universality, and is able
        to implement simple distributed applications on the web.
      Contenuti: 'The course discusses the following topics:


        1. From data to information: approaches to data structures and digital representation
        of data.

        2. Web fundamentals: VII level protocols, character encodings

        3. Basic web technologies: HTTP, URI, HTML, CSS, XML

        4. Client-side technologies for web applications: JavaScript, Ajax, JSON,
        JavaScript frameworks.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) immediately and agree with the teacher the most effective strategies for
        attending the lectures and preparing for the exam.'
      Testi/Bibliografia: Due to the rapid evolution of the topics of the course,
        there is no textbook that covers the whole course. Students therefore use
        the slides of the course and are directed to online resources for the necessities
        of the course and the deepening of the topics discussed.
      Metodi didattici: 'The course is composed of classroom lessons, exercises in
        the laboratory, and the implementation of a team project. The project is a
        web application using the most recent technologies for the web. Many class
        activities are hands-on experiences carried out in the lab (either using the
        lab''s computers or your own), therefore physical presence to classes is a
        definite advantage. The course can be carried out also remotely, with greater
        difficulty.


        In case you cannot attend in person, it is advised to contact the teacher
        and identify a personal progression with personalized topics and deadlines.'
      Modalità di verifica e valutazione dell'apprendimento: 'The exam is composed
        of two tests: a written examination (in presence, 50% of the final grade,
        20 questions, 75% multiple choice questions 25% open-ended questions, 2 hours
        in lab) and the presentation of a team project (in presence or online, 50%
        of the final grade, by appointment). Each test is evaluated to a grade slightly
        larger than 30, so that it is possible to compensate weaknesses in one test
        with excellence in the other. The individual assessment of the team project
        is focussed on assessing the correctness, completeness and interoperability
        of the team project, and more importantly on the contribution to the project
        by each individual student.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) in advance. The office will be responsible for proposing adaptations to
        interested students. Such adaptations must be submitted to the teacher for
        approval at least 15 days before the exam session. The teacher will also evaluate
        the adaptations regarding the training objectives of teaching.'
      Strumenti a supporto della didattica: We rely on the web site virtuale.unibo.it
        to contain slides, exercises, sample exam tests, details about the project
        and the results of the interactive activities carried out by the students
        during the implementation of the final project.
      Orario di ricevimento: Consulta il sito web di Fabio Vitali (https://www.unibo.it/sitoweb/fabio.vitali)
