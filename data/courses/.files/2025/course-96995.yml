  name: PROGRAMMABLE NETWORKING
integrated_course: ''
campus: Cesena
programme: Laurea Magistrale in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 PROGRAMMABLE NETWORKING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The student will learn the modern network
        programming and automation methodologies and the related enabling technologies.
        The student will learn how to use a platform for virtual network programming
        and automation in a cloud computing environment and a control plane for software
        defined networks. Moreover the student will learn how to use specific data
        models for the design and for the programming of network services, according
        to the current standards.
      Contenuti: 'Network Virtualization and cloud computing


        - Network virtualization: Linux namespaces, virtual bridges and virtual switches

        - Virtual networking in cloud computing: examples with Docker and OpenStack


        Software Defined Networking


        - SDN architecture

        - The OpenFlow protocol

        - Examples of SDN programming with OpenFlow


        Programming the data plane


        - The P4 language

        - Example of programming switches behavior with P4'
      Testi/Bibliografia: 'Jason Edelman, Scott S. Lowe, Matt Oswalt, "Network Programmability
        and Automation: Skills for the Next-Generation Network Engineer", O''Reilly
        Media; 1 edizione (31 marzo 2018)'
      Metodi didattici: Lectures and practical lab activities
      Modalità di verifica e valutazione dell'apprendimento: Practical exam, requiring
        to develop experiments on the topics covered during the course
      Strumenti a supporto della didattica: Slides and additional readings will be
        made available by the teacher on the Virtuale platform
      Orario di ricevimento: 'Consulta il sito web di Franco Callegati (https://www.unibo.it/sitoweb/franco.callegati)


        Consulta il sito web di Andrea Melis (https://www.unibo.it/sitoweb/a.melis)


        Consulta il sito web di Lorenzo Rinieri (https://www.unibo.it/sitoweb/lorenzo.rinieri)'
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
