syllabus:
  it:
    title: 2025/2026 BUSINESS INTELLIGENCE E BIG DATA M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Approfondire i temi del processo decisionale
        data-driven, introducendo le architetture della business intelligence classica,
        con particolare riferimento ai sistemi di data warehousing e alle metodologie
        per la loro progettazione. Affrontare inoltre in modo più ampio il tema della
        "data strategy" aziendale con particolare attenzione ai metodi, alle architetture
        e alle tecnologie proprie dei big data.
      Contenuti: "Prerequisiti/Propedeuticità consigliate\n\nL’allievo che accede\
        \ a questo insegnamento conosce i sistemi database e il modello relazionale.\
        \ Tali conoscenze sono acquisite, di norma, superando un esame di Basi di\
        \ Dati o Sistemi Informativi.\n\nTutte le lezioni saranno tenute in Italiano.\
        \ È quindi necessaria la comprensione della lingua italiana per seguire con\
        \ profitto il corso e per poter utilizzare il materiale didattico fornito.\n\
        \nProgramma: modulo BI\n\n- la BI nel sistema informativo aziendale\n- la\
        \ piramide della BI\n- introduzione al data warehousing\n- architetture\n\
        - tecniche di analisi dei dati: reportistica e OLAP\n- il ciclo di sviluppo\n\
        \  \n  1. analisi delle sorgenti dati\n  2. analisi dei requisiti\n  3. progettazione\
        \ concettuale\n  4. carico di lavoro e volume dati\n  5. progettazione logica\n\
        \  6. progettazione dell'ETL\n\nProgramma: modulo BD\n\n- (Big) Data Revolution\n\
        - Data Strategy & Data Governance\n- Data Platform & Cloud Data Platform\n\
        - Data Lake & Data Lakehouse\n- NoSQL Database\n- Hadoop Ecosytem & Spark\n\
        - Data Visualizations workshop\n  \n  1. Data Viz fundamentals\n  2. Tableau\
        \ hands-on\n- Casi di studio"
      Testi/Bibliografia: "- Lucidi del corso.\n- M. Golfarelli, Stefano Rizzi. Data\
        \ Warehouse: teoria e pratica della progettazione. McGraw-Hill, seconda edizione,\
        \ 2006.\n  Letture consigliate:\n- B. Devlin. Data warehouse: from architecture\
        \ to implementation. Addison-Wesley Longman, 1997.\n- W.H. Inmon. Building\
        \ the data warehouse. John Wiley & Sons, 1996.\n- M. Jarke, M. Lenzerini,\
        \ Y. Vassiliou, P. Vassiliadis. Fundamentals of data warehouse. Springer,\
        \ 2000.\n- R. Kimball, L. Reeves, M. Ross, W. Thornthwaite. The data warehouse\
        \ lifecycle toolkit. John Wiley & Sons, 1998.\n- P. Sadalage, M. Fowler. NoSQL\
        \ Distilled: A Brief Guide to the Emerging World of Polyglot Persistence.\
        \ Addison-Wesley, 2009.\n- T. White. Hadoop: The Definitive Guide, Storage\
        \ and Analysis at Internet Scale - 4th Edition. O'Reilly Media, 2015 (capitoli\
        \ suggeriti: 1,2,3,4,19)"
      Metodi didattici: '- La didattica frontale dei moduli consiste in lezioni ed
        esercitazioni in aula, svolte dal docente con l''ausilio di PC e proiettore.
        Eventuali lezioni online o in modalità mista saranno erogate utilizzando la
        piattaforma Teams.

        - Il programma sarà integrato da seminari tenuti da consulenti aziendali.

        - Esercitazioni di gruppo su lavagne collaborative virtuali


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio [https://elearning-sicurezza.unibo.it/], in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale mira
        ad accertare la conoscenza acquisita dallo studente relativamente ai contenuti
        specifici dei singoli moduli.


        La prova sarà unica per entrambi i moduli e durerà complessivamente 100 minuti,
        durante i quali è espressamente vietato consultare libri e appunti. La prima
        parte sarà a quiz (su EOL, 14/32 punti), sui contenuti teorici di entrambi
        i moduli, e durerà 25 minuti. La seconda parte (su carta, 75 minuti, 18/32
        punti) include un esercizio di progettazione concettuale e logica di data
        warehouse (per il modulo BI) e un insieme di quesiti in forma aperta su contenuti
        teorici e progettuali (per il modulo BD). L''esame può essere superato solo
        qualora la parte a quiz risulti sufficiente. Ulteriori dettagli potranno essere
        comunicati a lezione e nelle "note" abbinate agli appelli pubblicati su AlmaEsami.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite AlmaEsami,
        nel rispetto delle scadenze previste. Coloro che non riuscissero a iscriversi
        entro la data prevista, sono tenuti a comunicare tempestivamente (e comunque
        prima della chiusura ufficiale delle liste di iscrizione) il problema alla
        segreteria didattica. Sarà facoltà del docente ammetterli a sostenere la prova.
        Le prove relative ai due moduli componenti dell''insegnamento devono essere
        sostenute nel corso dello stesso appello. L''esame si intende superato con
        un punteggio di 18 su un totale di 32. Una volta pubblicato il risultato,
        ciascuno studente ha una settimana di tempo per comunicare via email al docente
        se intende rifiutare il voto conseguito. Sono ammessi massimo 2 rifiuti.


        Il superamento dell’esame sarà garantito agli studenti che dimostreranno capacità
        operativa in relazione alla conoscenza dei concetti chiave illustrati nell''insegnamento,
        alle capacità progettuali ed alla padronanza del linguaggio tecnico. Un punteggio
        più elevato sarà attribuito agli studenti che dimostreranno di aver compreso
        pienamente e saper utilizzare al meglio tutti i contenuti dell’insegnamento
        illustrandoli con capacità di linguaggio, risolvendo problemi anche complessi
        con buone attitudini progettuali.


        In conformità al Codice Etico di Ateneo, si richiamano gli studenti alla massima
        correttezza. È vietata ogni attività volta a modificare indebitamente l’esito
        delle prove (es. copiatura, plagio, accesso alle risorse didattiche online,
        ricorso a strumenti AI non autorizzati). Si segnala in particolare che il
        solo possesso di strumentazione o materiale non autorizzato durante la prova
        comporta l’annullamento immediato del compito e la segnalazione agli uffici
        competenti. I comportamenti che contravvengono a questo divieto possono dare
        corso a procedimenti disciplinari o a segnalazioni alle autorità competenti,
        se penalmente rilevanti; in quest’ultimo caso vi è il rischio che gli studenti
        coinvolti possano incorrere in procedimenti penali.'
      Strumenti a supporto della didattica: 'Materiale didattico scaricabile da Virtuale
        (https://virtuale.unibo.it/?lang=it).


        Piattaforma Teams per la didattica a distanza.


        Piattaforma Miro per le esercitazioni.'
      Orario di ricevimento: 'Consulta il sito web di Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi)


        Consulta il sito web di Federico Ravaldi (https://www.unibo.it/sitoweb/federico.ravaldi2)'
  en:
    title: 2025/2026 Business Intelligence and Big Data M — University of Bologna
    contents:
      Learning outcomes: Investigate the topics of data-driven decision making and
        introduce the architectures of classical business intelligence, with specific
        reference to data warehousing systems and to the methods for designing them.
        Discuss the theme of enterprise data strategy in a broader way, focusing on
        the methods, architectures, and technologies for big data.
      Course contents: "Requirements/Prior knowledge\n\nA prior knowledge and understanding\
        \ of database systems and relational model is required to attend with profit\
        \ this course. These notions are normally achieved by giving an exam of Databases\
        \ or Information Systems.\n\nFluent spoken and written Italian is a necessary\
        \ pre-requisite: all lectures and tutorials, and all study material will be\
        \ in Italian.\n\nCourse contents: BI module\n\n- the role of BI in the corporate\
        \ information system\n- the BI pyramid\n- introduction to data warehousing\n\
        - architectures\n- techniques for data analysis: reporting and OLAP\n- design\
        \ lifecycle\n\n1. data source analysis\n2. requirement analysis\n3. conceptual\
        \ design\n4. workload and data volume\n5. logical design\n6. ETL design\n\n\
        Course contents: BD module\n\n- (Big) Data Revolution\n- Data Strategy & Data\
        \ Governance\n- Data Platform & Cloud Data Platform\n- Data Lake & Data Lakehouse\n\
        - NoSQL Database\n- Hadoop Ecosytem & Spark\n- Data Visualizations workshop\n\
        \  \n  1. Data Viz fundamentals\n  2. Tableau hands-on\n- Case study"
      Readings/Bibliography: '- Course slides.

        - M. Golfarelli, Stefano Rizzi. Data Warehouse: teoria e pratica della progettazione.
        McGraw-Hill, seconda edizione, 2006.


        Recommended readings:


        - B. Devlin. Data warehouse: from architecture to implementation. Addison-Wesley
        Longman, 1997.

        - W.H. Inmon. Building the data warehouse. John Wiley & Sons, 1996.

        - M. Jarke, M. Lenzerini, Y. Vassiliou, P. Vassiliadis. Fundamentals of data
        warehouse. Springer, 2000.

        - R. Kimball, L. Reeves, M. Ross, W. Thornthwaite. The data warehouse lifecycle
        toolkit. John Wiley & Sons, 1998.

        - P. Sadalage, M. Fowler. NoSQL Distilled: A Brief Guide to the Emerging World
        of Polyglot Persistence. Addison-Wesley, 2009.

        - T. White. Hadoop: The Definitive Guide, Storage and Analysis at Internet
        Scale - 4th Edition. O''Reilly Media, 2015 (suggested chapters: 1,2,3,4,19)'
      Teaching methods: '- Classroom lectures and exercises are given with the help
        of slides (through PC+projector presentations). Lectures could be possibly
        delivered in online or mixed modality using the Teams platform.

        - The program will be integrated by lectures from enterprise consultants.

        - Group exercises on virtual collaborative blackboards.'
      Assessment methods: 'The final exam aims at verifying the knowledge acquired
        by the student with regard to the specific contents of each teaching module.


        There will be a single examination for both modules, and it will last 100
        minutes; during the examination, the student will not be allowed to consult
        books and written notes. The first part will be quiz-based (on EOL, 14/32
        points), concern the theoretical content of both modules, and take 25 minutes.
        The second part (on paper, 75 minutes, 18/32 points) includes an exercise
        on conceptual and logical design of data warehouses (BI module) and a set
        of open-answer questions on theoretical and design contents (BD module). Overall,
        the examination can be passed only if a sufficient grade is obtained in the
        quiz-based part. Further details may be communicated during the lectures and
        in the "notes" appearing in the exam sessions published on AlmaEsami.


        In order to take an exam, registration through AlmaEsami is required within
        the assigned deadlines. Students who won''t be able to register within the
        deadline are bound to promptly (and anyway before the official closing of
        the registration lists) notify the issue to the didactic secretariat. It will
        be the faculty of the teacher to admit them to the test. The tests of the
        two component modules must be taken in the same session.


        The exam is passed if it receives at least 18 points over 32. Once the outcome
        of a test has been published, each student is given a week to communicate
        via email to the teacher his/her intention to refuse the mark obtained. No
        more than 2 refusals are allowed.


        To obtain a passing grade, students are required to at least demonstrate knowledge
        of the key concepts of the subject, acquired autonomous design skills, and
        a comprehensible use of technical language. Higher grades will be awarded
        to students who demonstrate an organic understanding of the subject and a
        clear and concise presentation of the contents, a high ability for problem
        solving, and consistent design capabilities.'
      Teaching tools: 'Materials on the course topics are available on the Virtual
        (https://virtuale.unibo.it/?lang=en) platform.


        Teams platform for remote teaching.


        Miro platform for exercises.'
      Office hours: 'See the website of Stefano Rizzi (https://www.unibo.it/sitoweb/stefano.rizzi/en)


        See the website of Federico Ravaldi (https://www.unibo.it/sitoweb/federico.ravaldi2/en)'
