syllabus:
  it:
    title: 2025/2026 LINGUAGGI, COMPILATORI E MODELLI COMPUTAZIONALI — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente conosce:


        - gli aspetti fondamentali riguardanti la logica, gli automi, le espressioni
        regolari e le grammatiche

        - le tecniche di progettazione ed implementazione, tramite compilatori, dei
        linguaggi di programmazione

        - linguaggi, modelli e tecniche per la descrizione e verifica di proprietà
        dei sistemi software concorrenti e distribuiti.'
      Contenuti: 'Automi e linguaggi formali:


        - automi a stati finiti

        - espressioni regolari e loro relazione con gli automi a stati finiti

        - grammatiche libere dal contesto

        - automi a pila e loro relazione con le grammatiche libere dal contesto

        - macchine di Turing

        - linguaggi ricorsivi e ricorsivamente enumerabili e loro relazione con le
        macchine di Turing


        Logica di base:


        - logica proposizionale

        - logica dei predicati


        Compilatori:


        - analizzatori lessicali

        - analizzatori sintattici

        - controlli statici di programmi

        - generazione di codice


        Modelli computazionali:


        - sistemi di transizione per la modellazione del comportamento dei sistemi

        - logiche temporali per la specifica e verifica di proprietà dei sistemi

        - processi concorrenti a stati finiti con sincronizzazione e interleaving

        - reti di Petri'
      Testi/Bibliografia: 'Hopcroft, Motwani, Ullman. "Automi, Linguaggi e Calcolabilità",
        terza edizione. Addison-Wesley, 2009.


        Aho, Lam, Sethi, Ullman. "Compilatori: principi, tecniche e strumenti", seconda
        edizione. Addison-Wesley, 2009.


        Huth, Ryan. "Logic in Computer Science: Modelling and Reasoning about Systems",
        second edition. Cambridge University Press, 2004.'
      Metodi didattici: 'Modifica Metodi didattici Lezioni frontali con lavagna/PC/proiettore
        e esperienze in laboratorio.


        *In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/)*in modalità e-learning.


        Modifica Metodi didattici


        Lezioni frontali con lavagna/PC/proiettore e esperienze in laboratorio.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica finale prevede
        un esame scritto con due tipi di domande:


        - domande aventi lo scopo di verificare l''acquisizione delle competenze teoriche
        del corso;

        - esercizi aventi lo scopo di verificare la capacità di applicazione dei concetti
        teorici su semplici casi di studio.


        Una prova progettuale facoltativa addizionale, che può essere effettuata in
        gruppi di al massimo 4 studenti, permette la verifica delle abilità relative
        all''implementazione dei linguaggi di programmazione. Tale prova consiste
        nello sviluppo di un compilatore per un linguaggio funzionale object oriented.


        L''esame scritto consente di ottenere un voto massimo di 27 trentesimi che
        può essere incrementato (fino a 7 punti addizionali) tramite la prova progettuale.'
      Strumenti a supporto della didattica: Lavagna, PC, videoproiettore, laboratorio
        informatico.
      Orario di ricevimento: Consulta il sito web di Mario Bravetti (https://www.unibo.it/sitoweb/mario.bravetti)
  en:
    title: 2025/2026 Languages, Compilers and Computational Models — University of
      Bologna
    contents:
      Learning outcomes: 'At the end of the course the student knows:


        - foundational aspects of logics, automata, regular expressions and grammars

        - techniques for the design and implementation, via compilers, of programming
        languages

        - languages, models and techniques for the description and property verification
        of concurrent and distributed software systems.'
      Course contents: 'Automata and formal languages:


        - finite state automata

        - regular expressions and their relationship with finite state automata

        - context free grammars

        - pushdown automata and their relationship with context free grammars

        - Turing machines

        - recursive and recursively enumerable languages and their relationship with
        Turing machines


        Basic logic:


        - propositional logic

        - predicate logic


        Compilers:


        - lexical analyzers

        - syntactic analyzers

        - static program checking

        - code generation


        Computational models:


        - transition systems for the modeling of system behavior

        - temporal logics for property specification and verification

        - concurrent finite state processes with synchronization and interleaving

        - Petri nets'
      Readings/Bibliography: 'Hopcroft, Motwani, Ullman. "Automi, Linguaggi e Calcolabilità",
        terza edizione. Addison-Wesley, 2009.


        Aho, Lam, Sethi, Ullman. "Compilatori: principi, tecniche e strumenti", seconda
        edizione. Addison-Wesley, 2009.


        Huth, Ryan. "Logic in Computer Science: Modelling and Reasoning about Systems",
        second edition. Cambridge University Press, 2004.'
      Teaching methods: 'Lectures with whiteboard/PC/beamer and experiences in laboratory.


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety online (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas).'
      Assessment methods: 'The final examination is a written test with two kinds
        of questions:


        - theoretical questions aiming at the verification of the assessment of the
        theoretical concepts;

        - exercises aiming at the verification of the ability to apply the theoretical
        concepts on simple use-cases.


        An optional additional project, that can be performed in groups of at most
        4 students, is used to verify the ability of students to implement programming
        languages. Such a project consists in developing a compiler for a functional
        language with object orientation.


        The written test allows the student to obtain a maximum mark of 27 over 30,
        which can be incremented (up to 7 additional points) by means of the project.'
      Teaching tools: Whiteboard, PC, beamer, computer laboratory.
      Office hours: See the website of Mario Bravetti (https://www.unibo.it/sitoweb/mario.bravetti/en)
