  name: RELIABLE DATA PROCESSING AND STORAGE FOR INTELLIGENT SYSTEMS M
integrated_course: ''
campus: Bologna
programme: Laurea Magistrale in Ingegneria elettronica
syllabus:
  it:
    title: 2025/2026 RELIABLE DATA PROCESSING AND STORAGE FOR INTELLIGENT SYSTEMS
      M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Students will learn how to address the various
        issues related to the design of reliable data processing and storage for intelligent
        systems. These will range from evaluating the faults and aging phenomena that
        could occur during their fabrication and/or in-field operation, to analyzing
        the effects of such faults and aging phenomena and evaluating the related
        risks for the intelligent system intended operation, to designing them and
        their component blocks to guarantee robustness and/or tolerance of likely
        to occur faults and aging phenomena.
      Contenuti: "Introduzione ai Sistemi Intelligenti Affidabili\n\n- Definizioni\
        \ e motivazioni\n- Progettazione per aumentare l’affidabilità all'interno\
        \ del processo di progettazione e fabbricazione\n- Resa del processo e costo\
        \ di produzione di un circuito integrato\n\nGuasti Durante la Fabbricazione\
        \ e Durante il Funzionamento sul Campo\n\n- Guasti di tipo Stuck-St (SAs)\n\
        - Equivalenza di guasti e “Fault Collapsing”\n- Dominanza di guasti e “Fault\
        \ Collapsing”\n- Guasti di tipo Stuck-Open\n- Guasti di tipo Stuck-On\n- Guasti\
        \ di tipo Bridging resistivo\n- Guasti di tipo Delay\n- Guasti di tipo Crosstalk\n\
        - Guasti transitori\n- Guasti sugli array di memoria: Stuck-At; Transition;\
        \ Data Retention; Address Decoder\n\nVariazioni dei Parametri Durante la Fabbricazione\n\
        \n- Variazione delle dimensioni dei transistor\n- Variazione delle dimensioni\
        \ di interconnessioni\n- Variazione della soglia di conduzione\n- Accoppiamento\
        \ capacitivo e induttivo\n- Rumore sulla tensione di alimentazione\n\nFenomeni\
        \ di Invecchiamento Durante l'Operazione sul Campo\n\n- Negative Biased Temperature\
        \ Instability\n- Positive Biased Temperature Instability\n\nPrincipi di base\
        \ del Collaudo e della Progettazione Orientata al Collaudo (DFT)\n\n- Macchine\
        \ automatiche di collaudo (ATE)\n- Automatic Test Pattern Generation (ATPG)\n\
        - Algoritmi di ATPG per array di memoria\n- Full and Partial Scan\n- Built-In-Self\
        \ Test (BIST) per logica combinatoria\n- Built-In-Self Test (BIST) per memorie\n\
        \nApprocci di Caratterizzazione Post-Silicon per:\n\n- Variazioni dei parametri\n\
        - Speed binning\n- Power binning\n\nApprocci di Progettazione per Sistemi\
        \ Intelligenti Affidabili\n\n- Ridondanza Modulare:\n  \n  - Strategie di\
        \ base\n  - Realizzazioni e affidabilità del Voter\n  - Guasti di modo comune\
        \ e Design Diversity\n  - Diagnosi dei moduli guasti\n- On-Line Testing e\
        \ Recovery:\n  \n  - Duplicazione e confronto;\n  - Circuiti Self Checking:\n\
        \    \n    - Proprietà dei circuiti Self-Checking; ipotesi di guasto; progetto\
        \ di blocchi funzionali Self-Checking; progetto di Checkers; Error Indicators\n\
        \    - Codici a rivelazione d'errore: codici di parità (teoria e progetto\
        \ di Checker); codici Two-Rail (teoria e progetto di Checker); codici m-out-of-n;\
        \ codici di Berger (teoria e progetto di Checker)\n  - Tecniche di Recovery:\n\
        \    \n    - Roll Back and Retry; tecniche di riconfigurazione\n- Codici a\
        \ correzione d'errore:\n  \n  - Introduzione ai codici di tipo Linear Parity\
        \ Check;\n  - Codici di Hamming di tipo Single Error Correction;\n  - Codici\
        \ di Hsiao di tipo Single Error Correction/Double Error Detection;\n  - Circuiti\
        \ di codifica e decodifica\n- Approcci di progettazione robusta per:\n  \n\
        \  - Blocchi di logica combinatoria;\n  - Elementi di memoria\n- Approcci\
        \ di monitoraggio basati su:\n  \n  - Circuiti di monitoraggio\n  - Riutilizzo\
        \ di schemi di DFT e di caratterizzazione Post-Silicon\n\nIl corso comprende\
        \ esercitazioni di laboratorio su:\n\n- Emulazione di guasti e fenomeni di\
        \ invecchiamento, e analisi dei loro effetti\n- Progettazione di componenti\
        \ base di blocchi per l'elaborazione affidabile dei dati (hardware accelerators,\
        \ microprocessori) e di memoria per sistemi intelligenti e loro prototipazione\
        \ mediante FPGA"
      Testi/Bibliografia: 'J. Segura C. F. Hawkins, “CMOS Electronics – How It Works,
        How It Fails” IEEE Press – Wiley, 2004.


        M. L. Bushnell, V. D. Agrawal, “Essential of Electronic Testing”, Kluwer Academic
        Publishers, 2000


        M. Abramovici, M. A. Bruer, A. D. Friedman, “Digital Systems Testing and Testable
        Design”, Computer Science Press, 1990


        S. Mourad, Y. Zorian, “Principles of Testing Electronic Systems”, Essential
        of Electronic Testing”,Wiley, 2000


        N. K. Jha, S. Kundu, “Testing and Reliable Design of CMOS Circuits”, Kluwer
        Academic Publishers, 1990


        P. K. Lala, “Self-Checking and Fault Tolerant Digital Design”, Morgan Caufmann
        Publ, 2001'
      Metodi didattici: Lezioni frontali in aula e esercitazioni al calcolatore effettuate
        in laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: Esame orale. Le domande
        riguarderanno qualsiasi argomento trattato a lezione e in laboratorio. Potranno
        seguire domande specifiche volte a verificare la comprensione delle problematiche
        specifiche inerenti agli argomenti trattati nel corso. Il voto finale sarà
        formulato tenendo conto delle risposte fornite alle domande poste.
      Strumenti a supporto della didattica: PC, videoproiettore, diapositive Power
        Point.
      Orario di ricevimento: Consulta il sito web di Cecilia Metra (https://www.unibo.it/sitoweb/cecilia.metra)
  en:
    title: 2025/2026 Reliable Data Processing and Storage for Iintelligent Systems
      M — University of Bologna
    contents:
      Learning outcomes: Students will learn how to address the various issues related
        to the design of reliable data processing and storage for intelligent systems.
        These will range from evaluating the faults and aging phenomena that could
        occur during their fabrication and/or in-field operation, to analyzing the
        effects of such faults and aging phenomena and evaluating the related risks
        for the intelligent system intended operation, to designing them and their
        component blocks to guarantee robustness and/or tolerance of likely to occur
        faults and aging phenomena.
      Course contents: "Introduction to Reliable Intelligent Systems\n\n- Definitions\
        \ and motivations\n- Design for reliability within the design and fabrication\
        \ process\n- Yield and production cost\n\nFault****s occurring during Fabrication\
        \ and In-Field Operation\n\n- Stuck-At Faults (SAs)\n- Fault Equivalence and\
        \ Fault Collapsing\n- Fault Dominance and Fault Collapsing\n- Stuck-Open Faults\n\
        - Stuck-On Faults\n- Bridging Faults\n- Delay Faults\n- Crosstalk Faults\n\
        - Transient Faults\n- Faults possibly affecting memory arrays: stuck-at faults;\
        \ transition faults; data retention faults; address decoder faults\n\nParameter\
        \ Variations occurring during Fabrication\n\n- Variation of transistor sizes\n\
        - Variation of interconnect sizes\n- Variation of conductance threshold\n\
        - Capacitive and inductive coupling\n- Power supply noise\n\nAging Phenomena\
        \ occurring during In-Field Operation\n\n- Negative Biased Temperature Instability\n\
        - Positive Biased Temperature Instability\n\nBasic Principles of Test and\
        \ Design for Testability (DFT)\n\n- Automatic Test Equipment (ATE)\n- Automatic\
        \ Test Pattern Generation (ATPG)\n- Algorithms for Memory Arrays\n- Full and\
        \ Partial Scan\n- Built-In-Self Test (BIST) for Logic\n- Built-In-Self Test\
        \ (BIST) for Memory Arrays\n\nPost-Silicon Characterization Approaches for:\n\
        \n- Parameter variations\n- Speed binning\n- Power binning\n\nDesign Approaches\
        \ for Reliable Intelligent Systems\n\n- Modular Redundancy:\n  \n  - Basic\
        \ Strategy\n  - Voter Design and Reliability\n  - Common Mode Failures and\
        \ Design Diversity\n  - Detection of Faulty Modules\n- On-Line Testing and\
        \ Recovery:\n  \n  - Duplication and Comparison;\n  - Self Checking Circuits:\n\
        \    \n    - Required Properties; Assumptions; Design of Self Checking Functional\
        \ Blocks; Design of Checkers; Error Indicators\n    - Error Detecting Codes:\
        \ Parity Codes (Theory and Checker Design); Two-Rail Codes (Theory and Checker\
        \ Design); m-out-of-n codes; Berger Codes (Theory and Checker Design\n  -\
        \ Recovery Techniques:\n    \n    - Roll Back and Retry; Reconfiguration\n\
        - Error Correcting Codes:\n  \n  - Introduction to Linear Parity Check Codes;\n\
        \  - Single Error Correction Hamming Codes;\n  - Single Error Correction/Double\
        \ Error Detection Hsiao Codes;\n  - Encoding and Decoding Circuits\n- Robust\
        \ design approaches for:\n  \n  - Logic Blocks;\n  - Memory Elements\n- Monitoring\
        \ Approaches Based on:\n  \n  - Dedicated monitors\n  - Re-use of DFT and\
        \ post silicon characterization schemes\n\nThe course includes practice sessions\
        \ in laboratories on:\n\n- Emulation of faults and aging, phenomena, and analyses\
        \ of their effects\n- Design of basic components of blocks for reliable data\
        \ processing (hardware accelerators, microprocessors) and storage for intelligent\
        \ systems and their prototyping by means of FPGA"
      Readings/Bibliography: 'J. Segura C. F. Hawkins, “CMOS Electronics – How It
        Works, How It Fails” IEEE Press – Wiley, 2004.


        M. L. Bushnell, V. D. Agrawal, “Essential of Electronic Testing”, Kluwer Academic
        Publishers, 2000


        M. Abramovici, M. A. Bruer, A. D. Friedman, “Digital Systems Testing and Testable
        Design”, Computer Science Press, 1990


        S. Mourad, Y. Zorian, “Principles of Testing Electronic Systems”, Essential
        of Electronic Testing”,Wiley, 2000


        N. K. Jha, S. Kundu, “Testing and Reliable Design of CMOS Circuits”, Kluwer
        Academic Publishers, 1990


        P. K. Lala, “Self-Checking and Fault Tolerant Digital Design”, Morgan Caufmann
        Publ, 2001'
      Teaching methods: Lectures in the classroom and computer exercises performed
        in the laboratory.
      Assessment methods: Oral examination. Questions will cover any topic addressed
        in class and in the laboratory. Specific questions may follow aimed at verifying
        the understanding of specific issues inherent to the topics covered in the
        course. The final grade will be formulated based on the answers provided to
        the asked questions.
      Teaching tools: PC, projector, Power Point slides.
      Office hours: See the website of Cecilia Metra (https://www.unibo.it/sitoweb/cecilia.metra/en)
