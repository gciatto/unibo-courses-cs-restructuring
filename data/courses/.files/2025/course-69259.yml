syllabus:
  it:
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente conosce
        i concetti di base del trattamento digitale dell''informazione, con particolare
        riguardo all''organizzazione del calcolatore e delle reti, alle basi di dati
        (specialmente quelle geografiche), alla grafica digitale.

        Lo studente è in grado di:


        - applicare i concetti di base della cartografia tradizionale nel loro passaggio
        ed applicazione alla cartografia numerica;

        - saper gestire semplici applicazioni di cartografia numerica e georeferenziare
        elementi raster e vettoriali.'
      Contenuti: '- Il modulo di Informatica si compone di due parti. La prima è un''introduzione
        all''Informatica, con particolare enfasi su codifica ed elaborazione dell''informazione.
        La seconda prevede un''attività di laboratorio su raccolta e analisi di dati,
        e sviluppo di un''applicazione server-side.

        - Nel modulo di Cartografia Numerica si affronteranno i concetti fondamentali
        della cartografia con particolare riferimento agli aspetti numerici e informatici.
        Verranno trattati i principi di base della cartografia, come proiezioni cartografiche,
        sistemi di coordinate e rappresentazione dei dati geografici. Inoltre parte
        del corso riguarderà l’introduzione alla cartografia numerica e ai GIS, con
        particolare riguardo verso gli strumenti informatici specifici per importare,
        creare, gestire ed analizzare dati geografici.'
      Testi/Bibliografia: '- Luca Mari, Giacomo Buonanno, Donatella Sciuto Informatica
        e cultura dell''informazione (seconda edizione) McGraw-Hill, 2013. ISBN: 978-88-386-6576-9

        - Elvio Lavagna, Guido Locarno, Geocartografia - Guida alla lettura delle
        carte geotopografiche, Zanichelli,2007

        - Mario Boffi, Scienza dell''informazione geografica. Introduzione ai GIS,
        Zanichelli, 2004'
      Metodi didattici: Lezioni Frontali ed Esercitazioni.
      Modalità di verifica e valutazione dell'apprendimento: '- La verifica dell''apprendimento
        sul modulo di Informatica avverrà in forma di esame scritto, con domande relative
        alla parte generale sull''Informatica. E'' richiesta inoltre la consegna di
        un''applicazione al termine dell''attività di laboratorio.

        - La verifica dell''apprendimento sul modulo di Cartografia Numerica avviene
        attraverso un esercizio di cartografia tradizionale e la realizzazione di
        una carta tematica attraverso sistemi GIS.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: PC in dotazione al dipartimento. È fortemente
        consigliato l’utilizzo di computer portatili personali.
      Orario di ricevimento: 'Consulta il sito web di Angelo Trotta (https://www.unibo.it/sitoweb/a.trotta)


        Consulta il sito web di


        Giuseppe Ciccarese'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Computer Science — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student knows the basic concepts
        of digital information processing, with particular focus to the organization
        of the computer and networks, databases (especially geographic ones), digital
        graphics. The student is able to: - apply the basic concepts of traditional
        cartography in their application to numerical cartography; - be able to manage
        simple numerical cartography applications and georeference raster and vector
        elements.'
      Course contents: '- The Informatics module consists of two parts. The first
        is an introduction to computer science, with particular emphasis on coding
        and information processing. The second involves a laboratory activity on data
        collection and analysis, and development of a server-side application.

        - In the Numerical Cartography module, the fundamental concepts of cartography
        will be addressed with particular reference to numerical and computer aspects.
        The basic principles of cartography will be covered, such as cartographic
        projections, coordinate systems, and representation of geographical data.
        Moreover, part of the course will involve an introduction to digital cartography
        and GIS, with particular attention towards specific computer tools to import,
        create, manage and analyze geographical data.'
      Readings/Bibliography: '- Luca Mari, Giacomo Buonanno, Donatella Sciuto Informatica
        e cultura dell''informazione (seconda edizione) McGraw-Hill, 2013. ISBN: 978-88-386-6576-9

        - Elvio Lavagna, Guido Locarno, Geocartografia - Guida alla lettura delle
        carte geotopografiche, Zanichelli,2007

        - Mario Boffi, Scienza dell''informazione geografica. Introduzione ai GIS,
        Zanichelli, 2004'
      Teaching methods: Frontal Lessons and Exercises.
      Assessment methods: "- The exam on the Informatics module will take place in\
        \ the form of a written exam, with questions relating to the general part\
        \ on Informatics. It is also required the delivery of an application at the\
        \ end of the laboratory activity.\n- The assessment of learning on the Numeric\
        \ Cartography module takes place through a traditional cartography exercise\
        \ and the creation of a thematic map using GIS systems.\n  Students with learning\
        \ disorders and\\or temporary or permanent disabilities: please, contact the\
        \ office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students\
        \ ) as soon as possible so that they can propose acceptable adjustments. The\
        \ request for adaptation must be submitted in advance (15 days before the\
        \ exam date) to the lecturer, who will assess the appropriateness of the adjustments,\
        \ taking into account the teaching objectives."
      Teaching tools: PCs are provided by the department. The use of personal laptops
        is strongly recommended.
      Office hours: 'See the website of Angelo Trotta (https://www.unibo.it/sitoweb/a.trotta/en)


        See the website of


        Giuseppe Ciccarese'
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
