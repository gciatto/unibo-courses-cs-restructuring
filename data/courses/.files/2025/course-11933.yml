syllabus:
  it:
    title: 2025/2026 INFORMATICA TEORICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i principi della calcolabilità e le teorie alla base dell'informatica. È in
        grado di verificare l'esistenza o l'inesistenza di programmi che calcolano
        una determinata funzione.
      Contenuti: '- Problemi e algoritmi

        - Calcolabilità vs. Complessità

        - Macchine di Turing

        - Problemi decidibili, semidecidibili, e indecidibili

        - Classi di complessità

        - Le classi P ed NP

        - Problemi NP-completi, e la questione P vs. NP

        - Cenni alle classi di complessità spaziali

        - Cenni alle classi ad oracolo, alle gerarchie di classi, e alle classi funzionali


        Prerequisiti:


        Si assume che gli studenti abbiano acquisito solide basi di ragionamento algoritmico,
        la nozione di chiamata a subroutine, e abbiano una certa dimestichezza con
        strutture dati quali liste, alberi, grafi. Conoscenza pregressa della nozione
        di automa a stati finiti è utile ma non indispensabile.'
      Testi/Bibliografia: 'Testo consigliato:


        - Hopcroft, Motwani, Ullman. Introduction to Automata Theory, Languages, and
        Computation. 3rd ed. Pearson Education, 2013 (è stata pubblicata anche un''edizione
        italiana)


        Testi aggiuntivi:


        - Sipser. Introduction to the Theory of Computation. 3rd ed. Cengage Learning,
        2012 (è stata pubblicata anche un''edizione italiana)

        - Arora, Barak. Computational Complexity: A Modern Approach. Cambridge University
        Press, 2009'
      Metodi didattici: Lezioni frontali, esercitazioni guidate in aula.
      Modalità di verifica e valutazione dell'apprendimento: "L'esame consiste in\
        \ una prova scritta ed una eventuale prova orale.\n\nIn particolare, la prova\
        \ scritta consiste in:\n\n- Un esercizio di \"progettazione\" di una macchina\
        \ di Turing per decidere un linguaggio dato\n- 4/5 domande teoriche a risposta\
        \ aperta sugli argomenti visti nel corso\n- Un paio di dimostrazioni di risultati\
        \ teorici visti a lezione\n- Un esercizio in cui si chiede di dimostrare la\
        \ decidibilità o indecidibilità di un linguaggio (non visto a lezione)\n-\
        \ Un esercizio in cui si chiede di dimostrare la complessità di un problema\
        \ (non visto a lezione), generalmente NP-completo.\n\nIn base al voto ottenuto\
        \ allo scritto, a parte la possibilità di rifiutare il voto e risostenere\
        \ la prova scritta, per lo studente si aprono i seguenti scenari:\n\n- da\
        \ 15 a 17 (compresi): lo studente può sostenere l'orale per arrivare a 18\
        \ (ma non di più);\n- da 18 a 25 (compresi): lo studente può registrare il\
        \ voto (senza sostenere l'orale);\n- da 26 a 27 (compresi): lo studente può\
        \ registrare il voto (senza sostenere l'orale), oppure sostenere l'orale;\n\
        - da 28 a salire: lo studente può registrare 27 (senza sostenere l'orale),\
        \ oppure sostenere l'orale.\n\nIl voto all'orale può salire o scendere (o\
        \ rimanere invariato) rispetto al voto dello scritto. Una volta che lo studente\
        \ opta per sostenere la prova orale, e questa ha inizio, il voto dello scritto\
        \ è perso e l'esito dell'orale è quello che sarà preso in considerazione (non\
        \ c'è la possibilità di \"preferire e tenersi\" il voto dello scritto).\n\n\
        Sia la prova scritta, che l'eventuale prova orale, mirano a verificare che\
        \ lo studente abbia acquisito la necessaria dimestichezza oltre che con gli\
        \ argomenti del corso (area del \"sapere\"), anche con l'argomentazione formale\
        \ (area del \"saper fare\"). In particolare queste sono le fasce di voto con\
        \ le relative capacità che lo studente deve mostrare per collocarvisi:\n\n\
        - 18 - 21: buona conoscenza delle definizioni di base (minimo per passare\
        \ l'esame (con un voto minimale)), e capacità di manipolore semplici concetti;\n\
        \  ad esempio: nozione di algoritmo, problema, linguaggio, macchina di Turing\
        \ (nelle sue varianti), le classi P / NP, NP-hard, esempi di problemi indecidibili,\
        \ esempi di problemi NP-completi\n- 22 - 26: buona e precisa conoscenza di\
        \ definizioni più sofisticate / capacità di dimostrare formalmente semplici\
        \ risultati / capacità di collegare semplici concetti\n  ad esempio: cos'è\
        \ una riduzione, a cosa serve, esempi di riduzione (dimostrazione formale),\
        \ dimostrare l'indecidibilità di alcuni linguaggi, dimostrare l'NP-completezza\
        \ di alcuni linguaggi, teorema di Rice\n- 27+: capacità di dimostrare formalmente\
        \ risultati più sofisticati / capacità di collegare concetti più sofisticati\n\
        \  ad esempio: dimostrazione che Hamiltonian-cycle è NP-completo, dimostrare\
        \ il teorema di Cook, dimostrazione di indecidibilità sofisticate; per la\
        \ lode, lo studente, oltre a mostrare piena padronanza degli argomenti svolti\
        \ a lezione, deve mostrare di essere in grado di collegare argomenti in modo\
        \ creativo e rispondere a domande su cose non spiegate in aula.\n\nIl collocamento\
        \ del voto specifico all'interno della fascia dipende dall'esposizione e quindi:\
        \ quanto lo studente si è impadronito dei concetti? Li riesce a maneggiare?\
        \ Quanto precise e formali sono le definizioni che da? Le dimostrazioni sono\
        \ formali a sufficienza? C'è un flusso logico nell'esposizione? I nessi causali\
        \ sono espliciti? Il legame fra concetti è chiaro?\n\nUso dell'Intelligenza\
        \ Artificiale, generativa e non, nelle prove d’esame: l'uso di strumenti di\
        \ Intelligenza Artificiale, generativa e non, durante la prova d'esame è vietato\
        \ in qualunque forma; qualunque utilizzo dell'Intelligenza Artificiale è considerato\
        \ violazione del principio di onestà e correttezza, e costituisce violazione\
        \ dell'integrità accademica.\n\nStudenti/sse con DSA o disabilità temporanee\
        \ o permanenti: si raccomanda di contattare per tempo l’ufficio di Ateneo\
        \ responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it): sarà\
        \ sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,\
        \ che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione\
        \ del/della docente, che ne valuterà l'opportunità anche in relazione agli\
        \ obiettivi formativi dell'insegnamento."
      Strumenti a supporto della didattica: Verranno forniti i pdf di quello che verrà
        scritto in aula sulla "lavagna virtuale".
      Orario di ricevimento: Consulta il sito web di Enrico Malizia (https://www.unibo.it/sitoweb/enrico.malizia)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Theoretical Computer Science — University of Bologna
    contents:
      Course contents: '- Problems and algorithms

        - Computability vs Complexity

        - Turing machines

        - Recursive and recursively enumerable problems

        - Complexity classes

        - The classes P and NP

        - NP-complete problems, and the P vs. NP question

        - A quick look at space complexity classes

        - A quick look at oracle classes, class hierarchies, and functional classes


        Prerequisites:


        Students are assumed to have a solid background in algorithmic reasoning,
        to have acquired the notion of subroutine call, and to be somewhat familiar
        with basic data structures such as lists, trees, and graphs. Previous knowledge
        of the notion of finite state automaton is helpful but not necessary.'
      Readings/Bibliography: 'Textbook:


        - Hopcroft, Motwani, Ullman. Introduction to Automata Theory, Languages, and
        Computation. 3rd ed. Pearson Education, 2013


        Additional readings:


        - Sipser. Introduction to the Theory of Computation. 3rd ed. Cengage Learning,
        2012

        - Arora, Barak. Computational Complexity: A Modern Approach. Cambridge University
        Press, 2009'
      Teaching methods: Class lectures; Guided exercises.
      Assessment methods: 'The exam consists in a written test, and and a possible
        oral examination. These activities aim at assessing that the student has acquired
        the necessary knowledge of the course topics and the skills in formal argumentation.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        as soon as possible so that they can propose acceptable adjustments. The request
        for adaptation must be submitted in advance (15 days before the exam date)
        to the lecturer, who will assess the appropriateness of the adjustments, taking
        into account the teaching objectives.'
      Office hours: See the website of Enrico Malizia (https://www.unibo.it/sitoweb/enrico.malizia/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
