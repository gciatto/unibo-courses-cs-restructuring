syllabus:
  it:
    title: 2025/2026 ARCHITETTURE SOFTWARE A MICROSERVIZI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa lo studente
        conosce gli aspetti principali dell'analisi, della progettazione e della realizzazione
        di architetture software basate su servizi, sia con approccio a microservizi
        sia SOA enterprise; sa inoltre modellare esupportare l'esecuzione dei processi
        di business, integrando opportunamente i servizi che li compongono. E' in
        grado di progettare e realizzare tali architetture complesse,anche supportandone
        l'esecuzione con infrastrutture virtualizzate, attraverso l'applicazione di
        pratiche, pattern e opportune soluzioni tecnologiche.
      Contenuti: 'Le architetture basate su servizi (SOA) vengono utilizzate per realizzare
        grandi sistemi software che operano fra più organizzazioni (come avviene in
        ambito enterprise) ma anche come struttura di base su cui costruire applicazioni
        flessibili ed estremamente scalabili (come nel caso dei microservizi).


        Progettare questo tipo di sistemi e ragionare sulle loro proprietà richiede
        l’uso di astrazioni e tecniche di modellazione appropriate.


        In questo insegnamento vedremo come le astrazioni di servizio e di processo
        possono interoperare per descrivere sistemi distribuiti complessi e vedremo
        tecniche di modellazione basate su queste astrazioni che aiutano a progettarli.
        Impareremo come modellare processi (usando BPMN), servizi (usando UML) e come
        modellare l’interazione fra processi e servizi e fra servizi diversi attraverso
        le coreografie.


        Vedremo come sfruttare queste tecniche per progettare applicazioni aderenti
        allo stile architetturale orientato ai servizi sia in ambito cross-enterprise
        sia attraverso i microservizi (anche adottando specifici pattern). Vedremo
        anche nella pratica i protocolli e le tecnologie che possono essere utilizzati
        per la loro realizzazione; in particolare per le tecnologie di supporto ai
        servizi web vedremo SOAP/WSDL e lo stile RESTful; per i microservizi vedremo
        l’uso dei container (es. Docker), degli orchestratori di microservizi (es.
        Kubernetes), delle service mesh (es. Linkerd) e delle tecnologie di serializzazione
        (es. Protobuf).


        Per quello che riguarda i microservizi cercheremo in particolare di capire
        i punti forti e i punti deboli di questa classe di applicazioni e capiremo
        come realizzare sistemi che siano scalabili e affidabili.


        Per facilitare la realizzazione immediata di esempi di alcune delle tecnologie
        legate ai servizi web man mano che verranno introdotte, useremo il linguaggio
        Jolie che permette la prototipazione rapida di soluzioni SOA.


        Segue una lista dei principali argomenti del corso:


        - Enterprise software systems, architecture and modeling

        - Business Process Management e BPMN

        - SOA/Coreografie

        - Web services (SOAP/WSLD/RESTful/gRPC)

        - Microservices properties, design, patterns and implementation

        - Virtualized infrastructures supporting SOAs: containers (Docker), distributed
        containers (Kubernetes)

        - Jolie'
      Testi/Bibliografia: '- Michael Papazoglou, "Web Services and SOA: Principles
        and Technology", 2nd ed. 2013, ISBN 9780273732167

        - Mathias Weske, “Business Process Management: Concepts, Languages, Architectures”,
        3rd ed. 2019, ISBN 9783662594315'
      Metodi didattici: Lezioni frontati ed esercitazioni.
      Modalità di verifica e valutazione dell'apprendimento: 'Consegna e discussione
        di un progetto. La valutazione considererà la completezza e correttezza del
        materiale consegnato, l''adesione alle pratiche viste a lezione, la capacità
        di mettere in relazione i vari argomenti trattati dall''insegnamento e uso
        del pensiero critico.


        La correzione degli homework in itinere opzionali può determinare un bonus
        fino ad 1 punto della valutazione.'
      Orario di ricevimento: 'Consulta il sito web di Davide Rossi (https://www.unibo.it/sitoweb/daviderossi)


        Consulta il sito web di Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 ARCHITETTURE SOFTWARE A MICROSERVIZI — University of Bologna
    contents:
      Learning outcomes: At the end of the course, students know the main aspects
        of the analysis, design and implementation of service-based software architectures,
        with both a microservices approach and enterprise SOA; they also know how
        to model and support the execution of business processes, appropriately integrating
        the services that compose them. They can design and implement such complex
        architectures, also supporting their execution within virtualized infrastructures,
        through the application of practices, patterns and appropriate technological
        solutions.
      Course contents: 'Service-oriented architectures (SOAs) are used to build large
        software systems that operate across multiple organizations (as is the case
        in the enterprise environment) but also as a basic structure to build flexible
        and extremely scalable applications (as in the case of microservices).


        Designing this class of systems and reasoning about their properties requires
        the use of appropriate abstractions and modeling techniques.


        In this course we will see how service and process abstractions can interoperate
        to describe complex distributed systems and we will see modeling techniques
        based on these abstractions that help design them.

        We will learn how to model processes (using BPMN), services (using UML) and
        how to model the interaction between processes and services and between different
        services through choreographies.


        We will see how to exploit these techniques to design applications adhering
        to the service-oriented architectural style both across-enterprises and through
        microservices (also by adopting specific patterns).

        We will also see in practice the protocols and the technologies that can be
        used for their implementation; in particular for the technologies to support
        web services we will see SOAP / WSDL and the RESTful style; for microservices
        we will see the use of containers (eg Docker), microservice orchestrators
        (eg Kubernetes), service meshes (eg Linkerd) and serialization technologies
        (eg Protobuf). As far as microservices are concerned, we will try in particular
        to understand the strengths and weaknesses of this class of applications and
        we will understand how to build systems that are both scalable and reliable.

        To facilitate the prompt realization of examples of some of the technologies
        related to web services as they are introduced, we will use the Jolie language
        which allows rapid prototyping of SOA solutions.

        Below is a list of the main topics of the course:


        - Enterprise software systems, architecture and modeling

        - Business Process Management e BPMN

        - SOA/Coreografie

        - Web services (SOAP/WSLD/RESTful/gRPC)

        - Microservices properties, design, patterns and implementation

        - Virtualized infrastructures supporting SOAs: containers (Docker), distributed
        containers (Kubernetes)

        - Jolie'
      Readings/Bibliography: '- Michael Papazoglou, "Web Services and SOA: Principles
        and Technology", 2nd ed. 2013, ISBN 9780273732167

        - Mathias Weske, “Business Process Management: Concepts, Languages, Architectures”,
        3rd ed. 2019, ISBN 9783662594315'
      Teaching methods: Lectures and excercises
      Assessment methods: 'Submission and discussion of a project. The evaluation
        will consider the completeness and correctness of the submitted material,
        adherence to the practices covered in class, the ability to connect the various
        topics addressed in the course, and the use of critical thinking.


        The grading of optional homework assignments throughout the course can result
        in a bonus of up to 1 point in the evaluation.'
      Office hours: 'See the website of Davide Rossi (https://www.unibo.it/sitoweb/daviderossi/en)


        See the website of Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese/en)'
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
