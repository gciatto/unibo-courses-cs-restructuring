syllabus:
  it:
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo lo studente possiede
        le competenze informatiche di base necessarie sia all'utilizzo dei principali
        strumenti informatici sia alla gestione dei sistemi informativi dei servizi,
        nonché all'utilizzo della rete nella ricerca e nell'informatica medica.
      Contenuti: '1. Conoscenze di base:


        - Il computer, l''algoritmo, software e hardware;

        - Reti di computer e Internet.


        1. Introduzione all''informatica sanitaria:


        - Principali ambiti dell''informatica nelle attività sanitarie;

        - Dematerializzazione dei documenti in ambito clinico-sanitario;

        - Strumenti di validazione e trasmissione di un documento informatico;

        - Archivi digitali e conservazione dei documenti medici nelle aziende sanitarie
        pubbliche;

        - Protezione e trattamento dei dati relativi alla salute.


        1. Come elaborare un documento di testo con un programma di videoscrittura:


        - Scrittura elettronica e programmi di videoscrittura;

        - Formati dei file;

        - Creare documenti con MS-Word.


        1. Come organizzare, elaborare e analizzare dati biometrici e clinici con
        i fogli elettronici:


        - Organizzare, sintetizzare, elaborare, analizzare e rappresentare dati con
        MS-Excel;

        - Importare/Esportare dati;

        - Creare, archiviare e condividere fogli elettronici con Google Drive e Google
        Sheet.


        1. Come creare un database relazionale:


        - Struttura di un Data Base;

        - Architettura di un database;

        - Modello relazionale;

        - Progettare una database.


        1. Come presentare e comunicare su schermo i dati:


        - Presentazioni in MS-PowerPoint.


        1. Cenni si motori di ricerca bibliografica;

        2. Il futuro: cenni di big data e di telemedicina.'
      Testi/Bibliografia: Antonino Letizia, Informatica. Seconda Edizione. 2024. Zanichelli.
      Metodi didattici: Lezioni frontali.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso lo svolgimento di una prova scritta che prevede domande
        a scelta forzata con 4/5 risposte alternative, oppure domande aperte su argomenti
        inerenti gli obiettivi del Corso. Il voto sarà espresso sulla base delle risposte
        esatte e sarà un voto da 0 a 30 e Lode. La sufficienza è raggiunta con voto
        >=18. E’ ammesso l''uso di normale calcolatrice scientifica, ma non di libri,
        dispense, appunti, internet.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Antonino Letizia, Informatica. Seconda
        Edizione. 2024. Zanichelli.
      Link ad altre eventuali informazioni: https://filippopiccinini.it/joomla/men-teachings
      Orario di ricevimento: Consulta il sito web di Filippo Piccinini (https://www.unibo.it/sitoweb/f.piccinini)
  en:
    title: 2025/2026 Informatic — University of Bologna
    contents:
      Learning outcomes: At the end of the module, the student will have the basic
        IT skills necessary to use the main computer tools, to manage information
        systems within healthcare services, and to use the internet for research and
        medical informatics purposes.
      Course contents: '1. Basic knowledge:


        - The computer, algorithms, software, and hardware;

        - Computer networks and the Internet.


        1. Introduction to health informatics:


        - Main areas of informatics applied to healthcare activities;

        - Dematerialization of documents in the clinical and healthcare context;

        - Tools for validation and transmission of electronic documents;

        - Digital archives and storage of medical records in public healthcare organizations;

        - Protection and processing of health-related data.


        1. How to create and edit a text document using word processing software:


        - Electronic writing and word processing software;

        - File formats;

        - Creating documents with MS Word.


        1. How to organize, process, and analyze biometric and clinical data using
        spreadsheets:


        - Organizing, summarizing, processing, analyzing, and visualizing data with
        MS Excel;

        - Importing and exporting data;

        - Creating, storing, and sharing spreadsheets with Google Drive and Google
        Sheets.


        1. How to create a relational database:


        - Database structure;

        - Database architecture;

        - Relational model;

        - Designing a database.


        1. How to present and communicate data on screen:


        - Presentations using MS PowerPoint.


        1. Introduction to bibliographic search engines.

        2. The future: introduction to big data and telemedicine.'
      Readings/Bibliography: Antonino Letizia, Informatica. Seconda Edizione. 2024.
        Zanichelli.
      Teaching methods: Frontal lessons.
      Assessment methods: 'The assessment of learning is conducted through a written
        test that includes multiple-choice questions with 4/5 alternative answers
        or open-ended questions on topics related to the course objectives. The grade
        will be based on the correct answers and will range from 0 to 30 cum laude.
        A passing grade is achieved with a score of 18 or higher. The use of a regular
        scientific calculator is allowed, but not books, handouts, notes, or the internet.


        Students with Specific Learning Disabilities (SLD) or temporary/permanent
        disabilities are advised to contact the University Office responsible in a
        timely manner (https://site.unibo.it/studenti-con-disabilita-e-dsa/en ). The
        office will be responsible for proposing any necessary accommodations to the
        students concerned. These accommodations must be submitted to the instructor
        for approval at least 15 days in advance, and will be evaluated in light of
        the learning objectives of the course.'
      Teaching tools: Antonino Letizia, Informatica. Seconda Edizione. 2024. Zanichelli.
      Links to further information: https://filippopiccinini.it/joomla/men-teachings
      Office hours: See the website of Filippo Piccinini (https://www.unibo.it/sitoweb/f.piccinini/en)
