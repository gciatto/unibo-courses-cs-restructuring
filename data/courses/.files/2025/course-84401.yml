  name: SISTEMI CONTEXT-AWARE
integrated_course: ''
campus: Bologna
programme: Laurea Magistrale in Informatica
syllabus:
  it:
    title: 2025/2026 SISTEMI CONTEXT-AWARE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso, lo studente è in\
        \ grado di progettare, sviluppare e valutare sistemi ubiqui ed applicazioni\
        \ operanti su dispositivi mobili in grado di adattarsi alle caratteristiche\
        \ del contesto ed alla posizione/mobilità dell\x92utente. Al termine del corso,\
        \ lo studente: - conosce le basi del context-aware computing e le principali\
        \ tecniche per la localizzazione di utenti/dispositivi e per il riconoscimento\
        \ dell\x92attività; -conosce i principali modelli per la rappresentazione\
        \ e manipolazione di dati di contesto; -conosce i principali middleware ed\
        \ architetture software per lo sviluppo di applicazioni e servizi adattivi\
        \ ed ubiqui."
      Contenuti: 'Il corso affronta tematiche legate alla progettazione e realizzazione
        di sistemi ed applicazioni ubiqui e context-aware, resi oggi possibili dalla
        diffusione pervasiva di dispositivi in grado di fare sensing dell’ambiente
        e di elaborare i dati raccolti. Il programma del corso è suddiviso in due
        blocchi principali. Nel primo blocco, vengono presentate le definizioni di
        “contesto” e di sistema context-aware, le architetture software di riferimento
        e le tipologie, soffermandosi in particolare sulla progettazione ed implementazione
        di sistemi location-aware ed activity-aware. Viene dedicato molto spazio alla
        gestione di dati spaziali, illustrando, nel dettaglio, le tecnologie per la
        localizzazione, visualizzazione di dati geospaziali su mappe, storage e location
        intelligence. Nel secondo blocco viene discusso il ciclo di vita della progettazione
        di sistemi context-aware distribuiti, con enfasi su approcci di mobile edge
        computing in cui l''allocazione del workload tiene conto della posizione attuale
        degli utenti/dispositivi. A tal proposito, vengono presentate tecnologie e
        framework di edge computing per containerizzazione del software (Docker),
        orchestrazione dei task (Docker Swarm e Kubernates), e migrazione dei servizi
        sulla base della mobilità. Nell''ultima settimana del corso, sono previsti
        seminari da parte di aziende che operano nel settore.


        Segue l''elenco degli argomenti trattati nel corso:


        Introduzione e definizione di contesto e di sistema context-aware


        Casi d’uso di sistemi context-aware


        Sistemi location-aware


        - Location-based services

        - Tecnologie per la localizzazione

        - Mapping APIs

        - Spatial database management systems

        - Location intelligence

        - Privacy e dati spaziali


        Sistemi activity-aware


        - Architetture e algoritmi per Human Activity Recognition (HAR)

        - HAR mediante tecniche AI di apprendimento supervisionato


        Architetture di mobile edge computing


        - Definizione ed esempi di applicazione del mobile edge computing

        - Tecniche di modularizzazione del software (mediante container Docker)

        - Orchestrazione di servizi e workload (Docker Swarm, Kubernates)

        - Metriche per allocazione dei task sulla base del contesto utente/dispositivo
        (es. posizione)'
      Testi/Bibliografia: 'Slides e dispense rese disponibili tramite Virtuale.


        Letture consigliate:


        - Richard Ferraro, Murat Aktihanoglu, Location Aware Applications, Manning
        Editions

        - Stefan Posland, Ubiquitous Computing: Smart Devices, Environments And Interactions,
        Wiley Edition'
      Metodi didattici: Il corso prevede lezioni frontali ed esercitazioni svolte
        in aula, mediante l'ausilio di PC e proiettore.
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso prevede un
        seminario (obbligatorio) ed un progetto (obbligatorio). Il seminario viene
        svolto durante l''ultima settimana del corso, e consiste in una presentazione
        di 20-30 minuti nella quale lo studente presenta un argomento di ricerca legato
        al programma di corso, prendendo spunto da un articolo scientifico o da un
        tool esistente. L''argomento del seminario può essere scelto da una lista
        messa a disposizione dai docenti oppure proposto dallo studente. Il seminario
        viene valutato su una scala di 4 valori (Insufficiente, Sufficiente, Buono,
        Ottimo).


        Il progetto consiste nello sviluppo di un sistema software con caratteristiche
        di context-awareness. Come per l''argomento del seminario, la traccia del
        progetto viene proposta dagli studenti ed approvata dal docente, o direttamente
        proposta dal docente. Il progetto produce un voto in 30-esimi.


        Il voto finale viene calcolato tenendo in considerazione il voto del progetto
        ed il giudizio ottenuto durante il seminario.'
      Strumenti a supporto della didattica: Il materiale didattico (slides, codice)
        presentato a lezione viene messo a disposizione dello studente attraverso
        la pagina del corso sulla piattaforma Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3)


        Consulta il sito web di Angelo Trotta (https://www.unibo.it/sitoweb/a.trotta)'
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Context-Aware Systems — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student is able to design,
        deploy and evaluate ubiquitous systems and mobile applications able to adapt
        their behaviors to the context characteristics and to the current location/activity
        of the user. At the end of the course, the student: -knows the fundamental
        concepts of context-aware computing, and the main techniques for the localization
        of users/devices and the human activity recognition; -knows the fundamental
        models of context-data representation and managing; - knows the main middleware
        and software architectures in order to deploy adaptive and ubiquitous applications
        and services'
      Course contents: 'The course addresses topics related to the design and development
        of ubiquitous and context-aware systems and applications, made possible today
        by the widespread availability of devices capable of sensing their environment
        and processing collected data.


        The course is organized into two main blocks.


        In the first block, the definitions of “context” and “context-aware systems”
        are introduced, along with reference software architectures and system typologies,
        with a focus on the design and implementation of location-aware and activity-aware
        systems.

        Special attention is given to spatial data management, including technologies
        for localization, visualization of geospatial data on maps, storage, and location
        intelligence.


        The second block focuses on the lifecycle of designing distributed context-aware
        systems, with an emphasis on mobile edge computing approaches, where workload
        allocation takes into account the current location of users/devices.

        Relevant technologies and frameworks for edge computing are presented, including:


        - Software containerization (Docker)

        - Task orchestration (Docker Swarm and Kubernetes)

        - Service migration based on device/user mobility


        In the final week of the course, seminars by industry professionals working
        in the field are scheduled.


        List of course topics:


        Introduction and definitions of context and context-aware systems


        Use cases of context-aware systems


        Location-aware systems


        - Location-based services

        - Localization technologies

        - Mapping APIs

        - Spatial database management systems

        - Location intelligence

        - Privacy and spatial data


        Activity-aware systems


        - Architectures and algorithms for Human Activity Recognition (HAR)

        - HAR using supervised AI techniques


        Mobile edge computing architectures


        - Definition and application examples of mobile edge computing

        - Software modularization techniques (via Docker containers)

        - Orchestration of services and workloads (Docker Swarm, Kubernetes)

        - Metrics for task allocation based on user/device context (e.g., location)'
      Readings/Bibliography: 'Slides are available on the Virtuale platform.


        Suggested readings:


        - Richard Ferraro, Murat Aktihanoglu, Location Aware Applications, Manning
        Editions

        - Stefan Posland, Ubiquitous Computing: Smart Devices, Environments And Interactions,
        Wiley Edition'
      Teaching methods: The teaching methods include frontal lectures and classroom
        exercises.
      Assessment methods: 'The course includes one mandatory seminar and one mandatory
        project.


        The seminar takes place during the final week of the course, and consists
        of a 20–30 minute presentation in which the student presents a research topic
        related to the course content, based on a scientific article or an existing
        tool.

        The seminar topic can be selected from a list provided by the instructors
        or proposed independently by the student.

        The seminar is evaluated on a four-point scale: Insufficient, Sufficient,
        Good, Excellent.


        The project involves the development of a software system with context-aware
        features.

        As with the seminar, the project topic may be proposed by the student (subject
        to approval) or directly assigned by the instructor.

        The project is graded on a 30-point scale.


        The final grade is determined based on both the project grade and the seminar
        evaluation.'
      Teaching tools: Teaching materials (slides, code examples) are made available
        to students through the Virtuale platform.
      Office hours: 'See the website of Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3/en)


        See the website of Angelo Trotta (https://www.unibo.it/sitoweb/a.trotta/en)'
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
