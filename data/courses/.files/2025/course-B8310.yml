syllabus:
  it:
    title: 2025/2026 STATISTICS AND MACHINE LEARNING FOR SIGNAL PROCESSING M — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: The course aims at reviewing basic concepts
        of probability, operator theory and optimization and using them in the development
        of fundamental signal processing methods ranging from filtering to spectrum
        estimation, linear prediction, adaptive sampling and dimensionality reduction.
      Modalità di verifica e valutazione dell'apprendimento: esame scritto
      Orario di ricevimento: Consulta il sito web di Mauro Mangia (https://www.unibo.it/sitoweb/mauro.mangia)
  en:
    title: 2025/2026 STATISTICS AND MACHINE LEARNING FOR SIGNAL PROCESSING M — University
      of Bologna
    contents:
      Learning outcomes: The course aims at reviewing basic concepts of probability,
        operator theory and optimization and using them in the development of fundamental
        signal processing methods ranging from filtering to spectrum estimation, linear
        prediction, adaptive sampling and dimensionality reduction.
      Assessment methods: written exam
      Office hours: See the website of Mauro Mangia (https://www.unibo.it/sitoweb/mauro.mangia/en)
