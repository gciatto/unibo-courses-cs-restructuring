        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Electronics T — University of Bologna
    contents:
      Course contents: 'Requirements/Prior knowledge


        Prerequisite for the understanding of the arguments is the knowledge of the
        key concepts of the theory of linear electrical circuits developed in the
        Courses of Electrical Circuits and Electrotechnics. In particular, the student
        should be able to analyze the behaviour of a linear circuit both in stationary
        and transient conditions.


        Fluent spoken and written Italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in Italian.


        Course Contents


        1. Introduction to the course: a brief history of Electronics, classification
        of electronic signals (digital, analog, A/D and D/A conversion), important
        concepts from circuit theory, frequency spectrum, introduction to amplifiers.

        2. Physics of semiconductors: solid-state electronic materials, drift currents
        and mobility in semiconductors, impurities and electron and hole concentrations,
        resistivity, diffusion current, overview of integrated circuit fabrication.

        3. Solid-state diodes and diode circuits: I-V characteristics, the diode equation,
        reverse and forward bias, diode temperature coefficient, pn junction capacitance,
        diode circuit analysis, voltage regulation, half-wave, full-wave and full-wave
        bridge rectifiers.

        4. Field effect transistor: the MOS capacitor, the nMOS transistor, pMOS transistor,
        capacitances of the MOSFET, biasing of the MOSFET.

        5. Bipolar junction transistors: physical structure of the bipolar transistor,
        the transport model of the npn transistor, the pnp transistor, equivalent
        circuit representation of the transport models, I-V characteristics, transport
        model simplifications, nonideal behavior of the bipolar transistor (junction
        breakdown voltage, diffusion capacitance, Early effect), transconductance,
        bias circuits for the BJT.

        6. Analog electronic systems: amplification (voltage, current and power gain),
        distortion in amplifiers, two-port models for amplifiers, mismatched source
        and load resistances, transfer functions and frequency response.

        7. Small-signal modeling and linear amplifiers: small-signal model for the
        diode, small-signal model for the BJT, small-signal mdel for the MOSFET, common-source
        amplifier, common-emitter amplifier, examples of amplifiers and source-follower

        8. Operational amplifiers: differential amplifier, ideal operational amplifier,
        circuits with ideal OPAMPs.

        9. Nonideal operational amplifiers: feedback systems, analysis of circuits
        containing nonideal OPAMPs, common-mode rejection ratio, input resistance,
        frequency answer and bandwidth.

        10. Power devices: power diode (structure and I-V characteristics, switching
        features), power BJT (active region, quasi-saturation regime deep saturation
        regime), issue of the draining of minority charge in the drift region during
        the switching-off, power MOSFET (vertical structure, parasitic effects, gate
        capacitance in saturation and ohmic region), optimization of the on resistance,
        biasing circuits, IGBT (structure and functioning), Thyristor (structure and
        functioning).

        11. Introduction to digital electronics. Main design perspectives for the
        logic blocks. Figures of merit. Functions, truth tables of the logic functions
        and main logic schemes. Boolean algebra: operations, expressions and equivalence
        theorems. Synthesis and analysis of the algebraic canonical forms and general
        forms.

        12. CMOS combinational logic. Gate area definition. Determination of the propagation
        times. Sequential logic circuits.

        13. Introduction to Memory Architectures. SRAM e DRAM. Non-volatile memories.'
      Readings/Bibliography: 'Jaeger-Blalock "Microelettronica" McGraw Hill


        Rabaey-Chandrakasan-Nicolic ‘’Circuiti Integrati Digitali’’ Pearson


        Mohan, Ned, Tore M. Undeland, and William P. Robbins. Power electronics: converters,
        applications, and design. John wiley & sons, 2003.'
      Teaching methods: The course consists of classroom lectures in which the basic
        electronic elements are presented. In particular, we will focus on the key
        concepts of Analog Electronics. The theoretical presentation of each topic
        is followed by several lectures devoted to the solution of exercises and specific
        problems aiming to acquire the method for analyzing and designing simple analog
        circuits.
      Assessment methods: 'Learning assessment is done through a final exam that ensures
        acquisition of knowledge and expected skills.The student will take a written
        test with a possible oral interview.


        The written test is divided into two parts, one for each module, and aims
        to assess the student''s ability to analyze the operation of analog and digital
        circuits.


        The possible oral test includes of some theoretical questions with the goal
        of verifying the acquisition of the knowledge detailed in the course syllabus.


        To attend the exam it is required to register via Almaesami. Those who do
        not succeed to register by the deadline are required to promptly notify the
        problem at the Secretary''s office.'
      Teaching tools: 'Teaching material: slides, notes and examples of exercises
        with solutions will be available to students'
      Office hours: See the website of Luigi Balestra (https://www.unibo.it/sitoweb/luigi.balestra5/en)
      SDGs: 'Industry, innovation and infrastructure Responsible consumption and production


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
