syllabus:
  it:
    title: 2025/2026 ELETTRONICA T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso si propone di fornire le conoscenze
        di base sui processi di fabbricazione e sul funzionamento dei dispositivi
        elettronici elementari, nonché sull'analisi dei circuiti analogici e digitali.
      Contenuti: 'Prerequisiti/Propedeuticità consigliate


        Prerequisito per la comprensione degli argomenti svolti è l''aver appreso
        le nozioni principali di teoria dei circuiti elettrici lineari svolti nel
        corso di Elettrotecnica Generale. In particolare lo studente dovrebbe essere
        in grado di analizzare il comportamento di un circuito lineare sia in condizioni
        stazionarie che transitorie. Si consiglia quindi di seguire il corso solo
        dopo aver superato l''esame di Elettrotecnica Generale.


        Programma


        1. Introduzione al corso: breve storia dell''elettronica, classificazione
        dei segnali elettronici (digitali, analogici, conversione A/D e D/A), richiami
        di teoria dei circuiti, lo spettro di frequenza, il concetto di amplificatore.

        2. Elementi di fisica dei semiconduttori: i materiali a stato solido, la corrente
        di deriva e la mobilità nei semiconduttori, le impurità e le concentrazioni
        degli elettroni e delle lacune, la resistività nei semiconduttori estrinseci,
        la corrente di diffusione, cenni di fabbricazione dei circuiti integrati

        3. Diodi a stato solido e circuiti a diodi: caratteristica I-V, l''equazione
        del diodo, polarizzazione inversa, nulla e diretta, coefficiente di temperatura
        del diodo, capacità della giunzione, analisi dei circuiti a diodi, regolatori
        di tensione, raddrizzatori a semionda, raddrizzatori a doppia semionda, raddrizzatori
        a ponte a doppia semionda.

        4. Transistori a effetto di campo: il condensatore MOS, il MOSFET a canale
        n, il MOSFET a canale p, le capacità del MOSFET, polarizzazione del MOSFET

        5. Transistori bipolari a giunzione: struttura del transistore bipolare, il
        modello del trasporto del transistore npn, il transistore pnp, rappresentazione
        circuitale del modello del trasporto, caratteristiche I-V del transistore
        bipolare, forme semplificate del modello del trasporto, effetti non ideali
        (tensione di rottura delle giunzioni, capacità di diffusione, effetto Early),
        transconduttanza, polarizzazione del BJT

        6. Sistemi analogici: amplificazione (guadagno di tensione, di corrente e
        di potenza), distorsione negli amplificatori, modelli a doppio bipolo degli
        amplificatori, disadattamento delle impedenze del generatore e di carico,
        funzione di trasferimento e risposta in frequenza

        7. Modelli a piccolo segnale e amplificatori invertenti: modello per piccoli
        segnali del diodo, modello per piccoli segnali del transistore bipolare a
        giunzione, amplificatore a emettitore comune, modello per piccoli segnali
        del MOSFET, amplificatore a source comune, esempi di amplificatori a emettitore
        comune e a source comune, inseguitore di source

        8. Amplificatori operazionali: amplificatore differenziale, amplificatore
        operazionale ideale e circuiti con OPAMP ideali.

        9. Caratteristiche e limitazioni degli OPAMP: sistemi con retroazione, analisi
        di circuiti con OPAMP non ideali, reiezione di modo comune, resistenza d''ingresso,
        risposta in frequenza e larghezza di banda

        10. Dispositivi di potenza: diodo di potenza (struttura e caratteristiche
        I/V, caratteristiche di commutazione), BJT di potenza (regione attiva, quasi-saturazione
        e saturazione profonda), problema della rimozione di carica minoritaria dalla
        regione di drift durante lo spegnimento, MOSFET di potenza (struttura VDMOS,
        effetti parassiti, capacità di gate in saturazione e regione ohmica), problema
        della Ron elevata e dissipazione di potenza, IGBT (struttura e funzionamento),
        tiristore (struttura e funzionamento).

        11. Introduzione all''elettronica digitale. Criteri principali per la progettazione
        di porte logiche. Parametri di merito. Funzioni, tabelle della verità e schemi
        logici. Algebra di commutazione: operazioni, espressioni e teoremi di equivalenza.
        Sintesi ed analisi con espressioni canoniche e con espressioni generali.

        12. Logiche CMOS statiche e dinamiche. Dimensionamento dei gate. Determinazione
        dei tempi di salita e discesa, tempi di propagazione. Circuiti logici sequenziali.

        13. Fondamenti sulle memorie a semiconduttore. SRAM e DRAM. Memorie non volatili.'
      Testi/Bibliografia: 'Jaeger-Blalock "Microelettronica" McGraw Hill


        Rabaey-Chandrakasan-Nicolic ‘’Circuiti Integrati Digitali’’ Pearson


        Mohan, Ned, Tore M. Undeland, and William P. Robbins. Power electronics: converters,
        applications, and design. John wiley & sons, 2003.'
      Metodi didattici: Il corso è strutturato in lezioni frontali in aula in cui
        vengono presentati gli elementi fondamentali dell'Elettronica. In particolare
        ci si focalizzerà sui circuiti base dell'Elettronica Analogica. Alla presentazione
        teorica di ogni tema trattato fanno seguito diverse lezioni dedicate alla
        risoluzione di esercizi e problemi specifici che sottolineano la natura applicata
        della disciplina e mirano a far acquisire il metodo per l'analisi e la progettazione
        di semplici circuiti analogici.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale che accerta l’acquisizione delle conoscenze
        e delle abilità attese. Lo studente svolgerà una prova scritta con possibile
        colloquio orale.


        La prova scritta è divisa in due parti, una per ogni modulo, ed ha l''obiettivo
        di verificare la capacità dello studente di analizzare il funzionamento di
        circuiti analogici e digitali.


        L''eventuale prova orale consiste in alcune domande di teoria con l''obiettivo
        di verificare l''acquisizione delle conoscenze previste secondo quanto dettagliato
        nel programma del corso.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite bacheca
        elettronica, nel rispetto inderogabile delle scadenze previste. Coloro che
        non riuscissero ad iscriversi entro la data prevista, sono tenuti a comunicare
        tempestivamente (e comunque prima della chiusura ufficiale delle liste di
        iscrizione) il problema alla segreteria didattica. Sarà facoltà del docente
        ammetterli a sostenere la prova.


        La verbalizzazione della valutazione conseguita avviene durante uno qualsiasi
        degli appelli orali fissati dal docente durante l''anno accademico.'
      Strumenti a supporto della didattica: 'Materiale didattico: i lucidi delle lezioni,
        alcuni appunti ed esempi di esercizi svolti saranno resi disponibili agli
        studenti'
      Orario di ricevimento: Consulta il sito web di Luigi Balestra (https://www.unibo.it/sitoweb/luigi.balestra5)
      SDGs: 'Imprese innovazione e infrastrutture Consumo e produzione responsabili


