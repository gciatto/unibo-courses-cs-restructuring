syllabus:
  it:
    title: 2025/2026 OPERATIONAL ANALYTICS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Operational analytics, a specific type of
        business analytics, is focused on the analysis of business processes to the
        end of creating competitive advantage by means of operational data analysis
        and of the application of analytical algorithms. The course concentrates on
        the algorithmic side, specifically presenting predictive analytical techniques,
        forecasting future data on the basis of available time series, and prescriptive
        analytical techniques, defining optimized usage of available resources. Real
        world cases will be studied and used as testbed for self-developed systems.
      Contenuti: "Il corso fa parte di un curriculum di data science e fornisce alcuni\
        \ strumenti per prevedere dati gestionali a breve/medio termine (analitica\
        \ predittiva) e per ottimizzare processi con allocazione di risorse scarse\
        \ in base ai dati previsti (analitica prescrittiva). Saranno presentati e\
        \ integrati elementi di analitica predittiva e di ottimizzazione euristica.\n\
        Per la parte predittiva, il corso propone metodologie e tecniche per analizzare,\
        \ modellare e prevedere serie temporali univariate, con accenni a quelle multivariate.\n\
        Si mostrerà, compatibilmente con il tempo a disposizione, che i dati previsionali\
        \ possono essere elementi di modelli matematici di processi gestionali in\
        \ cui ottimizzare l'allocazione di risorse scarse.\nGli strumenti proposti\
        \ sono pensati per essere utilizzati in casi applicativi gestinali, casi di\
        \ studio reali che saranno mostrati compatibilmente con il tempo, e/o richiesti\
        \ nei progetti finali.\nI contenuti scientifici del corso sono relativi alle\
        \ conoscenze necessarie per sviluppare un modulo di analisi operativa su dati\
        \ ottenuti da un sistema informativo aziendale. In particolare, verranno presentati\n\
        \n- breve riepilogo dei modelli stocastici, variabili casuali. distribuzioni\
        \ di probabilità\n- modelli predittivi: statistici (ARMA, ARIMA, SARIMA),\
        \ neurali (MLP, LSTM, forse SVR se il tempo lo permette) e modelli di machine\
        \ learning / decision tree (ensemble, random forest, boosting)\n- indicatori\
        \ di performance, statistiche descrittive, test di significatività statistica.\n\
        - modelli introduttivi di programmazione intera\n- cenni alle tecniche di\
        \ risoluzione meta/mat-euristiche\n  I contenuti tecnologici saranno funzionali\
        \ all'implementazione pratica del modulo citato, che sarà realizzato standalone\
        \ in python, anche se sono accettabili altri ambienti e architetture.\n  Una\
        \ soluzione completa sarà realizzata in aula e completata autonomamente da\
        \ ogni studente, e potrà costituire il progetto per l'esame."
      Testi/Bibliografia: Lucidi a cura del docente
      Metodi didattici: 'Il corso sarà tenuto in inglese, a meno che ognuno di voi
        non mi chieda diversamente.


        Insegnerò in laboratorio per quanto mi sarà consentito, al fine di garantire
        un''esperienza pratica dei metodi proposti. In ogni caso, gli studenti sono
        invitati a portare il proprio computer portatile per testare online gli elementi
        proposti.


        Gli algoritmi saranno codificati, a scelta degli studenti, in c# o python.
        Per l''analisi rapida dei dati si utilizzerà Excel.


        "In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning [ https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        ]".'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste nella
        presentazione di un progetto individuale che ogni studente completerà, relativo
        agli elementi introdotti durante il corso.


        Per gli studenti che hanno familiarità con la programmazione, il progetto
        comprenderà competenze sia scientifiche che tecnologiche, che verranno verificate
        attraverso la presentazione. Il progetto potrebbe consistere in una soluzione
        informatica unitaria che includa la maggior parte degli elementi introdotti
        durante il corso. L''argomento specifico sarà suggerito dai candidati. Soluzioni
        molto complesse possono essere sviluppate in gruppi di massimo due studenti,
        previa mia approvazione esplicita. La soluzione proposta deve essere in grado
        di funzionare sulle macchine dei laboratori, e quindi anche sul mio server
        del corso.


        In genere, se non diversamente concordato, il progetto sarà una soluzione
        in python. Non sono accettati notebook jupyter, e solo pandas, numpy, matplotlib
        e le librerie utilizzate nei lucidi come librerie aggiuntive, a meno che non
        siano state concordate esplicitamente librerie ulteriori.


        Gli studenti con limitate eperienze precedenti di programmazione, potrenno
        presentare in dettaglio casi di studio complessi e significativi dal punto
        di vista economico, cui verranno applicati gli stessi algoritmi visti a lezione..


        La partecipazione attiva alle lezioni darà diritto a bonus specifici, l''utilizzo
        di comuni dataset scaricati da internet cui vengono applicati solo semplici
        algoritmi predittivi limiterà il punteggio massimo ottenibile.'
      Strumenti a supporto della didattica: I lucidi delle lezioni saranno scaricabili
        prima della lezione corrispondente.
      Orario di ricevimento: Consulta il sito web di Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo)
  en:
    title: 2025/2026 Operational Analytics — University of Bologna
    contents:
      Learning outcomes: Operational analytics, a specific type of business analytics,
        is focused on the analysis of business processes to the end of creating competitive
        advantage by means of operational data analysis and of the application of
        analytical algorithms. The course concentrates on the algorithmic side, specifically
        presenting predictive analytical techniques, forecasting future data on the
        basis of available time series, and prescriptive analytical techniques, defining
        optimized usage of available resources. Real world cases will be studied and
        used as testbed for self-developed systems.
      Course contents: "The course is part of a data science curriculum and provides\
        \ some tools for predicting short/medium-term management data (predictive\
        \ analytics) and optimizing scarce resource allocation processes based on\
        \ predicted data (prescriptive analytics). Elements of predictive analytics\
        \ and heuristic optimization will be presented and integrated.\nFor the predictive\
        \ part, the course proposes methodologies and techniques for analyzing, modeling\
        \ and predicting univariate time series, with hints of multivariate ones.\
        \ It will be shown, compatibly with the available time, that forecast data\
        \ can be elements of mathematical models of management processes in which\
        \ to optimize the allocation of scarce resources.\nThe proposed tools are\
        \ meant to be used in real business application cases, actual case studies\
        \ will be shown compatibly with time, and/or demanded to final projects.\n\
        The scientific content of the course relates to the knowledge needed to develop\
        \ an operational analysis module on data obtained from a business information\
        \ system. Specifically, the following will be presented\n\n- brief summary\
        \ of stochastic models, random variables. probability distributions\n- predictive\
        \ models: statistical (ARMA, ARIMA, SARIMA), neural (MLP, LSTM, perhaps SVR\
        \ if time permits) and machine learning/decision tree models (ensemble, random\
        \ forest, boosting)\n- performance indicators, descriptive statistics, statistical\
        \ significance tests.\n- introductory integer programming models\n- hints\
        \ to meta/math-heuristic solving techniques\n  The technological contents\
        \ will be functional to the practical implementation of the mentioned module,\
        \ which will be done standalone in python, although other environments and\
        \ architectures are acceptable.\n  A full solution will be set up in the classroom\
        \ and completed independently by each student, and may constitute the project\
        \ for the exam."
      Readings/Bibliography: Lecture slides.
      Teaching methods: 'The course will be offered in English, unless each and everyone
        of you asks me otherwise.


        I will teach in the lab as much as I will be allowed to, in order to ensure
        hands-on experience of the proposed methods. Anyway, students are encouraged
        to bring their own laptop for online testing of the proposed elements.


        The algorithms will be coded, following the students'' choice, in c# or python.
        Excel will be used for quick and dirty data analysis.


        “"In view of the type of activities and teaching methods adopted, the attendance
        of this training activity requires the prior participation of all students
        in Modules 1 and 2 of safety training in the workplace, in e-learning mode
        [ https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        ]”.'
      Assessment methods: 'The exam consists of the presentation of an individual
        project that each student will complete, related to the elements introduced
        during the course.


        For students familiar with programming, the project will include both scientific
        and technological skills, which will be verified through the presentation.
        The project consists of a unified computer solution that includes most of
        the elements introduced during the course. The specific topic will be suggested
        by the candidates. Very complex solutions may be developed in groups of up
        to two students, subject to my explicit approval. The proposed solution must
        be able to run on the machines in the labs, and thus also on my course server.


        Generally, unless otherwise agreed, the project will be a python solution.
        No jupyter notebooks are accepted, and only pandas, numpy, matplotlib and
        the libraries used in the transparencies can be included as additional libraries,
        unless otherwise is explicitly agreed upon.


        Students with limited previous programming eperience will be able to present
        complex and economically significant case studies in detail, to which the
        same algorithms seen in lecture will be applied..


        Active participation in lectures will entitle one to specific bonuses. The
        use of common datasets downloaded from the internet, to which only simple
        forecasting algorithms are applied, will limit the maximum score obtainable.'
      Teaching tools: Lecture slides will be downloadable before the corresponding
        lecture.
      Office hours: See the website of Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo/en)
