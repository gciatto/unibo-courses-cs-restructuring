  name: ELEMENTI DI INFORMATICA
integrated_course: ''
campus: Bologna
programme: Laurea in Astronomia
syllabus:
  it:
    title: 2025/2026 ELEMENTI DI INFORMATICA (6 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente acquisisce
        i principi di base dei moderni sistemi di calcolo e della programmazione,
        utilizzando un linguaggio di alto livello per la soluzione numerica di semplici
        problemi fisici.
      Contenuti: 'Modulo 1:


        Strumenti computazionali e problem solving, conoscenza dichiarativa ed imperativa.
        I linguaggi di programmazione. Interpreti e compilatori. Il ruolo del debugging.

        Linguaggi per script. L''interprete Python. Introduzione alla programmazione
        in Python. Variabili, espressioni e comandi; approfondimento sulla rappresentazione
        dei numeri nei calcolatori e approccio seguito da Python; Funzioni, condizionali
        e ricorsione; Iterazione; Tipi di dati; Tabelle; come esportare dati il formato
        csv; creazione di fogli elettronici; Strutture dati offerte da Python e tipi
        di dato definiti dall''utente. Cenni sulla programmazione ad oggetti e relativa
        notazione.


        Modulo 2:


        Gestione ed utilizzo di librerie Python, con approfondimento su librerie grafiche
        e scientifico/numeriche. Introduzione all''analisi ed esplorazione di cataloghi
        di dati; lettura e scrittura di cataloghi in diverso formato (ascii, fits);
        selezione di campioni e studio di correlazioni. Cenni di statistica e di modellizzazione
        dei dati. Utilizzo della programmazione in ambito astronomico.'
      Testi/Bibliografia: 'How to Think Like a Computer Scientist: Learning with Python,
        di Allen Downey, Jeff Elkner e Chris Meyers. Gree Tea Press (disponibile in
        rete: https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf).'
      Metodi didattici: 'Lezioni frontali ed esercizi in classe.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        due prove: un esame scritto dove vengono proposti da uno a tre esercizi di
        programmazione in Python composti in totale da 3-5 funzioni Python da realizzare
        con carta e penna; e un esame orale che riguarda la discussione un progetto
        su temi di analisi di un campione di dati astrofisici.


        L''esame prevede un voto in 30esimi. Il voto finale è la media delle due prove
        entrambe valutate in 30esimi. Per essere ammessi all''esame orale è necessario
        superare lo scritto (con voto maggiore o uguale a 18). Il voto dello scritto
        e/o quello finale può essere rifiutato al massimo due volte.


        Relativamente allo scritto verrà valutata la capacità di programmare acquisita
        dallo studente. La durata dello scritto è di circa 90 minuti e potrà variare
        lievemente a seconda della difficoltà degli esercizi proposti. Si seguirà
        la seguente graduazione dei voti a seconda del numero di funzioni da realizzare:
        Almeno una funzione realizzata corretta: 18-19. Più di una funzione realizzata
        corretta ma con più funzioni errate o mancanti: 20-24. Una funzione mancante
        o tutte le funzioni realizzate ma con presenza di errori in alcune di esse:
        25-29. Tutte le funzioni corrette: 30-30L.


        L''esame orale ha una durata di circa 30-40 minuti. Ogni progetto è singolo
        e personale, e per accedere all''esame è necessario inviare il codice sviluppato
        al docente del Modulo 2 una settimana prima dello svolgimento dell''orale.
        Durante l''esame vengono posti alcuni quesiti relativi al codice sviluppato
        ed agli argomenti affrontati a lezione nel Modulo 2, per verificare l''apprendimento
        e la conoscenza delle metodologie informatiche discusse a lezione e svolte
        durante le esercitazioni in Laboratorio. La prova comporta un voto espresso
        in trentesimi con la seguente gradazione del voto finale: 18-20: preparazione
        appena sufficiente e comprensione degli elementi di programmazione in python
        estremamente ridotta, 21-23: preparazione molto limitata e ridotta comprensione
        degli elementi di programmazione in python, 24-26: preparazione intermedia
        e moderata comprensione degli elementi di programmazione in python, 27-29:
        preparazione ampia, ma non completa, comprensione degli elementi di programmazione
        in python buona/molto buona, 30-30L: preparazione completa e comprensione
        degli elementi di programmazione in python ottime/eccellenti.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: lavagna + videoproiettore + computer
      Orario di ricevimento: 'Consulta il sito web di Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari)


        Consulta il sito web di Michele Ennio Maria Moresco (https://www.unibo.it/sitoweb/michele.moresco)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Elements of Informatics (6 CFU) — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student has a basic understanding
        of computational tools and terminology. He is able to: - use programming languages
        to write small scale programs; - understand programs written by others; -
        map simple physical problems into computational solutions.'
      Course contents: 'Module 1:


        Computational tools and problem solving. Declarative and Imperative knowledge.
        High level programming languages and tools. Interpreters and Compilers. The
        role of debugging.

        Scripting Languages. The Python interpreter. Computer programming in Python.

        Variables expressions, and statements; signed number representation and the
        approach of Python. Functions, conditionals and recursion; Iteration; Data
        types; Tables; Exporting data in csv files; spreadsheet creation; Python built-in
        data types and basic

        Object Oriented Programming concepts and notation.


        Module 2:


        Python modules focusing on graphical and scientific/numerical ones; Analysis
        and browsing of data catalogs using different formats (ascii, fits); Sample
        selection and correlation analysis; Statistical methods for data modelling;
        solving astronomical problems.'
      Readings/Bibliography: 'How to Think Like a Computer Scientist: Learning with
        Python, di Allen Downey, Jeff Elkner e Chris Meyers. Gree Tea Press (disponibile
        in rete: https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf).'
      Teaching methods: 'Lectures and class exercises.


        Considering the teaching methods adopted for this activity, passing modules
        1 and 2 of our security courses available at [https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas]
        is mandatory for attending the lectures.'
      Assessment methods: 'The exam consists of two parts: a written test, which includes
        one to three Python programming exercises comprising a total of 3 to 5 functions
        to be implemented by hand (using pen and paper); and an oral exam, which involves
        the discussion of a project on the analysis of a sample of astrophysical data.


        The exam is graded on a 30-point scale. The final grade is the average of
        the two components, both evaluated out of 30. To be admitted to the oral exam,
        students must pass the written test with a grade of 18 or higher. The grade
        from the written exam and/or the final grade may be declined a maximum of
        two times.


        For the written exam, the test will evaluate the student''s programming abilities
        and will last approximately 90 minutes, with slight variations depending on
        the difficulty of the exercises. Marks will be awarded according to the following
        criteria based on the number of correctly implemented functions: At least
        one correct function implemented: 18–19. More than one correct function, but
        with several incorrect or missing functions: 20–24. One missing function,
        or all functions implemented but some with errors: 25–29. All functions correct:
        30–30L.


        The oral exam lasts approximately 30–40 minutes. Each project is individual
        and personal. To take the exam, students must submit the developed code to
        the Module 2 instructor one week prior to the oral examination. During the
        exam, students will be asked questions about the code they developed, as well
        as topics covered in Module 2 lectures. The aim is to assess the student''s
        understanding and knowledge of the informatics methodologies discussed in
        class and practiced during lab sessions.


        The exam is graded on a 30-point scale, with the following grade ranges: 18–20:
        Barely sufficient preparation and very limited understanding of Python programming
        concepts. 21–23: Very limited preparation and reduced understanding of Python
        programming concepts. 24–26: Intermediate preparation and moderate understanding
        of Python programming concepts. 27–29: Broad, though not complete, preparation
        and good/very good understanding of Python programming concepts. 30–30L: Complete
        preparation and excellent understanding of Python programming concepts.


        Students with learning disabilities or temporary or permanent disabilities:
        please contact the relevant University office promptly (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ). The office will advise students of possible adjustments, that will be submitted
        to the professor for approval 15 days in advance. He/she will evaluate their
        suitability also in relation to the academic objectives of the course.'
      Teaching tools: whiteboard + video projector + laptop
      Office hours: 'See the website of Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari/en)


        See the website of Michele Ennio Maria Moresco (https://www.unibo.it/sitoweb/michele.moresco/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
