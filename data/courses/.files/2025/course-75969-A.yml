syllabus:
  it:
    title: 2025/2026 INFORMATICA DI BASE (1) (A-L) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i concetti teorici basilari dell'informatica, apprende i principi di funzionamento
        dei sistemi software illustrati e comprende il lessico tecnico base della
        disciplina. Acquisisce competenze applicative basilari sui problemi connessi
        a progettazione e produzione di sistemi multimediali in particolare in ambiente
        Web.
      Contenuti: 'Il corso è strutturato in una serie di 15 lezioni, che includono
        sia momenti di approfondimento teorico, sia sessioni di tutorial sui temi
        del corso. Le lezioni di approfondimento teorico sono contestualizzate storicamente
        e presentate introducendo i personaggi rilevanti per l''argomento trattato.
        Gli argomenti di queste lezioni sono:


        - Le tecnologie informatiche nelle scienze umane

        - Progetti digitali relativi a studi sulle scienze umane

        - Markup ed edizioni digitali

        - Collezioni di dati

        - Computer, pensiero computazionale e strutture dati [personaggi storici:
        Charles Babbage]

        - Che cos’è un computer?

        - Pensiero computazionale

        - Strutture dati

        - Algoritmi e computabilità [personaggi storici: Ada Lovelace e Alan Turing]

        - Usi possibili della Macchina Analitica

        - Cos’è un algoritmo?

        - Diagrammi di flusso

        - Il nostro primo algoritmo

        - Ci sono limiti alla computazione?

        - Linguaggi di programmazione [personaggi storici: Noam Chomsky e Grace Hopper]

        - Che cos’è un linguaggio?

        - I linguaggi di programmazione

        - Linguaggi visuali

        - Cosa succede quando si clicca un un link: Il World Wide Web [personaggi
        storici: Vannevar Bush, Ted Nelson, Douglas Engelbart, e Tim Berners-Lee]

        - Introduzione

        - La nascita degli ipertesti

        - L''invenzione del World Wide Web

        - Uniform Resource Locator (URL)

        - I browser: cosa sono e a cosa servono

        - Cosa succede quando si clicca un un link: I protocolli di comunicazione
        [personaggi storici: Tim Berners-Lee]

        - Introduzione

        - Che cos’è un protocollo di comunicazione

        - Come funziona l’Hypertext Transfer Protocol (HTTP)

        - Che cos’è un server web

        - Cosa succede quando si clicca un un link: Internet [personaggi storici:
        Joseph Carl Robnett Licklider]

        - Introduzione

        - La nascita di Internet

        - Pacchetti di comunicazione

        - Che cos’è l’Internet Protocol (IP)

        - Domain Name Server (DNS) e router

        - Cosa succede quando si clicca un un link: Trasferire informazioni su Internet
        [personaggi storici: Claude Shannon, Vinton Cerf, e Robert Kahn]

        - Introduzione

        - Byte e bit: unità di informazione

        - Che cos’è il Transmission Control Protocol (TCP)

        - Altri protocolli usati su Internet

        - Scenario completo di richiesta di una pagina web

        - Cosa succede quando si clicca un un link: Le pagine web

        - I linguaggi di markup

        - Hypertext Markup Language (HTML): cenni storici

        - Elementi HTML principali

        - Separazione tra markup e presentazione: i CSS


        Le sessioni di tutorial, invece, riguarderanno specifici aspetti relativi
        a ricerche in ambito umanistico mediate da tecnologie digitali e computazionali.


        Le date di tutte le lezioni sopra sono indicate nella sezione "Calendario"
        del repository GitHub del corso (https://github.com/basic-inf/2025-2026/#calendario).


        Studenti/sse con DSA o disabilità temporanee o permanenti: si suggerisce di
        mettersi subito in contatto con l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it)
        e con il/la docente, per cercare insieme le strategie più efficaci nel seguire
        le lezioni e/o nel preparare l’esame.'
      Testi/Bibliografia: Il materiale delle lezioni, incluse le note scritte dal
        docente e le slide, verrà messo a disposizione sulla piattaforma Virtuale
        (https://virtuale.unibo.it/) di Ateneo degli studenti prima dell'inizio del
        corso. Tutto il materiale fornito sarà in italiano. Lo studio del solo materiale
        fornito è sufficiente per il superamento a pieni voti dell'esame sia per studenti
        frequentanti sia per studenti non frequentanti. Inoltre, tutti i link relativi
        al materiale del corso saranno altresì disponibili sul repository GitHub (https://github.com/basic-inf/2025-2026/)
        dedicato al corso.
      Metodi didattici: Il corso è organizzato in 15 lezioni, in presenza con il docente
        e alcuni esperti che verranno via via invitati, di introduzione dei vari argomenti
        del corso, che andranno approfonditi tramite lavoro individuale sugli ambienti
        di e-learning messi a disposizione dal docente. Ogni lezione in presenza verterà
        su uno degli argomenti indicati nel programma.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica finale è
        organizzata in una prova che prevede un test con domande. Ogni prova è compista
        da 33 domande a risposta multipla. Ogni domanda risposta correttamente vale
        1 punto, mentre una domanda non risposta o risposta in modo sbagliato vale
        0 punti. Ogni appello d''esame è composto da più turni di un''ora ciascuno.
        All''interno di un turno, lo studente ha 45 minuti di tempo per completare
        l''esame.


        Il voto dell''esame equivale al numero di risposte corrette. Se il numero
        di domande risposte correttamente è superiore a 30, il relativo voto è 30
        e lode. In particolare:


        - valutazione eccellente (voto superiore a 26): tutti gli argomenti del corso
        sono stati compresi a fondo, sia la parte teorica sia la parte dedicata al
        pensiero computazionale;

        - valutazione sufficiente (voto tra 18 e 26): molti argomenti del corso sono
        stati compresi in modo appropriato, seppur ci siano alcune carenze relativamente
        ad alcuni aspetti teorici e/o nella parte dedicata al pensiero computazionale;

        - valutazione insufficiente (voto minore di 18): la comprensione degli argomenti
        del corso, sia quelli teorici sia quelli relativi al pensiero computazionale,
        presenta molte carenze e risulta non sufficiente.


        L''esame individuale verterà sui medesimi contenuti sia per gli studenti frequentanti
        sia per gli studenti non frequentanti.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni,
        all’approvazione del/la docente, che ne valuterà l''opportunità anche in relazione
        agli obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: 'La didattica si svolgerà in 15 lezioni
        in presenza in aula, che verranno supportate dall''utilizzo di uno o più ambienti
        di e-learning. Il docente si avvale della collaborazione di tutor.


        È possibile comunicare direttamente con il docente o il tutor tramite e-mail.'
      Link ad altre eventuali informazioni: https://github.com/basic-inf/2025-2026/
      Orario di ricevimento: Consulta il sito web di Silvio Peroni (https://www.unibo.it/sitoweb/silvio.peroni)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Basic Informatics (1) (A-L) — University of Bologna
    contents:
      Learning outcomes: At the end of this course, the student will have a basic
        knowledge of computer science, having learned the working principles of software
        systems, and understanding the technical lexicon of the discipline. The student
        will also grasp the fundamental concepts about design and implementation of
        multimedia systems, especially in World Wide Web environment.
      Course contents: 'The course is organised in 15 lectures, including theoretical
        and laboratory sessions. For each theoretical lecture, it is provided an historical
        context and some of the most relevant people, according to the topic of the
        lecture, are introduced. The topics of these lectures are:


        - Computer science technologies in the Humanities

        - Digital projects on Humanities studies

        - Markup and digital editions

        - Data collections

        - Computer, computational thinking and data structures [historic people: Charles
        Babbage]

        - What is a computer?

        - Computational thinking

        - Data structures

        - Algorithms and computability [historic people: Ada Lovelace and Alan Turing]

        - Uses of the Analytical Machine

        - What is an algorithm

        - Flowcharts

        - Our first algorithm

        - Are there limits to computation?

        - Programming languages [historic people: Noam Chomsky and Grace Hopper]

        - What is a language?

        - Programming languages

        - Visual languages

        - What it happens when we click on a link: the World Wide Web [historic poeple:
        Vannevar Bush, Ted Nelson, Douglas Engelbart, and Tim Berners-Lee]

        - Introduction

        - The birth of the hypertexts

        - The creation of the World Wide Web

        - Uniform Resource Locator (URL)

        - The browsers: what they are and why they are useful

        - What it happens when we click on a link: communication protocols [historic
        people: Tim Berners-Lee]

        - Introduction

        - What is a communication protocol?

        - How the Hypertext Transfer Protocol (HTTP) works

        - What is a web server?

        - What it happens when we click on a link: the Internet [historic people:
        Joseph Carl Robnett Licklider]

        - Introduction

        - The birth of the Internet

        - Communication packets

        - What is the Internet Protocol (IP)?

        - Domain Name Server (DNS) and the router

        - What it happens when we click on a link: Transferring information over the
        Internet [historic people: Claude Shannon, Vinton Cerf, and Robert Kahn]

        - Introduction

        - Byte and bit: unit of information

        - What is the Transmission Control Protocol (TCP)?

        - Other protocols used on the Internet

        - Full scenario describing a request of a webpage

        - What it happens when we click on a link: The webpages

        - Markup languages

        - Hypertext Markup Language (HTML): a brief narration

        - Main HTML elements

        - Separation between markup and presentation: the CSS


        The tutorials, instead, will address specific aspect related to research in
        the humanities mediated by the use of digital and computational technologies.


        The dates and times of all the lectures and the tutorials are available in
        the section "Calendario" of the GitHub repository of the course (https://github.com/basic-inf/2025-2026/#calendario).


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en)
        immediately and agree with the teacher the most effective strategies for attending
        the lectures and preparing for the exam.'
      Readings/Bibliography: The lecture material, including the lecture notes written
        by the professor and the related slides, will be made available on the platform
        Virtuale (https://virtuale.unibo.it/) before the beginning of the course.
        All the material provided will be in Italian. Studying the material is sufficient
        for passing the exam with the maximum score, independently for having attended
        or not attended the lectures. In addition, all the links related to the course
        material will be made available in the GitHub repository (https://github.com/basic-inf/2025-2026/)
        of the course.
      Teaching methods: The course is structured in 15 lectures with the professor
        and invited speakers, where he will introduce the topics of the course. The
        topics must be approprately studied individually using the e-learning environments
        shared by the professor. Each lecture with the professor will be about on
        one of the topics of the programme.
      Assessment methods: 'The final exam is structured in one test with questions.
        Each test is composed by 33 questions with multiple answers. Each quesion
        answered correctly scores 1, while a question not answered or answered incorrectly
        scores 0. Each exam session is organised in multiple turns of one hour each.
        Within a turn, the student has 45 minutes to complete the test.


        The final score is the number of correct answers. If such a number is greater
        than 30, the score is 30 cum laude. In particular:


        - excellent evaluation (final score greater than 26): reaching an in-depth
        knowledge of all the course topics, including the theoretical part and the
        computational thinking part;

        - sufficient evaluation (final score between 18 and 26): reaching an appropriate
        knowledge of several course topics, even if there are still a lack in some
        aspects related to either the theoretical part or the computational thinking
        part (or both);

        - insufficient evaluation (final score lesser than 18): the knowledge of the
        course topics, considering both the theoretical part and the computational
        thinking part, is not appropriate.


        The content of the exam will be the same for all students, independently for
        having attended or not attended the lectures.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en)
        in advance. The office will be responsible for proposing adaptations to interested
        students. Such adaptations must be submitted to the teacher for approval at
        least 15 days before the exam session. The teacher will also evaluate the
        adaptations regarding the training objectives of teaching.'
      Teaching tools: 'The teaching will be held in 15 lectures in a classroom, and
        will be supported by one or more e-learning environment made available. The
        professor works in collaboration with a tutor.


        It is possible to communicate directly with either the professor or the tutor
        via e-mail.'
      Links to further information: https://github.com/basic-inf/2025-2026/
      Office hours: See the website of Silvio Peroni (https://www.unibo.it/sitoweb/silvio.peroni/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
