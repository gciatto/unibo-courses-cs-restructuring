course_title:
  id: '97467'
  name: BIG DATA ANALYTICS FOR AUTOMOTIVE MANUFACTURING APPLICATIONS
integrated_course: ''
campus: Bologna
programme: Laurea Magistrale in Advanced Automotive Engineering Laurea Magistrale
  in Automation Engineering
syllabus:
  it:
    title: 2025/2026 BIG DATA ANALYTICS FOR AUTOMOTIVE MANUFACTURING APPLICATIONS
      — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of Module 1, the student has
        a complete understanding of the basic algorithms used to process large amounts
        of data and extract useful information, as well as of the software frameworks
        used for data analytics. In Module 2, the student learns the structure and
        architecture of computing systems used for processing of data in both large-scale
        (high-performance and cloud) and small-scale (embedded) contexts, with particular
        emphasis on GPUs and their applications.
      Contenuti: 'Algorithms (module 1):


        - Introduction to Python: packages for data processing and visualization

        - Data analytics: linear algebra for machine learning, basic of statistics
        and signal transformation

        - Basics of machine learning: autoregressive models, clustering, classification
        problem, base of neural networks, autoencoders

        - Dimensionality reduction, basis of linear algebra with high dimension

        - Streaming algorithms: basic streaming algorithms for feature extraction,
        streaming approaches for the PCA/PSA problem.


        Architectures (module 2):


        - Recap of basic computer architecture: from high-level languages to Instruction
        Set Architecture; memory hierarchy; in-order processors. Evaluating computers:
        latency and throughput, memory bandwidth, energy efficiency metrics.

        - High-performance cache hierarchy: direct mapping & associative caches. Miss
        rate and penalty. Write-through and write-back caches.

        - High-performance processors: branch prediction, out-of-order execution,
        speculation (main concepts).

        - Vector and SIMD processing.

        - Multi-cores: shared-memory and distributed parallel computing.

        - Large-scale computing systems: warehouse and streaming computing; brief
        notes on storage and networking.'
      Testi/Bibliografia: 'Main suggested reading for module 1:


        Outlier Analysis

        Charu C. Aggarwal

        Springer (2nd edition, 2017)


        Deep Learning

        Ian Goodfellow, Yoshua Bengio, Aaron Courville

        MIT Press (2016)


        Main suggested readings for module 2:


        Computer Architecture: a Quantitative Approach

        John L. Hennessy, David A. Patterson

        Morgan Kaufmann (2017)


        The Datacenter as a Computer: Designing Warehouse-Scale Machines

        Luiz A. Barroso, U. Holzle, P. Ranganathan

        Morgan & Claypool Publishers (3rd edition)


        Basic programming skills (Python / C) are mandatory for the course. Students
        that have not followed a basic computer architecture course are strongly encouraged
        to read preliminarily:


        Computer Organization and Design RISC-V Edition: The Hardware Software Interface

        David A. Patterson, John L. Hennessy

        Morgan Kaufmann (2017)'
      Metodi didattici: Frontal lectures + laboratory exercises with own laptop.
      Modalità di verifica e valutazione dell'apprendimento: Learning is assessed
        by means of a joint written exam for the two modules on the topics discussed
        during the frontal lectures.
      Strumenti a supporto della didattica: 'Annotated slides and additional teaching
        materials available online.


        All materials will be shared by means of the official Virtuale site of the
        course.'
      Orario di ricevimento: 'Consulta il sito web di Mauro Mangia (https://www.unibo.it/sitoweb/mauro.mangia)


        Consulta il sito web di Leandro De Souza Rosa (https://www.unibo.it/sitoweb/leandro.desouzarosa)'
