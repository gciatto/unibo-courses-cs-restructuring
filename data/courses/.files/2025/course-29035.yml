syllabus:
  it:
    title: 2025/2026 LABORATORIO DI ARCHITETTURE E PROGRAMMAZIONE DEI SISTEMI ELETTRONICI
      INDUSTRIALI T-A — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente è introdotto
        alla progettazione hardware-software di sistemi elettronici programmabili
        per applicazioni industriali.
      Contenuti: 'Introduzione al corso


        - Introduzione ai sistemi embedded

        - Introduzione ai microcontrollori

        - Introduzione all''ambiente di sviluppo (CubeIDE)


        Panoramica e dettagli sull''architettura ARM Cortex M4–CORE e sui suoi elementi
        principali


        - Instruction Set Architecture e micro-architettura

        - Interrupts

        - Programmer''s model

        - Register File


        Analisi delle principali connessioni del Core ARM con le periferiche del microcontrollore


        - AMBA Bus AHB e APB

        - Memorie

        - DMA


        Analisi dettagliata di architettura, configurazione e funzionamento delle
        periferiche di un microcontrollore STM32, con esercitazioni e dimostrazioni
        di tecniche di debug avanzato


        - GPIO

        - SPI,

        - UART,

        - Timers

        - Analog to Digital Converter


        Estensioni delle funzionalita DSP, librerie CMSIS e ottimizzazione del codice.


        - DSP e Floating Point Unit

        - CMSIS Library

        - Code optimization'
      Testi/Bibliografia: '- The Definitive Guide to ARM Cortex-M3 and Cortex-M4 Processors,Joseph
        You (available online in PDF)

        - The Designer’s Guide to the Cortex-M Processor Family,Trevor Martin (available
        online in PDF)'
      Metodi didattici: L’insegnamento viene erogato mediante lezioni frontali in
        presenza che vengono svolte con l’ausilio di mezzi audiovisivi (presentazioni
        in Power Point) ed esercitazioni pratiche di laboratorio, svolte in presenza
        operando in piccoli gruppi. La frequenza alle lezioni frontali in presenza
        non è obbligatoria. L’insegnamento è erogato in lingua italiana.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica si basa
        sulla valutazione di un progetto assegnato durante l''ultima esercitazione
        e su una prova orale, secondo le modalità di un colloquio tra Docente ed esaminando/a
        di durata approssimativa di 30 minuti nell’arco dei quali al/la candidato/a
        verranno proposte tendenzialmente tre domande, con grado di approfondimento
        (e difficoltà) crescente e su diverse aree del programma. Il progetto puo’
        essere consegnato una volta sola e rimane valido per tutto l’Anno Accademico.
        Gli esami orali si svolgono nell’arco del calendario didattico dell’offerta
        formativa e per ogni appello lo/a studente/essa che intenda sostenerlo dovrà
        iscriversi utilizzando la piattaforma online


        Il voto è espresso in trentesimi ed è necessario ai fini di superamento dell’esame
        il raggiungimento della soglia di 18/30.'
      Strumenti a supporto della didattica: Slides, libri di testo e letture consigliate
        durante le lezioni.
      Orario di ricevimento: Consulta il sito web di Angelo Garofalo (https://www.unibo.it/sitoweb/angelo.garofalo)
  en:
    title: 2025/2026 Electronic Industrial Systems Architecture and Programming Laboratory
      T-A — University of Bologna
    contents:
      Course contents: 'ntroduction to embedded systems


        Introduction to microcontrollers


        Introduction to the development environment (CubeIDE)


        Overview and details of the ARM Cortex M4-CORE architecture and its main elements


        - Instruction Set Architecture and Assembly

        - Pipeline

        - Interrupt

        - Programmer''s model

        - Register file


        Analysis of the main ARM Core connections with microcontroller peripherals


        - AMBA Bus AHB and APB

        - Memories

        - DMA


        Detailed analysis of the architecture, configuration, and operation of the
        peripherals of a STM32 microcontroller, with exercises and demonstrations
        of advanced debugging techniques


        - GPIO

        - SPI,

        - UART,

        - Timers

        - Analog to Digital Converter


        DSP feature extensions, CMSIS libraries and code optimization.


        - DSP and Floating-Point Unit

        - CMSIS Library

        - Code optimization'
      Readings/Bibliography: '- The Definitive Guide to ARM Cortex-M3 and Cortex-M4
        Processors,Joseph You (available online in PDF)-

        - The Designer''s Guide to the Cortex-M Processor Family,Trevor Martin (available
        online in PDF)'
      Teaching methods: The course is delivered through class lectures that are carried
        out with the aid of audiovisual media (Power Point presentations) and practical
        laboratory exercises, carried out in presence working in small groups. Attendance
        to face-to-face lessons is not compulsory. The course is given in Italian
        language.
      Assessment methods: 'The verification is based on the evaluation of a project
        assigned during the last exercise and on an oral test, according to the modalities
        of an interview between the teacher and the student, lasting approximately
        30 minutes, during which the candidate will be asked three questions, with
        increasing depth (and difficulty) and on different areas of the program. The
        project can be handed in only once and remains valid for the whole academic
        year. Oral exams take place during the educational calendar and for each exam
        the student who intends to take it must register using the online platform


        The grade is expressed in thirtieths,and it is necessary to reach the threshold
        of 18/30 in order to pass the exam.'
      Teaching tools: Slides, textbook and suggested readings during the lessons.
      Office hours: See the website of Angelo Garofalo (https://www.unibo.it/sitoweb/angelo.garofalo/en)
