syllabus:
  it:
    title: Piani didattici — Collegio Superiore
    contents:
      Conoscenze e abilità da conseguire: Il corso si propone di presentare i principi
        alla base delle mnemotecniche associative, nonché di guidare gli studenti
        nello sviluppo delle capacità per il loro utilizzo. Queste tecniche potranno
        poi essere utilizzate in vari contesti, tra cui quelli delle metodologie di
        studio. Il corso, quindi, oltre a fornire un "sapere", cioè una conoscenza
        di concetti, ha come obiettivo primario quello di guidare gli studenti in
        un "saper fare", cioè supportare gli studenti nello sviluppo di capacità effettive,
        e strategie efficaci, di utilizzo delle proprie risorse.
      Programma/Contenuti: 'Come facevano gli antichi retori romani ad organizzare
        e ricordare le proprie orazioni? Se ci fossimo imbattuti in Cicerone, gli
        avremmo scorto, magari nascosti, gli appunti del proprio discorso? Molto probabilmente
        no! Di fatti, come lo stesso Cicerone riporta nel suo "De Oratore", l''orazione
        veniva memorizzata con una tecnica specifica.


        Partendo dai principi cardine del funzionamento della memoria associativa,
        il corso presenta un''introduzione alle mnemotecniche, aggiornate ai giorni
        moderni, che nel corso dei secoli hanno coadiuvato e strutturato lo studio,
        il pensiero, e la creatività di numerosi pensatori, filosofi e scienziati.


        Tra gli argomenti presentati:


        - Modello di Atkinson e Shiffrin del funzionamento della memoria

        - Sistemi rappresentazionali, sottomodalità, e visualizzazione attiva

        - Breve storia delle tecniche

        - La memoria associativa e il PAV

        - Tecnica dei loci

        - Alfabeti visivi e correlati

        - Sistema maggiore (conversione fonetica)

        - Schedari mentali (base e avanzati)

        - Fotografia mentale

        - Applicazioni

        - Introduzione alle metodologie di studio: lettura attiva, schematizzazione
        (mappe concettuali e mentali), memorizzazione, ripassi'
      Testi/Bibliografia: 'Testi consigliati:


        - Bendin. Memoria Vincente. Anteprima Edizioni, 2018 (riedizione di: Bendin.
        Memoria Super. Mondadori, 1988/1990)

        - Dal Cin. Studiare con Metodo Fa la Differenza. Wide Edizioni, 2023


        Testi aggiuntivi (sulle tecniche):


        - Salvo. Il Segreto di una Memoria Prodigiosa. Nuova Ed. Gribaudo, 2019

        - Salvo. Studiare è un Gioco da Ragazzi. Gribaudo, 2014

        - Salvo. Metti il Turbo alla tua Mente con le Mappe Mentali. Gribaudo, 2022

        - I libri di Tony Buzan (purtroppo le edizioni italiane sono di difficile
        reperibilità, in quanto molte di esse sono fuori stampa)


        Testi aggiuntivi (sulla storia delle tecniche e la filosofia):


        - Rossi. Clavis Universalis. il Mulino, 2024 (riedizione dell''edizione del
        1983)

        - Yates. L''arte della Memoria. Einaudi, 2024 (riedizione dell''edizione del
        1972)'
      Metodi didattici: Lezioni frontali, ed esercitazioni guidate (individuali e
        in gruppo).
      Modalità di verifica dell'apprendimento: 'Prova teorico/pratica mirante alla
        verifica:


        - della conoscenza dei principi alla base della memoria associativa e delle
        tecniche di memoria proposte (area del "sapere"), e

        - della capacità di pianificare e attuare la memorizzazione di alcune informazioni
        (area del "saper fare").'
