syllabus:
  it:
    title: 2025/2026 SECURITY OF DATA AND NEURAL PROCESSING M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'The course provides a basic knowledge of
        the fundamental concepts, terminology and problems in cryptography as well
        as tools for assessing the security of data protection schemes commonly employed.

        It also provides high level requirements and design guidelines for typical
        blocks used in security-ensuring mechanisms.'
      Contenuti: '- Data security services

        - Symmetric Algorithms

        - Perfect Secrecy, Diffusion, and Confusion

        - Stream Ciphers: LFSR, Berlekamp-Massey Algorithm, CPRNG

        - Block Ciphers: AES, Modes of Operation

        - Asymmetric Algorithms

        - RSA

        - Cyclic Groups and DHKE

        - Digital Signature

        - Hash function

        - Post-Quantum Cryptography

        - Block-Chain

        - Security in Neural Networks'
      Testi/Bibliografia: 'Available on the platform Virtuale:


        - Lecture Notes

        - Scientific papers

        - Technical notes/specifications and standards publications


        Additional textbooks for reference


        - Boneh, Shoup, "A Graduate Course in Applied Cryptography" (available online
        cryptobook.us (https://toc.cryptobook.us/))

        - Smart, "Cryptography: An Introduction (3rd Edition)" (available online)

        - Rubinstein-Salzedo, "Cryptography", Springer, 2018 (available in the UniBO
        library)

        - Buchmann, "Introduction to Cryptography", Springer, 2001 (available in the
        UniBO library)'
      Metodi didattici: '- Class lectures with theory

        - Lab sessions'
      Modalità di verifica e valutazione dell'apprendimento: Written and oral exam
      Strumenti a supporto della didattica: 'Lecture notes, recommended readings.

        Python programming language.'
      Orario di ricevimento: Consulta il sito web di Alex Marchioni (https://www.unibo.it/sitoweb/alex.marchioni)
