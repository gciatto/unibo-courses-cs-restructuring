course_title:
  id: '70219'
  name: PROGRAMMAZIONE AD OGGETTI
integrated_course: ''
campi:
- Cesena
programmes:
- Laurea in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 PROGRAMMAZIONE AD OGGETTI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        le conoscenze di base del paradigma object-oriented per la costruzione del
        software, dei suoi principali pattern di progettazione, della sua incarnazione
        nel linguaggio di programmazione Java e relativo framework, includendo aspetti
        avanzati quali la gestione delle interfacce grafiche, del multi-threading,
        e degli eventi.
      Contenuti: "- Elementi base di programmazione e progettazione object-oriented\n\
        - Il caso del linguaggio Java: panoramica e tool di sviluppo\n- Funzionalità\
        \ base: Classi, oggetti, metodi, campi, istanziazione\n- Polimorfismo, ereditarietà\
        \ e riuso: interfacce e classi astratte\n- Aspetti avanzati: genericità, annotazioni,\
        \ eccezioni, classi\n  innestate, lambda expressions.\n- Librerie base per\
        \ la\n  costruzione di programmi\n- La gestione dell'I/O e della grafica\n\
        - Elementi di programmazione concorrente in Java\n- Cenno a pattern di\n \
        \ progettazione e tecniche di programmazione efficace\n- Strumenti di sviluppo:\
        \ JDK, VSCode, Git"
      Testi/Bibliografia: 'Testo di riferimento per il corso:

        Bruce Eckel. Thinking in Java -- Fourth Edition

        Testi aggiuntivi:

        Joshua Block. Effective Java -- Second Edition


        Erich Gamma, Richard Elm, Ralph Johnson, John Vlissides.

        Design Patterns

        Il corso si avvarrà anche di tutorial e documentazione tecnica

        disponibile in rete'
      Metodi didattici: '9 ore di lezione alla settimana, di norma 6 in aula e 3 in

        laboratorio.


        In aula vengono illustrate le tecniche di programmazione ad oggetti, i dettagli
        del linguaggio di programmazione Java, e vengono svolti esercizi stimolando
        la discussione critica con gli studenti.


        In laboratorio, vengono illustrati i vari tool di sviluppo, e vengono assegnati
        task di sviluppo per esercitare le capacità pratiche degli studenti.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica avviene
        in due fasi, non necessariamente ordinate:


        1. Prova pratica su programmazione Java in laboratorio. Attraverso 2 esercizi
        di programmazione Java, che includono test automatizzati o riguardano la produzione
        di semplici interfacce grafiche, si verifica la capacità dello studente di
        concludere in tempi brevi e con competenza un semplice task di programmazione/progettazione
        in Java.

        2. Colloquio orale con presentazione di un progetto. A gruppi di 3 persone
        circa, gli studenti realizzano un progretto di sviluppo software in Java,
        producendo una relazione che evidenzia requisiti, progrettazione e implementazione.
        La valutazione di tale relazione include il controllo di qualità della soluzione,
        e la discussione delle scelte progettuali.


        Ogni prova porta ad un punteggio compreso fra 0 e 33, e il voto finale è una
        media ponderata 60% (migliore dei due voti) - 40% (peggiore dei due voti).'
      Strumenti a supporto della didattica: 'Slide proiettate a lezione e pubblicate
        sul sito del docente

        in anticipo


        Software: Java Development Kit, VSCode'
      Orario di ricevimento: 'Consulta il sito web di Mirko Viroli (https://www.unibo.it/sitoweb/mirko.viroli)


        Consulta il sito web di Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini)


        Consulta il sito web di Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini)'
  en:
    title: 2025/2026 Object-Oriented Programming — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, students will be acquainted with

        basic knowledge of the object-oriented paradigm of software

        construction, of its basic design patterns, its incarnation in the

        Java programming language and the corresponding framework,

        including advanced aspects like GUIs, multi-threading and

        events.'
      Course contents: "- Basic elements of object-oriented programming and design\n\
        - The\n  case of the java programming language: overview and development\n\
        \  tools\n- Basic functionality: classes, objects, methods, fields, and\n\
        \  instantiation\n- Polimorphism, inheritance, reuse:: interfaces and\n  abstract\
        \ classes\n- Advanced aspects: generics, annotations,\n  exceptions, inner\
        \ classes, lambda expressions\n- Basic\n  libraries for program construction\n\
        - I/O management and graphical\n  interfaces\n- Elements of concurrency programming\
        \ in Java\n- Brief overview of design\n  patterns and techniques of effective\
        \ programming\n- Development\n  tools: JDK, VSCode, Git"
      Readings/Bibliography: 'Reference book:

        Bruce Eckel. Thinking in Java -- Fourth Edition

        Additional books:

        Joshua Block. Effective Java -- Second Edition


        Erich Gamma, Richard Elm, Ralph Johnson, John Vlissides.

        Design Patterns


        The course will also rely on tutorials and documentation

        available on the Internet.'
      Teaching methods: '9 hours of lesson per week, typically 6 in the teaching room
        and 3

        in the lab


        In room, we will illustrate object-oriented programming techniques and details
        of the Java programming language, and conduct exercises to stimulate a critical
        attitude in students.


        In lab, we illustrate various development tools, e assign developing tasks
        to exercise practical abilities of students.'
      Assessment methods: 'Assessment is conducted in two stages, not necessarily
        ordered:


        1. Practical test on Java programming in lab. With a couple of programming
        exercises in Java, including automated tests or pertaining the production
        of a simple graphical user interface, we assess the student''s capacity of
        concluding quickly and with pertinence a simple programming/designing task.

        2. Oral exam based on presentation of a project. In 3-persons teams, students
        realise a software development project in Java, producing documentation of
        requirements, design, and implementation. Assessment includes check of software
        quality and discussions of design choices.


        Each stage produces an evaluatation in the range [0,33], and the final evaluation
        is the weighted average of 60% (best of the two votes) - 40% (worst of the
        two votes).'
      Teaching tools: 'Slides projected during the lessons, published on the web

        site


        Software: Java Development Kit, VSCode'
      Office hours: 'See the website of Mirko Viroli (https://www.unibo.it/sitoweb/mirko.viroli/en)


        See the website of Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini/en)


        See the website of Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini/en)'
