course_title:
  id: '40720'
  name: DATA MINING
integrated_course: ''
campus: Cesena
programme: Laurea Magistrale in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 DATA MINING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente:

        -conosce le principali tecniche di data mining e text mining


        - conosce le metodologie di gestione e sviluppo di progetto

        - sviluppa competenze pratiche nella generazione, nell''analisi e interpretazione
        dei risultati mediante esercitazioni pratiche svolte con tool commerciali
        e/o open source.'
      Contenuti: 'Il corso è organizzato in due moduli di cui il primo è comune sia
        per gli studenti del CdS in Ingegneria e Scienze Informatiche (ISI), sia per
        gli studenti del CdD in Digital Transformation Management (DTM). Il secondo
        modulo è diverso per i due CdS.


        ------------ Modulo I: Data Mining (ISI + DTM)


        1. Introduzione al Data Mining: i possibili ambiti applicativi

        2. Il processo di scoperta della conoscenza


        - Progettare un processo di data mining

        - La metodologia CRISP-DM


        1. Comprendere e preparare i dati


        - Caratteristiche dei diversi tipi di dato

        - Esplorazione statistica dei dati

        - Qualità dei dati

        - Preprocessing: selezione e creazione degli attributi

        - Misurare la Similarità e dissimilarità tra i dati


        1. Le tecniche di data mining


        - Classificazione con alberi di decisione e reti bayesiane

        - Regole associative e sequeze

        - Clustering

        - Individuazione di anomalie (Outlier)


        1. Interpretazione e validazione dei risultati

        2. Il software Weka [http://www.cs.waikato.ac.nz/ml/weka/]

        3. Analisi di casi di studio


        ------------ Modulo II ISI: Text Mining (Prof. Gianluca Moro)


        1. Text Representation, Retrieval, Classificazione ed Opinion Mining

        2. Language Models, Transformers, Meccanismi di Attention Efficienti, Retrieval-augmented
        Generation con VectorDB

        3. Vision-Language Models, Graph Machine Learning e Metodi Neuro-simbolici
        per Trustworthy AI

        4. Large Language Model Generativi, Prompt Engineering, Metodi di Valutazione,
        Compressione e Quantizzazione, Parameter-Efficient Fine-Tuning (e.g. QLoRA,
        Prompt Tuning) e Large Action Models

        5. Laboratori su casi di studio reali - Text Summarization, Information Extraction,
        Chatbot e Function Call Generation etc. - con Python e strumenti open source:
        Hugging Face framework, LangChain, LlamaIndex, Milvus etc.


        ------------ Modulo II DTM: Machine Learning (Prof. Matteo Francia)


        1. Introduzione a reti neurali e Deep Learning

        2. Teoria e applicazione della metodologia CRISP-DM su casi reali


        - Acquisizione e comprensione dei dati

        - Preprocessing ed estrazione di feature

        - Modellazione

        - Valutazione e comprensione dei risultati'
      Testi/Bibliografia: '------------ Modulo I: Data Mining (ISI + DTM)


        Pang-Ning Tan, Michael Steinbach, Vipin Kumar Introduction to Data Mining.
        Pearson International, 2006.


        ------------ Modulo II ISI: Text Mining (Prof. Gianluca Moro)


        Il materiale didattico è fornito dal docente nel portale “virtuale“ del corso
        essendo l’area del Natural Language Processing in forte evoluzione. I riferimenti
        bibliografici seguenti sono ad accesso libero/gratuito e valgono come materiale
        suggerito per alcuni capitoli trattati a lezione:


        Gerhard Paaß , Sven Giesselbach. Foundation Models for Natural Language Processing
        Pre-trained Language Models Integrating Media Book Open Access © 2023 (https://link.springer.com/content/pdf/10.1007/978-3-031-23190-2.pdf)
        (disponibile gratuitamente)


        Dan Jurafsky and James H. Martin. Speech and Language Processing (3rd ed.
        draft, 2024) (https://web.stanford.edu/~jurafsky/slpdraft/)


        GitHub repository con codice, dataset modelli e riferimenti allo stato dell’arte
        (https://disi-unibo-nlp.github.io/)


        Christopher Manning, Hinrich Schutze, Prabhakar Raghavan. Introduction to
        Information Retrieval. Cambridge University Press, 2008'
      Metodi didattici: Lezioni in aula ed esercitazioni in laboratorio
      Modalità di verifica e valutazione dell'apprendimento: 'Interrogazione orale
        e discussione di un elaborato. L''elaborato da concordarsi con uno dei due
        docenti, consiste nell''implementazione di un algoritmo di data mining tra
        quelli disponibili in letteratura oppure nell''analisi di una banca dati con
        le tecniche studiate a lezione.


        L''obiettivo della verifica è quello di capire se le tecniche studiate sono
        state comprese e se lo studente ha sviluppato capacità pratiche di operare
        sui dati, di comprenderne il contenuto e di scoprire informazioni nascoste.


        I voti vengono assegnati in base a una valutazione complessiva delle conoscenze,
        competenze, capacità di presentazione e discussione delle tematiche trattate.
        I range di voti corrispondono possono essere descritti come segue:


        18-23: preparazione e capacità di analisi sufficienti ma relative ad un numero
        limitato di argomenti affrontati nel corso, utilizzo di un linguaggio complessivamente
        corretto;


        24-27: preparazione tecnicamente adeguata ma con alcuni limiti rispetto agli
        argomenti trattati, capacità di analisi buone, anche se non particolarmente
        articolate, espresse in un linguaggio corretto;


        28-30: ottima conoscenza di un ampio numero di temi affrontati nel corso,
        buone capacità di analisi e di critica, padronanza della terminologia specifica;


        30L: conoscenza eccellente e molto approfondita ed esaustiva dei temi affrontati
        nel corso, capacità di analisi critica e di collegamento, padronanza della
        terminologia specifica.'
      Strumenti a supporto della didattica: Le esercitazioni in laboratorio saranno
        svolte principalmente utilizzando i software R, Weka e Python (Colab)
      Link ad altre eventuali informazioni: http://bias.csr.unibo.it/golfarelli/
      Orario di ricevimento: 'Consulta il sito web di Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli)


        Consulta il sito web di Gianluca Moro (https://www.unibo.it/sitoweb/gianluca.moro)'
  en:
    title: 2025/2026 Data Mining — University of Bologna
    contents:
      Course contents: 'The course is organized on two modules. The first one is shared
        by both the students from Ingegneria e Scienze Informatiche (ISI), and the
        strudents from Digital Transformation Management (DTM). The second module
        is specific to each degree.


        ------------ Module I: Data Mining (ISI + DTM)


        1. Introduction to Data Mining: areas of applicability

        2. The knowledge discovery process


        - Designing a Data Miing Process

        - The CRISP-DM methodology


        1. Understanding and preparing data


        - Features of different data types

        - Statistical data analysis

        - Data quality

        - Preprocessing: attributes selection and creation

        - Measuring similarities and dissimilarities


        1. Data mining techniques


        Classification through decision trees and bayesian networks


        - Association rules

        - Clustering

        - Outlier detection


        1. Data understanding and validation

        2. The Weka software [http://www.cs.waikato.ac.nz/ml/weka/]

        3. Case studies analysis


        ------------ Modulo II ISI: Text Mining (Prof. Gianluca Moro)


        1. Text Representation, Retrieval, Classification and Opinion Mining

        2. Language Models, Transformers, Efficient Attention Mechanisms, Retrieval-Augmented
        Generation with VectorDB

        3. Vision-Language Models, Graph Machine Learning and Neuro-symbolic Methods
        for Trustworthy AI

        4. Generative Large Language Models, Prompt Engineering, Evaluation Methods,
        Compression and Quantization, Parameter-Efficient Fine-Tuning (e.g. QLoRA,
        Prompt Tuning) and Large Action Models

        5. Labs on real-word case studies - Text Summarization, Information Extraction,
        Chatbot and Function Call Generation etc. - with Python and open source tools:
        Hugging Face framework, LangChain, LlamaIndex, Milvus etc.


        ------------ Modulo II DTM: Machine Learning (Prof. Matteo Francia)


        1. Introduction to Neural Network & Deep Learning


        2.Theory and application of the CRISP-DM methodology to real datasets and
        use cases


        - Data acquisition and processing

        - Preprocessing and Feature Extraction

        - Modeling

        - Output understanding'
      Readings/Bibliography: '------------ Modulo I: Data Mining (ISI + DTM)


        Pang-Ning Tan, Michael Steinbach, Vipin Kumar Introduction to Data Mining.
        Pearson International, 2006.


        ------------ Modulo II ISI: Text Mining (Prof. Gianluca Moro)


        The teaching material is provided by the instructor on the course’s “virtual”
        portal, as the field of Natural Language Processing is rapidly evolving. The
        following bibliographic references are freely accessible and serve as suggested
        material for certain chapters covered in some lectures:


        Gerhard Paaß , Sven Giesselbach. Foundation Models for Natural Language Processing
        Pre-trained Language Models Integrating Media Book Open Access © 2023 (https://link.springer.com/content/pdf/10.1007/978-3-031-23190-2.pdf)
        (disponibile gratuitamente)


        Dan Jurafsky and James H. Martin. Speech and Language Processing (3rd ed.
        draft, 2024) (https://web.stanford.edu/~jurafsky/slpdraft/)


        GitHub repository con codice, dataset modelli e riferimenti allo stato dell’arte
        (https://disi-unibo-nlp.github.io/)


        Christopher Manning, Hinrich Schutze, Prabhakar Raghavan. Introduction to
        Information Retrieval. Cambridge University Press, 2008'
      Teaching methods: Lessons and practical exercises
      Assessment methods: 'Oral examination and discussion of a project. The project
        must be decided with one of the two lecturers and can be either the implementation
        of mining algorithm or the analysis of a dataset using data and text mining
        techniques.


        The goal of the assessment is to verify the cohmprension of the sudied techniques
        as well as the pratical capability to analyze data and understand and discover
        the hidden information.


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        presentation and discussion skills of the topics covered. The ranges of grades
        correspond can be described as follows:


        18-23: the student has sufficient preparation and analytical skills, spread
        however, over just few topics taught in the course, the overall jargon is
        correct


        24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate analytical skills
        with the use of a correct jargon


        28-30: Great knowledge about most of the topics taught in the course, good
        critical and analytical skills, good usage of the specific jargon


        30L: excellent and in depth knowledge of all the topics in the course, excellent
        critical and analytical skills, excellent usage of specific jargon.'
      Teaching tools: Practical exercises will be carried out using the open source
        Weka, R and Python (Colab)
      Links to further information: http://bias.csr.unibo.it/golfarelli/
      Office hours: 'See the website of Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli/en)


        See the website of Gianluca Moro (https://www.unibo.it/sitoweb/gianluca.moro/en)'
