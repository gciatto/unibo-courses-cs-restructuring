course_title:
  id: '11929'
  name: ALGORITMI E STRUTTURE DATI
integrated_course: ''
campus: Cesena
programme: Laurea in Ingegneria e scienze informatiche
syllabus:
  it:
    title: 2025/2026 ALGORITMI E STRUTTURE DATI (CL.A) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso, lo studente conosce:\n\
        \n- gli algoritmi per risolvere problemi computazionali di base su strutture\
        \ dati elementari;\n- le tecniche di base per calcolare il costo computazionale\
        \ degli algoritmi;\n- le classi di complessità computazionale P, NP e NP-hard.\n\
        \  In particolare, lo studente è in grado di:\n- progettare algoritmi efficienti\
        \ per risolvere semplici problemi computazionali;\n- stimare in ordine di\
        \ grandezza il costo computazionale degli algoritmi;\n- analizzare la complessità\
        \ computazionale di problemi computazionali di base;\n- dare una valutazione\
        \ circa l'efficienza e la correttezza di un algoritmo;\n- elaborare e presentare\
        \ un progetto per la risoluzione di problemi computazionali di base."
      Contenuti: '- matematica discreta elementare per calcolare gli ordini di grandezza;
        - Algoritmi di ordinamento; - Mediano e selezione; - Strutture dati elementari:
        pile, code, alberi, grafi - algoritmi di visita su grafi - algoritmi di base
        su grafi -classi P e NP -problemi NP-Hard'
      Testi/Bibliografia: 'Introduzione agli Algoritmi e Strutture Dati. Terza Edizione


        T. H. Cormen, C. E. Leiserson, R. L. Rivest, C. Stein


        McGraw-Hill'
      Metodi didattici: Lezioni ed esercitazioni frontali
      Modalità di verifica e valutazione dell'apprendimento: 'Prova scritta obbligatoria
        e prova orale facoltativa. Lo studente o la studentessa possono sempre scegliere
        di sostenere la prova orale facoltativa e il docente può richiedere il sostenimento
        della prova orale quando lo ritenga opportuno per una accurata verifica dell’apprendimento.

        Per accedere alla prova scritta è obbligatorio lo svolgimento ed il superamento
        (senza attribuzione di un punteggio) di una prova pratica di laboratorio assegnata
        durante il corso e da svolgere a casa. Su Virtuale è possibile trovare i dettagli
        relativi alla esecuzione e consegna delle prove pratiche.

        La frequenza delle lezioni non influenza il voto finale e non è obbligatoria
        per sostenere le prove di verifica.

        La prova scritta consiste nella risoluzione di un numero di esercizi che va
        da 2 a 4. Il voto finale sarà la somma dei voti ottenuti nei singoli esercizi.
        Per ogni esercizio sarà esplicitamente indicato il punteggio massimo ottenibile.
        Se il voto finale risulterà maggiore di 30 si otterrà la lode. La durata della
        prova varia a seconda della difficoltà di risoluzione degli esercizi da 2
        a 3 ore. Durante la prova scritta è ammesso l’utilizzo di qualunque materiale
        cartaceo (libri, dispense, appunti). Non è ammesso accedere al web con dispositivi
        elettronici. Per svolgere la prova scritta è necessario iscriversi entro i
        termini indicati su almaesami.

        Lo scopo della prova pratica, dello scritto e dell’eventuale prova orale è
        verificare la capacità dello studente o della studentessa di progettare algoritmi
        efficienti per risolvere semplici problemi computazionali, di stimare in ordine
        di grandezza il costo computazionale degli algoritmi, di analizzare la complessità
        computazionale di problemi computazionali di base e di dare una valutazione
        circa l''efficienza e la correttezza di un algoritmo. La gradazione del voto
        sarà proporzionale alle capacità dimostrate dallo studente durante le prove
        di verifica e potrà variare da 0 a 30 e lode. Lo studente che ottiene un voto
        inferiore al 18 non avrà superato la prova e lo studente che ottiene un voto
        superiore a 17 ha comunque la possibilità di rifiutarlo e di ripresentarsi
        all’appello di esame successivo.'
      Strumenti a supporto della didattica: Lucidi e Libro di testo
      Orario di ricevimento: 'Consulta il sito web di Luciano Margara (https://www.unibo.it/sitoweb/luciano.margara)


        Consulta il sito web di Andrea Melis (https://www.unibo.it/sitoweb/a.melis)'
  en:
    title: 2025/2026 Algorithms and Data Structures (CL.A) — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the student: - knows the basic
        algorithms and data structures; - knows how to compute computational costs;
        - Knows the classes P and NP; he can dvise fficient algorithms for solving
        simple computational problems; he can estimate the order of magnitude of the
        cost of a given algorithm; he can analyze the complexity of a problem; he
        knows techniques for analyze the correctness and the efficiency of an algorithm;
        he is able to write and to present a project for solving a computational problem.'
      Course contents: '- basic notion of discrete mathematics for analyzing order
        of magnitude - Sorting - Median and selection - Elementary data structures:
        stacks, queues, graphs - Search algorithms on graphs - basic algorithms on
        graphs - Classes P and NP - NP hard Problems'
      Readings/Bibliography: '- T. Cormen, C. Leiserson, R. Rivest. Introduction to
        algorithms. MIT Press.'
      Teaching methods: Lectures in class
      Assessment methods: 'Written exam is mandatory and oral exam is optional. Students
        may always choose to take the optional oral exam, and the instructor may require
        it whenever deemed appropriate for an accurate assessment of learning.

        To access the written exam, students must first complete and pass (without
        a numerical grade) a practical laboratory assignment given during the course
        and to be completed at home. Details regarding the execution and submission
        of practical assignments are available on Virtuale.

        Attendance at lectures does not affect the final grade and is not mandatory
        to take the exams.

        The written exam consists of solving between two and four exercises. The final
        grade will be the sum of the scores obtained in each exercise. For each exercise,
        the maximum possible score will be explicitly stated. If the total score exceeds
        30, the student will be awarded honors (cum laude). The duration of the written
        test varies from two to three hours, depending on the difficulty of the exercises.
        During the written exam, the use of any printed material (books, notes, handouts)
        is allowed. Access to the web via electronic devices is not permitted. Registration
        through AlmaEsami within the indicated deadlines is required to take the written
        exam.

        The purpose of the practical assignment, written exam, and possible oral exam
        is to assess the student’s ability to design efficient algorithms to solve
        simple computational problems, to estimate the computational cost of algorithms
        in asymptotic terms, to analyze the computational complexity of basic computational
        problems, and to evaluate the efficiency and correctness of an algorithm.
        The grading scale is proportional to the skills demonstrated during the assessments
        and ranges from 0 to 30 with honors. A student who obtains a grade below 18
        will not pass the exam, while a student who obtains a grade above 17 has the
        right to refuse it and retake the exam in a subsequent session.'
      Teaching tools: '- Slides and books'
      Office hours: 'See the website of Luciano Margara (https://www.unibo.it/sitoweb/luciano.margara/en)


        See the website of Andrea Melis (https://www.unibo.it/sitoweb/a.melis/en)'
