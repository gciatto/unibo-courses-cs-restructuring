syllabus:
  it:
    title: 2025/2026 DIGITAL HUMANITIES E DATA MANAGEMENT PER I BENI CULTURALI — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le principali teorie, metodologie e tecniche appartenenti ai campi delle Digital
        Humanities e dei Linked Open Data. Inoltre, è in grado di applicare le conoscenze
        acquisite per rappresentare e gestire dati in ambito umanistico e per produrre,
        gestire e pubblicare risorse digitali riguardanti i beni culturali secondo
        i principi dell’open science.
      Contenuti: 'Il corso si propone di introdurre gli studenti alle tematiche delle
        Digital Humanities (DH) e del Data Management (DM).


        Durante il corso, si darà particolare attenzione all''utilizzo di strumenti
        e metodologie informatiche per una corretta gestione dei dati umanistici durante
        l’intero ciclo di vita di un progetto di DH, con un focus sugli ambiti bibliografico,
        archivistico, documentario e artistico.


        Gli studenti acquisiranno conoscenze teoriche e pratiche sui linguaggi, i
        modelli, gli strumenti e i principi necessari per ideare, progettare e implementare
        una risorsa digitale, basata su una gestione dei dati FAIR (Findable, Accessible,
        Interoperable e Reusable), in grado di valorizzare il patrimonio culturale.'
      Testi/Bibliografia: 'Le dispense delle lezioni, la bibliografia e qualsiasi
        altro materiale aggiuntivo saranno messi gratuitamente a disposizione degli
        studenti sulla piattaforma istituzionale Virtuale; ulteriori materiali saranno
        caricati nel repository GitHub del corso.


        In particolare, la bibliografia è composta da testi e risorse Web liberamente
        accessibili, anche in lingua inglese, e suggeriti agli studenti per prepararsi
        prima, durante e dopo le lezioni.


        Frequentanti:


        1. Introduzione e cap. 1, 14, 19, 31 e 36 di Schreibman, S., Siemens, R.,
        & Unsworth, J. (Eds.). (2008). A companion to digital humanities. John Wiley
        & Sons. http://www.digitalhumanities.org/companion/

        2. Linee guida di Ateneo per la gestione dei dati della ricerca. https://www.unibo.it/it/allegati/Lineeguidaricerca_v4_HR.pdf/@@download/file/Lineeguidaricerca_v4_HR.pdf

        3. Tomasi, F. (2020). Digital Humanities e organizzazione della conoscenza:
        una pratica di insegnamento nel LODLAM. AIB Studi, 60 (2). https://aibstudi.aib.it/article/download/12068/11652?inline=1

        4. Benvenuti, N. (2003). L''importanza dei metadati nella costruzione della
        rete globale. Bollettino AIB (1992-2011), 43(3), 331-350. http://bollettino.aib.it/article/view/5032

        5. Tammaro, A. M. (2017). Data literacy: formare docenti e studenti alla gestione
        dei dati di ricerca. Biblioteche oggi, 35, 19-25. http://dx.doi.org/10.3302/0392-8586-201707-019-1


        Non frequentanti:


        1. Introduzione e cap. 1, 14, 19, 31 e 36 di Schreibman, S., Siemens, R.,
        & Unsworth, J. (Eds.). (2008). A companion to digital humanities. John Wiley
        & Sons. http://www.digitalhumanities.org/companion/

        2. Linee guida di Ateneo per la gestione dei dati della ricerca. https://www.unibo.it/it/allegati/Lineeguidaricerca_v4_HR.pdf/@@download/file/Lineeguidaricerca_v4_HR.pdf

        3. Dataset: selezionare e organizzare i dati. https://www.unibo.it/it/allegati/Scheda_Dataset.pdf/@@download/file/Scheda_Dataset.pdf

        4. Dati della ricerca: tipologie, formati, metodi. https://www.unibo.it/it/allegati/Scheda_Datidellaricerca.pdf/@@download/file/Scheda_Datidellaricerca.pdf

        5. Diritto d''autore e dati della ricerca. https://www.unibo.it/it/allegati/Scheda_Dirittodautore.pdf/@@download/file/Scheda_Dirittodautore.pdf

        6. Gestire il software. https://www.unibo.it/it/allegati/Scheda_Gestireilsoftware.pdf/@@download/file/Scheda_Gestireilsoftware.pdf

        7. Metadati e documentazione. https://www.unibo.it/it/allegati/Scheda_Metadati.pdf/@@download/file/Scheda_Metadati.pdf

        8. I principi FAIR. https://www.unibo.it/it/allegati/Scheda_PrincipiFAIR.pdf/@@download/file/Scheda_PrincipiFAIR.pdf

        9. I repository per depositare i dati. https://www.unibo.it/it/allegati/Scheda_Repository.pdf/@@download/file/Scheda_Repository.pdf

        10. Il rispetto della privacy nella gestione dei dati di ricerca. https://www.unibo.it/it/allegati/Scheda_Rispettodellaprivacy.pdf/@@download/file/Scheda_Rispettodellaprivacy.pdf

        11. Utilizzare diversi tipi di standard. https://www.unibo.it/it/allegati/Scheda_Tipidistandard.pdf/@@download/file/Scheda_Tipidistandard.pdf

        12. Tomasi, F. (2020). Digital Humanities e organizzazione della conoscenza:
        una pratica di insegnamento nel LODLAM. AIB Studi, 60 (2). https://aibstudi.aib.it/article/download/12068/11652?inline=1

        13. Benvenuti, N. (2003). L''importanza dei metadati nella costruzione della
        rete globale. Bollettino AIB (1992-2011), 43(3), 331-350. http://bollettino.aib.it/article/view/5032

        14. Tammaro, A. M. (2017). Data literacy: formare docenti e studenti alla
        gestione dei dati di ricerca. Biblioteche oggi, 35, 19-25. http://dx.doi.org/10.3302/0392-8586-201707-019-1'
      Metodi didattici: 'L’insegnamento, della durata complessiva di 30 ore, adotterà
        una strategia didattica innovativa volta a valorizzare il potenziale di apprendimento
        degli studenti, attraverso l’impiego di diversi approcci e strumenti:


        - Videoregistrazioni delle lezioni (sia teoriche che pratiche), disponibili
        online e scaricabili: utili per i frequentanti come supporto al ripasso dei
        contenuti trattati in aula; per i non frequentanti, rappresentano una risorsa
        sempre accessibile che consente di seguire il corso in autonomia, senza compromettere
        la qualità dell’apprendimento.

        - Slide delle lezioni, anch’esse disponibili online e scaricabili: un riferimento
        utile per tutti gli studenti, da consultare in qualsiasi momento per recuperare
        o approfondire i contenuti affrontati durante le lezioni.

        - Micro-learning attraverso esercizi (mini-casi di studio in linea con le
        tematiche trattate): proposti tramite piattaforme aperte e accessibili, questi
        strumenti permettono agli studenti di mettere in pratica quanto appreso, sia
        in modalità autonoma che guidata.

        - Cooperative Learning in presenza, attraverso attività pratiche e collaborative:
        gli studenti lavoreranno insieme per risolvere problemi legati a un caso studio
        introdotto nel corso, utilizzato come laboratorio didattico per integrare
        teoria e pratica e per sviluppare competenze utili all’esame finale.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale si basa
        sull''valutazione di entrambe le attività pratiche e teoriche. In particolare,
        agli studenti verrà richiesto di realizzare un progetto di gestione dei dati
        che verrà presentato durante un colloquio orale (e pubblicato su GitHub).


        Il progetto si baserà su linee guida specifiche che saranno presentate e discusse
        durante il corso e che saranno disponibili su Virtuale e nel repository GitHub.
        Gli studenti potranno lavorare al progetto individualmente o in gruppo (massimo
        3 persone).


        Il contributo personale di ciascuna persona e la conoscenza degli argomenti
        del corso saranno valutati durante il colloquio orale. Il metodo utilizzato
        per la valutazione si baserà sui seguenti parametri:


        - Progettazione di una risorsa digitale che documenti la gestione dei dati
        in un contesto di DH, con particolare riferimento a: descrizione dell’approccio
        metodologico (obiettivo della risorsa e tipo di dati utilizzati) tramite l’uso
        di un linguaggio tecnico adeguato al dominio; conoscenza degli standard utilizzati;
        completezza dei livelli richiesti del progetto in relazione alle linee guida.

        - Realizzazione di un prototipo della risorsa progettata, con particolare
        riferimento a: utilizzo delle tecnologie viste a lezione, e qualità dell’implementazione
        del progetto.


        Il progetto dovrà essere pubblicato online e la URL comunicata al docente
        entro e non oltre le ore 12.00 (mezzogiorno) del giorno precedente al giorno
        dell''esame, pena l''esclusione dall''esame.


        Sulla base del punteggio, verranno erogate le seguenti valutazioni:


        - <50% (valutazione negativa): preparazione non adeguata in nessun aspetto
        del progetto;

        - 51-70% (valutazione sufficiente): preparazione accettabile in almeno uno
        degli aspetti del progetto (punteggio compreso tra 18/30 e 23/30);

        - 71-90% (valutazione positiva): preparazione adeguata in tutti gli aspetti
        del progetto (punteggio compreso tra 24/30 e 27/30);

        - 91-100% (valutazione eccellente): ottima preparazione in tutte le parti
        della verifica e possiede significative capacità di elaborazione critica degli
        argomenti trattati (punteggio compreso tra 28/30 e 30/30).'
      Strumenti a supporto della didattica: 'Le lezioni si svolgono in una classe
        attrezzata con computer personali collegati all''Intranet e all''Internet.


        Le lezioni teoriche verranno sempre affiancate da sessioni pratiche.


        Tutto il materiale del corso - comprese le dispense delle lezioni e le diapositive
        - sarà reso disponibile su Virtuale e nel repository GitHub.


        Gli studenti che per ragioni dipendenti da disabilità o disturbi specifici
        dell’apprendimento (DSA) necessitino di strumenti compensativi potranno comunicare
        al Docente le loro esigenze in modo da essere indirizzati ai referenti e concordare
        l’adozione degli accorgimenti più opportuni. Per ulteriori informazioni: https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Link ad altre eventuali informazioni: https://github.com/dhdmch/2025-2026
      Orario di ricevimento: Consulta il sito web di Sebastian Barzaghi (https://www.unibo.it/sitoweb/sebastian.barzaghi2)
      SDGs: 'Istruzione di qualità Partnership per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Digital Humanities and Data Management for Cultural Heritage
      — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student is familiar with the
        main theories, methodologies, and techniques belonging to the fields of Digital
        Humanities and Linked Open Data. Furthermore, they are able to apply the acquired
        knowledge to represent and manage data in the humanities and to produce, manage,
        and publish digital resources related to cultural heritage following the principles
        of open science.
      Course contents: 'The course aims to introduce students to the topics of Digital
        Humanities (DH) and Data Management (DM).


        During the course, particular attention will be given to the use of digital
        tools and methodologies for the proper management of humanities data throughout
        the entire life cycle of a DH project, with a focus on bibliographic, archival,
        documentary, and artistic domains.


        Students will acquire both theoretical and practical knowledge of the languages,
        models, tools, and principles necessary to conceive, design, and implement
        a digital resource based on FAIR (Findable, Accessible, Interoperable, and
        Reusable) data management, capable of enhancing cultural heritage.'
      Readings/Bibliography: 'The lecture notes, bibliography, and any other additional
        materials will be made available to students free of charge on the institutional
        Virtuale platform; further materials will be uploaded to the course''s GitHub
        repository. Specifically, the bibliography consists of freely accessible texts
        and web resources, also in English, recommended to students for preparation
        before, during, and after the lectures.


        Attending students:


        1. Introduction and chapters 1, 14, 19, 31, and 36 of Schreibman, S., Siemens,
        R., & Unsworth, J. (Eds.). (2008). A Companion to Digital Humanities. John
        Wiley & Sons. http://www.digitalhumanities.org/companion/

        2. University guidelines for research data management. https://www.unibo.it/it/allegati/Lineeguidaricerca_v4_HR.pdf/@@download/file/Lineeguidaricerca_v4_HR.pdf

        3. Tomasi, F. (2020). Digital Humanities e organizzazione della conoscenza:
        una pratica di insegnamento nel LODLAM. AIB Studi, 60 (2). https://aibstudi.aib.it/article/download/12068/11652?inline=1

        4. Benvenuti, N. (2003). L''importanza dei metadati nella costruzione della
        rete globale. Bollettino AIB (1992-2011), 43(3), 331-350. http://bollettino.aib.it/article/view/5032

        5. Tammaro, A. M. (2017). Data literacy: formare docenti e studenti alla gestione
        dei dati di ricerca. Biblioteche oggi, 35, 19-25. http://dx.doi.org/10.3302/0392-8586-201707-019-1


        Non-attending students:


        1. Introduction and chapters 1, 14, 19, 31, and 36 of Schreibman, S., Siemens,
        R., & Unsworth, J. (Eds.). (2008). A Companion to Digital Humanities. John
        Wiley & Sons. http://www.digitalhumanities.org/companion/

        2. University guidelines for research data management. https://www.unibo.it/it/allegati/Lineeguidaricerca_v4_HR.pdf/@@download/file/Lineeguidaricerca_v4_HR.pdf

        3. Dataset: select and organize data. https://www.unibo.it/it/allegati/Scheda_Dataset.pdf/@@download/file/Scheda_Dataset.pdf

        4. Research data: types, formats, methods. https://www.unibo.it/it/allegati/Scheda_Datidellaricerca.pdf/@@download/file/Scheda_Datidellaricerca.pdf

        5. Copyright and research data. https://www.unibo.it/it/allegati/Scheda_Dirittodautore.pdf/@@download/file/Scheda_Dirittodautore.pdf

        6. Managing software. https://www.unibo.it/it/allegati/Scheda_Gestireilsoftware.pdf/@@download/file/Scheda_Gestireilsoftware.pdf

        7. Metadata and documentation. https://www.unibo.it/it/allegati/Scheda_Metadati.pdf/@@download/file/Scheda_Metadati.pdf

        8. The FAIR principles. https://www.unibo.it/it/allegati/Scheda_PrincipiFAIR.pdf/@@download/file/Scheda_PrincipiFAIR.pdf

        9. Repositories for data deposition. https://www.unibo.it/it/allegati/Scheda_Repository.pdf/@@download/file/Scheda_Repository.pdf

        10. Respecting privacy in research data management. https://www.unibo.it/it/allegati/Scheda_Rispettodellaprivacy.pdf/@@download/file/Scheda_Rispettodellaprivacy.pdf

        11. Using different types of standards. https://www.unibo.it/it/allegati/Scheda_Tipidistandard.pdf/@@download/file/Scheda_Tipidistandard.pdf

        12. Tomasi, F. (2020). Digital Humanities e organizzazione della conoscenza:
        una pratica di insegnamento nel LODLAM. AIB Studi, 60 (2). https://aibstudi.aib.it/article/download/12068/11652?inline=1

        13. Benvenuti, N. (2003). L''importanza dei metadati nella costruzione della
        rete globale. Bollettino AIB (1992-2011), 43(3), 331-350. http://bollettino.aib.it/article/view/5032

        14. Tammaro, A. M. (2017). Data literacy: formare docenti e studenti alla
        gestione dei dati di ricerca. Biblioteche oggi, 35, 19-25. http://dx.doi.org/10.3302/0392-8586-201707-019-1'
      Teaching methods: 'The course, with a total duration of 30 hours, will adopt
        an innovative teaching strategy aimed at enhancing students'' learning potential
        through the use of various approaches and tools:


        - Video recordings of the lessons (both theoretical and practical), available
        online and downloadable: useful for attending students as a support for reviewing
        classroom content; for non-attending students, they represent an always-accessible
        resource that allows for autonomous course participation without compromising
        the quality of learning.

        - Lecture slides, also available online and downloadable: a useful reference
        for all students, to consult at any time to review or deepen the topics covered
        during the lessons.

        - Micro-learning through exercises (mini case studies aligned with the course
        topics): offered via open and accessible platforms, these tools allow students
        to put into practice what they have learned, either independently or with
        guidance.

        - Cooperative Learning in person, through practical and collaborative activities:
        students will work together to solve problems related to a case study introduced
        during the course, used as a didactic lab to integrate theory and practice
        and to develop skills useful for the final exam.'
      Assessment methods: 'The final exam is based on the evaluation of both practical
        and theoretical activities. Specifically, students will be required to develop
        a data management project, which will be presented during an oral exam (and
        published on GitHub).


        The project will follow specific guidelines that will be presented and discussed
        during the course and made available on Virtuale and in the GitHub repository.
        Students may work on the project individually or in groups (maximum of 3 people).


        Each person''s individual contribution and understanding of the course topics
        will be assessed during the oral exam. The evaluation method will be based
        on the following criteria:


        - Design of a digital resource that documents data management in a Digital
        Humanities context, with particular attention to: description of the methodological
        approach (objective of the resource and type of data used) using appropriate
        domain-specific technical language; knowledge of the standards used; completeness
        of the required project levels according to the provided guidelines.

        - Development of a prototype of the designed resource, with particular focus
        on: use of technologies covered in the course, and the quality of the project
        implementation.


        The project must be published online, and the URL must be submitted to the
        instructor no later than 12:00 PM (noon) on the day before the exam, under
        penalty of exclusion from the exam.


        Based on the score, the following grades will be assigned:


        - <50% (failing grade): inadequate preparation in all aspects of the project;

        - 51–70% (sufficient): acceptable preparation in at least one aspect of the
        project (score between 18/30 and 23/30);

        - 71–90% (good): adequate preparation in all aspects of the project (score
        between 24/30 and 27/30);

        - 91–100% (excellent): outstanding preparation in all parts of the assessment
        and demonstrates significant critical thinking skills regarding the covered
        topics (score between 28/30 and 30/30).'
      Teaching tools: 'The lessons take place in a classroom equipped with personal
        computers connected to the intranet and the internet.


        Theoretical lessons will always be accompanied by practical sessions.


        All course materials – including lecture notes and slides – will be made available
        on Virtuale and in the GitHub repository.


        Students who, due to disabilities or specific learning disorders (SLD), require
        compensatory tools are encouraged to inform the instructor of their needs
        so they can be directed to the appropriate contacts and arrangements can be
        made to adopt the most suitable measures. For more information: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students'
      Links to further information: https://github.com/dhdmch/2025-2026
      Office hours: See the website of Sebastian Barzaghi (https://www.unibo.it/sitoweb/sebastian.barzaghi2/en)
      SDGs: 'Quality education Partnerships for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
