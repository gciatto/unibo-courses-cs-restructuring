syllabus:
  it:
    title: 2025/2026 ELEMENTI DI ARCHITETTURE DEGLI ELABORATORI E SISTEMI OPERATIVI
      — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente conosce
        i principi ed i metodi su cui si basa la progettazione logica delle macchine
        che ricevono, elaborano e generano segnali a due valori e conosce i principi
        elementari, atti a descrivere la macchina da un duplice punto di vista: il
        comportamento (cioè, il “cosa fa”) e la struttura (cioè, il “come è fatta”).

        Lo studente conosce l''architettura degli elaboratori e la loro strutturazione
        a livelli ed è in grado di comprendere i linguaggi a basso livello con cui
        si programma un elaboratore dell''informazione.

        Conosce le funzionalità del sistema operativo, le problematiche dei sistemi
        multi-utente e della concorrenza, l''interfaccia utenti a caratteri e la struttura
        del filesystem.'
      Contenuti: "L’insegnamento è suddiviso in due parti:\n\n1. Elementi di architetture\
        \ degli elaboratori -- Introduzione all'informatica e storia dei calcolatori\n\
        \  -- I sistemi di numerazione\n  -- Rappresentazione binaria dell'informazione\n\
        \  -- Aritmetica del calcolatore\n  -- L'algebra Booleana\n  -- L'architettura\
        \ del calcolatore\n  -- La scheda madre, la CPU, il linguaggio macchina\n\
        \  -- Le memorie, le interfacce e le periferiche\n2. Il Sistema Operativo\n\
        \  \n  -- Funzionalità del sistema operativo -- Lo scheduling della CPU --\
        \ Concorrenza e parallelismo -- Gestione della memoria -- Gestione del File\
        \ System -- Gestione dei dispositivi di I/O"
      Testi/Bibliografia: '- Slide del docente

        - Silberschatz, P.B. Galvin, G. Gagne, Sistemi operativi. Concetti ed esempi,
        dalla nona edizione in avanti, Pearson Education Italia (2014)

        - A. S. Tanenbaum, T. Austin, “Architettura dei Calcolatori”, 6/Ed., Pearson
        Education Limited, 2013'
      Metodi didattici: 'Lezioni in aula ed esercitazioni


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute.'
      Modalità di verifica e valutazione dell'apprendimento: Prova scritta con esercizi
        e domande sugli argomenti del corso. Durante la prova scritta non è consentita
        la consultazione di alcun tipo di materiale.
      Strumenti a supporto della didattica: Nel sito del materiale didattico sono
        disponibili per il download le slide presentate a lezione.
      Orario di ricevimento: Consulta il sito web di Lorenzo Pellegrini (https://www.unibo.it/sitoweb/l.pellegrini)
  en:
    title: 2025/2026 Foundations of Computer Architecture and Operating Systems —
      University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student will know the principles
        and methods underlying the logical design of machines that receive, process,
        and generate binary signals. The student will also understand the elementary
        principles used to describe the machine from two perspectives: behavior (i.e.,
        "what it does") and structure (i.e., "how it is built"). The student will
        be familiar with the architecture of computers and their structuring into
        layers, and will be able to understand low-level programming languages used
        to program information processors. The student will also be familiar with
        the functionalities of the operating system, the issues of multi-user systems
        and concurrency, the character-based user interface, and the structure of
        the filesystem.'
      Course contents: 'The course is divided into two parts:


        Elements of Computer Architecture

        -- Introduction to computer science and the history of computers

        -- Numbering systems

        -- Binary representation of information

        -- Computer arithmetic

        -- Boolean algebra

        -- Computer architecture

        -- The motherboard, CPU, and machine language

        -- Memory, interfaces, and peripherals


        The Operating System

        -- Functionality of the operating system

        -- CPU scheduling

        -- Concurrency and parallelism

        -- Memory management

        -- File system management

        -- Management of I/O devices'
      Readings/Bibliography: '- Lecturer''s slides

        - Silberschatz, P.B. Galvin, G. Gagne, Sistemi operativi. Concetti ed esempi,
        dalla nona edizione in avanti, Pearson Education Italia (2014)

        - A. S. Tanenbaum, T. Austin, “Architettura dei Calcolatori”, 6/Ed., Pearson
        Education Limited, 2013'
      Teaching methods: 'Classroom lessons and exercises.


        Considering the type of activities and the teaching methods adopted, attendance
        in this educational activity requires prior participation of all students
        in modules 1 and 2 of the safety training in study environments, in e-learning
        mode: https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute
        .'
      Assessment methods: Written exam with exercises and questions on the course
        topics. During the written exam, no materials of any kind are allowed for
        consultation.
      Teaching tools: The slides presented in class are available for download on
        the course's material website.
      Office hours: See the website of Lorenzo Pellegrini (https://www.unibo.it/sitoweb/l.pellegrini/en)
