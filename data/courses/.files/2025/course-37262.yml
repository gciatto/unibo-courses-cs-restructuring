syllabus:
  it:
    title: 2025/2026 COMPUTER PROGRAMMING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course, the student has
        a basic understanding of computational tools and terminology, including object
        oriented programming techniques. He is able to: - use programming languages
        to write small scale programs; - understand programs written by others; -
        map financial problems, such as pricing systems and risk measurement models,
        into computational solutions.'
      Contenuti: 'Programmare i calcolatori è un attività di tipo creativo, che si
        apprende solo con l''esercizio, orientata a trovare soluzioni a problemi utilizzando
        i linguaggi di programmazione.


        Il corso introdurrà gli strumenti di base e la terminologia utilizzata nel
        settore dell''informatica quali ad esempio: sistemi operativi, reti di calcolatori
        e

        sistemi informativi, linguaggi di programmazione, interpreti e compilatori.


        Successivamente, utilizzando il linguaggio Python, verranno presentate le
        tecniche di programmazione seguendo un approccio interattivo introducendo
        gradualmente i concetti ed i costrutti dei linguaggi di programmazione, quali:
        Variabili, espressioni e comandi; funzioni, condizionali e

        ricorsione; Iterazione; Tipi di dati; Tabelle; il formato csv; creazione di
        fogli elettronici; accesso a dati tramite Web. Tratteremo inoltre: programmazione
        ad oggetti; casi di studio e metodi per l''accesso ai dati finanziari.'
      Testi/Bibliografia: 'Testo di riferimento:


        How to Think Like a Computer Scientist: Learning with Python, di

        Allen Downey, Jeff Elkner e Chris Meyers. Gree Tea Press

        (disponibile in rete:

        https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf).


        Altri testi:


        Finantial Modelling in Python, di S. Fletcher e C. Gardner. Wiley

        Finance 2009.


        Introduzione a Python, di T. Gaddis (Quinta Edizione) Pearson, 2022.'
      Metodi didattici: 'lezioni frontali ed esercizi in classe.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto: composto
        da uno a tre esercizi di programmazione composto da 3 a 5 funzioni da realizzarsi
        in Python con carta e penna. Verrà valutata in 30esimi la capacità di programmare
        acquisita dallo studente. La durata dello scritto è di circa 90 minuti e potrà
        variare lievemente a seconda della difficoltà degli esercizi proposti.


        Si seguirà la seguente graduazione dei voti a seconda del numero di funzioni
        da realizzare: Almeno una funzione realizzata corretta: 18-19. Più di una
        funzione realizzata corretta ma con più funzioni errate o mancanti: 20-24.
        Una funzione mancante o tutte le funzioni realizzate ma con presenza di errori
        in alcune di esse: 25-29. Tutte le funzioni corrette: 30-30L.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ): sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: lavagna + videoproiettore + computer
      Orario di ricevimento: Consulta il sito web di Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Computer Programming — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student has a basic understanding
        of computational tools and terminology, including object oriented programming
        techniques. He is able to: - use programming languages to write small scale
        programs; - understand programs written by others; - map financial problems,
        such as pricing systems and risk measurement models, into computational solutions.'
      Course contents: 'Computer programming is a creative task that is learned through
        practice. It involves finding solutions to problems using programming languages.


        The course will introduce basic informatics concepts and terminology such
        as operating systems, networks, information systems, computer languages, interpreters,
        and compilers.


        Next, using the Python programming language, we will present programming techniques
        through an interactive, step-by-step approach. This will include introducing
        concepts and constructs of programming languages, such as variables, expressions,
        and statements; functions, conditionals, and recursion; iteration; data types;
        tables; CSV files; spreadsheet creation; and web scraping. Additionally, we
        will cover object-oriented programming, case studies, and methods for accessing
        financial data.'
      Readings/Bibliography: 'Reference book:


        How to Think Like a Computer Scientist: Learning with Python, by

        Allen Downey, Jeff Elkner and Chris Meyers. Gree Tea Press (link:

        https://media.readthedocs.org/pdf/howtothink/latest/howtothink.pdf)


        Other books:


        Finantial Modelling in Python, by S. Fletcher and C. Gardner. Wiley

        Finance 2009.


        Starting Out with Python, Global Edition di Tony Gaddis, Pearson Education
        Limited (Fifth Ediion) 2021.'
      Teaching methods: 'lectures and class exercises.


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 [https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas]
        on Health and Safety online.'
      Assessment methods: 'Written test: consisting of 1 to 3 programming exercises
        comprising a total of 3 to 5 Python functions that must be written in Python
        using paper and pen. The test will evaluate the student''s programming abilities
        and will last approximately 90 minutes, with slight variations depending on
        the difficulty of the exercises.


        The exam is graded on a scale of 30 points. Marks will be awarded according
        to the following criteria based on the number of correctly implemented functions:
        At least one correct function implemented: 18–19. More than one correct function,
        but with several incorrect or missing functions: 20–24. One missing function,
        or all functions implemented but some with errors: 25–29. All functions correct:
        30–30L.


        Students with learning disabilities or temporary or permanent disabilities:
        please contact the relevant University office promptly ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ). The office will advise students of possible adjustments, that will be submitted
        to the professor for approval 15 days in advance. He/she will evaluate their
        suitability also in relation to the academic objectives of the course.'
      Teaching tools: whiteboard + video projector + laptop
      Office hours: See the website of Mauro Gaspari (https://www.unibo.it/sitoweb/mauro.gaspari/en)
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
