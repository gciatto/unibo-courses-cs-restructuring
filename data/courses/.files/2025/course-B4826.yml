syllabus:
  it:
    title: 2025/2026 INFORMATICA PER STUDI UMANISTICI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i concetti teorici basilari dell'informatica, apprende i principi di funzionamento
        dei sistemi hardware e software e conosce il lessico tecnico di base della
        disciplina. Acquisisce i rudimenti di scripting (linguaggio Python) per l’analisi
        del testo. Conosce la struttura e il funzionamento di Internet e il Web ed
        è in grado di realizzare una pagina Web. Sa utilizzare i principali strumenti
        collaborativi di gestione di documenti e per la scrittura e sa raccogliere
        e codificare una bibliografia.
      Contenuti: "Il corso di Informatica per Studi Umanistici è interamente erogato\
        \ a distanza tramite lezioni online attraverso la piattaforma Teams. Il corso\
        \ è articolato in quattro unità, che mirano a fornire conoscenze teoriche\
        \ e pratiche dell’informatica utile agli studi umanistici e in particolare\
        \ a quelli linguistici. Di seguito, sono riportati gli argomenti delle unità\
        \ e delle relative lezioni:\n\n- Introduzione all’informatica\n  \n  - Che\
        \ cos’è l’Informatica?\n  - Hardware e software\n  - Sistemi informativi\n\
        \  - Software e dati\n  - Algoritmi e diagrammi di flusso (flowchart diagrams)\n\
        \  - Come organizzare i dati in un programma - strutture dati: Lista, Coda,\
        \ Pila, Insieme, Dizionario, Grafo, Albero, Vettore, Tensore\n  - Com’è fatto\
        \ un computer: Architettura dei computer\n- Internet e il web\n  \n  - Le\
        \ reti di computer\n  - Classificazione delle reti: LAN, MAN, WAN\n  - La\
        \ pila ISO/OSI\n  - I collegamenti tra le reti: i protocolli di comunicazione\n\
        \  - Il world wide web e come creare una pagina web con HTML\n- Informatica\
        \ per l’analisi testuale\n  \n  - Introduzione ai linguaggi di programmazione\n\
        \  - Trovare automaticamente regolarità nel testo (parole, gruppi di parole,\
        \ etc.): Espressioni regolari (Regex)\n  - Scripting con Python\n  - Cenni\
        \ su Machine learning\n- Ambienti collaborativi per la gestione di documenti\
        \ e per la scrittura\n  \n  - Programmi di videoscrittura\n  - Latex e Overleaf\n\
        \  - Google Doc e OneDrive\n  - Come costruire una bibliografia: Scholar,\
        \ scopus e motori di ricerca"
      Testi/Bibliografia: 'Le slide usate durante le lezioni verranno messe a disposizione
        degli studenti sulla piattaforma VIRTUALE di Ateneo [https://virtuale.unibo.it/
        ] prima dell’inizio della lezione.


        Verranno adottati come riferimenti i seguenti testi:


        - Dennis P. Curtin et. al. "INFORMATICA DI BASE" VII edizione (2021). Mc Graw
        Hill

        - Allen Downey. “Pensare in Python” Edizione 2. Green Tea Press'
      Metodi didattici: Il corso di Informatica per Studi Umanistici è interamente
        erogato a distanza tramite lezioni online attraverso la piattaforma Teams.
        Gli studenti avranno a disposizione le slide delle lezioni tramite la piattaforma
        Virtuale. Inoltre, saranno resi disponibili esercizi simili a quelli che verranno
        a quelli d’esame.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        una prova di idoneità; non vengono quindi assegnati voti, ma esclusivamente
        la qualifica di "idoneo/a". L’esame è atto a valutare le conoscenze teoriche
        e le abilità pratiche acquisite dallo studente durante il corso, tramite esercizi
        tipologicamente affini a quelli presenti sulla piattaforma Virtuale. La verifica
        consiste in un test di 30 minuti, eseguito al computer in aula.


        Saranno fissati cinque appelli d''esame per anno accademico. Gli studenti
        sono invitati a iscriversi all’appello desiderato tramite AlmaEsami.'
      Strumenti a supporto della didattica: Verranno resi disponibili tramite la piattaforma
        Virtuale slide e attività esercitative.
      Orario di ricevimento: Consulta il sito web di Luigi Asprino (https://www.unibo.it/sitoweb/luigi.asprino)
  en:
    title: 2025/2026 Informatics for the Humanities — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the basic theoretical
        concepts of computer science, learns the operating principles of hardware
        and software systems and knows the basic technical vocabulary of the discipline.
        They acquire the rudiments of scripting (Python language) for text analysis.
        They become familiar with the structure and functioning of the Internet and
        the Web and is able to create a web page. They will be able to use the most
        important collaborative document management and to write, collect and code
        a bibliography.
      Course contents: 'The Informatics for the Humanities course is delivered entirely
        online via the Teams platform. The course is divided into four units, which
        aim to provide theoretical and practical knowledge of computer science useful
        for humanities studies, particularly linguistics. The topics covered in each
        unit and lesson are listed below:


        Introduction to computer science


        - What is computer science?

        - Hardware and software

        - Information systems

        - Software and data

        - Algorithms and flowchart diagrams

        - How to organize data in a program - data structures: List, Queue, Stack,
        Set, Dictionary, Graph, Tree, Vector, Tensor

        - How a computer is made: Computer architecture


        The Internet and the web


        - Computer networks

        - Classification of networks: LAN, MAN, WAN

        - The ISO/OSI stack

        - Connections between networks: communication protocols

        - The World Wide Web and how to create a web page with HTML


        Computer science for text analysis


        - Introduction to programming languages

        - Automatically finding patterns in text (words, groups of words, etc.): Regular
        expressions (Regex)

        - Scripting with Python

        - An overview of machine learning


        Collaborative environments for document management and writing


        - Word processing programs

        - Latex and Overleaf

        - Google Doc and OneDrive

        - How to build a bibliography: Scholar, Scopus, and search engines'
      Readings/Bibliography: 'The slides used during the lessons will be made available
        to students on the University''s VIRTUALE platform [https://virtuale.unibo.it/]
        before the start of the lesson.


        The following texts will be used as references:


        - Dennis P. Curtin et. al. "INFORMATICA DI BASE" VII edizione (2021). Mc Graw
        Hill

        - Allen Downey. “Pensare in Python” Edizione 2. Green Tea Press'
      Teaching methods: The Informatics for the Humanities course is delivered entirely
        remotely via online lessons through the Teams platform. Students will have
        access to the lesson slides via the Virtuale platform. In addition, exercises
        similar to those that will be included in the exam will be made available.
      Assessment methods: 'The exam consists of a test with no grades assigned, only
        the qualification of “idoneo.” The exam is designed to assess the theoretical
        knowledge and practical skills acquired by the student during the course,
        through exercises similar to those found on the Virtuale platform. The assessment
        consists of a 30-minute test, taken on a computer in the classroom.


        There will be five exam sessions per academic year. Students are invited to
        register for their preferred session via AlmaEsami.'
      Teaching tools: Slides and exercises will be made available via the Virtuale
        platform.
      Office hours: See the website of Luigi Asprino (https://www.unibo.it/sitoweb/luigi.asprino/en)
