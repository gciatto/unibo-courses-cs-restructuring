course_title:
  id: '39176'
  name: INFORMATICA DI BASE E LABORATORIO
integrated_course: Componente del corso integrato FISICA STATISTICA E INFORMATICA
  (C.I.)
campus: Bologna
programme: Laurea in Tecniche di laboratorio biomedico (abilitante alla professione
  sanitaria di tecnico di laboratorio biomedico)
syllabus:
  it:
    title: 2025/2026 INFORMATICA DI BASE E LABORATORIO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'insegnamento lo studente
        possiede le conoscenze per comprendere la struttura fondamentale di Internet
        come rete a commutazione di pacchetto e i servizi principali offerti dal World
        Wide Web quali posta elettronica, instant messaging, collegamenti remoti,
        l'evoluzione dei servizi di social network o Web2, i processi di ricerca di
        informazioni sul Web. Lo studente possiede inoltre conoscenze di base sull'utilizzo
        di fogli elettronici (operazioni, funzioni, grafici), e gestione di database
        (costruzione di tabelle, relazioni, maschere, e interrogazioni).
      Contenuti: "MODULO 1 - Comune a CdL Tecnichine di laboratorio biomedico, CdL\
        \ in Ostetricia e CdL Tecniche di neurofisiopatologia\n\nA) Fondamenti di\
        \ informatica (4 ore)\n\n- Il computer, l'algoritmo, il software\n- Reti di\
        \ computer e Internet\n- Evoluzione del WEB\n- Blog, comunità e social networking\n\
        \nB) Introduzione all'informatica sanitaria (4 ore)\n\n- Principali ambiti\
        \ dell'informatica nelle attività sanitarie\n- Dematerializzazione dei documenti\
        \ in ambito clinico-sanitario. Ciclo di vita del documento informatico\n-\
        \ Archivi digitali e conservazione dei documenti medici nelle aziende sanitarie\
        \ pubbliche (tipologie documentali, tempi di conservazione)\n- Protezione\
        \ e trattamento dei dati relativi alla salute\n\nC) Come organizzare, elaborare\
        \ e analizzare dati biometrici e clinici con i fogli elettronici (10 ore)\n\
        \n- Organizzare, sintetizzare, elaborare, analizzare e rappresentare dati\
        \ con MS-Excel\n- Importare/Esportare dati Esportare dati sulla piattaforma\
        \ R per l'analisi statistica (formati) Creare, archiviare e condividere fogli\
        \ elettronici con Google Drive e Microsoft OneDrive\n  D**) Cone ricercare\
        \ e selezionare informazioni in Rete** (4 ore)\n- Cercare in Rete informazioni\n\
        - Uso dei motori di ricerca e ricerca avanzata\n- Cataloghi online ad accesso\
        \ pubblico (OPAC)\n- Banche dati (generaliste e specializzate)\n\nE) Come\
        \ presentare e comunicare su schermo i dati elaborati con Excel ad un consesso\
        \ (2 ore)\n\nCome importare i dati di una ricerca dal foglio di lavoro in\
        \ MS-PowerPoint e creare slide\n\nMODULO 2 - per CdL in Tecniche di laboratorio\
        \ biomedico\n\nCome organizzare e gestire archivi con i database (12 ore)\n\
        \n- Archivi e database\n- Architettura di un database\n- Modello relazionale\n\
        - Progettare un database\n- Creare un database con MS-Access\n\nMODULO 2 -\
        \ per CdL in Tecniche di neurofisiopatologia (12 ore)\n\n- Dall'acquisizione\
        \ del segnale EEG (bioelettrico) alla sua conversione in digitale (numerico)\n\
        - Elaborazione del segnale attraverso tecniche digitali\n- Visualizzazione\
        \ e memorizzazione del segnale EEG\n- Sistema informatico e servizi per il\
        \ supporto di un Neurophysiology Information System: requisiti funzionali\n\
        - Gestione privacy e sicurezza delle informazioni\n- Sicurezza delle postazioni\
        \ e della rete"
      Testi/Bibliografia: '-Curtin - Foley - Sen - Morin, edizione italiana a cura
        di A. Marengo Alessandro Pagano, Informatica di base. Con aggiornamento online.
        Con e-book, 6 edizione, McGraw-Hill Education, Milano, 2016.


        -Materiali didattici e esercizi disponibili sulla piattaforma di e-learning.'
      Metodi didattici: 'Lezioni frontali sulla parte teorica. Presentazioni degli
        applicativi da conoscere. Esercitazioni libere e guidate con il computer.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: 'E'' prevista una prova
        scritta che si svolgerà con il computer in un''unica seduta. La prova consiste
        in un questionario con domande (a risposta multipla) ed eventuali esercizi.
        La prova mira ad accertare il possesso delle conoscenze e competenze acquisite.
        Il tempo per lo svolgimento della prova è di quaranta minuti.


        La prova scritta è valutata con un voto espresso in trentesimi che farà media
        con il voto di fisica e statistica. Allo studente verrà attribuito dal docente
        verbalizzante un solo voto per il corso integrato di Fisica, Statistica e
        Informatica.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: 'Questionari di controllo apprendimento.


        Strumenti di didattica collaborativa online a integrazione alle tradizionali
        attività didattiche di aula: Piattaforma moodle, forum, chat, web conf.. wiki.


        Fruizione di contenuti (materiali didattici testuali e multimediali, video,
        esercizi) disponibili sulla piattaforma di erogazione Insegnamenti online
        ai corsisti iscritti.


        Risorse Didattiche in Rete: Sitografia.'
      Orario di ricevimento: Consulta il sito web di Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7)
  en:
    title: 2025/2026 Basic and Laboratory Informatics — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student possesses the knowledge
        to understand the fundamental structure of the Internet as a packet-switched
        network and the main services offered by the World Wide Web such as e-mail,
        instant messaging, remote connections, the evolution of social network services
        or Web2, the processes of searching for information on the Web. The student
        also has basic knowledge of the use of spreadsheets (operations, functions,
        graphs), and database management (construction of tables, relations, masks,
        and queries).
      Course contents: 'How to import research data from a worksheet in MS-PowerPoint
        and create slides


        MODULE 2 - for CdL in Biomedical Laboratory Techniques


        How to organise and manage archives with databases (12 hours)


        Archives and databases

        Architecture of a database

        Relational model

        Designing a database

        Creating a database with MS-Access


        MODULE 2 - for CdL in Neurophysiopathology Techniques (12 hours)


        From the acquisition of the EEG signal (bioelectric) to its conversion into
        digital (numerical)

        Signal processing through digital techniques

        Visualisation and storage of the EEG signal

        Computer system and services to support a Neurophysiology Information System:
        functional requirements

        Privacy management and information security

        Workstation and network security


        Translated with www.DeepL.com/Translator (free version)MODULE 1 - Common to
        CdL Biomedical Laboratory Techniques, CdL in Obstetrics and CdL Neurophysiopathology
        Techniques


        A) Fundamentals of computer science (4 hours)


        The computer, the algorithm, software

        Computer networks and the Internet

        Evolution of the Web

        Blogs, communities and social networking


        B) Introduction to health informatics (4 hours)


        Main areas of information technology in health activities

        Dematerialisation of documents in the clinical-health field Life cycle of
        the IT document

        Digital archives and preservation of medical documents in public health companies
        (document types, preservation times)

        Protection and processing of health-related data


        C) How to organise, process and analyse biometric and clinical data with spreadsheets
        (10 hrs)


        Organising, summarising, processing, analysing and representing data with
        MS-Excel


        Importing/Exporting data Exporting data to the R platform for statistical
        analysis (formats) Creating, storing and sharing spreadsheets with Google
        Drive and Microsoft OneDrive


        D) How to search and select information on the Net (4 hrs.)


        Searching the Net for information

        Using search engines and advanced search

        Online public access catalogues (OPAC)

        Databases (generalist and specialised)


        E) How to present and communicate data processed with Excel to a board (2
        hours)'
      Readings/Bibliography: '-Curtin - Foley - Sen - Morin, edizione italiana a cura
        di A. Marengo Alessandro Pagano, Informatica di base. Con aggiornamento online.
        Con e-book, 6 edizione, McGraw-Hill Education, Milano, 2016.


        -Materiali didattici e esercizi disponibili sulla piattaforma di e-learning.'
      Teaching methods: 'Lectures on the theoretical part. Presentations of the applications
        to be mastered. Free and guided exercises with the computer.


        In view of the type of activity and teaching methods adopted, the attendance
        of this training activity requires the prior participation of all students
        in modules 1 and 2 of workplace safety training, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode'
      Assessment methods: 'There is a written test that will be conducted by computer
        in one sitting. The test consists of a questionnaire with questions (multiple-choice)
        and possible exercises. The test is aimed at ascertaining the possession of
        acquired knowledge and skills. The time for the test is forty minutes.


        The written test is assessed by a grade expressed in thirtieths, which will
        be averaged with the physics and statistics grade. The student will only be
        awarded one mark for the integrated course in Physics, Statistics and Computer
        Science by the teacher taking the minutes.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students)
        as soon as possible so that they can propose acceptable adjustments. The request
        for adaptation must be submitted in advance (15 days before the exam date)
        to the lecturer, who will assess the appropriateness of the adjustments, taking
        into account the teaching objectives.'
      Teaching tools: 'Learning control questionnaires.


        Online collaborative teaching tools to supplement traditional classroom teaching
        activities: Moodle platform, forum, chat, web conf. wiki.


        Use of content (textual and multimedia teaching materials, videos, exercises)
        available on the online teaching delivery platform to registered students.


        Online teaching resources: Sitography.'
      Office hours: See the website of Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7/en)
