course_title:
  id: '81917'
  name: SERVIZI MULTIMEDIALI PER L'INTERAZIONE
integrated_course: Componente del corso integrato LABORATORIO DI DESIGN DEI PROCESSI
  B C.I.
campi:
- Bologna
programmes:
- Laurea Magistrale in Advanced Design
syllabus:
  it:
    title: 2025/2026 SERVIZI MULTIMEDIALI PER L'INTERAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il modulo intende fornire un background
        sui requisiti dei nuovi servizi partecipativi, partendo da una analisi delle
        caratteristiche tecnologiche abilitanti: si intende usare come ambito target
        quello delle smart-city con partecipazioni degli attori del territorio. Si
        intende sperimentare le tecnologie abitanti dei servizi nell’ambito del laboratorio,
        favorendo partecipazione e accrescendo capacità di progetto e di lavoro con
        nuove tecnologie.

        Lo studente acquisisce competenze sui temi di:

         ambienti e servizi in ambito di città intelligenti: modelli di partecipazione,
        crowdsourcing e crowdsensing;

         architetture dei sistemi Web: modelli cliente servitore, modelli di esecuzione,
        protocolli e ambienti Web, tecnologie Web, esecuzione di componenti per sistemi
        fissi e mobili;

         ambienti di lavoro cooperativo e georeferenziato: modelli di uso e supporto;

         progetto di componenti per la fornitura di servizi in ambienti eterogenei
        fissi e mobili.

         modelli di utilizzo dei servizi e dei supporti tecnologici, integrazione
        di servizi in ecosistemi orientati all’utente finale.'
      Contenuti: "Modulo 1\n\nA - Fondamenti di Informatica\n\n1 - Introduzione all'informatica\n\
        2 - Virtualizzazione e cloud\n3 - Algoritmi e linguaggi\n4 - Proprietà intellettuale\n\
        5 - Normativa privacy\n\nB - Web e dintorni\n1 - Fondamenti WWW\n2 - Programmazione\
        \ HTML\n3 - AI/ML/GAI\n\nC - Programmazione Javascript\n1 - Variabili\n2 -\
        \ Istruzioni\n3 - Funzioni\n4 - Event driven\n\nD - Sicurezza Informatica\n\
        1 - Concetti base\n2 - Chi sono i cattivi\n3 - Social engineering\n4 - Gestione\
        \ delle password\n5 - Salvataggio dei dati\n6 - Sicurezza delle applicazioni\
        \ (web e mobile)\n7 - Privacy e diritti online\n\nDurante lo svolgimento delle\
        \ lezioni, verranno svolti numerosi esercizi ed esempi di programmazione in\
        \ laboratorio, al fine di fornire agli studenti le capacità di analisi e progettazione\
        \ di semplici algoritmi, siti web e mobile app.\n\nModulo 2\n\nObiettivo del\
        \ Modulo: Progettare un design concept di servizio basato su metodologie di\
        \ ricerca e processi di design centrati sull’utente, culminando con deliverable\
        \ strategici e operativi utili per lo sviluppo di un prototipo.\n\nLezione\
        \ 1: Introduzione allo User-Centered Design e Workshop di Design Thinking\n\
        \nObiettivi:\n• Comprendere le metodologie di progettazione principali e la\
        \ loro funzione lungo il processo di sviluppo del prodotto\n• Applicare l’intero\
        \ processo di Design Thinking in un workshop pratico.\n\nContenuti:\n\n1.\
        \ PRIMA PARTE\n  • Introduzione allo User-Centered Design (UCD).\n  • Da HCI\
        \ (Human-Computer Interaction) a UX (User Experience).\n  • Framework di progettazione:\
        \ panoramica dei principali approcci (es. Double Diamond).\n  • Metodi di\
        \ User Research.\n2. SECONDA PARTE\n  • Workshop completo sul Design Thinking:\
        \ Empathize, Define, Ideate, Prototype, Test.\n\nDeliverable: Nessuno.\nAttività:\
        \ Partecipazione al workshop di Design Thinking.\nLezione 2: Esplorazione\
        \ del Problema e Creazione del Contesto Attuale\n\nObiettivi:\n• Applicare\
        \ il framework del Double Diamond per identificare problemi chiave e formulare\
        \ una Design Challenge.\n• Creare i deliverable che rappresentano il contesto\
        \ e il problema attuale.\n\nContenuti:\n\n1. PRIMA PARTE\n  • Introduzione\
        \ al primo diamante del Double Diamond (Discover e Define).\n  • Tecniche\
        \ di ricerca qualitativa:\n  • Intervista semi-strutturata.\n  • Contextual\
        \ Inquiry.\n  • User Observation.\n  • Creazione di un User Research Plan.\n\
        2. SECONDA PARTE\n  • Sintesi delle informazioni raccolte:\n  • Proto Personas\
        \ / Personas.\n  • Experience Map (rappresentazione del contesto attuale).\n\
        \nDeliverable:\n• Proto Personas / Personas.\n• Experience Map.\n\nAttività:\n\
        • Conduzione di attività di ricerca sul campo.\n• Creazione collaborativa\
        \ di Personas ed Experience Map.\n\nLezione 3: Sintesi dei Risultati e Ideazione\
        \ del Concept\n\nObiettivi:\n• Analizzare e sintetizzare i risultati della\
        \ ricerca.\n• Definire i principali insight e trasformarli in opportunità\
        \ di design.\n\nContenuti:\n\n1. PRIMA PARTE\n  • Sintesi dei risultati della\
        \ ricerca (Empathy Mapping, POV, HMW).\n  • Tecniche di definizione del problema:\n\
        \  • Why-How Laddering.\n2. SECONDA PARTE\n  • Metodi di ideazione creativa:\n\
        \  • Brainstorming guidato.\n  • SCAMPER.\n  • Introduzione al Concept Design\
        \ (connessione tra insight e idee progettuali).\n\nDeliverable:\n• Design\
        \ Challenge definita.\n• Concept Idea preliminare.\n\nAttività:\n• Attività\
        \ collaborativa per generare idee progettuali.\n\nLezione 4: Visualizzazione\
        \ e Modellazione del Servizio (Secondo Diamante)\n\nObiettivi:\n• Applicare\
        \ strumenti di visualizzazione per progettare il servizio.\n• Utilizzare il\
        \ secondo diamante del Double Diamond (Develop e Deliver).\n\nContenuti:\n\
        \n1. PRIMA PARTE\n  • Creazione di deliverable visuali:\n  • User Journey\
        \ Map (contestualizzata sulla base di Personas ed Experience Map).\n  • Ecosystem\
        \ Map.\n  • Introduzione al Service Blueprint (struttura e utilizzo).\n2.\
        \ SECONDA PARTE\n  • Workshop: Service Blueprint e iterazione del concept.\n\
        \  • Preparazione delle specifiche per il prototipo.\n\nDeliverable:\n• User\
        \ Journey Map.\n• Ecosystem Map.\n• Service Blueprint.\n\nAttività:\n• Creazione\
        \ collaborativa delle mappe e del blueprint.\n\nLezione 5: Test e Iterazione\
        \ del Concept\n\nObiettivi:\n• Introdurre metodologie di ricerca quantitativa.\n\
        • Progettare un test di usabilità per raccogliere feedback sul concept di\
        \ servizio.\n\nContenuti:\n\n1. PRIMA PARTE\n  • Metodologie di ricerca quantitativa:\n\
        \  • Survey design.\n  • Analisi statistica dei dati.\n  • Usability Testing:\
        \ principi e framework.\n2. SECONDA PARTE\n  • Workshop: Progettazione e conduzione\
        \ di un test di usabilità sul concept.\n  • Iterazione del concept sulla base\
        \ dei risultati del test.\n\nDeliverable:\n• Report del test di usabilità.\n\
        • Raccomandazioni per migliorare il prototipo.\n\nAttività:\n• Conduzione\
        \ di un usability test sul concept.\n\nOutput Finali del Modulo:\n• Design\
        \ Concept di Servizio.\n• Proto Personas / Personas.\n• Empathy Map.\n• Experience\
        \ Map.\n• User Journey Map.\n• Ecosystem Map.\n• Service Blueprint.\n• Report\
        \ del test di usabilità."
      Testi/Bibliografia: 'Modulo 1


        Teoria


        - Dispense del Corso disponibili in formato elettronico


        Laboratorio


        - W3schools: https://www.w3schools.com/


        Modulo 2


        UX Methods: A Quick Guide to User Experience Research Methods

        James Pannafino & Patrick McNeil, 2017.'
      Metodi didattici: 'Lezioni frontali dei docenti


        Laboratori didattici e realizzazione di piccoli progetti con approccio technology
        hands-on.'
      Modalità di verifica e valutazione dell'apprendimento: 'Modulo 1


        Presentazione di un progetto di gruppo alla presenza di tutti i docenti.

        Per la parte di informatica andrà presentato un prototipo del progetto o sotto
        forma di app oppure di sito web.

        Durante il corso ci sarà una verifica individuale che andrà ad influenzare
        il voto finale.


        Modulo 2


        La valutazione si baserà sull’attività pratica di sviluppo del servizio (deliverable
        prodotti) e sulla conoscenza teorica dei contenuti del testo di riferimento.

        Note per gli Studenti:

        • La partecipazione attiva a workshop e attività pratiche è essenziale per
        completare i deliverable richiesti.

        • I contenuti teorici del libro UX Methods: A Quick Guide to User Experience
        Research Methods saranno parte integrante della valutazione.'
      Strumenti a supporto della didattica: 'Didattica frontale: slide proiettate
        a lezione.

        Laboratorio didattico con esercitazioni guidate.'
      Orario di ricevimento: 'Consulta il sito web di Massimo Carnevali (https://www.unibo.it/sitoweb/massimo.carnevali2)


        Consulta il sito web di Federica Protti (https://www.unibo.it/sitoweb/federica.protti5)'
  en:
    title: 2025/2026 Interaction Multimedia Services — University of Bologna
    contents:
      Learning outcomes: 'The module aims to provide a common background on the requirements
        of the new participatory services, starting from an analysis of the main features
        of enabling technologies. It intends to experiment in a new and creative way
        enabling technologies and services through an open and living lab approach,
        encouraging participation and increasing the design capacity and working with
        new technologies. Students acquire skills on the topics of


        - architecture of Web systems: servant customer models, execution models,
        protocols and Web environments, Web technologies, execution of components
        for fixed and mobile systems;

        - design of components for the supplying of services in fixed and mobile heterogeneous
        environments;

        - usage patterns of services and technological support, integration of services
        in ecosystems oriented to the end user.'
      Course contents: "Module 1\n\nA - Computer Science Fundamentals\n\n1. An introduction\
        \ to computer science\n2. Virtualization and cloud computing\n3. Algorithms\
        \ and programming languages\n4. intellectual property\n5. Privacy law\n\n\
        B - Web & more\n\n1. Web basics\n2. HTML programming\n3. Artificial Intelligence\
        \ and Machine Learning\n\nC - Javascript Programming\n\n1. Variables\n2. Instruction\
        \ set\n3. Functions\n4. Event Driven\n\nD -Cyber security\n\n1. Introduction\n\
        2. Who is the enemy?\n3. Social engineering\n4. Password management\n5. Data\
        \ backup\n6. Application security (web and mobile)\n7. Privacy and online\
        \ rights\n\nTheoretical lessons will be completed by a strong lab part with\
        \ numerous exercises and examples of hands-on programming in order to provide\
        \ students with the ability to design and analyze simple algorithms, web sites\
        \ and mobile apps.\n\nModule 2\n\nModule Title: Design Process and User Research\
        \ Methodologies\nDuration: 5 lessons (2 sessions per lesson, 3 hours each)\n\
        Module Objective: Design a service concept based on user-centered research\
        \ methodologies and design processes, culminating in strategic and operational\
        \ deliverables useful for prototype development.\n\nLesson 1: Introduction\
        \ to User-Centered Design and Design Thinking Workshop\n\nObjectives:\n• Understand\
        \ key design methodologies and their role in the product development process.\n\
        • Apply the complete Design Thinking process in a practical workshop.\n\n\
        Contents:\n\n1. PART ONE\n  • Introduction to User-Centered Design (UCD).\n\
        \  • From HCI (Human-Computer Interaction) to UX (User Experience).\n  • Overview\
        \ of design frameworks (e.g., Double Diamond).\n  • User Research methods.\n\
        2. PART TWO\n  • Full Design Thinking workshop: Empathize, Define, Ideate,\
        \ Prototype, Test.\n\nDeliverable: None.\nActivities: Participation in the\
        \ Design Thinking workshop.\n\nLesson 2: Problem Exploration and Current Context\
        \ Creation\n\nObjectives:\n• Apply the Double Diamond framework to identify\
        \ key problems and formulate a Design Challenge.\n• Create deliverables representing\
        \ the current context and problem.\n\nContents:\n\n1. PART ONE\n  • Introduction\
        \ to the first diamond of the Double Diamond (Discover and Define).\n  • Qualitative\
        \ research techniques:\n  • Semi-structured interviews.\n  • Contextual Inquiry.\n\
        \  • User Observation.\n  • Creation of a User Research Plan.\n2. PART TWO\n\
        \  • Synthesis of collected information:\n  • Proto Personas / Personas.\n\
        \  • Experience Map (representation of the current context).\n\nDeliverables:\n\
        • Proto Personas / Personas.\n• Experience Map.\n\nActivities:\n• Conducting\
        \ field research activities.\n• Collaborative creation of Personas and Experience\
        \ Maps.\n\nLesson 3: Synthesizing Results and Concept Ideation\n\nObjectives:\n\
        • Analyze and synthesize research findings.\n• Define key insights and transform\
        \ them into design opportunities.\n\nContents:\n\n1. PART ONE\n  • Research\
        \ findings synthesis (Empathy Mapping, POV, HMW).\n  • Problem definition\
        \ techniques:\n  • Why-How Laddering.\n2. PART TWO\n  • Creative ideation\
        \ methods:\n  • Guided brainstorming.\n  • SCAMPER.\n  • Introduction to Concept\
        \ Design (linking insights to project ideas).\n\nDeliverables:\n• Defined\
        \ Design Challenge.\n• Preliminary Concept Idea.\n\nActivities:\n• Collaborative\
        \ activities to generate design ideas.\n\nLesson 4: Service Visualization\
        \ and Modeling (Second Diamond)\n\nObjectives:\n• Apply visualization tools\
        \ to design the service.\n• Use the second diamond of the Double Diamond (Develop\
        \ and Deliver).\n\nContents:\n\n1. PART ONE\n  • Creation of visual deliverables:\n\
        \  • User Journey Map (contextualized with Personas and Experience Maps).\n\
        \  • Ecosystem Map.\n  • Introduction to the Service Blueprint (structure\
        \ and usage).\n2. PART TWO\n  • Preparation of prototype specifications.\n\
        \nDeliverables:\n• User Journey Map.\n• Ecosystem Map.\n• Service Blueprint.\n\
        \nActivities:\n• Collaborative creation of maps and the blueprint.\n\nLesson\
        \ 5: Concept Testing and Iteration\n\nObjectives:\n• Introduce quantitative\
        \ research methodologies.\n• Design a usability test to gather feedback on\
        \ the service concept.\n\nContents:\n\n1. PART ONE\n  • Quantitative research\
        \ methodologies:\n  • Survey design.\n  • Statistical data analysis.\n  •\
        \ Usability Testing: principles and frameworks.\n2. PART TWO\n  • Workshop:\
        \ Designing and conducting a usability test on the concept.\n  • Iterating\
        \ the concept based on test results.\n\nDeliverable: Improved concept based\
        \ on test findings.\nActivities: Conduct usability tests and refine the concept.\n\
        \nFinal Module Output:\n• Service Design Concept\n• Proto Personas / Personas.\n\
        • Empathy Map.\n• Experience Map.\n• User Journey Map.\n• Ecosystem Map.\n\
        • Service Blueprint.\n• Usability test report"
      Readings/Bibliography: 'Module 1


        Theory


        - Course slides in electronic format.


        Lab


        - W3schools: https://www.w3schools.com/


        Module 2


        UX Methods: A Quick Guide to User Experience Research Methods

        James Pannafino & Patrick McNeil, 2017.'
      Teaching methods: 'Frontal lectures of the teacher.


        Didactic labs and development of small projects with a technology hands-on
        approach.'
      Assessment methods: 'Module 1


        Group project presentation to all teachers.

        For the IT part, a prototype of the project will be presented either in the
        form of an app or a website.

        During the course there will be an individual assessment that will influence
        the final grade.


        Module 2


        Assessment will be based on the practical service development activities (deliverables
        produced during the course) and the theoretical knowledge of the reference
        text’s content.'
      Teaching tools: 'Classroom teaching: slides shown during the lectures.

        Lab with guided exercises.'
      Office hours: 'See the website of Massimo Carnevali (https://www.unibo.it/sitoweb/massimo.carnevali2/en)


        See the website of Federica Protti (https://www.unibo.it/sitoweb/federica.protti5/en)'
