syllabus:
  it:
    title: 2025/2026 RETI DI CALCOLATORI (12 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente conosce:
        (i) i principi di funzionamento delle reti di calcolatori, (ii) le principali
        tecnologie e protocolli di comunicazione, inclusa la famiglia di protocolli
        TCP/IP, utilizzati per implementare reti a commutazione di pacchetto, (iii)
        l''architettura della rete Internet, (iv) i principi di funzionamento e tecnologie
        principali per reti Wireless, ed è in grado di (v) comprendere e implementare
        i meccanismi di comunicazione fra processi e (vi) progettare e sviluppare
        protocolli e applicazioni per la comunicazione fra processi.'
      Contenuti: 'Fondamenti: definizioni, storia e sviluppo delle reti di calcolatori.

        Topologie, risorse di rete e canali logici di comunicazione.

        Prestazioni delle reti di calcolatori: indici e loro significato per diversi
        ambiti applicativi.

        Commutazione di circuito e commutazione di pacchetto.

        I protocolli di comunicazione di rete.

        Architetture di rete: distinzione tra architetture HW e SW.

        Architetture di servizi di rete: Client/server, Peer to peer, ibride.

        Il modello ISO/OSI RM.

        Il livello fisico: mezzi trasmissivi, segnali, codifica/decodifica, con particolare
        riferimento a sistemi di comunicazione Radio e codifiche per sistemi radio.

        Il livello data Link. Canali di comunicazione. Tecniche di accesso al mezzo
        trasmissivo condiviso. Indirizzamento MAC. Trasmissione affidabile. Rilevazione
        e correzione dell’errore.

        Tecnologie di rete locale: hub, repeater, bridge e switch. Connettività di
        rete locale.

        Sistemi Wireless (rete locale): tecnologie di progettazione sistemi basati
        su radiofrequenza, Antenne, propagazione, link budget, Decibel, codifiche,
        tecniche di rilevazione e correzione errore, Protocolli MAC (es. IEEE 802.11)
        e Bluetooth. Sistemi Mobili: Mobile IP. Varianti del protocollo TCP.

        Progettazione di topologie e collegamenti di reti locali.


        Canali virtuali (MPLS) e reti virtuali (VLAN).

        Il livello Rete: protocollo e indirizzamento IPv4. IPv6. Domini e indirizzamento
        gerarchico. Subnetting e supernetting, classi di rete IPv4 (CIDR). Configurazione
        IP. Network Address Translation (NAT). SDN e OpenFlow. ICMP. ARP e RARP. DHCP.


        Progettazione di reti e sottoreti in domini IP.

        Configurazione e gestione di reti locali (SNMP).

        Analisi di problematiche di prestazioni e funzionamento in reti locali.

        Reti di reti e inter-networking. Instradamento e Routing IP (locale e inter-domain).
        Router.

        Multicasting.

        Livello Trasporto: Transmission Control Protocol (TCP), aspetti prestazionali
        delle reti end-to-end. Controllo di Congestione. Controllo di flusso.

        Socket e programmazione socket (TCP/UDP).

        Comunicazione tra processi.

        Livello Sessione e Presentazione.

        Livello Applicazione. Esempi di protocolli e servizi a livello applicazione:
        SMTP (email), http (WWW), DNS, streaming video, gaming, P2P, VoIP.

        Qualità del servizio. Real Time communication.

        Sicurezza delle reti di comunicazione: principi di crittografia. integrità
        e firma digitale. Livello trasporto (TCP) sicuro (SSL). Livello rete sicuro
        (IPsec). Reti private virtuali (VPN). Firewall e Intrusion Detection.'
      Testi/Bibliografia: 'Testi consigliati (preferibilmente in lingua originale
        inglese)


        - J.F.Kurose, K.W.Ross, Reti di Calcolatori e Internet - au approccio top-down,
        7 edizione, (Pearson), ISBN: 9788891902542

        - Larry L. Peterson, Bruce S. Davie, Reti di calcolatori, 3 edizione, (Apogeo),
        EAN: 9788850331062

        - Slide delle lezioni e contenuti delle esercitazioni (fornite online agli
        studenti prima delle lezioni tramite piattaforma Virtuale).'
      Metodi didattici: 'Lezioni frontali in aula con proiezione di slide elettroniche.
        Esercitazioni e dimostrazioni live con strumenti di emulazione di rete e calcolatori
        connessi.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/ ] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in:


        - una prova scritta S (obbligatoria), con domande e esercizi (anche pratici)
        su tutto il programma e le esercitazioni del corso.

        - un test T di programmazione di rete (obbligatorio)

        - un esame orale O (facoltativo).


        Durante la prova S è ammesso l''utilizzo di tutto il materiale presentato
        a lezione (slide e testi) in forma cartacea, in quanto NON è ammesso l''utilizzo
        di dispositivi informatici che consentano la comunicazione e l''accesso a
        Internet.


        La sufficienza della prova scritta è fissata a 15/25. La sufficienza del Test
        T è fissata a 3/6. La proposta di voto finale è ottenuta solo se si ottengono
        punteggi sufficienti sia allo scritto S che al test T. Si viene ammessi al
        test T solo se il voto dello scritto supera i 15/25. Si viene ammessi all''orale
        (facoltativo, tranne nei casi richiesti obbligatoriamente dal docente) solo
        se la somma S+T è almeno 18.


        Il punteggio finale è dato dalla somma dei voti di scritto (S, compreso tra
        0 e 25, con sufficienza a 15 punti) e Test (T, compreso tra 0 e +6, con sufficienza
        a +3 punti) al quale va eventualmente aggiunto il voto dell''orale (O, compreso
        tra -3 e +3) secondo la formula:


        V = S + T (+ O)


        Nei casi in cui la formula applicata superi il voto 30, e il comportamento
        dello studente denoti maturità e disciplina durante le lezioni e durante le
        prove, viene verbalizzata la lode.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Slide delle lezioni, letture consigliate
        e link a approfondimenti su Web, codice delle esercitazioni (python), rete
        del dipartimento (e dispositivi di rete in aula), strumenti di analisi del
        traffico (Wireshark, etc.) e Network Emulation (es. Cisco Packet Tracer o
        altri) utilizzando link e servizi messi a disposizione e comunicati agli studenti
        prima delle lezioni.
      Orario di ricevimento: Consulta il sito web di Luciano Bononi (https://www.unibo.it/sitoweb/luciano.bononi)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Ridurre le
        disuguaglianze Città e comunità sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Computer Networks (12 ECTS) — University of Bologna
    contents:
      Learning outcomes: 'The student will learn:


        - the fundamentals of the computer networks;

        - main technologies and communication protocols, including the TCP/IP suite
        for Internet and packet-based communication;

        - the Internet architecture, the way Internet operates, inter-process communication
        and the design and development of inter-process communication protocols, including
        the principles and technologies for Wireless communications.'
      Course contents: 'Foundation topics: definitions, history and development of
        computer networks.

        Topologies, network resources, and logical channels.

        Computer Network performances: indexes and their meaning in different application
        contexts.

        Circuit-switched and packet-switched networks.

        Network communication protocols.

        Network architectures: HW and SW.

        Network Service architectures: Client/server, Peer to peer, hybrid.

        ISO OSI Reference Model.

        Physical layer: transmission medium, signals, encoding/decoding specifically
        focusing on radio communications.

        Data Link layer: communication channels, Medium Access Control techniques,
        MAC addressing, Reliable communication, Error detection and correction.

        Local Area Network technologies: hub, repeater, bridge, switch. LAN connectivity.

        LAN topologies and links.

        Wireless systems (local networks): design of radio communication systems,
        antennas, wireless propagation, link budget, Decibels, enconding, error detection
        and correction techniques, MAC protocols (e.g. IEEE 802.11 and Bluetooth).
        Mobile systems: Mobile IP, TCP variants.

        Virtual channels (MPLS) and virtual networks (VLAN).

        Network Layer: IPv4 protocol and addressing. IPv6. Domains and hierarchical
        addressing. Subnetting and supernetting, IPv4 network classes, CIDR, IP configuration.
        Network Address Translation (NAT). SDN e OpenFlow. ICMP. ARP e RARP. DHCP.

        Design of network and subnetworks in IP domains.

        Management and configuration of LANs (SNMP).

        Troubleshooting and analysis of network performance and issues.

        Networks of networks and inter-networking. Forwarding and routing IP (local
        and ISP-based - interdomain). Router.

        Multicasting.

        Transport layer: Transmission Control Protocol (TCP), performance of end-to-end
        communications, Congestion control. Flow control.

        Sockets and socket programming (examples) with UDP/TCP.

        Inter-process communications over Internet.

        Session and Presentation layers.

        Application layer: examples of protocols and services at the application layer.
        SMTP (email), http (WWW), DNS, streaming video, gaming, P2P, VoIP.

        Quality of service. Real Time communication.

        Security of communication networks. Privacy, crittography, integrity and digital
        signature. Secure transport layer (TCP): SSL. Secure network layer. IPsec.
        Virtual Private Networks (VPN). Firewalls and Intrusion Detection.'
      Readings/Bibliography: 'Recommended readings:


        - J.F. Kurose, K.W. Ross, Computer Networking: A Top-Down Approach, last edition

        - Larry L. Peterson, Bruce S. Davie, Computer Networks: A Systems Approach,
        last edition

        - the slides and experimentation material illustrated during the classes and
        lab experiences will be provided online before the classes on the Virtuale
        platform.'
      Teaching methods: 'Lessons with electronic slides'' projection, live demos and
        training on emulation and network tools and connected devices.


        In relation to the kind of activities and didactical methods adopted, the
        attendance to this class will require the preliminary participation of all
        the students to the Modules 1 and 2 of the Safety rules on study places, which
        can ne followed remotely in e-learning via the following link: [https://elearning-sicurezza.unibo.it/
        ]'
      Assessment methods: 'The final exam consist of three parts:


        - a written exam W (mandatory), with questions and exercises (also practical)
        about the whole program and demos during the classes.

        - a test T (mandatory), dealing with network programming.

        - a oral exam O (optional).


        In the written exam W students are allowed to access and use all the material
        illustrated in the classes (slides and books) in paper format, because it
        is NOT allowed to use any digital device enabled to communicate and to access
        the Internet.


        The sufficient evaluation in the written part W is equal or greater than 15/25.
        The sufficient evaluation of test T is equal or greater than 3/6. The final
        evaluation is achieved only if both the written part W and the test part T
        are sufficient. Students are admitted to the test T only if the written part
        W is sufficient. Students are admitted to the oral part O (optional) only
        if the score W + T is greater or equal than 18.


        The final score F is given by the sum of W (in the range 0 to 25, sufficient
        = 15) and T (in the range 0 to 6, sufficient = 3), with the addition of the
        optional oral evaluation O (between -3 and +3), by following the formula:


        F = W + T (+ O)


        In all cases where the score F is greater than 30, and the student''s behavior
        denoted maturity and discipline during the lessons and the exams, the "cum
        Laude" evaluation is provided.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the office responsible (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        ) as soon as possible so that they can propose acceptable adjustments. The
        request for adaptation must be submitted in advance (15 days before the exam
        date) to the lecturer, who will assess the appropriateness of the adjustments,
        taking into account the teaching objectives.'
      Teaching tools: Lessons' slides, recommended readings and links on the Web resources,
        code of demos (python), computer network of the department (and network devices
        used during the lessons), traffic analysis and monitoring tools (e.g. Wireshark,
        etc.), Network Emulation tools (e.g. Cisco Packet Tracer or others) by using
        the links and services made available and communicated to students before
        the classes.
      Office hours: See the website of Luciano Bononi (https://www.unibo.it/sitoweb/luciano.bononi/en)
      SDGs: 'Quality education Industry, innovation and infrastructure Reduced inequalities
        Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
