syllabus:
  it:
    title: 2025/2026 DISPOSITIVI E CIRCUITI INTEGRATI DI POTENZA LM — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        in maniera avanzata i dispositivi di potenza a semiconduttore, incluse tecnologie
        emergenti come GaN e SiC; sa condurre l’analisi dell'affidabilità dei transistori
        di potenza e tecniche di monitoraggio e/o ottimizzazione di robustezza e prestazioni;
        possiede competenze nella progettazione e simulazione di circuiti di potenza
        GaN integrati.
      Contenuti: "Introduzione all'elettronica di potenza\n\n- Introduzione all'elettronica\
        \ di potenza\n- Esempi di applicazioni\n- Tipi di dispositivi e loro funzioni\n\
        \nDispositivi di potenza a semiconduttore\n\n- Transistori di potenza in silicio\
        \ (Si):\n  \n  - Vertical MOSFET, Super Junction MOSFET, Laterally-Diffused\
        \ MOSFET\n  - Caratteristiche principali (tensione di breakdown, On-resistance,\
        \ capacità intrinseche) e funzionamento\n  - Applicazioni tipiche: discreto\
        \ vs integrato\n- Transistori di potenza in carburo di silicio (SiC):\n  \n\
        \  - Vantaggi e svantaggi rispetto al Si\n  - Caratteristiche e funzionamento\n\
        \  - Applicazioni tipiche: discreto\n- Transistori di potenza in nitruro di\
        \ gallio (GaN):\n  \n  - Vantaggi e svantaggi rispetto al Si e SiC\n  - Depletion\
        \ HEMT, Cascode, Enhancement HEMT (MISHEMT vs pGaN HEMT vs Fe-gate HEMT)\n\
        \  - Caratteristiche e principio di funzionamento\n  - Applicazioni tipiche:\
        \ discreto vs integrato\n- Diodi Schottky in nitruro di gallio (GaN):\n  \n\
        \  - Principio di funzionamento\n  - Caratteristiche e applicazioni\n\nAffidabilità\
        \ dei dispositivi di potenza\n\n- Problematiche comuni di affidabilità nei\
        \ dispositivi a semiconduttore\n- Degradazione e guasti nei transistori di\
        \ potenza\n- Tecniche di mitigazione e miglioramento dell'affidabilità\n-\
        \ Case study di fallimenti e analisi di ricerca\n- Attività di Laboratorio:\
        \ Esperimenti su transistori di potenza a semiconduttore\n\nProgettazione\
        \ integrata in GaN\n\n- Fondamenti dei circuiti di potenza\n- Introduzione\
        \ alla progettazione integrata\n- Progettazione di circuiti di potenza con\
        \ dispositivi GaN\n- Circuiti e tecniche di driving dei transistori GaN e\
        \ connesse problematiche\n- Tecniche di layout\n\nLaboratorio: progetto finale\n\
        \n- Progettazione di un transistor (o half bridge) GaN con gate driver integrato\n\
        - Simulazione del progetto mediante strumenti EDA per circuiti integrati\n\
        - Analisi delle prestazioni e ottimizzazione"
      Testi/Bibliografia: '[1] B. Jayant Baliga, "Fundamentals of Power Semiconductor
        Devices", Springer New York, NY, ISBN978-1-4899-7765-6.


        [2] Bernhard Wicht, "Design of Power Management Integrated Circuits", Wiley-IEEE
        Press, ISBN: 9781119123064.


        [3] M. P. Kaufmann. B. Wicht, "Monolithic Integration in E-Mode GaN Technology",
        Springer Cham, ISBN978-3-031-15627-4.'
      Metodi didattici: 'Il corso sarà strutturato principalmente attraverso lezioni
        teoriche in aula (65%) ed esercitazioni pratiche in laboratorio (35%).


        NOTA: Per poter seguire le esercitazioni in laboratorio, è necessario che
        tutti gli studenti abbiano completato il corso di formazione sulla sicurezza
        e salute nei luoghi di studio, relativo ai moduli 1 e 2, in modalità e-learning
        [https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio].'
      Modalità di verifica e valutazione dell'apprendimento: La verifica finale prevede
        la realizzazione di un progetto e una prova orale. Quest’ultima consiste in
        una serie di domande finalizzate a verificare la conoscenza degli argomenti
        affrontati a lezione e durante le esercitazioni di laboratorio, nonché degli
        aspetti progettuali.
      Strumenti a supporto della didattica: Slide rese disponibili su virtuale.unibo.it
        come supporto alle lezioni svolte alla lavagna.
      Orario di ricevimento: Consulta il sito web di Andrea Natale Tallarico (https://www.unibo.it/sitoweb/a.tallarico)
      SDGs: 'Energia pulita e accessibile Città e comunità sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 DISPOSITIVI E CIRCUITI INTEGRATI DI POTENZA LM — University of
      Bologna
    contents:
      Learning outcomes: At the end of the course, the student will acquire advanced
        knowledge of semiconductor power devices, including emerging technologies
        based on gallium nitride (GaN) and silicon carbide (SiC). They will be able
        to analyze the reliability of power transistors and identify techniques to
        improve their robustness and performance in practical applications. Finally,
        they will possess basic skills in the design and simulation of simple yet
        fundamental integrated power circuits using GaN technology.
      Course contents: "Introduction to Power Electronics\n\n- Introduction to power\
        \ electronics\n- Application examples\n- Types of devices and their functions\n\
        \nSemiconductor Power Devices\n\n- Silicon (Si) power transistors:\n  \n \
        \ - Vertical MOSFET, Super Junction MOSFET, Laterally-Diffused MOSFET\n  -\
        \ Main characteristics (breakdown voltage, on-resistance, intrinsic capacitances)\
        \ and operation\n  - Typical applications: discrete vs integrated\n- Silicon\
        \ Carbide (SiC) power transistors:\n  \n  - Advantages and disadvantages compared\
        \ to Si\n  - Characteristics and operation\n  - Typical applications: discrete\n\
        - Gallium Nitride (GaN) power transistors:\n  \n  - Advantages and disadvantages\
        \ compared to Si and SiC\n  - Depletion HEMT, Cascode, Enhancement HEMT (MISHEMT\
        \ vs pGaN HEMT vs Fe-gate HEMT)\n  - Characteristics and operating principles\n\
        \  - Typical applications: discrete vs integrated\n- Gallium Nitride (GaN)\
        \ Schottky diodes:\n  \n  - Operating principle\n  - Characteristics and applications\n\
        \nReliability of Power Devices\n\n- Common reliability issues in semiconductor\
        \ devices\n- Degradation and failure mechanisms in power transistors\n- Mitigation\
        \ techniques and reliability improvement\n- Case studies of failures and research\
        \ analysis\n- Laboratory activities: experiments on semiconductor power transistors\n\
        \nIntegrated Design in GaN\n\n- Fundamentals of power circuits\n- Introduction\
        \ to integrated design\n- Design of power circuits with GaN devices\n- Circuits\
        \ and driving techniques for GaN transistors and related challenges\n- Layout\
        \ techniques\n\nLaboratory: Final Project\n\n- Design of a GaN transistor\
        \ (or half-bridge) with integrated gate driver\n- Simulation of the project\
        \ using EDA tools for integrated circuits\n- Performance analysis and optimization"
      Readings/Bibliography: '[1] B. Jayant Baliga, "Fundamentals of Power Semiconductor
        Devices", Springer New York, NY, ISBN978-1-4899-7765-6.


        [2] Bernhard Wicht, "Design of Power Management Integrated Circuits", Wiley-IEEE
        Press, ISBN: 9781119123064.


        [3] M. P. Kaufmann. B. Wicht, "Monolithic Integration in E-Mode GaN Technology",
        Springer Cham, ISBN978-3-031-15627-4.'
      Teaching methods: 'The course will be mainly structured through theoretical
        classroom lectures (65%) and practical laboratory exercises (35%).


        NOTE: In order to attend the laboratory activities, all students must have
        completed the safety and health training course for study environments, specifically
        modules 1 and 2, in e-learning mode [https://www.unibo.it/it/servizi-e-opportunita/salute-e-assistenza/salute-e-sicurezza/sicurezza-e-salute-nei-luoghi-di-studio-e-tirocinio].'
      Assessment methods: The final assessment includes the completion of a project
        and an oral exam. The latter consists of a series of questions aimed at verifying
        the knowledge of the topics covered in lectures and laboratory exercises,
        as well as the design aspects.
      Teaching tools: Slides are made available on virtuale.unibo.it as support materials
        for the lessons conducted on the blackboard.
      Office hours: See the website of Andrea Natale Tallarico (https://www.unibo.it/sitoweb/a.tallarico/en)
      SDGs: 'Affordable and clean energy Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
