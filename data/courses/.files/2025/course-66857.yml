syllabus:
  it:
    title: 2025/2026 LOGICA PER L'INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        il linguaggio del calcolo proposizionale e della logica del prim'ordine. È
        in grado di scrivere e comprendere proposizioni logiche e di verificarne la
        validità.
      Contenuti: '1. Paradossi e loro risoluzione:

        Giustificazione della logica formale. Applicazione dei paradossi per dimostrare
        risultati negativi in informatica (cenni).


        2. Cenni alla teoria assiomatica degli insiemi:

        ZF, relazioni, funzioni, quozienti, cardinalità. Teorema di Cantor.


        3. Logica proposizionale:

        Sintassi e semantiche classica e intuizionista (cenni). Deduzione naturale
        classica e intuizionista per la logica proposizionale. Teoremi di correttezza,
        compattezza e completezza (senza dimostrazioni).


        4. Logica del prim''ordine:

        Sintassi della logica del prim''ordine (predicati, termini, quantificatori,
        variabili libere e vincolate, alpha-conversione e sostituzione). Semantica
        e deduzione naturale per la logica del prim''ordine.


        5. Ricorsione

        BNF per la definizione di grammatiche ricorsive. Induzione strutturale e ricorsione
        strutturale.


        Per gli argomenti 2-5 sono previste esercitazioni prariche in laboratorio.'
      Testi/Bibliografia: '- A. Asperti - A. Ciabattoni, Logica a informatica, McGraw
        Hill, 1997.

        - A. Masini, Logica simbolica, McGraw Hill, 2023.


        Entrambi i testi coprono la maggior parte degli argomenti visti a lezione.
        Per i restanti (semantica intuizionista, BNF, ricorsione e induzione strutturale)
        viene fornito dal docente materiale integrativo.'
      Metodi didattici: 'll corso si svolge nel primo semestre ed è articolato in
        lezioni frontali in aula ed esercitazioni settimanali svolte in laboratorio.
        Durante le lezioni frontali vengono trattati esaustivamente tutti gli argomenti
        del corso, presentando sia spiegazioni che soluzione di esercizi. Il docente
        utilizza durante le lezioni frontali lucidi messi a dispozione sull''applicativo
        virtuale (http://virtuale.unibo.it).


        Le esercitazioni di laboratorio sono finalizzate al pieno conseguimento da
        parte dello studente delle competenze previste, in particolare riguardo alla
        dimostrazione di nuovi teoremi e alla scrittura di programmi ricorsivi. Esse
        vertono sugli argomenti presentati nelle lezioni frontali durante la settimana
        precedente. Durante le esercitazioni in laboratorio lo studente può richiedere
        spiegazioni e aiuti sia al docente che a un assistente di laboratorio che
        sarà sempre presente.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 (https://corsi.unibo.it/laurea/informatica/formazione-obbligatoria-su-sicurezza-e-salute)
        di formazione sulla sicurezza nei luoghi di studio, in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica delle competenze
        acquisite si baserà su un esame scritto della durata di tre ore, il cui esito
        è un punteggio che può arrivare fino a 30 punti. Lo scritto consta di 4 esercizi,
        uno su ognuno degli argomenti 2-5 dell''insegnamento. Ogni esercizio consiste
        nell''effettuare una dimostrazione o nello scrivere un programma ricorsivo
        usando la tecnica associata all''argomento a cui fa riferimento. Per ogni
        esercizio si ottiene punteggio pieno se la dimostrazione o il codice prodotti
        sono privi di errori e conformi alla tecnica richiesta, un punteggio ridotto
        nel caso in cui la struttura della soluzione sia corretta, ma siano presenti
        errori e zero punti nel caso in cui anche la struttura della soluzione sia
        errata.


        Il voto finale proposto allo studente, che ha almeno 48 ore per decidere se
        accettarlo o ripetere l''esame, è dato dalla somma del voto dell''ultimo scritto
        sostenuto e di un bonus determinato dalle esercitazioni in laboratorio durante
        l''anno. In particolare ogni esercitazione in laboratorio consiste in un numero
        di esercizi nell''ordine indicativo di 3-10 che vengono valutati assegnando
        un piccolo punteggio a ogni esercizio interamente corretto. La somma di tutti
        questi punteggi viene riscalata alla fine dell''anno in maniera che non superi
        i 3 punti, costituendo il bonus da aggiungere al voto dell''esame scritto.
        Viene assegnato il punteggio di 30/30 e lode nel caso in cui la somma ecceda
        i 30 punti.


        Persone con disabilità e DSA


        Le persone con disabilità o disturbi specifici dell’apprendimento hanno diritto
        a speciali adattamenti in relazione alla loro condizione, previa valutazione
        del Servizio d’ateneo per le studentesse e gli studenti con disabilità e DSA.
        Si prega di non rivolgersi al/la docente, ma di contattare il Servizio per
        un appuntamento. Sarà cura del Servizio stabilire quali adattamenti si rendono
        opportuni. Maggiori informazioni alla pagina https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        .'
      Strumenti a supporto della didattica: 'I lucidi presentati, le registrazioni
        delle lezioni, i testi delle esercitazione in laboratorio e quelli degli esami
        proposti negli anni accademici precedenti, le relative soluzioni e ulteriore
        materiale di approfondimento vengono resi disponibili sulla piattaforma virtuale
        (http://virtuale.unibo.it).


        Per le esercitazioni verrà utilizzato un dimostratore interattivo di teoremi
        (Lean (https://leanprover-community.github.io/)) usando una sintassi semplificata
        e adattata all''esigenze didattiche dell''insegnamento.'
      Orario di ricevimento: Consulta il sito web di Claudio Sacerdoti Coen (https://www.unibo.it/sitoweb/claudio.sacerdoticoen)
  en:
    title: 2025/2026 Logic for Computer Science — University of Bologna
    contents:
      Learning outcomes: The student will know propositional calculus and first order
        logic. He will be able to write and understand logical propositions and to
        verify them.
      Course contents: '1. Paradoxes and Their Resolution:

        Justification of formal logic. Use of paradoxes to demonstrate negative results
        in computer science (overview).


        2. Introduction to Axiomatic Set Theory:

        ZF, relations, functions, quotients, cardinality. Cantor’s Theorem.


        3. Propositional Logic:

        Syntax and both classical and intuitionistic semantics (overview). Classical
        and intuitionistic natural deduction for propositional logic. Soundness, compactness,
        and completeness theorems (without proofs).


        4. First-Order Logic:

        Syntax of first-order logic (predicates, terms, quantifiers, free and bound
        variables, alpha-conversion, and substitution). Semantics and natural deduction
        for first-order logic.


        5. Recursion

        BNF for Grammar Definitions.Structural induction and structural recursion.


        Practical lab sessions are planned for topics 2–5.'
      Readings/Bibliography: '- A. Asperti - A. Ciabattoni, Logica a informatica,
        McGraw Hill, 1997

        - A. Masini, Logica simbolica, McGraw Hill, 2023.


        Both textbooks cover most of the topics discussed during the lectures. For
        the remaining ones (intuitionistic semantics, BNF, recursion, and structural
        induction), supplementary material will be provided by the instructor.'
      Teaching methods: 'The course takes place in the first semester and is structured
        into in-class lectures and weekly lab exercises. During the lectures, all
        course topics are thoroughly covered, including both explanations and exercise
        solutions. The instructor uses slides made available through the virtuale
        (http://virtuale.unibo.it/) learning platform during the lectures.


        The lab exercises are designed to ensure that students fully acquire the expected
        competencies, particularly with regard to proving new theorems and writing
        recursive programs. These exercises focus on the topics covered in the lectures
        from the previous week. During the lab sessions, students can ask both the
        instructor and a lab assistant—who will always be present—for clarification
        and support.


        Given the nature of the activities and the teaching methods adopted, attendance
        requires all students to have completed Modules 1 and 2 (https://corsi.unibo.it/laurea/informatica/formazione-obbligatoria-su-sicurezza-e-salute)
        of the safety training for study environments, delivered in e-learning format.'
      Assessment methods: 'The assessment of acquired skills is based on a written
        exam lasting three hours, with a maximum score of 30 points. The written exam
        consists of 4 exercises, one for each of the course topics 2–5. Each exercise
        involves either performing a proof or writing a recursive program using the
        technique associated with the relevant topic. Full marks are awarded if the
        proof or code is error-free and adheres to the required technique, partial
        credit is given if the solution''s structure is correct but contains some
        errors, and no points are awarded if the solution''s structure is also incorrect.


        The final grade proposed to the student—who has at least 48 hours to decide
        whether to accept it or retake the exam—is the sum of the score obtained in
        the most recent written exam and a bonus derived from lab exercises completed
        during the year. Each lab session includes approximately 3–10 exercises, each
        of which is awarded a small number of points if completed correctly. The total
        score from all lab exercises is rescaled at the end of the year so that it
        does not exceed 3 points, forming the bonus to be added to the written exam
        score. A score of 30 with honors (30/30 e lode) is awarded if the total exceeds
        30 points.


        Students with Disabilities and Specific Learning Disorders (SLD)


        Students with disabilities or specific learning disorders (SLD) are entitled
        to special accommodations based on their condition, subject to evaluation
        by the University Service for Students with Disabilities and SLD. Students
        are kindly asked not to contact the instructor directly, but instead to make
        an appointment with the Service. The Service will determine the appropriate
        accommodations.


        More information is available at:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti'
      Teaching tools: 'The slides presented, lecture recordings, lab exercise texts,
        past exam papers from previous academic years along with their solutions,
        and additional in-depth materials are made available on the virtuale (http://virtuale.unibo.it/)
        platform.


        For the exercises, an interactive theorem prover (Lean (https://leanprover-community.github.io/))
        will be used, with a simplified syntax adapted to the teaching needs of the
        course.'
      Office hours: See the website of Claudio Sacerdoti Coen (https://www.unibo.it/sitoweb/claudio.sacerdoticoen/en)
