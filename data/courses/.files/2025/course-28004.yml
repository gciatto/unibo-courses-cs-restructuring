course_title:
  id: '28004'
  name: FONDAMENTI DI INFORMATICA T-1
integrated_course: ''
campus: Bologna
programme: Laurea in Ingegneria gestionale
syllabus:
  it:
    title: 2025/2026 FONDAMENTI DI INFORMATICA T-1 (A-K) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenze di base e operative della struttura
        dell'elaboratore e dei principi della programmazione orientata agli oggetti.
        Analisi della complessità computazionale. Elementi di basi di dati relazionali.
      Contenuti: '1. Architettura dei sistemi di elaborazione

        Struttura generale di un calcolatore elettronico. La macchina di Von Neumann.
        Supporti di memorizzazione.


        2. Software di base per sistemi di elaborazione

        Il sistema operativo. Strumenti per la programmazione: editor, debugger, compilatori
        e interpreti. Fasi di sviluppo di un programma.


        3. Elementi di programmazione

        Metodi per l''analisi di un problema. Algoritmi. Metodologie di programmazione
        strutturata e modulare. Iterazione e ricorsione.


        4. Linguaggi di programmazione

        I linguaggi di programmazione e cenni alla loro evoluzione. Sintassi e semantica.


        5. Il linguaggio Java

        Introduzione alla programmazione ad oggetti. Il paradigma ad oggetti. Fondamenti
        del linguaggio Java. Alcuni algoritmi e strutture dati in Java. Ereditarietà.
        Strutture dati avanzate in Java.'
      Testi/Bibliografia: "1. A. Chianese, V. Moscato, A. Picariello, C. Sansone:\
        \ Le radici dell'informatica, I edizione. Maggioli Editore\n2. W. Savitch:\
        \ Programmazione con Java, II edizione. Pearson\n  I testi potranno essere\
        \ integrati da lucidi integrativi scaricabili dal sito Web del corso, che\
        \ fornirà anche testi e soluzioni di prove d'esame, software di supporto alla\
        \ programmazione, ecc."
      Metodi didattici: 'Il corso viene erogato mediante proiezione di slide dal computer
        del docente, in aula. Le slide corrispondono al contenuto dei libri di testo
        ufficialmente adottati per il corso.


        Le lezioni sono integrate da esercitazioni in laboratorio al computer tenute
        dal tutor del corso: ogni esercitazione affronta uno specifico argomento proponendo
        esercizi concreti, per la cui soluzione è necessario mettere a frutto quanto
        acquisito durante le ore di lezione col docente.


        Tutte le lezioni sono tenute in italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale, che accerta l’acquisizione delle conoscenze
        e delle abilità attese tramite lo svolgimento di una prova pratica che si
        svolgerà in laboratorio, della durata di 2.5 ore, seguita da una eventuale
        prova orale.


        Per poter partecipare alla prova pratica è necessario iscriversi alla lista
        dell''appello tramite l''applicativo AlmaEsami.


        La prova pratica consiste di norma di due parti: la prima dedicata agli argomenti
        più teorici del corso consisterà nel rispondere ad alcune domande. La seconda
        consisterà nel realizzare un piccolo programma funzionante, usando il linguaggio
        Java. Per superare la prova è necessario ottenere un punteggio minimo di 15
        punti.


        La prova orale è necessaria solo qualora il voto della prova pratica non sia
        superiore a 17, oppure a richiesta del docente. La prova orale consiste in
        un approfondimento orale, con il docente, volto ad accertare la comprensione
        dello studente dei contenuti presentati a lezione. La prova orale deve obbligatoriamente
        essere svolta nello stesso appello della prova pratica.'
      Strumenti a supporto della didattica: 'Le lezioni in aula verranno svolte utilizzando
        lucidi, con il supporto della lavagna per lo svolgimento di esercizi.


        Le esercitazioni in laboratorio consentiranno ad ogni studente di disporre
        di un calcolatore sul quale svolgere l''attività di programmazione prevista,
        sotto la guida di un tutor.'
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/course/view.php?id=63299
      Orario di ricevimento: Consulta il sito web di Armir Bujari (https://www.unibo.it/sitoweb/armir.bujari)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Foundations of Informatics T-1 (A-K) — University of Bologna
    contents:
      Learning outcomes: Basic and operative knowledge of computer architectures.
        Knowledge of principles, methodologies, and tools for solving low-complexity
        problems. Capability of applying the competencies in the projcet and development
        of small programs, following the object-oriented paradigm.
      Course contents: '1. Computer Architecture

        General architecture of a computer. Von Neumann machine. Memory devices.


        2. Computer software

        The operating system. Tools for programming: editors, debuggers, compilers,
        and interpreters. Development phases of a program.


        3. Programming concepts

        Methods for problem solving. Algorithms. Methodologies of structured and modular
        programming. Iteration and recursion.


        4. Programming languages

        Programming languages: concepts and history. Syntax and semantics.


        5. Java Language

        Introduction to object-oriented programming. Object-oriented paradigm. Fundamenals
        of the Java programming language. Algorithms and data structures in Java.
        Inheritance. Advanced data structures in Java.'
      Readings/Bibliography: "1. A. Chianese, V. Moscato, A. Picariello, C. Sansone:\
        \ Le radici dell'informatica, I edizione. Maggioli Editore\n2. W. Savitch:\
        \ Programmazione con Java, II edizione. Pearson\n  Some additional slides\
        \ (in Italian) may be provided by the teacher on the web site, that will also\
        \ provide exam exercises (with solutions), programming software, etc."
      Teaching methods: 'The course is provided by means of slides displayed during
        lecture hours. Slides correspond to the content of the official book adopted
        for the course.


        Lectures are integrated with computer-based experiences in a laboratory, held
        by the tutor: each experience tackles a particular theme, for which real problems
        are proposed; such problems are to be solved using the knowledge obtained
        during lecture hours.


        Fluent spoken and written italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in italian.'
      Assessment methods: 'Achievements will be assessed by the means of a final exam.
        This is based on an analytical assessment of the "expected learning outcomes"
        described above. In order to properly assess such achievement the examination
        is composed of a practical test (2.5 hours long), possibly followed by an
        oral exam.


        In order to be accepted to the exam, the student should register through the
        AlmaEsami application.


        The exam usually consists of two parts: the first part will be devoted to
        the assessment of the theoretical topics, and it will consist in answering
        few questions. The second part will consist in implementing a small program,
        using the Java language. In order to pass the written exam, a minimum score
        of 15 points is needed.


        The oral session is required only in the case the score obtained in the practical
        exam does not exceed 17, or when requested by the teacher. The oral session
        consists of a technical conversation with the teacher in order to demonstrate
        a knowledge of the key concepts of the subject. The oral exam should be taken
        in the same session of the practical exam.'
      Teaching tools: 'Classroom lessons will be held using slides, which will be
        integrated with the use of the blackboard for the development of exercises.


        Lab hours are supported by the tutor of the course. Students will be assigned
        a PC, so as to practice the concepts learned during the lessons, and to improve
        their programming capabilities.'
      Links to further information: https://virtuale.unibo.it/course/view.php?id=63299
      Office hours: See the website of Armir Bujari (https://www.unibo.it/sitoweb/armir.bujari/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
