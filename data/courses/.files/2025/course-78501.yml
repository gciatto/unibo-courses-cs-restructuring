syllabus:
  it:
    title: 2025/2026 SISTEMA DI ELABORAZIONE DELLE INFORMAZIONI -- — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo lo studente conosce
        gli strumenti informatici di base per la gestione di serie di dati; è in grado
        di elaborare dati derivanti da operazioni di misura strumentale e da campionamenti
        statistici
      Contenuti: '- Programmi di elaborazione calcolo (Excel): concetto di cella e
        di foglio di calcolo, creazioni di tabelle, creazione di grafici (istogramma,
        a torta, e di correlazione xy), e introduzione all’uso delle funzioni (media,
        mediana, percentuale, errore standard, funzioni logiche); esercitazioni pratiche.

        - Programmi di presentazione (Power Point): informazioni di base per l’impego
        di Power Point, progettazione della presentazione; aspetto visivo della presentazione;
        testi;

        - Programmi di elaborazione di testi: Word, comandi principali; nozioni base
        sulla formattazione e struttura di un documento; strumento revisione;


        -Programmi di utilities: Obsidian, nozioni di base sul funzionamento e sui
        comandi.'
      Metodi didattici: Lezioni teoriche frontali e esercitazioni pratiche tramite
        l'uso di Personal Computer e programmi del pacchetto Office
      Modalità di verifica e valutazione dell'apprendimento: '- consegna di un elaborato
        ed prova pratica svolta durante l''esame'
      Orario di ricevimento: Consulta il sito web di Sofia Avnet (https://www.unibo.it/sitoweb/sofia.avnet3)
