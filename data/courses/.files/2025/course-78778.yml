syllabus:
  it:
    title: 2025/2026 INTELLIGENT SYSTEMS M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course the students are
        able to use the main AI techniques to develop tools for solving real life
        applications.

        The students are able to understand and apply a wide range of techniques such
        as constraint programming, symbolic and sub-symbolic machine learning techniques,
        planning and swarm intelligence.'
      Contenuti: Il corso e' tenuto in lingua inglese. Per i contenuti e le altre
        informazioni sul corso si faccia riferimento alla versione inglese.
      Orario di ricevimento: 'Consulta il sito web di Michela Milano (https://www.unibo.it/sitoweb/michela.milano)


        Consulta il sito web di Allegra De Filippo (https://www.unibo.it/sitoweb/allegra.defilippo)'
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Intelligent Systems M — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the students are able to use the
        main AI techniques to develop tools for solving real life applications.

        The students are able to understand and apply a wide range of techniques such
        as constraint programming, symbolic and sub-symbolic machine learning techniques,
        planning and swarm intelligence.'
      Course contents: 'Module 1:


        PLANNING


        - Non-linear planning

        - Conditional planning

        - Graph-based planning

        - Planning for robotics


        OPTIMIZATION


        - Constraint Programming and Global constraints

        - Search strategies

        - Applications


        SWARM INTELLIGENCE


        - Ant colony

        - Bee Colony

        - Particle Swarm Optimization


        Module 2:


        MACHINE LEARNING


        (symbolic and sub-symbolic approaches)


        - Decision trees - random forests

        - Neural networks

        - Bayesian approaches

        - Inductive logic programming


        DEEP LEARNING'
      Readings/Bibliography: 'E. Rich, K. Knight: "Intelligenza Artificiale", McGraw
        Hill, Seconda Edizione 1992.


        E. Charniak, D. McDermott, "Introduzione all''Intelligenza Artificiale", Masson,
        1988.


        M.Ginsberg: "Essentials of Artificial Intelligence", Morgan Kaufman,1993.


        P. H. Winston: "Artificial Intelligence: Third Edition", Addison-Wesley, 1992.'
      Teaching methods: Lectures and laboratory exercises
      Assessment methods: Written exam
      Teaching tools: 'Slides


        lab exercises'
      Office hours: 'See the website of Michela Milano (https://www.unibo.it/sitoweb/michela.milano/en)


        See the website of Allegra De Filippo (https://www.unibo.it/sitoweb/allegra.defilippo/en)'
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
