syllabus:
  it:
    title: 2025/2026 PROJECT MANAGEMENT — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente:


        - conosce i principi base del Project Management e ha padronanza degli approcci
        riscontrabili nel settore della produzione di software, partendo da quelli
        più tradizionali fino agli approcci iterativi e adattivi tipici delle metodologie
        "agile";

        - conosce qualche strumento di supporto alla gestione di progetti e ha approfondito
        alcuni aspetti pratici anche con esercitazioni di laboratorio;

        - è in grado di partecipare e/o gestire un progetto di sviluppo software.'
      Contenuti: '- Introduzione al project management.

        - Definizione di progetto, programma e portfolio.

        - Definizione di scope, qualità, risorse e loro interrelazione.

        - Definizione di project management.

        - Definizione dei processi e delle aree di conoscenza coinvolte nella gestione
        dei progetti secondo Project Management Body of Knowledge (PMBOK).

        - La gestione degli aspetti fondamentali: integrazione, ambito, tempo, costi,
        qualità, risorse umane, comunicazione, rischio, approvvigionamento e stakeholder.

        - Il ciclo di vita di un progetto e sua gestione: approccio tradizionale,
        incrementale, iterativo e adattivo.

        - Scoping process group.

        - Planning process group.

        - Launching/executing process group.

        - Monitoring and controlling process group

        - Closing process group.

        - Esercitazioni.

        - Seminari.'
      Testi/Bibliografia: '- Dispense a cura del docente.

        - Project Management Institute, “A Guide to the Project Management Body of
        Knowledge (PMBOK® Guide)”, Sixth Edition, 2017, ISBN: 978-1628253825.

        - Project Management Institute, “Agile Practice Guide”, 2017, ISBN: 978-1628251999.

        - F.P. Brooks, “The mythical man-month: essays on software engineering - Anniversary
        Edition”, 1995, Addison-Wesley, ISBN: 978-0201835953.

        - R.K. Wysocki, “Effective Project Management: Traditional, Agile, Extreme,
        6th Edition”, 2011, Wiley, ISBN: 978-1-1180-1619-0.'
      Metodi didattici: Durante le lezioni verranno presentati sia gli aspetti teorici
        che pratici relativi ai diversi argomenti trattati. Esempi ed esercitazioni
        aiuteranno lo studente a comprendere l'uso pratico delle metodologie e degli
        strumenti presentati.
      Modalità di verifica e valutazione dell'apprendimento: 'La prova d''esame mira
        a valutare il raggiungimento degli obiettivi didattici:


        - conoscenza dei principi del project management e dei principali approcci
        usati;

        - conoscenza dei processi, dei template e degli strumenti di supporto alla
        gestione di progetti con approfondimento di alcuni aspetti pratici;

        - capacità di gestire un progetto.


        Per essere ammesso alla prova d''esame lo studente deve consegnare una simulazione
        di progetto, preventivamente concordata con il docente.


        La prova finale consiste in un orale in cui lo studente discuterà la simulazione
        di progetto consegnata e dovrà dimostrare le conoscenze e abilità apprese
        durante il corso.


        Il punteggio finale corrisponde indicativamente alle seguenti valutazioni
        sul livello di apprendimento raggiunto: <18 insufficiente; 18-23 sufficiente;
        24-27 buono; 28-30 ottimo; 30 e lode eccellente.'
      Strumenti a supporto della didattica: Dispense, presentazioni, seminari, esercizi
        ed esempi.
      Orario di ricevimento: Consulta il sito web di Marco Antonio Boschetti (https://www.unibo.it/sitoweb/marco.boschetti)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Project Management — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course students:


        - know the basic principles of Project Management and can manage different
        approaches used in software production, from the most traditional ones to
        the iterative and adaptive approaches typical of the “agile” project management;

        - know some tools used in project management and have gained a better understanding
        of some practical aspects also through practical exercises;

        - can participate in or manage a software development project.'
      Course contents: '- Introduction to project management.

        - Definition of project, program, portfolio.

        - Definition of scope, quality, resources and their interrelationship.

        - Definition of project management.

        - Definition of processes and knowledge areas involved in project management
        according to the Project Management Body of Knowledge (PMBOK).

        - Management of integration, scope, time, cost, quality, human resources,
        communications, risk, procurement, and stakeholders.

        - The life cycle of a project and its management: traditional, incremental,
        iterative, and adaptive.

        - Scoping process group.

        - Planning process group.

        - Launching/executing process group.

        - Monitoring and controlling process group

        - Closing process group.

        - Exercises.

        - Seminars.'
      Readings/Bibliography: '- Lecture Notes.

        - Project Management Institute, “A Guide to the Project Management Body of
        Knowledge (PMBOK® Guide)”, Sixth Edition, 2017, ISBN: 978-1628253825.

        - Project Management Institute, “Agile Practice Guide”, 2017, ISBN: 978-1628251999.

        - F.P. Brooks, “The mythical man-month: essays on software engineering - Anniversary
        Edition”, 1995, Addison-Wesley, ISBN: 978-0201835953.

        - R.K. Wysocki, “Effective Project Management: Traditional, Agile, Extreme,
        6th Edition”, 2011, Wiley, ISBN: 978-1-1180-1619-0.'
      Teaching methods: Lectures propose both theoretical and practical aspects concerning
        the different topics. Examples and exercises help students to understand the
        practical use of the proposed methodologies, templates, and tools.
      Assessment methods: 'A final oral examination assesses the achievement of learning
        objectives:


        - knowledge of project management principles and of the main approaches used;

        - knowledge of processes, templates, and tools to support the project management
        with some details of the practical aspects;

        - ability to manage a project.


        To be admitted to the final examination, the student must submit a project
        simulation, previously agreed with the teacher. During the oral examination,
        the student discusses the project simulation submitted and must answer questions
        to assess the knowledge and skills acquired during the course.


        The final score corresponds to the following level of learning achieved: <18
        insufficient; 18-23 sufficient; 24-27 good; 28-30 very good; 30L excellent.'
      Teaching tools: Lecture notes, slides, seminars, exercises, examples.
      Office hours: See the website of Marco Antonio Boschetti (https://www.unibo.it/sitoweb/marco.boschetti/en)
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
