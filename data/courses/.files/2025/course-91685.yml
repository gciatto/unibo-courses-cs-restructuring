syllabus:
  it:
    title: 2025/2026 STORIA DELL'INFORMATICA E DEI DISPOSITIVI DI CALCOLO — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        e sa descrivere le idee principali che hanno portato al calcolatore elettronico
        a programma memorizzato. Conosce le tappe fondamentali della creazione e dello
        sviluppo dell’informatica nella seconda metà del secondo scorso, e sa riconoscere
        come queste hanno influenzato l’informatica contemporanea.
      Contenuti: 'Il corso presenterà alcune tappe fondamentali nella costruzione
        della forma attuale dell''informatica. Introdurremo le idee principali, i
        modelli di pensiero e i principi che hanno contribuito alla nascita e all’evoluzione
        di alcune aree dell’informatica, attraverso alcune architetture, macchine
        e linguaggi, ma senza soffermarsi troppo sui loro dettagli.


        Il periodo di riferimento è quello che va dal 1945 (primo calcolatore elettronico
        programmabile general purpose) ai primi anni 80. Nei vari segmenti (temporali
        o concettuali) vedremo l''evoluzione delle architetture, dei sistemi operativi
        e dei linguaggi di programmazione, mostrando come questi temi sono collegati
        tra loro.


        Viste le competenze del docente, i linguaggi di programmazione avranno un''attenzione
        particolare.


        1. Introduzione: cosa significa "fare storia dell''informatica"

        2. La preistoria: prima del 1945

        3. Primi calcolatori elettronici programmabili

        4. I calcolatori trovano un mercato, anzi più di uno: gli anni 50

        5. I mainframe e la nascita dell''informatica come disciplina

        6. Minicalcolatori e microprocessori

        7. Comunicare e collaborare

        8. Calcolatori personali'
      Testi/Bibliografia: 'Un possibile manuale:


        Thomas Haigh, Paul E. Ceruzzi. A New History of Modern Computing. MIT Press,
        2021.


        Alcune fonti in:

        Brian Randell (a cura di). The Origins of Digital Computers: Selected Papers.
        Springer, 1982.


        Altri testi:


        1. Martin Campbell-Kelly, William F. Aspray, Jeffrey R. Yost, Honghong Tinn,
        Gerardo Con Díaz and Nathan Ensmenger. Computer–A History of the Information
        Machine (Fourth Edition). Routledge, 2023.

        2. Tedre, Matti (2014). The Science of Computing: Shaping a Discipline. Chapman
        Hall.

        3. Mark Priestley (2011). A Science of Operations. Springer.'
      Metodi didattici: Lezioni frontali, discussione seminariale di documenti
      Modalità di verifica e valutazione dell'apprendimento: 'Esame orale.


        L''esame verificherà la conoscenza del materiale presentato a lezione. Più
        che singoli dettagli è importante saper riconoscere ed articolare le linee
        di sviluppo e le fratture dell''evoluzione, nonché le connessioni tra vari
        argomenti o periodi.


        L''esame inizierà con un argomento a piacere, scelto tra quelli presentati
        a lezione, o un loro approfondimento, o un tema non trattato (concordato prima
        con il docente). Questa prima parte è il punto di partenza per le domande,
        che verificheranno la conoscenza delle altre parti del programma e la capacità
        di individuare le connessioni trai vari argomenti.'
      Strumenti a supporto della didattica: Il materiale (slide, documenti, ecc.)
        delle lezioni sarà disponibile su virtuale.unibo.it (https://virtuale.unibo.it)
        via via che il corso si sviluppa.
      Orario di ricevimento: Consulta il sito web di Simone Martini (https://www.unibo.it/sitoweb/simone.martini)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 History of Informatics and Computing Systems — University of
      Bologna
    contents:
      Learning outcomes: On completion of the course the student will know and be
        able to describe the main ideas that led to the stored-program electronic
        computer. He/she knows the milestones in the creation and development of computer
        science in the second half of the last century and can recognise how these
        have influenced contemporary computer science.
      Course contents: 'This course will present some milestones in the construction
        of the current form of computer science. We will introduce the main ideas,
        thought patterns and principles that have contributed to the birth and evolution
        of certain areas of computer science, through certain architectures, machines
        and languages, but without dwelling too much on their details.


        The reference period is from 1945 (first general purpose programmable electronic
        computer) to the early 1980s. In the various (temporal or conceptual) segments,
        we will see the evolution of architectures, operating systems and programming
        languages, showing how these topics are interconnected.


        Given the lecturer''s expertise, programming languages will receive special
        attention.


        1. Introduction: what it means to ‘do computer science history’

        2. Prehistory: before 1945

        3. First programmable electronic computers

        4. Calculators find a market, indeed more than one: the 1950s

        5. Mainframes and the birth of computing as a discipline

        6. Mini-computers and microprocessors

        7. Communicating and collaborating

        8. Personal computers'
      Readings/Bibliography: 'One possible textbook:


        Thomas Haigh, Paul E. Ceruzzi. A New History of Modern Computing. MIT Press,
        2021.


        Some sources in: Brian Randell (a cura di). The Origins of Digital Computers:
        Selected Papers. Springer, 1982.


        Other texts:


        1. Martin Campbell-Kelly, William F. Aspray, Jeffrey R. Yost, Honghong Tinn,
        Gerardo Con Díaz and Nathan Ensmenger. Computer–A History of the Information
        Machine (Fourth Edition). Routledge, 2023.

        2. Tedre, Matti (2014). The Science of Computing: Shaping a Discipline. Chapman
        Hall.

        3. Mark Priestley (2011). A Science of Operations. Springer'
      Teaching methods: Lectures, seminar discussion of documents
      Assessment methods: 'Oral examination.


        The examination will test knowledge of the material presented in class. Rather
        than individual details, it is important to be able to recognise and articulate
        the lines of development and fractures in evolution, as well as the connections
        between various topics or periods.


        The examination will begin with a topic of one''s choice, chosen from those
        presented in the lecture, or an in-depth study of them, or a topic not covered
        (agreed beforehand with the lecturer). This first part is the starting point
        for the questions, which will assess the knowledge of the various parys of
        the program and the ability to identify connections between those topics.'
      Teaching tools: The material (slides, documents, etc.) of the lectures will
        be available on virtuale.unibo.it (https://virtuale.unibo.it) as the course
        develops.
      Office hours: See the website of Simone Martini (https://www.unibo.it/sitoweb/simone.martini/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
