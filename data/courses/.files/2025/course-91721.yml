syllabus:
  it:
    title: 2025/2026 LABORATORIO DI REALTA' VIRTUALE E REALTA' AUMENTATA — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del percorso didattico, lo studente
        conosce i principi teorici fondamentali, le piattaforme hardware e le piattaforme
        software principali di progettazione e realizzazione di ambienti di realtà
        virtuale e realtà aumentata. Lo studente, inoltre, acquisisce le competenze
        necessarie per progettare, creare e modificare tali scenari, oltre che le
        modalità di interazione con le stesse.
      Contenuti: "- Introduzione alla realtà aumentata e virtuale (AR / VR)\n- Principi:\
        \ Computer Graphics in AR / VR\n- Principi: Percezione e fattori umani (Progettazione\
        \ e sviluppo dell'interfaccia utente 3D: strategie e modalita' di valutazione)\n\
        - Principi: interazione in AR / VR (selezione e manipolazione,\n  Navigazione,\
        \ Controllo del sistema, Ingresso simbolico)\n- Hardware: output (canali visivi,\
        \ uditivi, ottici, vestibolari e olfattivi)\n- Hardware: Input (sistemi di\
        \ tracciamento, dispositivi di input)\n- Contenuti VR (standard e progettazione)\n\
        - Software: Piattaforme (Introduzione, sistemi runtime VR, motori Real Time\
        \ Physics, ambienti virtuali distribuiti, ambienti virtuali collaborativi,\
        \ ambienti di gaming)\n- Realtà mista (Mixed Reality Continuum - AR to VR,\
        \ Mixed Reality Technologies)\n- Avatar\n- Applicazioni di AR / VR\n- Futuro\
        \ delle tecnologie AR / VR\n- Esercitazioni / Dimostrazioni"
      Testi/Bibliografia: 'LaValle, Steven. "Virtual reality." (2016). Harvard


        JERALD J.: The VR Book: Human-Centered Design for Virtual Reality. ACM and
        Morgan & Claypool Publishers, 2016.


        SCHMALSTIEG D., HAULLERER T.: Augmented Reality Principles and Practice (Usability).
        Addison-Wesley Professional, 2016.'
      Metodi didattici: Lezioni frontali ed esercitazioni di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: Agli studenti verrà richiesto
        di realizzare un progetto (individuale o di gruppo), partendo dall'idea, mostrandone
        l'implementazione, i test effettuati, la valutazione, la dimostrazione e la
        documentazione. Per esempi di progetti svolti nelle edizioni precedenti del
        corso, fare riferimento al sito del laboratorio VARLAB (https://site.unibo.it/varlab/en/students/projects-2).
      Strumenti a supporto della didattica: Gli studenti avranno la possibilità di
        utilizzare l'infrastruttura AR / VR disponibile presso il VARLAB (https://site.unibo.it/varlab/en),
        comprendente AR / VR HMD (HTC Vive, Microsoft Hololens 2, Magic Leap 2, etc.),
        3D PowerWall, 3D scanner, telecamera 360, server di calcolo e per la modellazione
        3D.
      Orario di ricevimento: Consulta il sito web di Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    title: 2025/2026 Laboratory of Virtual Reality and Advanced Reality — University
      of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the fundamental
        theoretical principles, the hardware and the main software platforms required
        to design and create virtual and augmented reality environments. Furthermore,
        the student acquires the skills necessary to design, create, modify and interact
        with such environments
      Course contents: '- Introduction to Augmented and Virtual Reality (AR/VR)

        - Principles: Computer Graphics in AR/VR

        - Principles: Perception and Human Factors (Designing and developing 3D UI:
        strategies and evaluation)

        - Principles: Interaction in AR/VR (Selection and manipulation, Travel, Navigation,
        Way finding, System control, Symbolic input)

        - Hardware: Output (Visual, Auditory, Haptic, Vestibular, and Olfactory Channels)

        - Hardware: Input (Tracking Systems, Input Devices)

        - VR contents (Standards and Designing)

        - Software: Platforms (Introduction, VR runtime systems, Real Time Physics
        Engines, Distributed Virtual Environments, Collaborative Virtual Environments,
        Game Engines)

        - Mixed Reality (Mixed Reality Continuum - AR to VR, Mixed Reality Technologies)

        - Avatar

        - Applications of AR/VR

        - Future of AR/VR

        - Exercises/Demonstrations'
      Readings/Bibliography: 'LaValle, Steven. "Virtual reality." (2016). Harvard


        JERALD J.: The VR Book: Human-Centered Design for Virtual Reality. ACM and
        Morgan & Claypool Publishers, 2016.


        SCHMALSTIEG D., HAULLERER T.: Augmented Reality Principles and Practice (Usability).
        Addison-Wesley Professional, 2016.'
      Teaching methods: Lectures and lab hours.
      Assessment methods: Students will be asked to carry out a project (individually
        or in a group) documenting the idea and all of the steps leading to its implementation,
        including testing and evaluation. For examples of older projects carried out
        in previous editions of the course, please refer to the VARLAB (https://site.unibo.it/varlab/en/students/projects-2)
        website.
      Teaching tools: Students will be able to utilize the AR/VR infrastructure available
        at the VARLAB (https://site.unibo.it/varlab/en), comprising AR/VR HMDs (HTC
        Vive, Microsoft Hololen 2, Magic Leap 2, etc.), 3D PowerWall, 3D scanner,
        360 camera, computing resources for AI and 3D modeling.
      Office hours: See the website of Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
