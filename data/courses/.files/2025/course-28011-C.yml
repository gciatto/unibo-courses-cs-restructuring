syllabus:
  it:
    title: 2025/2026 RETI LOGICHE T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Introduzione ai modelli e alle metodologie
        di progetto dei sistemi digitali. Analisi e sintesi di reti combinatorie,
        reti sequenziali asincrone, reti sequenziali sincrone.
      Contenuti: "POSIZIONAMENTO DI RETI LOGICHE NEL PERCORSO FORMATIVO\n\nPrerequisiti:\n\
        \n- Nessuno\n\nPrincipali adiacenze a valle:\n\n- Calcolatori Elettronici\
        \ T e M, Elettronica T (cioè Elettronica digitale), Progetto di Sistemi Elettronici\
        \ T\n\nPROGRAMMA\nMacchine digitali e reti logiche\nCodifica delle informazioni\
        \ - principali codici numerici e alfanumerici\nModelli e metodi di analisi\
        \ e sintesi delle reti logiche combinatorie e sequenziali:\n\n- Reti combinatorie\n\
        \  \n  - algebra della commutazione\n  - i principali componenti combinatori:\
        \ decoder, multiplexer, operatori aritmetici\n  - sintesi minima e sintesi\
        \ basata sulle espressioni generali e sui teoremi di espansione (Multiplexer,\
        \ LUT e ROM)\n- Reti sequenziali - automi a stati finiti\n  \n  - reti sequenziali\
        \ asincrone e il FF-SR\n  - reti sequenziali sincrone e il FF-D\n  - reti\
        \ sequenziali sincrone comunemente impiegate come componenti di sistemi digitali:\n\
        \    \n    - contatori e registri di vario tipo\n\nComposizione di contatori,\
        \ registri e reti combinatorie e loro impiego in semplici progetti.\nIntroduzione\
        \ all'architettura di un calcolatore: Data Path e Unità di controllo.\n\n\
        Avvicinamento ai tools di supporto alla progetto e alla verifica di reti logiche:\
        \ generazione interattiva di schematici e relativa simulazione."
      Testi/Bibliografia: 'Modifica Testi/Bibliografia


        Roberto Laschi, Reti Logiche, Progetto Leonardo, Bologna

        R. Laschi, M.Prandini, Reti Logiche, Esculapio


        Peter J.Ashenden, Digital Design An Embedded Systems Approach Using VHDL,
        Morgan Kaufmann (solo i primi quattro capitoli ed il sesto sono rilevanti
        per questo insegnamento).'
      Metodi didattici: 'L''insegnamento è organizzato in lezioni frontali svolte
        alla lavagna, con il supporto di lucidi proiettati.


        Sono previste cinque ore e 30 minuti di lezione alla settimana per un totale
        di 60 ore.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste di
        una prova scritta obbligatoria della durata approssimativa di 3 ore.


        La prova è suddivisa in due parti: la prima è costituita da alcuni rapidi
        esercizi volti a verificare la comprensione della teoria, mentre la seconda
        parte prevede lo svolgimento di un esercizio di progetto.


        Per quanto riguarda la parte di teoria, le risposte vanno indicate sul foglio
        delle domande. Gli studenti non possono consultare nessuna fonte e il tempo
        a loro disposizione non supera i 50-60 minuti.


        La parte di progetto prevede la sintesi di una rete sequenziale sincrona che
        va poi impiegata in una rete logica complessa composta da diverse reti logiche
        interconnesse. Nella prova di progetto gli studenti possono consultare un
        solo foglio A4 sul quale possono essere riportati appunti inerenti l''intero
        corso, e il tempo a loro disposizione è dell''ordine delle 2 ore.


        Il docente si riserva di eseguire una ulteriore verifica basata su un colloquio.


        I punti a disposizione sono 33. In termini di punteggio disponibile la parte
        teorica ha un peso pari al 40% circa. Si prende 30 e lode se si ottengono
        complessivamente più di 31 punti. Il risultato insufficiente nella parte teorica
        rende insufficiente l''intera prova.'
      Strumenti a supporto della didattica: I lucidi del corso sono disponibili sulla
        piattaforma "Virtuale"
      Orario di ricevimento: Consulta il sito web di Matteo Poggi (https://www.unibo.it/sitoweb/m.poggi)
