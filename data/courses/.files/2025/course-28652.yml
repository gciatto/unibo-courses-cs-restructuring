syllabus:
  it:
    title: 2025/2026 SISTEMI INFORMATIVI T-1 — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Fornire gli strumenti metodologici necessari
        alla corretta progettazione ed utilizzo di un sistema informativo e allo sviluppo
        di applicazioni su piattaforma DBMS relazionale, nonché una conoscenza delle
        tecnologie di base impiegate nella loro realizzazione.
      Contenuti: 'Prerequisiti/Propedeuticità consigliate


        L’allievo che accede a questo insegnamento conosce l’organizzazione fondamentale
        e le funzionalità di un moderno sistema informatico. Tali conoscenze sono
        acquisite, di norma, superando un esame di Fondamenti di Informatica.


        Tutte le lezioni saranno tenute in Italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        Programma


        1. Sistemi informativi aziendali e sistemi per la gestione di basi

        di dati (DBMS).


        Introduzione ai concetti fondamentali sui sistemi informativi

        e sulle basi di dati relazionali. Teoria relazionale: definizioni

        di base, algebra relazionale, forme normali. Il linguaggio SQL: DDL

        e DML. Query semplici e query complesse (incluso raggruppamento e

        annidamento), viste. SQL per le applicazioni.


        2. Tecnologia dei sistemi relazionali.


        Il controllo degli accessi concorrenti e la gestione delle

        transazioni. Il ripristino delle informazioni in caso di guasti.

        Architetture avanzate: parallelismo, replicazione. Basi di dati

        distribuite: frammentazione, transazioni distribuite. Cenni

        sull''organizzazione fisica (indici B+tree, metodi di join,

        ottimizzazione).


        3. Progettazione dei sistemi informativi.


        Analisi dell''organizzazione aziendale, raccolta dei requisiti. Il

        progetto concettuale dei dati: il modello Entity-Relationship e gli

        schemi dei dati. Gli schemi dei flussi e delle operazioni: i

        diagrammi Data-Flow e i Workflow. Metodologie di progettazione.

        Progettazione integrata di dati e funzioni. Progetto

        logico-relazionale. Progettazione con sistemi ERP.'
      Testi/Bibliografia: "Testi consigliati:\n\n- P. ATZENI, S. CERI, P. FRATERNALI,\
        \ S. PARABOSCHI, R. TORLONE,\n  BASI DI DATI, McGraw-Hill, 4a edizione, 2014.\n\
        - F. GRANDI, Esercizi di Basi di Dati, Esculapio, 2a edizione, 2015.\n- L.\
        \ BARESI, C. FRANCALANCI, F.A. SCHREIBER, L. TANCA,\n  Progettazione Integrata\
        \ di Dati e Funzioni, Esculapio, 2003.\n\nTesti di approfondimento:\n\n- R.\
        \ VAN DER LANS, Introduzione a SQL, Addison-Wesley, 2001.\n\nDispense del\
        \ docente (copia dei lucidi utilizzati a lezione) sono scaricabili dalla piattaforma\
        \ Virtuale."
      Metodi didattici: 'La didattica frontale del corso consiste in lezioni ed

        esercitazioni in aula, svolte dal docente con l''ausilio di lucidi

        proiettati tramite PC e proiettore.


        Lo studente è inoltre tenuto a sviluppare il progetto di una base

        di dati relazionale, applicando le nozioni metodologiche apprese a

        lezione.


        L''insegnamento partecipa al progetto di sperimentazione didattica dell''Ateneo
        (Didattica Digitale Integrativa): per agevolare gli studenti che non possono
        frequentare in presenza in aula, le registrazioni delle lezioni saranno rese
        disponibili sulla piattaforma Virtuale/Panopto.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica del conseguimento
        delle abilità relative alla progettazione di un sistema informativo avviene
        mediante la discussione orale di un elaborato sviluppato in autonomia dallo
        studente.


        L''esame finale consiste principalmente in una prova scritta (della durata
        di 1h45'' da svolgersi senza l''ausilio di libri, dispense o appunti), nella

        quale sono presenti domande teoriche, che tenderanno ad accertare

        la conoscenza da parte dello studente dell''intero programma, ed

        esercizi pratici (query SQL ed ottimizzazione).


        La prova scritta si intende superata con un punteggio di 18/30 su

        un totale di 33/30. Una volta superata la prova scritta, lo

        studente è tenuto a sostenere un colloquio finale vertente sulla

        discussione della prova scritta e sulla presentazione del

        progetto. La prova orale va sostenuta negli appelli che precedono lo scritto
        successivo a quello superato.


        Per gli studenti frequentanti, è possibile sostenere la prova scritta in due
        parti: una prima prova parziale sulla prima parte del programma (SQL e teoria
        relazionale) che si svolgerà intorno alla metà del corso e una seconda prova
        parziale da sostenersi contestualmente agli scritti della sessione estiva
        (consistente nella seconda metà della prova scritta totale).


        Il superamento dell’esame sarà garantito agli studenti che dimostreranno padronanza
        e capacità operativa in relazione alla conoscenza dei concetti chiave illustrati
        nell''insegnamento, alla soluzione dei problemi proposti (uso del linguaggio
        SQL ed ottimizzazione di interrogazioni), alle capacità progettuali ed alla
        padronanza del linguaggio tecnico. Un punteggio più elevato sarà attribuito
        agli studenti che dimostreranno di aver compreso ed essere capaci di utilizzare
        tutti i contenuti dell’insegnamento illustrandoli con capacità di linguaggio,
        risolvendo problemi anche complessi, mostrando buone attitudini progettuali.
        Il mancato superamento dell’esame potrà essere dovuto all''insufficiente conoscenza
        dei concetti chiave, alla mancata padronanza del linguaggio tecnico, alla
        mancata o insufficiente capacità progettuale e operativa.'
      Strumenti a supporto della didattica: 'Materiale didattico scaricabile dalla
        piattaforma Virtuale (https://virtuale.unibo.it/).


        Le registrazioni delle lezioni sono messe a disposizione sulla piattaforma
        Virtuale/Panopto.'
      Link ad altre eventuali informazioni: http://www-db.disi.unibo.it/~fgrandi/didattica.html
      Orario di ricevimento: Consulta il sito web di Fabio Grandi (https://www.unibo.it/sitoweb/fabio.grandi)
  en:
    title: 2025/2026 IT Systems T-1 — University of Bologna
    contents:
      Learning outcomes: 'Aim of the course is to provide the methodological tools
        which are

        necessary for the correct design and use of an information system

        and for the development of applications on a relational DBMS

        platform, and to provide some knowledge of the base technologies

        which are deployed in their implementation.'
      Course contents: 'Requirements/Prior knowledge


        A prior knowledge and understanding of the basic organization and functionalities
        of a modern computer system is required to attend with profit this course.
        These notions are normally achieved by giving an exam of Foundations of Informatics.


        Fluent spoken and written Italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in Italian.


        Course Contents


        1. Enterprise Information Systems and Data Base Management Systems (DBMS).


        Introduction to the fundamental concepts on information systems

        and relational data bases. Relational theory: basic definitions,

        relational algebra, normal forms. The SQL language: DDL and DML.

        Simple and complex queries (including grouping and nesting), views.

        SQL for applications.


        2. Technology of Relational Systems.


        The control of concurrent accesses and the management of

        transactions. Recovery of information after malfunctions. Advanced

        architectures: parallelism, replication. Distributed data bases:

        fragmentation, distributed transactions. Outline of physical

        organization (B+tree indexes, join methods, optimization).


        3. Design of Information Systems.


        Analysis of enterprise organization, requirements collection.

        The conceptual design of data: the Entity-Relationship model and

        the data schemata. The flow and operation schemata: Data-Flow

        Diagrams and Workflows. Design methodologies. Integrated design of

        data and functions. relational logical design. Design with

        ERP systems.'
      Readings/Bibliography: "Recommended readings:\n\n- P. ATZENI, S. CERI, S. PARABOSCHI,\
        \ R. TORLONE, Databases,\n  McGraw-Hill, second edition, 1999 (free download\
        \ at http://dbbook.dia.uniroma3.it/).\n- F. GRANDI, Esercizi di Basi di Dati\
        \ (in Italian), Esculapio,\n\n- L. BARESI, C. FRANCALANCI, F.A. SCHREIBER,\
        \ L. TANCA,\n  Progettazione Integrata di Dati e Funzioni (in Italian), Esculapio,\n\
        \nReference books:\n\n- R. VAN DER LANS, Introduction to SQL, Addison-Wesley,\
        \ 2006.\n\nCopy of the slides used during the lectures can be downloaded from\
        \ the Virtuale platform."
      Teaching methods: 'Room lessons and exercises are given with the help of slides

        (via room PC+projector).


        Students must prepare a project work (design of a relational

        database), by applying the methodologies learned form the

        lessons.


        The course participates in the project of didactic experimentation of the
        University (Integrative Digital Teaching): to help students that cannot physically
        attend, the recording of the lectures will be made available on the Virtuale/Panopto
        platform.'
      Assessment methods: 'Verification of the design skills acquired is made through
        the oral discussion of a project work developed by the student.


        The final exam is mainly made of a written test (lasting 1h45'', to be made
        without the aid of books or notes), containing theory

        questions and practical exercises (SQL queries and

        optimization).


        The written test is passed if it receives a 18/30 score on a total

        score of 33/30. Once the written test is passed, the student has to

        take a final talk where the written test is discussed and the

        project is evaluated. The oral exam has to be taken in the scheduled dates
        preceding the written test that will follow the passed one.


        For students attending the lectures, it is possible to take the written test
        in two parts: a first partial test concerning the first half of the syllabus
        (SQL and relational theory) scheduled around the middle of the course and
        a second partial test to be taken during the scheduled written exams of the
        summer session (consisting of the second half of the complete written test).


        To obtain a passing grade, students are required to at least demonstrate a
        knowledge of the key concepts of the subject, some ability for the solution
        of assigned problems (SQL language use and query optimization), autonomous
        design skills, and a comprehensible use of technical language. Higher grades
        will be awarded to students who demonstrate an organic understanding of the
        subject and a clear and concise presentation of the contents, a high ability
        for problem solving, and consistent design capabilities. A failing grade will
        be awarded if the student shows knowledge gaps in key-concepts of the subject,
        inappropriate use of language, logic failures in the analysis of the subject,
        inadequate operational and design skills.'
      Teaching tools: 'Downloadable materials on the course topics are available on
        the Virtuale (https://virtuale.unibo.it/) platform.


        Recordings of lectures are made available on the Virtuale/Panopto platform.'
      Links to further information: http://www-db.disi.unibo.it/~fgrandi/didattica.html
      Office hours: See the website of Fabio Grandi (https://www.unibo.it/sitoweb/fabio.grandi/en)
