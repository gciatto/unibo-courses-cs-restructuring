syllabus:
  it:
    title: 2025/2026 KNOWLEDGE ENGINEERING FOR THE HUMANITIES (LM) — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student is
        familiar with the core technologies of the web and the semantic web. They
        are able to effectively use knowledge graphs and the tools to model and query
        them. They know the state of the art of artificial intelligence technologies.
      Contenuti: 'Questo modulo ha l''obiettivo di fornire allo studente una conoscenza
        approfondita sui knowledge graph e sui metodi e strumenti per interrogarli.
        Si affronteranno sia lo studio della modellazione di grafi di conoscenza basati
        su ontologie, sia l''uso pratico di alcuni strumenti software di supporto
        per la loro esplorazione e interrogazione. Inoltre, si studieranno le caratteristiche
        dei Large Language Models e le principali tecniche di prompting.


        In particolare saranno utilizzati i seguenti strumenti:


        - SPARQL query engine

        - Graffoo; OWL diagrams notation

        - Github

        - LLMs: GPT, Llama, Mistral, Mixtral, Gemini'
      Testi/Bibliografia: 'Note, slide e esercizi saranno resi reperibili su https://virtuale.unibo.it/


        Ciò che non è incluso nelle note può essere studiato utilizzando i seguenti
        riferimenti:


        - https://w3id.org/arco/

        - https://protegewiki.stanford.edu/wiki/Ontology101

        - http://owl.cs.manchester.ac.uk/publications/talks-and-tutorials/protg-owl-tutorial/

        - https://www.w3.org/TR/rdf-sparql-query/

        - https://essepuntato.it/graffoo/

        - https://projects.dharc.unibo.it/melody

        - http://wit.istc.cnr.it/stlab-tools/fred/

        - https://github.com/

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in action (2006) reperibile online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. 2008. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann Publishers Inc., San Francisco,
        CA, USA.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns - Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press 2016, ISBN 978-1-61499-675-0'
      Metodi didattici: Lezioni frontali, esercitazioni in laboratorio, compiti a
        casa e quiz di autovalutazione.
      Modalità di verifica e valutazione dell'apprendimento: 'Questo modulo viene
        valutato attraverso lo sviluppo e la discussione di un progetto di gruppo.


        Il voto sarà stabilito sulla base di una presentazione del progetto e un colloquio
        di approfondimento. Il progetto riguarderà gli argomenti studiati in entrambi
        i moduli (Computer Studies and Social Sciences e KNOWLEDGE ENGINEERING FOR
        THE HUMANITIES). Ogni componente del gruppo sarà valutato individualmente.
        Un gruppo può essere formato da 2 (minimo) fino a 6 (massimo) membri. Le indicazioni
        e le linee guida specifiche saranno fornite durante il corso e rese disponibili
        attraverso la piattaforma Virtuale. Il progetto e il voto finale saranno validi
        per l’esame integrato di 6 crediti.'
      Strumenti a supporto della didattica: 'Lucidi proiettati durante la lezione
        e poi resi disponibili online sulla pagina del corso.


        Piattaforme online per quiz di autovalutazione.


        Discord per discussioni e comunicazioni asincrone.'
      Orario di ricevimento: Consulta il sito web di Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti)
  en:
    title: 2025/2026 Knowledge Engeneering for the Humanities (LM) — University of
      Bologna
    contents:
      Learning outcomes: At the end of the course, the student is familiar with the
        core technologies of the web and the semantic web. They are able to effectively
        use knowledge graphs and the tools to model and query them. They know the
        state of the art of artificial intelligence technologies.
      Course contents: 'This module aims to provide the student with an in-depth knowledge
        of knowledge graphs and methods and tools to query them. The study of the
        modeling of knowledge graphs based on ontology will be addressed, as well
        as the practical use of some software tools to support their exploration and
        querying. Furthermore, the characteristics of Large Language Models and the
        main prompting techniques will be studied.


        In particular, the following tools will be used:


        SPARQL query engine

        Graffoo; OWL diagrams notation

        Github

        LLMs: GPT, Llama, Mistral, Mixtral, Gemini'
      Readings/Bibliography: 'Notes, slides and exercises are available at https://virtuale.unibo.it/


        Topics not addressed by the notes and other material on iol are to be studied
        on the following books / articles / web resources:


        - - https://w3id.org/arco/


        - https://protegewiki.stanford.edu/wiki/Ontology101

        - http://owl.cs.manchester.ac.uk/publications/talks-and-tutorials/protg-owl-tutorial/

        - https://www.w3.org/TR/rdf-sparql-query/

        - https://essepuntato.it/graffoo/

        - https://projects.dharc.unibo.it/melody

        - http://wit.istc.cnr.it/stlab-tools/fred/

        - https://github.com/

        - Johan van Benthem, Hans van Ditmarsch, Jan van Eijck, Jan Jaspars: Logic
        in action (2006) reperibile online: http://www.logicinaction.org/

        - Dean Allemang and James Hendler. 2008. Semantic Web for the Working Ontologist:
        Effective Modeling in RDFS and OWL. Morgan Kaufmann Publishers Inc., San Francisco,
        CA, USA.

        - Pascal Hitzler, Aldo Gangemi, Krzysztof Janowicz, Adila Krisnadhi, Valentina
        Presutti: Ontology Engineering with Ontology Design Patterns - Foundations
        and Applications. Studies on the Semantic Web 25, IOS Press 2016, ISBN 978-1-61499-675-0'
      Teaching methods: Lectures, lab practice, homework, and self-assessment quizzes.
      Assessment methods: 'This module is assessed through the development and discussion
        of a project developed in a group.


        The vote will be established on the basis of a presentation of the project
        and an in-depth interview. The project will concern the topics addressed by
        both modules (Computer Studies and Social Sciences and KNOWLEDGE ENGINEERING
        FOR THE HUMANITIES). Each member of the group will be evaluated individually.
        A group can be made of 2 (minimum) up to 6 (maximum) members. Details and
        guidelines will be provided during the course and made available through the
        Virtuale platform. The project and the final score will be valid for the integrated
        exam (6 CFU).'
      Teaching tools: 'Slides, they will be projected during the lectures and put
        online on the course web page.


        Online platforms for self-assessment quizzes.


        Discord for asynchronous discussion and communication.'
      Office hours: See the website of Valentina Presutti (https://www.unibo.it/sitoweb/valentina.presutti/en)
