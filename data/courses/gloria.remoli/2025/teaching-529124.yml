  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/529124
    title: 2025/2026 INFORMATICS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'The main objectives of the course are to
        provide:


        - general knowledge and understanding of the Information and Communication
        Technologies, their concepts and terminology

        - good understanding of the main concepts of computer programming and of the
        structure of algorithms, including the elements of computational complexity

        - ability to write the solution to a problem in terms of algorithm, with special
        reference to simple statistical computations

        - good understanding of the R language, including its data types and the language
        constructs for structured programming

        - ability to translate an algorithm into an R program.'
      Contenuti: See the English version
