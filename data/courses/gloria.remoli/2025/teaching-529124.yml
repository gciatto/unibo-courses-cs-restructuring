  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/529124
    title: 2025/2026 Informatics — University of Bologna
    contents:
      Learning outcomes: 'The main objectives of the course are to provide:


        - general knowledge and understanding of the Information and Communication
        Technologies, their concepts and terminology

        - good understanding of the main concepts of computer programming and of the
        structure of algorithms, including the elements of computational complexity

        - ability to write the solution to a problem in terms of algorithm, with special
        reference to simple statistical computations

        - good understanding of the R language, including its data types and the language
        constructs for structured programming

        - ability to translate an algorithm into an R program.'
      Course contents: 'Hardware, software, description of different computer types.

        Architecture of a personal computer; central processing unit, input

        and output devices, mass memories, main memories, memory sizes,

        performances of a computer.


        Types of software. Operating system and application programs.

        Principles of operating systems from the user point of view.

        Programming environments. Local and wide area networks. Networking.

        E-mail, internet and web access. Data security.


        Basics of programming: definition and design of an algorithm,

        data types. Data types in R.


        Structured programming, sequence, iteration, choice; procedures

        and functions. Structured programming in R.


        Generation and usage of random values in R.


        Design of programs. Implementation and test of programs with the R language.


        Laboratory activity: programming with the R language.'
      Readings/Bibliography: 'W. John Braun and Duncan J. Murdoch, A First Course
        in

        Statistical Programming with R, Cambridge University Press, (editions from
        2007 are all valid)


        ICDL Computer Essentials (syllabus (https://icdl.org/workforce/computer-essentials/))


        - In English: many books available, e.g. ICDL Plus Computer Essentials (https://www.amazon.com/gp/product/B08RDZ6YCK?ref_=dbs_p_pwh_rwt_anx_cl_0&storeType=ebooks)


        ICDL Online Essentials (syllabus (https://icdl.org/workforce/online-essentials/))


        - In English: many books available, e.g. ICDL plus Online Essentials (https://www.amazon.com/gp/product/B08RDWNDXT?ref_=dbs_p_pwh_rwt_anx_cl_1&storeType=ebooks)
        (English Edition)'
      Teaching methods: 'The teacher introduces the base concepts,

        emphasizes a programming method and provides a large amount of

        examples, with frequent references to

        statistic problems. Laboratory activity is designed

        to stimulate the implementation of the programming

        method.


        In consideration of the type of activity and teaching methods adopted, the
        attendance of this training activity requires the prior participation of all
        students in the courses "Safety in the study places". You can find information
        on following the course in e-learning mode looking up the “Health and safety
        mandatory training” at “Studying” section of your programme website.'
      Assessment methods: "The assessment is done in two parts, plus an optional oral\n\
        part. The final grade is computed adding the grades on the individual parts.\n\
        \n1. Verification of knowledge - A multiple choice test covers theory and\
        \ lectures; pts. 14,\n  minimum to pass pts. 7\n2. Verification of abilities\
        \ - A programming test is done in the laboratory, it\n  requires the writing\
        \ of an algorithm for the solution of a\n  computing problem (pts. 8) and\
        \ the translation in R language, using\n  an appropriate programming environment\
        \ (pts. 8), total pts. 16,\n  minimum to pass pts. 8. For the algorithm writing,\
        \ in order to pass it is required at least to correctly set the general structure\
        \ of the solution and find the main \"loops\". For the R translation it is\
        \ necessary at least to represent the general structure of the algorithm with\
        \ not more than four syntax errors or statement omissions.\n3. An optional\
        \ oral part covers all the topics of the course,\n  the evaluation ranges\
        \ from -3pts to +3pts. -3 corresponds to \"no answer\", 0 is assigned if the\
        \ students exhibits at least a general idea on the topic of the questions.\n\
        \nThe oral part is mandatory if the sum of the points\nobtained in parts 1\
        \ and 2 is less than 18 or if the student did not\npass one of the two parts.\n\
        \nMore details in the Teaching Resources on Virtuale"
      Teaching tools: 'The laboratory activity is assisted by

        tutors who help the students in the development of the tasks

        assigned by the teacher.

        The laboratories are equipped with

        programming environments for the R language.


        Individual programming exercises are needed to pass the exam. Lab attendance
        is strongly recommended.


        R programming examples on GitHub (https://github.com/bladerun16/Informatics-Stats-and-Maths.git)'
      Links to further information: https://virtuale.unibo.it
      Office hours: See the website of Claudio Sartori (https://www.unibo.it/sitoweb/claudio.sartori/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
