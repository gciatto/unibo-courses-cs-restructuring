syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/501529
    title: 2025/2026 INGEGNERIA DEL SOFTWARE (9 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente possiede
        nozioni fondamentali riguardanti l''ingegneria del software, ovvero i principali
        processi e pratiche per lo sviluppo collaborativo di sistemi software di elevata
        qualità.

        In particolare, lo studente conosce a sa applicare principi, pratiche e pattern
        nell''analisi, progettazione e realizzazione di sistemi software;

        sa indirizzare le problematiche relative alla qualità interna dei sistemi
        software; conosce le principali metodologie agili e pianificate ed è in grado
        di operare all''interno di un team di sviluppo'
      Contenuti: 'Introduzione all''ingegneria del software

        Modelli di processo di sviluppo del software

        Il modello di analisi

        Introduzione a UML

        UML: casi d''uso

        UML: classi

        Modello di analisi – modellazione di dominio

        UML: attività

        UML: Interazioni

        Principi di progettazione object oriented

        I pattern GRASP

        I design patterns

        Lo sviluppo software agile

        Pattern moderni e framework

        Testing: unità, integrazione e accettazione

        Strumenti di building automation

        Continuous Integration: pratiche e strumenti'
      Testi/Bibliografia: 'Craig Larman, Applying UML and Patterns: An Introduction
        to Object-Oriented Analysis and Design and Iterative Development (3rd Edition),
        Prentice Hall


        Altri testi saranno suggeriti a lezione'
      Metodi didattici: 'Lezioni frontali ed esercitazioni interattive di modellazione.


        Risoluzione interattiva di homework.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica delle competenze
        avviene attraverso la valutazione di una prova scritta e di un progetto, una
        ulteriore prova orale è opzionale.


        La prova scritta, della durata di 2 ore, prevede esercizi di modellazione
        e di specifica e delle domande a risposta aperta.


        Gli esercizi di modellazione sono valutati considerando la completezza e la
        correttezza; le domande a risposta aperta sono valutate considerando la completezza,
        la correttezza, l''uso appropriato del lessico tecnico, la capacità di fare
        collegamenti con altri argomenti dell''insegnamento e l''utilizzo del pensiero
        critico.

        E'' necessario raggiungere il punteggio minimo di 16 punti nella parte di
        modellazione affinché la prova sia sufficiente.


        Il progetto è valutato sulla base del materiale consegnato e di una discussione
        considerando la correttezza e l''adesione alle pratiche suggerite.


        La prova orale, opzionale, può riguardare tutti gli argomenti visti a lezione.


        Il voto finale si ottiene attraverso la media aritmetica della valutazione
        della prova scritta e della valutazione del progetto. La valutazione della
        prova orale concorre a modificare tale valore. Al voto finale può concorrere,
        nel limite di un punto addizionale per la prova scritta, anche la valutazione
        positiva dell''esposizione da parte dello studente di un esercizio in itinere
        proposto dal docente.


        La verbalizzazione non è automatica: gli studenti devono contattare il docente
        una volta acquisiti i voti di scritto e progetto.'
      Orario di ricevimento: Consulta il sito web di Davide Rossi (https://www.unibo.it/sitoweb/daviderossi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/501529
    title: 2025/2026 Software Engineering (9 ECTS) — University of Bologna
    contents:
      Learning outcomes: 'This is a software engineering course concerning software
        development processes and practices, with specific focus on those useful for
        the requirement and the design of software systems.

        Specifically, the students will learn how to apply principles, practices and
        patterns to the analysis, design and construction of software systems. They
        will learn how to address the issues related to the internal quality of software
        systems. They also will learn the main agile and plan-based methods and how
        to work in a development team.'
      Course contents: 'Introduction to Software Engineering

        The software process model

        The analisys model

        Introduction to UML

        UML: Use case

        UML: Classes

        Analisys model – domain model

        UML: Activities

        UML: Interactions

        OO principles

        GRASP

        Design Patterns

        Agile software development

        Modern patterns and frameworks

        Testing: unit, integration and acceptance tests

        Build automation tools

        Continuous Integration: practices and tools'
      Readings/Bibliography: 'Craig Larman, Applying UML and Patterns: An Introduction
        to Object-Oriented Analysis and Design and Iterative Development (3rd Edition),
        Prentice Hall


        Other textbooks and resources will be suggested during the lectures'
      Teaching methods: 'Lectures and interactive modeling exercises.


        Interactive homework presentation.'
      Assessment methods: 'The assessment of competencies is carried out through the
        evaluation of a written exam and a project, with an additional oral exam being
        optional.


        The written exam, lasting 2 hours, includes modeling and specification exercises
        as well as open-ended questions.


        The modeling exercises are assessed based on completeness and correctness;
        the open-ended questions are evaluated considering completeness, correctness,
        appropriate use of technical terminology, the ability to make connections
        with other topics from the course, and the use of critical thinking.


        The project is evaluated based on the submitted material and a discussion,
        taking into account correctness and adherence to the suggested practices.


        The optional oral exam may cover any of the topics discussed during the lessons.


        The final grade is obtained through the average of the written exam evaluation
        and the project evaluation. The oral exam evaluation contributes to modifying
        this value. To the final grade may also contribute, within the limit of one
        additional point for the written exam, the positive evaluation of the student''s
        presentation of an exercise proposed by the teacher during the course.


        The recording of the grade is not automatic: students must contact the instructor
        once they have received the grades for the written exam and project.'
      Office hours: See the website of Davide Rossi (https://www.unibo.it/sitoweb/daviderossi/en)
