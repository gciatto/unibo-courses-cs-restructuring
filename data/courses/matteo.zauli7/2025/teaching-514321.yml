syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514321
    title: 2025/2026 PROGETTO DI CIRCUITI E SISTEMI ANALOGICI M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrare il funzionamento e i criteri
        di progetto dei blocchi analogici fondamentali.
      Contenuti: 'Modelli analitici dei transistor ed effetti reattivi; impiego del
        simulatore circuitale SPICE. Specchi di corrente, stadi elementari, specchi
        di corrente cascode e di Wilson. Stadio amplificatore di tipo cascode, stadio
        differenziale; analisi in frequenza di alcuni stadi fondamentali. Schemi di
        base di amplificatori operazionali e generalità sulla compensazione: analisi
        dell''opamp a due stadi, tecniche di compensazione, esempi. Schemi di specchi
        di corrente ed operazionali avanzati: specchi di corrente ad ampio swing ed
        alta resistenza d''uscita, di tipo folded-cascode. Stadi di uscita.


        Richiami al problema del rumore nei circuiti. Modelli di rumore dei transistori
        (BJT e MOSFET). Esempi di calcoli di rumore in circuiti con BJT e MOSFET.


        Richiami sui filtri analogici e metodi di sintesi. Filtri LCR, circuito di
        Antoniou per la sostituzione dell''induttanza, filtri biquadratici, sensibilità
        alla variazione dei parametri.


        Convertitori Analogici-Digitali e Digitali-Analogici.


        Progetto di un amplificatore operazionale.


        Progetto di filtri analogici.'
      Testi/Bibliografia: 'T.C. Carusone, D.A. Johns, K. Martin "Analog Integrated
        Circuit Design" Wiley & Sons.


        P. R. Gray, P. J. Hurst, S. H. Lewis, R. G. Meyer “Analysis and Design of
        Analog Integrated Circuits” Wiley & Sons.


        P.E. Allen, D.R Holberg, “CMOS analog integrated circuit design”, Oxford University
        Press.


        A.S. Sedra, K.C. Smith, “Microelectronic Circuits”, Oxford University Press.'
      Metodi didattici: Il corso (9CFU) si basa principalmente su lezioni frontali,
        integrate da esempi ed esercitazioni al calcolatore mirate alla simulazione
        e progettazione di circuiti integrati analogici.
      Modalità di verifica e valutazione dell'apprendimento: L'esame consiste in una
        prova orale volta a dimostrare la padronanza dei concetti di analisi delle
        caratteristiche dei circuiti analogici. La prova orale può essere integrata
        da un progetto concordato con il docente.
      Strumenti a supporto della didattica: 'Lucidi forniti in aula dal docente


        Esercitazioni: simulazione circuitale di semplici circuiti analogici mediante
        l''uso del simulatore LTSPICE, scaricabile gratuitamente.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Orario di ricevimento: 'Consulta il sito web di Federica Zonzini (https://www.unibo.it/sitoweb/federica.zonzini)


        Consulta il sito web di Guido Masetti (https://www.unibo.it/sitoweb/guido.masetti)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/514321
    title: 2025/2026 Design On Analog Cicuits and Systems M — University of Bologna
    contents:
      Learning outcomes: Fundamentals of analog circuit design.
      Course contents: 'The main goal of the class is to provide an overview on the
        methods for designing analog circuits.


        Detailed contents:


        Analog circuit Modeling, Device Characterization;


        Circuit simulation and analysis with LTSPice;


        Analog Subcircuits;


        Voltage/current references;


        Operational amplifiers and review of basic linear op-amp circuits,


        Active Filters;


        Noise in analog circuits;


        A/D and D/A converters;'
      Readings/Bibliography: 'T.C. Carusone, D.A. Johns, K. Martin *"Analog Integrated
        Circuit Design"*Wiley & Sons.


        P. R. Gray, P. J. Hurst, S. H. Lewis, R. G. Meyer “Analysis and Design of
        Analog Integrated Circuits” Wiley & Sons.


        P.E. Allen, D.R Holberg, “CMOS analog integrated circuit design”, Oxford University
        Press.


        A.S. Sedra, K.C. Smith, “Microelectronic Circuits”, Oxford University Press.'
      Teaching methods: 'The implementation of analog circuits will be addressed in
        the lectures at different abstraction levels: device, circuit,and system.


        Design projects will be assigned to the student.'
      Assessment methods: The assessment is based on a single individual oral examination,
        and on design projects (not compulsory).
      Teaching tools: 'Recommended readings. Slides and lecture notes.


        Circuit simulations with LTSpice.


        Students with DSA or temporary or permanent disabilities: it is recommended
        that you contact the relevant university office (https://site.unibo.it/studenti-con-disabilita-e-dsa/it)
        in good time: it will be their responsibility to propose any adjustments to
        the students concerned, which must in any case be submitted 15 days in advance
        for approval by the teacher, who will assess their appropriateness in relation
        to the educational objectives of the course.'
      Office hours: 'See the website of Federica Zonzini (https://www.unibo.it/sitoweb/federica.zonzini/en)


        See the website of Guido Masetti (https://www.unibo.it/sitoweb/guido.masetti/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
