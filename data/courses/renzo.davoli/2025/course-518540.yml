syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518540
    title: 2025/2026 DIDATTICA DELL'INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso si propone di fornire conoscenze
        teoriche, tecniche e strumenti utili per l’insegnamento dell’informatica.
        Al termine dell'attività formativa lo studente conosce i principali approcci
        pedagogici e didattici per l’insegnamento dell’informatica nei diversi livelli
        scolastici. È in grado di organizzare e tenere corsi di informatica, confrontare
        e scegliere diverse metodologie per generare materiale didattico e per valutare
        l’apprendimento.
      Contenuti: "Gli obiettivi generali di questo insegnamento includono:\n\n- la\
        \ conoscenza di alcuni aspetti storici, epistemologici ed etici dell’Informatica\
        \ come disciplina scientifica e delle motivazioni alla base della necessità\
        \ del suo insegnamento;\n- la comprensione di aspetti pedagogici e teorie\
        \ dell'apprendimento nel contesto dell’insegnamento dell’Informatica;\n- la\
        \ conoscenza di molteplici approcci didattici specifici per la materia;\n\
        - la conoscenza delle principali difficoltà cognitive che l’apprendimento\
        \ dell’Informatica pone (con particolare riferimento alla programmazione),\
        \ e quali possibili strategie adottare per superarle;\n- la conoscenza di\
        \ strumenti software specifici e di dispositivi di physical computing a supporto\
        \ dell’insegnamento dell’Informatica;\n- la capacità di formulare e gestire\
        \ percorsi di studio coerenti con le indicazioni nazionali e i curricula relativi\
        \ all'Informatica in scuole di ogni ordine e grado.\n\nArgomenti del Modulo\
        \ 1\n\n- Visione Scientifica dell'Informatica\n- Didattica degli aspetti tecnologici:\
        \ architettura degli elaboratori, sistemi operativi, reti\n- Metodologie per\
        \ la Didattica dell’Informatica\n  \n  - teatralizzazione\n  - making/tinkering\
        \ con strumenti di physical computing\n- Le licenze del software (software\
        \ libero vs software proprietario): implicazioni nella didattica\n\nArgomenti\
        \ del Modulo 2\n\n- Big ideas per la didattica dell'Informatica\n- Paradigmi\
        \ e teorie dell’apprendimento, con particolare riferimento a costruttivismo\
        \ e costruzionismo applicati alla didattica dell'informatica\n- Approcci top-down\
        \ e bottom-up nell'insegnamento dell'Informatica\n- “Coding”, Pensiero Computazionale\
        \ e Informatica\n- Didattica della Programmazione, degli Algoritmi e delle\
        \ strutture dati\n  \n  - Implicazioni didattiche nella scelta dei linguaggi\
        \ di programmazione\n  - Difficoltà e misconcezioni nell’apprendimento della\
        \ programmazione\n- Metodologie per la Didattica dell’Informatica\n  \n  -\
        \ unplugged\n  - esercizi di lettura di codice\n  - debugging di codice non\
        \ proprio\n  - visualizzazione dello stato della macchina durante l’esecuzione\
        \ di un programma\n- Metodologie di valutazione di programmi informatici\n\
        - L’informatica nei libri di testo e nei curricoli scolastici internazionali\
        \ e italiani"
      Testi/Bibliografia: 'Non è necessario acquistare alcun libro di testo.


        Articoli e documenti da studiare verranno forniti durante il corso in forma
        elettronica sul wiki del corso (https://csed-unibo.github.io/#!index.md )
        e su Virtuale.


        Materiale di riferimento


        M. Lodi (2020). Introducing Computational Thinking in K-12 Education: Historical,
        Epistemological, Pedagogical, Cognitive, and Affective Aspects [http://amsdottorato.unibo.it/9188/1/Tesi_Dottorato_Lodi.pdf]
        . Tesi di dottorato. Capitoli selezionati verranno assegnati da studiare


        Materiali liberi di approfondimento


        La rivista Hello World [https://www.raspberrypi.org/hello-world] della Raspberry
        Pi Foundation propone contenuti molto interessanti (sia teorici, sia pratici).
        Notare in particolare le due "Special editions" ("Big books") in fondo, che
        possono essere considerati come semplici libri di testo per questo corso.


        Molti altri materiali sono disponibili alla pagina Riferimenti [https://csed-unibo.github.io/#!pages/riferimenti.md]


        Testi per approfondimento


        S. Grover. Computer Science in K-12: An A-To-Z Handbook on Teaching Programming.
        Edfinity, 2020. Semplice ma completo (consigliata l''economica versione in
        bianco e nero)


        S. Sentance, E. Barendsen, N.R. Howard, C. Schulte. Computer Science Education:
        Perspectives on Teaching and Learning in School. Bloomsbury Academic. 2023
        (2nd ed.). Risorse aggiuntive liberamente scaricabili [https://www.bloomsburyonlineresources.com/computer-science-education-2]
        Semplice, più teorico


        O. Hazzan, T. Lapidot, N. Ragonis. Guide to teaching computer science: An
        activity-based approach. Third Edition. Springer, 2020. Liberamente scaricabile
        da rete UniBO [https://link.springer.com/book/10.1007/978-3-030-39360-1] .
        Più teorico


        S. Fincher, A. Robins. The Cambridge Handbook of Computing Education Research
        (Cambridge Handbooks in Psychology). Cambridge: Cambridge University Press,
        2019.


        Liberamente scaricabile da rete UniBO [https://doi.org/10.1017/9781108654555]
        Per approcciarsi alla ricerca in didattica. Completissimo'
      Metodi didattici: 'Lezioni frontali con discussione e partecipazione degli studenti,
        esercitazioni e attività con tecniche apprendimento collaborativo e di “classe
        capovolta”.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Vista la natura partecipata
        e interattiva delle lezioni, la frequenza alle lezioni è caldamente consigliata.


        L''esame finale consiste obbligatoriamente nell''ideazione di un''attività
        didattica (e relativo materiale) per l’insegnamento di contenuti di Informatica
        (scelti dallo studente e concordati con i docenti).


        L''esame è una prova orale (durata massima 1h per ciascun candidato) divisa
        in tre parti


        1. Presentazione della progettazione di una attività didattica innovativa,
        esplicitando gli aspetti indicati a: https://csed-unibo.github.io/#!pages/struttura_esame.md

        2. Simulazione di una parte significativa della attività progettata, impersonando
        totalmente il ruolo del docente

        3. Discussione e domande su quanto presentato e sugli argomenti di Didattica
        dell''Informatica ad esso collegati


        Durante il corso verranno inoltre proposti questionari ed esercitazioni in
        itinere per favorire il consolidamento progressivo delle conoscenze e abilità.


        Lo studente può accettare o rifiutare il voto dell’orale. Anche il rifiuto
        del voto verrà registrato su AlmaEsami


        Se lo studente non supera l''orale o rifiuta il voto, deve ripresentare a
        uno degli appelli successivi una progettazione su un argomento significativamente
        diverso.


        I criteri per la determinazione del voto sono indicati nella seguente rubric:
        https://csed-unibo.github.io/#!pages/rubric_esame.md


        Se lo studente raggiunge, per tutti i criteri, un livello "parziale" otterrà
        18. Se raggiunge, per tutti i criteri, un livello "adeguato" otterrà 28.


        Nella valutazione si tiene conto anche della partecipazione in classe e della
        consegna di eventuali attività in itinere: aver consegnato tutte le attività
        in tempo e sufficienti dà diritto a un voto in più.


        È necessario che gli studenti seguano il corso nell''anno accademico (I o
        II) che coincide con quello indicato per questo insegnamento nel loro piano
        di studi (in particolare, non è possibile seguire il corso al I anno se è
        segnato al II anno).


        Saranno calendarizzati sei appelli per ogni anno accademico: tre in giugno/luglio,
        uno in settembre, due in gennaio/febbraio. Non saranno svolte prove su appuntamento.'
      Strumenti a supporto della didattica: 'Le lezioni faranno uso di slide (messe
        a disposizione degli studenti) e di altri dispositivi (es. materiale di cancelleria,
        oggetti della vita quotidiana, schede elettroniche) utili all''insegnamento
        dell''Informatica.


        Tutto il materiale sarà pubblicato sul wiki del corso https://csed-unibo.github.io/
        e su Virtuale.


        Durante la lezione, sarà possibile inviare messaggi per fare domande anonime,
        e rispondere a sondaggi anonimi.


        Quanto proiettato in aula (senza audio) viene reso disponibile in diretta
        sul web per convenienza degli studenti (es. se non vedono bene la proiezione,
        o per acquisire una schermata).'
      Orario di ricevimento: 'Consulta il sito web di Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli)


        Consulta il sito web di Michael Lodi (https://www.unibo.it/sitoweb/michael.lodi)'
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518540
    title: 2025/2026 Computing Education — University of Bologna
    contents:
      Learning outcomes: The course aims to provide theoretical knowledge, techniques
        and tools helpful in teaching computer science. At the end of the course,
        the student is familiar with the main pedagogical and didactical approaches
        for teaching computer science at different school levels. Students can organise
        and teach computer science courses, compare and choose different methodologies
        to generate teaching materials, and evaluate learning.
      Course contents: "The objectives of this course include:\n\n- knowledge of some\
        \ historical, epistemological, and ethical aspects of Computer Science as\
        \ a scientific discipline and of the reasons behind the need for its teaching;\n\
        - understanding of pedagogical aspects and learning theories in the context\
        \ of Computer Science education;\n- knowledge of multiple teaching approaches\
        \ specific to the subject;\n- knowledge of the main cognitive difficulties\
        \ that learning Computer Science poses (with particular reference to programming),\
        \ and what possible strategies can be adopted to overcome them;\n- knowledge\
        \ of specific software tools and physical computing devices to support the\
        \ teaching of Computer Science;\n- ability to formulate and manage study paths\
        \ consistent with national guidelines and curricula relating to Computer Science\
        \ in schools of all levels.\n\nModule 1 Topics\n\n- Scientific view of Computer\
        \ Science\n- Teaching of technological aspects: computer architecture, operating\
        \ systems, networks\n- Methodologies for Teaching Computer Science\n  \n \
        \ - dramatization\n  - making/tinkering with physical computing tools\n- Software\
        \ Licenses (Free Software vs. Proprietary Software): Implications for Education\n\
        \nModule 2 Topics\n\n- Big Ideas of CS Education\n- Learning paradigms and\
        \ theories, with particular reference to constructivism and constructionism\
        \ applied to computer science teaching\n- Top-down and bottom-up approaches\
        \ in teaching computer science\n- “Coding”, Computational Thinking, and Computer\
        \ Science\n- Teaching Programming, Algorithms, and Data Structures\n  \n \
        \ - Educational implications of choosing programming languages\n  - Difficulties\
        \ and misconceptions in learning programming\n- Methodologies for Teaching\
        \ Computer Science\n  \n  - unplugged\n  - program comprehension exercises\n\
        \  - debugging of others' code\n  - displaying the machine status while running\
        \ a program\n- Evaluation/assessment methodologies for programming\n- Computer\
        \ science in international and Italian school curricula and textbooks"
      Readings/Bibliography: 'There is no need to purchase any textbook.


        Articles and documents to be studied will be provided during the course in
        electronic form on the course wiki (https://csed-unibo.github.io/#!index.md
        ) and on Virtuale.


        Material of reference


        M. Lodi (2020). Introducing Computational Thinking in K-12 Education: Historical,
        Epistemological, Pedagogical, Cognitive, and Affective Aspects [http://amsdottorato.unibo.it/9188/1/Tesi_Dottorato_Lodi.pdf]
        . Doctoral thesis. Selected chapters will be assigned for study.


        Free materials


        The magazine Hello World [https://www.raspberrypi.org/hello-world] from the
        Raspberry Pi Foundation offers very interesting content (both theoretical
        and practical). Note in particular the two "Special editions" ("Big books")
        at the bottom of the page, which can be considered simple textbooks for this
        course.


        Many other materials are available on the page References [https://csed-unibo.github.io/#!pages/riferimenti.md]


        Texts for further study


        S. Grover. Computer Science in K-12: An A-To-Z Handbook on Teaching Programming.
        Edfinity, 2020. Simple but complete (the economical black and white version
        is recommended)


        S. Sentance, E. Barendsen, N.R. Howard, C. Schulte. Computer Science Education:
        Perspectives on Teaching and Learning in School. Bloomsbury Academic. 2023
        (2nd ed.). Additional resources available for free download [https://www.bloomsburyonlineresources.com/computer-science-education-2]
        Simple, more theoretical


        O. Hazzan, T. Lapidot, N. Ragonis. Guide to teaching computer science: An
        activity-based approach. Third Edition. Springer, 2020. Freely downloadable
        from the UniBO network [https://link.springer.com/book/10.1007/978-3-030-39360-1]
        . More theoretical


        S. Fincher, A. Robins. The Cambridge Handbook of Computing Education Research
        (Cambridge Handbooks in Psychology). Cambridge: Cambridge University Press,
        2019.


        Freely downloadable from the UniBO network [https://doi.org/10.1017/9781108654555]
        . To approach research in computer science education. Very comprehensive.'
      Teaching methods: 'Lectures with discussion and student participation, exercises
        and activities using collaborative learning and “flipped classroom” techniques.


        Given the type of activity and the teaching methods adopted, attendance of
        this training activity requires the prior participation of all students in
        themodules 1 and 2 of training on safety in the workplace, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode.'
      Assessment methods: 'Given the participatory and interactive nature of the classes,
        regular attendance is strongly recommended.


        The final exam consists (compulsorily) of designing a teaching activity (and
        the related materials) for teaching Computer Science topics (chosen by the
        student and agreed with the instructors).


        The exam is an oral examination (maximum duration: 1 hour per candidate) and
        is divided into three parts:


        1. Presentation of the design of an innovative teaching activity, explicitly
        addressing the aspects listed at: https://csed-unibo.github.io/#!pages/struttura_esame.md

        2. Simulation of a significant part of the designed activity, fully taking
        on the role of the teacher

        3. Discussion and questions on what was presented and on the related Computer
        Science Education topics


        During the course, questionnaires and in-class exercises will also be proposed
        in order to support the progressive consolidation of knowledge and skills.


        Students may accept or refuse the oral exam grade. A refusal of the grade
        will also be recorded on AlmaEsami.


        If a student does not pass the oral exam or refuses the grade, they must attend
        one of the subsequent exam sessions and present a new design on a significantly
        different topic.


        The grading criteria for the oral exam are described in the following rubric:
        https://csed-unibo.github.io/#!pages/rubric_esame.md


        If a student reaches the level “partial” for all criteria, they will receive
        18/30. If they reach the level “adequate” for all criteria, they will receive
        28/30.


        Assessment also takes into account in-class participation and the submission
        of any ongoing activities: submitting all activities on time and at a sufficient
        level entitles the student to one additional point.


        Students must attend the course in the academic year (1st or 2nd) that matches
        the one indicated for this course in their study plan (in particular, it is
        not possible to attend the course in the 1st year if it is listed in the 2nd
        year).


        Six exam sessions will be scheduled for each academic year: three in June/July,
        one in September, and two in January/February. Exams will not be offered by
        appointment.'
      Teaching tools: 'The lessons will utilize slides (made available to students)
        and other devices (e.g., stationery, everyday objects, electronic cards) that
        are useful for teaching computer science.


        All material will be published on the course wiki https://csed-unibo.github.io/
        and on Virtuale.


        During the lesson, you will be able to send messages to ask anonymous questions
        and respond to anonymous surveys.


        What is projected in the classroom (without audio) is made available live
        on the web for the convenience of students (e.g., if they cannot see the projection
        well, or to take a screenshot).'
      Office hours: 'See the website of Renzo Davoli (https://www.unibo.it/sitoweb/renzo.davoli/en)


        See the website of Michael Lodi (https://www.unibo.it/sitoweb/michael.lodi/en)'
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
