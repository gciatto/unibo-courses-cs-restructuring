  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/526477
    title: 2025/2026 Data Base Sistems — University of Bologna
    contents:
      Learning outcomes: 'The student


        - has a in depth knowledge about managing, organizing and planning an Information
        System. these organizational and managerial competences are complemental to
        the technical ones in the database area;

        - knows the techniques for analyze and classify software modules in the information
        system contex;

        - carries out feasibility studies and Business Process Reengineering project;

        - carries out database integration and master data projects;

        - acquires practical skills on the previous topics through interactive business
        cases and seminars.'
      Course contents: '1. Introduction to Information Systems

        2. IS classification


        - Il portafoglio applicativo aziendale

        - CIM systems

        - ERP systems

        - CRM systems


        1. Methods for IS design


        - Resources and processes

        - IS planning

        - Business Process Reengineering

        - Feasibility study

        - Risk analysis

        - cost-Benefit Analysis

        - Architectural analysis of IS


        1. Scope statement

        2. ICT project management

        3. Database integration and Master Data Management'
      Readings/Bibliography: '- Bracchi, Francalanci e Motta. Sistemi Informativi
        d''impresa [http://www.ateneonline.it/bracchi/]. McGrawHill, 2010.

        - Bracchi, Francalanci e Motta. Sistemi Informativi e Aziende in rete [http://www.catalogo.mcgraw-hill.it/catLibro.asp?item_id=682].
        McGrawHill, 2001.

        - Ceri, Fraternali, Bongio, Brambilla, Comai, Matera. [http://www.webml.org/webml/page2.do?ctx1=IT]
        McGrawHill, 2003.'
      Teaching methods: 'Oral Lessons


        Exercises and laboratory activities


        Seminars'
      Assessment methods: 'The final exam aims to evaluate the achievement of the
        educational objectives. More in details, the student should know:


        - the modules that make up information systems and know how to discuss their
        relationship with business processes

        - Know the principles for drafting feasibility studies

        - the structure of contracts in the IT field and the principles for the drafting
        of technical annexes

        - the principles for the realization of a Business Process Reengineering project

        - how to manage an IT project also through formalisms and diagrams

        - the principles of database integration


        The exam consists of an oral test on all the topics covered in the course.
        Particular importance will be given to the mastery of the terminology and
        the ability to link together the arguments presented.


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        presentation and discussion skills of the topics covered. The ranges of grades
        correspond can be described as follows:


        18-23: the student has sufficient preparation and analytical skills, spread
        however, over just few topics taught in the course, the overall jargon is
        correct


        24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate analytical skills
        with the use of a correct jargon


        28-30: Great knowledge about most of the topics taught in the course, good
        critical and analytical skills, good usage of the specific jargon


        30L: excellent and in depth knowledge of all the topics in the course, excellent
        critical and analytical skills, excellent usage of specific jargon.'
      Teaching tools: Slides
      Links to further information: http://bias.csr.unibo.it/golfarelli/
