syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526477
    title: 2025/2026 SISTEMI INFORMATIVI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente:


        - ha una visione approfondita sulle problematiche di gestione, organizzazione
        e pianificazione dei Sistemi Informativi che completano le competenze tecniche,
        già acquisite nel corso di studi, con competenze di carattere organizzativo
        e manageriale.

        - conosce le tecniche di analisi e classificazione dei moduli di che compongono
        il sistema informativo aziendale

        - è in grado di partecipare a studi di fattibilità e a progetti di Business
        Process Reengineering che coinvolgano il sistema informativo aziendale

        - è in grado di partecipare a progetti di integrazione delle basi di dati
        e di master data management

        - acquisisce competenze pratiche sulle precedenti tematiche grazie allo svolgimento
        di casi di studio aziendale e alla partecipazione a seminari in aula.'
      Contenuti: '1. Introduzione ai Sistemi Informativi

        2. Classificazione dei Sistemi Informativi


        - Il portafoglio applicativo aziendale

        - Sistemi CIM

        - Sistemi ERP

        - Sistemi CRM


        1. Metodi per la progettazione di Sistemi Informativi


        - Risorse e processi aziendali

        - Pianificazione del Sistema Informativo

        - La reingegnerizzazione dei processi aziendali

        - Lo studio di fattbilità

        - L''analisi del rischio

        - L''analisi costi-benefici

        - Analisi architetturale del Sistema Informativo


        1. Il capitolato tecnico

        2. Gestione di progetti informatici

        3. Analisi e integrazione di basi di dati eterogene, Master Data Management'
      Testi/Bibliografia: '- Bracchi, Francalanci e Motta. Sistemi Informativi d''impresa
        [http://www.ateneonline.it/bracchi/]. McGrawHill, 2010.

        - Bracchi, Francalanci e Motta. Sistemi Informativi e Aziende in rete [http://www.catalogo.mcgraw-hill.it/catLibro.asp?item_id=682].
        McGrawHill, 2001.

        - Ceri, Fraternali, Bongio, Brambilla, Comai, Matera. [http://www.webml.org/webml/page2.do?ctx1=IT]
        McGrawHill, 2003.'
      Metodi didattici: 'Lezioni in aula


        Esercitazioni in in aula e laboratorio


        Seminari aziendali'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame di fine corso
        mira a valutare il raggiungimento degli obiettivi didattici. Più in dettaglio
        lo studente dovrebbe conoscere:


        - i moduli che compongono i sistemi informativi e saper discutere la loro
        relazione con i processi aziendali

        - i principi per la redazione di studi di fattibilità

        - la struttura dei contratti in ambito informatico e i principi per la redazione
        degli allegati tecnici


        -i principi per la realizzazione di un progetto di Business Process Reengineering


        -le modalità di gestione di un progetto informatico anche mediante formalismi
        e diagrammi


        - i principi dell''integrazione delle basi di dati


        L''esame consta di una prova orale su tutti gli argomenti trattati nel corso.
        Particolare rilevanza sarà data alla padronanza della terminologia e alla
        capacità di collegare assieme gli argomenti esposti.


        I voti vengono assegnati in base a una valutazione complessiva delle conoscenze,
        competenze, capacità di presentazione e discussione delle tematiche trattate.
        I range di voti corrispondono possono essere descritti come segue:


        18-23: preparazione e capacità di analisi sufficienti ma relative ad un numero
        limitato di argomenti affrontati nel corso, utilizzo di un linguaggio complessivamente
        corretto;


        24-27: preparazione tecnicamente adeguata ma con alcuni limiti rispetto agli
        argomenti trattati, capacità di analisi buone, anche se non particolarmente
        articolate, espresse in un linguaggio corretto;


        28-30: ottima conoscenza di un ampio numero di temi affrontati nel corso,
        buone capacità di analisi e di critica, padronanza della terminologia specifica;


        30L: conoscenza eccellente e molto approfondita ed esaustiva dei temi affrontati
        nel corso, capacità di analisi critica e di collegamento, padronanza della
        terminologia specifica.'
      Strumenti a supporto della didattica: Slide del docente
      Link ad altre eventuali informazioni: http://bias.csr.unibo.it/golfarelli/
