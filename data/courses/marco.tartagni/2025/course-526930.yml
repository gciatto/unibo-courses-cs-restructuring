    title: 2025/2026 SENSORI ELETTRONICI INTELLIGENTI LM — University of Bologna
    contents:
      Learning outcomes: The course is designed to provide the fundamentals of sensing
        system design from a unified perspective, going beyond the idea of sensors
        as merely a collection of technologies. Sensor design will be introduced as
        the implementation of a predictive model across the entire information chain,
        from the electronic interface to the machine learning classifier. Students
        will learn how to approach sensor design by identifying key constraints and
        trade-offs, and by selecting the most effective implementation technologies.
        The course will also feature practical examples of embedded machine learning
        sensors. Lectures are often based on a bottom-up approach to better understand
        principles from examples.
