      Teaching methods: The course is based on face-to-face lectures given by the
        instructor, supported by slides that will follow the syllabus and be available
        on Virtuale (https://virtuale.unibo.it). The Biomedical Engineering part provides
        a brief laboratory experience.
      Assessment methods: 'The exam consists of an oral interview lasting 40–60 minutes
        covering both teaching modules. Particular emphasis will be placed on the
        student’s critical abilities regarding the topics of the syllabus, as well
        as on their capacity to contextualize and articulate concepts. The exam may
        be taken in either Italian or English. In both cases, the appropriateness
        of the terminology used by the student will be assessed.


        Students with Specific Learning Disorders (SLD) or temporary/permanent disabilities
        are advised to contact the University office in charge in advance, at the
        address (https://site.unibo.it/studenti-con-disabilita-e-dsa/it ). The office
        will be responsible for proposing any adaptations, which must in any case
        be submitted, at least 15 days in advance, for the approval of the instructor,
        who will assess their suitability in relation to the learning objectives of
        the course.'
      Teaching tools: Slides will be available on Virtuale (https://virtuale.unibo.it).
      Office hours: See the website of Marco Tartagni (https://www.unibo.it/sitoweb/marco.tartagni/en)
