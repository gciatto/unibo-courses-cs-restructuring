    title: 2025/2026 ARCHITECTURES AND FIRMWARE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'The main objective of the class is to give
        a practical knowledge of hardware-software platforms and a clear understanding
        of the design tradeoffs in energy-efficient embedded systems. The class is
        divided in three blocks of lectures: (I) system-on-chip hardware design -
        fundamental concepts, (II) microcontroller systems design-hardware and software,
        (III) Parallel software and programming for advanced embedded systems.'
