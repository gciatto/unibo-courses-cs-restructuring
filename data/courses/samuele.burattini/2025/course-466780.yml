  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/466780
    title: 2025/2026 INDUSTRY 4.0 — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'The general objective of this course is
        to provide the general conceptual and technological framework that characterise
        Industry 4.0, focusing in particular on Internet of Things (IoT), Industrial
        IoT and Computer Vision and their application in digital transformation contexts.

        At the end of the course, a student:


        - has a global understanding about the big picture related to Industry 4.0

        - knows the main principles, technologies and standards about Internet of
        Things (IoT) and Industrial IoT, integrated with contents delivered by other
        courses (e.g. service oriented architectures, API, web, cloud)

        - knows some main state-of-the art directions in this context. Examples are
        Web of Things, Digital Twins

        - knows the main application domains and concrete case studies concerning
        the application of IoT and Industrial IoT

        - knows the main topics in the field of computer vision (e.g. object detection
        and classification) and their applications

        - knows state-of-the art approaches and technologies in the context of computer
        vision, with reference to both classic techniques for image representation
        and deep learning based solutions

        - is able to analyse and evaluate the application of the models and technologies,
        as well as to build projects and prototype technologies, given a Digital Transformation
        context/problem'
      Contenuti: 'Il corso copre i concetti fondamentali, le tecnologie, i driver,
        i trend e le implicazioni di Industry 4.0 e della Trasformazione Digitale
        in ambito industriale. Vengono affrontate le tecnologie di base dell’IoT (sensing,
        processing, comunicazione), le architetture industriali scalabili e gli standard
        di interoperabilità, l’integrazione di tecniche di AI e data analytics, nonché
        paradigmi avanzati come Digital Twins, Web of Things e Industry 5.0. Oltre
        agli aspetti tecnici, il corso analizza le implicazioni organizzative e di
        business della trasformazione digitale, attraverso lezioni, attività di laboratorio
        e un caso di studio reale.


        Obiettivo Formativo Generale (Learning Goal)


        - Gli studenti comprendono la storia, i driver interdisciplinari, le basi
        tecnologiche e lo stato attuale di Industry 4.0 e della Trasformazione Digitale
        industriale; sono in grado di riconoscere pattern ricorrenti, valutare modelli
        di business technology-driven e formulare stime ragionate sui trend futuri.


        Obiettivo di Competenza Generale (Competency Goal)


        - Gli studenti sono in grado di ideare, progettare, implementare e presentare
        soluzioni e prototipi IoT nel contesto della Trasformazione Digitale, di Industry
        4.0 e dell’Industrial IoT.


        Obiettivi Formativi Specifici (Conoscenze)


        - Comprendere il concetto di resource-constrainedness nei sistemi Industry
        4.0 e riconoscere metodi e approcci adeguati per sensing, identificazione,
        elaborazione e comunicazione in contesti a risorse limitate.

        - Conoscere il panorama tecnologico dell’Industrial IoT, inclusi sistemi embedded,
        protocolli di comunicazione, gestione e rappresentazione dei dati, tecniche
        di AI e standard di interoperabilità.

        - Comprendere modelli e architetture di riferimento, il concetto di Digital
        Twin, i principi del Web of Things e i paradigmi emergenti di Industry 5.0
        e human-centered systems.


        Obiettivi di Competenza Specifici (Abilità)


        - Progettare e implementare prototipi funzionali di sistemi IoT end-to-end,
        integrando sensing, comunicazione, elaborazione dati e componenti edge/cloud.

        - Valutare trade-off architetturali e tecnologici (es. edge vs. cloud, protocolli,
        standard) in scenari di Industrial IoT.

        - Prendere decisioni informate in progetti di Trasformazione Digitale, mettendo
        in relazione scelte tecnologiche e esigenze di business, e comunicando in
        modo strutturato le soluzioni proposte.'
      Testi/Bibliografia: Testi rilevanti verranno annunciati durante le lezioni.
      Metodi didattici: 'L’insegnamento combina lezioni frontali, attività laboratoriali
        e analisi di casi reali per integrare aspetti teorici, tecnologici e applicativi
        dell’Industry 4.0.


        - Lezioni frontali per introdurre modelli teorici, tecnologie, architetture
        e standard di riferimento.

        - Laboratori pratici orientati allo studio ed analisi di prototipi IoT

        - Analisi e discussione di casi studio per collegare le scelte tecnologiche
        alle implicazioni organizzative e di business.'
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione si basa
        su una combinazione di prova scritta e lavoro progettuale, finalizzata a verificare
        sia le conoscenze teoriche sia le competenze applicative. Sono previste le
        seguenti modalità di valutazione:


        - Prova scritta con domande aperte, volta a valutare la comprensione dei concetti
        fondamentali, delle architetture, degli standard e dei trade-off tecnologici
        nell’ambito di Industry 4.0 e dell’Industrial IoT.

        - Simulazione di Progetto, basato sull’analisi di un caso di studio e sulla
        simulazione/progettazione di una soluzione IoT finalizzata al raggiungimento
        di uno specifico obiettivo applicativo.


        La struttura dettagliata ed il peso delle diverse componenti di valutazione
        potranno essere adattate in funzione del numero di studenti iscritti e saranno
        comunicate all’inizio del corso.'
      Strumenti a supporto della didattica: Slides e artefatti software per i laboratori
        preparati dal docente.
      Orario di ricevimento: Consulta il sito web di Samuele Burattini (https://www.unibo.it/sitoweb/samuele.burattini)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
