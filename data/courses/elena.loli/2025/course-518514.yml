syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518514
    title: 2025/2026 SIMULAZIONE DI SISTEMI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente conosce
        le metodologie e gli strumenti per progettare, realizzare e convalidare modelli
        di simulazione per l''analisi e la valutazione di sistemi di elaborazione
        e comunicazione, e per l''analisi di sistemi sociali.

        È in grado di progettare, realizzare e convalidare modelli di simulazione
        per l''analisi e la valutazione di sistemi complessi.'
      Contenuti: '1. classificazione di sistemi e modelli;

        2. modelli ad eventi discreti

        3. modelli analitici: code e reti di code;

        4. pianificazione di uno studio di simulazione;

        5. generatori di numeri pseudocasuali, generazione di variabili casuali;

        6. tecniche di simulazione ad eventi;

        7. simulazione basata su agenti;

        8. simulazione e machine learning;

        9. digital twin;

        10. progettazione di simulatori e ambienti di simulazione;

        11. analisi dei risultati di un esperimento di simulazione;

        12. verifica, convalida e testing di un modello di simulazione;

        13. paradigmi di simulazione distribuita e parallela;

        14. studio, analisi e valutazione di sistemi complessi mediante simulazione;

        15. introduzione alla Realtà Virtuale.'
      Testi/Bibliografia: '- M. Law, W. D. Kelton. Simulation Modellino and Analysis,
        McGraw-Hill, 2015.

        - R. M. Fujimoto. Parallel and Distributed Simulation Systems, Wiley Interscience,
        2000.

        - Jerry Banks, John S. Carson, II,Barry L. Nelson, David M. Nicol. Discrete-Event
        System Simulation, 5/E, Prentice Hall, 2013.

        - Christos G. Cassandras, S. Lafortune. Introduction to Discrete Events Systems,
        Springer, 2021.

        - Macal, C., and M. J. North. 2009. Agent-based modeling and simulation. In
        Proceedings of the 2009 Winter Simulation Conference, ed. M. D. Rossetti,
        R. R. Hill, B. Johansson, A. Dunkin, and R. G. Ingalls.

        - A. Sharma, E. Kosasih, J. Zhang, A. Brintrup, A. Calinescu. Digital Twins:
        State of the art theory and pratice, challenges, and open research questions.
        In Journal of Industrial Infromation Integration, vol 30, 2022, https://doi.org/10.1016/j.jii.2022.100383.

        - Steven M. LaValle. Virtual Reality, Cambridge University Press, 2023.'
      Metodi didattici: lezioni frontali, esercitazioni e progetto di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: La verifica dell'apprendimento
        avviene attraverso i) lo sviluppo di un progetto e, ii) una prova orale. Lo
        sviluppo del progetto ha lo scopo di accertare le capacità progettuali e di
        implementazione dello studente.La valutazione del progetto deve risultare
        almeno sufficiente ( i.e., deve ottenere una valutazione ≥ 18/30) per essere
        valida ai fini dell'esame.La prova orale, anch'essa valutata in trentesimi,
        consiste essenzialmente nella discussione dei risultati ottenuti nei progetti
        e mira a verificare l'acquisizione, da parte dello studente, delle conoscenze
        previste dal programma del corso. Il voto finale, espresso in trentesimi,
        tiene conto delle valutazione ottenente nelle prove sostenute.
      Strumenti a supporto della didattica: 'Il materiale didattico (lucidi delle
        lezioni, esercizi svolti, altre risorse utili) si trovano nella pagina web
        del corso.


