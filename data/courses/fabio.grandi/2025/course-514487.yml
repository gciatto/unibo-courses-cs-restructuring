  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514487
    title: 2025/2026 METODI E MODELLI DI DATA ANALYTICS M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Fornire i concetti, le tecniche e gli strumenti
        per la progettazione e l'implementazione di processi di "data anlytics" e
        "data valorization". Illustrare tutte le fasi del processo di gestione e analisi
        di dati, dall'acquisizione e processamento iniziale, alla generazione di nuova
        conoscenza attraverso tecniche statistiche e di Machine Learning, fino alla
        visualizzazione e valutazione delle performance. Presentare le principali
        applicazioni aziendali di data analytics e i principali scenari tecnologici
        in questo ambito.
      Contenuti: 'Il corso si compone di due moduli:


        1. Data Mining (Fabio Grandi (https://www.unibo.it/sitoweb/fabio.grandi/))

        2. Metodi di Intelligenza Artificiale (Andrea Borghesi (https://www.unibo.it/sitoweb/andrea.borghesi3/))


        DATA MINING


        Prerequisiti/Propedeuticità consigliate


        L’allievo che accede a questo insegnamento conosce i sistemi database e il
        modello relazionale. Tali conoscenze sono acquisite, di norma, superando un
        esame di Basi di Dati o Sistemi Informativi.


        Tutte le lezioni saranno tenute in Italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        Programma


        - introduzione al data mining e KDD

        - regole associative

        - algoritmi di clustering

        - tipologie dei dati

        - alberi di decisione

        - metodi statistici

        - reti neurali

        - valutazione dei risultati

        - analisi di serie storiche

        - individuazione di outlier


        METODI DI INTELLIGENZA ARTIFICIALE


        Prerequisiti/Propedeuticità consigliate


        Sono propedeutiche al corso conoscenze di base di ottimizzazione e programmazione
        lineare ed intera. Tali conoscenze sono, in genere, acquisibili superando
        esami di Ricerca Operativa e Algoritmi per il Supporto alle Decisioni e Gestione
        delle Risorse.


        Tutte le lezioni saranno tenute in Italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        Programma


        - programmazione a vincoli

        - deep learning

        - selezione e configurazione automatica di algoritmi

        - manutenzione predittiva

        - rilevazione di anomalie

        - serie temporali

        - manutenzione prescrittiva

        - casi d''uso


        Nell’ambito degli Obiettivi per lo Sviluppo Sostenibile dell''ONU, verrà affrontato
        lo studio di tecnologie dell’informazione sostenibili utilizzabili per l’innovazione
        e la realizzazione di infrastrutture per la valorizzazione della conoscenza
        estraibile dai dati, finalizzate al raggiungimento di obiettivi sociali, economici
        e politici.'
      Testi/Bibliografia: 'DATA MINING


        - Lucidi del corso.

        - I.H. Witten, E.Frank, M.A. Hall, C.J. Pall, J.R. Foulds. Data Mining: Practical
        Machine Learning Tools and Techniques (quinta edizione), Morgan Kaufmann,
        2025.


        Letture consigliate:


        - M. Berry, G. Linoff. Data mining techniques for marketing, sales, and customer
        support. John Wiley & Sons, 1997.

        - R. Roiger, M. Geatz, Introduzione al data mining, McGraw-Hill, 2003.


        METODI DI INTELLIGENZA ARTIFICIALE


        - Dispense del corso

        - I. Goodfellow, Y. Bengio, A. Courville, Deep Learning book, MIT Press, 2016.
        https://www.deeplearningbook.org/ (https://www.deeplearningbook.org/)

        - T. Rossi, P. van Beek, T. Walsh, Handbook of Constraint Programming, Elsevier,
        2006'
      Metodi didattici: '- La didattica frontale dei moduli consiste in lezioni ed
        esercitazioni in aula, svolte dal docente con l''ausilio di PC e proiettore.
        Eventuali lezioni online o in modalità mista saranno erogate utilizzando la
        piattaforma Teams.

        - Il programma potrà essere integrato da seminari tenuti da consulenti aziendali.

        - L''insegnamento partecipa al progetto di sperimentazione didattica dell''Ateneo
        (Didattica Digitale Integrativa): per agevolare gli studenti che non possono
        frequentare, le registrazioni delle lezioni saranno rese disponibili sulla
        piattaforma Virtuale/Panopto.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale mira
        ad accertare la conoscenza acquisita dallo studente, relativamente ai contenuti
        specifici dei singoli moduli, dei principali strumenti e metodi per la gestione
        e l''analisi di grandi quantità di dati utili a supportare efficientemente
        i processi decisionali. Gli esami verranno effettuati in presenza o online,
        a seconda della situazione sanitaria e delle disposizioni dell''Ateneo. Nel
        caso online, si utilizzeranno gli strumenti Zoom e EOL.


        Le prove dei due moduli verranno svolte separatamente. Ciascuna prova consiste
        in uno scritto della durata di 60 minuti, durante il quale è espressamente
        vietato consultare libri e appunti. Per il modulo Data Mining, l''esame consiste
        in due quesiti a risposta aperta (a scelta su tre) riguardanti i principali
        argomenti del corso. Per il modulo Metodi di Intelligenza Artificiale, l''esame
        consiste in due quesiti a risposta aperta (a scelta su tre) riguardanti i
        principali argomenti del corso. Ciascuna prova si intende superata con un
        punteggio di 18/30 su un totale di 32/30. Ulteriori dettagli verranno comunicati
        a lezione e nelle "note" abbinate agli appelli pubblicati su AlmaEsami.


        Per sostenere la prova d''esame è necessaria l''iscrizione tramite AlmaEsami,
        nel rispetto delle scadenze previste. Coloro che non riuscissero a iscriversi
        entro la data prevista, sono tenuti a comunicare tempestivamente (e comunque
        prima della chiusura ufficiale delle liste di iscrizione) il problema alla
        segreteria didattica. Sarà facoltà del docente ammetterli a sostenere la prova.
        Le prove relative ai due moduli componenti di ciascun insegnamento possono
        essere sostenute nel corso dello stesso appello o in appelli differenti, in
        qualunque ordine. La validità del voto di un modulo è di un anno. Il voto
        complessivo dell''esame, assegnato in trentesimi, verrà calcolato come media
        dei voti conseguiti nei due moduli componenti. Lo studente avrà facoltà di
        rifiutare tale voto senza perdere la validità dei voti dei moduli.


        Il superamento dell’esame sarà garantito agli studenti che dimostreranno padronanza
        e capacità operativa in relazione alla conoscenza dei concetti chiave illustrati
        nell''insegnamento, alle capacità progettuali ed alla padronanza del linguaggio
        tecnico. Un punteggio più elevato sarà attribuito agli studenti che dimostreranno
        di aver compreso pienamente e saper utilizzare al meglio tutti i contenuti
        dell’insegnamento illustrandoli con capacità di linguaggio, risolvendo problemi
        anche complessi con buone attitudini progettuali.'
      Strumenti a supporto della didattica: '- Materiale didattico scaricabile dalla
        piattaforma Virtuale (https://virtuale.unibo.it/).

        - Le registrazioni delle lezioni sono messe a disposizione sulla piattaforma
