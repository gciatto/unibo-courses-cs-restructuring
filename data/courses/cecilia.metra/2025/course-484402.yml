    title: 2025/2026 TEST, DIAGNOSIS AND RELIABILITY M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'The course will first address the problem
        of fault modeling, with reference to the automotive environment, to then study
        testing, design for testability and hardware in the loop approaches.

        Then, onboard monitoring and diagnosis will be addressed, to finally study
        fault tolerant techniques for reliable systems’ design. The course will include
        laboratory experiences, and possible seminars given by experts in the field
        from the industrial world.'
      Contenuti: "Introduzione al collaudo di circuiti e sistemi elettronici digitali\n\
        \n- Definizioni e motivazioni\n- Collocazione all'interno del processo di\
        \ realizzazione di chip VLSI\n- Resa del processo e costo di produzione di\
        \ un circuito integrato\n- Alcuni tipi di collaudo: Characterization Testing;\
        \ Manufacturing Testing; Burn-In; Incoming Inspection\n\nModelli di guasto\n\
        \n- Guasti di tipo stuck-at: principi di base sul collaudo nei confronti di\
        \ guasti di tipo stuck-at\n- Equivalenza di guasti e “Fault Collapsing”\n\
        - Teorema del “Checkpoint”\n- Dominanza di guasti e “Fault Collapsing”\n-\
        \ Guasti di tipo stuck-open: possibile collaudo\n- Guasti di tipo stuck-on:\
        \ possibile collaudo\n- Guasti di tipo bridging resistivo, delay, crosstalk\
        \ e transitori: possibile collaudo\n\nAutomatic Test Pattern Generation (ATPG)\n\
        \n- Definizione\n- Algebre per ATPG\n- Algoritmi esaustivi\n- Algoritmi random\n\
        - “Path Sensitization”\n- Copertura di guasti ed efficienza del collaudo\n\
        \nMacchine automatiche di collaudo (ATE)\n\n- Componenti e specifiche\n- Costo\
        \ del collaudo mediante ATE\n  Diagnosi di Guasti\n- Definizioni e Motivazioni\n\
        - Fault Dictionary\n- Diagnostic Tree\n\nTecniche di progettazione orientata\
        \ al collaudo (DFT)\n\n- Introduzione\n- Metodi ad-hoc e metodi strutturali\n\
        - Full-scan\n- Partial scan\n- Boundary scan\n- Built-in-self-test (BIST)\n\
        - Built-in logic block observer (BILBO)\n- Hardware in the loop approaches\n\
        \nTecniche di progettazione Fault Tolerant\n\n- Introduzione: applicazioni,\
        \ motivazioni\n- Ridondanza Modulare: strategie di base; realizzazioni e affidabilità\
        \ del voter; guasti di modo comune; diagnosi dei moduli guasti\n- On-line\
        \ testing e recovery: duplicazione e confronto; progettazione self-checking\n\
        - Progettazione self-checking: proprietà circuiti self-checking; ipotesi di\
        \ guasto; progetto di blocchi funzionali self-checking; progetto di checker;\
        \ error indicators.\n- Codici a rivelazione d'errore (codici di Berger e relativi\
        \ checker; codici di parità e relativi checker; codice two-rail e relativi\
        \ checker; codice m-out-of-m e relativi checker)\n- Recovery: rollback and\
        \ retry; tecniche riconfigurazione\n- Codici a correzione d'errore: codici\
        \ lineari di parità (codici di Hamming; codici di Hsiao); circuiti di codifica\
        \ e decodifica\n\nIl corso comprende esercitazioni di laboratorio su:\n\n\
        - simulazione elettrica di guasti di tipo bridging resistivo, crosstalk, e\
        \ transitorio ed analisi dei loro effetti\n- progettazione di componenti base\
        \ di sistemi per applicazioni ad alta affidabilità e loro realizzazione mediante\
        \ Field Programmable Gate Arrays."
