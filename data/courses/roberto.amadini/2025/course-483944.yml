syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/483944
    title: 2025/2026 INTELLIGENZA ARTIFICIALE PER L'INNOVAZIONE DIGITALE — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso ha l’obiettivo di fornire conoscenza
        e comprensione dei concetti principali riguardanti l’intelligenza artificiale,
        sia per quanto riguarda gli aspetti simbolici che quelli sub-simbolici, incluse
        le principali tecniche di apprendimento automatico. Lo studente inoltre avrà
        una conoscenza generale sulle principali implicazioni etiche economiche e
        sociali dell’intelligenza artificiale. Al termine del corso lo studente sarà
        in grado di applicare le conoscenze acquisite per risolvere problemi applicativi
        di varia natura, utilizzando strumenti software esistenti opportunamente specializzati
        per i casi d’interesse. Lo studente sarà inoltre in grado di comprendere i
        principali meccanismi di addestramento e utilizzo di modelli di apprendimento.
      Contenuti: 'Il corso si compone di due parti.


        La prima parte riguarda principalmente l''intelligenza artificiale "simbolica"
        e copre, ad alto livello, i seguenti temi:


        - Introduzione all''intelligenza artificiale

        - Agenti Intelligenti

        - Problemi di ricerca e soddisfacimento di vincoli

        - Rappresentazione della conoscenza e ragionamento automatico


        La seconda parte riguarda invece principalmente l''apprendimento automatico
        e l''intelligenza artificiale "sub-simbolica". I temi trattati sono:


        - Apprendimento automatico supervisionato

        - Apprendimento profondo

        - Apprendimento non supervisionato, intelligenza artificiale generativa e
        reinforcement learning

        - Elaborazione del linguaggio naturale e modelli di linguaggio

        - Etica e sicurezza dell''intelligenza artificiale'
      Testi/Bibliografia: 'I testi utlizzati per sviluppare questo corso sono:


        - Russell, Stuart J. Artificial intelligence a modern approach. Pearson Education,
        Inc., 2021.

        - Wallace, Mark. Building decision support systems: using MiniZinc. Cham:
        Springer, 2020.


        Si noti tuttavia che questi testi non sono assolutamente necessari per seguire
        il corso o sostenere l''esame finale.'
      Metodi didattici: 'Il corso si compone di lezioni frontali, illustrate tramite
        slides, attività complementari ed esercitazioni in preparazione dell''esame.


        Le lezioni si svolgono interamente in presenza.


        Tutto il materiale didattico viene reso disponibile sulla piattaforma Virtuale
        del corso.'
      Modalità di verifica e valutazione dell'apprendimento: 'Le conoscenze acquisite
        saranno valutate attraverso:


        - una prova scritta, obbligatoria, contenente domande a risposta chiusa ed
        esercizi.

        - un progetto, opzionale, da concordare con il docente ed eventualmente svolto
        in gruppo.


        La prova scritta non contiene esercizi di programmazione e si svolge su carta
        senza l''ausilio di manuali, appunti personali o dispositivi elettronici di
        alcun tipo.


        Il progetto opzionale si può discutere in qualsiasi periodo dell''anno, ma
        solo dopo il superamento della prova scritta, e può alzarne il voto da 0 a
        3 punti.


        Sono garantiti sei appelli d’esame all’anno e l’adattamento della prova per
        studenti con DSA.'
      Strumenti a supporto della didattica: Durante le lezioni verrà mostrato codice
        Python, mediante piattaforma Colab, e verranno utilizzati LLMs come ChatGPT
        o simili.
      Orario di ricevimento: Consulta il sito web di Roberto Amadini (https://www.unibo.it/sitoweb/roberto.amadini)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/483944
    title: 2025/2026 Artificial Intelligence for Digital Innovation — University of
      Bologna
    contents:
      Learning outcomes: The course covers the fundamentals of Artificial Intelligence,
        including symbolic and sub-symbolic aspects, main machine learning techniques,
        and ethical, economic, and social implications. Students will gain practical
        problem-solving skills using specialized software tools and understand various
        machine learning models and training mechanisms.
      Course contents: 'The course is divided into two parts.


        The first part primarily focuses on "symbolic" artificial intelligence and
        covers the following topics at a high level:


        - Introduction to Artificial Intelligence

        - Intelligent Agents

        - Search Problems and Constraint Satisfaction

        - Knowledge Representation and Automated Reasoning


        The second part mainly deals with machine learning and "sub-symbolic" artificial
        intelligence. The topics covered include:


        - Supervised Machine Learning

        - Deep Learning

        - Unsupervised Learning, Generative AI, and Reinforcement Learning

        - Natural Language Processing and Language Models

        - Ethics and Safety in Artificial Intelligence'
      Readings/Bibliography: '- Russell, Stuart J. Artificial intelligence a modern
        approach. Pearson Education, Inc., 2021.

        - Wallace, Mark. Building decision support systems: using MiniZinc. Cham:
        Springer, 2020'
      Teaching methods: 'The course consists of lectures presented with slides, complementary
        activities, and exercises to prepare for the exam.


        Classes are held entirely in person.


        All teaching materials are made available on the course’s Virtuale platform.'
      Assessment methods: 'The knowledge acquired will be assessed through:


        - a mandatory written exam, consisting of multiple-choice questions and exercises.

        - an optional project, to be agreed upon with the instructor and possibly
        carried out in a group.


        The written exam does not include programming exercises and is conducted on
        paper, without the aid of manuals, personal notes, or any electronic devices.


        The optional project can be discussed at any time during the year, but only
        after passing the written exam. It can increase the exam grade by up to 3
        points.


        Six exam sessions per year are guaranteed, along with adapted assessments
        for students with learning disabilities (DSA).'
      Teaching tools: During the lectures, Python code will be shown using the Colab
        platform, and LLMs such as ChatGPT or similar tools will be used.
      Office hours: See the website of Roberto Amadini (https://www.unibo.it/sitoweb/roberto.amadini/en)
