syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/446003
    title: 2025/2026 ELETTRONICA INDUSTRIALE T-A — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le conoscenze di base per la progettazione di sistemi elettronici che trovano
        applicazione negli impianti e nell’automazione industriale. In particolare
        lo studente è in grado di comprendere la struttura, i principi di funzionamento
        ed i criteri di massima per il progetto degli amplificatori di potenza e dei
        convertitori elettronici di energia elettrica impiegati per il controllo di
        impianti industriali e di azionamenti elettrici e per la gestione dell’alimentazione
        di apparecchiature elettroniche.
      Contenuti: Introduzione alle applicazioni dell'elettronica di potenza in ambito
        industriale. Rendimento e distorsione negli amplificatori e convertitori elettronici
        di potenza. Circuiti raddrizzatori monofase e trifase. Regolatori di tensione.
        Filtri per la riduzione della distorsione. Amplificatoridi potenza e studio
        delle diverse classi di funzionamento. Analisi delle problematiche di controllo
        di motori elettrici e delle conseguenti condizioni operative imposte agli
        amplificatori di potenza. Convertitori elettronici di potenza operanti in
        commutazione di tipo DC/DC e DC/AC. Realizzazione delle reti di commutazione
        mediante diodi, transistori bipolari e MOSFET di potenza. Controllo PWM a
        due e quattro quadranti di convertitori elettronici operanti in commutazione.
        Cenni sulle problematiche relative alla dissipazione di potenza ed ai limiti
        termici nei dispositivi elettronici di potenza. Le esercitazioni riguarderanno
        esempi pratici di progetto di circuiti, anche con l'impiego di strumenti CAD.
      Testi/Bibliografia: N. Mohan, T.M. Undeland, W.P. Robbins, Elettronica di Potenza,
        Ed. Hoepli
      Metodi didattici: Nel corso verranno illustrati la struttura ed i principi di
        funzionamento di diversi circuiti elettronici di potenza impiegati nell'automazione
        industriale, complementando le lezioni teoriche con esempi numerici di analisi
        e progetto
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        unaprova orale. Il candidato deve dimostrare la conoscenza delle nozioni teoriche
        affrontate durante il corso e la capacita'' di affrontare esempi di progetto
        analoghi a quelli sviluppati in aula.


        L''esame di fine corso ha lo scopo di valutare il raggiungimento dei seguenti
        obiettivi didattici:


        - conoscenza del funzionamento dei circuiti elettronici per applicazioni industriali
        descritti dal docente

        - conoscenza delle linee guida per la progettazione dei circuiti elettronici
        per applicazioni di elettronica industriale di potenza


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Lavagna luminosa, proiettore, strumenti
        per la simulazione numerica dei circuiti (PSIM)
      Orario di ricevimento: Consulta il sito web di Corrado Florian (https://www.unibo.it/sitoweb/corrado.florian)
      SDGs: 'Energia pulita e accessibile


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/446003
    title: 2025/2026 Industrial Electronics T-A — University of Bologna
    contents:
      Learning outcomes: Providing basic knowledge on the operating principles and
        basic design criteria of electronic systems for industrial applications
      Course contents: 'Introduction to the industrial applications of power electronics.
        Power efficiency and distortion in power ampifiers and electronic converters.
        Mono-phase and three-phase rectifier circuits. Voltage stabilizers. Filters
        for distortion reduction. Power amplifiers: study of the different classes
        of operation. Analysis of driving problems of electrical motors and of the
        corresponding requirements on power amplifiers. Switch-mode electronic power
        converters: DC/DC and DC/AC schemes. Implementation of switching networks
        using power diodes, BJTs, MOSFETs and IGBTs. Pulse-Width Modulation (PWM)
        control, over two and four quadrants, of switch-mode power converters. Basic
        conceps on heat dissipation and thermal limits in power electron devices.'
      Readings/Bibliography: N. Mohan, T.M. Undeland, W.P. Robbins, Elettronica di
        Potenza, Ed. Hoepli
      Teaching methods: During the course, the structure and the operating principles
        of different power electronic circuits for industrial applications will be
        studied by complementing the theoretical lessons with numerical design examples.
      Assessment methods: 'The final test is an oral examination consisting of theoretical
        questions and design examples similar to the ones proposed during the course.


        The final exam is aimed at the evaluation of the achievement of the following
        educational goals:


        - Mastering the working principles of the power electronic circuits described
        during the course

        - Mastering the guidelines for the design of power electronic circuits for
        industrial applications'
      Teaching tools: Overhead projector, slide projector, circuit simulation tools
        (PSIM)
      Office hours: See the website of Corrado Florian (https://www.unibo.it/sitoweb/corrado.florian/en)
      SDGs: 'Affordable and clean energy


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
