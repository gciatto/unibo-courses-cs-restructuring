  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514236
    title: 2025/2026 ELETTRONICA INDUSTRIALE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrare i princìpi di funzionamento dei
        sistemi elettronici che trovano applicazione nelle macchine e negli impianti
        industriali.
      Contenuti: 'Introduzione al corso : sistema di controllo di un

        impianto industriale, definizione di un convertitore di potenza,

        rete di controllo, amplificatore di potenza, elettronica di

        controllo e elettronica di potenza.


        Richiami : Valore efficace, potenza attiva e reattiva,

        potenza apparente, trasformata di Fourier, serie di Fourier,

        segnali periodici. E quazioni costitutiva del condensatore e

        dell''induttore.


        Classificazione dei convertitori in base alla funzione ed

        in base al funzionamento dei dispositivi. Convertitori

        controllati e non controllati. Convertitori AC/DC, DC/DC, DC/AC,

        AC/AC. Convertitori quasi lineari (serie), convertitori in

        commutazione (switching)


        Prestazioni dei convertitori : distorsione

        (ingresso ed uscita), rendimento, fattore di potenza,

        guadagno/banda, regolazione, resistenza di uscita, coefficiente di

        temperatura .


        Dispositivi elettronici di potenza : principi di

        funzionamento e caratteristiche dei principali diodi, BJT, MOSFET,

        IGBT, tiristori convenzionali e GTO. Analisi dei fenomeni che

        limitano le massime tensioni, correnti e la velocità di

        commutazione dei dispositivi elettronici di potenza.


        Circuiti driver per il funzionamento in commutazione dei

        dispositivi elettronici di potenza.


        Snubber : limitazione degli stress dinamici dei

        dispositivi elettronici di potenza.


        Convertitori AC/DC non controllati:

        raddrizzatori. Raddrizzatore a semionda. Trasformatore.

        Raddrizzatore ad onda intera. Filtri di ingresso ed uscita per il

        miglioramento del fattore di potenza e la riduzione della

        distorsione . Raddrizzatore trifase ad onda intera.


        Convertitori controllati mediante tiristoriAC/DC e

        AC/AC


        Convertitori DC/DC quasi lineari: r

        egolatori/stabilizzatori di tensione. DC/DC con diodi Zener.

        Convertitore DC/DC di tipo serie con di tensione in retroazione

        .


        Perdite : stima delle perdite di conduzione e di

        commutazione nei dispositivi elettronici di potenza. Vincoli

        termici per il dimensionamento dei componenti e dei sistemi di

        smaltimento del calore.


        Struttura ed equazioni delle reti di commutazione e loro

        realizzazione impiegando i diversi tipi di dispositivi elettronici.

        Leggi di commutazione per la realizzazione di convertitori DC/DC,

        DC/AC, AC/DC e AC/AC.


        Convertitori Switching DC-DC : convertitori in discesa

        (buck), salita (boost), salita-discesa, Cuk, Sepic.


        Fondamenti sui componenti magnetici : induttore e

        trasformatore di potenza.


        Convertitori DC-DC con isolamento : forward, flyback, a

        ponte intero.


        Controllo : introduzione alle problematiche di controllo,

        descrizione di un PWM IC controller


        DC/AC (inverters): introduzione al mezzo ponte e al ponte

        intero;


        Esempi di applicazione nel campo degli azionamenti e del

        controllo di impianti industriali : controllo motori elettrici,

        saldatura elettrica ad arco.


        Esercitazioni:


        Progetti al simulatore circuitale LT Spice:


        Convertitore DC/DC switching abbassatore Buck


        Convertitore DC/DC switching a ponte intero


        Convertitore DC/DC switching flyback'
      Testi/Bibliografia: 'Mohan, Undeland, Robbins: “Power Electronics” –

        Wiley&Sons


        F. Filicori, G. Vannini: “Elettronica industriale – conv. DC/DC

        operanti in commut.” – Esculapio


        B.Dewan, A.Straughen: “Power Semiconductor Circuits” –

        Wiley&Sons


        R. W. Erickson: “Fundamentals of Power Electronics” – Kluwer

        Academic Publishers


        Rashid: “Elettronica di Potenza” – Pearson'
      Metodi didattici: 'Lezioni frontali tenute tramite l''ausilio del proiettore
        (slides

        del corso fornite preventivamente agli studenti).


        Esercitazioni numeriche alla lavagna.


        Simulazioni con CAD circuitale in laboratorio.'
      Modalità di verifica e valutazione dell'apprendimento: "La prova di esame è\
        \ orale. Il candidato deve dimostrare la\nconoscenza delle nozioni teoriche\
        \ affrontate durante il corso e la\ncapacità di risolvere degli esercizi numerici\
        \ di progetto analoghi\na quelli affrontati in classe.\n\nL'esame di fine\
        \ corso ha lo scopo di valutare il raggiungimento\ndei seguenti obiettivi\
        \ didattici:\n\n- conoscenza delle caratteristiche dei componenti elettronici\n\
        \  per applicazioni di elettronica industriale\n- conoscenza del funzionamento\
        \ dei circuiti elettronici per\n  applicazioni industriali descritti dal docente\n\
        - conoscenza delle linee guida per la progettazione dei circuiti\n  elettronici\
        \ per applicazioni di elettronica industriale di\n  potenza\n\nStudenti/sse\
        \ con DSA o disabilità temporanee o permanenti: si raccomanda di contattare\
        \ per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):\
        \ sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,\
        \ che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione\
        \ del/della docente, che ne valuterà l'opportunità anche in relazione agli\
        \ obiettivi formativi dell'insegnamento."
      Strumenti a supporto della didattica: 'Dispense del corso fornite dal docente.


        Application Notes di alcuni circuiti e componenti

        circuitali.


        CAD software per la simulazione dei circuiti elettronici di

        potenza (PSIM).'
      Orario di ricevimento: Consulta il sito web di Corrado Florian (https://www.unibo.it/sitoweb/corrado.florian)
      SDGs: 'Energia pulita e accessibile


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/514236
    title: 2025/2026 Industrial Electronics M — University of Bologna
    contents:
      Learning outcomes: 'Providing basic knowledge on the operating principles and
        basic

        design criteriaof the electronic systems forindustrial

        applications.'
      Course contents: 'Introduction to industrial/power electronics: control system

        of an industrial plant, power converter definition, control

        network, power amplifier, control and power electronics.


        Basic concepts recalls: RMS value, active and

        reactive power, apparent power, Fourier transform and series,

        periodic signals. Defining equations for capacitor and

        inductor.


        Power converter classification : based on the

        circuit function and based on the electron device operating

        condition. Controlled and uncontrolled converters. AC/DC,

        DC/DC, DC/AC, AC/AC converters. Series linear converters, switching

        mode power converters.


        Converter performance : input and output distortion,

        efficiency, power factor, gain/bandwidth, regulation, output resi

        stance, temperature coefficient.


        Power electronic devices : working principles and

        characteristics of diodes, BJT; MOSFET, IGBT, tiristors and GTO.

        Maximum voltages and currents limitations, switching speed.


        Driver circuits for power switches.


        Snubbers : limitation of dynamic stress of power electron

        devices


        Uncontrolled AC/DC converters ; rectifiers. Half bridge

        rectifier. Transformer. Full bridge rectifier. Input and output

        filters design for power factor and distortion enhancement. Three

        phase full bridge rectifier.


        Tiristor controlled AC/DC and AC/AC converters


        DC-DC series linear converters : voltage regulator. DC/DC

        converter with Zener diode. Series DC/DC converter with voltage

        feedback.


        Losses : calculation of conduction and switching losses

        in power electronic devices. Thermal constrains for the design of

        heat sinks.


        Structures and equations of switching networks and their

        implementation with different electron devices. Switching

        strategies for the implementation of DC/DC, DC/AC, AC/DC and AC/AC

        converters.


        DC-DC switching converters : buck, boost, Cuk, Sepic.


        Basics on magnetic components : inductor and power

        transformer.


        DC-DC isolated switching converters : forward,

        flyback, full bridge.


        Control : basics of control theory for power converters,

        description of a PWM IC controller


        DC/AC (inverters): half and full bridge inverter

        basics


        Application examples : electric motor control, arc

        welding control


        Design examples with CAD software (LTspice)


        Buck converter


        Full bridge DC/DC switching converter


        Flyback converter'
      Readings/Bibliography: 'Mohan, Undeland, Robbins: “Power Electronics” –

        Wiley&Sons


        F. Filicori, G. Vannini: “Elettronica industriale – conv. DC/DC

        operanti in commut.” – Esculapio


        B.Dewan, A.Straughen: “Power Semiconductor Circuits” –

        Wiley&Sons


        R. W. Erickson: “Fundamentals of Power Electronics” – Kluwer

        Academic Publishers


        Rashid: “Elettronica di Potenza” – Pearson'
      Teaching methods: 'Frontal lectures are supported by the use of the video

        projector: the slides of the presented materialare made

        available in advance to students.


        Numerical examples are solvedby the lecturer on the

        blackboard.


        Circuit simulations with CAD software.'
      Assessment methods: "The final test is an oral examination consisting of theoretical\n\
        questions and one design exercise similar to the ones proposed\nduring the\
        \ course.\n\nThe final exam is aimed to the evaluation of the achievement\
        \ of\nthe following educational goals:\n\n- knowledgeof the characteristics\
        \ of electronic components\n  for industrial (power)applications\n- Mastering\
        \ the working principles of the power electronic\n  circuits described during\
        \ the course\n- Mastering the guidelines for the design of power electronic\n\
        \  circuits for industrial applications"
      Teaching tools: 'Printouts of the slides projected during the lectures are

        available to students.


        Application Notes of some circuits and devices.


        CAD tool for the simulation of power electronic circuits

        (PSIM)'
      Office hours: See the website of Corrado Florian (https://www.unibo.it/sitoweb/corrado.florian/en)
      SDGs: 'Affordable and clean energy


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
