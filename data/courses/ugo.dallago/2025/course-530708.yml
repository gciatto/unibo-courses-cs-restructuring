syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/530708
    title: 2025/2026 INTRODUCTION TO COMPUTABILITY AND COMPLEXITY — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student has
        an understanding of the theoretical foundations of linguistic and algorithmic
        techniques used in the context of AI.
      Contenuti: 'Il corso fornisce innanzitutto alcuni rudimenti di teoria della
        computabilità e della complessità: macchine di Turing, indecidibilità, tempo
        polinomiale e NP-completezza. Verso la fine del corso, daremo poi una panoramica
        sulla cosiddetta computational learning theory: PAC Learning, apprendimento
        tramite convergenza uniforme, VC-Dimension.'
      Testi/Bibliografia: '[1] Sanjeev Arora and Boaz Barak, Computational Complexity:
        A Modern Approach. Cambridge University Press, 2009.


        [2] Michael Kearns, Umesh. Vazirani. An Introduction to Computational Learning
        Theory. MIT Press, 1994.


        [3] Shai Shalev-Shwartz and Shai Ben-David. Understanding Machine Learning:
        From Theory to Algorithms. Cambridge University Press, 2014.'
      Metodi didattici: Lezioni frontali e esercitazioni.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame viene svolto
        tramite EOL e si compone di due parti:


        - Nella prima lo studente sarà tenuto a rispondere a cinque domande riguardanti
        gli argomenti del corso. Questa parte contribuisce per 1/3 al voto finale.

        - Nella seconda, allo studente sarà richiesto di risolvere tre esercizi. Questa
        parte contribuisce invece per 2/3 al voto finale.'
      Strumenti a supporto della didattica: Le slides, un eserciziario e altro materiale
        di supporto saranno resi disponibili tramite la piattaforma Virtuale.
      Orario di ricevimento: Consulta il sito web di Ugo Dal Lago (https://www.unibo.it/sitoweb/ugo.dallago)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/530708
    title: 2025/2026 Introduction to Computability and Complexity — University of
      Bologna
    contents:
      Learning outcomes: At the end of the course, the student has an understanding
        of the theoretical foundations of linguistic and algorithmic techniques used
        in the context of AI.
      Course contents: 'The course gives first of all some rudiments of computability
        and complexity theory: Turing machines, undecidability, polynomial time computability,
        and NP-completeness. Towards the end of the course, we give a bird''s eye
        view on computational learning theory: PAC Learning, learning via uniform
        convergence, the VC-Dimension.'
      Readings/Bibliography: '[1] Sanjeev Arora and Boaz Barak, Computational Complexity:
        A Modern Approach. Cambridge University Press, 2009.


        [2] Michael Kearns, Umesh. Vazirani. An Introduction to Computational Learning
        Theory. MIT Press, 1994.


        [3] Shai Shalev-Shwartz and Shai Ben-David. Understanding Machine Learning:
        From Theory to Algorithms. Cambridge University Press, 2014.'
      Teaching methods: Lectures and exercise sessions.
      Assessment methods: 'The exam is done via EOL, and consists of two parts:


        - In the first one, the student will be required to answer five questions
        about the topics of the course. This counts for 1/3 of the final mark.

        - In the second one, the student will be asked to solve three exercises. This
        counts for 2/3 of the final mark.'
      Teaching tools: Slides, an exercise book, and some other teaching material will
        be made available through the Virtuale platform.
      Office hours: See the website of Ugo Dal Lago (https://www.unibo.it/sitoweb/ugo.dallago/en)
