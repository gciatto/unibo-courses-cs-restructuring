syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518554
    title: 2025/2026 INTRODUCTION TO QUANTUM COMPUTING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le nozioni matematiche soggiacenti il calcolo quantistico, ed è in grado di
        implementare algoritmi quantistici nella forma di famiglie di circuiti quantistici.
        E' inoltre a conoscenza di tematiche più avanzate come la crittografia e la
        correzione di errori quantistica, e lo sviluppo di linguaggi grafici per descrivere
        circuiti quantistici.
      Contenuti: 'Primo modulo:


        - introduzione alla computazione quantistica

        - fondamenti matematici: algebra lineare e spazi di Hilbert complessi

        - qubits e loro rappresentazione matematica

        - un modello di calcolo quantistico: i circuiti quantistici

        - esempi di circuiti (Deutsch, Bernstein-Vazirani)


        Secondo modulo:


        - complessita'' computazionale quantistica

        - discussione di alcuni algoritmi quantistici (Simon, Grover, Shor)

        - correzione di errori quantistica

        - protocolli quantistici

        - cenni alla programmazione quantistica e ai linguaggi grafici quantistici'
      Testi/Bibliografia: '[1] P. Kaye, R. Laflamme, M. Mosca. An introduction to
        quantum computing. Oxford University Press, 2007.

        [2] M. Hirvensalo. Quantum computing. Springer, 2004.'
      Metodi didattici: Il corso include lezione teoriche ed esercizi. Gli esercizi
        di programmazione saranno svolti dagli studenti sui loro computer, singolarmente
        o in piccoli gruppi.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame sara'' a seminario:
        durante il corso verra'' proposta una lista di possibile articoli di approfondimento,
        e ogni studente dovra'' presentare uno di questi articoli. Durante la presentazione
        verranno fatte domande inerenti all''articolo scelto e alle sue relazioni
        con gli argomenti visti a lezione. Previo accordo coi docenti e'' anche possibile
        basarsi su articoli al di fuori della lista o svolgere un piccolo progetto
        al posto del seminario.'
      Strumenti a supporto della didattica: Il materiale didattico sara' fornito tramite
        il sito Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese)


        Consulta il sito web di Ugo Dal Lago (https://www.unibo.it/sitoweb/ugo.dallago)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518554
    title: 2025/2026 INTRODUCTION TO QUANTUM COMPUTING — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student is acquainted with the
        basic mathematical notions underlying quantum computing seen as an alternative
        computing paradigm, and knows how to implement quantum algorithms as families
        of quantum circuits. Moreover, he has an understanding of more advanced topics
        like quantum cryptography, quantum error correction, and the development of
        graphical languages for quantum circuits.
      Course contents: 'First module:


        - overview on quantum computing

        - mathematical background: linear algebra and complex Hilbert spaces

        - qubits and their mathematical representation

        - a quantum computational model: quantum circuits

        - sample circuits (Deutsch, Bernstein-Vazirani)


        Second module:


        - quantum computational complexity

        - quantum algorithms (Simon, Grover, Shor)

        - quantum error correction

        - quantum protocols

        - overview on quantum programming and quantum graphical languages'
      Readings/Bibliography: '[1] P. Kaye, R. Laflamme, M. Mosca. An introduction
        to quantum computing. Oxford University Press, 2007.

        [2] M. Hirvensalo. Quantum computing. Springer, 2004.'
      Teaching methods: The course includes theoretical lessons and exercises. Programming
        exercises will be done by students on their own computers, alone or in small
        groups.
      Assessment methods: 'The exam consists in a seminar: during the course a list
        of in-depth study research papers will be made available, and each student
        will choose and present one of these papers. During the seminar there will
        be questions on the selected paper and on its relations with topics studied
        during the course. Upon agreement with professors, papers outside the selected
        list can be chosen, or the seminar may be replaced by project work.'
      Teaching tools: Teaching material will be provided via the Virtuale website.
      Office hours: 'See the website of Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese/en)


        See the website of Ugo Dal Lago (https://www.unibo.it/sitoweb/ugo.dallago/en)'
