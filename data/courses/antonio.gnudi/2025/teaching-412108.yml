syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/412108
    title: 2025/2026 PROGETTO DI CIRCUITI ANALOGICI AVANZATI M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Illustrare il funzionamento e i criteri
        di progetto dei blocchi analogici fondamentali.
      Contenuti: '- Modelli compatti avanzati dei MOSFET. Cenni al modello livello
        9 PSPICE, sue peculiarità ed utilizzo nella simulazione circuitale.

        - Rumore elettronico. Richiami al problema del rumore nei circuiti. Modelli
        di rumore nei transistori (BJT e MOSFET). Esempi di calcoli di rumore in circuiti
        con BJT, MOSFET ed operazionali.

        - Non-linearità nei circuiti. Parametri che caratterizzano le non-linearità
        nei circuiti (HD, IIP3, ...). Metodi per ridurre le non-linearità.

        - Layout dei circuiti analogici. Problemi di match dei componenti nei circuiti
        integrati e tecniche per contrastarne l''effetto.

        - Amplificatori operazionali avanzati. Schemi completamente differenziali
        (folded cascode, current mirror, ...), con ingresso rail-to-rail e ad alto
        slew-rate. Controllo della tensione di modo comune d''uscita. Operazionali
        con retroazione in corrente.

        - Filtri tempo-continui. Richiami sui filtri analogici e metodi di sintesi
        della funzione di trasferimento. Filtri opamp-RC. Filtri a transconduttanza
        e capacità: transconduttori lineari con MOSFET in zona triodo o in saturazione.
        Filtri MOSFET-C. Circuiti per il tuning automatico dei parametri del filtro.

        - Filtri a condensatori commutati. Richiami sui segnali tempo-discreti e sulle
        trasformate z. Integratori, filtri del I e del II ordine. Esempi applicativi.'
      Testi/Bibliografia: '"Analog integrated circuit design", D.A. Johns, K. Martin,
        Ed. Wiley.'
      Metodi didattici: Lezioni di teoria in aula. Esercitazioni di progetto di alcuni
        blocchi circuitali fondamentali su specifiche assegnate. Le esercitazioni
        sono svolte tramite utilizzo di software CAD commerciale.
      Modalità di verifica e valutazione dell'apprendimento: La verifica dell'apprendimento
        finale è in forma orale. Il candidato viene invitato ad esporre e a discutere
        criticamente i principi di funzionamento e le metodologie di progetto dei
        blocchi analogici illustrati. Viene valutata positivamente la capacità di
        cogliere le motivazioni, le limitazioni ed i punti di forza delle varie soluzioni
        studiate.
      Strumenti a supporto della didattica: Alcuni schemi ed appunti sono disponibili
        online su Virtuale.
      Orario di ricevimento: Consulta il sito web di Antonio Gnudi (https://www.unibo.it/sitoweb/antonio.gnudi)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/412108
    title: 2025/2026 Design of Advanced Analog Circuits M — University of Bologna
    contents:
      Learning outcomes: To understand the working principles and the design criteria
        of advanced integrated analog circuit blocks.
      Course contents: '- Advanced compact models of MOSFETs. Introduction to the
        PSPICE level-9 model, its main features and use in circuit simulation.

        - Electronic noise. General concepts on noise in circuits. Noise models of
        transistors (BJT and MOSFET). Examples of noise analysis in circuits with
        BJTs, MOSFETs and opamps.

        - Non-linearities in circuits. Parameters for the characterization of non-linearities
        in circuits (HD, IIP3, ...). Methods for non-linearity reduction.

        - Layout of analog circuits. Components mismatch in integrated circuits and
        techniques for reducing its effects.

        - Advanced operational amplifiers. Fully differential schemes (folded cascode,
        current mirror, ...), opamps with rail-to-rail input, opamps with high slew-rate.
        Control of the common mode output voltage. Opamps with current feedback.

        - Continous-time filters. Recall on the analog filters and their synthesis
        methods. Opamp-RC filters. Transconductance-capacitance filters: linear transconductors
        with MOSFETs in triode or saturation region. MOSFET-C filters. Circuits for
        the automatic tuning of the filter parameters.

        - Switched capacitor filters. Recall on discrete-time signals and z-transform.
        Integrators, I and II order filter cells. Circuit examples.'
      Readings/Bibliography: '"Analog integrated circuit design", D.A. Johns, K. Martin,
        Ed. Wiley.'
      Teaching methods: Theory lectures in classroom. Practical exercises on the design
        of some analog blocks with use of commercial CAD software.
      Assessment methods: The final verification is in oral form. The candidate is
        invited to explain and critically discuss the working principles and the design
        methodologies of the illustrated analog blocks. The capability of catching
        motivations, merits and limitations of the different studied solutions is
        positively evaluated.
      Teaching tools: Some circuit schemes and notes are available online on Virtuale.
      Office hours: See the website of Antonio Gnudi (https://www.unibo.it/sitoweb/antonio.gnudi/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
