syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/445983
    title: 2025/2026 ELETTRONICA T-2 — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le conoscenze di base sull'analisi e sui criteri di progetto dei circuiti
        elettronici analogici.
      Contenuti: 'Il corso è diviso in due moduli. Dal primo modulo mutua il corso
        Circuiti Elettronici Analogici T-A (6 CFU) del curriculum Telecomunicazioni.


        Programma I modulo (mutuato da Circuiti Elettronici Analogici T-A)


        - Segnali elettrici e loro elaborazione tramite circuiti: generalità, richiami
        sui metodi matematici per l''analisi dei circuiti lineari tempo-invarianti,
        funzioni di trasferimento, stabilità. Componenti lineari, bipoli, doppi bipoli,
        funzioni di rete.

        - Diodo a giunzione: caratteristiche elettriche, modelli compatti elementari,
        applicazioni notevoli.

        - Transistore bipolare a giunzione: caratteristiche elettriche, modelli compatti
        elementari.

        - Analisi di alcune configurazioni circuitali notevoli contenenti transistori
        bipolari: specchi di corrente e generatori di corrente elementari.

        - Il regime di piccoli segnali: circuiti equivalenti per piccoli segnali dei
        dispositivi elettronici studiati.

        - Stadi amplificatori elementari: funzioni di rete, problemi di polarizzazione.

        - Amplificatori a più stadi, amplificatori differenziali.

        - Retroazione nei circuiti elettronici. Amplificatori operazionali e circuiti
        operazionali. Applicazioni notevoli lineari e non lineari degli amplificatori
        operazionali.


        Programma II modulo


        - Oscillatori di rilassamento. Sintesi di bipoli a resistenza differenziale
        negativa. Multivibratori astabili, monostabili e bistabili. Esempi con amplificatori
        operazionali e transistori.

        - Oscillatori quasi-sinusoidali: teoria ed esempi basati su amplificatori
        operazionali e transistori. Oscillatori a tre punti.'
      Testi/Bibliografia: 'Sono disponibili sulla piattaforma Virtuale del corso:


        1. Dispensa relativa alla prima parte del corso

        2. Testi d''esame con relativa traccia della soluzione


        Altri testi per riferimenti ed approfondimenti:


        1. Calzolari, Graffi, "Elementi di elettronica", Ed. Zanichelli

        2. Gray, Hurst, Lewis, Meyer, "Analysis and design of analog integrated circuits",
        Ed. John Wiley & Sons

        3. Jaeger, Blalock, "Microelettronica", ed. McGraw-Hill'
      Metodi didattici: Lezioni ed esercitazioni guidate in aula.
      Modalità di verifica e valutazione dell'apprendimento: La verifica finale dell'apprendimento
        avviene attraverso una prova scritta avente normalmente durata di due ore
        per Elettronica T-2 e un'ora e un quarto per Circuiti Elettronici Analogici
        T-A. Durante la prova NON è ammesso l'uso di cellulare, libri, appunti o altro
        materiale di supporto didattico. Una calcolatrice è indispensabile per eseguire
        i calcoli numerici. La prova consiste in alcune domande di teoria, concernenti
        gli argomenti sviluppati nelle lezioni, e da uno o più esercizi finalizzati
        all'analisi e al dimensionamento di circuiti analogici di vario tipo, simili,
        ma NON IDENTICI, a quelli visti a lezione. La prova mira ad accertare la padronanza
        dei concetti e delle metodologie sviluppati a lezione e l'abilità nell'applicarli
        a circuiti di interesse pratico. La validità di una prova scritta superata
        si estende fino all'appello successivo.
      Strumenti a supporto della didattica: Dispensa sulla prima parte del corso +
        testi d'esame con soluzioni sono disponibili su Virtuale
      Orario di ricevimento: 'Consulta il sito web di Antonio Gnudi (https://www.unibo.it/sitoweb/antonio.gnudi)


        Consulta il sito web di Susanna Reggiani (https://www.unibo.it/sitoweb/susanna.reggiani)'
      SDGs: 'Imprese innovazione e infrastrutture


