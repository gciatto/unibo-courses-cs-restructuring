        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/445983
    title: 2025/2026 Electronics T-2 — University of Bologna
    contents:
      Learning outcomes: Basic knowledge for the analysis and design of analog electronic
        circuits.
      Course contents: 'The course is split in two modules, the first of which is
        shared with the course Circuiti Elettronici Analogici T-A (6 CFU) belonging
        to the Telecommunications curriculum.


        Contents of module I (shared with the course Circuiti Elettronici Analogici
        T-A)


        - Electrical signals and their elaboration through circuits: general concepts,
        recall of mathematical methods for the analysis of linear time-independent
        circuits, transfer functions, stability. Linear components (one-port, two-port),
        network functions.

        - Semiconductor junction diode: electrical characteristics, basic compact
        models, fundamental applications.

        - Bipolar junction transistor: electrical characteristics, basic compact models.

        - Analysis of some fundamental circuit configurations containing bipolar transistors:
        current mirrors and current generators.

        - Small-signal regime: small-signal equivalent circuits of the electronic
        devices previously studied.

        - Single-stage amplifiers: network functions, biasing problems.

        - Multi-stage amplifiers. Differential amplifiers.

        - Feedback in electronic circuits. Operational amplifiers and circuits. Applications
        of operational amplifiers in linear and non-linear circuits.


        Contents of module II


        - Relaxation oscillators. Design of two-terminal components with negative
        differential resistance. Astable, monostable, bistable multivibrators. Examples
        based on operational amplifiers and transistors.

        - Sinusoidal oscillators: theory and examples based on operational amplifiers
        and transistors. Three-points oscillators.'
      Readings/Bibliography: 'Available on the platform Virtuale:


        1. Notes on the first part of the course

        2. Texts of past exams with relative solutions


        Additional textbooks for reference:


        1. Calzolari, Graffi, "Elementi di elettronica", Ed. Zanichelli

        2. Gray, Hurst, Lewis, Meyer, "Analysis and design of analog integrated circuits",
        Ed. John Wiley & Sons

        3. Jaeger, Blalock, "Microelettronica", ed. McGraw-Hill'
      Teaching methods: Class lectures with theory and excercises.
      Assessment methods: The final assessment is done through a written test of approximately
        two hours for Elettronica T-2 and 75 minutes for Circuiti Elettronici Analogici
        T-A. During the test, the use of cellular phones, books, notes and other written
        supporting material is NOT allowed. A pocket calculator is necessary for numerical
        calculations. The test consists in some theoretical questions, concerning
        the topics developed during the lectures, and one or more exercises aimed
        at the analysis and sizing of analog circuits of various types similar, but
        NOT IDENTICAL, to the ones presented in the lectures. The test aims at ascertaining
        the good knowledge of the concepts and methods developed during the lectures
        and the ability of applying them to circuits of practical interest. A positive
        result obtained in a test remains valid until the next test.
      Teaching tools: Notes on the first part of the course + texts of past exams
        with solutions are available on Virtuale.
      Office hours: 'See the website of Antonio Gnudi (https://www.unibo.it/sitoweb/antonio.gnudi/en)


        See the website of Susanna Reggiani (https://www.unibo.it/sitoweb/susanna.reggiani/en)'
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
