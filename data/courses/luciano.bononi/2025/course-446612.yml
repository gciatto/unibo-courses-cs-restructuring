  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/479055
    title: 2025/2026 INTERNET OF THINGS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le principali architetture e metodologie alla base dell’Internet of Things
        (IoT), con particolare riferimento alle tecnologie wireless, ai protocolli
        di rete dell’IoT, all’integrazione con dispositivi mobili e pervasivi secondo
        il paradigma Machine-to-Machine (M2M), ed alle tecniche ed alla piattaforme
        per la gestione ed analisi dei dati di sensori. Inoltre, lo studente è in
        grado di progettare e implementare sistemi IoT complessi ed eterogenei, composti
        da dispositivi edge in grado di fare sensing dell’ambiente, da piattaforme
        cloud/fog per la gestione scalabile dei dati dell’IoT e da software avanzati
        per l’analisi dei dati mediante tecniche statistiche e di apprendimento automatico.
        Saranno illustrate piattaforme middleware per sistemi IoT basati su paradigma
        M2M, e modelli emergenti di computazione (edge/distributed/cloud/…) legati
        all’analisi dei dati dell’IoT. Saranno infine progettati e studiati servizi
        utente avanzati secondo il paradigma dell’IoT.
      Contenuti: 'l corso introduce le tecnologie abilitanti, i protocolli, le architetture
        software e le applicazioni legate al paradigma emergente dell’Internet of
        Things (IoT). Dopo una breve introduzione alle tematiche del pervasive computing
        ed ai suoi campi di utilizzo emergenti (Industry 4.0, domotica, intelligent
        transportation systems, dispositivi wearable, etc), il corso fornisce una
        panoramica esaustiva degli elementi abilitanti di un sistema IoT dal punto
        di vista delle tecnologie per la comunicazione wireless tra dispositivi, delle
        tecniche di processamento dati, e dei linguaggi per lo sviluppo di applicazioni
        e la programmazione di prototipi (Arduino, Nucleo STM32, etc). In particolare,
        le componenti di un tipico sistema IoT vengono illustrate seguendo un percorso
        data-oriented: dalla generazione dei dati provenienti da sensori, alla loro
        trasmissione wireless all’interno di una rete WSAN/WLAN/WPAN, al cloud streaming
        e storage, fino al processing mediante tecniche di AI ed integrazione all’interno
        di un sistema software.


        Segue un elenco sommario dei contenuti del corso:


        Introduzione ai sistemi IoT: definizioni, applicazioni, tecnologie abilitanti


        Componenti IoT: Comunicazione e Networking


        - Sensori e attuatori, elementi di progettazione di circuiti elettronici (cenni),
        politiche di sensing e acquisizione dati

        - Tecnologie di comunicazione senza fili e codifiche per IoT

        - Comunicazione Machine-to-machine (M2M) tra dispositivi: tecnologie wireless
        abilitanti per reti WPAN (BLE, IEEE 802.15.4, Z-Wave, etc.), WLAN e LP-WAN
        (LoRA, LoRaWAN)

        - Architetture di rete e routing (6LoWPAN, RPL)


        Componenti IoT: Sistemi embedded


        - Sistemi embedded: architetture e linguaggi di programmazione (C++ e Micropython)

        - Interfacciamento con sensori/attuatori e protocolli seriali

        - Esempi con framework Arduino ed ESP-IDF


        Componenti IoT: Acquisizione dati


        - Protocolli di acquisizione dati: COAP, MQTT, HTTP

        - Framework KAFKA

        - Web of Things e Semantic Web 3.0 Standard for M2M and IoT


        Componenti IoT: Gestione e prossamento/analisi dati


        - Storage e processamento di dati di sensori, Time-series e time-series database:
        INFLUX-DB

        - Visualizzazione di serie temporali: esempi con tool GRAFANA

        - Forecasting di serie-temporali con metodi statistici

        - Forecasting di serie-temporali con techniche di AI/ML

        - Edge AI e TinyML


        Componenti IoT: Architetture IoT edge/cloud


        - Architetture di storage/processamento dati: approcci cloud/fog/edge computing

        - Piattaforme IoT: AWS IoT, Watson IoT, ThingSpeak, etc.'
      Testi/Bibliografia: 'Slides del docente, link a capitoli di libro, articoli
        scientifici ed a risorse online indicate sul sito del corso. Testo consigliato:
        Riccardo Melen, Vittorio Trecordi, "IoT Networking", Pearson, ISBN 8891931934,
        ISBN13 978-8891931931, 336 pp. (cover price 34 EUR). Altri testi sono consigliati
        durante il corso in base all''argomento trattato.'
      Metodi didattici: 'Per seguire al meglio il corso, e tenendo conto della forte
        componente progettuale e sperimentale e le esercitazioni previste nel programma,
        è fortemente consigliato possedere le seguenti conoscenze preliminari: (i)
        familiarità con almeno un linguaggio di programmazione per ambienti embedded
        (ad esempio C/C++), oltre a un linguaggio utilizzato per la programmazione
        front-end o back-end (consigliato Python); (ii) conoscenze di basi di dati
        e del linguaggio SQL.


        Il corso prevede lezioni frontali ed esercitazioni svolte in aula, mediante
        l''ausilio di PC e proiettore da parte del docente.


        Le esercitazioni di coding in aula vengono svolte utilizzando dispositivi
        IoT messi a disposizione dai docenti. Gli studenti devono recarsi in aula
        muniti del proprio PC per poter partecipare alle esercitazioni.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/ ] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso prevede un
        seminario (facoltativo) ed un progetto (obbligatorio). Il seminario viene
        svolto durante l''ultima settimana del corso, e consiste in una presentazione
        di 20-30 minuti nella quale lo studente presenta un argomento di ricerca legato
        al programma di corso, prendendo spunto da un articolo scientifico o da un
        tool esistente. L''argomento del seminario può essere scelto da una lista
        messa a disposizione dai docenti oppure proposto dallo studente. Il seminario
        viene valutato su una scala di 4 valori (Insufficiente, Sufficiente, Buono,
        Ottimo).


        Il progetto consiste nello sviluppo di un sistema IoT che implementi tutta
        la pipeline presentata a lezione (acquisizione dati da sensori, sistema embedded
        basato su microcontrollore, acquisizione dati su nodo edge con protocolli
        HTTP/CoAP/MQTT, storage dei dati con database di serie temporali, dashboard,
        analisi dati/forecasting di serie temporali con approcci AI/ML e di statistical
        learning). Come per l''argomento del seminario, la traccia del progetto viene
        proposta dagli studenti ed approvata dal docente, o direttamente proposta
        dal docente. Il progetto produce un voto in 30-esimi.


        Il voto finale viene calcolato tenendo in considerazione il voto del progetto
        ed il giudizio ottenuto durante il seminario, in base ai seguenti vincoli:


        (1) Se il seminario non è stato svolto, il voto massimo finale ottenibile
        è 23.


        (2) Se il seminario è stato svolto, con giudizio Sufficiente, il voto massimo
        finale ottenibile è 25.


        (3) Se il seminario è stato svolto, con giudizio Buono, il voto massimo finale
        ottenibile è 28.


        (4) Se il seminario è stato svolto, con giudizio Ottimo, il voto massimo finale
        ottenibile è 30 e lode.'
      Strumenti a supporto della didattica: 'Il materiale didattico (slides, codice)
        presentato a lezione viene messo a disposizione dello studente attraverso
        la pagina web del corso ufficiale su piattaforma Virtuale. La pagina contiene
        inoltre: link a strumenti software utilizzabili per lo svolgimento del progetto,
        e puntatori a sorgenti di informazioni (es. forum, articoli scientifici) correlate
        agli argomenti del corso.'
      Orario di ricevimento: 'Consulta il sito web di Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3)


        Consulta il sito web di Luciano Bononi (https://www.unibo.it/sitoweb/luciano.bononi)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/479055
    title: 2025/2026 Internet of Things — University of Bologna
    contents:
      Learning outcomes: At the end of the course, students will learn the architectures
        and methodologies at the basis of the Internet of Things (IoT), and will develop
        advanced competences about the wireless technologies, the network protocols,
        the integration of mobile and pervasive end-devices in a Machine-to-Machine
        (M2M) paradigm, and the techniques and tools for sensor data management and
        analytics. They will be able to design and implement complex and heterogeneous
        IoT systems composed of networked edge sensing devices, fog/cloud platforms
        for scalable data management and advanced software for sensor data analytics
        via machine-learning and statistical techniques. Middleware platforms for
        M2M-based IoT systems will be illustrated as well as edge/distributed/cloud
        computing principles. New services, service platforms and application scenarios
        will be illustrated, designed and experimented, with high emphasis on advanced
        and visionary services.
      Course contents: 'The course introduces the enabling technologies, protocols,
        software architectures, and applications related to the emerging paradigm
        of the Internet of Things (IoT).


        After a brief introduction to the topics of pervasive computing and its emerging
        application areas (Industry 4.0, smart home automation, intelligent transportation
        systems, wearable devices, etc.), the course provides a comprehensive overview
        of the enabling elements of an IoT system from the perspective of wireless
        communication technologies between devices, data processing techniques, and
        programming languages for application development and prototyping (Arduino,
        STM32 Nucleo, etc.).


        In particular, the components of a typical IoT system are illustrated following
        a data-oriented path: from data generation by sensors, to wireless transmission
        within a WSAN/WLAN/WPAN network, to cloud streaming and storage, up to processing
        using AI techniques and integration within a software system.


        Summary of course contents:


        Introduction to IoT systems: definitions, applications, enabling technologies


        IoT Components: Communication and Networking


        - Sensors and actuators, basics of electronic circuit design (overview), sensing
        and data acquisition policies

        - Wireless communication technologies and encoding for IoT

        - Machine-to-machine (M2M) communication between devices: enabling wireless
        technologies for WPAN networks (BLE, IEEE 802.15.4, Z-Wave, etc.), WLAN and
        LP-WAN (LoRA, LoRaWAN)

        - Network architectures and routing (6LoWPAN, RPL)


        IoT Components: Embedded Systems


        - Embedded systems: architectures and programming languages (C++ and MicroPython)

        - Interfacing with sensors/actuators and serial protocols

        - Examples with Arduino and ESP-IDF frameworks


        IoT Components: Data Acquisition


        - Data acquisition protocols: COAP, MQTT, HTTP

        - KAFKA framework

        - Web of Things and Semantic Web 3.0 standards for M2M and IoT


        IoT Components: Data Management and Processing/Analysis


        - Storage and processing of sensor data, time-series and time-series databases:
        INFLUX-DB

        - Time-series visualization: examples with GRAFANA tool

        - Time-series forecasting with statistical methods

        - Time-series forecasting with AI/ML techniques

        - Edge AI and TinyML


        IoT Components: Edge/Cloud Architectures


        - Data storage/processing architectures: cloud/fog/edge computing approaches

        - IoT platforms: AWS IoT, Watson IoT, ThingSpeak, etc.'
      Readings/Bibliography: 'Instructor’s slides, links to book chapters, scientific
        articles, and online resources are provided on the course website.


        Recommended textbook: Riccardo Melen, Vittorio Trecordi, IoT Networking, Pearson,
        ISBN 8891931934, ISBN13 978-8891931931, 336 pages (cover price 34 EUR).


        Additional textbooks may be recommended during the course depending on the
        topics covered.'
      Teaching methods: 'To successfully follow the course, and considering the strong
        design and experimental component as well as the exercises included in the
        program, it is strongly recommended to have the following preliminary knowledge:
        (i) familiarity with at least one programming language for embedded systems
        (e.g., C/C++), as well as a language used for front-end or back-end programming
        (Python is recommended); (ii) knowledge of databases and the SQL language.


        The course includes frontal lectures and in-class exercises, conducted by
        the instructor using PCs and a projector.


        Coding exercises in class are performed using IoT devices provided by the
        instructors. Students must bring their own laptops to participate in the exercises.


        Considering the type of activities and the teaching methods used, attendance
        to this training activity requires all students to have previously completed
        Modules 1 and 2 of the safety training for study environments, available online
        at [https://elearning-sicurezza.unibo.it/ ] in e-learning mode.'
      Assessment methods: 'The course includes an optional seminar and a mandatory
        project. The seminar takes place during the last week of the course and consists
        of a 20-30 minute presentation in which the student presents a research topic
        related to the course program, based on a scientific article or an existing
        tool. The seminar topic can be chosen from a list provided by the instructors
        or proposed by the student. The seminar is graded on a four-level scale (Fail,
        Pass, Good, Excellent).


        The project involves developing an IoT system that implements the entire pipeline
        presented in the lectures (data acquisition from sensors, embedded system
        based on a microcontroller, data acquisition on an edge node using HTTP/CoAP/MQTT
        protocols, data storage with time-series databases, dashboards, data analysis/forecasting
        of time-series using AI/ML and statistical learning approaches). As with the
        seminar topic, the project outline can be proposed by the students and approved
        by the instructor, or directly proposed by the instructor. The project is
        graded out of 30.


        The final grade is calculated considering the project grade and the seminar
        evaluation, based on the following conditions:


        1. If the seminar is not taken, the maximum final grade attainable is 23.

        2. If the seminar is taken with a Pass evaluation, the maximum final grade
        attainable is 25.

        3. If the seminar is taken with a Good evaluation, the maximum final grade
        attainable is 28.

        4. If the seminar is taken with an Excellent evaluation, the maximum final
        grade attainable is 30 with honors.'
      Teaching tools: The teaching materials (slides, code) presented during the lessons
        are made available to students through the official course webpage on the
        Virtuale platform. The page also contains links to software tools usable for
        completing the project, as well as pointers to information sources (e.g.,
        forums, scientific articles) related to the course topics.
      Office hours: 'See the website of Marco Di Felice (https://www.unibo.it/sitoweb/marco.difelice3/en)


        See the website of Luciano Bononi (https://www.unibo.it/sitoweb/luciano.bononi/en)'
