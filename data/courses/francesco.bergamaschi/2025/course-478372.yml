syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/478372
    title: 2025/2026 BUSINESS ANALYTICS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course students master
        the design, creation and interpretation of corporate Business Intelligence
        (BI) and Business Analytics (BA) reports. They will understand the different
        design choices and technologies and the different options on how to implement
        BI and BA reports. The course will also discuss Descriptive, Prescriptive
        and Predictive Analytics and show how to include in a BI report Analytics
        calculations using R.

        This course is integrated with Management Control System Lab as it completes
        the integrated course Analytics for Management (I.C.) with the competences
        needed to collect, clean and analyze the data coming from different parts
        of the organization in order to support an analytical approach to management.'
      Contenuti: 'Databases architecture and Management


        Extract, Transform and Load Principles and Techniques


        Data Modeling Techniques


        Data Visualization Techniques


        Report Sharing Techniques


        Hints on Business Analytics using Power BI and R'
      Testi/Bibliografia: 'Winston/Albright - Business Analytics: Data Analysis &
        Decision Making, Cengage International Edition, 2024'
      Metodi didattici: 'Lectures and practical applications in laboratory.


        Important note: up to 20 Erasmus students can be accepted, the criteria will
        be "first come, first served".'
      Modalità di verifica e valutazione dell'apprendimento: 'Practical test at the
        PC on MS Power BI, plus a few theory open questions.


        The course mark is numeric (from 0 to 30), numeric marks correspond to the
        following grades:


        <18 insufficient

        18-23 sufficient

        24-27 good

        28-30 very good

        30 cum laude excellent'
      Strumenti a supporto della didattica: Blackboard, slides, PCs.
      Orario di ricevimento: Consulta il sito web di Francesco Bergamaschi (https://www.unibo.it/sitoweb/francesco.bergamaschi)
