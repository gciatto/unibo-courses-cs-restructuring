syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/446609
    title: 2025/2026 ARTIFICIAL INTELLIGENCE IN INDUSTRY — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa, lo studente
        ha una conoscenza approfondita sulle applicazioni industriali che beneficiano
        di tecniche di apprendimento automatico, ottimizzazione, e simulazione. Lo
        studente ha una conoscenza specifica di casi pratici presentati dal docente
        e da seminari tenuti da esperti di dominio in vari settori come quello manifatturiero,
        automobilistico, e multimediale.
      Contenuti: 'Il corso consiste primariamente di una serie di casi di studio industriali
        semplificati. L''obiettivo è di esemplificare le problematiche che abitualmente
        insorgono nel risolvere un caso d''uso industriale e sviluppare la capacità
        di affrontarle in modo critico.


        I casi di studio considerati potranno coprire temi quali:


        - Problemi di individuazione di anomalie

        - Predizione del tempo di vita residuo

        - Politiche di manutenzione basate sul tempo di vita residuo

        - Pianificazione dell''utilizzo di risorse

        - Sistemi di raccomandazione con vincoli di equità

        - Problemi di gestione della rete di distribuzione elettrica

        - Controllo di epidemie

        - Pianificazione della produzione


        L''enfasi è sulle capacità di adattamento e sulla visione dei problemi nel
        loro complesso, il che porta di frequente all''utilizzo di combinazione di
        tecniche eterogenee per la soluzione di un problema.


        Le metodologie utilizzate saranno:


        - Modellazione matematica di problemi industriali

        - Modelli predittivi e diagnostici per serie temporali

        - Ottimizzazione combinatoria

        - Metodologie per integrazione di modelli probabilistici ed Apprendimento
        Automatico

        - Metodologie per l''integrazione di vincoli ed Apprendimento Automatico

        - Metodologie per l''integrazione di ottimizzazione combinatoria ed Apprendimento
        Automatico


        Il corso includerà seminari e casi di studio presentati da esperti industriali.


        I contenuti del corso potranno (e tipicamente saranno) modificati durante
        lo svolgimento del corso, in modo da adattarsi per quanto possibile agli interessi
        e caratteristiche degli studenti frequentanti.'
      Testi/Bibliografia: Il materiale didattico principale sarà costituito da notebook
        interattivi sviluppati con lo strumento Jupyter, che conterranno collegamenti
        ai riferimenti rilevanti.
      Metodi didattici: Lezioni frontali, discussioni di gruppo (anche mediante strumenti
        digitali) ed esempi su notebook Jupyter (Python)
      Modalità di verifica e valutazione dell'apprendimento: 'Progetti individuali
        o di gruppo (da uno a tre studenti).


        Gli studenti possono proporre liberamente un tema di progetto, o scegliere
        tra un insieme di temi proposti indicativamente a metà corso.


        In ogni caso il tema specifico di progetto va concordato con il docente prima
        dell''inizio delle attività.


        L''esame consisterà nella presentazione e discussione del lavoro di progetto.
        La valutazione:


        - Non terrà conto dell''esito positivo o negativo dell''attività

        - Terrà invece conto della qualità del metodo, con enfasi su: 1) motivazioni
        per scelte effettuate; 2) interpretazione dei risultati; 3) consapevolezza
        delle capacità e dei limiti degli strumenti utilizzati'
      Strumenti a supporto della didattica: 'Il corso farà uso estensivo di notebook
        interattiviti sviluppati con lo strumento Jupyter.


        Il corso richiederà diverse librerie per apprendimento automatico ed ottimizzazione,
        gratuite per uso accademico. La loro installazione sarà semplificata mediate
        l''utilizzo di container Docker.


        Le lezioni saranno abitualmente registrate.'
      Orario di ricevimento: Consulta il sito web di Michele Lombardi (https://www.unibo.it/sitoweb/michele.lombardi2)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/446609
    title: 2025/2026 Artificial Intelligence in Industry — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student has a deep knowledge
        of industrial applications that benefit from the use of machine learning,
        optimization and simulation. The student has a domain-specific knowledge of
        practical use cases discussed in collaboration with industrial experts in
        a variety of domains such as manufacturing, automotive and multi-media.
      Course contents: 'The course is primarily delivered as a series of simplified
        industrial use cases. The goal is provide examples of challenges that typically
        arise when solving industrial use cases, and to develop critical thinking
        and problem solving skils.


        Use cases may cover topics such as:


        - Anomaly detection

        - Remaining Useful Life (RUL) estimation

        - RUL based maintenance policies

        - Resource management planning

        - Recommendation systems with fairness constraints

        - Power network management problems

        - Epidemic control

        - Production planning


        The course will emphasize the ability to view problems in their entirety and
        adapt to their peculiarities. This will frequently require to combine heterogeneous
        solution techniques, using integration schemes both simple and advanced.


        The employed method will include:


        - Mathematical modeling of industrial problems

        - Predictive and diagnostic models for time series

        - Combinatorial Optimization

        - Integration methods for Probabilistic Models and Machine Learning

        - Integration methods for constraints and Machine Learning

        - Integration methods for combinatorial optimization and Machine Learning


        The course will include seminars on real-world use cases, from industry experts.


        The course contents may (and typically will) be subject to changes, so as
        to adapt to some degree to the interests and characteristics of the attending
        students.'
      Readings/Bibliography: The main teaching material will consists of mostly of
        interactive notebooks developed using the Jupyter system, which will contain
        pointers to relevant references.
      Teaching methods: Lectures, group discussions (including through digital platforms),
        and examples on Jupyter (Python) notebooks
      Assessment methods: 'Individual or group projects (one to three students).


        Students may freely propose a project topic, or pick from a list that will
        be published roughly midway through the course.


        In both cases, the details of the course project must be discussed with the
        teacher before activities begin.


        The exam will consist in the presentation and discussion of the project work.
        The evaluation:


        - Will not take into account the outcome of the project (meaning that negative
        results are considered fine)

        - It will instead focus on the quality of the method, with emphasis on: 1)
        motivation for all the choices that have been made; 2) interpretation of the
        results; 3) awareness of the capabilities and limits of the tools that have
        been used'
      Teaching tools: 'The course will make extensive use of interactive notebooks
        developed using the Jupyter system.


        The course will require a number of optimization and Machine Learning software
        libraries, all free for academic use. Their installation and setup will be
        simplified via the use of Docker containers.


        All lectures will be recorded.'
      Office hours: See the website of Michele Lombardi (https://www.unibo.it/sitoweb/michele.lombardi2/en)
