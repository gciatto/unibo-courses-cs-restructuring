syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498976
    title: 2025/2026 FONDAMENTI DI INFORMATICA P-2 — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        conoscenza di base sul funzionamento, la progettazione e l’utilizzo di sistemi
        digitali. Inoltre, acquisire conoscenze di base sull’utilizzo, la progettazione
        e la programmazione di sistemi a microprocessore. Una particolare attenzione
        è dedicata all’approfondimento di tematiche inerenti la comprensione della
        relazione tra hardware e software.
      Contenuti: Principi di progettazione logica. Struttura e organizzazione di un
        calcolatore elettronico. Dispositivi di memoria. CPU e linguaggio macchina.
        Esempi di interazione hardware e software con verifica mediante sperimentazione
        in laboratorio.
      Testi/Bibliografia: Lucidi disponibiliin Virtuale.
      Metodi didattici: Al termine di ogni argomento sono previste esercitazioni svolte
        in aula o in laboratorio dagli studenti.
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto: progetto
        di un sistema basato su CPU, sistema digitale e domande di carattere generale
        inerenti gli argomenti del corso.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnament'
      Strumenti a supporto della didattica: Lucidi ed esercitazioni in laboratorio
        anche mediante l'utilizzo di strumenti per il progetto e la simulazione di
        sistemi digitali e CPU DLX.
      Orario di ricevimento: Consulta il sito web di Stefano Mattoccia (https://www.unibo.it/sitoweb/stefano.mattoccia)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498976
    title: 2025/2026 Fundamentals of Computer Programming P2 — University of Bologna
    contents:
      Learning outcomes: Learning basic digital design principles and organization
        of computer architectures. A particular outome concern the ability to understand
        the link between hardware and software. Each topic will be followed by detailed
        exercises.
      Course contents: Logic design principles. Structure and organization of a computer
        system. Memory devices. Central Processing Unit (CPU) and machine language.
        Interrupts. Hardware/software interaction with laboratory experiments.
      Readings/Bibliography: Slides availablein Virtuale.
      Teaching methods: Each topic will be followed by exercises and/or lab experiments.
      Assessment methods: 'Written exam: design of a CPU-based system and questions
        concerned with computer architectures and digital systems.'
      Teaching tools: Slides and practical experiments with design and simulation
        frameworks for digital systems and DLX processor.
      Office hours: See the website of Stefano Mattoccia (https://www.unibo.it/sitoweb/stefano.mattoccia/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
