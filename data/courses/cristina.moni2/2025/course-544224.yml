syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/544224
    title: 2025/2026 SISTEMI DI ELABORAZIONE DELLE INFORMAZIONI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'insegnamento lo studente
        conosce i principali sistemi operativi, le reti di computer, le organizzazioni
        dei dati e dei flussi comunicativi.
      Contenuti: '1. Importanza dell’informatizzazione

        2. LIS (Laboratory Information System) e HIS (Hospital Information System)

        3. Sistema Hub and Spoke

        4. Tracciare i percorsi nell’ambito della Patologia Clinica, Anatomia Patologica
        e Medicina Trasfusionale (configurazione analisi , seguire collegamenti strumentali,
        configurazione dei reparti, abilitazioni utenti, cambi anagrafici…)

        5. Gestione Non Conformità: errori nell’inserimento dei pazienti ( anagrafiche
        errate, date errate di prelievo…) e loro ripercussioni: FSE ( fascicolo sanitario
        elettronico), ripetizione di prelievi, ritardi, …

        6. Archiviazione dei dati nell’ambito della Patologia Clinica, Anatomia Patologica
        e Medicina Trasfusionale

        7. Nuovo ruolo del Tecnico di Laboratorio Biomedico e nuova figura di “Amministratore
        di Sistema”'
      Metodi didattici: 'Lezione frontale tradizionale.


        Utilizzo di lezioni in .ppt.'
      Modalità di verifica e valutazione dell'apprendimento: 'La prova finale dell''insegnamento
        di Sistemi di Elaborazione delle Informazioni (1 CFU), consiste in un quiz
        a risposta multipla, e nella preparazione di un elaborato in Power Point.


        Lo studente riceve un voto che concorre al voto finale in trentesimi del corso
        integrato.'
      Orario di ricevimento: Consulta il sito web di Cristina Moni (https://www.unibo.it/sitoweb/cristina.moni2)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/544224
    title: 2025/2026 Information Processing Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the main operating
        systems, computer networks, data organization and communication flows.
      Course contents: '1. Importance of Computerization

        2. LIS (Laboratory Information System) and HIS (Hospital Information System)

        3. Hub and Spoke System

        4. Tracking workflows in Clinical Pathology, Pathological Anatomy, and Transfusion
        Medicine (test configuration, instrument connection tracking, department configuration,
        user authorization, registry changes, etc.)

        5. Non-Compliance Management: errors in patient entry (incorrect patient records,
        incorrect sampling dates, etc.) and their repercussions: EHR (electronic health
        record), repeated sampling, delays, etc.

        6. Data archiving in Clinical Pathology, Pathological Anatomy, and Transfusion
        Medicine

        7. New role of the Biomedical Laboratory Technician and new role of "System
        Administrator"'
      Teaching methods: 'Traditional lectures.


        Use of lessons in .ppt format.'
      Assessment methods: 'The final exam for the Information Processing Systems course
        (1 CFU) consists of a multiple-choice quiz and the preparation of a Power
        Point presentation.


        Students receive a grade that contributes to the final grade for the integrated
        course, out of 30.'
      Office hours: See the website of Cristina Moni (https://www.unibo.it/sitoweb/cristina.moni2/en)
