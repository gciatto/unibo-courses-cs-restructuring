syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/530778
    title: 2025/2026 RETI LOGICHE T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente conosce
        i principi e i modelli di riferimento dei sistemi digitali ed è capace di
        applicare metodi di analisi, sintesi e composizione di reti combinatorie e
        sequenziali.
      Contenuti: 'Il corso insegna le basi dei circuiti e dei sistemi digitali, partendo
        dalle reti fino ad arrivare a cenni sui sistemi più complessi quali processori
        e memorie. Inoltre verranno introdotte le logiche programmabili e il relativo
        flusso di progettazione tramite il linguaggio verilog.


        Programma del corso:


        - introduzione ai circuiti e sistemi digitali

        - funzioni booleane e algebra booleana, codifica binaria

        - rappresentazione binaria dell''informazione

        - reti logiche, algebra di commutazione, famiglie logiche

        - componenti e circuiti combinatori (encoder e decoder, multiplexer, etc.)

        - componenti e circuiti sequenziali (flip flop, shift register, latches, macchine
        a stati finiti, reti asincrone)

        - logiche programmabili

        - processori, memorie e interfacce I/O: elementi di base'
      Testi/Bibliografia: 'Roberto Laschi, Reti Logiche, Progetto Leonardo, Bologna


        R. Laschi, M.Prandini, Reti Logiche, Esculapio


        Peter J.Ashenden, Digital Design An Embedded Systems Approach Using Verilog,
        Morgan Kaufmann'
      Metodi didattici: Il corso prevede solo ore di lezione frontale, con esercizi
        in preparazione dell'esame forniti dal docente
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste di
        una prova scritta obbligatoria della durata approssimativa di 2 ore.


        La prova è suddivisa in due parti: la prima è costituita da alcuni rapidi
        esercizi volti a verificare la comprensione della teoria, mentre la seconda
        parte prevede lo svolgimento di un esercizio di progetto.


        L''esame di svolge al calcolatore tramite l''interfaccia di Esami on Line
        dove verrà predisposto un quiz e uno spazio per compilare il progetto.


        La parte di progetto prevede la sintesi di una rete sequenziale sincrona che
        va poi impiegata in una rete logica complessa composta da diverse reti logiche
        interconnesse.


        Durante la prova teorica non è possibile consultare materiale, mentre durante
        la prova di progetto gli studenti possono consultare tutto il materiale che
        desiderano.


        Il docente si riserva di eseguire una ulteriore verifica basata su un colloquio.


        I punti a disposizione sono 33. In termini di punteggio disponibile la parte
        teorica ha un peso pari ad 1/3 circa. Si prende 30 e lode se si ottengono
        complessivamente più di 30 punti. Il risultato insufficiente nella parte teorica
        rende insufficiente l''intera prova.'
      Strumenti a supporto della didattica: Le slide del corso verranno pubblicate
        su virtuale prima di ogni lezione.
      Orario di ricevimento: Consulta il sito web di Andrea Acquaviva (https://www.unibo.it/sitoweb/andrea.acquaviva)
      SDGs: 'Energia pulita e accessibile Lotta contro il cambiamento climatico La
        vita sott''acqua


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/530778
    title: 2025/2026 Logic Design T — University of Bologna
    contents:
      Learning outcomes: Upon completion of the course, students will understand the
        principles and reference models of digital systems and be able to apply methods
        for the analysis, synthesis, and composition of combinatorial and sequential
        networks.
      Course contents: 'The course teaches the fundamentals of digital circuits and
        systems, from networks to more complex systems such as processors and memories.
        Programmable logic and the related design flow using the Verilog language
        will also be introduced.


        Course Outline:


        - Introduction to Digital Circuits and Systems

        - Boolean Functions and Boolean Algebra, Binary Coding

        - Binary Representation of Information

        - Logic Networks, Switching Algebra, Logic Families

        - Combinational Components and Circuits (Encoders and Decoders, Multiplexers,
        etc.)

        - Sequential Components and Circuits (Flip-Flops, Shift Registers, Latches,
        Finite-State Machines, Asynchronous Networks)

        - Programmable Logic

        - Processors, Memories, and I/O Interfaces: Basic Elements'
      Readings/Bibliography: 'Roberto Laschi, Logic Networks, Progetto Leonardo, Bologna

        R. Laschi, M. Prandini, Logic Networks, Esculapio

        Peter J. Ashenden, Digital Design: An Embedded Systems Approach Using Verilog,
        Morgan Kaufmann'
      Teaching methods: The course consists of lectures only, with exercises provided
        by the instructor to prepare for the exam.
      Assessment methods: 'The exam consists of a mandatory written test lasting approximately
        two hours.

        The test is divided into two parts: the first consists of a few quick exercises
        designed to test your understanding of the theory, while the second part involves
        a project exercise.

        The exam is administered on a computer using the Esami on Line interface,
        where you will be provided with a quiz and a space to complete the project.

        The project part requires the synthesis of a synchronous sequential network,
        which is then used in a complex logic network composed of several interconnected
        logic networks.

        During the theory test, students are not allowed to consult any materials,
        while during the project test, students may consult any materials they wish.

        The instructor reserves the right to conduct an additional assessment based
        on an interview.

        There are 33 points available. The theory test carries approximately one-third
        of the available points. A total of 30 points is awarded with honors if a
        student achieves more than 30 points. A failing the theory test results in
        a failing the entire exam.'
      Teaching tools: Course slides will be posted online before each class.
      Office hours: See the website of Andrea Acquaviva (https://www.unibo.it/sitoweb/andrea.acquaviva/en)
      SDGs: 'Affordable and clean energy Climate Action Oceans


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
