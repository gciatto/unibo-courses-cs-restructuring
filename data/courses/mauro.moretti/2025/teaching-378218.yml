        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/378218
    title: 2025/2026 Operating Systems — University of Bologna
    contents:
      Learning outcomes: The course introduces main issues related to design and implementation
        of modern operating systems. Moreover, the course provides the basic knowledges
        of their structure, implementation and system administration procedures.
      Course contents: '- Introduction and history of operating systems.

        - ANSI C programming language.

        - Shell and Shell scripting.

        - Thread and processes.

        - Concurrent programming.

        - Deadlock, Starvation e Busy Waiting.

        - Inter Process Communications.

        - CPU scheduling.

        - Memory management and virtual memory.

        - Secondary memory management and file systems.

        - I/O management.

        - Case study: Linux and Windows.

        - Linux Kernel.

        - Introduction to virtualization, container, docker, kubernetes, IaaS and
        PaaS services.'
      Readings/Bibliography: 'Silberschatz, P.B. Galvin, G. Gagne, Sistemi operativi.
        Concetti ed esempi, nona edizione, Pearson Education Italia (2014)

        (English version: A. Silberschatz, P.B. Galvin, G. Gagne, Operating System
        Concepts - since Ninth Edition, John Wiley & Sons, Inc.).'
      Teaching methods: 'Classroom lectures and laboratory activities. The theoretical
        bases of the modern operating systems are presented during the traditional
        lectures. A lot of practical exercises are developed in the lectures so as
        to introduce the laboratory activities, in which the students, under the supervision
        of the professor, check their knowledge, propose and solve their doubts, and
        improve their skill. Extensions of the lab activities are regularly suggested,
        and the solutions published, so as to allow individual studies and autonomous
        lab activities. Some laboratory activities simulate the execution of the practical
        exam so as to familiarize the students with the practical exam.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode [ https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute
        ].'
      Assessment methods: "The exam aims to verify the achievement of the following\
        \ learning objectives:\n\n- in-depth knowledge of the theoretical aspects,\
        \ requirements, algorithms and design choices that determine the creation\
        \ of operating systems.\n  · in-depth knowledge and ability to use the tools,\
        \ techniques and algorithms that the operating system offers to the user and\
        \ system administration to create high-level functionality in different contexts.\n\
        \nThe examination consists of a test of the candidate's practical skills,\
        \ followed by a test regarding the theoretical aspects of the discipline.\
        \ The admission to the latter test is conditioned to the positive outcome\
        \ of the former. The final grade is given by the average of the two grades\
        \ obtained in the practical test and the theoretical test, both of which must\
        \ be at least sufficient.\n\nThe 1-hour practical test is carried out in the\
        \ same working environment as that used for the lab activities. It proposes\
        \ a set of problems. The candidate has to design and implement a set of simply\
        \ applications and scripts.\nThe theoretical test is carried out as a 1-hour\
        \ written exam (open questions). The test may involve any subject presented\
        \ during the course, with a strong attention to those presented during lectures."
      Teaching tools: 'Lessons: projection of slideshows and practical demonstrations
        of the concepts, algorithms, techniques, API and tools proposed in the lessons.
        The practical demonstration uses scripts and ANSI C code that are provided
        by means of the web page of the course. Hence, the students can follow and
        replicate the demonstrations on their laptot using the wifi connections available
        in the classroom.


        Practical laboratory activity: the teacher will guide the students to learn
        API and tools and solve problems regarding almost every subject of the course.
        A personal virtualized environment is available, where students can work with
        administrative privileges, allowing to simulate realistic system administrator
        operational procedures.


        Students can deploy the same virtual machines on their own personal computers,
        thus being able to access at home the same work environment they use in the
        laboratory. Obviously, the same work environment is used in the practical
        demonstrations during the lessons.'
      Links to further information: http://www.cs.unibo.it/~ghini/didattica/sistemioperativi/sistemioperativi_index.html
      Office hours: 'See the website of Vittorio Ghini (https://www.unibo.it/sitoweb/vittorio.ghini/en)


        See the website of Stefano Ferretti (https://www.unibo.it/sitoweb/s.ferretti/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
