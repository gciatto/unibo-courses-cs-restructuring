syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498813
    title: 2025/2026 PROGRAMMAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente ha una
        competenza di base sulla programmazione, mediante linguaggio C e C++, sia
        dal punto di vista concettuale che dal punto di vista pratico, per lo sviluppo
        di applicazioni software di media complessità. In particolare: - possiede
        i fondamenti metodologici per l’analisi e lo sviluppo di sistemi software
        secondo il paradigma imperativo e a oggetti - conosce le tecniche di programmazione,
        sia dal punto di vista concettuale che dal punto di vista pratico, e sa applicarle
        a casi concreti di media complessità - conosce e sa utilizzare le strutture
        dati fondamentali e i relativi algoritmi - possiede le nozioni fondamentali
        relative agli aspetti funzionali nei moderni linguaggi a oggetti.'
      Contenuti: 'Il corso di Programmazione è finalizzato a fornire una forte competenza
        sulla programmazione. Non sono richiesti prerequisiti di tipo informatico.
        Viene inizialmente fornita una prima descrizione dell''approccio algoritmico
        alla soluzione di problemi mediante computer. Successivamente, facendo uso
        del linguaggio C, di cui viene fornita una descrizione dettagliata che prescinde
        da ogni eventuale competenza pregressa degli studenti, vengono analizzati
        alcuni problemi fondamentali ed alcuni dei principali e più interessanti algoritmi
        risolutori.


        Organizzazione della memoria di un calcolatore, indirizzi, parole, puntatori.
        Tipi di dato. Strutture dati. La struttura di un programma, l''inclusione
        degli header, le librerie. Puntatori; aritmetica sui puntatori. Array e matrici
        e loro rappresentazione in memoria. Strutture dati complesse. Funzioni di
        libreria e funzioni definite dall''utente. Passaggio di parametri. Funzioni
        ricorsive. Funzioni di input/output. Funzioni sui file. Funzioni per la gestione
        diretta della memoria. Funzioni su stringhe.


        Progetto ed analisi di algoritmi.'
      Testi/Bibliografia: 'Brian W. Kernighan, Dennis M. Ritchie. Linguaggio C. Jackson
        libri.


        Copia delle presentazioni usate a lezione e appunti messi a disposizione dai
        docenti.'
      Metodi didattici: 'Didattica frontale, esercitazioni in aula, esercitazioni
        al computer.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio [https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute]
        in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame del corso di
        Programmazione è composto di tre parti: la realizzazione di diversi elaborati
        (a scadenza settimanale), una prova scritta e una successiva prova orale.
        Tutti i dettagli sono reperibili su virtuale'
      Strumenti a supporto della didattica: Tutto il materiale utilizzato durante
        le lezioni frontali e durante le esercitazioni di laboratorio viene reso disponibile
        anche in forma elettronica e disponibile su Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Paola Salomoni (https://www.unibo.it/sitoweb/paola.salomoni)


        Consulta il sito web di Roberto Girau (https://www.unibo.it/sitoweb/roberto.girau)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498813
    title: 2025/2026 Programming — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student has a basic understanding
        of programming using the C language, both from a conceptual and practical
        perspective, for the development of medium-complexity software applications.
        In particular:


        - they possess the methodological foundations for the analysis and development
        of software systems according to the imperative paradigm

        - they are familiar with programming techniques, both conceptually and practically,
        and are able to apply them to real-world cases of medium complexity

        - they know and can use fundamental data structures and related algorithms

        - they have fundamental knowledge of the functional aspects of modern object-oriented
        languages.'
      Course contents: 'The Programming course is designed to provide strong competence
        in programming. No prior knowledge of computer science is required. The course
        begins with an introduction to the algorithmic approach to problem-solving
        using computers. Then, using the C programming language — which is explained
        in detail without assuming any prior knowledge — the course analyzes several
        fundamental problems and some of the main and most interesting solution algorithms.


        Topics covered include memory organization in a computer (addresses, words,
        pointers), data types, data structures, the structure of a program, inclusion
        of headers and libraries, pointers and pointer arithmetic, arrays and matrices
        and their memory representation, complex data structures, library functions
        and user-defined functions, parameter passing, recursive functions, input/output
        functions, file-handling functions, functions for direct memory management,
        and string functions. The course also covers algorithm design and analysis.'
      Readings/Bibliography: 'Brian W. Kernighan, Dennis M. Ritchie. Linguaggio C.
        Jackson libri.


        Copies of the presentations used in class and notes provided by the lecturerers.'
      Teaching methods: 'Lectures, classroom exercises, computer exercises.


        Given the type of activities and the teaching methods adopted, attendance
        of this course requires all students to have previously completed Modules
        1 and 2 of the safety training for study environments [https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute
        (https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute)],
        available in e-learning mode.'
      Assessment methods: 'The Programming course exam consists of three parts: the
        completion of various assignments (on a weekly basis), a written test, and
        a subsequent oral exam. All details are available on the Virtuale platform.'
      Teaching tools: All materials used during lectures and lab exercises are also
        made available in electronic format on the Virtuale platform.
      Office hours: 'See the website of Paola Salomoni (https://www.unibo.it/sitoweb/paola.salomoni/en)


        See the website of Roberto Girau (https://www.unibo.it/sitoweb/roberto.girau/en)'
