syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/536880
    title: 2025/2026 ALGORITMI E STRUTTURE DATI (CL.B) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: "Al termine del corso, lo studente conosce:\n\
        \n- gli algoritmi per risolvere problemi computazionali di base su strutture\
        \ dati elementari;\n- le tecniche di base per calcolare il costo computazionale\
        \ degli algoritmi;\n- le classi di complessità computazionale P, NP e NP-hard.\n\
        \  In particolare, lo studente è in grado di:\n- progettare algoritmi efficienti\
        \ per risolvere semplici problemi computazionali;\n- stimare in ordine di\
        \ grandezza il costo computazionale degli algoritmi;\n- analizzare la complessità\
        \ computazionale di problemi computazionali di base;\n- dare una valutazione\
        \ circa l'efficienza e la correttezza di un algoritmo;\n- elaborare e presentare\
        \ un progetto per la risoluzione di problemi computazionali di base."
      Contenuti: '-matematica discreta elementare per calcolare gli ordini di grandezza;


        - Algoritmi di ordinamento;

        - Mediano e selezione;

        - Strutture dati elementari: pile, code, alberi, grafi

        - algoritmi di visita su grafi

        - algoritmi di base su grafi


        -classi P e NP


        -problemi NP-Hard'
      Testi/Bibliografia: T. Cormen, C. Leiserson, R. Rivest. Introduzione agli algoritmi
        e strutture dati, Mc Graw Hill. 4 ed.
      Metodi didattici: Lezioni frontali ed eserciitazioni in aula.
      Modalità di verifica e valutazione dell'apprendimento: 'Esame scritto e orale
        opzionale aggiuntivo. Progetto.


        La verifica si compone di due prove, progetto e scritto (orale opzionale).
        Il progetto deve essere consegnato e approvato prima dello scritto e non concorre
        al giudizio finale ma abilita solo all''iscrizione alla prova scritta.


        La frequenza alle lezioni è molto consigliata ma non indispensabile.


        La prova scritta, della durata di 1.5 h, è composta di tre esercizi, un quiz
        a scelta multipla e una domanda teorica riferite alla verifica di conoscenze
        (sapere) e un esercizio riferito alle abilità (saper fare), declinate nel
        quadro “conoscenze ed abilità da conseguire”.


        Non sono ammessi durante le prove strumenti quali ausili di calcolo, vocabolari,
        codici, ecc.


        La partecipazione attiva alle lezioni verrà premiata.'
      Strumenti a supporto della didattica: Dispense a cura del docente riferite al
        libro di testo. Non sono sostitutive del testo stesso.
      Orario di ricevimento: 'Consulta il sito web di Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo)


        Consulta il sito web di Moreno Marzolla (https://www.unibo.it/sitoweb/moreno.marzolla)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/536880
    title: 2025/2026 Algorithms and Data Structures (CL.B) — University of Bologna
    contents:
      Learning outcomes: 'Upon completion of the course, the student knows:


        - algorithms for solving basic computational problems on elementary data structures;

        - basic techniques for calculating the computational cost of algorithms;

        - the P, NP, and NP-hard computational complexity classes.


        In particular, the student is able to:


        - design efficient algorithms for solving simple computational problems;

        - estimate in order of magnitude the computational cost of algorithms;

        - analyze the computational complexity of basic computational problems;

        - assess the efficiency and correctness of an algorithm;

        - design and develop a solution for basic computational problems.'
      Course contents: '- basic notion of discrete mathematics for analyzing order
        of magnitude

        - Sorting

        - Median and selection

        - Elementary data structures: stacks, queues, graphs

        - Search algorithms on graphs

        - basic algorithms on graphs

        - Classes P and NP

        - NP hard Problems'
      Readings/Bibliography: T. Cormen, C. Leiserson, R. Rivest. Introduction to algorithms.
        MIT Press.
      Teaching methods: Lectures in class
      Assessment methods: 'Additional optional written and oral exams. Project.


        The exam consists of two tests, a project and a written (optional oral) exam.
        The project must be submitted and approved prior to the written exam and does
        not contribute to the final grade, but only qualifies the student to take
        the written exam.


        Attendance is strongly recommended but not required.


        The written exam, which lasts 1.5 hours, consists of three exercises, a multiple-choice
        quiz and a theoretical question that tests knowledge (knowing) and an exercise
        that tests skills (knowing how to do), which are discussed in the "Knowledge
        and Skills to be Achieved" section.


        Tools such as calculators, vocabularies, codes, etc. are not allowed during
        the tests.


        Active participation in class is rewarded.'
      Teaching tools: Lecture notes and handouts related to the textbook. They are
        not a substitute for the book itself.
      Office hours: 'See the website of Vittorio Maniezzo (https://www.unibo.it/sitoweb/vittorio.maniezzo/en)


        See the website of Moreno Marzolla (https://www.unibo.it/sitoweb/moreno.marzolla/en)'
