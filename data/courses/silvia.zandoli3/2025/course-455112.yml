syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455112
    title: 2025/2026 INTRODUZIONE ALL'APPRENDIMENTO AUTOMATICO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente avra' compreso
        le complesse problematiche relative alla simulazione di un comportamento intelligente
        da parte di una macchina, e approfondito alcune tecniche di base di apprendimento
        automatico in ambito supervisionato, non supervisionato e con rinforzo. Il
        corso si propone anche di fornire rudimenti relativi alla elaborazione di
        immagini, che verrano utilizzate estensivamente come oggetto di sperimentazione
        delle tecniche analizzate
      Contenuti: 'Il corso è essenzialmente strutturato in due parti, una dedicata
        a tecniche tradizionali di Machine Learning, ed una rivolta ad una introduzione
        alle reti neurali e al deep learning.


        Nella parte iniziale si cercherà soprattutto di evidenziare l''approccio titpico
        del machine learning, incentrato sulla definizione di una classe parametrica
        di modelli, alla definizione di una funzione di loss per il confronto tra
        di essi, e all''ottimizzazione dei parametri per la ricerca del modello migliore.
        Si cercherà di evidenziare l''importanza dell''approccio probablistico, e
        la differenza tra modelli discriminativi e modelli generativi. Verranno toccate
        nozioni importanti per la materia, quali la nozione di entropia, la nozione
        di likelihood, o la tecnica a discesa del gradiente.


        Nella seconda parte del corso verranno introdotte le reti neurali, la nozione
        di layer, le il caso importante delle reti convolutive. Veranno descritti
        alcuni semplici modelli e se ne vedrà l''applicazione concreta su alcuni semplici
        problemi di claissificzione e trasformazione di immagini.'
      Testi/Bibliografia: 'Letture consigliate


        - FIRST PART: Mathematics for Machine Learning (http://mml-book.github.io).
        by Deisenroth, Faisal, and Ong. Free PDF from Cambridge University Press

        - SECOND PART: Dive into Deep Learning (http://d2l.ai)by Zhang et al. (D2L).
        Free Online Book with several notebooks.'
      Metodi didattici: 'Lezioni frontali basate su slides, con discussione di esempi
        pratici mediante l''uso di python notebooks.


        Si prevede anche lo svolgimento di laboratori integrativi, con l''ausilio
        di tutor didattici.'
      Modalità di verifica e valutazione dell'apprendimento: La modalità di verifica
        prevede sia un esame scritto con domande chiuse sul programma del corso, che
        un piccolo progetto (solitamente su reti neuralli) da eseguire individualmente
        in una settimana di tempo su di una traccia fornita dal docente.
      Strumenti a supporto della didattica: Le lezioni faranno un uso estensivo di
        slides. Si forniranno esempi concreti e funzionanti mediante l'uso di python
        notebooks.
      Orario di ricevimento: Consulta il sito web di Andrea Asperti (https://www.unibo.it/sitoweb/andrea.asperti)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455112
    title: 2025/2026 INTRODUZIONE ALL'APPRENDIMENTO AUTOMATICO — University of Bologna
    contents:
      Learning outcomes: 'During the course, the student will be introduced to the
        complex themes pertaining to the simulation of intelligent behavior by means
        of machines, with practical experimentation of basic machine learning techniques
        for different tasks: supervised, unsupervised, with reinforcement. The course
        will also provide rudiments of image processing, since images will be extensively
        used as experimental test bench for the aforementioned learning techniques.'
      Course contents: 'The course is essentially structured in two parts: one dedicated
        to traditional Machine Learning techniques, and the other focused on an introduction
        to neural networks and deep learning.


        In the first part, the goal is to highlight the typical approach of machine
        learning, centered on defining a parametric class of models, formulating a
        loss function to compare them, and optimizing the parameters to find the best
        model. Emphasis will be placed on the importance of the probabilistic approach
        and on the distinction between discriminative and generative models. Key concepts
        in the field will be introduced, such as entropy, likelihood, and the gradient
        descent technique.


        In the second part of the course, neural networks will be introduced, along
        with the notion of layers and the important case of convolutional networks.
        Some simple models will be described and their practical application will
        be shown on basic problems of image classification and transformation.'
      Readings/Bibliography: 'Suggested readings


        - FIRST PART: Mathematics for Machine Learning (http://mml-book.github.io).
        by Deisenroth, Faisal, and Ong. Free PDF from Cambridge University Press

        - SECOND PART: Dive into Deep Learning (http://d2l.ai) by Zhang et al. (D2L).
        Free Online Book with several notebooks.'
      Teaching methods: 'Lectures will be delivered using slides, with discussion
        of practical examples through the use of Python notebooks.


        Supplementary lab sessions are also planned, with the support of teaching
        assistants.'
      Assessment methods: The assessment method includes both a written exam with
        closed-ended questions on the course content and a small project (usually
        on neural networks) to be completed individually within one week, based on
        a prompt provided by the instructor.
      Teaching tools: The lectures will make extensive use of slides. Concrete and
        working examples will be provided through the use of Python notebooks.
      Office hours: See the website of Andrea Asperti (https://www.unibo.it/sitoweb/andrea.asperti/en)
