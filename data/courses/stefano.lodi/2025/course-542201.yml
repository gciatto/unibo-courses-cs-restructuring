syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/542201
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente conosce
        la architettura di un elaboratore e comprende gli elementi fondamentali della
        programmazione e della interrogazione di basi di dati relazionali.

        In particolare lo studente è in grado di:


        - sviluppare semplici programmi e interrogazioni, con particolare riferimento
        ad esempi di elaborazioni statistiche;

        - utilizzare i linguaggi R e SQL.'
      Contenuti: "- Codifica della informazione\n  \n  - Codifiche binarie\n  - Numeri\
        \ binari\n  - Codici di caratteri\n- Sistemi operativi\n  \n  - Monoutenza\n\
        \  - Multiutenza\n  - Client/server\n- Architettura degli elaboratori\n  \n\
        \  - Macchina di Von Neumann\n  - Ciclo di fetch\n- Reti digitali\n  \n  -\
        \ Reti locali\n  - Reti geografiche\n  - Interconnessione di reti\n- Internet\n\
        \  \n  - Protocolli di comunicazione\n  - Domain Name System\n- Il linguaggio\
        \ R\n  \n  - Vettori\n  - Liste\n  - Matrici\n  - Data frame\n  - Lettura\
        \ da file e scrittura su file\n  - Istruzioni di iterazione e di scelta\n\
        \  - Definizione di funzioni\n  - Grafica e package\n- Il modello relazionale\
        \ dei dati\n  \n  - Attributo\n  - Schema di relazione e di base di dati\n\
        \  - Tupla, relazione e base di dati\n  - Algebra relazionale\n- Vincoli di\
        \ integrità\n  \n  - Chiavi e superchiavi\n  - Integrità referenziale\n- Il\
        \ linguaggio SQL\n  \n  - Caratteristiche generali\n  - Espressioni e predicati\
        \ elementari\n  - Subselect\n  - Clausole FROM, WHERE, SELECT\n  - Predicati\
        \ BETWEEN, LIKE, IS NULL\n  - Join e subquery\n  - Predicato IN\n  - Predicati\
        \ quantificati\n  - Clausole GROUP BY e HAVING\n  - Funzioni colonna\n  -\
        \ Subquery correlate\n  - Join esterni\n  - Operazioni insiemistiche e full-select\n\
        \  - Statement CREATE TABLE\n  - Vincoli di integrità: PRIMAY KEY, UNIQUE,\
        \ FOREIGN KEY\n  - Statement INSERT, UPDATE, DELETE\n  - Statement GRANT,\
        \ REVOKE\n  - Statement CREATE VIEW\n\nEsercitazioni di laboratorio: applicazione\
        \ delle nozioni di programmazione in R e SQL a semplici casi di trasformazione\
        \ e analisi dei dati. Le esercitazioni saranno condotte sui computer personali\
        \ degli studenti, utilizzando software preinstallato su computer universitari\
        \ remoti."
      Testi/Bibliografia: 'Le presentazioni del corso e gli esercizi svolti sono disponibili
        su Virtuale [http://virtuale.unibo.it/] .


        Tutti i testi sono facoltativi.


        Consigliato sul linguaggio R:


        - Muggeo, V. (2005). Il linguaggio R: concetti introduttivi ed esempi. Disponibile
        come E-book (Cercare nel Catalogo del Polo Bolognese SEBINA YOU [https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2024/[http://sol.unibo.it.ezproxy.unibo.it/SebinaOpac/SebinaYOU.do]]
        )


        Approfondimento sul linguaggio R per la elaborazione statistica (in lingua
        inglese):


        - Fischetti, T. (2015). Data Analysis with R. United Kingdom: Packt Publishing.
        Disponibile come E-book (Cercare nel Catalogo del Polo Bolognese SEBINA YOU
        [https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2024/[http://sol.unibo.it.ezproxy.unibo.it/SebinaOpac/SebinaYOU.do]]
        )


        Approfondimento sul linguaggio SQL:


        - Van der Lans, R. F. (2001). Introduzione a SQL. Con CD-ROM. Italy: Pearson'
      Metodi didattici: 'NOTA: In considerazione della tipologia di attività e dei
        metodi didattici adottati, la frequenza di questa attività formativa richiede
        la preventiva partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio [https://elearning-sicurezza.unibo.it/],
        in modalità e-learning.


        Il corso si compone di


        - lezioni frontali tenute in aula, per tre quarti del numero di ore del corso,

        - lezioni tenute in laboratorio, o in aula utilizzando computer personali
        di proprietà degli studenti, per un quarto del numero di ore del corso, ciascuna
        comprendente sia esposizioni frontali che esercitazioni sulle tecniche di
        programmazione e di soluzione dei problemi di interrogazione e di analisi
        dei dati presentate nelle esposizioni.'
      Modalità di verifica e valutazione dell'apprendimento: "L'esame si articola\
        \ in tre prove.\n\nProva di laboratorio di programmazione in R e progetto\
        \ di interrogazioni SQL\n\n- Lo studente riceve attraverso Esami OnLine (eol.unibo.it):\
        \ la descrizione di una base di dati in SQL e la descrizione in italiano di\
        \ dati in forma di tabella da estrarre dalla base di dati usando SQL; la descrizione\
        \ di un insieme di tabelle in R e la descrizione in italiano di una elaborazione\
        \ delle tabelle da eseguire in R.\n- Lo studente deve scrivere su Esami OnLine:\
        \ interrogazioni in linguaggio SQL che restituiscano i dati richiesti e un\
        \ programma R che esegua la elaborazione richiesta\n- La prova dura 50m\n\
        - La valutazione della prova si ottiene come media aritmetica del voto tra\
        \ 0 e 30 del programma R del candidato e del voto tra 0 e 30 delle interrogazioni\
        \ in SQL del candidato. I voti del programma R e delle interrogazioni in SQL\
        \ sono calcolati sottraendo da 30 per ogni errore una penalità dipendente\
        \ dall'errore\n- La lettura di testi e appunti rilegati è consentita.\n\n\
        Prova a risposta multipla\n\n- Lo studente riceve una collezione di 15 frasi,\
        \ ciascuna delle quali ha 3 possibili completamenti, dei quali solamente uno\
        \ è corretto. La prova è svolta interamente su eol.unibo.it\n- La prova dura\
        \ circa 1h\n- La valutazione della prova è tra 0 e 30 e si ottiene assegnando\
        \ 2 punti a ogni risposta corretta\n- Non è consentita la consultazione di\
        \ alcun materiale.\n\nProva orale\n\n- Il candidato deve rispondere a una\
        \ o due domande che possono riguardare qualunque parte del programma del corso.\
        \ In particolare, lo studente deve dimostrare: conoscenza approfondita di\
        \ tutte le nozioni teoriche della disciplina presentate durante le lezioni\
        \ del corso, dei linguaggi R e SQL, e sapere scrivere brevi programmi in R\
        \ e interrogazioni in SQL.\n\nValidità delle prove e appelli\n\n- Non sussistono\
        \ limitazioni al numero di appelli ai quali è consentito presentarsi, nemmeno\
        \ nella stessa sessione; tuttavia ogni prova annulla ogni precedente dello\
        \ stesso tipo\n- Le valutazioni conseguite nella prova di laboratorio e nella\
        \ prova a risposta multipla sono valide fino al termine della sessione (invernale,\
        \ estiva, o autunnale) nella quale la prova è stata sostenuta\n- Oltre tale\
        \ termine, ciascuna prova sostenuta ha valutazione zero.\n\nModalità di calcolo\
        \ del voto finale\n\n- La valutazione dell'esito e l'assegnazione del voto\
        \ finale si effettuano al termine della prova orale. La prova orale si può\
        \ sostenere solo se il massimo voto finale conseguibile è almeno 18\n- Il\
        \ voto finale è la media delle valutazioni della piú recente prova di laboratorio,\
        \ della più recente prova a risposta multipla e dell'orale. Le prove hanno\
        \ lo stesso peso.\n  La frequenza non contribuisce alla valutazione."
      Strumenti a supporto della didattica: '- Presentazioni degli argomenti del corso
        con videoproiettore

        - Accesso WiFi con il proprio PC personale al laboratorio virtuale con R e
        Microsoft SQL Server durante le lezioni.

        - PC del docente con videoproiettore per la guida alle esercitazioni'
      Orario di ricevimento: Consulta il sito web di Stefano Lodi (https://www.unibo.it/sitoweb/stefano.lodi)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/542201
    title: 2025/2026 INFORMATICA — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student is familiar with the
        architecture of a computer and understands the basic elements of programming
        and relational database querying.

        The student is able to:


        - develop simple programs and queries with particular focus on examples of
        statistical processing

        - use the R and SQL languages.'
      Course contents: "- Coding of information\n  \n  - Binary codings\n  - Binary\
        \ numbers\n  - Character codes\n- Operating systems\n  \n  - Single-user\n\
        \  - Multi-user\n  - Client/server\n- Computer architectures\n  \n  - Von\
        \ Neumann architecture\n  - Fetch cycle\n- Networks\n  \n  - Local networks\n\
        \  - Geographic networks\n  - Network interconnection\n- Internet\n  \n  -\
        \ Communication protocols\n  - Domain Name System\n- The R language\n  \n\
        \  - Vectors\n  - Lists\n  - Matrices\n  - Data frames\n  - Reading and writing\
        \ files\n  - Conditional and looping instructions\n  - Function definition\n\
        \  - Graphics and packages\n- The relational model of data\n  \n  - Attributes\n\
        \  - Relation and database schema\n  - Tuple, relation and database\n  - Relational\
        \ algebra\n- Integrity constraints\n  \n  - Keys and superkeys\n  - Referential\
        \ integrity\n- The SQL language\n  \n  - General Characteristics\n  - Expressions\
        \ and basic predicates\n  - Subselect\n  - FROM, WHERE, SELECT clause\n  -\
        \ BETWEEN, LIKE, IS NULL predicates\n  - Join and subquery\n  - IN predicate\n\
        \  - Quantified predicates\n  - GROUP BY, HAVING clause\n  - Column functions\n\
        \  - Correlated subqueries\n  - Outer Joins\n  - Set operations and full-select\n\
        \  - Statement CREATE TABLE\n  - Integrity constraints: PRIMAY KEY, UNIQUE,\
        \ FOREIGN KEY\n  - Statement INSERT, UPDATE, DELETE\n  - Statement GRANT,\
        \ REVOKE\n  - Statement CREATE VIEW\n\nLaboratory exercises: application of\
        \ programming notions in R and SQL to simple cases of data transformation\
        \ and analysis. The exercises will be carried out on personal computers owned\
        \ by students, using preinstalled software on remote university computers."
      Readings/Bibliography: 'Course slides and exercises are available on Virtuale
        [http://virtuale.unibo.it/] .


        All books are optional.


        Recommended on the R language:


        - Muggeo, V. (2005). Il linguaggio R : concetti introduttivi ed esempi. Disponibile
        come E-book (Cercare nel Catalogo del Polo Bolognese SEBINA YOU [http://sol.unibo.it.ezproxy.unibo.it/SebinaOpac/SebinaYOU.do]
        )


        Statistical processing with R in more depth (in English):


        - Fischetti, T. (2015). Data Analysis with R. United Kingdom: Packt Publishing.
        Disponibile come E-book (Cercare nel Catalogo del Polo Bolognese SEBINA YOU
        [http://sol.unibo.it.ezproxy.unibo.it/SebinaOpac/SebinaYOU.do] )


        The SQL language in more depth:


        - Van der Lans, R. F. (2001). Introduction to SQL.'
      Teaching methods: 'NOTE: As concerns the teaching methods of this course unit,
        all students must attend Module 1, 2 on Health and Safety online [https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas]
        .


        The course is composed of


        - frontal lessons in a lecture room, employing three fourths of the total
        number of course hours,

        - lessons in a laboratory, or in a lecture room using personal computers owned
        by students, employing one fourth of the total number of course hours, each
        comprising both frontal expositions and exercises on programming techniques
        and the solution of query and data analysis problems, presented in the expositions.'
      Assessment methods: 'The examination is composed of three parts.


        Part 1: Examination on programming in R and the design of SQL queries in laboratory


        - The student is given in Esami OnLine (eol.unibo.it): The description of
        a data base in SQL and the description in Italian of data in table format
        to be retrieved from the data base using SQL; the description of a set of
        tables in R and the description in Italian of a computation on the tables
        to be executed in R

        - The student must write on Esami OnLine: queries written in SQL which retrieve
        the requested data, and a R program which executes the requested computation

        - Duration: 50m

        - The assessment is obtained as the arithmetic mean of the mark of the R program
        between 0 and 30, and the mark of the SQL queries between 0 and 30. The marks
        of the R program and the SQL queries are computed by subtracting from 30,
        for each error, a penalty which depends on the error

        - Reading books and bound notes is allowed.


        Part 2: Multiple choice test


        - The student is given a collection of 15 sentences, each of which has 3 possible
        completions, of which only one is correct. The test is performed entirely
        on eol.unibo.it

        - Duration: about 1h

        - Reading any type of material is not allowed.


        Part 3: Oral examination


        - The student must answer one or two questions which may concern any part
        of the contents of the course. In particular, the student must show: in-depth
        knowledge of all the theoretical notions of the discipline which have been
        presented during the course, of the R and SQL languages, and to be skilled
        in writing short R programs and SQL queries.


        Validity of the parts, exam dates


        - The number of exam dates a student is allowed to take is not limited, not
        even in the same exam session; however, taking a part of the exam nullifies
        any previous assessment of that part

        - The assessments of Part 1 and Part 2 are valid until the end of the session
        (winter, summer, autumn) in which the part has been taken

        - Beyond that deadline, the assessment of every part taken is zero.


        Computation of the final mark


        - The computation of the final mark takes place at the end of the oral examination.
        The oral examination may be taken only if the maximum final mark is at least
        18

        - The final mark is the average of the most recent assessments of Part 1 and
        2, and Part 3. The parts have equal weight.


        Attendance does not contribute to the assessment in any way.'
      Teaching tools: '- Presentation of the course topics using a overhead projector

        - WiFi access using own PC to a virtual lab with R and Microsoft SQL Server
        during lessons

        - Teacher''s PC connected to an overhead projector to guide laboratory exercises'
      Office hours: See the website of Stefano Lodi (https://www.unibo.it/sitoweb/stefano.lodi/en)
