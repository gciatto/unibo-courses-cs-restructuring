    title: 2025/2026 NATURAL LANGUAGE PROCESSING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'attività formativa, lo studente
        ha una conoscenza approfondita degli algoritmi, strumenti e sistemi per la
        gestione, elaborazione e analisi del linguaggio naturale. Lo studente è in
        grado di progettare e sviluppare semplici sistemi orientati ad applicazioni
        di elaborazione del linguaggio naturale del mondo reale come quelle che richiedono
        la segmentazione e classificazione di elementi testuali.
      Contenuti: Il corso e' tenuto in lingua inglese. Per i contenuti e le altre
        informazioni sul corso si faccia riferimento alla versione inglese.
      Link ad altre eventuali informazioni: https://site.unibo.it/nlp/en
      Orario di ricevimento: Consulta il sito web di Paolo Torroni (https://www.unibo.it/sitoweb/p.torroni)
