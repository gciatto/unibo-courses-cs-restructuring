syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/466770
    title: 2025/2026 LABORATORY ON DIGITAL TRANSFORMATION TECHNOLOGIES — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'At the end of the course the student:


        - has practical experience in dealing with real management problems and solutions
        of digital innovation challenges

        - has practical experience of teamwork in the context of digital innovation
        projects

        - acquires skills in dealing with problems and training to identify the solution'
      Contenuti: 'Panoramica su: Business Idea, Business Case, Business Plan, Tecnologie,
        Architetture e Procedure.


        - Il processo di progettazione del business e della tecnologia:

        - Definizione e comprensione della sfida aziendale

        - Analisi e diagnosi delle tecnologiedisponibili in azienda

        - Generazione di idee di business basate sulle tecnologie allo stato dell''arte

        - Verifica della fattibilità: valutazione del rischio di progetto

        - Implmentazione del progetto con focus sulle tecnologie

        - Presentazione, discussione e follow-up

        - Trasformazione digitale: business plan, piano d''azione, KPI e soft skills'
      Testi/Bibliografia: Articoli e materiale predisposto dal docente (TBA)
      Metodi didattici: 'Gli obiettivi e gli argomenti di questo corso sono sviluppati
        attraverso sfide aziendali specifiche, workshop e lavori di gruppo. Un numero
        selezionato di aziende presenterà le proprie sfide aziendali e gruppi di studenti
        lavoreranno su potenziali soluzioni (digitali) e le sottoporranno alle aziende
        di cui sopra. Il percorso di laboratorio comprende workshop, check point intermedi,
        presentazioni e discussioni.


        Per la sua natura, la frequenza del corso è obbligatoria.'
      Modalità di verifica e valutazione dell'apprendimento: 'La prova finale consisterà
        nella discussione di un lavoro di gruppo. La valutazione dei singoli membri
        terrà conto della valutazione reciproca dei membri del gruppo.


        I voti vengono assegnati sulla base di una valutazione complessiva delle conoscenze,
        delle competenze, delle capacità di presentazione e di discussione degli argomenti
        trattati. Le fasce di voti corrispondenti possono essere descritte come segue:


        18-23: lo studente ha una preparazione e una capacità di analisi sufficienti,
        distribuite però su pochi argomenti trattati nel corso, il gergo complessivo
        è corretto


        24-27: lo studente dimostra una preparazione adeguata a livello tecnico con
        qualche dubbio sugli argomenti. Buone, ma non articolate, le capacità analitiche
        con l''uso di un gergo corretto.


        28-30: Ottima conoscenza della maggior parte degli argomenti trattati nel
        corso, buone capacità critiche e di analisi, buon uso del gergo specifico.


        30L: ottima e approfondita conoscenza di tutti gli argomenti del corso, eccellenti
        capacità critiche e analitiche, ottimo uso del gergo specifico'
      Strumenti a supporto della didattica: Slide, video, articoli, lezioni con ospiti,
        laboratorio e uso di software di analisi e set di dati/fonti.
      Orario di ricevimento: 'Consulta il sito web di Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli)


        Consulta il sito web di Andrea Pia (https://www.unibo.it/sitoweb/andrea.pia)'
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica Imprese innovazione
        e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/466770
    title: 2025/2026 Laboratory on Digital Transformation Technologies — University
      of Bologna
    contents:
      Learning outcomes: 'At the end of the course the student:


        - has practical experience in dealing with real management problems and solutions
        of digital innovation challenges

        - has practical experience of teamwork in the context of digital innovation
        projects

        - acquires skills in dealing with problems and training to identify the solution'
      Course contents: 'Business Idea, Business Case, Business Plan, Technologies,
        Architectures and Procedures: overview


        - The process of (digital) business design:

        - Definition and comprehension of the business challenge

        - Analysis and diagnosis of the company technologies

        - Business ideas generation based on state of the art technologies

        - Verification of the feasibility: risk assesment

        - Business idea and technology deployment

        - Presentation, discussion and Follow up

        - Digital transformation: business plan, action plan, KPI and soft skills'
      Readings/Bibliography: Slides, articles (TBA)
      Teaching methods: Goals and topics of this course are deployed through specific
        company's business challenges, workshop and teamworks. A selected number of
        companies will present their relevant business challenges and groups of students
        will work on potential (digital) solutions and will submit them to the companies
        above.The lab journey includes workshops, intermediate check points, presentations
        and discussions. Because of its nature course attendance is compulsory.
      Assessment methods: 'Team Project work. Single students vote will keep into
        account team members Peer evaluation


        Grades are assigned on the basis of an overall assessment of knowledge, skills,
        presentation and discussion skills of the topics covered. The ranges of grades
        correspond can be described as follows:


        18-23: the student has sufficient preparation and analytical skills, spread
        however, over just few topics taught in the course, the overall jargon is
        correct


        24-27: the student shows and adequate preparation at a technical level with
        some doubts over the topics. Good, yet not to articulate analytical skills
        with the use of a correct jargon


        28-30: Great knowledge about most of the topics taught in the course, good
        critical and analytical skills, good usage of the specific jargon


        30L: excellent and in depth knowledge of all the topics in the course, excellent
        critical and analytical skills, excellent usage of specific jargon'
      Teaching tools: Slides, video, articles, guest lectures, laboratory and use
        of analytics software, and data sets/sources.
      Office hours: 'See the website of Matteo Golfarelli (https://www.unibo.it/sitoweb/matteo.golfarelli/en)


        See the website of Andrea Pia (https://www.unibo.it/sitoweb/andrea.pia/en)'
      SDGs: 'Quality education Decent work and economic growth Industry, innovation
        and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
