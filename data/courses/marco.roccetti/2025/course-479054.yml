  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/479054
    title: 2025/2026 HUMAN DATA SCIENCE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il Corso propone prospettive umano-centriche
        come approccio innovativo per analizzare, valutare e comprendere modelli decisionali
        basati sul machine learning (ML). Al termine del corso, obiettivo didattico
        da perseguire è mettere il discente nella condizione di comprendere che interpretazioni
        puramente computazionali di modelli di ML potrebbero rivelarsi insufficienti
        e/o non accettate dalle persone. Viceversa, una riflessione sul ruolo e la
        qualità delle informazioni e una valorizzazione della relazione persone-dati-algoritmi
        possono portare alla realizzazione di modelli di ML più efficaci, più comprensibili
        e più accettabili sul piano umano. Sarà evidenziato, in particolare, come
        la prospettiva di una disciplina del Data Science, attenta alle esigenze delle
        persone, possa essere perseguita evitando di porre scarsa attenzione sulla
        qualità dei dati, sul significato profondo del loro uso, e sul coinvolgimento
        della componente di competenze umane.
      Contenuti: 'Human data science integra lo studio dei dati e della loro elaborazione
        automatica con il coinvolgimento degli umani per ampliare l''ecosistema di
        conoscenze a disposizione, al fine di renderlo concretamente fruibile, non
        solo in termini di collegamento tra sistemi ma anche tra le persone e le idee.
        Verrano, a questo proposito, presentati diversi casi di studio nei seguenti
        ambiti:


        - Datification/Interaction with special data (e.g., medical)

        - Predictive/Prescient intelligence

        - Data Thinking

        - Data deluge and profusion

        - Human-Machine collaboration workflow

        - Models for humans and machines - Machine/Deep learning

        - Human factors and ELSI'
      Testi/Bibliografia: Il docente renderà disponibile ad ogni lezione paper e report
        scientifici relativi all'argomento trattato
      Metodi didattici: Lezioni frontali e discussioni di progetti in classe
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame di fine corso
        mira a valutare il raggiungimento degli obbiettivi didattici prefissati e
        in particolare a misurare se studenti/studentesse possiedano gli strumenti
        concettuali e tecnici per progettare e discutere dell''efficacia di sistemi,
        alla luce del contesto definito da human data science.


        In particolare l''esame consiste in un progetto il cui svolgimento e'' il
        seguente. Durante il corso, il docente, direttamente o tramite ospiti esterni
        invitati a tenere seminari, esemplifica alcuni casi di studio, la soluzione
        dei problemi dei quali può essere perseguita alla luce degli argomenti trattati
        durante il corso.

        Gli/le studenti/studentesse scelgono uno dei casi presentati, lo analizzano,
        individuano una soluzione e dopo averne discusso con il docente e la classe
        ne propongono uno sviluppo concreto. Quando gli/le studenti/studentesse ritengono
        che la soluzione individuata sia pronta per essere valutata da parte del docente
        ha luogo un colloquio con il docente. Il colloquio ha come fine la valutazione
        della soluzione proposta. Casi di studio particolari possono essere proposti
        da studenti/studentesse, previo accordo con il docente.


        Il punteggio assegnato dipende in misura uguale da tre fattori principali:
        originalità della proposta, correttezza dell''esecuzione, adesione ai principi
        di base sviluppati durante il corso.


        Per quanto riguarda studenti/sse con DSA o disabilità temporanee o permanenti:
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile ( https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Laboratori dipartimentali
      Orario di ricevimento: Consulta il sito web di Marco Roccetti (https://www.unibo.it/sitoweb/marco.roccetti)
