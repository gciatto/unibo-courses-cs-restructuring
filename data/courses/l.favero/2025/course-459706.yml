syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/459706
    title: 2025/2026 SISTEMI DI ELABORAZIONE DELLE INFORMAZIONI SANITARIE - — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: Alla fine dell'insegnamento lo studente
        deve utilizzare sistemi informatici, software e database completi per raccogliere,
        organizzare e catalogare le informazioni sanitarie.
      Contenuti: 'I sistemi di classificazione della casistica ospedaliera


        SDO e DRG


        Introduzione ai sistemi informativi ospedalieri


        Banche dati aziendali e regionali


        Utilizzo dei dati aziendali per la valutazione delle attività


        Sistemi sovraziendali: rete SOLE e Fascicolo sanitario elettronico'
      Testi/Bibliografia: I temi trattati sono tali per cui i libri di testo relativi
        sarebbero tanti e molto estesi. Per le finalità dell'insegnamento, non è pertanto
        necessario approfondire ulteriormente gli argomenti in programma con altro
        materiale che non sia quello presentato e sempre disponibile per i discenti.
        Pertanto è sufficiente effettuare lo studio sulle sole slide presentate in
        aula.
      Metodi didattici: Lezioni in aula con successiva discussione collegiale
      Modalità di verifica e valutazione dell'apprendimento: Questionario scritto
        con 10 domande chiuse a scelta multipla. Il punteggio complessivo sarà in
        30esimi. il 30 verrà attribuito se vengono risposte correttamente tutte le
        domande. Per ogni domanda errata o lasciata in bianco verranno sottratti 2
        punti dal punteggio massimo (30/30).
      Strumenti a supporto della didattica: Slide presentate durante le lezioni
      Orario di ricevimento: Consulta il sito web di Luca Favero (https://www.unibo.it/sitoweb/l.favero)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/459706
    title: 2025/2026 Health Information Processing Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student must use comprehensive
        computer systems, software and databases to collect, organize and catalog
        health information.
      Course contents: 'Case mix classification systems


        SDO and DRG


        Introduction to hospital information systems


        Corporate and regional databases


        Use of data and database in healthcare


        healthcare Indicators


        SOLE network and electronic health record (fascicolo sanitario elettronico)'
      Readings/Bibliography: The topics covered are such that the relevant textbooks
        would be many and very extensive. For the purposes of teaching, it is therefore
        not necessary to delve further into the topics on the program with material
        other than that presented and always available to students. Therefore it is
        sufficient to carry out the study only on the slides presented in the classroom.
      Teaching methods: The topics covered are such that the relevant textbooks would
        be many and very extensive. For the purposes of teaching, it is therefore
        not necessary to delve further into the topics on the program with material
        other than that presented and always available to students. Therefore it is
        sufficient to carry out the study only on the slides presented in the classroom.
      Assessment methods: Written questionnaire with 10 multiple choice questions.
        The overall score will be in 30ths. 30 will be awarded if all questions are
        answered correctly. For each incorrect or blank question, 2 points will be
        subtracted from the maximum score (30/30).
      Teaching tools: Slides presented during the lessons
      Office hours: See the website of Luca Favero (https://www.unibo.it/sitoweb/l.favero/en)
