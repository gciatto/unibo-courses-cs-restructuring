syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/412604
    title: 2025/2026 APPLICAZIONI E SERVIZI WEB — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce principi e metodologie di progettazione di applicazioni e servizi
        Web, client-side e server-side;

        - è in grado di sviluppare siti Web basati su tecnologie Web client-side e
        server-side;

        - è in grado di sviluppare front-end basati su app e rich internet application;

        - è in grado di sviluppare back-end basati su servizi Web e workflow.'
      Contenuti: '- Confronto tra le differenti architetture e solution stack per
        il Web.

        - Browser e Server per il Web: il loro funzionamento e le tecnologie supportate.

        - Pattern MVC e MVVM per il Web.

        - Javascript e il paradigma Javascript everywhere.

        - Solution stack MEVN e sue varianti (MEAN e MERN), con introduzione di MongoDB,
        ExpressJS, NodeJS.

        - Framework Javascript: VueJS, Angular, React.

        - SuperSet di Linguaggi per il Web: TypeScript, SCSS e SASS.'
      Testi/Bibliografia: A causa della rapida evoluzione della materia, non esiste
        un libro di testo che copra tutta la disciplina. Gli studenti ricevono le
        slide proiettate a lezione e vengono di volta in volta guidati a risorse tipicamente
        gratuite e disponibili in rete per lo svolgimento del corso e l'approfondimento
        degli argomenti.
      Metodi didattici: 'Il corso consiste in:


        - lezioni frontali;

        - esercitazioni in aula informatica.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, https://corsi.unibo.it/magistrale/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute,
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame di fine corso
        mira a valutare il raggiungimento degli obiettivi didattici:


        - conoscere i concetti alla base delle applicazioni e dei servizi Web.

        - essere in grado di sviluppare siti Web basati su tecnologie Web client-side
        e server-side, utilizzando stack MEVN; con attenzione a progettazione e implementazione
        dell''interfaccia utente.


        Il voto finale del corso viene definito mediante la valutazione di elaborati
        progettati e sviluppati in gruppo (2 o 3 studenti per ogni gruppo) e la valutazione
        di una prova orale individuale.'
      Strumenti a supporto della didattica: Slide a disposizione attraverso la piattaforma
        d'Ateneo Virtuale.
      Orario di ricevimento: Consulta il sito web di Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri)
      SDGs: 'Istruzione di qualità Ridurre le disuguaglianze


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/412604
    title: 2025/2026 Web Services and Applications — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student is able to develop,
        by using advanced programming techniques: web sites based on client side and
        server side web technologies, front-ends based on apps and rich internet applications
        and back-ends based on web services, asynchronous notifications and workflows.'
      Course contents: '- Comparisons among different Web architectures and different
        solution stacks.

        - Web Browser and Web Server: how they work and the supported technologies.

        - MVC and MVVM patterns applied to the Web context.

        - JavaScript and the "JavaScript everywhere" paradigm

        - MEVN solution stack and related ones (MEAN and MERN), illustrating MongoDB,
        ExpressJS, NodeJS.

        - Javascript frameworks: VueJS, Angular, React.

        - Superset languages in the Web: TypeScript, SASS and SCSS.'
      Readings/Bibliography: Due to the rapid evolution of the topics of the course,
        there is no textbook available to cover the whole discipline. Students therefore
        access the slides of the course and are directed to online resources for the
        necessities of the course and the deepening of the topics discussed.
      Teaching methods: 'The course is structured in:


        - Lectures;

        - Exercises in lab.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode https://corsi.unibo.it/2cycle/ComputerScienceEngineering/health-and-safety-mandatory-training.'
      Assessment methods: 'The final exam aims to evaluate if the goals of the class
        have been reached:


        - to learn concepts at the basis of Web Applications and Services.

        - to be able of designing and developing web sites based on client side and
        server side web technologies, by exploiting the MEVN stack, with attention
        to the design and the development of the user interface.


        The final score is defined through the evaluation of a project work designed
        and developed in team (2 o 3 students each) and the evaluation of an individual
        oral exam.'
      Teaching tools: Slides and didactical materials will be delivered through Virtuale,
        the official Unibo e-learning platform.
      Office hours: See the website of Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri/en)
      SDGs: 'Quality education Reduced inequalities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
