  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517542
    title: 2025/2026 FONDAMENTI DI INTELLIGENZA ARTIFICIALE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine dell'insegnamento, lo studente
        conosce i concetti principali e i metodi dell'intelligenza artificiale che
        stanno alla base della risoluzione di diverse tipologie di problemi. È capace
        di modellare tali problemi e di progettare e realizzare sistemi di intelligenza
        artificiale basati sulla conoscenza, mediante l'uso di linguaggi imperativi
        e/o dichiarativi.
      Contenuti: "Il corso si propone di introdurre i principi e i metodi che\nstanno\
        \ alla base della risoluzione di problemi di Intelligenza\nArtificiale (con\
        \ particolare riferimento a sistemi basati sulla\nconoscenza e metodologie\
        \ basate sulla logica). Viene\nintrodotto uno specifico linguaggio di programmazione\
        \ logica\n(Prolog) come strumento per la realizzazione di sistemi di\nIntelligenza\
        \ Artificiale. Sono inoltre previsti alcuni seminari\ntematici sull'Intelligenza\
        \ Artificiale. Il corso e` propedeutico al\ncorso di Sistemi Intelligenti.\n\
        \nPrerequisiti: La frequentazione di questo insegnamento\nrichiede come prerequisito\
        \ una media conoscenza di un linguaggio di\nprogrammazione di alto livello,\
        \ che risulterà utile nella\ncomprensione dei numerosi casi di studio ed esempi\
        \ applicativi\nproposti durante le lezioni. Riguardo i principi e i metodi\
        \ propri\ndella disciplina invece non è richiesto alcun prerequisito\nparticolare:\
        \ lo studente verrà introdotto gradualmente alle nozioni\nbasilari dell'Intelligenza\
        \ Artificiale, senza alcuna assunzione di\nconoscenze pregresse a riguardo.\n\
        \nContenuti del corso:\n\n- Introduzione all'Intelligenza Artificiale: alcuni\
        \ cenni\n  storici, principali campi applicativi, introduzione ai sistemi\n\
        \  basati sulla conoscenza e i loro principi architetturali.\n- Risoluzione\
        \ di problemi: rappresentazione nello \"spazio degli\n  stati\", metodi di\
        \ soluzione \"forward\" e \"backward\", strategie di\n  ricerca (informate\
        \ e non). I giochi, i problemi a vincoli, ed i\n  problemi di planning.\n\
        - Rappresentazione della conoscenza: logica dei predicati del\n  primo ordine,\
        \ sistemi a regole di produzione, sistemi basati sulla\n  conoscenza. Cenni\
        \ sulle ontologie formali.\n- Linguaggi per Intelligenza Artificiale. Il Prolog:\
        \ dalla logica\n  alla programmazione logica, il linguaggio Prolog come risolutore,\n\
        \  progettazione e sviluppo di semplici programmi Prolog, cenni sui\n  meta-predicati\
        \ e i meta-interpreti."
      Testi/Bibliografia: "Un elenco esaustivo di testi da consultare e manuali è\
        \ presente sia sul sito del materiale didattico, sia sulle diapositive.\n\n\
        Sull'Intelligenza Artificiale:\n\n- S. J. Russel, P. Norvig: \"Intelligenza\
        \ Artificiale: Un\n  approccio moderno\", Pearson Prentice Hall, Volume 1,\
        \ Ultima\n  Edizione o edizioni precedenti anche in Inglese.\n\nSul linguaggio\
        \ Prolog:\n\n- L. Console, E. Lamma, P. Mello, M. Milano: \"Programmazione\n\
        \  Logica e Prolog\", Seconda Edizione UTET, 1997."
      Metodi didattici: 'Il corso viene erogato mediante proiezione in aula di diapositive.

        Il docente pubblica sul sito web del corso le diapositive

        (liberamente accessibili dagli studenti, che possono ottenerne

        copia) alcuni giorni prima di ogni lezione. Alle lezioni di carattere introduttivo
        e teorico, si alternano esercitazioni

        pratiche nonchè approfondimenti ed

        esercizi.

        Lo studente inoltre è costantemente invitato a svolgere

        esercitazioni autonome su problemi di piccola dimensione proposti

        dal docente, al fine di approfondire la propria preparazione.

        Nell''ambito del corso poi vengono tenuti alcuni seminari tematici

        di approfondimento, presentati da esperti esterni su invito del

        docente e challenges.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        si svolge sia in forma di

        autovalutazione dello studente, tramite le esercitazioni

        sistematicamente proposte durante il corso, sia al

        termine, sotto forma di prova d''esame.


        La prova d''esame consiste in una prova scritta, di durata due ore, organizzata
        come un

        insieme di esercizi e domande teoriche che possono vertere su tutti gli argomenti

        trattati nel corso. Durante lo svolgimento di

        tale prova non è concesso consultare testi, appunti o altra fonte

        di informazione.


        Maggiori dettagli saranno disponibili sulla piattaforma didattica Virtuale
        associata al corso.'
      Strumenti a supporto della didattica: 'Materiale Didattico: tutte le diapositive
        proiettate e

        discusse a lezione sono pubblicate in formato elettronico e

        consultabili mediante la piattaforma didattica:


        virtuale.unibo.it (http://virtuale.unibo.it)

        La pubblicazione e l''aggiornamento delle diapositive avviene a cura

        del docente, che provvede a rendere disponibile il materiale usato

        in aula in anticipo rispetto allo svolgersi delle lezioni.

        Un elenco esaustivo di testi di riferimento e manuali è

        consultabile sia sul sito sia sulle diapositive.

        Il sito fornisce inoltre suggerimenti per ulteriori

        approfondimenti, dispense integrative riguardo alcuni argomenti, ed

        esercizi e problemi aggiuntivi utili nella preparazione all''esame.

        Infine, sono disponibili testi e

        soluzioni di prove d''esame degli anni accademici precedenti, utili

        allo studente per raffinare e autovalutare la propria preparazione.'
      Link ad altre eventuali informazioni: https://virtuale.unibo.it
      Orario di ricevimento: Consulta il sito web di Federico Chesani (https://www.unibo.it/sitoweb/federico.chesani)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/517542
    title: 2025/2026 Foundations Of Artificial Intelligence T — University of Bologna
    contents:
      Learning outcomes: 'Introduction to main principles and methods in Artificial

        Intelligence. Artificial Intelligence based methodologies and

        techniques for solving problems with particular emphasis on

        knowledge-based systems and computational logic techniques. Desing

        and implementation of some practical systems based on procedural

        and declarative programming languages.'
      Course contents: "The course introduces the student to the principles and methods\n\
        used to solve Artificial Intelligence methods, with a particular\nattention\
        \ to knowledge-based systems and computational logic\napproaches. In particular,\
        \ the Prolog programming language is\nintroduced as a tool for implementing\
        \ Artificial Intelligence\nsystems. Moreover, seminars on specific Artificial\
        \ Intelligence\ntopics are planned. This course is preparatory for the course\
        \ of\nIntelligent Systems.\n\nPrerequisites: attending the course requires\
        \ a medium\nknowledge of a high level programming language, in order to\n\
        successfully understand case studies and applications presented\nduring the\
        \ lessons. Regarding the course contents, no prerequisites\nare required:\
        \ the student will be gradually introduced to the\nfundamental notions of\
        \ the Artificial Intelligence, and no\nassumption about previous knowledge\
        \ is made.\n\nContents:\n\n- Introduction to Artificial Intelligence: brief\
        \ history of AI,\n  main application fields, introduction to knowledge-based\
        \ systems\n  and architectural organization.\n- Problem solving in AI: representation\
        \ through the notion of\n  state, forward e backward reasoning, solving as\
        \ a search and search\n  strategies (informed and non). Games, constraint\
        \ satisfaction\n  problems, and planning problems.\n- Knowledge Representation:\
        \ First Order\n  Predicate Logic, Production Rules Systems, Knowledge-based\
        \ systems,\n  Some hints about formal ontologies.\n- Languages for Artficial\
        \ Intelligence. Prolog: from logic to\n  logic programming, Prolog programs\
        \ as solvers, desing and\n  development of simple Prolog programs, few notes\
        \ about\n  meta-predicates and meta-interpreters."
      Readings/Bibliography: "A comprehensive list of textbooks to consult is available\
        \ on the Web site, and\nit is reported also in the course slides. When available,\
        \ the\nenglish versions of these textbooks are recommended:\n\nAbout Artificial\
        \ Intelligence:\n\n- S. J. Russel, P. Norvig: \"Artificail Intelligence: A\
        \ modern\n  approach\", Prentice Hall, Last or previous editions.\n\nAbout\
        \ Prolog:\n\n- L. Console, E. Lamma, P. Mello, M. Milano: \"Programmazione\n\
        \  Logica e Prolog\", Seconda Edizione UTET, 1997."
      Teaching methods: 'Slides projected during the lessons are used as a support
        by the

        teacher. The teacher takes care to made them available on the web

        sites few days before each lesson. Classroom lessons are

        interleaved by some practical activities in the laboratories of the

        Engineering School.

        Autonomous lab activities are welcome and promoted by suggesting

        ideas and possible test projects.

        As part of the course, the teacher organizes also some seminars, challenges
        and

        invited lectures.'
      Assessment methods: 'The achievement of the learning goals is verified by the
        student

        itself, by means of the exercises proposed during the labs, and at

        the end of the course, by means of a final exam.


        The final exam consists of a written test, of duration of two hours, organized
        as a set of

        exercises and open questions selected from all the topics presented in the

        course. During the written test it is strictly forbidden

        to consult textbooks, personal notes or any other external

        source.


        More details will be provided in the material published on the Virtuale platform
        related to the Course.'
      Teaching tools: 'Teaching materials: all the slides used during the

        lessons are available in electronic format and can be

        accessed/downloaded at the course web site:


        http://virtuale.unibo.it/ (http://virtuale.unibo.it)

        The teacher takes care to publish and update the slides, and to

        make them available few days before each lesson.

        A comprehensive list of text books and manuals is available on the

        course web site, and is reported on the course slides as

        well.

        Suggestions for further readings, slides and notes about additional

        topics, and exercises are made available through the web site.

        Moreover, the texts of all the final exams of previous years are

        available, and the students are encouraged to use them to improve

        their preparation.'
      Links to further information: https://virtuale.unibo.it
      Office hours: See the website of Federico Chesani (https://www.unibo.it/sitoweb/federico.chesani/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
