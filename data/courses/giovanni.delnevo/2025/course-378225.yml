syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/378225
    title: 2025/2026 TECNOLOGIE WEB — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        competenze di base sullo sviluppo di siti web tramite tecnologie web client
        side e server side e sulla rappresentazione di documenti tramite markup e
        fogli di stile.
      Contenuti: '- Fondamenti: HTTP, MIME, codifiche caratteri, markup.

        - Tecnologie base del web: URI, HTML5, CSS3, JSON.

        - Tecnologie server-side per la realizzazione di applicazioni web, in particolare
        PHP.

        - Tecnologie client-side per la realizzazione di applicazioni web: in particolare
        Javascript.

        - Tecniche HCI, User eXperience (UX), accessibilità e usabilità del Web.'
      Testi/Bibliografia: Le slide delle lezioni e delle esercitazioni, così come
        eventuale materiale didattico aggiuntivo saranno rese disponibili su Virtuale.
      Metodi didattici: 'Lezioni frontali ed esercitazioni in laboratorio informatico.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute,
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame di fine corso
        mira a valutare il raggiungimento dell''obiettivo didattico:


        - acquisire competenze di base sullo sviluppo di siti web tramite tecnologie
        web client side e server side e sulla rappresentazione di documenti tramite
        markup e fogli di stile.


        Il voto finale del corso viene definito mediante la valutazione di:


        - un elaborato di gruppo (2 o 3 studenti per ogni gruppo), che concorre al
        40% del voto finale. La prova si intende superata con l''ottenimento di una
        valutazione di almeno 18/30. L''elaborato deve essere discusso alla presenza
        di tutti i membri del gruppo, obbligatoriamente prima di presentarsi alla
        prova individuale; è necessario condividere con i docenti il repo dell''elaborato
        con il codice sviluppato alcuni giorni prima della prova di discussione, come
        sarà indicato di volta in volta su Virtuale.

        - una prova pratica individuale (svolta in laboratorio), che concorre al 60%
        del voto finale. La prova si basa sull''implementazione di codice HTML, CSS,
        Javascript e prevede anche la risposta ad una domanda di teoria. La prova
        si svolge in laboratorio ed ha una durata di 2 ore. Durante la prova è consentito
        l''accesso ad alcune risorse online, come indicato nel testo del compito.
        Per superare la prova è necessario ottenere una valutazione di almeno 16/30.
        Questa prova può essere sostenuta solo dopo aver consegnato e discusso l''elaborato.


        Per poter partecipare alle prove è necessario effettuare l''iscrizione su
        AlmaEsami.


        Le prove intermedie valgono un anno (365 giorni) dal conseguimento, nel caso
        in cui sia trascorso oltre un anno queste non avranno più validità e dovranno
        essere sostenute nuovamente.


        Il voto finale può essere rifiutato una sola volta.'
      Strumenti a supporto della didattica: Le slide delle lezioni e delle esercitazioni,
        così come eventuale materiale didattico aggiuntivo saranno rese disponibili
        su Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri)


        Consulta il sito web di Giovanni Delnevo (https://www.unibo.it/sitoweb/giovanni.delnevo)'
      SDGs: 'Istruzione di qualità Ridurre le disuguaglianze


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/378225
    title: 2025/2026 Web-related Technologies — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student has acquired basic notions
        about web sites development via client side and server side technologies and
        on representation of documents via markup and style sheets.
      Course contents: '- Fundamentals: HTTP, MIME, character encodings, markup.

        - Basic web Technologies: URI, HTML5, CSS3, JSON.

        - Server-side technologies for web applications, in particular PHP.

        - Client-side technologies for web applications, in particular Javascript.

        - HCI techniques, User eXperience (UX), Web accessibility and usability.'
      Readings/Bibliography: Slides and additional on-line resources will be made
        available on Virtuale.
      Teaching methods: 'Lectures and laboratory activities.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode https://corsi.unibo.it/laurea/IngegneriaScienzeInformatiche/formazione-obbligatoria-su-sicurezza-e-salute.'
      Assessment methods: 'The final exam aims to evaluate if the goals of the class
        have been reached:


        - to acquire skills and competences on the deveolopment by means of client
        side and server side technologies, and on the representation of documents
        by means of markup languages and style sheets.


        The final score is defined through the evaluation of a project work designed
        and developed in team (2 o 3 students each) and the evaluation of an individual
        written exam.


        The final grade for the course is determined based on the evaluation of:


        - A group project (2 or 3 students per group), which accounts for 40% of the
        final grade. The project is considered passed if the evaluation is at least
        18/30. The project must be presented and discussed in the presence of all
        group members, before taking the individual test. The project repository with
        the developed code must be shared with the instructors a few days before the
        discussion, as specified from time to time on Virtuale.

        - An individual practical exam (conducted in the lab), which accounts for
        60% of the final grade. The test involves coding in HTML, CSS, and JavaScript,
        and also includes one theoretical question. The test takes place in a lab
        and lasts 2 hours. Access to certain online resources is permitted during
        the exam, as specified in the exam instructions. A minimum score of 16/30
        is required to pass. This exam can only be taken after submitting and discussing
        the group project.


        Registration on AlmaEsami is required to take part in both assessments.


        Intermediate results are valid for one year (365 days) from the date of achievement.
        After this period, the assessments will expire and must be retaken.


        The final grade can be declined only once.'
      Teaching tools: Slides and additional on-line resources will be made available
        on Virtuale.
      Office hours: 'See the website of Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri/en)


        See the website of Giovanni Delnevo (https://www.unibo.it/sitoweb/giovanni.delnevo/en)'
      SDGs: 'Quality education Reduced inequalities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
