syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498820
    title: 2025/2026 FONDAMENTI DI SISTEMI WEB — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        gli standard alla base del World Wide Web e i linguaggi di scripting client
        side. È in grado di progettare e sviluppare applicazioni Web utilizzando linguaggi
        di markup e fogli di stile e script lato client.
      Contenuti: 'Questo corso presenta gli standard alla base del Web, le principali
        concetti e principi per la progettazione e l''implementazione di applicazioni
        Web-based e le principali tecnologie per lo sviluppo di applicazioni client-side.


        In particolare, il corso introduce i seguenti argomenti:


        - Fondamenti e standard alla base del Web: HTTP, URI, codifiche di caratteri,
        ipertesti e markup.

        - Tecnologie Standard del Web: HTML5, CSS3, JSON.

        - Linguaggi di scripting client-side per la realizzazione di applicazioni
        Web-based, in particolare Javascript.

        - Introduzione ai Framework client-side basati su Javascript, in particolare
        VueJS.

        - Metodologie HCI (Human-Computer Interaction), User eXperience (UX), accessibilità
        e usabilità del Web.'
      Testi/Bibliografia: Le slide e il materiale didattico aggiuntivo saranno resi
        disponibili su Virtuale.
      Metodi didattici: 'Lezioni frontali ed esercitazioni in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute,
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame di fine corso
        mira a valutare il raggiungimento degli obiettivi didattici:


        - conoscere gli standard alla base del World Wide Web e i linguaggi di scripting
        client side;

        - essere in grado di progettare e sviluppare applicazioni Web utilizzando
        linguaggi di markup e fogli di stile e script lato client.


        Il voto finale del corso viene definito mediante la valutazione di elaborati
        progettati e sviluppati in gruppo (2 studenti per ogni gruppo) e la valutazione
        di una prova orale individuale.'
      Strumenti a supporto della didattica: Le slide e il materiale didattico aggiuntivo
        saranno resi disponibili su Virtuale.
      Orario di ricevimento: 'Consulta il sito web di Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri)


        Consulta il sito web di Giovanni Delnevo (https://www.unibo.it/sitoweb/giovanni.delnevo)'
      SDGs: 'Istruzione di qualità Ridurre le disuguaglianze


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498820
    title: 2025/2026 Foundations of Web Systems — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student knows the main Web
        standards and the client-side scripting languages. The student can design
        and develop Web applications, by using markup languages, stylesheets and client-side
        scripts.
      Course contents: 'This class presents the standards at the basis of the Web,
        the main concepts and principles driving the design and the implementation
        of Web-based applications, and the main technologies supporting the develoment
        of client-side Web applications.


        In particular, the class introduces the following topics:


        - Foundations and standards at the basis of the Web: HTTP, URI, charsets and
        character encoding, hypertexts and markup.

        - Web Standards technologies: HTML5, CSS3, JSON.

        - Client-side scripting languages for the development of Web-based applications,
        with specific regards to Javascript.

        - Introduction to the Javascript client-side frameworks, with specific regards
        to VueJS.

        - HCI (Human-Computer Interaction) methodologies, User eXperience (UX), Web
        accessibility and Web usability.'
      Readings/Bibliography: Slides and additional on-line resources will be made
        available on Virtuale.
      Teaching methods: 'Lectures and laboratory activities.


        Due to the type of activity and the teaching methods adopted, the attendance
        of this training activity requires the preventive participation of all students
        in the training modules 1 and 2 on safety in the study places, in e-learning
        mode https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute.'
      Assessment methods: 'The final exam aims to evaluate if the goals of the class
        have been reached:


        - to learn the standards at the basis of the World Wide Web and the client
        side scripting languages;

        - to be able of designing and developing web applications based on markupe
        languages, style sheets, and client side scripts.


        The final score is defined through the evaluation of a project work designed
        and developed in team (2 students each) and the evaluation of an individual
        oral exam.'
      Teaching tools: Slides and additional on-line resources will be made available
        on Virtuale.
      Office hours: 'See the website of Silvia Mirri (https://www.unibo.it/sitoweb/silvia.mirri/en)


        See the website of Giovanni Delnevo (https://www.unibo.it/sitoweb/giovanni.delnevo/en)'
      SDGs: 'Quality education Reduced inequalities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
