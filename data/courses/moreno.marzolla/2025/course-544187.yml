  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/544187
    title: 2025/2026 CALCOLO PARALLELO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        le principali architetture dei sistemi di calcolo ad alte prestazioni; è in
        grado di progettare e analizzare algoritmi paralleli per diversi modelli di
        calcolo; è in grado di implementare algoritmi paralleli su architetture a
        memoria condivisa e distribuita utilizzando i linguaggi, gli strumenti e le
        tecnologie appropriate.
      Contenuti: 'Programma


        - Algoritmi paralleli e modelli di calcolo

        - Introduzione alle architetture per il calcolo parallelo: tassonomia di Flynn;
        sistemi a memoria condivisa e distribuita; GPGPU

        - Pattern per la programmazione parallela (embarassingly parallel; stencil;
        work farm; scan; reduce)

        - Programmazione parallela su architetture a memoria condivisa con OpenMP

        - Programmazione parallela su architetture a memoria distribuita con MPI

        - Programmazione GPGPU

        - Valutazione delle prestazioni di programmi paralleli: misurazione e comprensione
        di speedup ed efficienza.


        Prerequisiti


        Questo insegnamento assume i prerequisiti seguenti:


        - Buona conoscenza di programmazione in linguaggio C.

        - Buona conoscenza dell''ambiente Unix/Linux (uso della shell, uso di Makefile,
        ecc.).

        - Conoscenze di base delle architetture dei calcolatori.'
      Testi/Bibliografia: "Argomenti selezionati dai seguenti volumi:\n\n- Joseph\
        \ Jaja, An Introduction to Parallel Algorithms, ‎Addison-Wesley, 1st edition,\
        \ 1992, ISBN 978-0201548563.\n- Peter Pacheco and Matthew Malensek, An Introduction\
        \ to Parallel Programming, Morgan Kauìffman, 2nd edition, 2021, ISBN 9780128046050;\
        \ va bene anche la prima edizione:\n  Peter Pacheco, An Introduction to Parallel\
        \ Programming, Morgan Kaufmann, 2011, ISBN 978-0123742605.\n- Jason Sanders,\
        \ Edward Kandrot, CUDA by Example: An Introduction to General-Purpose GPU\
        \ Programming [https://developer.nvidia.com/cuda-example], Addison-Wesley,\
        \ 2010, ISBN 978-0131387683.\n- Georg Hager, Gerhard Wellein, Introduction\
        \ to High Performance Computing for Scientists and Engineers, CRC Press; 1\
        \ edition (July 2, 2010), ISBN 978-1439811924.\n  Ulteriore materiale (inclusi\
        \ i lucidi delle lezioni e il materiale di laboratorio) verrà reso disponibile\
        \ sul sito del corso."
      Metodi didattici: 'Durante le lezioni vengono introdotti i concetti base della
        programmazione parallela, e vengono via via descritti i costrutti di programmazione
        parallela che sono poi oggetto di esercitazioni parzialmente guidate (in modalità
        BYOD-Bring Your Own Device) con la supervisione del docente. Vengono rese
        disponibili le soluzioni degli esercizi proposti in laboratorio allo scopo
        di supportare le attività di studio individuale.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning https://elearning-sicurezza.unibo.it/ .'
      Modalità di verifica e valutazione dell'apprendimento: 'Le conoscenze acquisite
        durante il corso verranno valutate mediante una prova scritta e un progetto
        di programmazione. Le due prove sono indipendenti e possono essere sostenute
        in qualsiasi ordine.


        La prova scritta si compone di alcune domande a quiz e/o a risposta aperta,
        riguardanti gli aspetti metodologici visti a lezione. La prova scritta viene
        valutata in trentesimi; il punteggio massimo assegnato a ciascuna risposta
        corretta è indicato a fianco della domanda.


        Il progetto di programmazione consiste nella realizzazione di una applicazione
        parallela su specifiche indicate dal docente, usando gli strumenti visti a
        lezione e in laboratorio. Il programma parallelo deve essere accompagnato
        da una relazione scritta. Nella valutazione del progetto si terrà conto della
        correttezza dell''implementazione, della chiarezza ed efficienza del codice,
        nonché della qualità della relazione. Il progetto viene valutato in trentesimi.


        L''esame si intende superato se si riporta una valutazione maggiore o uguale
        a 18/30 su ognuna delle due prove. Il voto finale si ottiene come media pesata
        del voto della prova scritta (peso 0.6) e del progetto (peso 0.4). La lode
        viene assegnata a discrezione del docente per prove d''esame di qualità particolarmente
        elevata.'
      Strumenti a supporto della didattica: 'Lezioni: proiezione di diapositive e
        dimostrazioni pratiche di programmazione parallela al calcolatore, integrate
        con ulteriori spiegazioni alla lavagna. Il materiale viene reso disponibile
        prima dell''inizio della lezione stessa.


        Attività pratiche: le esercitazioni pratiche verranno svolte in ambiente Linux
        usando gli strumenti di sviluppo disponibili. Agli studenti verrà fornito
        accesso ad un server, accessibile anche da remoto. Tutti gli strumenti utilizzati
        sono liberamente disponibili, allo scopo di favorire l''attività di studio
        individuale su proprie risorse hardware, se disponibili.'
      Link ad altre eventuali informazioni: https://www.moreno.marzolla.name/teaching/CP/
      Orario di ricevimento: Consulta il sito web di Moreno Marzolla (https://www.unibo.it/sitoweb/moreno.marzolla)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/544187
    title: 2025/2026 Parallel Calculus — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, students know the main high performance

        computing architectures; can design and analyze parallel algorithms for

        different models of parallel computation; can implement parallel

        algorithms on shared and distributed memory architectures using the most

        suitable languages, tools and technologies'
      Course contents: 'Syllabus


        - Parallel algorithms and parallel models of computation.

        - Introduction to HPC architectures: Flynn taxonomy, shared memory and distributed
        memory architectures; GPGPU

        - Parallel programming patterns (embarassingly parallel; stencil; work farm;
        scan; reduce)

        - Programming shared-memory architectures with C/OpenMP

        - Programming distributed-memory architectures with C/MPI

        - GPGPU programming

        - Brief introduction to SIMD programming using compiler intrinsics or auto-vectorization
        (GCC compiler)

        - Performance evaluation of parallel programs: measuring and understanding
        speedup and efficiency


        Prerequisites


        This course assumes the following prerequisites:


        - Programming in C.

        - Knowledge of the Unix/Linux environment (how to use the shell, how to write
        a basic Makefile, ecc.).

        - Basic knowledge of computer architectures.'
      Readings/Bibliography: "Selected parts from the following textbooks:\n\n- Joseph\
        \ Jaja, An Introduction to Parallel Algorithms, ‎Addison-Wesley, 1st edition,\
        \ 1992, ISBN 978-0201548563.\n- Peter Pacheco and Matthew Malensek, An Introduction\
        \ to Parallel Programming, Morgan Kauìffman, 2nd edition, 2021, ISBN 9780128046050;\
        \ the first edition is fine, too: Peter Pacheco, An Introduction to Parallel\
        \ Programming, Morgan Kaufmann, 2011, ISBN 978-0123742605\n- Jason Sanders,\
        \ Edward Kandrot, CUDA by Example: An Introduction to General-Purpose GPU\
        \ Programming [https://developer.nvidia.com/cuda-example], Addison-Wesley,\
        \ 2010, ISBN 978-0131387683\n- Georg Hager, Gerhard Wellein, Introduction\
        \ to High Performance Computing for Scientists and Engineers, CRC Press; 1\
        \ edition (July 2, 2010), ISBN 978-1439811924\n  Additional teaching material\
        \ (including lecture slides and programming exercises) will be made available\
        \ on the course web site."
      Teaching methods: 'The lectures introduce the foundations of parallel programming
        and several parallel programming costructs. Then, the same concepts are applied
        during practice sessions (BYOD-Bring Your Own Device) through a set of small
        programming assignments under the supervision of the instructor. Solutions
        are provided after the lab sessions, order to support self-study.


        Due to the the type of activity and teaching methods adopted, participation
        to this course requires that students attend the training modules 1 and 2
        on safety in the study places, through the e-learning platform https://elearning-sicurezza.unibo.it/
        .'
      Assessment methods: 'Written exam and programming project. The two parts are
        independent and can be given in any order.


        The written exam consists of a few questions on the topics addressed during
        the lectures. The exam is closed-book and consists of open questions and/or
        multiple-choice quizzes. The maximum number of points granted by each correct
        answer is indicated in the exam sheet.


        The programming project requires the implementation of a parallel program
        according to the specifications provided by the instructor; the programming
        project also requires the preparation of a written report. The project evaluation
        will consider the clarity, correctness and efficiency of the submitted program,
        and the quality of the accompanying report.


        The exam is passed with a grade equal to or greater than 18 on both the written
        and programming assignment. The final grade is computed as the weighted average
        of the grades of the written part (weight 0.6) and the programming assignment
        (weight 0.4). Honors ("lode") will be awarded by the instructor to exams of
        outstanding quality.'
      Teaching tools: 'Lectures: slides and practical programming demos will often
        be used, integrated with exercises and Q&A sessions at the whiteboard.


        Practice: all programming activities will use the development tools provided
        by the Linux environment. Students will be given access to a compute server.
        All tools are freely available, in order to support self-study activities
        on own hardware, if available.'
      Links to further information: https://www.moreno.marzolla.name/teaching/CP/
      Office hours: See the website of Moreno Marzolla (https://www.unibo.it/sitoweb/moreno.marzolla/en)
