  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518535
    title: 2025/2026 USABILITY &amp;  USER EXPERIENCE DESIGN — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente è in grado
        di progettare, implementare e valutare sistemi software interattivi relativamente
        alle caratteristiche di praticità, esperienza, affettività, significato e
        valore che essi possono avere sull'utenza a cui sono destinati. Aspetti come
        facilità d'uso, utilità ed efficienza sono determinanti per una caratterizzazione
        positiva della esperienza d'uso di un artefatto. Lo studente saprà focalizzare
        l'analisi funzionale del software sulle caratteristiche e le esigenze del
        target di utenza, saprà dirigere il processo di sviluppo in modo da garantire
        un costante collegamento tra le esigenze tecniche ed implementative e le aspettative
        dell'utenza, e saprà verificare quanto e rispetto a quali metriche un software
        soddisfi o meno queste aspettative.
      Contenuti: 'Il corso verrà tenuto perlopiù in inglese. L''esame verrà erogato
        sia in italiano sia in inglese. Il programma è diviso in parti distinte:


        1. Background: L''evoluzione della disciplina da Human Computer Interaction
        a User Experience Design. Una descrizione dell''ambito di operazione della
        disciplina: la persona, il computer, l''interazione tra i due.

        2. La analisi e la progettazione dell''usabilità: Una illustrazione delle
        tecniche e degli standard per la gestione di un processo di progettazione
        software attento alla user experience, con particolare attenzione alle fasi
        di analisi dell''usabilità del sistema (con e senza la partecipazione di utenti),
        e di progettazione basata sugli utenti e sui goal degli utenti.

        3. Linee guida, pattern e metodi per la progettazione della user experience:
        Una discussione, anche storica, dei principi di fondo su cui si basa la concreta
        progettazione di software in cui l''usabilità ha un ruolo importante. Si farà
        anche particolare attenzione al problema dell''usabilità sul web e dei sistemi
        mobili.

        4. Applicazioni dello User Experience Design a sistemi complessi (ad esempio
        sistemi di Intelligenza Artificiale): breve modulo riservato agli studenti
        della magistrale in Artificial Intelligence e facoltativo per gli altri.


        Gli studenti con disturbi specifici dell’apprendimento (DSA) o disabilità
        temporanee/permanenti sono invitati a contattare tempestivamente l’ufficio
        di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ) e concordare con il docente le strategie più efficaci per seguire le lezioni
        e prepararsi all’esame.'
      Testi/Bibliografia: 'Parti del corso sono basate su:


        - Interazione uomo-macchina, Alan Dix, Janet Finlay, Gregory D. Abowd, Russell
        Beale. McGraw Hill ISBN: 978-8838672194

        - La caffettiera del masochista. Il design degli oggetti quotidiani , Donald
        A. Norman, Giunti Ed. ISBN: 978-8809785038

        - Elements of User Experience,The: User-Centered Design for the Web and Beyond,
        2nd Edition, Jesse James Garrett, New Riders, 2011, ISBN: 978-0321683687'
      Metodi didattici: Il corso verrà tenuto perlopiù in inglese. Il corso è basato
        sulla frequenza a lezioni frontali e la realizzazione di piccoli progetti
        (in gruppo o individuali), come l'analisi dell'usabilità di un'applicazione
        esistente e la progettazione o riprogettazione di un servizio informatico.
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica è basata
        sulla valutazione di progetti da realizzare individualmente o in gruppi di
        2-3 e di un test scritto a fine corso. Gli studenti stranieri possono, se
        lo desiderano, chiedere al docente un progetto personalizzato per i loro interessi
        e le loro esigenze.


        Il voto è espresso in trentesimi.


        Gli studenti con disturbi specifici dell’apprendimento (DSA) o disabilità
        temporanee/permanenti sono invitati a contattare preventivamente l’ufficio
        di Ateneo competente (https://site.unibo.it/studenti-con-disabilita-e-dsa/it
        ). L’ufficio sarà responsabile della proposta di adattamenti per gli studenti
        interessati. Tali adattamenti dovranno essere sottoposti all’approvazione
        del docente almeno 15 giorni prima dell’appello d’esame. Il docente valuterà
        inoltre la coerenza degli adattamenti con gli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: Il sito web del corso virtuale.unibo.it
        (https://virtuale.unibo.it) riporta slide, discussioni e tool per lo svolgimento
        del programma.
      Orario di ricevimento: Consulta il sito web di Fabio Vitali (https://www.unibo.it/sitoweb/fabio.vitali)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518535
    title: 2025/2026 Usability &amp; User Experience Design — University of Bologna
    contents:
      Learning outcomes: At the end of the course the student is able to design, implement
        and evaluate software systems with respect to the dimensions of practicality,
        experience, affection, meaning and value that they may have on the target
        audience. Characteristics such as ease of use, usefulness and efficiency are
        fundamental for the positive evaluation of the user experience of the system.
        The student will be able to focus the functional analysis of the software
        on the characteristics and needs of the target audience, will be able to drive
        the development process so as to guarantee a constant connection between the
        technical and implementation features and the expectation of the audience,
        and will be able to evaluate whether and according to which metrics a software
        satisfies these expectations.
      Course contents: 'Teaching will be mostly in English (some explanations will
        be repeated in Italian if needed and when asked). The exam will be allowed
        in both Italian and English. The course content is divided in distinct parts:


        1. Background: The evolution of the discipline from Human Computer Interaction
        to User Experience Design. A description of its scope: the human, the computer,
        and their interaction.

        2. Usability analysis and design: A systematic discussion of the techniques
        and standards for the management of the process of user experience design,
        with particular attention to the phases of usability analysis (with and without
        the participation of users) and the user- and goal-oriented usability design
        methodologies.

        3. Guidelines, patterns and methods for usability design: A discussion, with
        historical aspects, of the framework on which the concrete aspects of usability
        design is based. we will also give strong attention to the problem of usability
        for web applications and mobile apps.

        4. Applications of User Experience Design to complex systems (e.g. AI Systems):
        short module reserved to students in Artificial Intelligence, optional for
        the other students.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office ( https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) immediately and agree with the teacher the most effective strategies for
        attending the lectures and preparing for the exam.'
      Readings/Bibliography: 'Parts of the course are based on:


        - Human Computer Interaction, Alan Dix, Janet E. Finlay, Gregory D. Abowd,
        Russell Beale. Prentice Hall; ISBN: 978-0132390484

        - The Design of Everyday Things , Donald A. Norman, MIT Print, January 2014,
        ISBN: 978-0262525671

        - Elements of User Experience,The: User-Centered Design for the Web and Beyond,
        2nd Edition, Jesse James Garrett, New Riders, 2011, ISBN: 978-0321683687'
      Teaching methods: Teaching will be mostly in English. The course is centered
        around on the attendance to face-to-face classes and the implementation (in
        group or individually) of a few small projects, such as the usability analysis
        of an existing application and the design or redesign of a computer-based
        service.
      Assessment methods: 'The assessment is based on the evaluation of a project
        to be carried out individually or in a team of 2-3 people plus a written test
        at the end of the course. Foreign students may want to approach the teacher
        and agree on a project customized to their needs and interests.


        The final score is in the range 0 to 30.


        Students with specific learning disorders (SLD) or temporary/permanent disabilities
        should contact the appropriate University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/en
        ) in advance. The office will be responsible for proposing adaptations to
        interested students. Such adaptations must be submitted to the teacher for
        approval at least 15 days before the exam session. The teacher will also evaluate
        the adaptations regarding the training objectives of teaching.'
      Teaching tools: The web site of the course virtuale.unibo.it (http://virtuale.unibo.it/)
        contains slides, discussions and tools for the successful completion of the
        programme
      Office hours: See the website of Fabio Vitali (https://www.unibo.it/sitoweb/fabio.vitali/en)
