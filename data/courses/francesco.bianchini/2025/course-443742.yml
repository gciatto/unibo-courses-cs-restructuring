  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/443742
    title: 2025/2026 INTELLIGENZA ARTIFICIALE (1) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente acquisisce
        i fondamenti di storia, tecniche e metodi dell’intelligenza artificiale; ha
        la capacità di progettare soluzioni per semplici casi d’uso (per esempio in
        domini umanistici) definendo modelli concettuali e/o riusando dati e componenti
        software esistenti.
      Contenuti: 'Il corso affronta gli aspetti principali dell''intelligenza artificiale,
        partendo da un punto di vista storico-teorico per arrivare a questioni tecniche
        e specialistiche degli sviluppi contemporanei della disciplina. Saranno trattate
        anche tematiche connesse alla epistemologia dell’intelligenza artificiale
        e delle scienze cognitive.


        Il corso è un corso base e non richiede particolari conoscenze o abilità pregresse.


        Saranno affrontate questioni relative al problem solving, alla rappresentazione
        della conoscenza e ai concetti, all''apprendimento automatico, alla pianificazione,
        all''elaborazione del linguaggio naturale, alle reti neurali, all''interazione
        uomo-macchina, nonché alle loro implicazioni per la robotica più recente.
        A scopo introduttivo si affronteranno la nascita e gli sviluppi dell''intelligenza
        artificiale, della scienza cognitiva classica e della nuova scienza cognitiva,
        e della robotica. Verranno affrontate anche questioni filosofiche, epistemologiche
        ed etiche relative ai differenti approcci all''intelligenza artificiale e
        alle scienze cognitive.


        Il corso è diviso temporalmente in quattro parti:


        1. La nascita e gli sviluppi dell’intelligenza artificiale.

        2. Problem solving e pianificazione automatica.

        3. Rappresentazione della conoscenza, reti neurali e sviluppi recenti dell’intelligenza
        artificiale.

        4. Questioni epistemologiche ed etiche dell’intelligenza artificiale, della
        scienza cognitiva e della robotica.'
      Testi/Bibliografia: 'Letture obbligatorie


        - M. Giunti , S. Pinna, F. G. Garavaglia, Menti e macchine. Teorie filosofiche
        e scientifiche, Le Monnier Università, Milano, 2022.

        - S. Russell, P. Norvig, Intelligenza artificiale. Un approccio moderno, Pearson-Italia,
        Milano-Torino, quarta edizione, 2021 (volume 1: capitoli 1, 2, 3, 4, 7, 8,
        9, 10, 11; volume 2. capitoli 26, 27, 28).


        Letture suggerite:


        - D. Andler, Il duplice enigma. Intelligenza artificiale e intelligenza umana,
        Einaudi, Torino, 2024.

        - N. Bostrom, Superintelligenza. Tendenze, pericoli, strategie, Bollati Boringhieri,
        Torino, 2018.

        - M. Marraffa, Percezione, pensiero, coscienza. Passato e futuro delle scienze
        della mente, Rosenberg & Sellier, Torino, 2019.

        - M. Mitchell, L''intelligenza artificiale. Una guida per esseri umani pensanti,
        Einaudi, Torino, 2022.

        - G. Primiero, On the Foundations of Computing, Oxford University Press, Oxford,
        2020.

        - G. Tamburrini, Etica delle macchine. Dilemmi morali per robotica e intelligenza
        artificiale, Carocci, Roma, 2020.


        Ulteriore materiale bibliografico sarà segnalato nel corso delle lezioni.


        Le studentesse e gli studenti non frequentanti sono tenute/i a portare un
        testo in più a scelta fra le letture suggerite.'
      Metodi didattici: 'Le lezioni saranno in presenza e saranno lezioni frontali,
        discussioni sugli argomenti principali o analisi di contenuti, anche autoprodotti,
        con l''ausilio di tecnologie digitali.


        Sarà possibile, per le studentesse e gli studenti interessate/i, fare una
        breve presentazione individuale o di gruppo su un argomento concordato col
        docente.'
      Modalità di verifica e valutazione dell'apprendimento: 'La valutazione avverrà
        attraverso una prova orale nella quale verranno discussi sia argomenti generali
        relative all''intelligenza artificiale, sia questioni più specifiche relative
        ai vari campi coinvolti in questo ambito disciplinare. In particolare, saranno
        valutate sia le conoscenze apprese sia la capacità di rielabolarle e di condurre
        ragionamenti autonomi su temi specifici, nonché di produrre riflessioni personali
        a partire dai contenuti affrontati durante il corso. Si potrà richiedere,
        dove possibile, anche l’applicazione dei concetti principali della materia
        in semplici esercitazioni.


        In particolare, saranno valutate in ordine crescente di importanza:


        1. la completezza delle conoscenze acquisite strettamente in merito al programma;

        2. l''appropriatezza del linguaggio;

        3. la capacità personale di rielaborazione e di utilizzo dei concetti appresi;

        4. la capacità di impostare una riflessione interdisciplinare;

        5. la capacità di applicare a singoli casi di ricerca le tematiche apprese
        e di produrre riflessioni autonome e originali.


        1. e 2) costituiscono obiettivi minimi per la sufficienza (18-22).


        Attraverso 3) si arriverà a una valutazione discreta, tanto più quanto meno
        mnemoniche saranno le conoscenze apprese dallo studente (23-26).


        4) potrà portare a una valutazione buona o ottima (27-29).


        5) potrà portare a una valutazione eccellente (30 o 30 e lode).


        Appelli d''esame

        Nel corso dell’a.a. 2025/2026 sono previsti appelli nei seguenti mesi: un
        appello ogni mese escluso agosto.Persone con disabilità e DSALe persone con
        disabilità o disturbi specifici dell’apprendimento hanno diritto a speciali
        adattamenti in relazione alla loro condizione, previa valutazione del Servizio
        d’ateneo per le studentesse e gli studenti con disabilità e DSA. Si prega
        di non rivolgersi al/la docente, ma di contattare il Servizio per un appuntamento.
        Sarà cura del Servizio stabilire quali adattamenti si rendono opportuni. Maggiori
        informazioni alla pagina http://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        . Si raccomanda di contattare per tempo l’ufficio di Ateneo. Gli eventuali
        adattamenti, che dovranno comunque essere sottoposti, con un anticipo di 15
        giorni, all’approvazione del/della docente, che ne valuterà l''opportunità
        anche in relazione agli obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Slide e altri materiali e strumenti digitali
        saranno utilizzati nel corso delle lezioni.
      Orario di ricevimento: Consulta il sito web di Francesco Bianchini (https://www.unibo.it/sitoweb/francesco.bianchini)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Partnership
        per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/443742
    title: 2025/2026 Artificial intelligence (1) — University of Bologna
    contents:
      Learning outcomes: At the end of the course students gain a basic knowledge
        of the history, techniques and methods of Artificial Intelligence; they are
        able to design solutions for simple use cases (typically in the area of the
        humanities) by defining conceptual models and/or reusing existing data and
        software components.
      Course contents: 'The course deals with the main topics of artificial intelligence,
        starting from a historical and theoretical point of view up to present-day
        applied and technical issues of the discipline. Issues concerning the epistemology
        of artificial intelligence and cognitive science are topics of the course
        as well.


        This is a basic course and does not require previous knowledge of the fields
        related to its main topics.


        The course will address issues related to problem solving, knowledge representation
        and concepts, machine learning, planning, natural language processing, neural
        networks, human-computer interaction, and their implications for the latest
        robotics. For introductory purposes, the emergence and development of artificial
        intelligence, classical and new cognitive science, and robotics will be explored.
        Philosophical, epistemological, and ethical issues related to different approaches
        to artificial intelligence and cognitive science will also be addressed.


        The course is temporally divided into four parts:


        1. The birth and the developments of artificial intelligence.

        2. Problem solving and automated planning.

        3. Knowledge representation, neural networks, and recent trends of artificial
        intelligence.

        4. Epistemological and ethical issues of artificial intelligence, cognitive
        science and robotics.'
      Readings/Bibliography: 'Mandatory textbooks


        - M. Giunti , S. Pinna, F. G. Garavaglia, Menti e macchine. Teorie filosofiche
        e scientifiche, Le Monnier Università, Milano, 2022.

        - S. Russell, P. Norvig, Artificial Intelligence: A modern Approach, Pearson,
        4th edition, 2020 (chapters 1, 2, 3, 4, 7, 8, 9, 10, 11, 26, 27, 28).


        Suggested readings:


        - D. Andler, Intellugence artificielle, intelligence humaine: la double énigme,
        Gallimard, Paris, 2023.

        - N. Bostrom, Superintelligenza. Tendenze, pericoli, strategie, Bollati Boringhieri,
        2018. [The English version is also available.]

        - M. Marraffa, Percezione, pensiero, coscienza. Passato e futuro delle scienze
        della mente, Rosenberg & Sellier, Torino, 2019.

        - M. Mitchell, Artificial Intelligence, Macmillan, New York, 2019.

        - G. Primiero, On the Foundations of Computing, Oxford University Press, Oxford,
        2020.

        - G. Tamburrini, Etica delle macchine. Dilemmi morali per robotica e intelligenza
        artificiale, Carocci, Roma, 2020.


        Further readings will be mentioned during the course.


        One more book among suggested readings is mandatory for not attending students.'
      Teaching methods: 'Lectures will be held in person and will include discussions
        on key topics, as well as analysis of selected content—including student-produced
        material—with the support of digital technologies.


        Students who are interested will have the opportunity to give a brief individual
        or group presentation on a topic agreed upon with the instructor.'
      Assessment methods: 'Students will be tested through an oral examination in
        which s/he will face general subjects of artificial intelligence and specific
        subjects of fields involved in this disciplinary approach. The knowledge of
        the topics of the course and the capability of using them autonomously will
        be taken into consideration, together with the ability in producing personal
        remarks on the contents developed during the lessons. If it will be possible,
        students will be required to apply the main concepts in simple exercises.


        In particular, the achievement of the following targets will have a growing
        weight:


        1. the completeness of the basic knowledge strictly connected to the program;

        2. the appropriateness of the specific language;

        3. the capability of personally re-using concepts learned during the course;

        4. the capability to manage interdisciplinary reflections and argumentations;

        5. the capability to apply the subjects to specific research cases and to
        produce autonomous and original remarks.


        1. and 2) are the lowest targets for the pass mark (18-22).

        2. could give a fair evaluation, the more being so the less the learned knowledge
        will be mnemonic (23-26).

        3. is for a good outcome (27-29).

        4. is for an excellent one (30 or 30 with distinction).


        Exam sessions

        During the 2025/2026 academic year, exam sessions are scheduled in the following
        months: one exam session will be held each month, except in August


        Students with disabilities and Specific Learning Disorders (SLD)


        Students with disabilities or Specific Learning Disorders have the right to
        special adjustments according to their condition, following an assessment
        by the Service for Students with Disabilities and SLD. Please do not contact
        the instructor but get in touch with the Service directly to schedule an appointment.
        It will be the responsibility of the Service to determine the appropriate
        adjustments. For more information, visit the page: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students
        . It is recommended that students contact the University office in advance.
        Any proposed adjustments must be submitted at least 15 days in advance for
        the instructor’s approval, who will evaluate their appropriateness in relation
        to the learning objectives of the course.'
      Teaching tools: Slides, along with other digital materials and tools, will be
        used during the lessons.
      Office hours: See the website of Francesco Bianchini (https://www.unibo.it/sitoweb/francesco.bianchini/en)
      SDGs: 'Quality education Industry, innovation and infrastructure Partnerships
        for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
