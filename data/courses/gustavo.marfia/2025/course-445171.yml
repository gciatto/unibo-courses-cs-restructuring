syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/445171
    title: 2025/2026 ELEMENTI INFORMATICI DI E-COMMERCE PER LA MODA — Università di
      Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le conoscenze necessarie a comprendere le basi delle tecnologie coinvolte
        nella costruzione di una piattaforma di e-commerce per la moda. Acquisisce
        la capacita’ di progettare l’interfaccia utente di un sistema di e-commerce,
        anche per il contesto mobile. Comprende i vantaggi e gli svantaggi delle diverse
        possibili soluzioni architetturali.
      Contenuti: '- Infrastruttura tecnologica: Internet e WWW

        - Server Web

        - Piattaforme di ECommerce

        - Sistemi di Social Media

        - Sicurezza

        - Analisi di piattaforme di fashion ECommerce

        - Piattaforme immersive di ECommerce

        - Uso di paradigmi AI'
      Testi/Bibliografia: Bibliografia fornita dal docente all'inizio del corso.
      Metodi didattici: Lezioni frontali e di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: Discussione progetto
        le cui specifiche vengono fornite in classe all'inizio del corso.
      Strumenti a supporto della didattica: Classrooms and lab.
      Orario di ricevimento: Consulta il sito web di Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/445171
    title: 2025/2026 Elements of Computer Technologies for Fashion E-Commerce — University
      of Bologna
    contents:
      Learning outcomes: At the end of the course the student has the necessary knowledge
        to understand the basics of the technologies involved in the construction
        of an e-commerce platform for fashion. Acquires the ability to design the
        user interface of an e-commerce system, also for the mobile context. Understands
        the advantages and disadvantages of different possible architectural solutions.
      Course contents: '- Infrastructure: Internet and WWW

        - Web Servers

        - ECommerce platforms

        - Social Media Systems

        - Security

        - Analysis of fashion ECommerce platforms

        - Immersive ECommerce platforms

        - Use of AI paradigms'
      Readings/Bibliography: Bibliography provided by the Lecturer at the beginning
        of the course.
      Teaching methods: Lectures and lab sessions.
      Assessment methods: Project discussion. The specs of the project will be provided
        at the beginning of the course.
      Teaching tools: Classrooms and lab.
      Office hours: See the website of Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
