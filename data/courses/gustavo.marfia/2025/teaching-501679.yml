syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/501679
    title: 2025/2026 DATA SCIENCE FOR FASHION SYSTEM — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del Corso, lo/la studente possiede
        le conoscenze necessarie ad applicare specifiche tecniche di Data Science
        al commercio elettronico della moda. In particolare, lo/la studente è in grado
        di individuare gli scenari ove queste tecnologie abbiano un alto potenziale
        di utilizzo e di adottarle nella progettazione di soluzioni avanzate di E-Commerce.
      Contenuti: 'Il corso si focalizza sull''utilizzo della scienza dei dati nel
        contesto dell''e-commerce della moda. I contenuti del corso sono organizzati
        come segue:


        - Presentazione e discussione di casi d''uso rappresentativi dell''utilizzo
        delle tecnologie di data science nell''e-commerce della moda;

        - Comprensione dei fondamenti di un flusso di lavoro di scienza dei dati:
        fonti di dati, comprensione dei dati, preparazione dei dati, modellazione,
        valutazione e distribuzione.'
      Testi/Bibliografia: Slide a appunti forniti dal docente.
      Metodi didattici: Lezioni frontali ed esercitazioni di laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: Agli studenti verrà richiesto
        di realizzare un progetto (individuale o di gruppo), partendo dall'idea, mostrandone
        l'implementazione, i test effettuati, la valutazione, la dimostrazione e la
        documentazione. Non saranno richieste specifiche competenze di programmazione
        per poter svolgere il progetto.
      Strumenti a supporto della didattica: Gli studenti avranno la possibilita' di
        utilizzare l'infrastruttura disponibile presso il VARLAB (https://site.unibo.it/varlab/en).
      Orario di ricevimento: Consulta il sito web di Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/501679
    title: 2025/2026 DATA SCIENCE FOR FASHION SYSTEM — University of Bologna
    contents:
      Learning outcomes: 'At the end of the Course the student will have the

        knowledge necessary to apply specific Data

        Science techniques to fashion e commerce.

        Specifically, the student will be able to identify

        scenarios where these technologies have a high

        potential for use and to adopt them in the design

        of advanced e commerce solutions.'
      Course contents: 'The course focuses on the increasing potential and use of
        data science in the Fashion System (FS). The content that will be presented
        during the course is organized as follows:


        - Presentation and discussion of representative use cases related to the adoption
        of data science techniques in the FS;

        - Understanding the fundamentals of a data science workflow: data sources,
        data understanding, data preparation, modeling, evaluation and deployment.'
      Readings/Bibliography: Slides and handouts provided by the instructor.
      Teaching methods: Lectures and lab hours.
      Assessment methods: Students will be asked to design an own project (individual
        or groups) from idea, via implementation, testing, evaluation, demonstration,
        to documentation. No coding skills will be required to complete the project.
      Teaching tools: Students will be able to utilize the AR/VR infrastructure available
        at the VARLAB (https://site.unibo.it/varlab/en).
      Office hours: See the website of Gustavo Marfia (https://www.unibo.it/sitoweb/gustavo.marfia/en)
