syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/412080
    title: 2025/2026 PROGRAMMAZIONE DI RETI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        le nozioni essenziali sulle architetture di rete e sulle problematiche di
        progettazione e implementazione di protocolli di comunicazione.
      Contenuti: 'L''obiettivo dell''insegnamento e'' quello di presentare i problemi
        riguardanti la progettazione e l''implementazione delle moderne applicazioni
        di rete. Le varie tematiche vengono presentate in due fasi, la prima dedicata
        allo studio del problema in termini generali, la seconda orientata a mostrare
        come tali soluzioni trovino implementazione nelle soluzioni tecnologiche correnti.


        Vengono presentati e discussi i seguenti argomenti.


        - Internet e reti di calcolatori: Internet, protocolli, programmi client e
        server, architettura a livello e modelli di servizio.

        - Affidabilità del canale. Rivelazione e correzione di errore. Analisi dei
        più comuni codici a rivelazione d''erroere. Protocolli ARQ.

        - Analisi di protocollo: Sniffing, acquisizione ed utilizzo di tracce per
        l''analisi ed il debug. Utilizzo dell''analizzatore Wireshark.

        - Livello di applicazione: protocolli a livello applicazione (Web e HTTP,
        FTP, SMTP, POP3, IMAP, DNS), utilizzo delle socket (o costrutti affini) in
        vari linguaggi di programmazione.

        - Livello di trasporto: servizi, multiplexing e demultiplexing, trasporto
        senza connessione, protocollo UDP, principi del trasferimento dati affidabile,
        trasporto orientato alla connessione, protocollo TCP, cause e costi della
        congestione, approcci al controllo di congestione, controllo di congestione
        TCP.

        - Cenni alla sicurezza delle applicazioni: autenticazione, autorizzazione,
        certificati digitali.'
      Testi/Bibliografia: Achille Pattavina, "Internet e reti. Fondamenti." Pearson;
        3° edizione (9 febbraio 2022), 576 pagine, ISBN 8891930911
      Metodi didattici: Il primo modulo dell'insegnamento si compone esclusivamente
        di lezioni frontali (40 ore), le lezioni di laboratorio sono demandate al
        secondo modulo (16 ore).
      Modalità di verifica e valutazione dell'apprendimento: Le modalità di svolgimento
        della prova d'esame sono spiegate nella pagina del corso sulla piattaforma
        Virtuale.
      Strumenti a supporto della didattica: Il materiale didattico presentato a lezione
        viene messo a disposizione degli studenti in formato elettronico sulla piattaforma
        Virtuale.
