syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/333852
    title: 2025/2026 FONDAMENTI DI INFORMATICA T (A-K) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Lo Studente acquisisce conoscenze di base
        dell'architettura di un sistema di calcolo. Lo Studente si impadronisce di
        tecniche e metodologie per la risoluzione di diverse classi di problemi usando
        uno specifico linguaggio di programmazione.
      Contenuti: 'Sistemi operativi GNU/Linux


        Il linguaggio di programmazione C++


        Alfabeto, lessico, sintassi, semantica


        Variabili, operatori. Costrutti di controllo del flusso.


        Funzioni, array.


        Classi. Polimorfismo: overloading di funzioni, eredita'', uso di template.


        Elementi di Analisi Numerica


        Approssimazione di funzioni


        Approssimazione di derivate


        Approssimazione di zeri


        Approssimaione di integrali'
      Testi/Bibliografia: 'Dispense del docente


        Testi di consultazione integrativa


        Aguilar, L. J., Dragoni, A. F. (2021). Fondamenti di programmazione in C++:
        Algoritmi, strutture dati e oggetti


        Quarteroni, Sacco, Saleri, Matematica Numerica'
      Metodi didattici: 'Lezioni frontali in aula


        Esercitazioni in laboratorio informatico, con l''assistenza di tutor.'
      Modalità di verifica e valutazione dell'apprendimento: Esame nel laboratorio
        informatico diviso in una parte su C++ e una parte su Analisi Numerica.
      Strumenti a supporto della didattica: Computer, videoproiettore
      Orario di ricevimento: Consulta il sito web di Giorgio Bornia (https://www.unibo.it/sitoweb/giorgio.bornia)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/333852
    title: 2025/2026 Foundations of Informatics T (A-K) — University of Bologna
    contents:
      Learning outcomes: Students learn basic notions about the architecture of a
        computing system. Students gain expertise about techniques and methods for
        the solution of various classes of problems using a specific programming language.
      Course contents: 'GNU/Linux operating systems


        The C++ programming language

        Alphabet, lexicon, syntax, semantics.


        Variables, operators. Flow control constructs.


        Functions, arrays.


        Classes. Polymorphism: function overloading, inheritance, templating.


        Elements of Numerical Analysis


        Approximation of functions


        Approximation of derivatives


        Approximation of zeros


        Approximation of integrals'
      Readings/Bibliography: 'Lecture notes


        Textbooks for additional consultation:


        Overland, B. (2001). C++ in plain English.


        Quarteroni, Sacco, Saleri, Numerical Mathematics'
      Teaching methods: 'Classroom lectures


        Lab sessions assisted by the professor and tutors'
      Assessment methods: Lab exam divided into a C++ module and a Numerical Analysis
        module.
      Teaching tools: Computer, videoprojector
      Office hours: See the website of Giorgio Bornia (https://www.unibo.it/sitoweb/giorgio.bornia/en)
      SDGs: 'Quality education Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
