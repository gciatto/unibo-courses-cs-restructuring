  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523751
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        un linguaggio di programmazione di alto livello e alcuni concetti fondamentali
        dell’informatica, quali algoritmo, complessità computazionale, macchina astratta,
        tipo di dato, e alcuni algoritmi notevoli. Lo studente è in grado di analizzare
        e progettare algoritmi, che sa realizzare nel linguaggio di programmazione
        studiato.
      Contenuti: 'L''insegnamento introduce alla programmazione nel linguaggio Python,
        anche mediante congrue attività di laboratorio (30 ore).


        Contenuti specifici: Macchine astratte. La macchina Python. Programmazione
        in Python: nomi e loro visibilità, funzioni, oggetti modificabili e non modificabili,
        tipi di base e loro uso nella risoluzione di problemi di media difficoltà.
        Classi e oggetti. Tipi di dato astratti come classi. Algoritmi di ordinamento.
        Cenni di complessità computazionale. Limitazioni dei procedimenti effettivi:
        esistenza di problemi non risolubili per via algoritmica.


        Il corso ha un''intensa attività di laboratorio, in cui il docente è affiancato
        da tutor.


        Conoscenze preliminari: nessuna, anche se una precedente esposizione alla
        programmazione (in qualsiasi linguaggio) può aiutare.'
      Testi/Bibliografia: 'John V. Guttag. Introduzione alla programmazione con Python

        Egea, 2021

        (traduzione italiana ridotta di:

        Introduction to Computation and Programming Using Python

        Third Edition: With Application to Computational Modeling and Understanding
        Data

        MIT Press, 2021)


        Altre letture consigliate per il principiante assoluto:


        Allen B. Downey. Pensare in Python (nuova edizione 2025)

        Egea, 2025

        (traduzione italiana di:

        Think Python 2e.

        O''Reilly Media, 2012. ISBN 978-1449330729.

        On-line manuscript: see greenteapress.com/wp/think-python-2e/ (http://greenteapress.com/wp/think-python-2e/)
        )


        Jessen Havill. Discovering Computer Science: Interdisciplinary Problems, Principles,
        and Python Programming

        Chapman and Hall/CRC. ISBN 9781482254143'
      Metodi didattici: 'Lezioni in aula.


        Esercitazioni di laboratorio, nella stessa aula dove si tiene lezione, con
        i portatili degli studenti: un PC ogni due studenti, in pair programming (https://en.wikipedia.org/wiki/Pair_programming).
        Durante il laboratorio, i docenti sono affiancati dai tutor.


        Il corso è tenuto nel secondo semestre (da febbraio a maggio).


        Per i soli studenti della LM in Scienze Filosofiche: il corso è mutuato dal
        CdL in Matematica e quindi si tiene da febbraio a maggio, anche se la LM di
        Scienze Filosofiche lo mutua per soli 6 CFU.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso ha sia lezioni
        tradizionali che lezioni di laboratorio, con un unico esame. Ogni settimana
        saranno proposti in laboratorio alcuni test di autovalutazione: non sono necessari
        per l''esame, ma costituiscono un importante strumento per la sua preparazione.
        La consegna di tutti gli assegnamenti durante l''anno dà diritto ad un bonus
        di 1 punto.


        L''esame è costituito da due parti: (i) una prova di programmazione (durata:
        2.5 ore); (ii) una prova scritta su carta (1 ora, non è consentita la consultazione
        di appunti o testi). Le due prove sono tenute in giorni successivi e devono
        essere sostenute nello stesso appello, senza eccezioni.


        Prova di programmazione: La prova verifica le competenze di programmazione,
        usando il linguaggio Python. Si svolge sulla piattaforma online EOL, che ha
        la stessa interfaccia usata anche per gli esercizi assegnati durante il laboratorio,
        in un''aula attrezzata con PC. Lo studente dovrà usare il PC d''aula e non
        il proprio portatile; non è consentita la consultazione di appunti, o siti
        online, fatta eccezione di python.org (https://python.org), che include la
        documentazione ufficiale di Python. Di durata complessiva di 2.5 ore, è a
        sua volta costituita da due parti:


        1. una prima parte consiste nella redazione di alcuni programmi Python, con
        correzione automatica su dati di prova; a questa parte, al momento della consegna
        viene immediatamente assegnato un voto compreso tra 0 e 10, con sufficienza
        a 5. Se questa parte è insufficiente, l''esame termina ed è globalmente insufficiente.
        Se la valutazione è compresa tra 5 e 10 lo studente ha accesso alla seconda
        parte e alla prova scritta del giorno successivo.

        2. la seconda parte consiste nella redazione di alcuni programmi Python, che
        saranno corretti e valutati dal docente assieme alla prova scritta. Anche
        questa parte viene erogata attraverso la piattaforma di laboratorio e propone
        dei test automatici, ma tali test non sono definitivi per la valutazione finale.


        Il tempo complessivo di 2.5 ore viene amministrato autonomamente dallo studente;
        una volta consegnata la prima parte, questa è definitiva.


        Prova scritta: La prova verifica le competenze sulla macchina Python e sulla
        complessità computazionale. Della durata di 1 ora, è un esame scritto tradizionale,
        senza appunti, su carta. Viene valutato dal docente insieme alla seconda parte
        della prova di programmazione. All''insieme della seconda prova di programmazione
        e della prova scritta viene assegnato un voto compreso tra 0 e 24, con sufficienza
        a 13 (per la sufficienza è necessario che gli esercizi della seconda parte
        di programmazione siano sufficienti). L''eventuale insufficienza della prova
        (meno di 13) rende necessario sostenere di nuovo anche l''intera prova di
        programmazione, ad un appello successivo.


        Il voto finale è determinato sommando il voto (sufficiente) della prima parte
        della prova di programmazione (5-10), dello scritto (sufficiente: 13-24),
        e l''eventuale bonus (0-1). Se il risultato è maggiore o uguale a 32, il voto
        è 30Lode.


        Per gli studenti della LM in Scienze filosofiche (o di altri insegnamenti
        per i quali l''esame è di sei crediti): l''esame non comprende la prima parte
        della prova di programmazione, ma solo la seconda parte di programmazione
        e lo scritto. Quindi gli studenti devono iscriversi regolarmente alla prova
        di Programmazione: il sistema presenterà loro solo la seconda parte.


        Studenti con disabilità e DSA


        Le persone con disabilità o disturbi specifici dell’apprendimento hanno diritto
        a speciali adattamenti in relazione alla loro condizione, previa valutazione
        del Servizio d’ateneo per le studentesse e gli studenti con disabilità e DSA.
        Si prega di non rivolgersi al docente, ma di contattare il Servizio per un
        appuntamento. Sarà cura del Servizio stabilire quali adattamenti si rendono
        opportuni. Maggiori informazioni alla pagina site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti
        (http://site.unibo.it/studenti-con-disabilita-e-dsa/it/per-studenti) .'
      Strumenti a supporto della didattica: 'Tutte le informazioni e il materiale
        sul corso sono reperibili a partire dalla pagina: www.cs.unibo.it/~martini/MATH/
        (http://www.cs.unibo.it/~martini/MATH) e, durante il corso, sulla piattaforma
        virtuale.unibo.it (http://virtuale.unibo.it)


        Il laboratorio si svolge nella stessa aula dove si tiene lezione, con i portatili
        degli studenti. È necessario installare sul portatile una versione del linguaggio
        di programmazione Python (http://python.org/): si suggerisce Thonny (http://thonny.org/),
        un ambiente di programmazione auto-contenuto per Python 3, che sarà utilizzato
        durante le lezioni.


        La piattaforma piattaforma virtuale.unibo.it (http://virtuale.unibo.it) deve
        essere utilizzata anche per inviare gli esercizi per casa assegnati durante
        il lab.'
      Orario di ricevimento: Consulta il sito web di Simone Martini (https://www.unibo.it/sitoweb/simone.martini)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523751
    title: 2025/2026 Computer Science — University of Bologna
    contents:
      Learning outcomes: 'Upon completion of the course, the student knows a high-level
        programming language and some fundamental concepts of computer science, such
        as algorithm, computational complexity, abstract machine, data type, and some
        notable algorithms.

        The student is able to analyze and design algorithms, which he/she can implement
        in the programming language studied.'
      Course contents: 'Computer science and problem solving. Abstract machines. Python
        machine. Programming in Python: names and visibility, functions, immutable
        and mutable objects, basic data types and their use in the solution of problems.
        Classes and objects. Abstract data types as classes. Sorting algorithms. Introduction
        to computational complexity. Limitations of effective procedures: non decidable
        problems.


        The course involves an important lab activity, where the instructors is joined
        by teaching assistants.'
      Readings/Bibliography: 'John V. Guttag

        Introduction to Computation and Programming Using Python

        Third Edition: With Application to Computational Modeling and Understanding
        Data

        MIT Press, 2021


        Other textbooks:


        Allen B. Downey

        Think Python 2e.

        O''Reilly Media, 2012. ISBN 978-1449330729.

        On-line manuscript: see greenteapress.com/wp/think-python-2e/


        Jessen Havill

        Discovering Computer Science: Interdisciplinary Problems, Principles, and
        Python Programming

        Chapman and Hall/CRC. ISBN 9781482254143'
      Teaching methods: 'Lectures.


        Guided programming experimentations using the students'' PCs, in selected
        hours, in pair programming (https://en.wikipedia.org/wiki/Pair_programming).
        if the pandemic will make it possible.


        During the lab hours the instructor is joined by several teaching assistants.


        The course is given in the second semester (from mid February to May).


        For the students of LM in Scienze Filosofiche: the course is taken from that
        of L in Mathematics, hence it will be given from mid February to May.


        As concerns the teaching methods of this course unit, all students must attend
        Modules 1 and 2 on Health and Safety online (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)'
      Assessment methods: 'There is a single exam covering both the lectures and the
        lab. Lab homework is assigned every week---this homework is not graded, but
        if handed in regularly, it will result in one point bonus in the final grade.


        Students with disabilities and Specific Learning Disorders (SLD) Students
        with disabilities or Specific Learning Disorders have the right to special
        accommodations according to their condition, following an assessment by the
        Service for Students with Disabilities and SLD. Please do not contact the
        teacher but get in touch with the Service directly to schedule an appointment.
        It will be the responsibility of the Service to determine the appropriate
        adaptations. For more information, visit the page:

        https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students'
      Teaching tools: 'Info and material available at www.cs.unibo.it/~martini/MATH
        (http://www.cs.unibo.it/~martini/MATH) . During the term of the lectures,
        material will be available on virtuale.unibo.it (https://virtuale.unibo.it/)


        Students are encouraged to install on their PCs Thonny (http://thonny.org/),
        an environment for the programming language Python 3 (http://python.org),
        which will be used during the lectures.'
      Office hours: See the website of Simone Martini (https://www.unibo.it/sitoweb/simone.martini/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
