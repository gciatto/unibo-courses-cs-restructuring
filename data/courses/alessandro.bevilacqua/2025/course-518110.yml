syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518110
    title: 2025/2026 LABORATORIO DI INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente possiede
        conoscenze pratiche di algoritmi e programmazione informatica avanzata (in
        particolare: programmazione imperativa e strutturata) nel linguaggio di programmazione
        C. Lo studente sarà in grado di progettare e implementare algoritmi iterativi
        e ricorsivi, strutture dati avanzate (liste), e di gestire l''I/O standard
        (file).'
      Contenuti: 'Introduzione ad aspetti avanzati di algoritmi e strutture dati:
        strutture dati avanzate (liste, alberi); algoritmi ricorsivi e analisi di
        complessità.


        Linguaggio C: aspetti avanzati di programmazione: iterazione e ricorsione;
        algoritmi su liste (ricerca, inserimento, cancellazione, ordinamento); IO
        e persistenza di dati su file. Compilazione e link di moduli da riga di comando.'
      Testi/Bibliografia: 'Testo adottato:


        - Paul J. Deitel, Harvey M. Deitel, "Il linguaggio C: fondamenti e tecniche
        di programmazione", 8/ed, Pearson, ISBN 978-8891901651


        Ulteriore materiale sarà reso disponibile dal docente.


        Approfondimenti sulla parte di teoria:


        - J. Glenn Brookshear, “Informatica—una panoramica generale”, 11/ed., Pearson
        2012, ISBN 978-8871927671


        Approfondimenti sulla programmazione in C:


        - Brian W. Kernighan and Dennis M. Ritchie, "The C Programming Language, Second
        Edition", Prentice Hall, Inc., 1988. ISBN 0-13-110362-8 (paperback), 0-13-110370-9
        (hardback).'
      Metodi didattici: La didattica si svolge mediante lezioni frontali accompagnate
        da esercitazioni pratiche al laboratorio. Durante le lezioni teoriche vengono
        introdotti concetti avanzati dell'informatica, e vengono via via descritti
        i costrutti di programmazione che sono poi oggetto di esercitazioni parzialmente
        guidate, con la supervisione dei docenti. Di tutti gli esercizi proposti viene
        poi fornita una possibile soluzione sul sito Web del corso, allo scopo di
        supportare le attività di studio individuale. Alcune esercitazioni sono rivolte
        a simulare lo svolgimento dell'esame finale.
      Modalità di verifica e valutazione dell'apprendimento: Gli studenti saranno
        valutati in base allo svolgimento di una prova scritta/pratica composta da
        un esercizio da svolgere al computer. Si chiederà di generare e implementare
        un algoritmo. L'elaborato dovrà essere diviso in due moduli, il primo contenente
        il flusso principale del programma, il secondo le singole funzioni sviluppate.
        L'esame è strutturato in modo tale da valutare il raggiungimento degli obiettivi
        didattici e in particolare, la capacità di ragionare in termini logici e algoritmici
        e le competenze di analisi, progettazione, implementazione e strutturazione
        di programmi in linguaggio C
      Strumenti a supporto della didattica: Nel corso sarà utilizzato anche materiale
        didattico fornito dal docente (in particolare, lucidi e dispense con esercizi
        e problemi vari). L'attività di laboratorio supporterà l'apprendimento pratico.
        Sarà presente un tutor per supportare l'attività laboratoriale.
      Orario di ricevimento: Consulta il sito web di Alessandro Bevilacqua (https://www.unibo.it/sitoweb/alessandro.bevilacqua)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518110
    title: 2025/2026 Laboratory of Informatics — University of Bologna
    contents:
      Learning outcomes: 'Upon completion of the course, the student will have a working
        knowledge of algorithms and advanced computer programming (in particular:
        imperative and structured programming) in the C programming language. The
        student will be able to design, implement and structure iterative and recursive
        algorithms, advanced data structures (lists) and manage standard I/O (files).'
      Course contents: 'Introduction to advanced algorithms and data structures: recursive
        algorithms and complexity analysis; advanced data structures (lists, trees).


        The C programming language: advanced programming aspects: iteration and recursion;
        algorithms on lists (insertion, deletion, search, sorting); I/O and data persistence
        on file. Compiling and linking of modules from command line.'
      Readings/Bibliography: '- Paul J. Deitel, Harvey M. Deitel, "Il linguaggio C:
        fondamenti e tecniche di programmazione", 8/ed, Pearson, ISBN 978-8891901651


        Further materials will be provided by the professor.


        For further topics on the theory and fundamentals of informatics:


        - Brookshear, J. Glenn. Computer science: an overview. Boston: Addison-Wesley,
        2012.


        For further topics on the C programming language:


        - Brian W. Kernighan and Dennis M. Ritchie, "The C Programming Language, Second
        Edition", Prentice Hall, Inc., 1988. ISBN 0-13-110362-8 (paperback), 0-13-110370-9
        (hardback).'
      Teaching methods: The teaching method consists of lectures, which cover the
        theorical and practical aspects of computer science and programming, accompanied
        by computer exercise.
      Assessment methods: The course exam consists of a written/practical test with
        practical exercises to be carried out on the computer in the C programming
        language. The student will be asked to generate and implement an algorithm.
        The project must be divided into two modules, the first containing the main
        flow of the program, and the second the single functions developed. The exam
        is structured to assess the achievement of the learning objectives, and in
        particular, the ability to reason in logical and algorithmic terms and the
        skills in analyzing, designing, implementing, and structuring programs in
        the C language.
      Teaching tools: Materials to facilitate learning, including slides, lecture
        notes, and exercises will be provided. Laboratory classes will support practice.
        Tutoring will be provided to support learning throughout the coursework.
      Office hours: See the website of Alessandro Bevilacqua (https://www.unibo.it/sitoweb/alessandro.bevilacqua/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
