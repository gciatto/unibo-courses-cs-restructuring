syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518106
    title: 2025/2026 FONDAMENTI DI INFORMATICA A — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente possiede
        le conoscenze di base dei concetti di computazione, di programmazione imperativa,
        strutturata, e di strutture dati e loro algoritmi. In particolare, lo studente
        è in grado di: - progettare algoritmi base per la manipolazione di strutture
        dati - realizzare tali algoritmi in un linguaggio di programmazione.'
      Contenuti: 'Introduzione all''informatica: panoramica della disciplina.


        Architettura dei calcolatori: architettura di Von Neuman; componenti dei computer
        moderni; livelli software.


        Rappresentazione dell''informazione: codice binario; rappresentazione dell''informazione
        numerica (rappresentazione in complemento a due, rappresentazione floating-point);
        rappresentazione dell''informazione non numerica.


        Introduzione agli algoritmi, strutture dati, e programmazione: definizione
        di algoritmo ed esempi; strutture dati fondamentali; notazioni di rappresentazione
        di algoritmi (pseudocodice, diagrammi di flusso); linguaggi di programmazione.


        Linguaggio C: costrutti fondamentali del linguaggio: tipi, operatori, espressioni,
        funzioni, strutture di controllo, cicli, funzioni; programmazione strutturata;
        iterazione e ricorsione; array e puntatori; allocazione dinamica della memoria;
        algoritmi su array (inversione, ordinamento, ricerca sequenziale, ricerca
        binaria); stringhe.'
      Testi/Bibliografia: 'Testi suggeriti:


        - J. G. Brookshear and Stephen G. Kochan. Fondamenti di Informatica e Programmazione
        in C. Pearson, 2016. ISBN: 978-8865183694

        - Paul J. Deitel, Harvey M. Deitel, "Il linguaggio C: fondamenti e tecniche
        di programmazione", 9/Ed, Pearson, ISBN 978-8891906236 (ISBN edizione digitale:
        978-8891906243)


        Approfondimenti sulla programmazione in C:


        - Brian W. Kernighan and Dennis M. Ritchie, "The C Programming Language, Second
        Edition", Prentice Hall, Inc., 1988. ISBN 0-13-110362-8 (paperback), 0-13-110370-9
        (hardback).'
      Metodi didattici: 'La didattica si svolge mediante lezioni frontali accompagnate
        da esercitazioni pratiche al laboratorio, strutturate secondo approcci attivi.
        Durante le lezioni teoriche vengono introdotti i concetti base dell''informatica,
        e vengono via via descritti i costrutti di programmazione che sono poi oggetto
        di esercitazioni parzialmente guidate, con la supervisione dei docenti. Di
        tutti gli esercizi proposti viene poi fornita una possibile soluzione sul
        sito web del corso, allo scopo di supportare le attività di studio individuale.
        Alcune esercitazioni sono rivolte a simulare lo svolgimento dell''esame finale.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'Gli studenti saranno
        valutati in base allo svolgimento di una prova scritta/pratica nella piattaforma
        EOL (Esami Online) composta da domande di tipo teorico ed esercizi da risolvere
        al computer. L''esame è strutturato in modo tale da valutare il raggiungimento
        degli obiettivi didattici; in particolare, la capacità di ragionare in termini
        logici e algoritmici e le competenze di analisi, progettazione, ed implementazione
        di programmi in linguaggio C.


        Alle Studentesse e agli Studenti con DSA o disabilità temporanee o permanenti
        si raccomanda di contattare per tempo l’ufficio di Ateneo responsabile, all''indirizzo
        https://site.unibo.it/studenti-con-disabilita-e-dsa/it. Sarà cura dell''ufficio
        proporre eventuali adattamenti, che dovranno comunque essere sottoposti, con
        un anticipo di 15 giorni, all’approvazione del/la docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: Nel corso sarà utilizzato anche materiale
        didattico fornito dal docente (in particolare, lucidi e dispense con esercizi
        e problemi vari). L'attività di laboratorio supporterà l'apprendimento pratico.
        Sarà presente un tutor per supportare l'attività laboratoriale.
      Orario di ricevimento: 'Consulta il sito web di Roberto Casadei (https://www.unibo.it/sitoweb/roby.casadei)


        Consulta il sito web di Sara Montagna (https://www.unibo.it/sitoweb/sara.montagna)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/518106
    title: 2025/2026 Foundations of Informatics A — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student will be acquainted
        with the basics of information representation, computation, algorithms, and
        computer programming (in particular: imperative, structured programming).
        The student will be able to design and implement algorithms in a programming
        language.'
      Course contents: 'Introduction to informatics: an overview of the field.


        Basics of computer architecture: Von Neuman architecture; main components
        of modern computers; software levels.


        Representation of information: binary code; representation of numeric information
        (two''s complement, floating-point representation); representation of non-numeric
        information.


        Introduction to algorithms, data structures, and programming: definition of
        algorithm; examples of algorithms; fundamental data structures; notations
        for representing algorithms (pseudo-code, flow diagrams); programming languages.


        The C programming language: fundamental constructs of the language: types,
        values, operators, expressions, functions, control flow structures, cycles;
        structured programming; iteration and recursion; arrays e pointers; algorithms
        on arrays (reverse, ordering, search); strings of characters.'
      Readings/Bibliography: 'Suggested textbooks:


        - Paul J. Deitel, Harvey M. Deitel, "Il linguaggio C: fondamenti e tecniche
        di programmazione", 9/Ed, Pearson, ISBN 978-8891906236 (ISBN e-book: 978-8891906243)

        - Brookshear, J. Glenn. Computer science: an overview. Boston: Addison-Wesley,
        2012.


        For further topics on the C programming language:


        - Brian W. Kernighan and Dennis M. Ritchie, "The C Programming Language, Second
        Edition", Prentice Hall, Inc., 1988. ISBN 0-13-110362-8 (paperback), 0-13-110370-9
        (hardback).'
      Teaching methods: 'Teaching is carried out through lectures accompanied by practical
        exercises in the laboratory, structured according to active learning approaches.
        During the theoretical lessons, the basic concepts of computer science are
        introduced, and programming constructs are gradually described, which then
        become the subject of partially guided exercises under the supervision of
        the instructors. Solutions for all the proposed exercises is then provided
        on the course website, in order to support individual study activities. Some
        exercises are aimed at simulating the final exam.


        Considering the type of activities and the teaching methods adopted, attendance
        of this training activity requires all students to have previously completed
        modules 1 and 2 of the safety training for study environments, in e-learning
        mode.'
      Assessment methods: 'Students will be assessed based on a written/practical
        test in EOL (Esami Online) consisting of theoretical questions and exercises
        to be solved on the computer. The exam is designed to evaluate the achievement
        of the learning objectives; in particular, the ability to think in logical
        and algorithmic terms, as well as the skills in analysis, design, and implementation
        of programs in the C language.


        Students with specific learning disorders (DSA) or temporary or permanent
        disabilities are advised to contact the responsible University office in advance,
        at the address https://site.unibo.it/studenti-con-disabilita-e-dsa/en. The
        office will take care of proposing any necessary adjustments, which must in
        any case be submitted, at least 15 days in advance, for the approval of the
        instructor, who will assess their appropriateness also in relation to the
        learning objectives of the course.'
      Teaching tools: The professors will provide materials to facilitate learning,
        including slides, lecture notes, and exercises. Laboratory classes will support
        practice. Tutoring will be provided to support learning throughout the coursework.
      Office hours: 'See the website of Roberto Casadei (https://www.unibo.it/sitoweb/roby.casadei/en)


        See the website of Sara Montagna (https://www.unibo.it/sitoweb/sara.montagna/en)'
