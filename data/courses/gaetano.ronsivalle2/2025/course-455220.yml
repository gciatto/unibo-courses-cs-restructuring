  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455220
    title: 2025/2026 Digital Culture — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will be familiar with
        the fundamental principles of digital culture and the relationship between
        the frontier topics of digital technological development and business management.
        The student will therefore be able to understand and implement the development
        of digital technology in the managerial management of the company, both internally,
        such as human resources and operations management, and externally, such as
        the management of marketing activities.
      Course contents: 'Module 1 - The New Digital Intelligence


        - LU1. The Discrete Charm of Digital - The new paradigm and the IT revolution
        - Contrast between "analog" and "digital"

        - LU2. Journey to the Center of Oasis - Impact of digitalization on various
        aspects of reality - Effects of the IT revolution in astronomical, ecological,
        political, economic, social, and individual spheres

        - LU3. Hercules at the Crossroads: Decision, Future and Complexity - Effects
        of the digital revolution on decision-making process phases - Methods of predicting
        the future

        - LU4. The New Digital Intelligence - Characteristics of the new "digital
        intelligence" - The six fundamental dimensions (data acquisition, memory,
        processing, representation, activation, and adaptation)

        - LU5. From Primordial Chaos to the Kingdom of Bits - The concept of "data"
        - Methods of constructing and acquiring digital data

        - LU6. In Search of Lost Data - Digital memory: fundamental characteristics
        and properties - The four types of logical architecture

        - LU7. Physiology of Positronic Thinking - The calculation dimension in digital
        intelligence - Main methods and algorithms of Machine Learning, time series
        analysis, and Text Analysis

        - LU8. The Color of Data - Infographic communication techniques - Principles
        of Data Visualization

        - LU9. The Geometric Construction of Decisions - Characteristics of activation
        - The logical-functional architecture of an automatic decision system

        - LU10. Digital Intelligence in the Mirror - The dimension of adaptation -
        Monitoring the quality of a decision-making process


        Module 2 - Methods and Tools of the New Digital Intelligence


        - Digital Data Acquisition and Storage

        - Machine Learning Laboratory

        - Principles of Data Storytelling

        - LLMs and Generative AI Platforms

        - Artificial Agents for Productivity and Business Processes'
      Readings/Bibliography: '1. G. B. Ronsivalle, La nuova intelligenza digitale.
        Come trasformare i dati in decisioni per progettare il futuro. Maggioli, 2022

        2. G.B. Ronsivalle, I. Baccan, A. Bersan, The Orange Box. Laboratorio di Machine
        Learning. Wemole, 2024.'
      Teaching methods: '- Frontal lectures with the support of multimedia slides
        and audio/video contributions

        - Individual and group practical exercises using free software

        - Online insights and active sharing of digital content'
      Assessment methods: 'Assessment Model


        - Step 1: Online Written Test (individual)

        - Maximum score: 15 points

        - Minimum passing score: 9 points

        - Step 2: Project Work (group)

        - Maximum score: 15 points

        - Minimum passing score: 9 points

        - Step 3: Challenge (group)

        - Additional bonus: 0 to 5 points


        Final Grade


        Step 1 Score + Step 2 Score + Step 3 Bonus = x/30'
