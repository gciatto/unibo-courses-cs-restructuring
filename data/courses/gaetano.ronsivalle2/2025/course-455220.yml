  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455220
    title: 2025/2026 CULTURA  DIGITALE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente conosce
        i principi fondamentali della cultura digitale e la relazione tra i temi di
        frontiera dello sviluppo tecnologico digitale e la gestione d’impresa. Lo
        studente è quindi in grado di comprendere e implementare lo sviluppo della
        tecnologia digitale nella gestione manageriale dell’impresa, riguardo all’interno,
        come la gestione del personale e delle operation, e all’esterno, come la gestione
        delle attività di marketing.
      Contenuti: 'Modulo 1 - La nuova intelligenza digitale


        - UD1. Il fascino discreto del digitale

        - Il nuovo paradigma e la rivoluzione informatica

        - Contrapposizione tra “analogico” e “digitale”

        - UD2. Viaggio al centro di Oasis

        - Impatto della digitalizzazione sui vari aspetti della realtà

        - Effetti della rivoluzione informatica in ambito astronomico, ecologico,
        politico, economico, sociale, individuale

        - UD3. Ercole al bivio: decisione, futuro e complessità

        - Effetti della rivoluzione digitale sulle fasi del processo decisionale

        - Metodi di previsione del futuro

        - UD4. La nuova intelligenza digitale

        - Caratteristiche della nuova “intelligenza digitale”

        - Le sei dimensioni fondamentali (acquisizione dei dati, memoria, elaborazione,
        rappresentazione, attivazione e adattamento)

        - UD5. Dal caos primordiale al regno dei bit

        - Il concetto di “dato”

        - Modalità di costruzione e acquisizione dei dati digitali

        - UD6. Alla ricerca del dato perduto

        - La memoria digitale: caratteristiche e proprietà fondamentali

        - I quattro tipi architettura logica

        - UD7. Fisiologia del pensiero positronico

        - La dimensione del calcolo nell’ambito dell’intelligenza digitale

        - Principali metodi e algoritmi di Machine Learning, di analisi delle serie
        temporali e di Text Analysis

        - UD8. Il colore dei dati

        - Tecniche di comunicazione infografica

        - Principi della Data Visualization

        - UD9. La costruzione geometrica delle decisioni

        - Caratteristiche dell’attivazione

        - L’architettura logico-funzionale di un sistema decisionale automatico

        - UD10. Intelligenza digitale allo specchio

        - La dimensione dell’adattamento

        - Monitoraggio della qualità di un processo decisionale


        Modulo 2 - Metodi e strumenti della nuova intelligenza digitale


        - Acquisizione e archiviazione di dati digitali

        - Laboratorio di Machine Learning

        - Principi di Data storytelling

        - LLM e piattaforme di IA generativa

        - Agenti artificiali per produttività e processi aziendali'
      Testi/Bibliografia: '1. G. B. Ronsivalle, La nuova intelligenza digitale. Come
        trasformare i dati in decisioni per progettare il futuro. Maggioli, 2022

        2. G.B. Ronsivalle, I. Baccan, A. Bersan, The Orange Box. Laboratorio di Machine
        Learning. Wemole, 2024.'
      Metodi didattici: '- Lezioni frontali con il supporto di slide multimediali
        e contributi audio/video

        - Esercitazioni pratiche individuali e di gruppo mediante l’uso di applicativi
        gratuiti

        - Approfondimenti online e condivisione attiva di contenuti digitali in rete'
