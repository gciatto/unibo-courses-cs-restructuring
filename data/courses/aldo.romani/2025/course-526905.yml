syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526905
    title: 2025/2026 TECNOLOGIE MICROELETTRONICHE LM — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente comprende
        il principio di funzionamento dei principali dispositivi a semiconduttore
        per la realizzazione di circuiti integrati digitali ed analogici, per il calcolo
        ad elevate prestazioni, la conversione energetica per applicazioni di potenza
        e di monitoraggio ambientale. È in grado di analizzare le implicazioni delle
        opzioni tecnologiche sulle prestazioni dei dispositivi. Conosce le tecniche
        di fabbricazione dei circuiti integrati ad elevatissima scala di integrazione
        e le problematiche connesse con l'esigenza di un continuo sviluppo tecnologico.
        Conosce il flusso di progettazione dei circuiti integrati ed è in grado di
        progettare e caratterizzare elementi circuitali elementari.
      Contenuti: 'Meccanica quantistica e modelli semiclassici di trasporto: dualismo
        onda-particella.


        Equazione di Schroedinger; quantizzazione energetica; relazione di dispersione
        in un cristallo; semiconduttori a bandgap diretto ed indiretto.


        Approssimazione di massa efficace. Tunneling quanto-meccanico.


        Elettroni e lacune nei semiconduttori. Semiconduttori all''equilibrio. Trasporto
        di carica nei semiconduttori. Modello di trasporto drift-diffusion.


        Giunzione P-N - Diodi. Giunzione PN all''equilibrio. Giunzione PN fuori equilibrio.
        Calcolo della corrente ai morsetti. Principali effetti di non idealità. Effetti
        reattivi del diodo.


        Condensatore MOS. Analisi qualitativa e quantitativa. Calcolo della soglia
        e delle capacità.


        Transistore MOS. Modello di canale graduale. Funzionamento sottosoglia. Principali
        effetti di non idealità. MOS avanzati. Scaling. Effetti di canale corto.


        Celle fotovoltaiche.


        Transistori MOS di potenza.


        Dispositivi di potenza IGBT.


        Cenni a tecnologie wide-bandgap: Carburo di Silicio e Nitruro di Gallio.


        Tecnologia di fabbricazione dei circuiti integrati.


        Evoluzione della tecnologia microelettronica: caratteristiche di base della
        tecnologia microelettronica.


        Progettazione microelettronica, con particolare riferimento al flusso di progetto
        per circuiti integrati mediante l’uso di programmi CAD Electronic Design Automation
        (EDA)


        - Il processo CMOS: tecnologia, flusso di progettazione e relativi strumenti
        software. Richiami sul ritardo di propagazione e sul consumo di potenza di
        celle digitali in logica CMOS statica. Regole di composizione delle logiche
        statiche CMOS per la realizzazione di funzioni logiche complesse. Registri
        statici CMOS, ritardo di propagazione e tempi di setup/hold. Effetti parassiti
        associati al transistore MOS e alle interconnessioni. Richiami al simulatore
        circuitale SPICE.

        - Modelli del transistor MOS. Layout del transistore MOS. Cenni a variabilità
        dei parametri, corner di simulazione e matching dei dispositivi. Layout di
        macrocelle digitali mediante metodologia a celle standard. Regole di layout
        e controlli DRC. Controlli LVS. Estrazione dei parassiti e simulazione post-layout
        di macrocelle. Cenni a pad frame e protezioni ESD. Progettazione, layout e
        simulazione di macrocelle mediante software CAD EDA.

        - Tecnologie MEMS: processi di fabbricazione, esempi di strutture e sensori.'
      Testi/Bibliografia: 'Le dispense presentate a lezione vengono messe a disposizione
        dello studente in formato elettronico nei repository istituzionali. I seguenti
        volumi possono tuttavia essere utili allo studenti ai fini di consultazione


        Dispositivi per la microelettronica

        G. Ghione, Mc GrawHill Italia, 1998.


        Fundamentals of MODERN VLSI DEVICES

        Yuan Taur, Tak H. Ning

        Cambridge University Press

        ISBN 0 521 55959 6


        J. D. Plummer, M. D. Deal, P. B. Griffin, "Silicon VLSI Technology - Fundamentals,
        Practice and Modeling", Prentice Hall, 2000


        Richard S. Muller, Theodore I. Kamins, “Device Electronics for Integrated
        Circuits


        J. Rabaey, A. Chandrakasan, B. Nikolic, Digital Integrated Circuits: A Design
        Perspective, 2nd Edition 2003, Prenctice Hall. (http://bwrc.eecs.berkeley.edu/Classes/IcBook/index.html)


        R. Baker, CMOS Circuit Design, Layout, and Simulation, Third Edition, Wiley-IEEE
        Press, 2010. (http://cmosedu.com).'
      Metodi didattici: 'Lezioni in aula alla lavagna con il supporto di slide.


        lezioni pratiche da svolgersi presso il Laboratorio di Elettronica e Telecomunicazioni
        al fine di apprendere l''uso di strumenti CAD EDA per la progettazione di
        circuiti integrati. Oltre alla normale attività didattica, potranno essere
        previsti durante il corso alcuni seminari tenuti da esperti del settore, di
        estrazione universitaria e aziendale.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza alle attività di laboratorio di questa attività formativa richiede
        la preventiva partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio [https://elearning-sicurezza.unibo.it/],
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        è effettuata mediante una prova orale, e consiste in una serie di domande
        volte ad accertare la conoscenza degli aspetti tecnologici e concettuali presentati
        a lezione.


        Il raggiungimento da parte dello studente di una visione organica dei temi
        affrontati a lezione congiunta alla loro utilizzazione critica, la dimostrazione
        del possesso di una padronanza espressiva e di linguaggio specifico saranno
        valutati con voti di eccellenza. La conoscenza per lo più meccanica e/o mnemonica
        della materia, capacità di sintesi e di analisi non articolate e/o un linguaggio
        corretto ma non sempre appropriato porteranno a valutazioni discrete; lacune
        formative e/o linguaggio inappropriato – seppur in un contesto di conoscenze
        minimali del materiale d''esame - condurranno a voti che non supereranno la
        sufficienza. Lacune formative, linguaggio inappropriato, mancanza di orientamento
        all''interno dei materiali bibliografici offerti durante il corso non potranno
        che essere valutati negativamente.


        Inoltre, gli studenti dovranno sviluppare un progetto di un circuito digitale
        in una tecnologia CMOS di riferimento basandosi su celle standard, redigendo
        una relazione in cui dovranno essere evidenziate le principali scelte progettuali
        e valutate le prestazioni ottenute mediante simulazioni circuitali. L''esame
        consisterà nella discussione della relazione da parte dello studente e in
        un colloquio orale volto a verificare la conoscenza dei contenuti presentati
        nel corso. Costituiranno elementi di valutazione la conoscenza e l''applicazione
        dei concetti e delle tecniche di progetto presentate durante il corso, la
        padronanza dei concetti presentati, l''uso corretto del linguaggio tecnico
        della disciplina.'
      Strumenti a supporto della didattica: 'Oltre all’utilizzo della dotazione delle
        aule didattiche, il modulo prevede l''uso del laboratoriodi elettronica e
        di workstation CAD equipaggiate con software CAD EDA per la progettazione
        di circuiti integrati.


        Programmi di simulazione numerica a base fisica di dispositivi elettronici.'
      Orario di ricevimento: 'Consulta il sito web di Claudio Fiegna (https://www.unibo.it/sitoweb/claudio.fiegna)


        Consulta il sito web di Aldo Romani (https://www.unibo.it/sitoweb/aldo.romani)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/526905
    title: 2025/2026 TECNOLOGIE MICROELETTRONICHE LM — University of Bologna
    contents:
      Learning outcomes: By the end of the course, the student understands the operating
        principles and the fabrication technologies of the most important semiconductor
        devices that are present in digital, analog, and power circuits, with emphasis
        on applications in the fields of energy efficiency for environmental sustainability.
      Course contents: 'Quantum mechanics and semiclassical transport model: the wave
        particle dualism for the electron.


        The Schroedinger equation; energy quantization; dispersion relationship for
        a crystal: direct (Si) and indirect (GaAS) bandgap.


        The effective mass approximation. Quantum-mechanical tunneling.


        Electron and Holes in semiconductors. Semiconductors at equilibrium. Charge
        transport in semiconductors. Drift-diffusion transport model. P-N Junction
        at equilibrium and off equilibrium. P-N I-V characteristics. Non-ideality
        and non-stationary effects.


        MOS structure and MOS capacitor. Qualitative and quantitative analysis. Threshold
        voltage and capacitances.


        MOS transistor. Gradual channel approximation and I-V characteristics. Subthreshold.
        Non ideality effects. Scaling. Short channel effects. Advanced structures
        and fundamental limits.


        Photo-voltaics devices and modules. Power MOSFETs. Micro- and nano-electronics
        technology evolution.


        IC fabrication Technology


        Evolution of the CMOS Technology


        SOI Technology


        FinFET and Tri-gate MOSFETs


        Organic Semiconductors.


        Transistors based on organic semiconductors.


        Organic LEDs.


        Organic Photovoltaic cells.


        Microelectronic design, with focus on the design flow for integrated circuits
        based on CAD software foe EDA (Electronic Design Automation)


        - The CMOS process: technology, design flow and software tools. Recalling
        propagation delays and power consumption of static CMOS digital logic. Design
        rules for combinational logic on static CMOS. CMOS static registers, propagation
        delay, setup and hold times. Parasitic effects associated to the MOS transistors
        and interconnections. The SPICE circuit simulator.

        - Models of the MOS transistor. Layout of the MOS transistor. Variability
        of parameters, simulation corners and device matching. Layout of digital macrocells
        with standard cells. Design rules and DRC and LVS checks. Parasitic extraction
        and post-layout simulations of macrocells. Pad frames and ESD protections.
        Design, layout and simulation of macrocells with CAD EDA software tools.

        - MEMS technologies: fabrication processes, examples of basic structures and
        sensors.'
      Readings/Bibliography: 'Dispositivi per la microelettronica

        G. Ghione, Mc GrawHill Italia, 1998.


        Fundamentals of MODERN VLSI DEVICES

        Yuan Taur, Tak H. Ning

        Cambridge University Press

        ISBN 0 521 55959 6


        J. D. Plummer, M. D. Deal, P. B. Griffin, "Silicon VLSI Technology - Fundamentals,
        Practice and Modeling", Prentice Hall, 2000


        Richard S. Muller, Theodore I. Kamins, “Device Electronics for Integrated
        Circuits, 3rd Edition”, ISBN: 978-0-471-59398-0


        J. Rabaey, A. Chandrakasan, B. Nikolic, Digital Integrated Circuits: A Design
        Perspective, 2nd Edition 2003, Prenctice Hall. (http://bwrc.eecs.berkeley.edu/Classes/IcBook/index.html)


        R. Baker, CMOS Circuit Design, Layout, and Simulation, Third Edition, Wiley-IEEE
        Press, 2010. (http://cmosedu.com).'
      Teaching methods: 'Conventional teaching with blackboard and with the aid of
        slides.


        Laboratory experimental and simulation analysis of transistors and solar cells


        Hands-on lectures held in the Laboratory of Electronics and Telecommunications
        for practicing the use of CAD ESA software tools for the design of integrated
        circuits. In addition to normal teaching activity, during the course seminars
        held by experts from industry and/or research may be held.


        As concerns attendance of laboratory during this course unit, all students
        must attend in advance Module 1, 2 on Health and Safety online [https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas].'
      Assessment methods: 'The students will develop the design of a digital circuit
        based on standard cells in a reference CMOS technology. A technical report
        shall be delivered and shall present the main design choices and the achieved
        performance with circuit simulations. The report will be discussed in an oral
        examination that will also check the knowledge of the design concepts presented
        in the course.


        The most important elements of the assessments will include the knowledge
        and proper application of the concepts and of the design techniques presented
        in the course, the capability of autonomously applying the concepts presented
        in the course, and the correct use of the technical language of the discipline.


        Moreover, the students shall design a digital circuit in a reference CMOS
        technology based on standard cells, and will prepare a report or a presentation
        that highlights the main design choices and assesses the achieved performance
        by means of circuit simulations. The exam will consist in a discussion of
        the technical report and in an oral examination on the contents of the course.
        The most important elements of the assessments will include the knowledge
        and proper application of the concepts and of the design techniques presented
        in the course, the capability of autonomously applying the concepts presented
        in the course, and the correct use of the technical language of the discipline.'
      Teaching tools: 'Numerical simulation programs.


        Instrumentation for experimental characterization of transistors and solar
        cells.


        Recording of some lessons related to particularly significant concepts, or
        whose contents could lead to issues in relation to the students'' learning
        process, available through the "virtuale" platform.


        Besides conventional class equipment, the module will make extensive use of
        the laboratory of Electronics equipped with workstation with CAD EDA tools
        for microelectronic design.'
      Office hours: 'See the website of Claudio Fiegna (https://www.unibo.it/sitoweb/claudio.fiegna/en)


        See the website of Aldo Romani (https://www.unibo.it/sitoweb/aldo.romani/en)'
