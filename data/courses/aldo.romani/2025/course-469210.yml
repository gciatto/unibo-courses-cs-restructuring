  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/469210
    title: 2025/2026 ELETTRONICA DEI SISTEMI DIGITALI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente:


        - possiede le conoscenze per effettuare valutazioni critiche e scelte di progetto
        sulle principali architetture digitali di calcolo, elaborazione, comunicazione,
        memorizzazione dati

        - possiede competenze di base nella progettazione di sistemi digitali assistita
        da calcolatore e nei linguaggi di descrizione dell''hardware

        - è in grado di progettare semplici sistemi digitali basati su logiche programmabili
        e dispositivi a microcontrollore.'
      Contenuti: 'INTRODUZIONE: Introduzione ai circuiti e sistemi digitali.


        ARCHITETTURE DI CALCOLO ED ELABORAZIONE: Architettura dei Field-Programmable
        Gate Arrays. Considerazioni su granularità, area e prestazioni. Struttura
        di blocchi logici, switch e interconnessioni. Esempi di architetture di dispositivi
        FPGA. Microprocessori, classificazioni, architetture ed esempi. Gestione del
        parallelismo tramite architetture superscalari e VLIW. Microcontrollori. Il
        microcontrollore Microchip PIC18F, architettura, principali periferiche, gestione
        delle interruzioni. DSP: principali caratteristiche e confronto con microprocessori
        general-purpose. Programmazione dei sistemi a microcontrollore, con esempi
        in linguaggio C. Esercitazioni in laboratorio: progetto e programmazione di
        sistemi a microcontrollore elementari.


        PROTOCOLLI DI COMUNICAZIONE: Comunicazioni tramite porte seriali UART. Protocollo
        SPI. Protocollo I2C. Protocollo 1-wire. Protocollo USB.


        VHDL: Storia e scopo del linguaggio. VHDL come strumento di progetto. Flusso
        di progettazione per dispositivi FPGA. Entity e architecture. Statement concorrenti.
        Descrizioni strutturali e componenti. Operatori in VHDL. Operazioni aritmetiche
        in VHDL. Processi e costrutti sequenziali associati. Logiche sequenziali e
        registri. Regole di descrizione per VHDL sintetizzabile. Stile di descrizione
        RTL. Descrizione di macchine a stati finiti. Esempi di progetto e casi di
        studio. Esercitazioni di laboratorio: progetto, simulazione e sintesi logica
        di sistemi digitali tramite software CAD dedicato e schede di sviluppo FPGA.'
      Testi/Bibliografia: 'Dispense del corso disponibili online su Virtuale.


        Per approfondimenti, è possibile consultare:


        R. Jasinski, "Effective Coding with VHDL. Principles and practice", MIT Press,
        2016


        D. Perry, "VHDL. Programming by examples", McGraw-Hill Professional; 4th edition,
        2002


        F. Zappa, "Microcontrollers. Hardware and Firmware for 8-bit and 32-bit devices",
        1st edition, 2017, Esculapio


        J. Rose, A. El-Gamal, A. Sangiovanni-Vincentelli, "Architecture of Field-Programmable
        Gate Arrays", Proc. IEEE, vol. 81, n. 7, July 1993, pp.1013-1029'
      Metodi didattici: 'Durante l''attività didattica, una parte rilevante delle
        ore di lezione sarà dedicata a lezioni ed esercitazioni pratiche da svolgersi
        presso il laboratorio di elettronica al fine di apprendere l''uso dei linguaggi
        di descrizione hardware e degli strumenti software di progettazione di sistemi
        digitali assistita da calcolatore. Saranno previste esercitazioni a carattere
        pratico-progettuale su sistemi FPGA e a microcontrollore utilizzando software
        e hardware disponibile presso i laboratori.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza alle attività di laboratorio di questa attività formativa richiede
        la preventiva partecipazione di tutti gli studenti ai Moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio (https://elearning-sicurezza.unibo.it/),
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame sarà composto
        da due prove di accertamento. Il punteggio finale sarà calcolato effettuando
        la media dei punteggi ottenuti nelle due prove, che dovranno essere necessariamente
        sopra la soglia della sufficienza.


        La prima prova è a carattere pratico e verrà svolta presso il laboratorio
        di elettronica con l''ausilio del calcolatore: consiste nella progettazione,
        simulazione e sintesi di una rete digitale utilizzando il linguaggio di descrizione
        hardware VHDL e gli strumenti di sviluppo presentati nel corso. Le specifiche
        del problema da risolvere saranno illustrate nel testo consegnato all''inizio
        della prova. Ai fini della valutazione saranno considerati rilevanti la correttezza
        dell''impostazione del progetto logico, la correttezza dell''implementazione
        VHDL del progetto, la capacità di validare il funzionamento della rete digitale
        progettata mediante l''applicazione di opportuni segnali esterni in simulazioni
        digitali.


        La seconda prova ha carattere orale e dovrà accertare la conoscenza teorica
        e critica da parte dello studente dei contenuti presentati in aula a lezione:
        consiste nella discussione di quesiti sulle relative parti di programma del
        corso. Ai fini della valutazione saranno considerati rilevanti la comprensione
        dei contenuti del corso e la capacità di ragionamento sugli stessi, oltre
        ad un utilizzo corretto del linguaggio tecnico della disciplina.


        In ogni appello vi sarà la possibilità di svolgere entrambe le prove. Per
        sostenere la seconda prova sarà comunque necessario avere ottenuto una valutazione
        positiva nella prima prova. La seconda prova potrà essere svolta sia nel medesimo
        appello in cui è stata superata la prima prova che in appelli diversi.'
      Strumenti a supporto della didattica: Videoproiettore, PC. Dispense on-line.
        Laboratorio di elettronica per apprendere tecniche e strumenti per la progettazione
        assistita da calcolatore di sistemi digitali e per la realizzazione e la programmazione
        di sistemi digitali basati su FPGA e su microcontrollori. Schede di sviluppo
        per FPGA e microcontrollori da utilizzare durante esercitazioni e lezioni
        pratiche.
      Orario di ricevimento: Consulta il sito web di Aldo Romani (https://www.unibo.it/sitoweb/aldo.romani)
      SDGs: 'Imprese innovazione e infrastrutture


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/469210
    title: 2025/2026 Electronics of Digital Systems — University of Bologna
    contents:
      Learning outcomes: The course will provide know-how about the design of digital
        systems. Upon attendance of the course, the student will learn to perform,
        from the designer's perspective, analyses and critical assessments of the
        main architectures for computing, communications, data storage. The course
        will also focus on learning computer aided digital design techniques and hardware
        description languages (HDL), with a special attention to programmable logic
        devices, logic synthesis and simulation. At the end of the course, the student
        will be able to develop digital systems based on programmable logic and microcontrollers.
      Course contents: 'INTRODUCTION. Introduction to digital circuits and systems.


        ARCHITECTURES. Architecture of Field-Programmable Gate Arrays. Granularity,
        area and performance. Logic blocks, switches, interconnections. Examples of
        architecture of FPGA devices. Microprocessors, classification, architectures
        and examples. Parallel architectures: superscalar and VLIW. Microcontrollers.
        The Microchip PIC18F microcontroller, architecture, main peripherals, interrupts.
        Microcontroller programming, with examples in C language. DSP: main features
        and comparison with general-purpose microprocessors. Laboratory sessions:
        design and programming of basic microcontroller systems.


        COMMUNICATION PROTOCOLS. Serial communication with UART ports. SPI protocol.
        I2C protocol. 1-wire protocol. USB protocol.


        VHDL: history and purposes. VHDL as a design tool. Design flow for FPGAs.
        Entity and architectures. Concurrent statements. Structural descriptions and
        components. VHDL operators. Arithmetics in VHDL. Processes and sequential
        constructs. Sequential logic and registers. Description style for synthesizable
        VHDL. RTL descriptions. Finite State Machines. Design examples. Laboratory
        sessions: design of digital systems with CAD EDA tools and FPGA hardware development
        boards.'
      Readings/Bibliography: 'Course materials available online on institutional repositories
        (Virtuale).


        For further insights:


        R. Jasinski, "Effective Coding with VHDL. Principles and practice", MIT Press,
        2016


        D. Perry, "VHDL. Programming by examples", McGraw-Hill Professional; 4th edition,
        2002


        F. Zappa, "Microcontrollers. Hardware and Firmware for 8-bit and 32-bit devices",
        1st edition, 2017, Esculapio


        J. Rose, A. El-Gamal, A. Sangiovanni-Vincentelli, "Architecture of Field-Programmable
        Gate Arrays", Proc. IEEE, vol. 81, n. 7, July 1993, pp.1013-1029'
      Teaching methods: 'Besides normal class activity, a relevant part of the course
        will be spent in the laboratory of Electronics in order to learn hardware
        description languages and digital design tools. Many laboratory sessions will
        focus on practicing FPGA design and microcontroller programming, with the
        aid of software tools and hardware development boards available in the laboratories.


        As concerns attendance of laboratory during this course unit, all students
        must attend in advance Module 1, 2 on Health and Safety online (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas).'
      Assessment methods: 'The assessment is composed of two independent parts:


        - The first part is a practical examination, which will be held in the laboratories,
        consisting in the design of a simple digital system with the VHDL language
        and the synthesis/simulation tools presented in this course. The specifications
        to be addressed will be presented in the text of the problem. The exam aims
        at assessing the correctness of the proposed digital architecture, the correctness
        of the VHDL implementation, the ability of validating the design by means
        of dedicated digital simulations.

        - The second part consists in an oral examination, about the contents presented
        during the course, consisting in the discussion of questions in order to verify
        the knowledge and comprehension of course contents. The exam aims at assessing
        the actual comprehension level of course contents, the ability of elaborating
        course contents and the use of the specific technical language of the course.


        The final score will be computed as the average between the scores obtained
        in the two parts, which must be both sufficient.


        In every exam session it will be possible to participate to both parts. In
        order to participate to the second part it is necessary to have obtained a
        positive assessment in the first part. The second part may be taken either
        in the same exam session with the first part or in a different exam session.'
      Teaching tools: Presentations and class notes available online. Laboratory sessions
        on computer aided digital design and practice on FPGA and microcontroller
        systems. Development boards for FPGA and microcontrollers.
      Office hours: See the website of Aldo Romani (https://www.unibo.it/sitoweb/aldo.romani/en)
      SDGs: 'Industry, innovation and infrastructure


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
