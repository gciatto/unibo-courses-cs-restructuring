  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/461145
    title: 2025/2026 PROGETTAZIONE DI APPLICAZIONI WEB T — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente padroneggia
        i principi della progettazione e dello sviluppo di applicazioni Web, con particolare
        attenzione ad applicazioni di tipo “data-intensive”.
      Contenuti: "Modelli per la progettazione di applicazioni Web\n\n- Modello dati:\
        \ E/R e UML\n- Modello ipertestuale (WebML)\n- Modello di gestione dei contenuti\
        \ (WebML)\n\nProgettazione di applicazioni Web\n\n- Panoramica del processo\
        \ di sviluppo\n- Accenni a analisi dei requisiti e data design\n- Design ipertestuale\
        \ in WebML\n\nImplementazione di applicazioni Web\n\n- Architecture design\
        \ e organizzazione multilivello: servizi, logica di business e application\n\
        - Implementazione dei dati\n- Implementazione ipertestuale\n- Strumenti per\
        \ lo sviluppo basato su modelli: Web Ratio e IFML.\n  Servizi: Modelli e tecnologie\
        \ per la gestione efficace ed efficiente del conflitto di impedenza\n- Accesso\
        \ diretto a basi dati: Interfacce e astrazioni\n- Architetture a oggetti e\
        \ database relazionali: Conflitto d'impedenza\n- Metodologie di progettazione\
        \ e sviluppo della persistenza dei dati\n  \n  - L'approccio forza bruta (JDBC)\n\
        \  - Il pattern DAO\n  - Il framework Object-Relational Mapping (ORM) - Entity\
        \ Beans - libreria Hibernate\n\nServizi: Modelli transazionali\n\n- Livelli\
        \ di isolamento\n- Gestione delle transazioni in JDBC, JTA e Hibernate\n\n\
        Descrizione delle informazioni e XML\n\n- Descrizione delle informazioni:\
        \ XML e XHTML\n- Tipizzazione di XML: DTD vs. XML Schema\n- Accenni a XSL\
        \ e XSLT\n- XML e Java: Parser XML (modelli DOM e SAX)\n\nN.B. Parte significativa\
        \ del corso è dedicata allo svolgimento di esercitazioni guidate in laboratorio.E'\
        \ richiesta una buona conoscenza del linguaggio Java e del suo framework applicativo,\
        \ oltre che dei fondamenti di Tecnologie Web e Basi di Dati."
      Testi/Bibliografia: 'Lucidi delle lezioni disponibili sul sito Web del corso.
        Per ulteriori approfondimenti lo studente può far riferimento anche ai seguenti
        testi e link:


        W3C, XML

        XML In a Nutshell, Second Edition, by Elliotte Rusty Harold and W. Scott Means.
        O''Reilly.

        http://www.w3.org/XML/

        http://www.w3.org/Style/XSL/


        Design Web Applications

        Progettazione di dati e applicazioni per il web, by Stefano Ceri et al. McGraw-Hill

        Designing data-intensive web applications, by Stefano Ceri et al. Morgan Kaufmann

        Interaction Flow Modeling Language: Model-Driven UI Engineering of Web and
        Mobile Apps with IFML, by Marco Brambilla at al. Morgan Kaufmann


        Hibernate


        Java persistence with Hibernate - Bauer - Manning'
      Metodi didattici: 'Il corso viene erogato in aula mediante proiezione di slide
        (disponibili sul sito Web del corso). Le lezioni sono integrate da esercitazioni
        pratiche guidate dai docenti in laboratorio (circa il 30% delle ore). Ogni
        esercitazione in laboratorio affronta uno specifico argomento trattato a lezione
        proponendo esercizi concreti (richiedendo l''utilizzo di IDE e tool di programmazione
        specifici).


        Tutte le lezioni sono tenute in italiano. È quindi necessaria la comprensione
        della lingua italiana per seguire con profitto il corso e per poter utilizzare
        il materiale didattico fornito.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene attraverso un esame finale che accerta l’acquisizione delle conoscenze
        e delle abilità attese tramite lo svolgimento di una prova pratica svolta
        in laboratorio, comprendente anche alcune domande relative all''intero programma.


        Per poter partecipare alla prova pratica è necessario iscriversi alla lista
        dell''appello tramite l''applicativo AlmaEsami.


        Per superare la prova pratica di laboratorio, è necessario totalizzare almeno
        18 punti (su un totale disponibile di 33), risultando sufficienti su tutti
        gli esercizi.


        Il massimo punteggio sarà garantito agli studenti che dimostreranno di aver
        compreso ed essere capaci di utilizzare tutti i contenuti dell''insegnamento,
        illustrandoli con capacità di linguaggio, e risolvendo problemi anche complessi
        non necessariamente incontrati a lezione. L''attribuzione del punteggio minimo
        potrà essere dovuta all''insufficiente conoscenza dei concetti chiave, alla
        mancata padronanza del linguaggio tecnico, alla mancata o insufficiente capacità
        di astrazione dei concetti.'
      Strumenti a supporto della didattica: In aula si usano slide (disponibili sul
        sito Web del corso). In laboratorio sono presenti strumenti di sviluppo e
        di supporto alla esecuzione delle esercitazioni (es. Eclipse). Gli studenti
        sono invitati a familiarizzare con questi o altri strumenti di uso personale.
      Link ad altre eventuali informazioni: http://www-db.disi.unibo.it/courses/PAW/
      Orario di ricevimento: Consulta il sito web di Ilaria Bartolini (https://www.unibo.it/sitoweb/ilaria.bartolini)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/461145
    title: 2025/2026 Design of Web Applications T — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student masters the principles
        of the design and development of Web applications, with particular attention
        to data-intensive applications.
      Course contents: 'Models for Designing Web Applications


        - Data model: E/R e UML

        - Hypertext model (WebML)

        - Content management model (WebML)


        Design of Web Applications


        - Overview of the development process

        - Requirements specifications and data design

        - Hypertext design in WebML


        Implementation of Web Applications


        - Architecture design and multilayer organisation: Services, Business Logic,
        and Application

        - Data implementation

        - Hypertext implementation

        - Tools for model-based development of Web applications: Web Ratio and IFML


        Services: Models and technologies for the effective and efficient management
        of the impedance mismatch


        - Direct access to databases: Interfaces and abstractions

        - Object-based architectures vs. relational databases: The impedance mismatch

        - Methodologies for persistence designing and developing: The "brute force"
        approach (JDBC), pattern DAO, and Object-Relational Mapping (ORM) - Entity
        Beans - Hibernate library


        Services: Transactional models


        - Isolation levels

        - Transactional models: JDBC, JTA e Hibernate


        Data description and XML


        - Descrizione delle informazioni: XML e XHTML

        - Tipizzazione di XML: DTD vs. XML Schema

        - Accenni a XSL e XSLT

        - XML e Java: Parser XML (modelli DOM e SAX)


        N.B. Significant part of the course is dedicated to carrying out guided laboratory
        exercises. A good knowledge of Java language and its application framework
        is required, as well as the fundamentals of Web Technologies and Databases.'
      Readings/Bibliography: 'All the lectures slides are available for download at
        the course Web site. For further information the student can refer the following
        books and links:


        W3C, XML

        XML In a Nutshell, Second Edition, by Elliotte Rusty Harold and W. Scott Means.
        O''Reilly.

        http://www.w3.org/XML/

        http://www.w3.org/Style/XSL/


        Design Web Applications

        Progettazione di dati e applicazioni per il web, by Stefano Ceri et al. McGraw-Hill

        Designing data-intensive web applications, by Stefano Ceri et al. Morgan Kaufmann

        Interaction Flow Modeling Language: Model-Driven UI Engineering of Web and
        Mobile Apps with IFML, by Marco Brambilla at al. Morgan Kaufmann


        Hibernate

        Java persistence with Hibernate - Bauer - Manning'
      Teaching methods: 'Most course lectures are in "traditional" classrooms and
        exploit the slides available at the Course Web site. A non-negligible part
        of the course (around 30% of the hours) is composed by lab exercises, with
        proposed tasks and supervised by teachers and tutors. Each lab exercise addresses
        a topic presented and discussed in the previous classroom lectures, within
        a practical and operational perspective (also usage of state-of-the-art development
        and programming tools).


        Fluent spoken and written italian is a necessary pre-requisite: all lectures
        and tutorials, and all study material will be in italian.


        In view of the type of activities and teaching methods adopted, the attendance
        of this training activity requires the prior participation of all students
        in Modules 1 and 2 of safety training in the workplace, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode.'
      Assessment methods: 'Achievements will be assessed by means of a final exam.
        This is based on an analytical assessment of the "expected learning outcomes"
        described above. In order to properly assess such achievement the examination
        is composed of a practical programming session, including also some questions
        covering the whole course program.


        To participate to the lab programming exam, interested students have to register
        themselves by exploiting the usual UniBO Web application, called AlmaEsami.


        In order to pass the practical programming exam, a minimum grade of 18 points
        is needed (over a total of 33 points): a sufficient score is needed in all
        provided exercises.


        The maximum grade will be awarded to students who demonstrate an organic understanding
        of the subject, a high ability for critical application, and a clear and concise
        presentation of the contents. The minimum grade will be awarded if the student
        shows knowledge gaps in key-concepts of the subject, inappropriate use of
        language, and/or logic failures in the analysis of the subject.'
      Teaching tools: In traditional classrooms, the course lectures will make extensive
        usage of slides (available at the course Web site). In lab, the course will
        use state-of-the-art development, IDE, and runtime support tools (e.g., Eclipse).
        Students must learn how to practically and effectively use these tools (or
        other alternative tools), as an additional, practical, and relevant outcome
        of the course.
      Links to further information: http://www-db.disi.unibo.it/courses/PAW/
      Office hours: See the website of Ilaria Bartolini (https://www.unibo.it/sitoweb/ilaria.bartolini/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
