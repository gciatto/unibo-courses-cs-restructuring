syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523514
    title: 2025/2026 METODI E TECNOLOGIE PER L'INTERPRETAZIONE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Lo/a studente/ssa


        - conosce ed è capace di utilizzare gli strumenti di ricerca e di documentazione
        tradizionali ed elettronici e gli ausili informatici e telematici necessari
        all''interpretazione di discorsi orali

        - conosce ed è capace di utilizzare gli strumenti terminografici necessari
        all’interpretazione di discorsi orali

        - ha le competenze terminologiche di base strumentali alla resa interpretativa

        - è in grado di costruire autonomamente banche dati terminologiche strumentali
        alla resa interpretativa.'
      Contenuti: 'Il corso fa parte del corso integrato METODI, TECNOLOGIE E LINGUISTICA
        PER L''INTERPRETAZIONE e si svolge nel secondo semestre.


        Durante l''intero corso ci si concentra sui vari aspetti legati alla ricerca
        documentale e terminologica, strettamente connesse tra loro.


        Nella prima parte del corso ci si concentrerà in particolare sulle varie strategie
        di documentazione a disposizione dell''interprete, tradizionali da un lato
        e supportate dall''Intelligenza Artificiale (IA) dall''altro, funzionali nella
        fase di preparazione dell''interprete di conferenza. Dopo una panoramica sulle
        tecniche avanzate di uso dei motori di ricerca online, ci si soffermerà sulla
        costruzione e sull''utilizzo di corpora elettronici specialistici mirati all''estrazione
        terminologica attraverso l''uso di software dedicati, nella fattispecie BootCaT,
        anche con il supporto dell''IA.


        Nella seconda parte del corso verranno poi illustrati gli aspetti teorici
        della terminologia e verranno fornite le basi per l''estrazione terminologica
        con l''ausilio di strumenti dedicati, in particolare AntConc. Anche in questa
        fase del lavoro, i metodi di estrazione tradizionali verranno messi a confronti
        con metodi supportati dall''IA.


        Verranno infine presentati alcuni dei principali strumenti terminografici
        per la creazione e la gestione di glossari e database terminologici (MultiTerm),
        con particolare riferimento ai software che consentono anche la consultazione
        dei glossari in cabina di interpretazione durante la conferenza (Interplex,
        InterpretBank).'
      Testi/Bibliografia: 'Durante le lezioni di carattere più teorico, la docente
        farà riferimento alla seguente bibliografia:


        Biber, D., Conrad, S., & Reppen, R. (1998). Corpus Linguistics: Investigating
        language Structure and Use. Cambridge: Cambridge University Press


        Cabré M.T. (1993). “La terminología. Teoría, metodología, aplicaciones”, Editorial
        Empúries


        Berber-Irabian (2010). “New Technologies and Electronic Tools in Conference
        Interpreting” Doctoral dissertation ISG Tarragona


        Fantinuoli C. (2018) "The use of comparable corpora in interpreting practice
        and teaching". The Interpreters'' Newsletter 23, 133-149


        Fantinuoli C. (2019) "The technological turn in interpreting: the challenges
        that lie ahead". Proceedings of the conference Übersetzen und Dolmetschen
        4.0. - Neue Wege im digitalen Zeitalter, 334-354


        Fantinuoli C., Pisani E. (2021) "Measuring the impact of automatic speech
        recognition on interpreter’s performances in simultaneous interpreting", In:
        Empirical studies of translation and interpreting: the post-structuralist
        apporach, Edited by Caiwen Wang and Binghan Zheng. Routledge


        Felber H. (1984). “Terminology Manual”, Infoterm-UNESCO


        Gnoli C. (2004). “Classificazione a faccette”, AIB


        Gouadec D. (1990). “Terminologie: constitution des données”, Association Française
        de Normalisation


        Kalina, S. (2010). “New Technologies in Conference Interpreting” in Lee-Jahnke
        & Prunc (eds.), Am Schnittpunkt von Philologie und Translationswissenschaft.
        Festschrift zu Ehren von Martin Forstner. Bern: Peter Lang, 79-96


        Kockaert, H. J. and Steurs, F. (eds.) (2015) Handbook of Terminology. Amsterdam
        and Philadelphia: John Benjamins.


        Lecci C. (2021): “Interpretazione e nuove tecnologie”. Russo, Mariachiara
        (a cura di) “Interpretare da e verso l’italiano: didattica e innovazione per
        la formazione dell’interprete”. Bologna: BUP. Disponibile online: https://buponline.com/az13zg/uploads/woocommerce_uploads/interpretare-da-e-verso-italiano.pdf


        Manning, C. and Schütze, H. (1999).Foundations of Statistical Natural Language
        Processing. MIT Press. Cambridge, MA


        Magris M., Musacchio M. T., Rega L., Scarpa F. (2002). “Manuale di terminologia,
        Aspetti teorici, metodologici e applicativi”, Hoepli


        Rey A. (1992). “La terminologie noms et notions”, Presses Universitaires de
        France,

        Rondeau G., 1997. “Introduction à la terminologie”, Gaëtan Morin


        Sager J. C. (1990). “A Practical Course in Terminology Processing”, John Benjamins
        Publishing Company


        Sinclair, J. (1991). Corpus, Concordance, Collocation. Oxford: Oxford University
        Press


        Wright, S. E. & Budin, G. (2001). “Handbook of terminology management”, John
        Benjamins Publishing Co.'
      Metodi didattici: 'Le lezioni si svolgono in forma di workshop e si articolano
        secondo uno schema ben definito che unisce aspetti teorici a una forte componente
        pratica e applicativa.


        I contributi teorici vengono trasmessi attraverso presentazioni da parte del
        docente ed eventualmente letture di approfondimento assegnate alle studentesse
        e agli studenti durante il corso. La loro acquisizione viene verificata, oltre
        che nella prova finale, attraverso relazioni periodiche individuali e di gruppo
        in classe.


        La componente pratica consiste di esercitazioni in laboratorio, esercizi di
        consolidamento da svolgere a casa e successiva discussione in classe e risoluzione
        dei problemi emersi nell''attività esercitatoria per permettere un monitoraggio
        puntuale e costante dello sviluppo delle capacità tecnologiche oggetto del
        corso.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutte le studentesse e tutti gli studenti ai moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio (https://elearning-sicurezza.unibo.it/),
        in modalità e-learning.


        Il corso prevede l''obbligo di frequenza pari al 70%.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame finale consiste
        in una prova orale in cui la studentessa o lo studente presenterà un progetto
        di documentazione e ricerca terminologica su un argomento a scelta.


        Il progetto dovrà essere preparato a casa e consisterà in:


        - due corpora specialistici bilingue costruiti con metodi semiautomatici (BootCaT)

        - un glossario/database terminologico in vari formati contenente la terminologia
        estratta dai corpora.


        Durante la prova verranno inoltre accertati l''uso degli strumenti presentati
        durante il corso (in particolare Interplex e InterpretBank) e la conoscenza
        dei principi teorici della terminologia.


        Il punteggio assegnato al progetto è pari 20 punti: errori gravi o omissioni
        saranno penalizzati con due punti ciascuno, errori di distrazione saranno
        penalizzati con 1 punto ciascuno.


        Il punteggio assegnato alla presentazione orale è pari a 10 punti. I criteri
        di valutazione saranno: correttezza, completezza e chiarezza delle informazioni
        presentate. 10 punti saranno attribuiti ad una presentazione eccellente; 7-9
        punti ad una presentazione con errori minori; 4-6 punti ad una presentazione
        incompleta e con acquisizione parziale delle conoscenze richieste; 1-3 punti
        ad una presentazione sufficiente, ma con evidenti limiti nelle conoscenze;
        0 punti ad una presentazione insufficiente.


        Il voto totale del corso integrato di METODI, TECNOLOGIE E LINGUISTICA PER
        L''INTERPRETAZIONE consisterà nella media aritmetica tra i moduli di Metodi
        e Tecnologie per l''Interpretazione e Linguistica per interpreti.


        Gli esiti vengono comunicati qualche giorno dopo tramite la piattaforma Moodle.


        Studentesse e studenti con DSA o disabilità temporanee o permanenti (inclusi
        gravi problemi di salute che interferiscono con il normale svolgimento degli
        studi) sono pregati di contattare tempestivamente l’ufficio di Ateneo responsabile
        (Servizio per gli Studenti con Disabilità e con DSA: https://site.unibo.it/studenti-con-disabilita-e-dsa/it),
        possibilmente prima dell’inizio del corso. Nota bene: sarà cura dell’Ufficio
        preposto proporre alle studentesse e agli studenti interessati eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni
        dalla data dell’esame, all’approvazione del/della docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Le lezioni si svolgono in laboratorio
        informatico con collegamento internet e videoproiettore e con tutti i software
        utili per la didattica.


        Data la modalità di erogazione delle lezioni, in forma di workshop con ampi
        spazi per le esercitazioni pratiche, le studentesse e gli studenti hanno la
        possibilità di utilizzare i principali applicativi software utilizzati nel
        campo della documentazione e della terminologia, sia proprietari sia open-source
        o comunque di libero accesso.


        I materiali didattici (testi, presentazioni, manuali d''uso ecc) sono resi
        disponibili attraverso la piattaforma e-learning Moodle.'
      Link ad altre eventuali informazioni: https://moodle.dipintra.it/course/view.php?id=64
      Orario di ricevimento: Consulta il sito web di Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523514
    title: 2025/2026 Methods and Technologies for Interpreting — University of Bologna
    contents:
      Learning outcomes: The student – knows and is able to use the ICT resources,
        both traditional and electronic, required for the interpretation of oral speeches.
        S/he knows and is able to use the terminography tools necessary for the interpretation
        of oral speeches. S/he has the basic terminology skills required for the interpretation.
        S/he is able to autonomously build terminology databases necessary for the
        interpretation of oral speeches.
      Course contents: 'The module is delivered in the second semester and is one
        of the two modules that make up the METODI, TECNOLOGIE E LINGUISTICA PER L''INTERPRETAZIONE
        course.


        The course focuses on various aspects of documentation and terminology research,
        which are closely linked to each other.


        The first part of the course focuses on the various documentation strategies,
        traditional on the one hand and supported by Artificial Intelligence (AI)
        on the other, useful for the preparation of conference interpreters. Following
        an overview of advanced techniques for web searching using search engines,
        special emphasis will be placed on the construction and use of electronic
        specialised corpora aimed at terminology extraction (with the help of BootCaT
        and also with the support of AI).


        Then the theoretical basis of terminology are presented together with the
        basic tools for the detection of terminology, namely AntConC. Also at this
        stage of the workflow, traditional extraction methods will be compared with
        AI-supported methods.


        Finally, some of the main terminographic tools for creating and managing glossaries
        and terminology databases will be presented (MultiTerm), with particular reference
        to software that also allows glossaries to be consulted in the interpretation
        booth during the conference (Interplex, InterpretBank).'
      Readings/Bibliography: 'During lessons based on theoretical aspects, the teacher
        will be using the following bibliographical references:


        Biber, D., Conrad, S., & Reppen, R. (1998). Corpus Linguistics: Investigating
        language Structure and Use. Cambridge: Cambridge University Press


        Cabré M.T. (1993). “La terminología. Teoría, metodología, aplicaciones”, Editorial
        Empúries


        Berber-Irabian (2010). “New Technologies and Electronic Tools in Conference
        Interpreting” Doctoral dissertation ISG Tarragona


        Fantinuoli C. (2018) "The use of comparable corpora in interpreting practice
        and teaching". The Interpreters'' Newsletter 23, 133-149


        Fantinuoli C. (2019) "The technological turn in interpreting: the challenges
        that lie ahead". Proceedings of the conference Übersetzen und Dolmetschen
        4.0. - Neue Wege im digitalen Zeitalter, 334-354


        Fantinuoli C., Pisani E. (2021) "Measuring the impact of automatic speech
        recognition on interpreter’s performances in simultaneous interpreting", In:
        Empirical studies of translation and interpreting: the post-structuralist
        apporach, Edited by Caiwen Wang and Binghan Zheng. Routledge


        Felber H. (1984). “Terminology Manual”, Infoterm-UNESCO


        Gnoli C. (2004). “Classificazione a faccette”, AIB


        Gouadec D. (1990). “Terminologie: constitution des données”, Association Française
        de Normalisation


        Kalina, S. (2010). “New Technologies in Conference Interpreting” in Lee-Jahnke
        & Prunc (eds.), Am Schnittpunkt von Philologie und Translationswissenschaft.
        Festschrift zu Ehren von Martin Forstner. Bern: Peter Lang, 79-96


        Kockaert, H. J. and Steurs, F. (eds.) (2015) Handbook of Terminology. Amsterdam
        and Philadelphia: John Benjamins.


        Lecci C. (2021): “Interpretazione e nuove tecnologie”. Russo, Mariachiara
        (a cura di) “Interpretare da e verso l’italiano: didattica e innovazione per
        la formazione dell’interprete”. Bologna: BUP. Disponibile online: https://buponline.com/az13zg/uploads/woocommerce_uploads/interpretare-da-e-verso-italiano.pdf


        Manning, C. and Schütze, H. (1999).Foundations of Statistical Natural Language
        Processing. MIT Press. Cambridge, MA


        Magris M., Musacchio M. T., Rega L., Scarpa F. (2002). “Manuale di terminologia,
        Aspetti teorici, metodologici e applicativi”, Hoepli


        Rey A. (1992). “La terminologie noms et notions”, Presses Universitaires de
        France,

        Rondeau G., 1997. “Introduction à la terminologie”, Gaëtan Morin


        Sager J. C. (1990). “A Practical Course in Terminology Processing”, John Benjamins
        Publishing Company


        Sinclair, J. (1991). Corpus, Concordance, Collocation. Oxford: Oxford University
        Press


        Wright, S. E. & Budin, G. (2001). “Handbook of terminology management”, John
        Benjamins Publishing Co.'
      Teaching methods: 'Lessons take the form of workshops and combine theoretical
        aspects with a strong practical and applicative component.


        The theoretical aspects are presented by the lecturer and deepened independently
        by the students through readings assigned during the course.


        The applied part consists of hands-on practice in the laboratory and homework
        exercises. These are discussed during troubleshooting sessions in the following
        class, so as to constantly monitor progress in the development of the technological
        skills that make the object of the course.


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        online.


        Attendance is compulsory (at least 70% of lessons need to be attended).'
      Assessment methods: 'The final exam consists in an oral test. The student will
        be asked to present a documentary and terminological research project prepared
        at home.


        The project must contain:


        - two specialized bilingual corpora built with semiautomatic methods (BootCaT)

        - a terminology database in different formats containing the specific terminology
        extracted.


        Moreover, during the oral exam, the use of the tools presented in class and
        the knowledge of the theoretical basis of terminology will be ascertained
        (in particular Interplex and IntrepretBank).


        The project is worth 20 points: major errors or omissions will be penalised
        by 2 points each, distracting or minor errors will be penalised by 1 point
        each.


        The oral presentation is worth 10 points. The evaluation criteria will be:
        correctness, completeness and clarity of the information presented. 10 points
        will be awarded for an excellent presentation; 7-9 points for a presentation
        with minor errors; 4-6 points for an incomplete presentation and partial acquisition
        of the required knowledge; 1-3 points for a sufficient presentation, but with
        evident limitations in knowledge; 0 points for an insufficient presentation.


        The overall mark for the integrated course METODI, TECNOLOGIE E LINGUISTICA
        PER L''INTERPRETAZIONE will consist of the arithmetic mean of the modules
        Metodi e Tecnologie per l''Interpretazione and Linguistica per interpreti.


        The final marks are published a few days later through the Moodle platform.


        Students with specific learning difficulties (SpLD) or with disabilities that
        can affect their ability to attend courses are invited to contact the University
        service for students with disabilities and SLD at the earliest opportunity
        -- ideally before the start of the course: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students.
        The University service will suggest possible adjustments to the course work
        and/or exam, which must then be submitted to the course leader so they can
        assess their feasibility, in line with the learning objectives of the course.
        Please note that adjustments to the exam must be requested at least two weeks
        in advance.'
      Teaching tools: 'Lessons are held in a computer lab with internet connection,
        beamer and software useful for didactics.


        Since lessons take the form of workshops, with substantial time devoted to
        pratical hands-on exercises, students have the possibility to become acquainted
        with the main software programs used in the fields of documentation and terminology,
        both proprietary and open-source/free.


        Support materials (texts, slides, instructions etc.) are made available through
        the Moodle e-learning platform.'
      Links to further information: https://moodle.dipintra.it/course/view.php?id=64
      Office hours: See the website of Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2/en)
      SDGs: 'Quality education Decent work and economic growth


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
