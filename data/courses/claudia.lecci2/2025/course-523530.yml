        Ryan, Marie-Laure (2004) (ed.) Narrative Across Media: the languages of storytelling.
        University of Nebraska Press. Salway, Andrew and Graham, Mike (2003) "Extracting
        Information about Emotions in Films". In Proceedings. 11th ACM Conference
        on Multimedia 2003, 4th-6th Nov. 2003, pp. 299-302


        Romero-Fresco, P. (2015). “Respeaking”. In F. Pöchhacker, N. Grbić, P. Mead
        e R. Setton (2015). 350-351


        Romero-Fresco, P. e J. Martínez Pérez (2015) “Accuracy Rate in Live Subtitling:
        The NER Model”. In R. Baños Piñero e J. Díaz Cintas (2015). 28-50


        Sandrelli, A. (2021) “Eventi dal vivo e accessibilità: Uno studio di caso
        sul respeaking interlinguistico”. Lingue e Linguaggi, 43, 145-168.'
      Metodi didattici: 'Le lezioni si svolgeranno sotto forma di workshop con introduzione
        teorica ai vari argomenti presentati e successive esercitazioni pratiche di
        potenziamento (consultazione di glossari in tempo reale con InterpretBank
        e trascrizione di testi scritti e orali tramite riconoscimento vocale con
        produzione di sottotitoli).


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutte le studentesse e tutti gli studenti ai moduli 1 e 2 di formazione
        sulla sicurezza nei luoghi di studio (https://elearning-sicurezza.unibo.it/),
        in modalità e-learning.


        Per chi frequenta il curriculum InConf il corso prevede l''obbligo di frequenza
        pari al 70%.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        consisterà in una prova pratica da svolgersi durante le sessioni d''esame
        in cabina di interpretazione.


        In particolare verrà verificata e valutata la capacità di produrre un testo
        scritto a partire da un file audio della durata di 5 minuti.


        Il software utilizzato sarà uno a scelta tra DIT.tafono e Dragon NS.


        La prova verrà valutata in trentesimi. Errori gravi (omissioni o trascrizioni
        completamente errate) comporteranno la sottrazione di 2 punti ciascuno; errori
        intermedi (trascrizioni non esattamente corrispondenti all''originale, ma
        compatibili con il testo) la sottrazione di 1 punto ciascuno; errori formali
        o di distrazione (ad esempio maiuscole/minuscole) la sottrazione di 0,5 punti
        ciascuno.


        Gli esiti vengono comunicati qualche giorno dopo tramite la piattaforma Moodle.


        Studentesse e studenti con DSA o disabilità temporanee o permanenti (inclusi
        gravi problemi di salute che interferiscono con il normale svolgimento degli
        studi) sono pregati di contattare tempestivamente l’ufficio di Ateneo responsabile
        (Servizio per gli Studenti con Disabilità e con DSA: https://site.unibo.it/studenti-con-disabilita-e-dsa/it),
        possibilmente prima dell’inizio del corso. Nota bene: sarà cura dell’Ufficio
        preposto proporre alle studentesse e agli studenti interessati eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di almeno 15 giorni
        dalla data dell’esame, all’approvazione del/della docente, che ne valuterà
        l''opportunità anche in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Le lezioni si svolgeranno in forma di
        workshop e saranno tenute in presenza in laboratorio. A tutte le studentesse
        e gli studenti verranno messi a disposizione gli applicativi software richiesti
        durante le lezioni.


        I materiali didattici (testi, presentazioni, manuali d''uso ecc) sono resi
        disponibili attraverso la piattaforma e-learning Moodle.'
      Link ad altre eventuali informazioni: https://moodle.dipintra.it/course/view.php?id=62
      Orario di ricevimento: Consulta il sito web di Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2)
      SDGs: 'Istruzione di qualità Lavoro dignitoso e crescita economica


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/523530
    title: 2025/2026 Technology-Assisted Interpreting I — University of Bologna
    contents:
      Learning outcomes: Students know and are able to employ as independent users
        the main techniques and software that lie at the foundation of real-time transformation
        of spoken texts.
      Course contents: 'This course appears in both the InConf and InTeCo curricula,
        but under different names. In particular, for InConf the course name is METODI
        E TECNOLOGIE AVANZATE PER L''INTERPRETAZIONE, while for InTeCo the name is
        TECHNOLOGY-ASSISTED INTERPRETING I.


        For the InConf curriculum


        The course is delivered in the first semester and focuses on the looking up
        of glossaries in the interpretation booth and on the development of expertise
        in the area of voice recognition software for the production of real-time
        subtitles (also known as speech-to-text interpreting - STTI).


        The first part of the course focuses on the use of speech recognition software
        for the production of intralingual live subtitles will be introduced. After
        a theoretical introduction to the production of written text from public speeches,
        some of the the speech recognition tools available today will be presented.
        Among these, the focus will be on DIT.tafono (free speaker-independent software)
        and Dragon Naturally Speaking (commercial speaker-dependent software).


        This will be followed by practical exercises in the production of written
        texts from voice input using both written and audio (visual) material.


        Afterwards, the techniques for real-time production of subtitles for audio-visual
        products will be presented (especially for deaf people).


        Then, in the second part, the use of tools useful to looking up terminological
        resources in the interpretation booth (CAI tools) will be presented, focusing
        in particular on InterpretBank.


        For the InTeCo curriculum


        This course includes a platform-based part and a face-to-face part, which
        borrows the hours from InConf''s METODI E TECNOLOGIE AVANZATE PER L''INTERPRETAZIONE
        course. The course will be held in Italian, with educational interpreting
        in English.


        In the face-to-face part, the use of speech recognition software for the production
        of intralingual live subtitles will be introduced. After a theoretical introduction
        to the production of written text from public speeches, some of the the speech
        recognition tools available today will be presented. Among these, the focus
        will be on DIT.tafono (free speaker-independent software) and Dragon Naturally
        Speaking (commercial speaker-dependent software).


        This will be followed by practical exercises in the production of written
        texts from voice input using both written and audio (visual) material.


        Afterwards, the techniques for real-time production of subtitles for audio-visual
        products will be presented (especially for deaf people).'
