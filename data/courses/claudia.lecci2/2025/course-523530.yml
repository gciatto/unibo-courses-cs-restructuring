      Teaching methods: 'Lessons will take the form of workshops covering theoretical
        aspects as well as devoting substantial space to practical exercises (looking
        up of glossaries in real-time with InterpretBank and production of written
        texts by voice recognition).


        As concerns the teaching methods of this course unit, all students must attend
        Module 1, 2 on Health and Safety (https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas)
        online.


        Attendance is compulsory for Conference Interpreting students (at least 70%
        of lessons must be attended).'
      Assessment methods: 'The assessment will consist of a practical test carried
        out in the interpreting booth during the examination sessions.


        In particular, the ability to produce a written text from an audio file of
        5 minutes with DIT.tafono or Dragon NS will be tested.


        The test will be assessed in marks out of thirty. Major errors (omissions
        or completely wrong transcriptions) will result in the subtraction of 2 points
        each; minor errors (transcriptions not exactly corresponding to the original,
        but compatible with the text) in the subtraction of 1 point each; formal errors
        or oversights (e.g. capitalisation) in the subtraction of 0.5 points each.


        The final marks will be published a few days later through the Moodle platform.


        Students with specific learning difficulties (SpLD) or with disabilities that
        can affect their ability to attend courses are invited to contact the University
        service for students with disabilities and SLD at the earliest opportunity
        -- ideally before the start of the course: https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students.
        The University service will suggest possible adjustments to the course work
        and/or exam, which must then be submitted to the course leader so they can
        assess their feasibility, in line with the learning objectives of the course.
        Please note that adjustments to the exam must be requested at least two weeks
        in advance.'
      Teaching tools: 'Lessons are held in the form of workshops and will be held
        in person. All students will be provided with the software applications required
        during the lessons.


        Support materials (texts, slides, instructions etc.) are made available through
        the Moodle e-learning platform.'
      Links to further information: https://moodle.dipintra.it/course/view.php?id=62
      Office hours: See the website of Claudia Lecci (https://www.unibo.it/sitoweb/claudia.lecci2/en)
      SDGs: 'Quality education Decent work and economic growth


