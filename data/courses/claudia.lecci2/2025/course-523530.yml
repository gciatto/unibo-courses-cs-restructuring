  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/523530
    title: 2025/2026 TECHNOLOGY-ASSISTED INTERPRETING I — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Lo/a studente/ssa conosce ed è capace di
        utilizzare con autonomia le principali tecniche e strumenti software alle
        basi della trasformazione di testi orali in tempo reale.
      Contenuti: 'Questo corso compare sia nel curriculum InConf che nel curriculum
        InTeCo, ma con denominazioni diverse. In particolare per InConf la denominazione
        del corso è METODI E TECNOLOGIE AVANZATE PER L''INTERPRETAZIONE, mentre per
        InTeCo la denominazione è TECHNOLOGY-ASSISTED INTERPRETING I.


        Per il curriculum InConf


        Il corso si svolge nel primo semestre e si concentra sui vari aspetti legati
        alla consultazione di risorse terminologiche in cabina di interpretazione
        e allo sviluppo di competenze affini all''interpretazione, tra cui il respeaking
        con riconoscimento vocale per la produzione di sottotitoli live (anche conosciuto
        come speech-to-text interpreting - STTI).


        Nella prima parte ci si propone di introdurre le studentesse e gli studenti
        all''uso di software di riconoscimento vocale per la produzione in tempo reale
        di sottotitoli intralinguistici. Dopo un''introduzione teorica sulla produzione
        scritta da parlato, si passerà alla presentazione di alcuni degli strumenti
        di riconoscimento vocale oggi disponibili. Tra questi ci si concentrerà in
        particolare su DIT.tafono (software gratuito speaker-independent) e Dragon
        Naturally Speaking (software commerciale speaker-dependent).


        Seguiranno esercitazioni pratiche di produzione di testi scritti da input
        vocale a partire da materiale sia scritto che audio(visivo). Verranno poi
        presentate e messe in pratica le tecniche per la produzione in tempo reale
        di sottotitoli per la fruizione di prodotti audiovisivi, specialmente da parte
        dei non udenti.


        Nella seconda parte del corso ci si concentrerà sull''uso di strumenti utili
        alla consultazione di risorse terminologiche in cabina di interpretazione
        (CAI tool), nella fattispecie InterpretBank.


        Per il curriculum InTeCo


        Questo corso prevede una parte su piattaforma e una parte presenziale, che
        mutua le ore dal corso di METODI E TECNOLOGIE AVANZATE PER L''INTERPRETAZIONE
        di InConf. Il corso si svolgerà in italiano, con servizio di educational interpreting
        in inglese.


        Nella parte presenziale, ci si propone di introdurre le studentesse e gli
        studenti all''uso di software di riconoscimento vocale per la produzione in
        tempo reale di sottotitoli intralinguistici. Dopo un''introduzione teorica
        sulla produzione scritta da parlato, si passerà alla presentazione di alcuni
        degli strumenti di riconoscimento vocale oggi disponibili. Tra questi ci si
        concentrerà in particolare su DIT.tafono (software gratuito speaker-independent)
        e Dragon Naturally Speaking (software commerciale speaker-dependent).


        Seguiranno esercitazioni pratiche di produzione di testi scritti da input
        vocale a partire da materiale sia scritto che audio(visivo). Verranno poi
        presentate e messe in pratica le tecniche per la produzione in tempo reale
        di sottotitoli per la fruizione di prodotti audiovisivi, specialmente da parte
        dei non udenti.'
      Testi/Bibliografia: 'Durante le lezioni di carattere più teorico, la docente
        farà riferimento alla seguente bibliografia:


        AENOR (2005) Norma UNI: 153020. Audiodescripciòn para personas con discapacidad
        visual. Requisitos para la audiodescripciòn y elaboraciòn de audioguías. Madrid:
        AENOR


        Arma, Saveria (2011) "The Language of Audio Description from a Corpus-Based
        Perspective". Dottorato in Lingua Inglese per Scopi Speciali, Università degli
        Studi di Napoli Federico II, Facoltà di Scienze Politiche. Online at http://www.fedoa.unina.it/8740/1/ARMA_Saveria_23.pdf
        Benecke, Bernd (2004) "Audio-Description". In Meta 49 (1), pp. 78-80


        Berber-Irabian, 2010. “New Technologies and Electronic Tools in Conference
        Interpreting” Doctoral dissertation ISG Tarragona.

        Dubuc R., “Manuel pratique de terminologie”, Conseil international de la langue
        française


        Eugeni, C. (2007). “Il rispeakeraggio televisivo per sordi: per una sottotitolazione
        mirata del TG”. In InTRAlinea, vol. 9

        http://www.intralinea.org/archive/article/Il_rispeakeraggio_televisivo_per_sordi


        Eugeni, Carlo & Mack, Gabriele (ed.). 2006. First international seminar on
        new technologies in real time intralingual subtitling. inTRAlinea Special
        Issue Respeaking. Online at http://www.intralinea.it/specials/respeaking/ita_open.php


        Fantinuoli C. (2016), InterpretBank. Redefining computer-assisted interpreting
        tools. Proceedings of the Translating and the Computer 38 Conference in London.
        Geneva: Editions Tradulex, 42-52


        Fantinuoli C. (2018) "The use of comparable corpora in interpreting practice
        and teaching". The Interpreters'' Newsletter 23, 133-149


        Fantinuoli C. (2019) "The technological turn in interpreting: the challenges
