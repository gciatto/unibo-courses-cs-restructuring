syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/361001
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente è in grado
        di: - conoscere le componenti fondamentali di uno strumento di calcolo (unità
        di controllo, unità di calcolo, periferiche, memoria, ecc.);


        - conoscere gli elementi fondamentali del sistema operativo (in particolare
        come è organizzato Windows);

        - conoscere e sapere utilizzare i principali programmi applicativi, in particolare
        videoscrittura, fogli elettronici, elaborazione di base dati;

        - sapere risolvere problemi attraverso l''uso di alcuni software disponibili;

        - conoscere la struttura e sapere utilizzare il World Wide Web.'
      Contenuti: 'Tecnologie digitali e informatiche nella professione del Tecnico
        della Prevenzione


        - Rilevanza delle tecnologie informatiche e digitali per lo svolgimento della
        professione


        Concetti di base dell''informatica


        - Significato e implicazioni del termine digitale

        - Il pensiero computazionale

        - Il concetto di algoritmo

        - Il computer: natura, denominazione, funzioni

        - Il computer esecutore generale di algoritmi

        - Dall''algoritmo al programma del computer: principi della programmazione
        e linguaggi di programmazione

        - Programmazione visuale a blocchi


        Le componenti hardware e logiche di un computer


        - Architettura hardware di un computer

        - Architettura del software

        - Ciclo di vita di un programma

        - Tipi di software

        - Concetto di file e di formato diun file

        - Il sistema operativo e la gestione dei file

        - Sicurezza informatica e protezione dei dati

        - Rilevanza dell’informatica per l’ambito tecnico-sanitario


        Sistema operativo Windows


        - Funzioni del sistema operativo

        - File system, organizzazione gerarchica

        - Il file manager di Windows

        - Utility


        Videoscrittura applicata al contesto professionale


        - Redazione di documenti

        - Inserimento di tabelle, intestazioni, note, immagini

        - Formati dei file di testo

        - Esportazione in PDF o PDF/A

        - Stampa e archiviazione


        Fogli elettronici per l’elaborazione dati e la reportistica


        - Struttura e funzionalità di un foglio elettronico

        - Celle, formule, funzioni utili

        - Creazione di tabelle, grafici e report

        - Filtri, ordinamenti, formattazioni condizionate

        - Esportazione/Importazione dati in un foglio elettronico

        - Stampa e archiviazione


        Database e gestione di archivi strutturati


        - Concetti di base: tabelle, record, chiavi

        - Progettazione e creazioni di database per gestione di dati strutturati

        - Importazione/esportazione di dati


        Servizi in rete, Web e cloud


        - Reti di computer

        - Modello Client-Server

        - Internet: cenni storici, principi fondanti, stack di protocolli, applicazioni

        - Il World Wide Web

        - Applicazioni Web

        - Navigare il web, usare portali istituzionali,

        - Ricerca di informazioni online

        - Uso di strumenti in cloud per la collaborazione online e l’archiviazione'
      Testi/Bibliografia: '- INFORMATICA DI BASE 7/ED di Dennis Curtin, Kim Foley,
        Kunal Sen, Cathy Morin, Agostino Marengo, Alessandro Pagano - 2021 Mc Grow
        Hill.


        In alternativa:


        - Informatica di base di Stefano Allegrezza, Edizioni SIMPLE, Macerata, 2009.


        Per tutti:


        - Analisi e gestione delle basi di dati di Stefano Allegrezza, Edizioni SIMPLE,
        Macerata, 2010.


        Inoltre:


        materiale didattico in lingua italiana messo a disposizione dal docente sulla
        piattaforma VIRTUALE di Ateneo.'
      Metodi didattici: '- - Lezioni teoriche frontali.

        - Esercitazioni pratiche al PC con uso di esempi tratti da documentazione
        reale del settore.

        - In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: '- - Superamento di una
        prova scritta (Test finale teorico-pratico) ed eventuale colloquio con il
        docente sugli argomenti del corso. La durata della prova scritta è di trenta
        minuti ed è valutata in trentesimi.

        - Eventuali verifiche pratiche al termine dei moduli.

        - Valutazione continua su partecipazione e svolgimento esercitazioni.

        - Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda
        di contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        del/della docente, che ne valuterà l''opportunità anche in relazione agli
        obiettivi formativi dell''insegnamento.'
      Strumenti a supporto della didattica: '- Slide e presentazioni del docente.

        - Eserciziari o raccolte di casi di studio.

        - Software e strumenti informatici.

        - Strumenti di collaborazione online.

        - Risorse online e banche dati.

        - Quiz online.

        - Podcast.'
      Orario di ricevimento: Consulta il sito web di Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/361001
    title: 2025/2026 Informatics — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course, students will be able to: - understand
        the fundamental components of a computing device (control unit, processing
        unit, peripherals, memory, etc.); - understand the fundamental elements of
        an operating system (in particular, how Windows is organised); - understand
        and know how to use the main application programmes, in particular word processing,
        spreadsheets and database processing; - know how to solve problems using certain
        available software; - understand the structure of and know how to use the
        World Wide Web.'
      Course contents: "Digtal and information technologies in the profession of Prevention\
        \ Technician\n\n- The importance of information and digital technologies for\
        \ the profession\n\nBasic concepts of information technology\n\n- Meaning\
        \ and implications of the term “digital”\n- Computational thinking\n- The\
        \ concept of algorithms\n- The computer: nature, name, functions\n- The computer\
        \ as a general executor of algorithms\n- From algorithm to computer programme:\
        \ principles of programming and programming languages\n- Visual block programming\n\
        \nThe hardware and logic components of a computer\n\n- Hardware architecture\
        \ of a computer\n- Software architecture\n- Life cycle of a programme\n- Types\
        \ of software\n- Concept of files and file formats\n- The operating system\
        \ and file management\n- IT security and data protection\n- The relevance\
        \ of IT for the technical-healthcare sector\n\nWindows operating system\n\n\
        - Functions of the operating system\n- File system, hierarchical organisation\n\
        - The Windows file manager\n- Utilities\n\nWord processing applied to the\
        \ professional context\n\n- Document editing\n- Inserting tables, headers,\
        \ notes, images\n- Text file formats\n- Exporting to PDF or PDF/A\n- Printing\
        \ and archiving\n\nSpreadsheets for data processing and reporting\n\n- Structure\
        \ and functionality of a spreadsheet\n- Cells, formulas, useful functions\n\
        - Creating tables, charts and reports\n- Filters, sorting, conditional formatting\n\
        - Exporting/importing data in a spreadsheet\n- Printing and archiving\n\n\
        Databases and structured archive management\n\n- Basic concepts: tables, records,\
        \ keys\n- Designing and creating databases for structured data management\n\
        - Importing/exporting data\n\nNetwork, web and cloud services\n\n- Computer\
        \ networks\n- Client-server model\n- Internet: history, founding principles,\
        \ protocol stacks, applications\n  The World Wide Web\n- Web applications\n\
        - Browsing the web, using institutional portals,\n- Searching for information\
        \ online\n- Use of cloud tools for online collaboration and storage"
      Readings/Bibliography: '- INFORMATICA DI BASE 7/ED di Dennis Curtin, Kim Foley,
        Kunal Sen, Cathy Morin, Agostino Marengo, Alessandro Pagano - 2021 Mc Grow
        Hill.


        Alternatively::


        - Informatica di base di Stefano Allegrezza, Edizioni SIMPLE, Macerata, 2009.


        For everyone:


        - Analisi e gestione delle basi di dati di Stefano Allegrezza, Edizioni SIMPLE,
        Macerata, 2010.


        In addition:


        Italian-language teaching materials made available by the instructor on the
        University''s VIRTUAL platform.'
      Teaching methods: '- Theoretical lectures.

        - Practical exercises on the PC using examples taken from real industry documentation.

        - Given the type of activity and teaching methods used, attendance at this
        training activity requires all students to first complete modules 1 and 2
        of the training course on safety in study areas, [https://elearning-sicurezza.unibo.it/]
        in e-learning mode.'
      Assessment methods: '- Passing a written exam (final theoretical-practical test)
        and a possible interview with the teacher on the course topics. The written
        exam lasts thirty minutes and is graded out of thirty.

        - Possible practical tests at the end of the modules.

        - Continuous assessment based on participation and performance in exercises.


        Students with SLDs or temporary or permanent disabilities: it is recommended
        that you contact the relevant University office (https://site.unibo.it/studenti-con-disabilita-e-dsa/it)
        in good time: it will be their responsibility to propose any adjustments to
        the students concerned, which must in any case be submitted 15 days in advance
        for approval by the teacher, who will assess their appropriateness in relation
        to the educational objectives of the course.'
      Teaching tools: 'Lecturer''s slides and presentations.

        Exercise books or case study collections.

        Software and IT tools.

        Online collaboration tools.

        Online resources and databases.

        Online quizzes.

        Podcasts.'
      Office hours: See the website of Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
