syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/524407
    title: 2025/2026 INFORMATICA PER LE SCIENZE AMBIENTALI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        una conoscenza mirata alle scienze ambientali sul funzionamento degli elaboratori,
        dei principali strumenti informatici, di Internet e delle basi di dati. E'
        inoltre in grado di utilizzare i principali software di supporto alla produttività
        individuale e possiede alcuni rudimenti del trattamento dell'informazione.
      Contenuti: 'Modulo 1 (in presenza)


        - Introduzione ai fogli elettronici per i dati ambientali

        - Organizzazione dei dati in Excel

        - Pulizia e preparazione dei dati

        - Automazione in Excel con VBA

        - Macro VBA per la pulizia dei dati

        - Esempi pratici di macro per dataset ambientali

        - Come usare un sistema di AI per generare macro VBA

        - Inserire le macro generate in Excel

        - Verifica e debugging delle macro

        - Buone pratiche


        Modulo 2 (E-learning)


        Applicazioni di produttività personale:


        - Fogli elettronici

        - Presentazioni a slide


        Le reti informatiche:


        - Reti di computer

        - Internet

        - I protocolli


        Il Markup e HTML:


        - Gli ipertesti

        - La classificazione del markup

        - Web 1.0 e Web 2.0

        - HTML e CSS

        - Social network

        - Strumenti collaborativi


        Database:


        - I database relazionali

        - Le chiavi

        - I linguaggi di interrogazione (SQL)

        - Creazione di tabelle e query'
      Testi/Bibliografia: '- I testi di riferimento saranno comunicati all''inizio
        del corso.

        - Materiale didattico reso disponibile su virtuale.'
      Metodi didattici: '- Lezioni in aula.

        - Esercitazioni di laboratorio.

        - Attività in e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: Esame scritto con questionario
        online di trenta domande del tipo a risposta multipla, vero falso, si/no,
        risposta breve su Modulo 1 e Modulo 2 più eventuale esercitazione sugli argomenti
        di entrambi i moduli.
      Strumenti a supporto della didattica: '- Materiale messo a disposizione on line
        dal docente.

        - Gli studenti e le studentesse che per ragioni dipendenti da disabilità,
        patologie o disturbi psicologici, o disturbi specifici dell’apprendimento
        (DSA) necessitino di strumenti compensativi potranno rivolgersi direttamente
        al Servizio per gli studenti con disabilità e al Servizio per studenti con
        disturbi dell''apprendimento per concordare l’adozione degli accorgimenti
        più opportuni.'
      Orario di ricevimento: Consulta il sito web di Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/524407
    title: 2025/2026 Computer Science for Environmental Sciences — University of Bologna
    contents:
      Learning outcomes: The student will learn computer skills, with the ability
        to apply them to data processing and presentation in environmental sciences.
        In particular, the student will learn concepts about computer architecture,
        main computer tools, Internet and databases. The student will be learn also
        some rudiments of programming.
      Course contents: '**Module 1 (in person)**Introduction to spreadsheets for environmental
        data

        Organizing data in Excel

        Cleaning and preparing data

        Automation in Excel with VBA

        VBA macros for data cleaning

        Practical examples of macros for environmental datasets

        How to use an AI system to generate VBA macros

        Inserting generated macros into Excel

        Verifying and debugging macros

        Best practices


        Module 2 (E-learning)


        Personal productivity applications:

        Spreadsheets

        Slide presentations


        Computer networks:

        Computer networks

        The Internet

        Protocols


        Markup and HTML:

        Hypertext

        Markup classification

        Web 1.0 and Web 2.0

        HTML and CSS

        Social networks

        Collaborative tools


        Databases:


        I database relazionali

        Le chiavi

        I linguaggi di interrogazione (SQL)

        Creazione di tabelle e query'
      Readings/Bibliography: 'The reference texts will be communicated at the beginning
        of the course.

        Teaching materials will be made available online.'
      Teaching methods: '-Classroom lessons

        -Laboratory exercises

        -E-learning activities'
      Assessment methods: Written exam with an online questionnaire consisting of
        thirty multiple-choice, true/false, yes/no, and short-answer questions on
        Module 1 and Module 2, plus a possible exercise on the topics covered in both
        modules.
      Teaching tools: 'Material made available online by the instructor.


        Students who, for reasons related to disability, illness, psychological disorders,
        or specific learning disorders (SLD), require compensatory tools may contact
        the Service for Students with Disabilities and the Service for Students with
        Learning Disorders directly to agree on the most appropriate measures.'
      Office hours: See the website of Stefano Russo (https://www.unibo.it/sitoweb/stefano.russo7/en)
