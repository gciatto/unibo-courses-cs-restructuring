syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498979
    title: 2025/2026 FONDAMENTI DI INFORMATICA P-1 — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Lo studente viene introdotto alla presentazione
        dei principi, delle metodologie di progetto e degli strumenti fondamentali
        per lo sviluppo di applicazioni informatiche, indagando alcuni classici problemi
        computazionali, procedendo per ciascuno di essi all’identificazione di idonei
        algoritmi risolutivi, formalizzati in termini del linguaggio di programmazione
        C. Lo studente acquisisce familiarità e padronanza degli argomenti trattati,
        combinando gli aspetti di carattere teorico-metodologico con un’intensa attività
        sperimentale svolta in laboratorio.
      Contenuti: 'Elenco degli argomenti


        - Introduzione informatica, programmazione, algoritmi, diagrammi di flusso,
        linguaggi e strumenti di sviluppo (compilazione, linking)

        - Elementi di architetture dei calcolatori e di linguaggio macchina

        - Introduzione al linguaggio C - dati numerici, variabili, costanti, identificatori

        - Rappresentazione dei dati numerici e alfanumerici

        - Istruzioni elementari, controllo di flusso e I/O

        - Vettori, stringhe e matrici

        - Funzioni e librerie di linguaggio

        - Tipi aggregati

        - Gestione dei file, input da linea di comando

        - Principali algoritmi di ricerca e ordinamento su vettori

        - Cenni di allocazione dinamica e recursione

        - Cenni di cross-compilazione e programmazione su dispositivi embedded

        - Principi di sistemi operativi (scheduler, concetto di time sharing) e gestione
        del file system'
      Testi/Bibliografia: '- Kernighan, Ritchie: "ll linguaggio C. Principi di programmazione
        e manuale di riferimento", Seconda Edizione, Pearson, 2018.

        - H. M. Deitel, P. J. Deitel, "Il linguaggio C. Fondamenti e tecniche di programmazione",
        Ottava Edizione, Pearson, 2016.'
      Metodi didattici: Durante il corso verranno svolti esempi ed esercizi. Il corso
        prevede l'uso di un ambiente di sviluppo di applicazioni in linguaggio C principalmente
        per PC.
      Modalità di verifica e valutazione dell'apprendimento: La valutazione consiste
        in una prova di laboratorio che richiede la risoluzione di un problema mediante
        costruzione di un programma in linguaggio C in cui occorre dimostrare di saper
        effettivamente produrre un programma eseguibile
      Strumenti a supporto della didattica: Ambiente di sviluppo linguaggio C (ex.
        CLion, codelite)
      Orario di ricevimento: Consulta il sito web di Andrea Bartolini (https://www.unibo.it/sitoweb/a.bartolini)
      SDGs: 'Imprese innovazione e infrastrutture Lotta contro il cambiamento climatico


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498979
    title: 2025/2026 Fundamentals of Computer Programming P1 — University of Bologna
    contents:
      Learning outcomes: The student is introduced to the presentation of the principles,
        of the project methodologies and of the fundamental tools for the development
        of computer applications, investigating some classical computational problems,
        proceeding for each of them to the identification of suitable algorithms,
        implemented in C programming language. The student acquires familiarity and
        mastery of the topics covered, combining the theoretical-methodological aspects
        with an intense experimental activity carried out in the laboratory.
      Course contents: 'List of topics:


        - Computer introduction, programming, algorithms, flowcharts, languages and
        development tools (compilation, linking)

        - Elements of computer architecture and machine language

        - Introduction to the C language - numerical data, variables, constants, identifiers

        - Representation of numerical and alphanumeric data

        - Elementary instructions, flow control and I / O

        - Vectors, strings and matrices

        - Functions and language libraries

        - Aggregate types

        - File management, command line input

        - Main algorithms for searching and sorting on vectors

        - Outline of dynamic allocation and recursion

        - Elements of cross-compilation and programming on embedded devices

        - Principles of operating systems (scheduler, concept of time sharing) and
        file system management'
      Readings/Bibliography: '- Kernighan, Ritchie: "ll linguaggio C. Principi di
        programmazione e manuale di riferimento", Seconda Edizione, Pearson, 2018.

        - H. M. Deitel, P. J. Deitel, "Il linguaggio C. Fondamenti e tecniche di programmazione",
        Ottava Edizione, Pearson, 2016.'
      Teaching methods: During the course examples and exercises will be performed
        in the laboratory. The course involves the use of an application development
        environment in C language mainly for PC
      Assessment methods: The evaluation consists of a laboratory test that requires
        the resolution of a problem by implementing a C program in which it is necessary
        to demonstrate the ability to actually build an executable program
      Teaching tools: C language development environment (e.g. CLion, codelite)
      Office hours: See the website of Andrea Bartolini (https://www.unibo.it/sitoweb/a.bartolini/en)
      SDGs: 'Industry, innovation and infrastructure Climate Action


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
