    title: 2025/2026 RETI DI CALCOLATORI T (L-Z) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenza dei modelli, dei protocolli e
        degli strumenti per lo sviluppo di applicazioni di rete e sistemi distribuiti.
        Capacità di progetto e realizzazione di applicazioni in reti di calcolatori.
      Contenuti: 'Il tema fondamentale del corso è il progetto di soluzioni Cliente
        Servitore in accordo alle metodologie di sviluppo di applicazioni di sistemi
        distrtibuiti industriali. I linguaggi C e Java sono gli strumenti scelti per
        vedere le risorse e i modi di gestirle con consapevolezza.


        Tutto il corso affronta argomenti per avere una visione completa dei diversi
        aspetti.


        1. Generalità e Concetti di Base Generalità dei sistemi distribuiti


        - inquadramento generale e definizioni di base

        - sistemi distribuiti decentralizzati ed eterogenei

        - necessità di standard per le soluzioni (ISO/OSI ed Internet)


        Si presentano alcuni modelli fondamentali, come


        - modello di interazione cliente/servitore

        - modelli a memoria condivisa ed a scambio di messaggi

        - modelli di connessione, di replicazione, ecc.


        2.Programmazione di sistema


        Il corso richiede un cambimento di mentalità per passare dalla programmazione
        applicativa alla programmazione di sistema, tenendo conto dell''uso delle
        risorse ad ogni livello con qualunque linguaggio di programmazione.


        - Obiettivo è arrivare a produrre codice ordinat****o, leggibile e corretto,
        derivato direttamente dalle specifiche, con una buona interazione con l''utente.

        - Gli studenti sono incoraggiati a seguire il laboratorio per verificare o
        migliorare le proprie capacità progettuali richieste dal progetto finale nell''area
        di piccoli progetti C/S nella prgrammazione di sistema.


        3. Ambienti Standard


        Standardizzazione e organizzazione a livelli ISO OSI


        - livello di trasporto e di rete

        - livelli applicativi: sessione, presentazione, e applicazione


        Alcune applicazioni standard distribuite


        4. Protocolli TCP/IP


        I protocolli della suite TCP/IP sono dati per scontati e vengono visti attraverso
        gli strumenti del corso, ossia le socket. Necessaria la conoscenza dei livelli
        di rete e di trasporto

        Applicazioni Internet comuni per:


        - servizi sincroni: terminale remoto virtuale, trasferimento di file,

        - servizi asincroni: mail, news, e altri


        5. Gli strumenti di riferimento


        Lo strumento principale per realizzare progetti Cliente /Servitore sono le
        socket di comunicazione e le proposte di realizzazione a livello applicativo
        di ambienti Cliente /Servitore.


        Le Socket sono presentate con le relative primitive API in C (per UNIX) e
        in Java. Gli esempi di interazione sono in sistemi UNIX e curando collegamenti
        con TCP/IP.


        Le applicazioni cliente/servitore sono:


        - Chiamate di Procedura Remota o RPCdi SUN.

        - RMI, operazioni remote in Java


        5. Sistemi Operativi Distribuiti e servizi


        Sistemi operativi distribuiti

        Naming delle risorse

        Granularità dei processi e loro interazione

        Gestione delle risorse

        File system


        Si trattano alcuni problemi e possibili soluzioni, attraverso Sistemi di nomi
        e in particolare, DNS e Directory X.500.'
      Testi/Bibliografia: 'G. Coulouris, J. Dollimore, T. Kindberg: ''Distributed
        Systems: concepts and Design'', quinta edizione, Addison-Wesley, 2012.


        M.L. Liu: ''Distributed Computing'', Addison-Wesley, 2003.


        J.F. Kurose, K.W. Ross: ''Internet e Reti'', McGraw-Hill, 2001 (tradotto nel
