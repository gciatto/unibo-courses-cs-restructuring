        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/545734
    title: 2025/2026 Computer Networks T (L-Z) — University of Bologna
    contents:
      Learning outcomes: 'This course faces most issues related with network and distributed
        systems, by examining most common solution methods in a typical industrial
        setting: the goal is to acquire a knowledge of the solution policies of typical
        problems, and good exposure to tools and widespread strategies.

        The knowledge objective is to understand which are the typical programming
        environments on which to develop some basic solutions with a system programming
        mindset that keep into account the implicit usage of system resources.


        The main ability is to keep into account the usage of resources and that awareness
        in all systems layers so to propose solutions to small distributed problems
        that are acceptable, readable, with a good user interface, and correct.

        Students must be capable of defining a complete working solution with some
        time limitation with the most common tools.


        Students must have a good starting knowledge of the basics of operating systems
        and related tools, both for Windows and UNIX technologies*.* **UNIX is the
        chosen environment.**In other words, we assume that students have a good knowledge
        derived from a first course on Operating Systems, apart from design and programming
        capacities in C and Java.'
      Course contents: 'The course is organized around the Client /Server model and
        how to design small applications.


        1. Generalities and Basics Understanding


        - Some basic perspectives and general definitions

        - Decentralized and heterogeneous distributed systems

        - Assessment of standards and their meaning


        Some basic models are presented:


        - client/server interaction

        - shared memory and message exchange

        - connection models, interaction models, etc.


        2. System programming


        - The design mindset keeps into account resorce usage at any system level
        so to produce in a very ordered way readable, with a good user interface,
        correct code and protocols that answer specified requirements.

        - Students have to follow labs to improve their knowledge habits and complete
        their knowledge in system programming.


        3. Standard environments


        ISO OSI layered organization


        - network and transport layer

        - application layers: session, presentation, & application


        Presentation of some standard applications.


        4. TCP/IP protocols


        Suite TCP/IP protocols are assumed as known: only some connections with the
        main socket tools.

        Common applications:


        - synchronous services: remote virtual terminal, file transfer,

        - asynchronous services: mail, news, etc.


        Some widely spread tools for Unix.


        5. Some reference tools


        At the communication level, we work on sockets as a standard tool, independent
        from the programming environment; at the application level, we present and
        work on application Client/server tools.


        Socket and related API for C (UNIX) and Java

        Case studies for interactions client/server in Unix systems with TCP/IP protocols.


        The client/server application tools are:


        - Remote Procedure Call RPC of SUN

        - RMI, remote operations in Java


        6. Distributed Operating Systems and tools


        Distributed Operating Systems

        Resource naming

        Process granularity and their interaction

        Resource management

        File system

        DNS and advanced name systems'
      Readings/Bibliography: 'G. Coulouris, J. Dollimore, T. Kindberg: ''Distributed
        Systems: concepts and Design'', quinta edizione, Addison-Wesley, 2012.


        M.L. Liu: ''Distributed Computing'', Addison-Wesley, 2003.


        J.F. Kurose, K.W. Ross: ''Internet e Reti'', McGraw-Hill, 2001 (translated
        in 2001 from ''Computer Networking: a Top-Down Approach Featuring the Internet'',
        2001).


        A.S. Tanenbaum, M. V.Steen: "Distributed Systems: Principles and Paradigms",
        Prentice-Hall, second edition 2007, and first 2002.


        B. Forouzan, F. Mosharraf: “Computer Networks, a top down approach”, McGraw-Hill,
        2012.


        A.S. Tanenbaum: ''Computer Networks'', Prentice-Hall, 1988 (translated in
        ''Reti di Calcolatori'', Jackson).


        D. Reilly, M. Reilly: ''Java Network Programming and Distributed Computing'',
        Addison-Wesley, 2002.'
      Teaching methods: "This class has a specific objective of making students develop\
        \ a new mindset in project design in the direction of system programming (and\
        \ not application programming).\nThe style of programming in-the-small for\
        \ integrating distributed applications, mainly Client/Server, must be more\
        \ aware of the resource usage and of all involved levels present at the execution.\n\
        The projects will use both Java and C.\n\nThe course is organized on class\
        \ lectures and on laboratory sessions. These two activities are strictly intertwined\
        \ so that the lab hours are devoted to the explained topics presented in class\
        \ at the same time.\nLab proposals are presented in class and students are\
        \ requested to solve them in groups so to practice their capacities in coordination\
        \ and work teams, as a way of verifying design skills and enhancing their\
        \ capacities, in the direction of the final test.\nThe lab sessions, highly\
        \ recommended, tend to put together exactly the same environments of the final\
        \ test (part in C and part in Java ).\n\nAll exams will be given on an individual\
        \ base, both for the project and the oral final part.\nSpecifically we ascertain\
        \ skills suitable for small and medium size project, typically Client/Server\
        \ and with different goals and objectives:\n\n- sockets both in C and Java,\
        \ with different communication protocols and usage involvement;\n- RPC, for\
        \ client/server high level projects, with SUN solutions;\n- RMI, for Java\
        \ design of client/server interactions.\n  Attending both class and labs is\
        \ particularly important toward the final results.\n\nHave in mind that the\
        \ teaching context will be only in presence, both for classes, labs and exams.\
        \ All the details of the deployments in labs and tools will be given during\
        \ the class.\n\nAny student is responsible of her/his environment and of its\
        \ correctness and usability during lab and exam tests.\nWe require any student\
        \ to be capable of autonomously design and implement a small project for a\
        \ typical distributed solution case with the above tools.\n\nPlease, be advised\
        \ that any cheating and any fraud attempt is going to be prosecuted severely.\n\
        \nURL: lia.disi.unibo.it/Courses/RetiT"
      Assessment methods: 'The objective of the assessment is to verify the whole
        capacities of orientating themselves of the student in solving small projects
        in autonomy.


        The final evaluation depends on two main parts:


        - A project to be developed and deployed in the laboratory in a time-constrained
        session and without limit to the material students can personally access to.
        The project is given in the lab and by using both the two main environments
        of the class tools (both C-Based and Java-based).

        - a final oral examination as a significant colloquium.


        The project part gives a vote over 30, that stems from the correct solutions
        in both environments.

        The oral part is taken only after a success in the first part and is used
        to verify the knowledge and the orientation capacity of the student over the
        whole class material. It completes the final voten around the project result.'
      Teaching tools: 'In the classroom we tend to use slides and stimulate discussion
        by using small example case studies.

        See the web side of the course at the URL: lia.disi.unibo.it/Courses/RetiT


        The lab provides some usual and recommended tools and environments for the
        development and deployment of distributed projects.


        Students are advised to become familiar with most of them, and even with other
        chosen ones, that are going to be used in the final tests.

        Also students are advised to go and become expert in the tools of the UNIX
        (Linux) environment: those abilities are very important toward the success
        of the evaluation.'
      Links to further information: http://www.lia.disi.unibo.it/Courses/RetiT/
      Office hours: 'See the website of Antonio Corradi (https://www.unibo.it/sitoweb/antonio.corradi/en)


        See the website of Andrea Sabbioni (https://www.unibo.it/sitoweb/andrea.sabbioni5/en)'
      SDGs: 'Quality education Gender equality Industry, innovation and infrastructure
        Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
