        A.S. Tanenbaum: ''Computer Networks'', Prentice-Hall, 1988 (tradotto in ''Reti
        di Calcolatori'', Jackson).'
      Metodi didattici: 'Questo corso ha l''obiettivo primario di sviluppare la capacità
        di progettare piccole applicazioni distribuite Cliente Servitore, per progetti
        in-the-small (di piccola dimensione), adottando uno stile di soluzione non
        applicativo, ma di progetto di sistema. Con questo si intende sviluppare una
        programmazione consapevole dei livelli diversi di supporto e dell''uso delle
        risorse impiegate, in ambienti diversi basati su sia Java sia C.


        Il corso si articola in lezioni frontali e laboratorio in modo integrato .
        Obiettivo è accrescere le capacità di soluzione di un progetto Cliente Servitore
        di piccole dimensioni con tempo limitato, usando i due linguaggi di programmazione
        di interesse, Java e C. Le esercitazioni propongono progetti sugli strumenti
        visti a lezione da svolgere in gruppo per favorire le capacità di cooperazione,
        secondo uno scheduling molto integrato con le lezioni. Le esercitazioni servono
        a irrobustire la capacità individuale di svolgere un piccolo progetto nei
        tempi limitati del laboratorio e della prova finale di progetto.

        Le esercitazioni durante il corso sono svolte con la stessa modalità del progetto
        finale (parte in ambiente C e in Java) e la frequenza consente di migliorare
        e effinare le propri capacità.


        La frequenza è particolarmente importante per la verifica delle proprie conoscenze
        e del proprio stato di avanzamento.


        Gli esami sono svolti in modo singolo dagli studenti, sia per il progetto
        sia per la prova orale finale.

        In particolare si richiedono competenze per il progetto di piccoli casi cliente/servitore,
        in diversi ambiti e con diversi strumenti:


        - socket da usare in C e Java, per diversi protocolli e diversi casi di uso;

        - RPC, per progetto di clienti e servitori ad alto livello, con tecnologie
        SUN;

        - RMI, per progetto in Java di clienti servitori.


        La modalità del corso è in presenza, sia per lezioni sia per esercitazioni,
        ed esami. Le tecnologie di supporto in laboratorio saranno definite durante
        il corso.


        Lo studente è responsabile delle proprie risorse di calcolo e del materiale
        che ha a disposizione per lo svolgimento delle prove:

        in particolare si richiede una autonomia di soluzione e capacità di svolgere
        semplici progetti in tempi limitati, usando le risorse messe a disposizione
        in laboratorio.

        Le prove finali eseguite in laboratorio sono personali e senza comunicazione
        tra studenti: qualunque tentativo di frode o copiare verrà perseguito e punito.


        URL: lia.disi.unibo.it/Courses/RetiT'
      Modalità di verifica e valutazione dell'apprendimento: 'Obiettivo è verificare
        le capacità operative dello studente nella progettazione di piccole applicazioni
        multiprocesso Cliente /Servitore e la autonomia nell''arrivare ad una soluzione
        in tempi limitati.


        Le verifica consiste di


        - una prova scritta svolta come un progetto in laboratorio con tempo limitato
        e qualunque materiale di supporto: la prova consiste di due parti, che fanno
        riferimenti ai due ambienti di lavoro che vengono presentati nel corso e che
        intende provare la capacità di completare un progetto di C/S nei due ambienti.

        - una prova orale successiva che mira a verificare la competenza su tutti
        i temi del corso.


        La prova di progetto (in laboratorio) prevede l''assegnamento di un voto in
        30esimi che dipende dal corretto svolgimento delle due parti dello stesso.

        La prova orale si sostiene solo con esito positivo della prima prova e si
        svolge su tutti gli argomenti del corso, con l''obiettivo di verificare una
        corretta capacità di orientamento nei settori del corso.


        Il giudizio finale in trentesimi, dopo la prova di progetto si basa sulla
        valutazione della prova orale.'
      Strumenti a supporto della didattica: 'In aula si usano lucidi e discussioni
        di piccoli progetti.

        Sito web del corso ad URL: lia.disi.unibo.it/Courses/RetiT


        In laboratorio sono presenti strumenti di sviluppo e di supporto alla esecuzione
        dei progetti.


        Gli studenti sono invitati a familiarizzare con questi o altri strumenti di
        uso personale.

        Si suggeriscono strumenti in ambiente UNIX (Linux). La operatività e le capacità
        di realizzare piccoli progetti sono particolarmente importanti.'
      Link ad altre eventuali informazioni: http://www.lia.disi.unibo.it/Courses/RetiT/
      Orario di ricevimento: 'Consulta il sito web di Antonio Corradi (https://www.unibo.it/sitoweb/antonio.corradi)


        Consulta il sito web di Andrea Sabbioni (https://www.unibo.it/sitoweb/andrea.sabbioni5)'
