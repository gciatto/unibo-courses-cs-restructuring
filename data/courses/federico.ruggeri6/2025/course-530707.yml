syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/530707
    title: 2025/2026 INTRODUCTION TO LANGUAGES FOR ARTIFICIAL INTELLIGENCE — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: At the end of the course, the student has
        an understanding of the main linguistic techniques used in the context of
        AI, including the main aspects related to functional, logic and constraint
        programming.
      Contenuti: 'Macchine astratte. La macchina Python. Programmazione in Python:
        nomi e loro visibilità, funzioni, oggetti modificabili e non modificabili,
        tipi di dato (numeri, stringhe, ennuple, liste, dizionari) e loro uso nella
        risoluzione di problemi di media difficoltà. Classi e oggetti; metodi ed ereditarietà.
        Eccezioni. La libreria NumPy e i suoi array N-dimensionali.


        Modulo 2


        Introduzione alla logica matematica. Unificazione. Risoluzione.

        Introduzione alla programmazione logica. I linguaggi Prolog.

        Programmazione logica con vincoli e programmazione concorrente con vincoli.
        Programmazione con vincoli. Il linguaggio MiniZinc.'
      Testi/Bibliografia: 'Modulo 1


        Nessun libro di testo è obbligatorio: tutto il materiale (diapositive, codice
        sorgente, esercizi, esempi di esami passati) sarà reso disponibile dopo ogni
        lezione su Virtuale.


        Libro di testo suggerito (livello introduttivo)


        John V. Guttag. Introduction to Computation and Programming Using Python.
        Third Edition: With Application to Computational Modeling and Understanding
        Data. MIT Press, 2021. https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-third-edition
        [Esiste anche la versione italiana]


        Altri libri di testo di livello molto elementare


        Allen B. Downey. Think Python 2e. O''Reilly Media, 2012. ISBN 978-1449330729.
        Disponibile online: https://greenteapress.com/wp/think-python-2e/


        Jessen Havill. Discovering Computer Science: Interdisciplinary Problems, Principles,
        and Python Programming. Chapman and Hall/CRC. ISBN 9781482254143


        Libri di consultazione


        Mark Lutz. Learning Python 5e. O''Reilly Media, 2013 [Per Python, non per
        imparare la programmazione da zero].


        M. Gabbrielli, S. Martini. Programming Languages: Principles and Paradigms
        (2nd ed). Springer, 2023. [Per imparare come funzionano i linguaggi di programmazione.
        Esiste anche la versione italiana.].


        Modulo 2


        Dirk van Dalen. Logic and structure. 4th edition, Springer.


        K. Doets. From Logic to Logic Programming. The Mit Press.


        Russell, Norvig. Artificial Intelligence: A Modern Approach (any edition).
        Pearson.'
      Metodi didattici: 'Lezioni teoriche e pratiche in classe.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, [https://elearning-sicurezza.unibo.it/] in modalità e-learning.


        Modulo 1


        Lezioni frontali in classe con esempi di programmazione dal vivo.


        Le lezioni (24 ore) saranno concentrate all''inizio del semestre (dalla terza
        settimana di settembre a prima della fine di ottobre).


        Lavoro autonomo su esercizi di programmazione guidata (al di fuori degli orari
        previsti per le lezioni), su Virtuale. La piattaforma fornisce un feedback
        automatico sui casi di test.


        Modulo 2


        Lezioni frontali in classe ed eesercitazioni.'
      Modalità di verifica e valutazione dell'apprendimento: 'Il corso (Introduction
        to Languages for Artificial Intelligence) è parte del corso integrato “Languages
        and Algorithms for Artificial Intelligence”. Per avere un voto registrato
        sul libretto è necessario superare


        - Modulo 1 (Prof. Lodi): idoneità (pass/fail)

        - Modulo 2 (Prof. Gabbrielli): voto in trentesimi, superato con almeno 18/30.

        - Corso “Introduction to Computability and Complexity” con il Prof. Dal Lago:
        voto in trentesimi, superato con almeno 18/30.


        Le tre prove possono essere sostenute in qualsiasi ordine e i voti positivi
        rimangono sempre validi.


        Il voto finale si ottiene come media aritmetica dei voti nel Modulo 2 e nel
        Corso “Introduction to Computability and Complexity” , arrotondata all’intero
        più vicino.


        Per ogni modulo sono previsti quattro appelli per ogni anno accademico.


        Il modulo 1 sarà valutato attraverso un test di programmazione in Python della
        durata di 2 ore, con correzione automatica su casi di test, sulla piattaforma
        EOL. Il test valuterà la capacità degli studenti di risolvere correttamente
        semplici problemi di programmazione procedurale utilizzando Python (e la libreria
        NumPy).


        Il sistema assegnerà un punteggio a ciascun caso di test per ogni esercizio.
        Il raggiungimento di un punteggio pari o superiore a 18/30 risulterà in un
        "pass", mentre un punteggio inferiore a 18/30 risulterà in un "fail" (il punteggio
        numerico non viene registrato).


        Il test si svolgerà nei laboratori dell''Università e gli studenti avranno
        accesso a un IDE e alla documentazione di Python e NumPy. Non sarà possibile
        accedere ad altri siti web o a materiale cartaceo.


        Un test preliminare potrebbe essere offerto a fine ottobre/inizio novembre.
        Gli altri appelli saranno in inverno, estate e autunno.


        Seguire le lezioni è fondamentale per comprendere i concetti teorici. Per
        coloro che non possono partecipare, saranno disponibili le registrazioni.
        Per l''allenamento personale sono previsti diversi esercizi che non contribuiscono
        al voto. Lo svolgimento degli esercizi assegnati ogni settimana su Virtuale
        è fondamentale per l''apprendimento delle competenze di programmazione richieste.
        La valutazione automatica su casi di prova è un primo aiuto importante. I
        tutor e l''istruttore principale sono inoltre disponibili per chiarimenti.


        Il modulo 2 sarà valutato mediante un esame scritto consistente in 2 esercizi
        sulle varie parti del corso da svolgersi in due ore. Seguire le lezssioni
        è importnate per prendere pratica anche con gli esercizi d''esame.'
      Strumenti a supporto della didattica: 'Lezioni frontali. Esercitazioni pratiche.


        Per il Modulo 1 verranno fornite le slide e il codice sorgente. Gli esercizi
        con correzione automatica sui casi di prova saranno disponibili settimanalmente
        su Virtuale (attraverso CodeRunner, un plugin di Moodle). Gli esami degli
        scorsi anni (con correzione automatica) saranno disponibili per lo studio
        personale.


        Per il Modulo e verranno fatte esercitazioni in aula.'
      Orario di ricevimento: 'Consulta il sito web di Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli)


        Consulta il sito web di Michael Lodi (https://www.unibo.it/sitoweb/michael.lodi)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/530707
    title: 2025/2026 Introduction to Languages for Artificial Intelligence — University
      of Bologna
    contents:
      Learning outcomes: At the end of the course, the student has an understanding
        of the main linguistic techniques used in the context of AI, including the
        main aspects related to functional, logic and constraint programming.
      Course contents: 'Module 1


        Abstract machines. Python machine. Programming in Python: names and visibility,
        functions, immutable and mutable objects, basic data types (numbers, strings,
        tuples, lists, dictionaries), and their use in the solution of problems. Classes
        and objects. Methods and inheritance. Exceptions. Introduction to the library
        NumPy and its N-dimensional array objects.


        Module 2


        Introduction to mathematical logic. Unification. Resolution.

        Introduction to logic programming. Prolog languages.

        Constraint logic programming and concurrent constraint programming. Constraint
        programming. The language MiniZinc.'
      Readings/Bibliography: 'Module 1


        No textbook is mandatory: all the material (slides, source code, exercises,
        past exam examples) will be made available after each lecture on Virtuale.


        Suggested introductory level textbook:


        John V. Guttag. Introduction to Computation and Programming Using Python.
        Third Edition: With Application to Computational Modeling and Understanding
        Data. MIT Press, 2021. https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-third-edition


        Other, very elementary-level, textbooks


        Allen B. Downey. Think Python 2e. O''Reilly Media, 2012. ISBN 978-1449330729.
        Online manuscript: https://greenteapress.com/wp/think-python-2e/


        Jessen Havill. Discovering Computer Science: Interdisciplinary Problems, Principles,
        and Python Programming. Chapman and Hall/CRC. ISBN 9781482254143


        Reference books


        Mark Lutz. Learning Python 5e. O''Reilly Media, 2013 [For Python, not for
        learning programming from scratch]


        M. Gabbrielli, S. Martini. Programming Languages: Principles and Paradigms
        (2nd ed). Springer, 2023. [To learn how programming languages work.]


        Module 2


        Dirk van Dalen. Logic and structure. 4th edition, Springer.


        K. Doets. From Logic to Logic Programming. The Mit Press.


        Russell, Norvig. Artificial Intelligence: A Modern Approach (any edition).
        Pearson.'
      Teaching methods: 'Theoretical and practical class lectures.


        Regarding the teaching methods of this course unit, all students are required
        to attend Modules 1 and 2 on Health and Safety online. [https://elearning-sicurezza.unibo.it/]


        Module 1


        Formal in-class lectures with live coding examples.


        Lectures (24 hours) will be concentrated at the beginning of the semester
        (From the third week of September to before the end of October).


        Autonomous work on guided programming exercises (outside the scheduled class
        times), on Virtuale. The platform provides automatic feedback on test cases.


        Module 2


        Class lectures and exercises'
      Assessment methods: 'As this course (Introduction to Languages for Artificial
        Intelligence) is part of the Integrated Course “Languages and Algorithms for
        Artificial Intelligence”, to get a grade in the gradebook, students have to


        - Pass Module 1 (binary outcome: pass/fail) with Prof. Lodi

        - Pass Module 2 (mark expressed in thirties, you need to obtain at least 18)
        with Prof. Gabbrielli

        - Pass the course “Introduction to Computability and Complexity” with Prof.
        Dal Lago (mark expressed in thirties, you need to obtain at least 18)


        The three exams can be taken in any order, and positive marks are valid for
        an indefinite period.


        The final grade is obtained as the arithmetic mean of the grades in Module
        2 and the Course "Introduction to Computability and Complexity", rounded to
        the nearest natural number.


        For each module, you will have four calls (i.e., four attempts) each academic
        year.


        Module 1 will be assessed through a 2-hour Python programming test, with automatic
        correction on test cases, on the EOL platform. The test will evaluate students''
        ability to correctly solve simple procedural programming problems using Python
        (and the NumPy library).


        The system will assign a score to each test case for each exercise. Reaching
        a score of 18/30 or higher will result in a “pass”, while a score below 18/30
        will result in a “fail” (the numerical score is not recorded).


        The test will be held in the University laboratories, and students will have
        access to an IDE and to the documentation of Python and NumPy. No other websites
        or any documentation can be accessed (closed books).


        A preliminary test could be offered at the end of October / early November.
        Other calls will be in Winter, Summer, and Autumn.


        Following the lectures is crucial to understanding the theoretical concepts.
        For those who are unable to attend, recordings will be made available. Several
        exercises that do not contribute to the grade are provided for personal training.
        Doing the exercises assigned each week on Virtuale is crucial for learning
        the required programming skills. The automatic evaluation on test cases is
        a first relevant help. Tutors and the main instructor are also available for
        clarification.


        Module 2


        Module 2 will be evaluated by menas of a written exam consisting of 6 exercises
        on the different part of the course, to be done in 2 hours.It is important
        to attend the lectures in order to practice with the exam exercises.


        I'
      Teaching tools: 'Lectures. Practical exercises.


        For Module 1, slides and source code will be provided. Exercises with automatic
        correction on test cases will be available weekly on Virtuale (through CodeRunner,
        a Moodle plugin). Past exams (with automatic correction) will be available
        for personal training.


        Fore Module 2 there will be exercises done in the class.'
      Office hours: 'See the website of Maurizio Gabbrielli (https://www.unibo.it/sitoweb/maurizio.gabbrielli/en)


        See the website of Michael Lodi (https://www.unibo.it/sitoweb/michael.lodi/en)'
