  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/518550
    title: 2025/2026 COMPLEMENTI DI BASI DI DATI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente: - conosce
        i modelli dei dati semi strutturato e non strutturati in relazione a quelli
        strutturati ed i principali costrutti dei linguaggi SQL/XML ed XQuery; - conosce
        le principali tecniche di information retrieval e di analisi dei dati; - è
        in grado di progettare e realizzare un datawarehouse; - è capace di elaborare
        un progetto utilizzando le principali tecniche di data mining.'
      Contenuti: '- Modelli dei dati strutturati, semi strutturati e non strutturati

        - Limiti di SQL

        - Introduzione ad SQL/XML ed XQuery

        - I modelli di information retrieval (boolean e vector space) e web information
        retrieval (PageRank)

        - Introduzione al datawarehousing (OLAP) e al data mining (Machine Learning)'
      Testi/Bibliografia: '- A. Moller et al - Introduzione a XML - Addison Wesley,
        2007 ISBN: 9788871923734

        - R. Baeza-Yates et al - Introduction to Information Retrieval - Cambridge
        University Press, 2008 ISBN: 0521865719

        - P.N. Tan et al - Introduction to Data Mining - Financial Times Prentice
        Hall, 2019 ISBN: 9780273769224

        - M. Golfarelli et al - Datawarehouse - Teoria e pratica della progettazione
        - McGrawHill, 2006 ISBN: 9788838662911'
      Metodi didattici: 'Durante le lezioni si affronteranno le principali problematiche
        legate alla gestione e all’analisi di dati semi-strutturati e non strutturati.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame consiste in
        una prova orale. In ogni anno accademico sono fissati sei “appelli”: due nella
        prima Sessione (Gennaio/Febbraio); tre nella seconda (Giugno/Luglio) e uno
        nella terza (Settembre). Le date degli appelli sono pubblicate su Almaesami
        e possono subire variazioni. Si consiglia di verificare 24 ore prima dello
        scritto che la data non sia cambiata.


        Per partecipare ad un appello d’esame occorre iscriversi su Almaesami entro
        7 giorni dalla data dell’esame. Chi non si iscrive in tempo non potrà sostenere
        l’esame, e dovrà attendere l’appello successivo.


        La verifica avviene con la discussione di un articolo ed eventuali domande
        sugli argomenti del corso. Lo studente dovrà quindi dimostrare di saper approfondire
        un argomento avanzato partendo da un articolo tra quelli proposti. Il contenuto
        dell’articolo e il relativo argomento dovranno essere discussi durante l’esame
        con una presentazione preparata dallo studente.


        Durante la prova orale, della durata di circa 25/30 minuti, lo studente presenterà
        in modo critico l’articolo scelto con l’ausilio delle slide preparate, inoltre
        potranno essere poste domande riguardanti tutti gli argomenti in programma.
        La prova orale è valutata con un punteggio in 30-esimi predendo in considerazione
        la preparazione, le capacità di esposizione e l’approccio critico. Il voto
        dell’esame orale è stabilito in base ai criteri seguenti:


        - se la preparazione, l’esposizione e l’approccio critico sono limitati ed
        emergono solo con l’aiuto del docente, il voto sarà compreso nell’intervallo
        18-21;

        - se la preparazione e l’esposizione sono soddisfacenti, ma l’approccio critico
        e le capacità di rielaborazione si rivelano autonome solo in modo limitato,
        il voto sarà compreso nell’intervallo 22-25;

        - se la preparazione, l’esposizione e l’approccio critico sono buoni e le
        conoscenze degli argomenti affrontati nel corso sono adeguate, il voto sarà
        compreso nell’intervallo 26-29;

        - se la preparazione, l’esposizione e l’approccio critico sono ottimi, con
        piena padronanza degli argomenti del corso, allora il voto sarà 30 oppure
        30 e lode.


        Al termine della prova orale lo studente saprà il voto conseguito e potrà
        decidere se accettarlo o rifiutarlo. Come da Regolamento Didattico di Ateneo,
        il rifiuto deve essere concesso dal docente almeno una volta sul singolo insegnamento.


        Questo corso è integrato con il corso di 81940 - INTELLIGENZA ARTIFICIALE,
        di conseguenza la verbalizzazione del voto finale potrà avvenire solo entro
        3 giorni dal conseguimento di entrambi i voti.


