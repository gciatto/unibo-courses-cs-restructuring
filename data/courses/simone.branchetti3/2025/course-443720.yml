  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/443720
    title: 2025/2026 BASI DI DATI (9 CFU) — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course the student: - knows the relational
        data model ed the basic constructors of SQL; - can design and develop a database;
        - is capable of processing a project to implement and information system.'
      Course contents: '- Databases

        - Relational data model

        - Relational algebra and calculus

        - SQL

        - Database design methodology

        - ER data model and quality verification

        - Laboratory: notions about the architecture of a DBMS, indexes, transactions
        and design examples'
      Readings/Bibliography: 'Paolo Atzeni, Stefano Ceri, Stefano Paraboschi, Riccardo
        Torlone, Basi di dati - 6/ed, 2023, ISBN: 9788838656545'
      Teaching methods: 'Lectures will be delivered supported by slides, and will
        be complemented by classroom exercises. During the course lessons, we will
        discuss several issues related to the design, development and querying of
        a database system. Classroom exercises are also planned on various topics
        previously addressed from a theoretical perspective, such as database querying
        and design.


        Considering the type of activity and teaching methods adopted, the course
        attendance requires that all students follow Modules 1 and 2 of security training
        in study places (https://elearning-sicurezza.unibo.it/), through e-learning.'
      Assessment methods: 'The examination consists of an oral assessment. Each academic
        year includes six examination sessions (“appelli”): two in the first session
        (January/February), three in the second (June/July), and one in the third
        (September). The dates are published on Almaesami and may vary. It is advisable
        to check 24 hours before the exam to check that the date has not changed.


        To take part in an examination session, students must register via Almaesami
        at least 7 days before the exam date. Students who fail to register in time
        will not be allowed to sit the exam and must wait for the next session.


        The written exam consists of 4 sections:


        1. Six single-select multiple-choice questions for the verification of general
        knowledge of the course subjects.

        2. An exercise requiring the formulation of two queries in relational algebra
        and two queries in SQL.

        3. An exercise requiring the design of an ER diagram starting from a requirements
        description.

        4. An exercise or an open-ended question on DBMS architecture, transactions,
        and indexes.


        During the written examination, the use of calculators, books, notes, mobile
        phones, or any other communication devices is strictly prohibited, even if
        switched off. The time available is two hours, and the task must be completed
        exclusively using a pen.


        The written examination is assessed according to the following criteria:


        - Fail: the student is unable to adequately complete the query formulation
        and design exercises.

        - Mark 18-21: the student completes the query formulation and design exercises
        at an acceptable level.

        - Mark 22-25: the student correctly completes the query formulation and design
        exercises, and performs acceptably on the multiple-choice questions and the
        open-ended question or exercise.

        - Mark 26-29: the student correctly completes the multiple-choice questions
        and the query formulation and design exercises, and performs acceptably on
        the open-ended question or exercise.

        - Mark 30 or 30 with honours: the student completes the entire examination
        correctly, demonstrating full command of the course content.


        After the written examination, students will receive an email notifying them
        that their marks are available on AlmaEsami. From that moment, ONLY students
        who wish to reject their mark must notify the lecturer by email within 24
        hours of receiving the notification. After this deadline, any mark not explicitly
        rejected will be considered accepted. The above applies exclusively to marks
        equal to or greater than 18. The mark will be officially recorded within the
        following 48 hours, i.e., within 72 hours of the publication of the results
        on AlmaEsami.'
