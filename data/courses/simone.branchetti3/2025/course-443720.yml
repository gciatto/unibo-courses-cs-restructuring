  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/443720
    title: 2025/2026 BASI DI DATI (9 CFU) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce il modello dei dati relazionale ed i principali costrutti del linguaggio
        SQL;

        - è in grado di progettare e realizzare una base di dati;

        - è capace di elaborare un progetto per la realizzazione di un sistema informatico.'
      Contenuti: '- Basi di dati

        - Modello dei dati relazionale

        - Algebra e calcolo relazionale

        - SQL

        - Metodologia di progettazione delle basi di dati

        - Modello ER e verifica della qualità

        - Laboratorio: cenni sull’architettura del DBMS, indici, transazioni ed esempi
        di progettazione'
      Testi/Bibliografia: 'Paolo Atzeni, Stefano Ceri, Stefano Paraboschi, Riccardo
        Torlone, Basi di dati - 6/ed, 2023, ISBN: 9788838656545'
      Metodi didattici: 'Sono previste lezioni frontali alla lavagna, con l’ausilio
        di slides, e esercitazioni in aula. Durante le lezioni verranno discusse le
        problematiche generali connesse con la progettazione, lo sviluppo e l’interrogazione
        di una base di dati. Sono inoltre previste esercitazioni in aula su diverse
        tematiche precedentemente affrontate dal punto di vista teorico, quali l’interrogazione
        e la progettazione di basi di dati.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai Moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L’esame consiste in
        una prova scritta. In ogni anno accademico sono fissati sei “appelli”: due
        nella prima Sessione (Gennaio/Febbraio); tre nella seconda (Giugno/Luglio)
        e uno nella terza (Settembre). Le date degli appelli sono pubblicate su Almaesami
        e possono subire variazioni. Si consiglia di verificare 24 ore prima dello
        scritto che la data non sia cambiata.


        Per partecipare ad un appello d’esame occorre iscriversi su Almaesami entro
        7 giorni dalla data dell’esame. Chi non si iscrive in tempo non potrà sostenere
        l''esame, e dovrà attendere l’appello successivo.


        L’esame scritto è suddiviso in 4 sezioni:


        1. Sei domande a scelta multipla con singola scelta per la verifica delle
        conoscenze generali su tutti gli argomenti del corso.

        2. Un esercizio che richiede la formulazione di due query in algebra relazione
        e due query in SQL.

        3. Un esercizio che richiede la progettazione di un diagramma ER a partire
        da una descrizione dei requisiti.

        4. Un esercizio o una domanda a risposta aperta su architettura del DBMS,
        transazioni e indici.


        Durante la prova scritta non è consentito l’uso di calcolatrici, libri, appunti,
        né è permesso tenere con sé telefoni cellulari o altri dispositivi di comunicazione,
        anche se spenti. Il tempo a disposizione è di due ore e lo svolgimento dovrà
        avvenire esclusivamente usando la penna.


        Il voto dell’esame scritto è determinato secondo i seguenti criteri:


        - Prova non superata: lo studente non è in grado di svolgere in modo sufficiente
        gli esercizi di formulazione delle query e di progettazione.

        - Voto 18-21: lo studente svolge in modo accettabile gli esercizi di formulazione
        delle query e di progettazione.

        - Voto 22-25: lo studente svolge correttamente gli esercizi di formulazione
        delle query e di progettazione, e in modo accettabile le domande a scelta
        multipla e l’esercizio/la domanda a risposta aperta.

        - Voto 26-29: lo studente svolge correttamente le domande a scelta multipla,
        gli esercizi di formulazione delle query e di progettazione, e in modo accettabile
        l’esercizio/la domanda a risposta aperta.

        - Voto 30 o 30 e lode: lo studente svolge correttamente l’intero compito,
        dimostrando piena padronanza degli argomenti del corso.


        Dopo la prova scritta, lo studente riceverà un’email che comunica la disponibilità
        dei voti su AlmaEsami. Da quel momento, SOLO gli studenti che intendono rifiutare
        il voto dovranno segnalarlo inviando un’email al docente entro e non oltre
        24 ore dal ricevimento della comunicazione. Come da Regolamento Didattico
        di Ateneo, il rifiuto deve essere concesso dal docente almeno una volta sul
        singolo insegnamento. Trascorso tale termine, i voti non espressamente rifiutati
        si considereranno accettati. Quanto sopra si applica esclusivamente ai voti
        pari o superiori a 18. La registrazione del voto avverrà entro le successive
        48 ore, ovvero entro 72 ore dalla pubblicazione dei voti su AlmaEsami.'
