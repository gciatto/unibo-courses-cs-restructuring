syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455200
    title: 2025/2026 ADVANCED PROGRAMMING — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente possiede
        le basi della tecnologia informatica nonché l''abilità di utilizzare strumenti
        software base tra cui: sistemi operativi, motori di ricerca, word-processing,
        manipolazione grafiche e dell''immagine, rappresentazione multimediale dei
        dati usando tecnologie open source e commerciali.'
      Contenuti: Durante il corso verranno trattate le tecniche avanzate di programmazione
        software. In particolare verrà studiato il paradigma orientato agli oggetti
        e la sua implementazione nel linguaggio di programmazione Python. Inoltre,
        verrà studiato l'array-oriented computing per il calcolo scientifico e le
        principali librerie per tale scopo in Python, come NumPy, Pandas e SciPy.
        Infine, verranno i principi di modellazione software e verrà lo Unified Modelling
        Language (UML) sarà insegnato per fornire agli studenti un linguaggio standard
        per visualizzare il design di applicazioni software.
      Testi/Bibliografia: '- John V. Guttag; Introduction to Computation and Programming
        Using Python (2 ed.); The MIT Press. [https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-second-edition]

        - http://www.python.org [http://www.python.org/]

        - I riferimenti ad ulteriore materiale saranno indicati di volta in volta.'
      Metodi didattici: '- Lezioni frontali

        - Esercitazioni

        - Letture di articoli scientifici

        - Quiz in classe.'
      Modalità di verifica e valutazione dell'apprendimento: Un progetto di gruppo
        e un esame scritto/orale.
      Strumenti a supporto della didattica: Proiettore, slide, librerie software open
        source con esempi.
      Orario di ricevimento: Consulta il sito web di Andrea Giovanni Nuzzolese (https://www.unibo.it/sitoweb/andrea.nuzzolese2)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455200
    title: 2025/2026 Advanced Programming — University of Bologna
    contents:
      Learning outcomes: 'By the end of the course the student is provided with basic
        information technology notions and ability to use basic software tools, including:
        operating systems, search engines, word processing, image manipulation and
        graphics, multimedia representation of data, including both proprietary and
        open source technologies.'
      Course contents: The course will tackle advanced programming techniques. In
        particular, the course will be focused on Object-Oriented computing and Array-Oriented
        computing for scientific computing. Both paradigm will be investigated by
        using Python as the reference programming language. Accordingly, the students
        will be presented with the mail Python modules and libraries for scientific
        computing, such as, NumPy, Pandas, and SciPY. Finally, the Unified Modelling
        Language (UML) will be taught to provide the reference standard language to
        visualise the design of software application.
      Readings/Bibliography: '- John V. Guttag; Introduction to Computation and Programming
        Using Python (2 ed.); The MIT Press. [https://mitpress.mit.edu/books/introduction-computation-and-programming-using-python-second-edition]

        - http://www.python.org [http://www.python.org/]

        - References to additional material will be provided during the course.'
      Teaching methods: '- Frontal Lectures

        - Exercises

        - Scientific paper reading and reporting

        - Quiz'
      Assessment methods: A group project and a written/oral exam.
      Teaching tools: Projector, slide, open source software libraries with examples.
      Office hours: See the website of Andrea Giovanni Nuzzolese (https://www.unibo.it/sitoweb/andrea.nuzzolese2/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
