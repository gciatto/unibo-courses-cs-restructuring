  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526527
    title: 2025/2026 PROGRAMMAZIONE CONCORRENTE E DISTRIBUITA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente possiede
        conoscenze specialistiche sulla progettazione e lo sviluppo di sistemi e applicazioni
        concorrenti e distribuite. In particolare:


        - conosce le principali tecniche di modellazione e verifica di programmi/sistemi
        concorrenti e distribuiti;

        - conosce le principali architetture e pattern nella progettazione di sistemi
        concorrenti/distribuiti;

        - conosce i principali paradigmi e tecniche di programmazione concorrente,
        asincrona e distribuita;

        - sa applicare le tecniche di programmazione concorrente, asincrona e distribuita
        nel contesto delle tecnologie moderne di riferimento (linguaggi, piattaforme,
        middleware/infrastrutture)'
      Contenuti: "Il corso si svolgerà nelle seguenti parti:\n\n1 - Programmazione\
        \ concorrente - modelli di base\n\n- introduzione - concetti e aspetti principali\n\
        - modello a processi e memoria comune e programmazione multi-threaded\n  --\
        \ problema sezione critica\n  -- meccanismi e astrazioni di interazione di\
        \ base: semafori, monitor\n- analisi comportamento e specifica/verifica di\
        \ proprietà di correttezza\n- progettazione e sviluppo di programmi concorrenti\n\
        \  -- formalismi visuali - Reti di Petri\n  In Lab:\n- programmazione multi-threaded\
        \ in Java\n  -- meccanismi di base e supporti di libreria\n  -- implementazione\
        \ di monitor in Java\n\n2 - Modelli e Tecniche di programmazione asincrona\n\
        \n- Dai thread ai task - progettazione e techniche di programmazione task-oriented\n\
        - Programmazione asincrona basata su architetture ad eventi e CPS\n  -- architettura\
        \ controllo event-loop, meccanismi: promise, async/await\n- Programmazione\
        \ reattiva\n  In Lab:\n- Framework task-oriented in Java - Executors\n- Java\
        \ Virtual Threads\n- programmazione ad attori basata su framework Akka (Java\
        \ o Scala)\n- programmazione asincrona in Vertx (Java) e Node (Javascript)\n\
        - programmazione reattiva in RxJava\n\n3 - Modelli e Tecniche basate su scambio\
        \ di messaggi\n\n- modelli a scambio di messaggi\n  -- modello a canali, asincrono\
        \ e sincrono\n- modello ad attori\n  In Lab:\n- programmazione a scambio di\
        \ messaggi via canali usando linguaggio Go\n- programmazione ad attori basata\
        \ su framework Akka (Java o Scala)\n\n4 - Dalla Programmazione Concorrente\
        \ alla Programmazione Distribuita\n\n- introduzione - concetti e aspetti principali\n\
        - panoramica algoritmi distribuiti\n- richiami a distributed object computing\n\
        - introduzione ai middleware message-oriented\n- cenni in merito a service-oriented\
        \ computing e cloud computing\n  In Lab:\n- programmazione distribuita ad\
        \ attori basata su framework Akka (Java o Scala)\n- programmazione di applicazioni\
        \ distribuite usando message-oriented middleware (MOM) - RabbitMQ come caso\
        \ di studio\n- programmazione di applicazioni distribuite basate su distributed\
        \ object computing come approccio - Java RMI come caso di studio"
      Testi/Bibliografia: '- Principle of Concurrent and Distributed Programming (Ben-Ari)
        - Addison Wesley

        - Java Concurrency in Practice - Brian Goetz, Doug Lea et al - Addison Wesley

        - Foundations of Multithreaded, Parallel, and Distributed Programming - Gregory
        R. Andrews - Addison-Wesley

        - Concurrency - State Models & Java Programs - Jeff Magee & Jeff Kramer -
        Wiley'
      Metodi didattici: 'Dei sei crediti del corso, tre crediti circa sono dedicati
        alla teoria e tre alla pratica in laboratorio.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli di formazione sulla sicurezza nei luoghi di
        studio, in modalità e-learning'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene mediante:


        - lo svolgimento di tre consegne relativamente a programmazione multi-threaded,
        programmazione asincrona e programmazione ad attori/distribuita. Le consegne
        consistono in mini-progetti da svolgere in autonomia in laboratorio/a casa,
        individualmente o in gruppo, durante il corso o a fine corso, a scelta dello
        studente.

        - un colloquio orale, con domande sulla teoria e discussione delle consegne.'
      Strumenti a supporto della didattica: Durante le lezioni verranno proiettati
        lucidi, disponibili sul sito ufficiale del corso. A supporto delle attività
        pratiche, verrà utilizzato il laboratorio di informatica ove gli studenti
        troveranno gli strumenti necessari per svolgere le esercitazioni. Tutto il
        materiale è disponibile sul sito di riferimento del corso.
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/course/view.php?id=48302
      Orario di ricevimento: Consulta il sito web di Alessandro Ricci (https://www.unibo.it/sitoweb/a.ricci)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/526527
    title: 2025/2026 Concurrent and Distributed Programming — University of Bologna
    contents:
      Learning outcomes: 'The course introduces the principles, methods and techniques
        concerning concurrent and distributed programming involved in modern software
        development. Upon completing this course, a student will have a solid conceptual
        and practical knowledge about:


        - the spectrum of concurrent programming: multi-threaded programming, task-oriented
        modeling and design, message-based communication models, actor-based programming,
        asynchronous and reactive programming

        - from concurrent to distributed programming: distributed algorithms, service-oriented
        computing.'
      Course contents: "The course is organized in four main parts:\n\n1. Concurrent\
        \ programming - basic concepts and models\n\n- introduction - main concepts\
        \ and aspects\n- modelling a concurrent program/system\n  -- specifying liveness\
        \ and safety properties in LTL\n  -- verifying properties with model-checking\
        \ - pragmatics\n- design and development of concurrent programs\n  -- methods,\
        \ architectures\n- interaction models and mechanisms\n  -- shared memory\n\
        \  --- semaphores, monitors\n- visual formalism - Petri Nets, Statecharts,\
        \ Activity Diagrams\n  In lab:\n- multi-threaded programming in Java\n  --\
        \ basic mechanisms and libraries\n  -- implementing monitors in Java\n- verification\
        \ of concurrent programs in JPF\n\n1. Asynchronous programming models and\
        \ techniques\n\n- async programming based on task-oriented approaches\n  --\
        \ future mechanism\n- async programming based on events and event-loop architecture\n\
        \  -- mechanisms and design styles (Continuation Passing style (CPS), promises,\
        \ asynch/await)\n- async programming based on Reactice Programming\n  -- reactive\
        \ extensions (Rx)\n  In lab:\n- task-oriented framework in Java - Executors\n\
        - asynchronous programming in JavaScript/Nodejs and Vertx\n- Reactive Programming\
        \ in RxJava\n\n1. Concurrent programming based on message-passing\n\n- message\
        \ passing models\n  -- based on channels, synchronous and asynchronous\n \
        \ -- actor model\n  In Lab:\n- channel-based message-passing in the Go language\n\
        - actor-based programming based on Akka framework (Java or Scala)\n\n1. From\
        \ Concurrent to Distributed Programming\n\n- introduction - main concepts\
        \ and aspects\n- distributed algorithms\n- distributed programming with actors\n\
        - distributed programming using message-oriented middleware\n- distributed\
        \ programming using RPC-like models\n- introduction to service-oriented computing\
        \ and cloud computing\n  In Lab:\n- actor-based distributed programming using\
        \ Akka framework (Java or Scala)\n- distributed application programming using\
        \ message-oriented and RPC-like middlewares using RabbitMQ and Java RMI technologies"
      Readings/Bibliography: '- Principle of Concurrent and Distributed Programming
        (Ben-Ari) - Addison Wesley

        - Java Concurrency in Practice - Brian Goetz, Doug Lea et al - Addison Wesley

        - Foundations of Multithreaded, Parallel, and Distributed Programming - Gregory
        R. Andrews - Addison-Wesley

        - Concurrency - State Models & Java Programs - Jeff Magee & Jeff Kramer -
        Wiley'
      Teaching methods: Three credits (about 30 hours) are devoted to theory and exercises
        in the classroom and three credits (about 30 hours) to practice in the lab.
      Assessment methods: 'The final assessment is composed by two parts:


        - a set of programming assignments/projects, assigned during the course

        - oral discussion, with questions about the theory and the assignments/projects'
      Teaching tools: '- slides projected during the lectures, available on the course
        web site

        - scientific papers and articles, available on the Internet'
      Links to further information: https://virtuale.unibo.it/course/view.php?id=48302
      Office hours: See the website of Alessandro Ricci (https://www.unibo.it/sitoweb/a.ricci/en)
