syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/498808
    title: 2025/2026 PROGETTAZIONE E SVILUPPO DEL SOFTWARE — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente possiede
        le conoscenze di base dei paradigmi di programmazione per software in-the-large,
        quali il paradigma object-oriented e quello funzionale, dei suoi principali
        pattern di progettazione, della sua incarnazione in linguaggi moderni e relativi
        framework di sviluppo. È in grado quindi di progettare e sviluppare applicazioni
        complete di medio-piccole dimensioni, usando processi di sviluppo e tecniche
        agili, tra cui l'approccio DevOps alla conduzione del progetto.
      Contenuti: '- Fondamenti di analisi, progettazione e programmazione orientata
        agli oggetti

        - Linguaggio Java: panoramica e strumenti di sviluppo

        - Concetti base e tipici dei linguaggi a oggetti: classi, oggetti, metodi,
        campi, istanziazione

        - Polimorfismo, ereditarietà e riuso: interfacce e classi astratte

        - Aspetti avanzati: programmazione generica, annotazioni, gestione delle eccezioni,
        elementi di programmazione funzionale (espressioni lambda)

        - Librerie fondamentali per la realizzazione di programmi

        - Gestione dell’input/output

        - Programmazione di interfacce grafiche

        - Elementi introduttivi di programmazione concorrente

        - Cenni a design pattern e a tecniche di programmazione efficace

        - Strumenti di sviluppo e basi di DevOps: JDK, IntelliJ IDEA, Git, Gradle,
        continuous integration'
      Testi/Bibliografia: 'Testo di riferimento:


        - Bruce Eckel, Thinking in Java — Fourth Edition


        Testi consigliati:


        - Joshua Bloch, Effective Java — Second Edition

        - Erich Gamma, Richard Helm, Ralph Johnson, John Vlissides, Design Patterns


        L’acquisto di tali libri non è richiesto, poiché saranno fornite slide sostitutive.
        Il corso farà inoltre uso di tutorial e documentazione tecnica disponibile
        online.'
      Metodi didattici: 'La didattica si articola in lezioni frontali ed esercitazioni
        in laboratorio parzialmente guidate.


        In aula vengono presentate le tecniche di programmazione a oggetti e le caratteristiche
        del linguaggio Java, con esercizi volti a stimolare la discussione critica
        con gli studenti.


        In laboratorio si introducono i principali strumenti di sviluppo e vengono
        assegnati compiti di programmazione per consolidare le competenze pratiche
        attraverso approcci attivi.


        Data la natura delle attività previste, la frequenza richiede la preventiva
        partecipazione ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi di
        studio, erogati in modalità e-learning (https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute).'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell’apprendimento
        avviene tramite colloquio orale con presentazione di un progetto.


        Gli studenti, organizzati in gruppi di circa tre persone, realizzano un progetto
        software in Java e producono una relazione che descrive requisiti, progettazione
        e implementazione. La valutazione tiene conto della qualità della soluzione
        proposta e della discussione delle scelte progettuali.'
      Strumenti a supporto della didattica: Il docente fornirà materiale didattico
        (in particolare slide ed esercizi). L’attività laboratoriale favorirà l’apprendimento
        pratico ed è previsto il supporto di un tutor.
      Orario di ricevimento: 'Consulta il sito web di Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini)


        Consulta il sito web di Gianluca Aguzzi (https://www.unibo.it/sitoweb/gianluca.aguzzi)


        Consulta il sito web di Angelo Filaseta (https://www.unibo.it/sitoweb/angelo.filaseta)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/498808
    title: 2025/2026 Software Design and Development — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student will possess a foundational
        understanding of programming paradigms for software in-the-large, such as
        the object-oriented and functional paradigms, their main design patterns,
        and their embodiment in modern programming languages and related development
        frameworks. The student will therefore be able to design and develop complete
        small- to medium-scale applications, making use of development processes and
        agile techniques, including the DevOps approach to project management.
      Course contents: '- Fundamentals of analysis, design, and object-oriented programming

        - Java language: overview and development tools

        - Core and typical concepts of object-oriented languages: classes, objects,
        methods, fields, instantiation

        - Polymorphism, inheritance, and reuse: interfaces and abstract classes

        - Advanced aspects: generic programming, annotations, exception handling,
        elements of functional programming (lambda expressions)

        - Core libraries for program development

        - Input/output management

        - Graphical user interface programming

        - Introductory elements of concurrent programming

        - Introduction to design patterns and effective programming techniques

        - Development tools and basics of DevOps: JDK, IntelliJ IDEA, Git, Gradle,
        continuous integration'
      Readings/Bibliography: 'Reference text:


        - Bruce Eckel, Thinking in Java — Fourth Edition


        Additional recommended texts:


        - Joshua Bloch, Effective Java — Second Edition

        - Erich Gamma, Richard Helm, Ralph Johnson, John Vlissides, Design Patterns


        Purchasing these books is not required, as substitute slides will be provided.
        The course will also make use of tutorials and technical documentation available
        online.'
      Teaching methods: 'The course combines lectures with partially guided laboratory
        sessions.


        In class, object-oriented programming techniques and the details of the Java
        language are presented, along with exercises that encourage critical discussion
        with students.


        In the laboratory, students are introduced to the main development tools and
        assigned programming tasks to strengthen their practical skills through active
        approaches.


        Due to the nature of the activities involved, attendance requires prior completion
        of safety training modules 1 and 2, delivered in e-learning mode (https://corsi.unibo.it/laurea/TecnologieSistemiInformatici/formazione-obbligatoria-su-sicurezza-e-salute).'
      Assessment methods: 'Learning will be assessed through an oral examination with
        project presentation.


        Students, organised in groups of about three, will develop a software project
        in Java and produce a report describing requirements, design, and implementation.
        Evaluation will consider the quality of the proposed solution and the discussion
        of design choices.'
      Teaching tools: The instructor will provide additional teaching material (in
        particular slides and exercises). Laboratory activities will reinforce practical
        learning, with the support of a teaching tutor.
      Office hours: 'See the website of Danilo Pianini (https://www.unibo.it/sitoweb/danilo.pianini/en)


        See the website of Gianluca Aguzzi (https://www.unibo.it/sitoweb/gianluca.aguzzi/en)


        See the website of Angelo Filaseta (https://www.unibo.it/sitoweb/angelo.filaseta/en)'
