syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/526526
    title: 2025/2026 PARADIGMI DI PROGRAMMAZIONE E SVILUPPO — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso lo studente possiede
        conoscenze specialistiche su tecniche e metodologie di sviluppo software avanzate.
        In particolare:


        - conosce le principali metodologie di software engineering, dagli approcci
        a cascata a quelli agili, e le sa applicare allo sviluppo di sistemi software
        complessi;

        - conosce le principali tecniche di programmazione dichiarativa, funzionale
        e logica;

        - sa applicare tecniche di programmazione e sviluppo avanzate nel contesto
        di linguaggi di programmazione e sistemi moderni, con particolare riferimento
        alla combinazione di programmazione ad oggetti e funzionale;

        - sa applicare pattern di progettazione avanzata nel contesto dei vari paradigmi
        di programmazione.'
      Contenuti: 'Qualità del Software


        - regole di "clean coding" e "effective programming"

        - il ruolo dei pattern di progettazione

        - refactoring

        - testing agile


        Programmazione funzionale


        - funzioni e programmazione funzionale

        - lambda calcolo

        - il linguaggio Scala (layer OO, layer funzionale, typing avanzato)


        Programmazione Logica


        - Prolog

        - Integrazione Java-Prolog


        Software engineering


        - rassegna delle methodologie di sviluppo del software

        - documentazione di un progetto software

        - il caso di SCRUM

        - testing, unit testing, e test-driven development

        - continuous integration e delivery

        - pattern di progettazione avanzati'
      Testi/Bibliografia: 'Advanced OO programming techniques:


        - "Effective Java", Third Edition, Joshua Bloch

        - "Design Patterns: Elements of Reusable Object-Oriented Software", Erich
        Gamma, Richard Helm, Ralph Johnson and John Vlissides


        Functional languages:


        - "Functional Programming in Scala", Paul Chiusano and Runar Bjarnason

        - "Programming in Scala", Bill Venners, Lex Spoon, and Martin Odersky

        - "Functional Programming Patterns in Scala and Clojure", Michael Bevilacqua-Linn

        - "Programming Scala: Scalability = Functional Programming + Objects", Alex
        Payne and Dean Wampler


        Logic languages:


        - "The Art of Prolog", Second Edition, Leon S. Sterling and Ehud Y. Shapiro


        Software Engineering:


        - "Fundamentals of Software Engineering", Giorgio Ghezzi, Dino Mandrioli and
        Mehdi Jazayeri

        - "Clean Code", Robert Cecil Martin

        - "The Art of Agile Development", James Shore

        - "Scrum and XP from the Trenches: How We Do Scrum", by Henrik Kniberg

        - "Test Driven Development: By Example", Kent Beck

        - "JUnit in Action", Second Edition, Petar Tahchiev, Felipe Leme, Vincent
        Massol and Gary Gregory

        - "Testing in Scala", Daniel Hinojosa

        - "Managing Technical Debt: Reducing Friction in Software Development", Philippe
        Kruchten, Robert Nord, Ipek Ozkaya'
      Metodi didattici: 'Il corso si svolge con lezioni in aula sugli aspetti tecnici
        e metodologici, ed esercitazioni pratiche in laboratorio.


        Nella parte in aula si pongono le basi per la conoscenza delle principali
        metodologie di software engineering e delle tecniche di programmazione dichiarativa,
        funzionale e logica. Le lezioni sono impartite a partire da slide proiettate,
        codice pre-esistente e/o costruito durante la lezione, e discussione critica
        assieme agli studenti.


        Nella parte in laboratorio, si organizzano delle sessioni pratiche volte all''apprendimento
        di tecniche di programmazione e sviluppo avanzate e della applicazione di
        pattern di progettazione avanzata. Partendo da software esistente, si presentano
        passi incrementali di sviluppo da eseguire in laboratorio ed eventualmente
        completare a casa. I risultati sono discussi sul forum studenti del sito e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'La verifica dell''apprendimento
        avviene attraverso un progetto, che può essere di una delle due tipologie
        (a scelta dello studente):


        1. singolarmente, lo studente svolge una sperimentazione su aspetti avanzati
        del corso, su un tema indicato dal docente o scelto dallo studente;

        2. a gruppi di 4 persone circa, gli studenti svilupperanno un progetto software,
        concordato col docente, in cui si eserciterà la capacità di programmazione
        e progettazione.


        In entrambi i casi, il progetto verrà discusso in un esame orale, in cui si
        analizzerà il risultato del progetto, e si faranno domande mirate sulle varie
        tecniche di sviluppo studiate durante il corso.


        Questa doppia modalità (progetto e discussione orale) permette di verificare
        la capacità dello studente di andare in verticale su aspetti tecnici avanzati,
        e anche di rimanere orizzontale sulle tematiche a largo-spettro del corso.'
      Strumenti a supporto della didattica: Slide proiettate a lezione, utilizzo "live"
        dei tool di sviluppo studiati durante il corso.
      Orario di ricevimento: 'Consulta il sito web di Mirko Viroli (https://www.unibo.it/sitoweb/mirko.viroli)


        Consulta il sito web di Gianluca Aguzzi (https://www.unibo.it/sitoweb/gianluca.aguzzi)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/526526
    title: 2025/2026 Programming and Development paradigms — University of Bologna
    contents:
      Learning outcomes: At the end of this course, students will acquire advanced
        knowledge of techniques and methodologies for advanced software development.
        In particular, students will:-know the basic software engineering methodologies
        (from waterfall to agile ones), and can apply them to develop complex software
        systems; - know the main programming techniques of declarative (functional
        and logical) approaches; - be able to apply advanced programming techniques
        in the context of modern programming languages, and in particular, those mixing
        object-oriented and functional paradigms; - be able to apply advanced design
        patterns in the context of the various programming paradigms.
      Course contents: 'Software quality


        - rules for clean code and effective programming

        - the role of design patterns

        - refactoring

        - agile testing approaches


        Functional programming


        - functions and functional programming

        - lambda calculus

        - the Scala language (OO layer, functional layer, advanced typing)


        Logic programming


        - Prolog

        - Java-Prolog integration


        Software engineering


        - software methodologies overview

        - documenting a project

        - the role of SCRUM

        - testing, unit testing, and test-driven development

        - continuous integration and delivery

        - advanced design and architectural patterns'
      Readings/Bibliography: 'Advanced OO programming techniques:


        - "Effective Java", Third Edition, Joshua Bloch

        - "Design Patterns: Elements of Reusable Object-Oriented Software", Erich
        Gamma, Richard Helm, Ralph Johnson and John Vlissides


        Functional languages:


        - "Functional Programming in Scala", Paul Chiusano and Runar Bjarnason

        - "Programming in Scala", Bill Venners, Lex Spoon, and Martin Odersky

        - "Functional Programming Patterns in Scala and Clojure", Michael Bevilacqua-Linn

        - "Programming Scala: Scalability = Functional Programming + Objects", Alex
        Payne and Dean Wampler


        Logic languages:


        - "The Art of Prolog", Second Edition, Leon S. Sterling and Ehud Y. Shapiro


        Software Engineering:


        - "Fundamentals of Software Engineering", Giorgio Ghezzi, Dino Mandrioli and
        Mehdi Jazayeri

        - "Clean Code", Robert Cecil Martin

        - "The Art of Agile Development", James Shore

        - "Scrum and XP from the Trenches: How We Do Scrum", by Henrik Kniberg

        - "Test Driven Development: By Example", Kent Beck

        - "JUnit in Action", Second Edition, Petar Tahchiev, Felipe Leme, Vincent
        Massol and Gary Gregory

        - "Testing in Scala", Daniel Hinojosa

        - "Managing Technical Debt: Reducing Friction in Software Development", Philippe
        Kruchten, Robert Nord, Ipek Ozkaya'
      Teaching methods: 'The course will provide lessons in room on technical and
        methodological aspects, and practical exercises in lab.


        In room we ground knowledge of basic software engineering methodologies and
        declarative (functional, logic) software development techniques. Lessons are
        given with projected slides, existing and dynamically built code, and critical
        discussion with students.


        In lab, practical experiences are organised that are devoted to learning advanced
        techniques of software development and application of advanced design patterns.
        Starting from existing code, incremental development steps are presented that
        must be carried on during lab and possibly completed at home. Results are
        discussed using the student forum on the e-learning site.'
      Assessment methods: 'Assessment is conducted through a project, which can be
        of two kinds, freely chosen by the student:


        1. individually, the student experiments advanced aspects of the course, based
        on a theme proposed by the teacher or chosen by the student;

        2. with typically 4-persons teams, students will develop a software project,
        established in agreements with teachers, in which he/she will exercise his
        understanding and competence on advanced design and development.


        In both cases, the project will be discusses through an oral exam, in which
        there will be analysis of project results, but also with specific questions
        on the various developments techniques discussed in the course.


        This double modality (project and oral discussion) should guarantee to both
        assess the student''s ability to go vertically on technical aspects, but also
        to stay horizontal and have a broad view of the subject.'
      Teaching tools: Slides projected during lessons, and "live" usage of the tools
        studied during the course.
