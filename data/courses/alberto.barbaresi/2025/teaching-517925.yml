  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/517925
    title: 2025/2026 RAPPRESENTAZIONE DIGITALE DEL PROGETTO DI PAESAGGIO — Università
      di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine dell''insegnamento lo studente
        conosce le basi teoriche e gli strumenti operativi per l''utilizzazione dell''informatica
        a supporto della rappresentazione del progetto del verde e del paesaggio.
        In particolare lo studente acquisisce le conoscenze di base dell''informatica
        applicata alla rappresentazione grafica digitale, e le metodologie e gli strumenti
        per il suo utilizzo nel campo della rappresentazione dei progetti di spazi
        aperti.

        In particolare, lo studente è in grado di:


        - utilizzare applicativi per gestire vari formati grafici;

        - utilizzare strumenti informatici di tipo CAD;

        - rappresentare il territorio ed il progetto degli spazi aperti, gestendo
        ed elaborando disegni e tavole con apposite applicazioni.'
      Contenuti: "Obiettivo del corso è fornire agli allievi gli strumenti culturali\
        \ e critici e le basi teoriche relative al panorama disciplinare, nonché i\
        \ dispositivi operativi per l'utilizzo dell'informatica a supporto della rappresentazione\
        \ del rilievo/progetto di paesaggio e per effettuare scelte mirate nell'ambito\
        \ della rappresentazione digitale in finalità di controllo, comunicazione\
        \ e presentazione del lavoro prodotto.\n\nAl termine dell'insegnamento lo\
        \ studente è dotato di conoscenze culturali, metodologiche e tecniche che\
        \ gli consentono l'accesso, l'orientamento e la gestione nei fondamenti della\
        \ dimensione grafica digitale, accanto a strumenti comunicativi e organizzativi\
        \ degli elaborati grafici a supporto dell'efficacia e autonomia nella futura\
        \ pratica professionale.\n\nIn particolare, lo studente acquisisce le conoscenze\
        \ di base dell'informatica applicata alla rappresentazione grafica digitale,\
        \ le metodologie e gli strumenti per il suo utilizzo nel campo della rappresentazione\
        \ dei rilievi/progetti di spazi aperti ed è in grado di:\n\n- Organizzare\
        \ e gestire la resa grafica digitale di dati di rilievo ed eventuali formalismi\
        \ di progetto attraverso presentazioni coerenti e professionalmente efficaci;\n\
        - Utilizzare applicativi per gestire vari formati grafici, in particolare\
        \ il software AutoCAD e ceni a programmi di elaborazione di immagini;\n- Rappresentare\
        \ il progetto degli spazi aperti, gestendo ed elaborando disegni e tavole\
        \ con apposite applicazioni di grafica.\n  \n  Unità didattica 1. Contenuti\
        \ teorici: cultura generale sulla rappresentazione digitale\n  \n  Risultati\
        \ attesi:\n  \n  Lo studente conosce l'architettura programmatica e le funzioni\
        \ dei principali software per la rappresentazione progettuale e il design\
        \ digitale con particolare attenzione alla loro applicazione agli spazi aperti;\
        \ acquisisce consapevolezza e cognizione nell'organizzazione della tavola\
        \ di rilievo/progetto, nella rappresentazione grafica digitale di un progetto\
        \ nel suo insieme, nonché nella rilevanza e potenzialità di tale tipo di rappresentazione\
        \ negli elaborati grafici, in uno sguardo anche retrospettivo sull'evoluzione\
        \ degli strumenti di grafica software.\n  \n  Contenuti principali:\n  \n\
        \  Unità didattica 2. Contenuti teorici: la visione, la percezione e il rilievo\
        \ paesaggistico\n  \n  Risultati attesi:\n  \n  Considerando la rappresentazione\
        \ come linguaggio e la lettura del contesto e dei luoghi come forma di conoscenza,\
        \ lo studente acquisisce i principi concettuali e tecnici di percezione dell'ambiente\
        \ e di trasposizione grafica di tale percezione con attenzione alle modalità\
        \ di rappresentazione di rilievo/progetto del sito applicabile sia nel contesto\
        \ urbano che extraurbano che paesaggistico. In questo modo, nella consapevolezza\
        \ del processo visivo come processo conoscitivo sia ambientale che culturale\
        \ ed estetico, percepisce i segni nel paesaggio sviluppando i rudimenti della\
        \ capacità di pensare in termini visuali e grafici, iniziando quel processo\
        \ di percezione morfologica e concettuale del sito e sua traduzione iconologica\
        \ digitale.\n  \n  Contenuti principali:\n  \n  Unità didattica 3. Contenuti\
        \ pratici: il software AutoCAD\n  \n  Risultati attesi:\n  \n  Lo studente\
        \ conosce l’interfaccia del software AutoCAD e approfondisce i principali\
        \ strumenti/comandi per il suo corretto utilizzo nel campo della progettazione\
        \ del paesaggio.\n  \n  Contenuti principali:\n  \n  Unità didattica 4. L’organizzazione\
        \ logica delle tavole e le librerie di immagini\n  \n  Risultati attesi:\n\
        \  \n  Mediante il corretto uso dello strumento disegno nella forma bidimensionale\
        \ lo studente acquisisce la capacità di gestire la struttura e la successione\
        \ logica delle tavole per una corretta rappresentazione del progetto; inoltre\
        \ acquisisce la consapevolezza dell’importanza della creazione di quella preziosa\
        \ risorsa, in continuo incremento durante tutto il periodo di attività di\
        \ un professionista, costituita dalle librerie grafiche.\n  \n  Contenuti\
        \ principali:\n  \n  Unità didattica 5. Contenuti pratici: disegno assistito\
        \ al computer\n  \n  Risultati attesi:\n  \n  Lo studente è in grado di utilizzare\
        \ gli strumenti informatici per l'elaborazione di elaborati grafici e fotografici\
        \ finalizzati alla rappresentazione del progetto di paesaggio. È inoltre grado\
        \ di tradurre iconograficamente la lettura di un luogo, di organizzare coerentemente\
        \ la struttura di una tavola e la successione ragionata di tavole al fine\
        \ della comunicazione esaustiva del proprio lavoro.\n  \n  Contenuti principali:\n\
        - Computer grafica: grafica raster e vettoriale;\n- Panoramica sui software\
        \ per la rappresentazione del progetto nelle fasi applicative della didattica;\n\
        - L'analisi dell'esistente e il rilievo fotografico di documentazione;\n-\
        \ Il ruolo della rappresentazione digitale del progetto;\n- Metodi e tecniche\
        \ di rilievo e rappresentazione paesaggistica;\n- La strumentazione per il\
        \ disegno: dallo schizzo al disegno digitale;\n- Tecniche di rappresentazione\
        \ grafica digitale del rilevamento;\n- La differenza di scala nella rappresentazione\
        \ di un progetto di paesaggio;\n- Tecniche per la rappresentazione della vegetazione\
        \ nel progetto di paesaggio;\n- L’interfaccia AutoCAD: le principali barre\
        \ degli strumenti e il loro utilizzo, il significato dell’unità di disegno;\n\
        - La gestione dei layer, i tipi di linea, il pannello Proprietà;\n- Snap ad\
        \ oggetto, la modifica di un oggetto tramite i ‘grip’;\n- I testi e le quotature;\n\
        - I blocchi: disegno e modifica;\n- L’inserimento e la gestione delle immagini;\n\
        - La gestione della stampa tramite Layout e l’impostazione della tavola;\n\
        - Struttura e organizzazione delle tavole: impaginazione e lay-out della tavola,\
        \ sequenza, intestazione;\n- Organizzazione e gestione delle librerie relative\
        \ alla rappresentazione di un progetto di paesaggio.\n- Disegno digitale di\
        \ un rilievo e del relativo progetto;\n- Impostazione finale delle tavole\
        \ e loro successione;\n- Preparazione dei file di stampa."
      Testi/Bibliografia: 'Bibliografia di fondamentale consultazione sui temi della
        rappresentazione (testi e riviste consultabili nella biblioteca del Plesso
        Vespignani):


        - Hutchison E., Drawing for Landscape Architecture. Thames&Huston, NY 2011

        - Wilk S., Construction and Design Manual. Drawing for Landscape Architects.
        DOM Publisher, Berlino 2014

        - Pasquali M., a cura di, Archipel: l’arte di fare giardini. Bollati Boringhieri,
        Torino 2008 (in particolare il capitolo sul ‘Disegno’) È inoltre ritenuta
        fondamentale la consultazione dei seguenti articoli che verranno messi a disposizione
        agli studenti all''inizio del corso tramite ‘Virtuale’:

        - ‘Speaking about Drawing. An exploration of representation in recent landscape
        architecture’ di S. Noel van Dooren, in TOPOS 80/2012, pag. 43-54

        - ’The critical visual landscape’, rubrica Thinking eye, in JoLA, 3/2015,
        pag. 38-51


        Si considerano di fondamentale consultazione e studio per l’esame anche le
        singole lezioni del corso che verranno messe a disposizione degli studenti
        in forma di dispensa.


        Eventuali altri riferimenti bibliografici di approfondimento rispetto ai temi
        trattati nelle singole lezioni verranno forniti durante il corso.'
      Metodi didattici: 'Vengono illustrati i concetti fondamentali di disegno e grafica
        digitale con particolare orientamento alle potenzialità applicative nell''ambito
        del giardino, del paesaggio e degli spazi aperti in generale. Essendo il corso
        di Rappresentazione Digitale del Progetto di Paesaggio successivo al corso
        di Disegno CAD, esso tiene in considerazione che gli studenti abbiano già
        acquisito delle basi di disegno digitale; di conseguenza, il presente corso
        è un ulteriore approfondimento del software di disegno AutoCAD.


        Tramite la conoscenza dell''architettura, interfaccia e comandi e delle applicazioni
        degli strumenti informatici e il loro utilizzo nelle finalità rappresentative
        del corso, nonché tramite esercitazioni in campo e traduzione delle informazioni
        apprese nella modalità rappresentativa richiesta viene evidenziata la stretta
        integrazione fra la parte teorica (unità didattica 1 e 2) e quella pratica
        (unità didattica 3 e 4).


        In classe verranno alternate lezioni frontali teoriche (sia sulla rappresentazione
        in generale che sul software AutoCAD) a momenti laboratoriali sul disegno
        dell’esercitazione. In particolare, durante la prima lezione di presentazione
        del corso verrà presentato il programma completo del corso, con la scaletta
        delle lezioni teoriche, dei momenti di laboratorio e delle revisioni pubbliche,
        fatte in modo che la revisione diventi un momento di confronto per tutta la
        classe.


        Gli studenti lavoratori/non frequentanti devono comunque contattare il docente
        a inizio corso.'
      Modalità di verifica e valutazione dell'apprendimento: 'Le conoscenze e le competenze
        impartite dal presente insegnamento vengono valutate secondo le modalità di
        seguito descritte. Nella verifica dell''apprendimento sono valutate le conoscenze
        e le competenze acquisite durante il corso.


        La verifica dell’apprendimento dei contenuti prevede un colloquio orale durante
        il quale il docente valuterà:


        - gli elaborati finali (tavole grafiche e relazione sintetica prodotti sotto
        la supervisione del docente);

        - la loro discussione;

        - le conoscenze e della preparazione raggiunta sulla parte teorica mediante
        specifiche domande poste al candidato.


        La valutazione complessiva è formulata dalla commissione tenendo conto:


        - per la parte teorica: del livello di conoscenze e competenze acquisite dallo
        studente relativamente ai contenuti di tutte le unità didattiche.

        - per gli elaborati: i contenuti, la chiarezza, la coerenza e la qualità grafica.


        La valutazione è espressa in trentesimi.


        Per il superamento della prova di esame lo studente dimostra di avere acquisito
        conoscenze sufficienti sui principali contenuti del corso. Per il raggiungimento
        della lode è necessario un approfondimento personale dei temi trattati svolto
        con competenza ed in autonomia.


        La mancata partecipazione alle lezioni frontali teoriche o alle esercitazioni
        non preclude il superamento dell’esame: chi non può frequentare deve contattare
        il docente per contattare un’attività sostitutiva.


        Le date, gli orari e le sedi delle prove d''esame sono pubblicati sul sito
        del corso di laurea. Per iscriversi agli appelli utilizzare l''applicativo
        web AlmaEsami.'
      Strumenti a supporto della didattica: 'PC e videoproiettore per le lezioni frontali.


        Gli studenti potranno lavorare sia sul proprio pc portatile (su cui è installato
        il software AutoCAD) sia nei pc dell’aula informatica.


        Aula informatica con software opportuno per le esercitazioni'
      Orario di ricevimento: Consulta il sito web di Alberto Barbaresi (https://www.unibo.it/sitoweb/alberto.barbaresi)
      SDGs: 'Istruzione di qualità Città e comunità sostenibili Lotta contro il cambiamento
        climatico


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/517925
    title: 2025/2026 Digital represention of the Landscape Project — University of
      Bologna
    contents:
      Learning outcomes: 'At the end of the course, students will understand the theoretical
        foundations and operational tools for using digital technologies to support
        the representation of green space and landscape design. Specifically, students
        will acquire basic knowledge of computer science applied to digital graphic
        representation, as well as the methodologies and tools necessary for its use
        in the visual representation of open space design projects. In particular,
        students will be able to:


        - Use software applications to manage various graphic file formats;

        - Use CAD-type software tools;

        - Represent landscapes and open space designs by managing and processing drawings
        and layout sheets using appropriate applications.'
      Course contents: 'The course aims to provide students with both critical and
        cultural tools and theoretical foundations related to the field of landscape
        representation, as well as practical skills for using digital tools in support
        of landscape survey/design representation. The course also fosters informed
        decision-making in the use of digital graphics for project control, communication,
        and presentation.


        By the end of the course, students will have acquired the cultural, methodological,
        and technical skills needed to access, navigate, and manage the basics of
        digital graphic representation. They will also develop communicative and organizational
        tools to effectively present graphical materials, supporting their future
        professional autonomy.

        Specifically, students will acquire fundamental knowledge of computer-based
        digital graphics, along with methodologies and tools for representing surveys/designs
        of open spaces. They will be able to:


        - Organize and manage the digital graphic rendering of survey data and any
        design elements through coherent and professionally effective presentations;

        - Use software to manage various graphic formats, particularly AutoCAD and
        basic image editing tools;

        - Represent landscape design projects by managing and producing drawings and
        layout sheets with appropriate graphic applications.


        Teaching Unit 1. Theoretical Content: General Culture on Digital Representation


        Expected Learning Outcomes:

        Students will understand the structure and functions of the main software
        used in digital project design, with particular focus on applications for
        open space representation. They will develop awareness and practical knowledge
        in organizing survey/design layouts, digitally representing entire projects,
        and appreciating the relevance and potential of digital representation—including
        a retrospective understanding of the evolution of graphic software tools.


        Main Topics:


        - Computer graphics: raster and vector graphics;

        - Overview of software for project representation used throughout the course;

        - Existing condition analysis and photographic documentation;

        - The role of digital representation in landscape design.


        Teaching Unit 2. Theoretical Content: Vision, Perception, and Landscape Survey


        Expected Learning Outcomes:

        Considering representation as a language and site interpretation as a form
        of knowledge, students will learn the conceptual and technical principles
        of environmental perception and its graphical transposition. Emphasis will
        be placed on survey/design representation in urban, rural, and landscape contexts.
        Students will become aware of visual perception as both an environmental and
        cultural/aesthetic learning process. They will begin to perceive landscape
        signs and develop the foundations of visual and graphic thinking, initiating
        the morphologic and conceptual reading of the site and its digital iconographic
        translation.


        Main Topics:


        - Methods and techniques for landscape survey and representation;

        - Drawing tools: from sketching to digital drawing;

        - Digital graphic techniques for surveying;

        - Scale variation in landscape project representation;

        - Techniques for representing vegetation in landscape design.


        Teaching Unit 3. Practical Content: AutoCAD Software


        Expected Learning Outcomes:

        Students will become familiar with the AutoCAD interface and deepen their
        knowledge of its main tools and commands for appropriate use in landscape
        design.


        Main Topics:


        - AutoCAD interface: main toolbars and their functions, drawing units;

        - Layer management, line types, Properties panel;

        - Object snap, object editing via grips;

        - Texts and dimensions;

        - Blocks: creation and modification;

        - Image insertion and management;

        - Print layout management and sheet setup.


        Teaching Unit 4. Logical Organization of Sheets and Image Libraries


        Expected Learning Outcomes:

        Through proper use of 2D drawing tools, students will learn how to logically
        structure and sequence layout sheets for effective project representation.
        They will also understand the value of building and maintaining a graphic
        library—an essential resource for any design professional.


        Main Topics:


        - Layout sheet structure and organization: pagination, layout, sequence, headers;

        - Organization and management of graphic libraries for landscape project representation.


        Teaching Unit 5. Practical Content: Computer-Aided Drawing


        Expected Learning Outcomes:

        Students will be able to use digital tools to create graphic and photographic
        materials for representing landscape projects. They will also be able to translate
        their understanding of a site into visual form, logically organize layout
        structures, and sequence the sheets for clear and effective project communication.


        Main Topics:


        - Digital drawing of a survey and related project;

        - Final layout and sequencing of sheets;

        - Preparation of print files.'
      Readings/Bibliography: 'Essential readings on the topics of representation (books
        and journals available at the Vespignani Complex Library):


        - Hutchison E., Drawing for Landscape Architecture, Thames & Hudson, NY 2011

        - Wilk S., Construction and Design Manual. Drawing for Landscape Architects,
        DOM Publishers, Berlin 2014

        - Pasquali M. (ed.), Archipel: l’arte di fare giardini, Bollati Boringhieri,
        Torino 2008 (especially the chapter on "Drawing")


        Additionally, the following articles will be made available to students at
        the beginning of the course through the “Virtuale” platform and are considered
        essential:


        - “Speaking about Drawing. An exploration of representation in recent landscape
        architecture” by S. Noel van Dooren, in TOPOS 80/2012, pp. 43–54

        - “The Critical Visual Landscape,” Thinking Eye section, in JoLA, 3/2015,
        pp. 38–51


        Course lecture notes (handouts) will also be considered essential for exam
        preparation. Any further references will be provided during the course based
        on the specific topics covered.'
      Teaching methods: 'The course introduces the fundamental concepts of digital
        drawing and graphics, with specific focus on their application to gardens,
        landscapes, and open spaces. Since this course follows the CAD Drawing course,
        it assumes students already have basic skills in digital drawing and thus
        provides an advanced study of AutoCAD.


        Through an integrated approach combining software architecture, interface
        and command use, and real-world applications, the course blends theoretical
        content (Units 1 and 2) with practical components (Units 3 and 4).

        Classroom activities alternate between theoretical lectures (on representation
        in general and AutoCAD specifically) and practical design workshops. A full
        schedule—including lectures, workshops, and public reviews—is shared during
        the first class. Public reviews serve as collective learning opportunities
        for the entire class.


        Working or non-attending students must contact the instructor at the beginning
        of the course.'
      Assessment methods: 'The knowledge and skills of this teaching are assessed
        in the following way. During the final exam, the knowledge and skills acquired
        on each of the two modules are assessed.


        The learning evaluation of the contents of course involves an oral exam in
        which the teachers will evaluate:


        - the final documents (design and report produced under the supervision of
        the teachers);

        - their defense;

        - knowledge and preparation achieved on the theoretical part through specific
        questions.


        The overall assessment is made by the Commission taking into account:


        - for the theoretical part: the knowledge and skill level achieved by the
        student on the contents of all the teaching units;

        - for the graphic documents: the contents, clarity, consistency, and graphical
        quality.


        Marks are expressed as a score out of 30.


        To pass the exam the student has to show to have acquired sufficient knowledge
        on the course contents. To achieve the honors, an autonomous and competent
        capability to deal with in-depth analysis on the discussed subjects is required.


        Missing the theoretical lectures or exercises does not preclude passing the
        exam: those who cannot attend must contact the teacher to contact a replacement
        activity.


        Examination dates, times and locations are published on the degree course
        website. Subscription to exams through the AlmaEsami web application.'
      Teaching tools: '- PC and projector for lectures

        - Students may work on their own laptops (with AutoCAD installed) or use classroom
        computers

        - Computer lab equipped with appropriate software for hands-on exercises'
      Office hours: See the website of Alberto Barbaresi (https://www.unibo.it/sitoweb/alberto.barbaresi/en)
      SDGs: 'Quality education Sustainable cities Climate Action


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
