syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/484401
    title: 2025/2026 POWER ELECTRONICS FOR AUTOMOTIVE M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: The aim of the course is to provide principles
        of operation, analysis techniques and basic design criteria of power electronics
        converters and systems.
      Contenuti: '-Principi di funzionamento dei convertitori DC/DC (2CFU - 20h)

        Convertitori Buck, Boost e Buck-Boost funzionanti in modalità continua e discontinua.

        Realizzazione dello switch SPDT con dispositivi a semiconduttore, perdite
        di conduzione e modello tempo invariante

        Modello equivalente del trasformatore, convertitore Flyback in modalità continua
        e discontinua.


        -Caratteristiche dei dispositivi di potenza (2CFU - 20h)

        Commutazione di transistor MOSFET.

        Perdite di commutazione, di gate charge e capacità di uscita.

        Principi di funzionamento dei gate driver low-side, high-side e isolati.

        Struttura verticale del transistor MOS e figure di merito.

        Commutazione di diodi PN e Schottky.

        Principio di funzionamento del transistor IGBT.

        Confronto fra dispositivi in Si, SiC e GaN per applicazioni di potenza.


        -Convertitori AC/DC, risonanti e soft-switching (2CFU - 20h)

        Conversione AC/DC: definizione di Power Factor, circuiti di correzione del
        Power Factor (PFC), convertitore PFC bridgeless.

        Principio di funzionamento dei convertitori risonanti, approssimazione di
        prima armonica, convertitore LLC.

        Convertitori soft-switching: analisi semplificata e dettagliata di un convertitore
        PSFB DC/DC, ruolo delle leading e lagging legs.'
      Testi/Bibliografia: 'Appunti delle lezioni


        N. Mohan, T.M. Undeland, W.P. Robbins, Power electronics: converters, applications,
        and design, 2nd edition


        Erickson and Maksimovic, Fundamentals of Power Electronics, second edition'
      Metodi didattici: Lezioni di teoria utilizzando trasparenze e lavagna.
      Modalità di verifica e valutazione dell'apprendimento: 'Il metodo di verifica
        dell’apprendimento consiste in una prova scritta di un’ora e mezza composta
        da un esercizio numerico più due domande sugli argomenti del corso, seguita
        da un breve colloquio orale.


        La prova scritta si svolgerà durante gli appelli che saranno resi disponibili
        al termine dell’insegnamento.


        Durante lo svolgimento della prova scritta è consentito solo l’utilizzo di
        calcolatrici e penna. Non si possono consultare libri di testo, appunti delle
        lezioni e/o altro materiale.'
      Strumenti a supporto della didattica: 'Lezioni ed esercitazioni in aula.


        Durante il corso verranno inoltre svolte delle simulazioni circuitali tramite
        SPICE per approfondire la comprensione del funzionamento dei convertitori
        di potenza.'
      Orario di ricevimento: Consulta il sito web di Alessandro Chini (https://www.unibo.it/sitoweb/alessandro.chini)
      SDGs: 'Imprese innovazione e infrastrutture Città e comunità sostenibili


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/484401
    title: 2025/2026 Power Electronics for Automotive M — University of Bologna
    contents:
      Learning outcomes: The aim of the course is to provide principles of operation,
        analysis techniques and basic design criteria of power electronics converters
        and systems.
      Course contents: '-Operating principle of DC/DC converters (2CFU - 20h)

        Buck, Boost and Buck-Boost converters operating in continuous (CCM) and discontinuous
        (DCM) conduction mode.

        Realization of a SPDT switch with semiconductor devices, modeling of conduction
        losses, and time invariant model extraction.

        Transformer equivalent model, Flyback converter operating in CCM and DCM.


        -Power devices characteristics (2CFU - 20h)

        MOSFET turn-on and turn-off switching characteristics.

        Evaluation of switching, gate charge, and output capacitance losses.

        Operating principle of low-side, high-side, and isolated gate drivers.

        MOSFET vertical structure, Ron vs VBR, and RON*QG figures of merit.

        Diode switching characteristics, comparison between Schottky and PN diodes.

        Insulated-gate-bipolar-transistors (IGBTs) operating principle.

        Comparison amongst Si, SiC, and GaN devices for power switching applications.


        -AC/DC, resonant and soft-switching converters (2CFU - 20h)

        AC/DC conversion: Power Factor definitions, Power Factor Correction (PFC)
        circuits, and Totempole bridgeless PFC converter.

        Resonant converters operating principles, FHA approximation, LLC resonant
        converter.

        Soft-switching converters: simplified and detailed analysis of a PSFB DC/DC
        converter, the role of the leading and lagging legs.'
      Readings/Bibliography: 'Lessons notes.


        N. Mohan, T.M. Undeland, W.P. Robbins, Power electronics: converters, applications,
        and design, 2nd edition


        Erickson and Maksimovic, Fundamentals of Power Electronics, second edition'
      Teaching methods: Classroom teaching by means of slides and blackboard.
      Assessment methods: 'The learning assessment method consists of a written test
        lasting an hour and a half including an exercise plus two questions about
        class topics, followed by a brief oral exam.


        The written test will take place during the exam sessions that will be made
        available at the end of the course.


        During the written test, only the use of calculators and pen is allowed. You
        cannot consult textbooks, lecture notes and / or other material.'
      Teaching tools: 'Classroom lessons and exercises.


        Some SPICE simulations will also be carried out during lessons for supporting
        the understanding of converters operation.'
      Office hours: See the website of Alessandro Chini (https://www.unibo.it/sitoweb/alessandro.chini/en)
      SDGs: 'Industry, innovation and infrastructure Sustainable cities


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
