  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/542491
    title: 2025/2026 STATISTICA E MACHINE LEARNING PER L'ELABORAZIONE DEI SEGNALI
      M — University of Bologna
    contents:
      Learning outcomes: 'The course provides the basic mathematical tools for signal
        processing, with particular emphasis on the statistical model of information,
        the geometric perspective, the role of optimization, and a brief introduction
        to machine learning for neural networks. It applies these concepts to the
        definition and solution of typical fundamental problems: from linear filter
        synthesis to prediction, from spectrum estimation to noise modeling.'
