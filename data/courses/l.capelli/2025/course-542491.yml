syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/542491
    title: 2025/2026 STATISTICA E MACHINE LEARNING PER L'ELABORAZIONE DEI SEGNALI
      M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso fornisce gli strumenti matematici
        di base per l’elaborazione dei segnali con particolare enfasi sul modello
        statistico dell''informazione, il punto di vista geometrico, il ruolo dell’ottimizzazione
        e un cenno all’apprendimento automatico per reti neurali. Applica tali concetti
        alla definizione e alla soluzione dei tipici problemi fondamentali: dalla
        sintesi di filtri lineari alla predizione, dalla stima di spettro alla modellazione
        del rumore.'
