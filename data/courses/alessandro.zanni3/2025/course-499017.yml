syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/499017
    title: 2025/2026 INFORMATICA INDUSTRIALE P — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del modulo lo studente conosce
        i criteri di progetto del software di automazione orientati a favorirne la
        portabilità in ambienti di esecuzione differenziati. In particolare lo studente
        è in grado di applicare, con riferimento a relativamente semplici sistemi,
        l’approccio progettuale “divide et impera”, procedendo alla definizione del
        ruolo delle singole entità costituenti ed identificando idonei modelli per
        la descrizione formale del loro comportamento.
      Contenuti: 'Il corso si articola in due parti. Una parte teorica e una pratica.
        Allo studente vengono presentati argomenti nel contesto dei moderni sistemi
        operativi; loro evoluzione, concetto di processo, gestione della memoria e
        sistemi di input/output. La seconda parte del corso darà invece una connotazione
        pratica alle tematiche viste nella prima parte.


        Parte #1: Introduzione ai Moderni Sistemi Operativi (30 h)


        - Visione storica del Sistema Operativo e principali sotto-sistemi.

        - Gestione dei Processi: definizione, strutture, concorrenza, sincronizzazione,
        ordinamento (con ceni all''ordinamento a tempo reale), stallo.

        - Gestione della Memoria: gerarchie, rilocazione, strutture, memoria virtuale,
        paginazione.

        - Modelli e Architetture di Sistemi Operativi: discussione sulle scelte progettuali
        dei sistemi UNIX/Linux e dei sistemi Windows.


        Parte #2: Design patterns nel contesto del software di automazione (30 h)'
      Testi/Bibliografia: A. S. Tanenbaum, H. Bos. «I Moderni Sistemi Operativi»
      Orario di ricevimento: 'Consulta il sito web di Alessio Mora (https://www.unibo.it/sitoweb/alessio.mora)


        Consulta il sito web di Matteo Sartini (https://www.unibo.it/sitoweb/matteo.sartini)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/499017
    title: 2025/2026 Industrial Informatics P — University of Bologna
    contents:
      Course contents: 'Module 1 of this course provides a comprehensive introduction
        to the fundamental concepts and mechanisms underlying modern operating systems.
        It begins by presenting the role, structure, and objectives of an operating
        system, focusing on how it abstracts and manages hardware resources such as
        CPU, memory, input/output devices, and files to provide an execution environment
        for programs. The course then examines processes and threads, explaining how
        programs are represented and executed, and how the operating system manages
        their lifecycle, resources, and multiprogramming. It addresses concurrency
        and synchronization issues, including mutual exclusion, race conditions, and
        deadlocks, and presents the main mechanisms used to coordinate interacting
        processes. CPU scheduling is analyzed to understand how the operating system
        allocates processor time and evaluates different scheduling policies in terms
        of performance, fairness, and efficiency. The course also covers memory management,
        including virtual memory, paging, and segmentation, highlighting how memory
        is allocated, protected, and organized to support efficient execution. Finally,
        it introduces file systems and I/O management, explaining how persistent data
        and hardware devices are handled through file abstractions, file operations,
        and device access mechanisms.


        Module 2 of this course complements with practical exercises.'
      Readings/Bibliography: A. S. Tanenbaum, H. Bos. «I Moderni Sistemi Operativi»
