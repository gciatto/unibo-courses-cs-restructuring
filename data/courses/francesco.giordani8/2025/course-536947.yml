    title: 2025/2026 FONDAMENTI DI INFORMATICA T-1 (L-Z) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Conoscenze di base e operative della struttura
        dell'elaboratore e dei principi della programmazione orientata agli oggetti.
        Analisi della complessità computazionale. Elementi di basi di dati relazionali.
      Contenuti: 'Prerequisiti/Propedeuticità consigliate


        Per seguire l''insegnamento con profitto non sono necessarie conoscenze o
        competenze pregresse in informatica, né sono consigliate propedeuticità.


        Tutte le lezioni e le esercitazioni saranno tenute in Italiano. È quindi necessaria
        la comprensione della lingua italiana per seguire con profitto il corso e
        per poter utilizzare il materiale didattico fornito.


        Data la natura applicativa del corso, la frequenza alle lezioni è fortemente
        consigliata ma non obbligatoria. Per gli/le studenti/sse non frequentanti
        si raccomanda lo svolgimento pratico degli esercizi che verranno distribuiti,
        utilizzando l''ambiente integrato di programmazione che verrà usato per il
        corso.


        Organizzazione del corso


        Il corso è strutturato in due moduli svolti in parallelo. Il modulo 1 è dedicato
        alla presentazione dei concetti fondanti la disciplina e prevede l''applicazione
        di tali concetti tramite esercitazioni pratiche in laboratorio. Il modulo
        2 integra le attività svolte nel modulo 1, attraverso esercitazioni guidate
        svolte online in modalità sincrona, utilizzando strumenti digitali di condivisione
        e partecipazione attiva da parte degli/le studenti/sse.


        Programma


        1. Architettura dei sistemi di elaborazione

        Struttura generale di un calcolatore elettronico. La macchina di

        Von Neumann. Supporti di memorizzazione.


        2. Software di base per sistemi di elaborazione

        Il sistema operativo. Strumenti per la programmazione: editor,

        debugger, compilatori e interpreti. Fasi di sviluppo di un

        programma.


        3. Elementi di programmazione

        Metodi per l''analisi di un problema. Algoritmi. Metodologie di

        programmazione strutturata e modulare. Iterazione e ricorsione.


        4. Linguaggi di programmazione

        I linguaggi di programmazione e cenni alla loro evoluzione.

        Sintassi e semantica.


        5. Il linguaggio Java

        Introduzione alla programmazione ad oggetti. Il paradigma ad

        oggetti. Fondamenti del linguaggio Java. Alcuni algoritmi e

        strutture dati in Java. Ereditarietà. Strutture dati avanzate in

        Java.'
      Testi/Bibliografia: 'Testo consigliato


        - W. Savitch, D. Micucci: Programmazione di base e avanzata con Java. III
        edizione. Pearson, 2024.


        Testo di approfondimento


        - D. Sciuto, G. Buonanno, L. Mari: Introduzione ai sistemi informatici, VI
        edizione. McGraw-Hill, 2022.


        I testi saranno integrati da slide della docente scaricabili

        dalla pagina del corso su Virtuale.


        Su Virtuale saranno disponibili anche testi e soluzioni delle esercitazioni
        in laboratorio e online, esercizi aggiuntivi di approfondimento, testi e soluzioni
        di prove di preparazione all''esame, software di supporto alla programmazione.'
      Metodi didattici: 'L''insegnamento partecipa al progetto di sperimentazione
        didattica dell''Ateneo e viene erogato in modalità Blended Learning (in presenza
        e a distanza).


        I contenuti del corso vengono somministrati mediante proiezione di slide da

        computer.


        Le lezioni in presenza sono dedicate alla trattazione dei contenuti teorici
        del corso, fornendo la base di conoscenza per la progettazione e l''implementazione
        di algoritmi efficienti per la risoluzione di problemi complessi.


        Le lezioni sono integrate da esercitazioni al computer: ogni esercitazione
        affronta uno specifico argomento proponendo esercizi concreti, per la cui
        soluzione è necessario mettere a frutto quanto acquisito durante le ore di
        lezione. Le esercitazioni in laboratorio favoriscono il potenziamento delle
        abilità di problem solving e di sviluppo del pensiero computazionale. Inoltre,
        attraverso l''uso di specifici strumenti software di supporto alla programmazione,
        si rafforza l''abilità di riconoscere errori e proporre soluzioni.


        Le attività a distanza sono svolte con l''ausilio di strumenti didattici innovativi
        orientati al coinvolgimento degli/lle studenti/sse e a promuovere la partecipazione
        attiva, al fine di favorire la propositività nel formulare soluzioni, l''analisi
        critica e la discussione di alternative proposte in un contesto collaborativo
        tra pari. Ulteriori benefici riguardano lo sviluppo di capacità comunicative
        attraverso la partecipazione sincrona, individuale e in gruppo, alle attività.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio (https://elearning-sicurezza.unibo.it/), in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: "La valutazione d'esame\
        \ mira a verificare il raggiungimento dei\nseguenti obiettivi didattici:\n\
        \n- conoscenza degli elementi architetturali di base hardware e software dei\
        \ calcolatori\n- acquisizione di competenze per la formulazione e l'analisi\
        \ di\n  algoritmi\n- capacità di implementare algoritmi in un linguaggio di\n\
        \  programmazione (Java)\n\nLa verifica dell’apprendimento avviene attraverso\
        \ un esame finale che accerta l’acquisizione delle conoscenze e delle abilità\
        \ attese tramite lo svolgimento di una prova pratica, senza l'aiuto di appunti\
        \ o libri, né dispositivi quali calcolatrici o similari, seguita da una eventuale\
        \ prova orale.\n\nLa prova pratica, della durata di 100 minuti tramite l'applicativo\
        \ EOL, consiste nel:\n\n- rispondere a 7 domande a risposta chiusa e 3 domande\
        \ a risposta aperta di teoria sull'intero programma del corso (linguaggio\
        \ di programmazione incluso)\n- produrre un programma Java per la risoluzione\
        \ di un problema; il testo del problema è articolato di norma in 2/3 punti\
        \ da sviluppare\n\nLe domande di teoria saranno valutate come segue:\n\nPer\
        \ ogni domanda a risposta chiusa\n\n- 1 punto per ogni risposta corretta\n\
        - -0,25 punti per ogni risposta errata\n- 0 punti per ogni risposta non data\n\
        \nPer ogni domanda a risposta aperta\n\n- 3 punti per ogni risposta corretta\n\
        - tra 0 e 3 punti per ogni risposta parzialmente corretta\n- 0 punti per ogni\
        \ risposta errata o non data\n\nPer superare la prova è obbligatorio rispondere\
        \ in modo corretto ad almeno 6 domande di teoria e svolgere senza errori il\
        \ primo punto del programma richiesto.\n\nIl punteggio massimo ottenibile,\
        \ fornendo tutte le risposte esatte e complete e con il corretto svolgimento\
        \ del programma richiesto, è pari a 30 e lode. La prova si intende superata\
        \ con un punteggio minimo di 18/30. Per il superamento della prova non è prevista\
        \ una frequenza minima di partecipazione alle lezioni.\n\nLa prova orale avviene\
        \ solo su richiesta della docente, con l'obiettivo di verificare l'originalità\
        \ della prova pratica svolta dallo/lla studente/ssa. La prova orale verte\
        \ sull'intero programma del corso e consiste in un approfondimento volto ad\
        \ accertare la comprensione dello/lla studente/ssa dei contenuti presentati\
        \ a lezione. La prova orale deve obbligatoriamente essere svolta nello stesso\
        \ appello della prova pratica.\n\nIl superamento dell’esame sarà garantito\
        \ agli/lle studenti/sse che dimostreranno padronanza e capacità operativa\
        \ in relazione ai concetti chiave illustrati nell’insegnamento e, in particolare,\
        \ alle competenze logico-algoritmiche acquisite. Un punteggio più elevato\
        \ sarà attribuito agli/lle studenti/sse che dimostreranno di aver compreso\
        \ ed essere capaci di utilizzare tutti i contenuti dell’insegnamento illustrandoli\
        \ con proprietà di linguaggio, risolvendo problemi anche complessi e mostrando\
        \ buona capacità operativa. Il mancato superamento dell’esame potrà essere\
        \ dovuto all’insufficiente conoscenza dei concetti chiave, alla mancata padronanza\
        \ del linguaggio tecnico e alla mancata o insufficiente capacità operativa.\n\
        \nIn conformità al Codice Etico di Ateneo, si richiamano gli studenti alla\
        \ massima correttezza.\n\nÈ vietata ogni attività volta a modificare indebitamente\
        \ l’esito delle prove (es. copiatura, plagio, accesso alle risorse didattiche\
        \ online, ricorso a strumenti AI non autorizzati). Si segnala in particolare\
        \ che il solo possesso di strumentazione o materiale non autorizzato durante\
        \ la prova comporta l’annullamento immediato del compito e la segnalazione\
        \ agli uffici competenti.\n\nI comportamenti che contravvengono a questo divieto\
        \ possono dare corso a procedimenti disciplinari o a segnalazioni alle autorità\
        \ competenti, se penalmente rilevanti; in quest’ultimo caso vi è il rischio\
        \ che gli studenti coinvolti possano incorrere in procedimenti penali.\n\n\
        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di\
        \ contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):\
        \ sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,\
        \ che dovranno comunque essere sottoposti, con un anticipo di almeno 30 giorni,\
        \ all’approvazione della docente, che ne valuterà l'opportunità anche in relazione\
        \ agli obiettivi formativi dell'insegnamento.\n\nStudenti/sse lavoratori/rici\
        \ o studenti/sse atleti/e: poiché l'esame si svolge in laboratorio, risorsa\
        \ condivisa tra numerosi corsi di laurea e accessibile solo su prenotazione\
        \ con disponibilità molto limitata, non è possibile offrire flessibilità sulle\
        \ date di esame.\n\nPer poter partecipare alle prove d'esame è obbligatorio\
        \ iscriversi, nel rispetto inderogabile delle scadenze previste, alle liste\
        \ di appello tramite l'applicativo AlmaEsami.\n\nUn voto positivo conseguito\
        \ ha validità per il solo appello e viene registrato, entro i termini previsti,\
        \ nel corso del medesimo appello, a meno di una comunicazione di rifiuto del\
        \ voto che deve pervenire entro la data di registrazione prevista per l'appello."
      Strumenti a supporto della didattica: 'Le lezioni in aula saranno svolte utilizzando
        slide da computer, con il

        supporto di un ambiente integrato di programmazione per lo svolgimento di
        esercizi.


        Le esercitazioni in laboratorio consentiranno a ogni studente di disporre
        di un calcolatore sul quale svolgere l''attività di programmazione prevista,
        sotto la guida della docente e di un tutor.


        Le attività a distanza saranno erogate con l''ausilio di strumenti didattici
        innovativi in cui gli/le studenti/sse potranno misurare, attraverso test interattivi,
        le competenze progressivamente acquisite.


        Gli/Le studenti/sse avranno la possibilità di esercitarsi a casa, installando
        sul proprio calcolatore personale il software di supporto alla programmazione
        utilizzato durante le lezioni e le esercitazioni e per lo svolgimento dell''esame.


        Tutti i materiali didattici a cura della docente saranno disponibili su Virtuale.'
      Link ad altre eventuali informazioni: https://virtuale.unibo.it/course/view.php?id=69177
