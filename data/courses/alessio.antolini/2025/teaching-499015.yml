  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/499015
    title: 2025/2026 ELETTRONICA INDUSTRIALE P — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Il corso è articolato in due moduli fortemente
        integrati. Il corso mira a raggiungere i seguenti obiettivi formativi:

        Modulo 1: Elettronica analogica (3 CFU) - Lo studente acquisisce le conoscenze
        di base sull’utilizzo di dispositivi elettronici e dei circuiti impiegati
        nei sistemi di acquisizione e di condizionamento dei segnali provenienti da
        sensori in ambito industriale.

        Modulo 2: Elettronica di potenza (3 CFU) - Lo studente acquisisce i principi
        di funzionamento dei circuiti elettronici di potenza (lineari e in commutazione)
        utilizzati in ambito industriale per la alimentazione e il controllo delle
        macchine elettriche.'
      Contenuti: "Modulo 1: Elettronica analogica (3 CFU - 30h)\n\n- Elementi di dispositivi\
        \ elettronici discreti\n  \n  - Diodo a giunzione\n  - Transistori bipolari\
        \ e ad effetto di campo: caratteristiche elettriche, applicazioni quasi-lineari\
        \ e in commutazione, Safe Operating Area\n  - Stadi elementari di amplificazione\
        \ in regime di piccoli segnali\n- Elettronica per l’acquisizione e il condizionamento\
        \ di segnali\n  \n  - Accoppiamento DC e AC\n  - Amplificatore operazionale\n\
        \  - Amplificatore per strumentazione\n  - Filtri analogici\n  - Generazione\
        \ di segnali modulati da sensori\n    \n    Modulo 2: Elettronica di potenza\
        \ (3 CFU - 30h)\n- Elementi di elettronica di potenza\n  \n  - Transistori\
        \ di potenza, (BJT, FET, IGBT) e relativi circuiti driver\n  - Amplificatori\
        \ per grandi segnali quasi lineari: classi di funzionamento\n  - Convertitori\
        \ AC/DC, rettificazione\n  - Regolatori di tensione quasi lineari\n  - Principi\
        \ di funzionamento di amplificatori e circuiti in commutazione\n  - Regolatori\
        \ di tensione in commutazione (DC/DC)\n  - Inverter (AC/DC)"
      Testi/Bibliografia: Paul Horowitz, Winfield Hill, L' arte dell'elettronica,
        Zanichelli
      Metodi didattici: Durante il corso si illustreranno fondamenti teorici e aspetti
        pratici dell'elettronica di segnale e di potenza per applicazioni industriali
        con lezioni frontali arricchite da simulazioni numeriche.
      Modalità di verifica e valutazione dell'apprendimento: L'esame sarà suddiviso
        in due parti, ognuna dedicata ai rispettivi moduli.
      Strumenti a supporto della didattica: 'Lucidi delle lezioni e articoli della
        letteratura tecnica.


        Simulazioni circuitali con LTSpice'
