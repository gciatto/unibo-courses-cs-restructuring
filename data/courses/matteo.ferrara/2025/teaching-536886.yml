syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/536886
    title: 2025/2026 ARCHITETTURE DEGLI ELABORATORI (CL.B) — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente acquisisce
        le nozioni necessarie alla comprensione delle architetture, del funzionamento
        degli elaboratori e della programmazione assembly.
      Contenuti: '- Introduzione e storia dei calcolatori

        - Rappresentazione digitale dell''informazione

        - Architettura del calcolatore e delle periferiche

        - Il livello ISA e l''assembly language

        - Algebra di Boole

        - Il livello della logica digitale

        - Architetture a confronto

        - Architetture parallele'
      Testi/Bibliografia: ARCHITETTURA DEI CALCOLATORI di Andrew Tanenbaum e Todd
        Austin, Sesta Edizione (2013), Pearson Italia
      Metodi didattici: '- Lezioni frontali

        - Esercitazioni

        - Laboratorio assistito'
      Modalità di verifica e valutazione dell'apprendimento: 'Per poter sostenere
        l’esame, è necessario iscriversi su AlmaEsami (entro la chiusura delle iscrizioni)
        e consegnare con successo tutti gli elaborati almeno una settimana prima dell’appello
        di esame che si intende sostenere. Gli elaborati permettono di sostenere l’esame,
        ma la loro valutazione non concorre al voto finale (si tratta di una idoneità).


        L’esame si compone di:


        - una prova scritta di natura pratica, con esercizi da risolvere simili a
        quelli svolti durante le esercitazioni in aula e per i quali sono presenti
        sulla piattaforma Virtuale numerosi esempi, con relativa soluzione;

        - una prova scritta di natura teorica, con domande aperte su tutto il programma
        del corso.


        La frequentazione delle lezioni (incluse quelle di laboratorio) non è obbligatoria
        e non concorre al voto finale.


        Alla prima prova viene assegnato un punteggio fra 0 e 30. Se tale punteggio
        è inferiore a 18, la seconda prova non viene corretta e l’esame non è superato.
        Altrimenti il voto finale è calcolato come somma di tale punteggio con il
        risultato ottenuto nella seconda prova, che può variare da -4 a +4, e che
        può quindi diminuire o aumentare il punteggio della prima prova. Tuttavia,
        qualora la seconda prova ottenesse una valutazione gravemente insufficiente
        (ad esempio con la maggior parte delle risposte lasciate in bianco o completamente
        errate), l’esame non è superato, indipendentemente dal punteggio risultante.

        Se il punteggio complessivo è superiore a 30, si assegna 30 e lode.


        Acquisizione crediti parziali (per passaggio da altra carriera)

        Fino a tre crediti: è sufficiente consegnare gli elaborati per confermare
        il voto precedente. Fino a sei crediti: è sufficiente consegnare gli elaborati
        e sostenere la prima prova. Il voto sarà calcolato come la media del voto
        precedente e quello della prima prova. Contattare il docente di laboratorio
        per maggiori dettagli operativi.'
      Strumenti a supporto della didattica: Dispense del docente
      Orario di ricevimento: 'Consulta il sito web di Raffaele Cappelli (https://www.unibo.it/sitoweb/raffaele.cappelli)


        Consulta il sito web di Matteo Ferrara (https://www.unibo.it/sitoweb/matteo.ferrara)'
