syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/469202
    title: 2025/2026 CALCOLATORI ELETTRONICI — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso, lo studente dispone
        del metodo e degli strumenti con cui affrontare con consapevolezza il progetto
        di semplici sistemi a microprocessore. Lo studente impara ad analizzare e
        fare la sintesi di reti logiche combinatorie e sequenziali (sincrone e asincrone).
        Queste conoscenze costituiscono la base per lo studio delle architetture dei
        moderni calcolatori elettronici, delle quali lo studente ne apprende i principi
        generali di funzionamento, l'impatto sulle prestazioni, il progetto dell'unità
        di elaborazione e la mutua relazione esistente tra hardware e software. Al
        di là dei contenuti specifici, lo studente acquisisce una delle principali
        abilità che l'industria chiede oggi a un ingegnere dell'informazione, e cioè
        la capacità di gestire la complessità di un progetto, abituandolo alla pratica
        dell'astrazione, intesa come attività volta a rappresentare in modo efficace
        e gerarchico l'essenza del sistema di elaborazione.
      Contenuti: '- Codifica binaria dell''informazione

        - Analisi e sintesi di reti logiche combinatorie, sequenziali asincrone e
        sequenziali sincrone

        - Modello della macchina a stati finiti

        - Principi di funzionamento di un calcolatore

        - Macchina di Von Neumann

        - Modello di esecuzione di un programma

        - Indirizzamento della memoria e dei dispositivi di I/O

        - Architettura dell''hardware dei calcolatori

        - ISA (Instruction Set Architecture)

        - Considerazioni generali sui linguaggi macchina

        - Architetture R-R (RISC) e Architetture M-R (CISC)

        - Misura delle prestazioni di un calcolatore

        - Impatto dell''architettura sulla prestazioni

        - Struttura interna di una CPU ed implementazione tramite struttura sequenziale
        (DLX)

        - Progetto di sistemi a microprocessore'
      Testi/Bibliografia: 'R. Laschi, M. Prandini: "Appunti di Reti Logiche", Esculapio
        2007

        Hennessy Patterson: "Computer architecture: a quantitative approach" - Morgan
        Kaufmann pub. Inc., second edition

        Giacomo Bucci: ìArchitetture dei calcolatori elettroniciî McGraw-Hill'
      Metodi didattici: Verranno inizialmente introdotti i principi di funzionamento
        di un calcolatore. Si seguirà in un primo momento un approccio "top-down"
        volto ad evidenziare le parti fondamentali che costituiscono l'hardware di
        un calcolatore. Verranno quindi studiate le reti logiche come parti fondamentali
        dell'hardware del calcolatore, dalle quali seguendo un approccio "bottom-up",
        si giungerà a delineare la struttura interna di una CPU. Infine, si mostrerà
        come la CPU possa interagire con gli altri elementi fondamentali del calcolatore
        (memoria e dispositivi di I/O) e come il suo funzionamento sia strettamente
        legato all'architettura del set di istruzioni da essa supportato.
      Modalità di verifica e valutazione dell'apprendimento: Prova scritta svolta
        interamente su EOL
      Strumenti a supporto della didattica: Le lezioni verranno supportate da slides
        e altro materiale reso disponibile dal docente sulla piattaforma Virtuale.
      Orario di ricevimento: Consulta il sito web di Luca Roffia (https://www.unibo.it/sitoweb/luca.roffia)
      SDGs: 'Istruzione di qualità Imprese innovazione e infrastrutture Partnership
        per gli obiettivi


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/469202
    title: 2025/2026 Digital Design Principles and Computer Architecture — University
      of Bologna
    contents:
      Learning outcomes: 'At the end of the course, the student possesses the methods
        and tools needed to approach the design of simple microprocessor-based systems
        with awareness. The student learns to analyse and synthesize combinational
        and sequential logic networks (both synchronous and asynchronous).


        This knowledge forms the foundation for studying the architectures of modern
        electronic computers, through which the student acquires an understanding
        of their general operating principles, performance impact, processor design,
        and the mutual relationship between hardware and software.


        Beyond the specific content, the student develops one of the key skills currently
        required in the information engineering industry: the ability to manage project
        complexity, becoming accustomed to the practice of abstraction, understood
        as the process of effectively and hierarchically representing the essence
        of a computing system.'
      Course contents: '- - Binary encoding of information

        - Analysis and synthesis of combinational logic networks, asynchronous sequential
        networks, and synchronous sequential networks

        - Finite state machine model

        - Principles of computer operation

        - Von Neumann architecture

        - Program execution model

        - Memory and I/O device addressing

        - Computer hardware architecture

        - Instruction Set Architecture (ISA)

        - General considerations on machine languages

        - R-R (RISC) architectures and M-R (CISC) architectures

        - Measurement of computer performance

        - Impact of architecture on performance

        - Internal structure of a CPU and implementation using a sequential organization
        (DLX)

        - Design of microprocessor-based systems'
      Readings/Bibliography: 'R. Laschi, M. Prandini: "Appunti di Reti Logiche", Esculapio
        2007

        Hennessy Patterson: "Computer architecture: a quantitative approach" - Morgan
        Kaufmann pub. Inc., second edition

        Giacomo Bucci: ìArchitetture dei calcolatori elettroniciî McGraw-Hill'
      Teaching methods: The principles of how a computer operates will be introduced
        first. An initial top-down approach will be used to highlight the fundamental
        components that make up computer hardware. The course will then examine logic
        networks as essential elements of hardware and, through a bottom-up approach,
        will progress toward outlining the internal structure of a CPU. Finally, it
        will be shown how the CPU interacts with the other key components of a computer
        (memory and I/O devices) and how its operation is closely tied to the architecture
        of the instruction set it supports.
      Assessment methods: All the test is performed on EOL. At the end of the test,
        the student already know the result. As the correction is all automatici,
        students can ask for a manual review of their assessment if the correction
        does not correspond to what expected.
      Teaching tools: The lectures will be supported by slides and additional materials
        made available by the instructor on the Virtuale platform.
      Office hours: See the website of Luca Roffia (https://www.unibo.it/sitoweb/luca.roffia/en)
      SDGs: 'Quality education Industry, innovation and infrastructure Partnerships
        for the goals


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
