  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/514186
    title: 2025/2026 ELETTRONICA DEI SISTEMI DIGITALI M — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Il corso si pone l'obiettivo di illustrare
        le metodologie di progetto dei circuiti integrati digitali a larga scala in
        tecnologia CMOS, con riferimento sia alle architetture circuitali che realizzano
        le più importanti funzioni logiche e aritmetiche sia alle tecniche di progettazione
        assistita ai vari livelli di astrazione. A tal fine, una parte importante
        del corso è dedicata a esercitazioni guidate volte a permettere allo studente
        di affrontare e risolvere alcuni problemi di progetto e caratterizzazione
        di moduli digitali di complessità crescente utilizzando programmi di progettazione
        assistita.
      Contenuti: 'Il corso si divide in lezioni frontali in aula che seguono un approccio
        bottom-up, dal livello di astrazione più basso a quello più alto del sistema
        digitale, e da esercitazioni guidate volte a valutare i) il progetto e la
        caratterizzazione a livello circuitale di una libreria di celle e macrocelle
        digitali e ii) i passi del flusso di progetto di un sistema digitale a partire
        dalla sua descrizione in un linguaggio HDL.


        Nelle lezioni frontali verranno affrontati i seguenti temi:


        - Livelli di astrazione di un sistema digitale. Requisiti funzionali e di
        prestazioni. Metodologie di progetto di sistemi digitali (full-custom, semi-custom
        ASIC e FPGA). Metriche per la valutazione delle loro prestazioni.

        - Richiamo sulle caratteristiche dei transistori MOS.

        - Celle combinatorie in logica statica CMOS pienamente complementare. Modelli
        per valutarne le prestazioni in flussi di progetto a standard-cell. Modelli
        di ritardo e consumo. Criteri di dimensionamento per la realizzazione di reti
        logiche complesse.

        - Analisi delle caratteristiche di altre famiglie logiche statiche e dinamiche,
        studio di alcune applicazioni significative.

        - Latch e registri CMOS statici e loro caratterizzazione per flussi di progetto
        a standard cell.

        - Sistemi digitali sincroni. Equazioni di vincolo sui tempi di setup e hold.
        Distribuzione del clock, effetto di skew e jitter.

        - Linee di interconnessione: effetti C, RC e RCL ad esse associati e modelli
        utilizzati in flussi di progetto di sistemi digitali. Progetto di buffer e
        ripetitori.

        - Micro-architetture circuitali delle principali funzioni aritmetiche (sommatori,
        moltiplicatori, divisori) e tecniche di accelerazione di tali funzioni.

        - Memorie a semiconduttori: memorie volatili statiche e dinamiche ad accesso
        casuale; memorie non volatili: EPROM, EEPROM, Flash, PCM

        - Architetture circuitali dei moduli che compongono un microprocessore: registri,
        ALU, shifter, tag memory, cache delle istruzioni, etc.


        Le esercitazioni prevedono due attività principali:


        1. Progetto e caratterizzazione di una libreria di celle elementari e macrocelle


        - Caratterizzazione dei dispositivi attivi in un processo CMOS di ultima generazione
        attraverso simulazioni circuitali. Caratteristiche I/V al variare del fattore
        di dimensionamento e delle opzioni di processo (tensione di soglia).

        - Progetto e caratterizzazione di porte logiche combinatorie FCMOS: schematico,
        layout e simulazioni circuitali post-layout.

        - Progetto e caratterizzazione di registri statici attraverso simulazioni
        circuitali.

        - Progetto e caratterizzazione di una macrocella aritmetica (sommatori, moltiplicatori).
        Analisi delle scelte a livello di micro-architettura, topologia circuitale
        e dimensionamento. Scelta del setup di simulazione e caratterizzazione anche
        stimando gli effetti delle linee di interconnessione.


        1. Progetto di un modulo digitale: passi del flusso di front-end:


        - Linguaggio VHDL. Codice RTL sintetizzabile e condice non per scrittura del
        testbench. Simulazione funzionale. Sintesi logica: definizione dei vincoli
        e analisi dei risultati di prestazioni. Confronto delle prestazioni al variare
        delle scelte a livello RTL e dei criteri di ottimizzazioni definiti nella
        sintesi.'
      Testi/Bibliografia: 'Tutti e soli gli argomenti del corso sono trattati in aula
        o nel corso delle esercitazioni.


        Il materiale didattico è distribuito sulla piattaforma Virtuale e aggiornato
        annualmente.


        Riferimento bibliografico di supporto:


        J. M. Rabaey, A. Chandrakasan, B. Nikolic: Digital Integrated Circuits - A
        Design Perspective, Second Edition, Prentice Hall International, 2003 (http://bwrc.eecs.berkeley.edu/Classes/IcBook/index.html
        ).


        Approfindimenti: articoli su piattaforma IEEE Xplore'
      Metodi didattici: 'Il corso prevede lezioni frontali e esercitazioni in laboratorio;
        le attività in laboratorio hanno l’obiettivo di permettere allo studente di
        verificare tramite semplici esempi la comprensione degli effetti che scelte
        ai diversi livelli di astrazione, discusse a teoria, hanno sulle prestazioni
        di un sistema digitale.


        Le esercitazioni prevedono l’utilizzo di programmi di progettazione assistita
        a diversi livelli di astrazione (RTL e circuitale) per la progettazione di
        Circuiti Integrati secondo la metodologia a Standard Cell o FPGA. I programmi
        saranno in parte di pubblico accesso e in parte accessibili in forma remota
        o in presenza nel Lab7 dei DEI grazie a licenze a scopo didattico ottenute
        tramite il progetto europeo EUROPRACTICE.


        In considerazione della tipologia di attività e dei metodi didattici adottati,
        la frequenza di questa attività formativa richiede la preventiva partecipazione
        di tutti gli studenti ai moduli 1 e 2 di formazione sulla sicurezza nei luoghi
        di studio, in modalità e-learning


        https://site.unibo.it/tutela-promozione-salute-sicurezza/it/corsi-di-formazione/formazione-obbligatoria-su-sicurezza-e-salute-per-svolgimento-di-tirocinio-tesi-laboratorio'
      Modalità di verifica e valutazione dell'apprendimento: 'L’ esame sarà svolto
        in due fasi:


        - una prova scritta e/o orale sui contenuti di teoria durante la quale verranno
        anche verificati i risultati di tutte le esercitazioni proposte durante il
        corso.

        - presentazione di una breve relazione scritta finale e successiva discussione
        orale in laboratorio sui risultati dell''attività di progetto e caratterizzazione
        di una macrocella digitale funzionalmente completa.


        Il superamento della prima fase è propedeutico alla seconda.


        Studenti/sse con DSA o disabilità temporanee o permanenti: si raccomanda di
        contattare per tempo l’ufficio di Ateneo responsabile (https://site.unibo.it/studenti-con-disabilita-e-dsa/it):
        sarà sua cura proporre agli/lle studenti/sse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con un anticipo di 15 giorni, all’approvazione
        della docente, che ne valuterà l''opportunità anche in relazione agli obiettivi
        formativi dell''insegnamento.'
      Strumenti a supporto della didattica: 'Tutti e soli gli argomenti del corso
        sono trattati in aula o nel corso delle esercitazioni.


        Il materiale didattico è distribuito sulla piattaforma Virtuale e aggiornato
        durante il corso. Il materiale è costituito da lucidi, esercizi, esempi di
        codici VHDL e comprende guide semplificate agli strumenti di progettazione
        assistita utilizzati in laboratorio.


        Le esercitazioni sono parte integrante del corso e permettono un continuo
        confronto con il docente.'
      Orario di ricevimento: Consulta il sito web di Eleonora Franchi Scarselli (https://www.unibo.it/sitoweb/eleonora.franchi)
      SDGs: 'Istruzione di qualità


        L''insegnamento contribuisce al perseguimento degli Obiettivi

        di Sviluppo Sostenibile dell''Agenda 2030 dell''ONU.'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/514186
    title: 2025/2026 Digital Systems Electronics M — University of Bologna
    contents:
      Learning outcomes: Goal of the course is to familiarize students with the design
        and optimization of CMOS IC digital circuits with respect to different quality
        metrics (cost, speed, reliability, and power dissipation) at different abstraction
        levels.
      Course contents: 'The main topics are CMOS logic families and sequential circuits,
        interconnect, arithmetic buildings blocks, and digital IC design methodologies.


        - MOS transistor I/V transfer characteristic, IC manufacturing process, simplified
        CMOS process flow, trends in process technology and technology scaling.

        - CMOS combinational logic gates, latches and registers: FCMOS (fully complementary
        CMOS) static combinational logic gates (propagation delay, static and dynamic
        power consumption), sizing of transistors for minimization of the propagation
        delay in a chain a logic gates, CMOS static latches and registers, characterization
        of logic and sequential cells for logic simulation and synthesis tools.

        - Interconnect: electrical wire models (lumped C and RC models, distributed
        RC line, IR-drop, inductance voltage drop), design of buffers and repeaters,
        impact of technology scaling.

        - Arithmetic buildings blocks: serial adder, architecture and performance
        of parallel adders (ripple carry, carry-select, carry-skip, logarithmic look-ahead),
        serial multiplier, architecture and performance of parallel multipliers.

        - Implementation strategies for digital IC: full-custom and semi-custom design
        approaches, cell-based design methodology (standard cells and macro cells),
        array-based implementation methodology. Design flow of semi-custom IC design.
        Hardware description language: VHDL. Logic simulation and synthesis.


        During practical activities, the students will design digital cells and macrocells
        at different abstraction levels and characterize complex modules such as adders,
        and multipliers by using a CMOS technology and CAD tools available thanks
        to Europractice program.


        - Cell-based design methodology, characterization of combinational logic gates
        and sequential cells for logic simulation and synthesis tools. Models to estimate
        delay and power. Digital semi-custom design flow: front-end flow starting
        from RTL entry (using VHDL language), simulation and synthesis. Analysis of
        the layout of standard cells. Back-end flow (place&route).

        - Characterization of the available CMOS technology. Analysis and simulation
        of electrical static and dynamic MOS transistor properties, electrical properties
        of interconnect wires.

        - Student design activity aimed at creating a cell library (schematic and
        layout design, transistor level simulation in order to compute the values
        of the parameters used in delay and power models, description of the cell
        in a hardware description language). Each student will design a combinational
        cell and a static register.

        - Student''s main project activity: design and characterization of a complex
        module such as adders, multipliers, and memories. The activity will cover
        different design abstraction levels (architectural, logic, transistor-level
        and layout).'
      Readings/Bibliography: 'Jan M. Rabaey, Anantha P. Chandrakasan, Borivoje Nikolic,
        Digital Integrated Circuits: A Design Perspective, 2nd Edition 2003, Prenctice
        Hall (http://bwrc.eecs.berkeley.edu/Classes/IcBook/index.html)


        Additional docs (in italian) are available via Virtuale.'
      Teaching methods: The students will design and characterize logic and sequential
        cells and complex modules such as adders, multipliers, and memories in CMOS
        technology by using CAD tools available thanks the Europractice program.
      Assessment methods: The students have forst to pass an oral examination and
        then they have to present and discuss a written report on their project activity.
      Teaching tools: As concerns the teaching methods of this course unit, all students
        must attend Module 1, 2 [https://www.unibo.it/en/services-and-opportunities/health-and-assistance/health-and-safety/online-course-on-health-and-safety-in-study-and-internship-areas]
        on Health and Safety online.
      Office hours: See the website of Eleonora Franchi Scarselli (https://www.unibo.it/sitoweb/eleonora.franchi/en)
      SDGs: 'Quality education


        This teaching activity contributes to the achievement of the Sustainable Development
        Goals of the UN 2030 Agenda.'
