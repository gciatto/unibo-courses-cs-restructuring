syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/534208
    title: 2025/2026 INFORMATICA — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo Studente avrà la
        conoscenza dei principali sistemi di identificazione informatica del cittadino
        che accede a servizi online. Sarà inoltre in grado di utilizzare i principali
        sportelli telematici della Pubblica Amministrazione, tra i quali quello dell'INPS,
        dell'INAIL, dell'Agenzia delle Entrate, nonché registrare una nuova attività
        imprenditoriale sul Registro delle imprese della locale Camera di Commercio.
        Infine saprà consultare le principali banche dati documentali, in particolare
        quelle contenenti la normativa, la giurisprudenza e la dotrina relative a
        tematiche di diritto del lavoro.
      Contenuti: 'Parte Prima: Dematerializzazione e tecnologie di interazione alternative
        alla carta


        - I documenti su supporto elettronico

        - L''inquadramento comunitario della transizione digitale

        - L''identificazione informatica

        - I servizi fiduciari elettronici

        - La gestione informatica dei documenti elettronici


        Parte Seconda: I portali della pubblica amministrazione italiana


        - Registro delle Imprese

        - Sportello Unico delle Attività Produttive (SUAP)

        - Servizi Regionali per le Comunicazioni Obbligatorie

        - Agenzia delle entrate

        - Istituto Nazionale della Previdenza Sociale (INPS)

        - Istituto Nazionale per l''Assicurazione contro gli Infortuni sul Lavoro
        (INAIL)

        - Portale dei Servizi Telematici (PST) per i Servizi Online Giudice di Pace

        - Polizia di Stato per richiesta passaporto biometrico

        - Ministero dell''Interno per prenotazione Carta d''Identità Elettronica


        L''insegnamento partecipa al progetto di innovazione didattica dell''Ateneo'
      Testi/Bibliografia: 'Francesco Tura, La transizione digitale nei servizi per
        cittadini e imprese, Seconda edizione aggiornata, Bologna, Esculapio, 2025.


        N.B. Si sconsiglia vivamente di utilizzare, per la preparazione dell''esame,
        materiale didattico diverso dal libro di testo e da quanto illustrato a lezione
        e sintetizzato nelle diapositive pubblicate su virtuale.unibo.it.

        Qualsiasi altro materiale, di qualsiasi altra provenienza, potrebbe infatti
        risultare obsoleto, inesatto o fuorviante.'
      Metodi didattici: 'Lezioni frontali.


        Durante il corso delle lezioni verranno organizzati alcuni test di autovalutazione
        su parti del programma, per lo svolgimento dei quali gli studenti potranno
        utilizzare il materiale didattico. Le suddette prove non comportano alcuna
        valutazione.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame consiste in
        una prova scritta con sei domande a risposta aperta su altrettante tematiche
        attinenti a quelle indicate in Programma/Contenuti, da svolgersi in un tempo
        massimo di novanta minuti. Ad ogni risposta sono attribuiti da zero a cinque
        punti, individuati in base alla pertinenza e alla correttezza della risposta
        nonché alla padronanza del linguaggio. Un sesto punto è riservato alle risposte
        corrette che siano anche particolarmente esaustive e particolareggiate. Il
        voto dell''esame scritto corrisponde alla somma dei punteggi ottenuti nelle
        sei domande. In caso di somma maggiore o uguale a trentatré viene assegnata
        la lode.


        Lo studente può altresì richiedere una prova orale integrativa consistente
        in una sola domanda su una tematica attinente a quelle indicate in Programma/Contenuti
        e che può portare ad una variazione massima del voto finale di tre punti in
        più o in meno rispetto alla votazione conseguita nella prova scritta. La valutazione
        della prova orale terrà conto della preparazione dimostrata dallo studente,
        dalla sua capacità critica e dalla padronanza del linguaggio. La data della
        prova orale è unica per ogni appello e viene comunicata contestualmente alla
        pubblicazione del risultato della prova scritta.


        Gli studenti che nella prova scritta abbiano riportato una votazione di almeno
        15/30 possono anch''essi richiedere la prova orale, la quale si svolgerà con
        le stesse modalità sopra riportate e in questo caso comporterà al massimo
        (in caso di esito positivo) la votazione di 18/30.


        Si segnala che non potranno in alcun modo essere ammessi a sostenere l''esame
        gli studenti che non si siano regolarmente iscritti al relativo appello entro
        la data di chiusura delle liste, stabilita in sette giorni prima della data
        dell''esame. Nel caso in cui uno studente riscontri problemi tecnici o burocratici
        nell''iscrizione, è pregato di rivolgersi al docente prima della chiusura
        delle liste, in modo da permettere la risoluzione del problema in tempo utile,
        eventualmente interagendo con la Segreteria.'
      Strumenti a supporto della didattica: Libro di testo e diapositive illustrate
        a lezione.
      Orario di ricevimento: Consulta il sito web di Francesco Tura (https://www.unibo.it/sitoweb/francesco.tura)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/534208
    title: 2025/2026 Informatics — University of Bologna
    contents:
      Learning outcomes: 'At the end of the course students will have got knowlegde
        of all main e-government authentication systems.

        Moreover they will be able to use online services provided by Italian government
        bodies such as INPS, INAIL, Italian Revenue Agency, Local Chambers of Commerce.

        Lastly they will easily consult documentary databanks.'
      Course contents: 'First Part: Dematerialisation and no paper transaction technologies


        - Electronic documents

        - UE Legislation on digital transformation

        - Electronic Identification

        - Electronic Trust Services

        - Electronic document management


        Second Part: Italian Government portals


        - Italian Companies House

        - Italian municipal desks for productive activities (SUAP)

        - Regional information services for mandatory communications

        - Revenue Agency

        - Italian national institution of social security (INPS)

        - Italian National Institute for Insurance Against Occupational Accidents
        (INAIL)

        - Telematic services for Justice of the Peace - Italian Police service for
        biometric passport - Italian Department of Interior service for electronic
        identity card


        This course takes part into the Bologna University didactic innovation project'
      Readings/Bibliography: 'Francesco Tura, La transizione digitale nei servizi
        per cittadini e imprese, Seconda edizione aggiornata, Bologna, Esculapio,
        2025.


        P.S. It is very not recommended to use other educational material that is
        not textbook or slides published on virtuale.unibo.it.

        Every educational material with other origin could be obsolete, inaccurate
        or misleading.'
      Teaching methods: 'Frontal lessons.


        Some self-assessment tests, regarding parts of the programme, will be organised
        during term time. Students can perform them by using books and notes. Such
        tests do not involve any evaluation.'
      Assessment methods: 'The examination consists in a written test composed by
        six open answering questions regarding as many themes choosen from the ones
        listed in Course contents. Maximum time: 90 minutes. Zero to five points are
        given to each of the six themes, such rating depending on relevance, correctness,
        and of fluency of the answer. A sixth point is given to very exhaustive and
        detailed correct answers. The final mark is determined by summing all points
        obtained in the various answers. Praise is granted if the sum is greater or
        equal to thirty-three.


        Students may ask an additional oral test (only one question regarding a theme
        choosen from the ones listed in Course contents): in that case the final mark
        can differ at most of three units (more or less) compared to the one of written
        test. The oral text evaluation depends on students'' knowledges, critical
        reasoning ability, and sound use of language. The (unique) oral test date
        is published jointly to the results of written test.

        Even students who achieve an evaluation correspondig to at least 15/30 in
        the written test may ask to take the oral test, and in that case the final
        mark cannot exceed 18/30.


        Students who do have not signed up in the dedicated list within its expiration
        date (seven days before) cannot absolutely take the test. Students having
        technical or burocratic problems in signing up must contact the teacher before
        the expiration date.'
      Teaching tools: Textbook and slides illustrated during classes.
      Office hours: See the website of Francesco Tura (https://www.unibo.it/sitoweb/francesco.tura/en)
