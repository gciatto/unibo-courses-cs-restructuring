syllabus:
  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/524682
    title: 2025/2026 COMPUTATIONAL METHODS FOR BIOINFORMATICS — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: Al termine del corso lo studente possiede
        le conoscenze per sviluppare e utilizzare gli strumenti per l'analisi strutturale
        e la sequenza delle biomolecole e, più in generale, per l'individuazione dei
        problemi nell'era genomica. In particolare, lo studente sarà in grado di programmare
        autonomamente in linguaggio Python. Inoltre, sarà in grado di discutere e
        implementare le basi teoriche degli strumenti di allineamento sequenziale
        (programmazione dinamica e algoritmi euristici).
      Contenuti: 'Il corso si compone di 2 moduli:


        1. Programmazione in Python, incluso: variabili, espressioni e comandi, funzioni,
        condizionali, iterazione, stringhe, liste, tuple, dizionari, file, ricorsione
        e programmazione orientata agli oggetti.

        2. Breve introduzione a linux (a inizio corso); programmazione dinamica e
        algoritmi di allineamento di stringhe (locali, globali e semiglobali) e loro
        implementazione in python (a fine corso).'
      Testi/Bibliografia: 'Non è necessario l''acquisto di testi specifici. Materiale
        didattico aggiornato e'' reperibile tramite il sito Virtuale.


        Per approfondimenti suggeriamo:


        Cay Horstmann, Rance D. Necaise. Python for Everyone, Wiley


        Allen B. Downey. Think Python: How to Think Like a Computer Scientist, O’
        Reilly


        per la parte di programmazione Python.'
      Metodi didattici: 'Lezioni frontali e attivita'' pratica di programmazione in
        Python sotto linux.


        In considerazione della tipologia di attività e dei metodi didattici

        adottati, la frequenza di questa attività formativa richiede la

        preventiva partecipazione di tutti gli studenti ai Moduli 1 e 2 di

        formazione sulla sicurezza nei luoghi di studio (https://elearning-sicurezza.unibo.it),
        in modalità e-learning.'
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame e'' composto
        da 2 parti, una per modulo, che possono anche essere affrontate in sessioni
        diverse. Ogni parte consiste in un esercizio di programmazione python, incluso
        debugging di eventuali errori. La capacita'' di ottenere tramite debugging
        (manuale o supportato da tool) codice corretto costituisce un punto fondamentale
        della valutazione. Ogni parte include anche una breve discussione del codice
        sviluppato. Ogni parte vale 16 punti. Per ogni parte e'' anche possibile ottenere
        un punto bonus consegnando e discutendo un esercizio durante il corso.


        Studenti/esse con DSA o disabilità temporanee o permanenti: si raccomanda
        di contattare per tempo l’Ufficio di Ateneo competente

        (https://site.unibo.it/studenti-con-disabilita-e-dsa/it).

        Sarà sua cura proporre agli/lle studenti/esse interessati/e eventuali adattamenti,
        che dovranno comunque essere sottoposti, con almeno 15 giorni di anticipo,
        all’approvazione dei docenti, i quali ne valuteranno l''opportunità anche
        in relazione agli obiettivi formativi dell’insegnamento.'
      Strumenti a supporto della didattica: 'Il materiale didattico sarà disponibile
        sul sito Virtuale.


        Per le esercitazioni si userà la shell linux, un editor/IDE (a scelta dello
        studente tra EMACS, VS-CODE e PYCHARM) e l''interprete Python.'
      Orario di ricevimento: 'Consulta il sito web di Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese)


        Consulta il sito web di Matteo Manfredi (https://www.unibo.it/sitoweb/matteo.manfredi4)'
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/524682
    title: 2025/2026 COMPUTATIONAL METHODS FOR BIOINFORMATICS — University of Bologna
    contents:
      Learning outcomes: At the end of the course, the student has the knowledge for
        developing and using tools for sequence and structure analysis of biomolecules
        and more generally for annotation problems in the genomic era. In particular,
        the student will be able to independently write programs in Python language.
        He/she will be also able to discuss the theoretical basis of sequence alignment
        tools (dynamic programming and heuristic algorithms) and to implement them.
      Course contents: 'The course is composed of 2 modules:


        1. Python programming, including: variables, expressions and statements, functions,
        conditionals, iteration, strings, lists, tuples, dictionaries, files, recursion
        and object-oriented programming.

        2. Brief introduction to linux (at the beginning of the course) and to dynamic
        programming and pairwise alignment algorithms (local, global and semiglobal)
        and their python implementation (at the end of the course).'
      Readings/Bibliography: 'No specific book is required. Updated teaching material
        is available through the Virtuale website.


        For further information we suggest:


        Cay Horstmann, Rance D. Necaise. Python for Everyone, Wiley


        Allen B. Downey. Think Python: How to Think Like a Computer Scientist, O’
        Reilly


        for the Python programming part.'
      Teaching methods: 'Theoretical lessons and practical programming activity in
        Pyhton under linux.


        In relation to the kind of activities and didactical methods adopted,

        the attendance to this class will require the preliminary participation

        of all the students to the Modules 1 and 2 of the Safety rules on study places,
        which can be followed remotely in e-learning via the following link: https://elearning-sicurezza.unibo.it/'
      Assessment methods: 'The exam is composed of two parts, one per module, that
        can also be taken in different exam sessions. Each part takes the form of
        a python programming exercise, including debugging of errors. The ability
        to obtain correct code via debugging (manual or supported by tools) is a main
        point in the evaluation. Each part also includes a brief discussion of the
        developed code. Each part receives a score of up to 16 points. For each part
        it is also possible to get one bonus point by submitting and discussing one
        exercise during the course.


        Students with learning disorders and\or temporary or permanent disabilities:
        please, contact the responsible office

        (https://site.unibo.it/studenti-con-disabilita-e-dsa/en/for-students) as soon
        as possible so that they can propose acceptable adjustments. The request for
        adaptation must be submitted in advance (at least 15 days before the exam
        date) to the lecturers, who will assess the appropriateness of the adjustments,
        taking into account the teaching objectives.'
      Teaching tools: 'Teaching material will be available on the Virtuale website.


        For exercises we will use the linux shell, a text editor/IDE (each student
        can choose the one (s)he prefers among EMACS, VS-CODE and PYCHARM) and the
        Python interpreter.'
      Office hours: 'See the website of Ivan Lanese (https://www.unibo.it/sitoweb/ivan.lanese/en)


        See the website of Matteo Manfredi (https://www.unibo.it/sitoweb/matteo.manfredi4/en)'
