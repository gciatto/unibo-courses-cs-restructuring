  it:
    url: https://www.unibo.it/it/studiare/insegnamenti-competenze-trasversali-moocs/insegnamenti/insegnamento/2025/455457
    title: 2025/2026 FONDAMENTI DI CYBERSECURITY — Università di Bologna
    contents:
      Conoscenze e abilità da conseguire: 'Al termine del corso, lo studente:


        - conosce gli algoritmi crittografici di base a chiave pubblica e a chiave
        segreta;

        - conosce le principali problematiche di sicurezza informatica;

        - conosce i principali protocolli crittografici;

        - è in grado di capire il funzionamento delle tecniche crittografiche moderne;

        - è in grado mettere in atto gli accorgimenti necessari per garantire la sicurezza
        di un sistema informatico;

        - è in grado di analizzare la vulnerabilità di un sistema informatico;

        - è in grado di dare una valutazione critica circa la sicurezza di un sistema
        informatico;

        - è capace di elaborare e di presentare un progetto per garantire la sicurezza
        di un sistema informatico'
      Contenuti: '- Vulnerability Assessment

        - Penetration testing

        - TOR / Dark Web

        - One-time pad

        - Stream Ciphers

        - Real-World Stream Ciphers

        - Sistemi crittografici a chiave segreta

        - Sistemi crittografici a chiave pubblica

        - DES

        - AES

        - RSA Firme elettroniche

        - Infrastructure Public-key

        - Wifi network security

        - SDR e attacchi radio

        - Controllo degli accessi

        - Patches e Exploits

        - Reverse engineering'
      Testi/Bibliografia: '- Computer Security: Principles and Practice (4th Edition),
        Stallings and Brown, Pearson, 2018.

        - Crittografia, William Stallings

        - A Graduate Course in Applied Cryptography, Dan Boneh, Victor Shoup. (Approccio
        Matematico)

        - Cryptography, Theory and Practice, Fourth Edition, Douglas R. Stinson and
        Maura B. Paterson.

        - Hackers 7.0, George Kurtz, Joel Scambray, and Stuart McClure; Apogeo, 2013.

        - Serious Cryptography: A Practical Introducion to Modren Encryption, Jean-Philippe
        Aumasson.

        - Applied Cryptography: Protocols, Algorithms, and Source Code in C, Bruce
        Schneier.

        - Information Security: Principles and Practice, Mark Stamp.'
      Metodi didattici: L'insegnamento vale 6 CFU ed è costituito da lezioni frontali
        ed esercitazioni pratiche/laboratorio.
      Modalità di verifica e valutazione dell'apprendimento: 'L''esame di fine corso
        mira a valutare il raggiungimento degli obiettivi didattici:


        - conoscere le principali minacce odierna alla sicurezza informatica

        - conoscere i fondamenti matematici alla crittografia moderna

        - capire il funzionamento e limiti dei principali algoritmi a protocolli crittografiche
        moderne

        - analizzare le vulnerabilità di un sistema informatico

        - garantire la sicurezza di un sistema informatico.


        Il corso ha un''attività di esercitazioni/laboratorio da svolgere in maniera
        autonoma con la presenza/aiuto della docente.


        - L''esame consiste in una prova scritta.

        - Nel corso di ogni anno accademico vengono fissati sei appelli: tre nella
        sessione estiva (Giugno/Luglio); uno nella sessione autunnale (Settembre)
        e due nella sessione invernale (Gennaio/Febbraio).

        - La prova scritta riguarda la soluzione di quattro/cinque esercizi/domande
        distinti. La tipologia di tali esercizi/domande è la seguente: esercizi su
        tecniche algoritmico-crittografiche da risolvere e domande a risposta aperta.
        Ciascun esercizio è articolato in punti. Di norma, la difficoltà è crescente
        (il primo punto è più facile, l''ultimo è il più difficile). Il tempo complessivo
        a disposizione per la prova scritta è approssimativamente di 1 ora e mezzo.
        Per ottenere il massimo del punteggio nella prova scritta (31/30), la (lo)
        studentessa (studente) dovrà risolvere tutti i quesiti.

        - La prova scritta si considera superata se la somma del punteggio di tutti
        i quesiti risolti risulta essere maggiore o uguale a 18.

        - Durante la prova scritta, solo l''uso della calcolatrice è ammesso. Non
        è ammesso nessun altro tipo di materiale, cartaceo o elettronico, questo va
        da materiale "ufficiale" del corso come slide o registrazioni a materiale
        auto-prodotto o semi prodotto (e.g. appunti o soluzioni di esercitazioni).
        ChatGPT rientra ad esempio in questa categoria.'
      Strumenti a supporto della didattica: Le lezioni frontali prevedono l'uso di
        lucidi proiettatti da un laptop e una lavagna tradizionale. Il materiale didattico
        presentato a lezione verrà messo a disposizione dello studente in formato
        elettronico tramite internet/Piattaforma Virtuale.
      Orario di ricevimento: Consulta il sito web di Jocelyne Elias (https://www.unibo.it/sitoweb/jocelyne.elias)
  en:
    url: https://www.unibo.it/en/study/course-units-transferable-skills-moocs/course-unit-catalogue/course-unit/2025/455457
    title: 2025/2026 FONDAMENTI DI CYBERSECURITY — University of Bologna
    contents:
      Learning outcomes: The objective of the course is to present the theory, mechanisms,
        techniques and tools that are effective in increasing the security of a computer
        system. At the end of the course, the student will be familiar with the mathematical
        foundations of modern cryptography, authentication, authorization and access
        control mechanisms that are suitable for achieving confidentiality, integrity
        and availability of computer systems. The student will also acquire the knowledge
        necessary to assess the potentials and limitations of current technologies.
      Course contents: '- Vulnerability Assessment

        - Penetration testing

        - TOR / Dark Web

        - One-time pad

        - Stream Ciphers

        - Real-World Stream Ciphers

        - Cryptographic Systems with secret key

        - Cryptographic Systems with public key

        - DES

        - AES

        - RSA Digital Signatures

        - Public-key infrastructures

        - Wifi network security

        - SDR and radio attacks

        - Access Control

        - Patches and Exploits

        - Reverse engineering'
      Readings/Bibliography: '- Computer Security: Principles and Practice (4th Edition),
        Stallings and Brown, Pearson, 2018.

        - Crittografia, William Stallings

        - A Graduate Course in Applied Cryptography, Dan Boneh, Victor Shoup. (Approccio
        Matematico)

        - Cryptography, Theory and Practice, Fourth Edition, Douglas R. Stinson and
        Maura B. Paterson.

        - Hackers 7.0, George Kurtz, Joel Scambray, and Stuart McClure; Apogeo, 2013.

        - Serious Cryptography: A Practical Introducion to Modren Encryption, Jean-Philippe
        Aumasson.

        - Applied Cryptography: Protocols, Algorithms, and Source Code in C, Bruce
        Schneier.

        - Information Security: Principles and Practice, Mark Stamp.'
      Teaching methods: The course is worth 6 CFU and consists of lectures and practical
        exercises/Lab.
      Assessment methods: 'The final exam aims to assess the achievement of the following
        learning objectives:


        - Understand the main threats to cybersecurity today

        - Understand the mathematical foundations of modern cryptography

        - Understand the functioning and limitations of the main algorithms and modern
        cryptographic protocols

        - Analyze the vulnerabilities of a computer system

        - Ensure the security of a computer system.


        The course includes exercises/laboratory activities to be completed independently
        with the presence/assistance of the lecturer.


        - The exam consists of a written test.

        - Six exam sessions are scheduled during each academic year: three in the
        summer session (June/July); one in the fall session (September); and two in
        the winter session (January/February).

        - The written exam involves solving four to five separate exercises. They
        consist of cryptography exercises and questions. Each exercise is divided
        into scores. Typically, difficulty increases (the first is easy, the last
        is the most difficult). The total time allotted for the written exam is approximately
        1.5 hours. To obtain the maximum score in the written exam (31/30), students
        must solve all questions.

        - The written exam is passed if the sum of the scores of all solved exercises
        is greater than or equal to 18.

        - During the written exam, only a calculator is permitted. No other materials,
        whether paper or electronic, are permitted. These range from "official" course
        materials such as slides or recordings to self-produced or semi-produced materials
        (e.g., notes or exercise solutions). Chat GPT falls, for example, into this
        category.'
      Teaching tools: 'The lectures utilize overhead slides projected from a laptop
        computer together with a white board.


        The material presented during lectures will be made available in electronic
        format for downloading from the Course web site/Virtuale Platform.'
      Office hours: See the website of Jocelyne Elias (https://www.unibo.it/sitoweb/jocelyne.elias/en)
